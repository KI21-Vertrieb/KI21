function extractOpportunityCandidates(value,found,seen,depth=0){

  const candidate=normalizeState({...value,rawImport:raw||value.rawImport||'',company:company||value.company||'',opportunity:opportunity||value.opportunity||''});

function normalizeMoney(v){if(!v)return 0;const raw=String(v).replace(/\s/g,'').replace(/âŽ/g,'').replace(/EUR/ig,'');if(/mio/i.test(raw)){const n=parseFloat(raw.replace(/[^0-9,]/g,'').replace(',','.'));return Math.round((n||0)*1000000)}const cleaned=raw.replace(/\.(?=\d{3}(\D|$))/g,'').replace(',','.').replace(/[^0-9.]/g,'');return Math.round(parseFloat(cleaned)||0)}

    || raw.match(/(\d{1,3}(?:\.\d{3})*(?:,\d+)?)\s*âŽ\s+dokumentierter Aufwand im letzten Jahr/i);
