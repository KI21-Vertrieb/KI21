function preferConcreteCockpitFacts(accId,positives){
  let list=[...(positives||[])];
  const facts=extractKnownBusinessFacts(accId);
  const replaceOrAdd=(pattern,text,preferredIndex)=>{
    if(!text)return;
    list=list.filter(t=>!pattern.test(String(t||'')));
    if(!list.some(t=>String(t||'').toLowerCase()===text.toLowerCase())){
      list.splice(Math.min(preferredIndex,list.length),0,text);
    }
  };
  replaceOrAdd(/schmerz konkret benannt|schmerz quantifiziert|80\.?000|80000|umsatzschaden|jahresschaden/i,facts.pain,1);
  replaceOrAdd(/budgetrahmen vorhanden|budget bestûÊtigt|budget.{0,40}verfû¥gbar|60\.?000|60000/i,facts.budget,2);
  replaceOrAdd(/entscheidungsbefugnis bestûÊtigt|entscheider.*marius|marius.*entscheid/i,facts.authority,0);
  return shortUniqueList(list,4);
}
function sanitizeCockpitTextFinal(accId,text,kind,opts){
  let x=String(text||'').trim();
  if(!x)return '';
  const authority=!!(opts&&opts.authority);
  const budgetFit=!!(opts&&opts.budgetFit);
  const budgetSignal=!!(opts&&opts.budgetSignal);
  const fit=getGenericOfferBudgetFit(accId);
  // Budget-/Preisverwechslungen im Cockpit immer entschûÊrfen, sobald ein Budgetsignal oder ein echter Angebots-Fit vorliegt.
  // Falls kein Angebotspreis bekannt ist, bleibt es eine Angebots-/Umfangsfrage, aber keine Budget-Passung zu einem Budgetrahmen.
  if(isObsoleteBudgetPriceConfusion(x) && (budgetFit||budgetSignal||fit.fits)){
    if(kind==='positive')return fit.entryRole?'Startangebot liegt klar im Budgetrahmen':'Angebot liegt im Budgetrahmen';
    if(kind==='warning'||kind==='risk')return fit.entryRole?'Startangebot noch nicht verbindlich gestartet':'Angebotsumfang noch nicht verbindlich festgelegt';
    return fit.entryRole?'Einstiegsumfang und Starttermin festlegen':'Angebotsumfang und Starttermin klûÊren';
  }
  x=sanitizeInventedPrecisionText(accId,x,kind);
  x=normalizeRoiHebelText(x);
  x=sanitizeBudgetPriceText(accId,x,kind);
  // Nach der Budget-SûÊuberung nochmals prû¥fen: alte Budget-Fit-Fragen dû¥rfen im Cockpit nicht sichtbar bleiben,
  // sobald ein passender Angebotsbaustein oder ein belastbares Budgetsignal vorhanden ist.
  if(isObsoleteBudgetPriceConfusion(x) && (budgetFit||budgetSignal||fit.fits)){
    if(kind==='positive')return fit.entryRole?'Startangebot liegt klar im Budgetrahmen':'Angebot liegt im Budgetrahmen';
    if(kind==='warning'||kind==='risk')return fit.entryRole?'Startangebot noch nicht verbindlich gestartet':'Angebotsumfang noch nicht verbindlich festgelegt';
    return fit.entryRole?'Einstiegsumfang und Starttermin festlegen':'Angebotsumfang und Starttermin klûÊren';
  }
  if(authority&&isObsoleteGfCfoText(x)){
    if(/80\.?000|80000|schaden|jahresschaden|umsatzverlust|quote|vermeidungsquote|roi/i.test(x)){
      return (kind==='warning'||kind==='risk')?'Wirtschaftliche Wirkung mit Entscheider validieren':'Vermeidungsquote mit Entscheider validieren';
    }
    if(kind==='missing'||kind==='open')return 'Wirtschaftlichen Nutzen mit Entscheider validieren';
    if(kind==='warning'||kind==='risk')return 'Formale Beauftragung / Startentscheidung noch offen';
    return '';
  }
  return x;
}
function buildCockpitMatrixData(accId,health){
  const raw=getCurrentUserKnowledgeText(accId).toLowerCase();
  const authorityContext=hasConfirmedFullDecisionAuthority(accId)||hasAuthoritySignalInHealth(health);
  const budgetSignalContext=hasBudgetSignalInHealth(health)||/budget|freigabe|pilotstart|beauftragung/.test(raw);
  const lowPilotUnderBudget=hasLowKi21PilotUnderBudget(accId);
  const explicitContractSignal=hasExplicitContractProcessSignal(accId,health);
  const positives=shortUniqueList((health.positive||[]).filter(s=>!s.disabled).map(s=>sanitizeCockpitTextFinal(accId,s.text,'positive',{authority:authorityContext,budgetFit:lowPilotUnderBudget,budgetSignal:budgetSignalContext})),4);
  const risks=shortUniqueList((health.warning||[]).filter(s=>!s.disabled).map(s=>sanitizeCockpitTextFinal(accId,s.text,'warning',{authority:authorityContext,budgetFit:lowPilotUnderBudget,budgetSignal:budgetSignalContext})),4);
  const open=shortUniqueList((health.open||[]).map(s=>sanitizeCockpitTextFinal(accId,s.text,'open',{authority:authorityContext,budgetFit:lowPilotUnderBudget,budgetSignal:budgetSignalContext})),4);

  // Chancen aus bestûÊtigten harten Fakten ergûÊnzen, falls die KI-Liste zu dû¥nn ist.
  if(authorityContext&&!hasTextInList(positives,/entscheidungsbefugnis|entscheider/i)){
    positives.unshift('Entscheidungsbefugnis bestûÊtigt');
  }
  if(lowPilotUnderBudget&&!hasTextInList(positives,/angebot|startangebot|budgetrahmen|budget/i)){
    positives.push('Startangebot liegt klar im Budgetrahmen');
  } else if(/budget|freigabe|pilotstart|beauftragung/.test(raw)&&!hasTextInList(positives,/budget/i)){
    positives.push('Budgetrahmen vorhanden');
  }
  if(/80\.000|80000|schmerz|vermeidungsquote|schlechte deals|qualifizierte deals|discovery/.test(raw)&&!hasTextInList(positives,/schmerz|bedarf|nutzen/i)){
    positives.push('Schmerz konkret benannt');
  }

  // Wenn der Score sichtbar mittelmûÊûig ist, darf die Matrix nicht "keine Risiken" zeigen.
  // Dann sind fehlender Business Case, Pilotstart oder Vertragsprozess Bremsfaktoren.
  if((health.score||0)<70 && risks.length===0){
    if(!hasTextInList(open,/wirtschaft|nutzen|business|roi|vermeidungsquote/i)){
      risks.push('Business Case noch nicht belastbar');
    }
    if(!hasTextInList(open,/pilot|start|zeitplan/i)){
      risks.push('Pilotstart noch nicht verbindlich');
    }
    if(explicitContractSignal&&!hasTextInList(open,/vertrag|beschaffung|einkauf|paper|bestell/i)){
      risks.push('Vertragsprozess noch offen');
    }
  }

  // Offene Punkte auffû¥llen, damit "Die eine Sache" nicht leer oder zu generisch bleibt.
  if(!hasTextInList(open,/wirtschaft|nutzen|business|roi|vermeidungsquote/i)){
    open.push(authorityContext
      ? 'Wirtschaftlichen Nutzen mit Entscheider validieren'
      : 'Wirtschaftlichen Entscheider validieren');
  }
  if((health.score||0)<70 && !hasTextInList(open,/pilot|start/i))open.push('Pilotstart konkretisieren');
  if((health.score||0)<70 && explicitContractSignal && !hasTextInList(open,/vertrag|beschaffung|einkauf|paper|bestell/i))open.push('Vertragsprozess klûÊren');

  // Finale Cockpit-SûÊuberung: Budget-/Preisverwechslungen und û¥berholte GF-Punkte dû¥rfen nicht sichtbar bleiben.
  const cleanFinal=(list,kind)=>shortUniqueList((list||[]).map(t=>sanitizeCockpitTextFinal(accId,t,kind,{authority:authorityContext,budgetFit:lowPilotUnderBudget,budgetSignal:budgetSignalContext})).filter(Boolean),4);
  let finalPositive=cleanFinal(positives,'positive');
  let finalRisks=cleanFinal(risks,'warning');
  let finalOpen=cleanFinal(open,'open');
  if(lowPilotUnderBudget&&!hasTextInList(finalPositive,/angebot|startangebot|budgetrahmen|budget/i)){
    finalPositive.push('Startangebot liegt klar im Budgetrahmen');
  }
  if(authorityContext&&!hasTextInList(finalOpen,/wirtschaft|nutzen|vermeidungsquote|pilot|start/i)){
    finalOpen.push('Wirtschaftlichen Nutzen und Pilotkriterien validieren');
  }
  // v4.152: absolute finale Cockpit- und Bottom-Sheet-Sperre gegen alte Budget-/GF-Rû¥ckfûÊlle aus gecachten Health-Texten.
  finalPositive=cleanFinal(finalPositive,'positive');
  finalRisks=cleanFinal(finalRisks,'warning')
    .map(normalizeRoiHebelText)
    .filter(t=>!(authorityContext&&isObsoleteGfCfoText(t)))
    .filter(t=>!(lowPilotUnderBudget&&isObsoleteBudgetPriceConfusion(t)))
    .filter(t=>!isTechnicalIntegrationDetail(t));
  finalOpen=cleanFinal(finalOpen,'open')
    .map(normalizeRoiHebelText)
    .filter(t=>!(authorityContext&&isObsoleteGfCfoText(t)))
    .filter(t=>!(lowPilotUnderBudget&&isObsoleteBudgetPriceConfusion(t)))
    .filter(t=>!isTechnicalIntegrationDetail(t));
  const hasVQCase=hasVermeidungsquoteBusinessCase(accId,health);
  if(hasVQCase&&!hasTextInList(finalRisks,/vermeidungsquote|vermeidbar/i)){
    const insertAt=finalRisks.length&&/entscheidung|gestoppt|verzûÑgert|beauftragung|startentscheidung/i.test(finalRisks[0])?1:0;
    finalRisks.splice(insertAt,0,'Vermeidungsquote schwach qualifizierter Deals noch nicht validiert');
  }
  if(hasVQCase&&!hasTextInList(finalOpen,/pilot[-\s]?deals|messkriterien|vermeidungsquote/i)){
    finalOpen.unshift('Konkrete Pilot-Deals und Messkriterien zur Vermeidungsquote offen');
  }
  if(lowPilotUnderBudget&&!hasTextInList(finalPositive,/angebot|startangebot|budgetrahmen|budget/i))finalPositive.push('Startangebot liegt klar im Budgetrahmen');
  if((health.score||0)<70&&finalRisks.length===0)finalRisks.push(hasVQCase?'Vermeidungsquote schwach qualifizierter Deals noch nicht validiert':'ROI-Annahme / Vermeidungsquote noch nicht gemessen');
  if(!finalOpen.length)finalOpen.push(authorityContext?'Wirtschaftlichen Nutzen mit Entscheider validieren':'Wirtschaftlichen Entscheider validieren');
  finalPositive=preferConcreteCockpitFacts(accId,finalPositive);
  if(!explicitContractSignal){
    finalOpen=finalOpen.filter(t=>!/vertragsprozess|vertrag|bestellprozess|einkauf|procurement|paper/i.test(String(t||'')));
    finalRisks=finalRisks.filter(t=>!/vertragsprozess|vertrag|bestellprozess|einkauf|procurement|paper/i.test(String(t||'')));
  }
  return {
    positive:shortUniqueList(finalPositive.map(normalizeRoiHebelText),4),
    risks:shortUniqueList(finalRisks.map(normalizeRoiHebelText),4),
    open:shortUniqueList(finalOpen.map(normalizeRoiHebelText),4)
  };
}

function extractBulletsAfterHeader3(text,headerKeyword,maxItems){
  const lines=(text||'').split('\n');const out=[];let found=false;
  for(let i=0;i<lines.length;i++){
    if(!found){if(lines[i].toUpperCase().includes(headerKeyword.toUpperCase()))found=true;continue;}
    const t=lines[i].trim();if(!t)break;
    if(/^[A-ZûûûÞ₤ÞËããÂ\-]/.test(t)&&out.length>0)break;
    out.push(t.replace(/^[ãÂ\-]\s*/,''));if(out.length>=(maxItems||3))break;
  }
  return out;
}
function extractFirstBulletAfterHeader3(text,headerKeyword){
  const b=extractBulletsAfterHeader3(text,headerKeyword,1);return b.length?b[0]:'';
}

function splitDetailsFromResult(text){
  if(!text)return {main:'',details:''};
  // Robuster Marker-Match: erlaubt fû¥hrende Markdown-Zeichen (#, -, =, *, Leerzeichen) vor/nach ###DETAILS###,
  // falls die KI das exakte Format leicht abweichend ausgibt (z.B. "## ###DETAILS###" oder "###DETAILS###  ")
  const markerRegex=/[#\-=*\s]*###\s*DETAILS\s*###[#\-=*\s]*/i;
  const m=text.match(markerRegex);
  if(!m)return {main:text,details:''};
  const idx=m.index;
  return {main:text.slice(0,idx).trim(),details:text.slice(idx+m[0].length).trim()};
}

// Ziel: abschlussorientiert, aber nicht û¥berzogen. Kein "grû¥nes Licht", solange keine

function getPhaseScoreInfo(sitId){
  if(!state.activeId)return {score:null,reason:''};
  const data=LS.get('ki21_st_'+state.activeId+'_'+sitId,null);
  if(!data||!data.result)return {score:null,reason:''};
  const matches=[...data.result.matchAll(/(\d+)\s*\/\s*10/g)];
  const m=matches.length?matches[0]:null;
  if(!m)return {score:null,reason:''};
  const score=parseInt(m[1]);
  if(score<1||score>10)return {score:null,reason:''};
  return {score,reason:extractBegruendung(data.result)};
}

function getPhaseStatus(sitId){
  if(!state.activeId)return 'empty';
  const data=LS.get('ki21_st_'+state.activeId+'_'+sitId,null);
  if(data&&data.result)return 'done';
  if(data&&data.fv&&Object.values(data.fv).some(v=>v&&v.trim&&v.trim()))return 'progress';
  return 'empty';
}

// Leitet einen echten Fortschritts-Prozentsatz aus den bereits vorhandenen Eingabefeldern
// (SITS[].felder, ohne post-Felder) ab. Keine erfundene Zahl ã 0/100 fû¥r leer/abgeschlossen.
function getPhaseProgressPct(sitId){
  const sit=SITS[sitId];
  if(!state.activeId||!sit)return 0;
  const data=LS.get('ki21_st_'+state.activeId+'_'+sitId,null);
  if(!data)return 0;
  if(data.result)return 100;
  const fields=(sit.felder||[]).filter(f=>!f.post);
  if(!fields.length)return 0;
  const filled=fields.filter(f=>data.fv&&data.fv[f.id]&&data.fv[f.id].trim&&data.fv[f.id].trim()).length;
  return Math.round((filled/fields.length)*100);
}

    items.forEach((it,idx)=>{
      if(it.separator){
        const sep=document.createElement('div');
        sep.className='bs-separator';
        body.appendChild(sep);
        return;
      }
      const row=document.createElement('div');
      row.className='bs-row'+(it.priority?' bs-priority':'')+(it.onClick?' clickable':'');
      const g=document.createElement('span');
      g.className='bs-glyph';
      g.textContent=it.glyph||'ãÂ';
      row.appendChild(g);
      const t=document.createElement('span');
      t.style.flex='1';
      if(it.caption){
        const cap=document.createElement('div');
        cap.className='bs-priority-caption';
        cap.textContent=it.caption;
        t.appendChild(cap);
      }
      const main=document.createElement('div');
      main.textContent=it.text;
      t.appendChild(main);
      row.appendChild(t);
      if(it.onClick){
        const arrow=document.createElement('span');
        arrow.className='bs-row-arrow';
        arrow.textContent='ã¤';
        row.appendChild(arrow);
        row.addEventListener('click',e=>{e.stopPropagation();close();it.onClick();});
      }
      body.appendChild(row);
    });
  }
  panel.appendChild(body);

  const close=()=>{
    overlay.classList.remove('visible');
    panel.classList.remove('visible');
    setTimeout(()=>{overlay.remove();panel.remove();},280);
  };
  overlay.addEventListener('click',close);

  // Swipe-down to dismiss
  let startY=0;
  panel.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;},{passive:true});
  panel.addEventListener('touchend',e=>{
    if(e.changedTouches[0].clientY-startY>60)close();
  },{passive:true});

  document.body.appendChild(overlay);
  document.body.appendChild(panel);
  requestAnimationFrame(()=>{overlay.classList.add('visible');panel.classList.add('visible');});
}


// v4.139: robuste Cockpit ã Arbeitsbereich Navigation.
// Es wird bewusst NICHT zu einem exakten KI-Satz gesprungen, weil Phasentexte nach Regenerierung variieren.
// Stattdessen: passende Phase ûÑffnen + klaren Cockpit-Arbeitsauftrag oben anzeigen.
function getCockpitWorkTarget(kind,text){
  const raw=String(text||'').trim();
  const t=raw.toLowerCase();
  let phaseId=0;
  let section='Passender Arbeitsbereich';
  let hint='Bearbeite diesen Punkt im Arbeitsbereich.';

  if(kind==='question'){
    phaseId=1;section='Discovery & Demo';hint='Nutze diese Frage im nûÊchsten Termin und dokumentiere die Antwort im Arbeitsbereich.';
  } else if(/business case|nutzen|roi|vermeidungsquote|wirtschaft|kennzahl|messbar|effekt|kosten|impact/.test(t)){
    phaseId=3;section='Nutzen / ROI';hint='Validiere hier wirtschaftlichen Nutzen, Kennzahlen und Belastbarkeit des Business Case.';
  } else if(/vertrags|vertrag|beschaffung|einkauf|angebot|abschluss|paper|freigabe|beauftragung/.test(t)){
    phaseId=4;section='Angebot';hint='KlûÊre hier Vertrags-, Beschaffungs- und Abschlussprozess.';
  } else if(/pilot|start|termin|nûÊchster schritt|nachbereitung|follow-up|verbindlich/.test(t)){
    phaseId=2;section='Nachbereitung';hint='KlûÊre hier den nûÊchsten verbindlichen Schritt und dokumentiere Zusagen.';
  } else if(/discovery|frage|informationen|nachqualifizierung|hubspot|notizen|e-mail|demo|zeigen|bedarf|schmerz/.test(t)){
    phaseId=1;section='Discovery & Demo';hint='KlûÊre hier Bedarf, Discovery-Fragen und Demo-Fokus.';
  } else if(/wettbewerb|mitbewerb|konkurrent|alternative|einwand/.test(t)){
    phaseId=4;section='Angebot';hint='Bearbeite hier Wettbewerbsrisiko, Einwandbehandlung und Abschlussstrategie.';
  } else if(/entscheider|entscheidungsbefugnis|budget|sponsor|champion|fû¥rsprecher|qualifiz/.test(t)){
    phaseId=0;section='Qualifizierung';hint='Prû¥fe hier Qualifizierung, Entscheiderstatus und zentrale Deal-Grundlagen.';
  }

  return {phaseId,section,text:raw,kind:kind||'cockpit',hint,ts:Date.now()};
}
function openCockpitWorkTarget(kind,text){
  if(!state.activeId)return;
  const target=getCockpitWorkTarget(kind,text);
  state.cockpitFocus=target;
  LS.set('ki21_cockpit_focus_'+state.activeId,target);
  renderStation(target.phaseId);
}
function getCockpitFocusForPhase(accId,sitId){
  const focus=state.cockpitFocus||LS.get('ki21_cockpit_focus_'+accId,null);
  if(!focus||focus.phaseId!==sitId)return null;
  // Nach 20 Minuten ausblenden, damit der Arbeitsbereich nicht dauerhaft "markiert" bleibt.
  if(focus.ts&&Date.now()-focus.ts>20*60*1000){
    LS.set('ki21_cockpit_focus_'+accId,null);
    if(state.cockpitFocus===focus)state.cockpitFocus=null;
    return null;
  }
  return focus;
}

function updateHomeHeroHealthVisual(){
  const scoreEl=document.getElementById('home-health-score');
  if(!scoreEl)return;
  const fillEl=document.getElementById('home-health-fill');
  const aid=LS.get('ki21_aid',null);
  const health=aid?getOpportunityHealth(aid):null;

  if(!health){
    scoreEl.textContent='ã';
    if(fillEl){fillEl.style.width='0%';fillEl.style.background='var(--bg3)';}
    return;
  }
  const color=getHealthColor(health.score);
  scoreEl.textContent=String(health.score);
  scoreEl.style.color=color;
  if(fillEl){
    const pct=Math.max(0,Math.min(100,health.score));
    fillEl.style.width=pct+'%';
    fillEl.style.background=color;
  }
}

  const stepEls=[];
  for(let i=0;i<5;i++){
    const stepEl=h('div',{style:{fontSize:'13px',padding:'8px 0',color:'var(--text2)'}},
      'ã° '+phaseNamesShort[i]);
    stepEls.push(stepEl);
    progBox.appendChild(stepEl);

  // Non-invasive: only READ Phase 1 (Qualifizierung) input fields, never write to real phase data
  const phase1Data=LS.get('ki21_st_'+state.activeId+'_0',{fv:{},result:''});
  const dossierResults=[];
  let prevResult='';

  for(let i=0;i<5;i++){

    // Build a synthetic field-value object for this phase, fed only by the chain of previous in-memory results
    let fv={};
    if(i===0){

    } else {
      const textFieldId=sit.felder.find(f=>f.t==='ta'&&!f.readonly);
      const ctxFieldId=sit.felder.find(f=>f.readonly);
      if(ctxFieldId)fv[ctxFieldId.id]=prevResult;
      if(textFieldId)fv[textFieldId.id]=prevResult;
      // For phases with additional fields (e.g. paket/budget in Phase 4/5), leave them empty -
      // the Opportunity-Vorschau prompt rules instruct the model to use BRANCHENHYPOTHESE for missing data.
    }

    const stk='';
    try{
      const prompt=sit.build(fv,cust,mu,kk,stk);
      const result=await callClaude(prompt,null);
      if(result){
        dossierResults.push({title:sit.title,result});
        prevResult=result;
        stepEls[i].textContent='ã '+phaseNamesShort[i];
        stepEls[i].style.color='#2ea043';
      } else {
        dossierResults.push({title:sit.title,result:'(Keine Antwort erhalten)'});

      }
    }catch(e){

      stepEls[i].textContent='ã ÿ¡ '+phaseNamesShort[i]+' (Fehler: '+e.message+')';
      stepEls[i].style.color='#f85149';
    }
  }

  progBox.appendChild(h('div',{style:{fontSize:'14px',fontWeight:'700',color:'#2ea043',marginTop:'16px'}},
    'ã Opportunity-Vorschau erfolgreich erstellt.'));
  // Automatically download as PDF/HTML so the result is never lost
  exportAutopilotPDF(cust,dossierResults);
  progBox.appendChild(h('div',{style:{fontSize:'11px',color:'var(--text2)',marginTop:'6px'}},
    'Þ Vorschau wurde automatisch heruntergeladen.'));

    onclick:()=>showAutopilotDossier(cust,dossierResults)

    1:{f1:'kontext'}

  // strategisches Messaging/Framing, das S-Fragen verfûÊlscht), sondern in einem zweiten,

  if(fromId===0){

    renderStation(toId);

    // Isolierter Kontext: NUR nackte Kundenfakten ã bewusst KEIN buildCtx(), kein kk/stk,
    // kein Ergebnis aus Phase 1, damit kein Messaging/Strategie-Framing einfliesst.
    const forecastAllowed=isForecastValueLeverAllowed(state.activeId);
    const isolatedCtx=`Firma: ${cust.firma||'ã'}
Branche: ${cust.branche||'ã'}
Mitarbeiter: ${cust.ma||'ã'}
Ansprechpartner: ${cust.ap||'ã'}
Umsatz: ${cust.um||'ã'}
Forecast-Fragen zulûÊssig: ${forecastAllowed?'JA ã wenn ein sachlicher Qualifizierungs-/Pipeline-Anker vorhanden ist':'NEIN ã Forecast nicht kû¥nstlich einbauen'}`;

    const spinPrompt=`Du bist ein SPIN-Selling-Experte. Deine einzige Aufgabe: Generiere methodisch korrekte SPIN-Fragen fû¥r das nûÊchste KundengesprûÊch.

STRIKTE METHODENREGEL ã KEINE AUSNAHMEN:
S (SITUATION): Sammle nur Fakten zum Ist-Zustand. Frage nach Prozessen, Systemen, Rollen, Zahlen. NIEMALS nach Meinungen, Zielen, Wû¥nschen oder Strategien.
  ã "Wie lûÊuft heute die Angebotserstellung konkret ab?"
  ã "Welche Systeme nutzt Ihr Auûendienst?"
  ã "Wo sehen Sie die grûÑûten Hebel?" (Meinung, kein Fakt)
  ã "WûÊre Innovation im Vertrieb wichtig?" (Framing, kein Fakt)

P (PROBLEM): Lass den Kunden selbst benennen, was ihn stûÑrt. Frage nach Schwierigkeiten, EngpûÊssen, Frustration.
  ã "Wo verliert Ihr Team am meisten Zeit?"
  ã "Wû¥rde Feature X das lûÑsen?" (LûÑsungsvalidierung, gehûÑrt zu N)

I (IMPLICATION): Mach die Konsequenzen des Problems sichtbar. Kosten, VerzûÑgerungen, Risiken.
  ã "Was passiert, wenn ein Angebot einen Tag zu spûÊt kommt?"
  ã PFLICHT: Stelle mindestens eine EXPLIZITE Nicht-Handeln-Frage mit klarer Formulierung wie "wenn ihr dieses Problem nicht lûÑst" oder "wenn ihr nichts verûÊndert". Nicht nur indirekt "wenn der Zustand bleibt" fragen.

N (NEED-PAYOFF): Lass den Kunden den Nutzen einer LûÑsung beschreiben.
  ã "Was wû¥rde sich ûÊndern, wenn diese Information sofort verfû¥gbar wûÊre?"

KUNDENDATEN (nur diese ã kein weiterer Kontext):
${isolatedCtx}

Generiere jetzt 5ã7 SPIN-Fragen. Jede Frage auf einer Zeile, Format "Buchstabe: Frage".
Mindestens eine I-Frage muss ausdrû¥cklich nach den Folgen des Nicht-Handelns fragen und die WûÑrter "nicht lûÑst" oder "nichts verûÊndert" enthalten.
Forecast-Fragen nur, wenn "Forecast-Fragen zulûÊssig: JA" oben steht. Bei "NEIN" keine Frage zu Forecast, Pipeline-QualitûÊt oder Managemententscheidungen erzwingen.
Nur die Fragen, keine ErklûÊrungen, keine Einleitung.`;

    (async()=>{
      try{
        const spinResult=await callClaude(spinPrompt,null);
        if(spinResult){
          const freshData=LS.get(nextKEY,{fv:{},result:''});
          // Bereinige Output: nur Zeilen mit echtem SPIN-Letter-Pattern
          let cleanLines=spinResult.split('\n')
            .map(l=>l.trim())
            .filter(l=>/^[SPIN]\s*[:\-ã]/i.test(l));
          // v4.149: SPIN muss eine explizite Nicht-Handeln-I-Frage enthalten.
          // Prompt allein reicht nicht zuverlûÊssig; deshalb deterministisch nachschûÊrfen.
          cleanLines=ensureExplicitNonActionImplicationLines(cleanLines, LS.get('ki21_active',''));

      }
    })();

  if(fromId===2&&toId===3){
    nextData.fv['erkenntnisse']='ã° KPIs werden extrahiert...';
    LS.set(nextKEY,nextData);
    renderStation(toId);

    (async()=>{
      const {main:resultMain,details:resultDetails}=splitDetailsFromResult(result);
      const fullSource=resultMain+(resultDetails?'\n'+resultDetails:'');
      const kpiPrompt=`Hier ist ein Besuchsbericht aus einem Kundentermin:\n\n${fullSource}\n\nExtrahiere AUSSCHLIESSLICH die konkreten Zahlen, KPIs und wirtschaftlich relevanten Fakten, die der Kunde genannt hat (z.B. Zeitaufwand, Mitarbeiterzahlen, Kosten, Stû¥ckzahlen, Fehlerquoten, Durchlaufzeiten).\n\nFormat: kurze Stichpunkte, eine Zahl/Aussage pro Zeile. Keine Einleitung, kein Flieûtext. Wenn keine konkreten Zahlen genannt wurden, schreibe: "Keine konkreten KPIs im GesprûÊch genannt ã bitte beim Kunden nachfragen."`;

      try{
        const kpiResult=await callClaude(kpiPrompt,null);
        if(kpiResult){
          const freshData=LS.get(nextKEY,{fv:{},result:''});
          freshData.fv['erkenntnisse']=kpiResult;
          LS.set(nextKEY,freshData);
          renderStation(toId);
        }
      }catch(e){
        const freshData=LS.get(nextKEY,{fv:{},result:''});
        freshData.fv['erkenntnisse']=result;
        LS.set(nextKEY,freshData);
        renderStation(toId);
      }
    })();
    return;
  }

  const map=fieldMap[fromId];
  if(map){
    const {main:transferMain}=splitDetailsFromResult(result);
    nextData.fv[map.f1]=transferMain;
  }

  LS.set(nextKEY,nextData);
  renderStation(toId);
}

  // ãã Ende Lead-qualifizieren Dashboard ãã

  // ãã Bedarfsanalyse & Demo Dashboard (exemplarisch, Phase 2) ãã
  // Gleicher globaler Health-Balken wie û¥berall. Darunter ausschlieûlich eine Auswertung

  // keine neue KI-Logik. Extrahiert nur die ohnehin vom Prompt erzeugten Marker-Zeilen
  // "Þ₤ EINSCHûTZUNG" und "NûCHSTER SCHRITT DIESE WOCHE".
  function extractAfterHeader(text,headerKeyword){
    const lines=(text||'').split('\n');
    for(let i=0;i<lines.length;i++){
      if(lines[i].toUpperCase().includes(headerKeyword)){
        const colonIdx=lines[i].indexOf(':');
        if(colonIdx!==-1&&lines[i].slice(colonIdx+1).trim())return lines[i].slice(colonIdx+1).trim();
        let out=[];
        for(let j=i+1;j<lines.length;j++){

          out.push(lines[j].trim());

        if(out.length)return out.join(' ');

  // ERKENNTNISSE" oder "NûCHSTE SCHRITTE") ã fû¥r Phasen, deren Marker als Bullet-Liste statt
  // als einzeilige "Header: Inhalt"-Zeile formatiert sind.
  function extractFirstBulletAfterHeader(text,headerKeyword){

          let splitIdx=-1;
          for(const kw of keywords){
            splitIdx=lines.findIndex(l=>l.toUpperCase().includes(kw));
            if(splitIdx>=0)break;
          }
          if(splitIdx>=0){

          }
          // Phasenspezifischer Signal-Snapshot: Speichert den Signal-Stand zum Zeitpunkt
          // dieser Phasengenerierung. Der globale Score bleibt global ã aber das Dashboard
          // dieser Phase zeigt genau die Signale, die beim Generieren bekannt waren.
          // Key: ki21_phase_snap_{accId}_{sitId} = {positive, warning, open, ts}
          // Wird beim nûÊchsten Generieren dieser Phase û¥berschrieben.
          if(freshHealth){

          // Isolierter Phasen-Snapshot mit sourcePhase-Tagging (async, Hintergrund)
          savePhaseSnapshot(state.activeId,sitId);

        resultLabel.textContent=getResultLabel(sitId);
        // Phase 5: Auto-extract Besuchsbericht into CRM field
        if(sitId===4){

            const berichtField=document.querySelector('textarea[data-fid="ergebnis"]');
            if(berichtField)berichtField.value=berichtText;
          }
        }

        // For Nutzen-Kosten-Analyse (sitId===3): nur noch Case-Annahmen fû¥r Phase 5 extrahieren (Kurzfassung-Box entfernt, Review Juni 2026)
        if(sitId===3){
          try{
            const caseExtractPrompt=`Extrahiere aus dieser Nutzen-Kosten-Analyse die zentralen Case-Annahmen als reines JSON-Objekt, ohne Markdown-Codeblock, ohne ErklûÊrtext davor oder danach.

Format exakt so:
{"manual_effort_range":"<Bandbreite z.B. '300-600 Stunden/Jahr', oder leer falls nicht vorhanden>","working_value":"<verwendeter Arbeitswert/Mittelwert, z.B. '450 Stunden/Jahr'>","adjustment":"<kurze Begrû¥ndung falls vom Mittelwert abgewichen wurde, sonst 'Mittelwert ohne Anpassung'>","confidence":"<hoch|mittel|niedrig>","monthly_benefit":"<geglûÊtteter Nutzen pro Monat, z.B. '3.200 ã˜/Monat'>","monthly_investment":"<geglûÊttete Investition pro Monat, z.B. '1.389 ã˜/Monat'>","roi_statement":"<1 Satz Nutzen vs Investition>"}

Nur Werte verwenden die im Text unten tatsûÊchlich vorkommen. Wenn ein Feld nicht ermittelbar ist, leeren String verwenden.

Analyse:
`+result;
            const caseJson=await callClaude(caseExtractPrompt,null);
            if(caseJson){
              const cleaned=caseJson.replace(/```json|```/g,'').trim();
              const parsed=JSON.parse(cleaned);
              LS.set('ki21_case_assumptions_'+state.activeId,parsed);
            }
          }catch(e){

        // Populate Weiter-button after fresh generation (was previously only shown on page reload)
        weiterRow.innerHTML='';
        const nextMapAfterGen={};
        if(nextMapAfterGen[sitId]&&!sit.build2){
          const nextIdAfterGen=nextMapAfterGen[sitId].nextId;

function getAccPhaseInfo(accId){
  let furthest=-1;
  for(let i=0;i<5;i++){
    const data=LS.get('ki21_st_'+accId+'_'+i,null);
    if(data&&data.result)furthest=i;
  }
  const health=getOpportunityHealth(accId);
  return {phaseIdx:furthest,health};
}

function showKunde(){
  const m=modal('Kunde wûÊhlen', buildKundeContent(), null);

    const div=h('div',{});

          onclick:()=>{state.activeId=a.id;LS.set('ki21_aid',a.id);m.remove();

              info.health?h('span',{className:'acc-score-chip',style:{color:getHealthColor(info.health.score)}},'Opp '+info.health.score):null
            )

            h('button',{className:'btn',style:{padding:'8px 14px',fontSize:'16px',minWidth:'44px',minHeight:'44px'},onclick:e=>{e.stopPropagation();m.remove();showEditKunde(a);}},'\u270E'),
            h('button',{style:{background:'transparent',border:'none',color:'#484f58',

              onclick:e=>{e.stopPropagation();
                if(confirm('Kunde lûÑschen?')){
                  state.accounts=state.accounts.filter(x=>x.id!==a.id);

      analyzeBtn.textContent='ã° Analysiere...';
      analyzeBtn.disabled=true;
      
      try{
        const prompt=`Du extrahierst Informationen aus einem Text fû¥r ein B2B-Vertriebssystem.

Text:
${ta.value}

WICHTIG: Antworte AUSSCHLIESSLICH mit validem JSON. Kein Markdown. Keine ErklûÊrung. Kein Text davor oder danach. Nur das JSON-Objekt.

{"firma":"","ap":"","branche":"","ma":"","um":"","kontext":"","persoenlich":"","herausforderungen":""}

function renderBranchenwissen(text){
  if(!text)return '';
  const lines=text.split('\n');
  let html='';
  let counter=0;
  let inEntry=false;
  lines.forEach(line=>{
    const t=line.trim();
    if(!t)return;
    // Category headers (ALL CAPS followed by colon, optionally with count in parens)
    if(/^[A-Zûûû\- ]+(\s*\(\d+.*\))?:$/.test(t)){
      if(inEntry)html+='</div>';
      html+=`<div style="margin:14px 0 8px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#ff6b00;border-bottom:1px solid #30363d;padding-bottom:4px;">${t.replace(/:$/,'')}</div>`;
      counter=0;
      inEntry=false;
      return;
    }
    // Field lines like "Pattern: ...", "Kennzahl: ...", "Confidence: ..."
    const fieldMatch=t.match(/^([A-Zûûûa-zûÊûÑû¥]+):\s*(.*)$/);
    if(fieldMatch){
      const field=fieldMatch[1];
      const value=fieldMatch[2];
      if(field==='Pattern'||field==='Kennzahl'||field==='Rolle'||field==='Einwand'||field==='Insight'||field==='Frage'||field==='Titel'||field==='Typ'){
        if(inEntry)html+='</div>';
        counter++;
        html+=`<div style="background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px 10px;margin-bottom:6px;">
          <div style="font-size:11px;font-weight:700;color:#fff;margin-bottom:3px;">${counter}. ${value}</div>`;
        inEntry=true;
      } else if(field==='Confidence'||field==='Status'){
        const badge=value.toLowerCase().includes('hoch')||value.includes('recherchiert')?'ÞÂ':value.toLowerCase().includes('mittel')||value.includes('Erfahrungswissen')?'ÞÀ':'ÞÇ';
        html+=`<div style="font-size:9px;color:#8b949e;margin-top:4px;">${badge} ${value}</div></div>`;
        inEntry=false;
      } else {
        html+=`<div style="font-size:10px;color:#c9d1d9;line-height:1.4;"><span style="color:#8b949e;">${field}:</span> ${value}</div>`;
      }
      return;
    }
    // Fallback: plain line
    html+=`<div style="font-size:10px;color:#c9d1d9;">${t}</div>`;
  });
  if(inEntry)html+='</div>';
  return html;
}

const KI21_VERSION='v4.159';


function runKi21VersionMigration(){
  const applied=LS.get('ki21_applied_code_version','');
  if(applied===KI21_VERSION)return;
  const accs=LS.get('ki21_acc',[]);
  accs.forEach(acc=>{
    if(!acc||!acc.id)return;
    // Neue Code-Versionen dû¥rfen keine alten Health-/Dashboard-Ableitungen weiterverwenden.
    // Phasentexte bleiben erhalten; nur der schnelle Health-Cache wird ungû¥ltig gemacht.
    LS.set('ki21_health_'+acc.id,null);
    LS.set('ki21_health_lastError_'+acc.id,null);
  });
  LS.set('ki21_applied_code_version',KI21_VERSION);
}

function encodeBase64UTF8(text){
  const bytes=new TextEncoder().encode(text);
  let binary='';
  const chunk=8192;
  for(let i=0;i<bytes.length;i+=chunk){
    binary+=String.fromCharCode(...bytes.subarray(i,i+chunk));
  }
  return btoa(binary);
}

function detectVersionFromHtml(html){
  const m=String(html||'').match(/v\d+\.\d+(?:\s*[A-Za-z0-9_-]+)?/);
  return m?m[0]:'unbekannte Version';
}

async function pushToGitHub(sourceText){
  const token=LS.get('ki21_github_token','');
  if(!token){alert('Bitte zuerst GitHub Token in Einstellungen hinterlegen.');return;}

  if(!sourceText||!String(sourceText).trim()){
    throw new Error('Kein App-Code zum VerûÑffentlichen vorhanden. Bitte neue index.html in das Update-Feld einfû¥gen.');
  }
  if(!String(sourceText).includes('<!DOCTYPE html')||!String(sourceText).includes('<script>')){
    throw new Error('Der eingefû¥gte Text sieht nicht wie eine vollstûÊndige index.html aus.');
  }

  const version=detectVersionFromHtml(sourceText);
  const headers={
    'Authorization':'token '+token,
    'Accept':'application/vnd.github.v3+json',
    'Content-Type':'application/json'
  };

  const shaResp=await fetch('https://api.github.com/repos/KI21-Vertrieb/KI21/contents/index.html',{headers});
  if(!shaResp.ok)throw new Error('GitHub Fehler '+shaResp.status);
  const shaData=await shaResp.json();
  const sha=shaData.sha;

  const encoded=encodeBase64UTF8(sourceText);

  const pushResp=await fetch('https://api.github.com/repos/KI21-Vertrieb/KI21/contents/index.html',{
    method:'PUT',
    headers,
    body:JSON.stringify({
      message:'KI21 '+version+' verûÑffentlicht ã '+new Date().toLocaleDateString('de-DE'),
      content:encoded,
      sha:sha
    })
  });
  if(!pushResp.ok){
    let msg='Push Fehler '+pushResp.status;
    try{const err=await pushResp.json(); if(err&&err.message)msg+=': '+err.message;}catch(e){}
    throw new Error(msg);
  }
  LS.set('ki21_last_published_version',version);
  LS.set('ki21_last_published_at',new Date().toLocaleString('de-DE'));
  return version;
}

async function fetchCurrentPublishedHtml(){
  const resp=await fetch('https://ki21-vertrieb.github.io/KI21/index.html?nocache='+Date.now());
  if(!resp.ok)throw new Error('Aktuelle Live-Version konnte nicht gelesen werden ('+resp.status+').');
  return await resp.text();
}

function showExport(){
  const aid=state.activeId;
  const activeCust=(state.accounts.find(a=>a.id===aid)||{}).cust;

  // ãã VOLLSTûNDIGES BACKUP (alle Accounts, alles) ãããããããããããããããããã
  const backupData={accounts:state.accounts,activeId:aid,mu:LS.get('ki21_mu',{}),stationData:{},kontextData:{}};
  state.accounts.forEach(acc=>{
    for(let i=0;i<5;i++){
      const sval=LS.get('ki21_st_'+acc.id+'_'+i,null);
      if(sval)backupData.stationData['ki21_st_'+acc.id+'_'+i]=sval;
    }
    for(let i=0;i<5;i++){
      const kkSlot=LS.get('ki21_kk_'+acc.id+'_'+i,null);
      if(kkSlot)backupData.kontextData['ki21_kk_'+acc.id+'_'+i]=kkSlot;
    }
    const legKk=LS.get('ki21_kk_'+acc.id,null);
    if(legKk)backupData.kontextData['ki21_kk_'+acc.id]=legKk;
    const manual=LS.get('ki21_health_manual_'+acc.id,null);
    if(manual)backupData.kontextData['ki21_health_manual_'+acc.id]=manual;
  });

  // ãã CLEAN OPPORTUNITY EXPORT (aktiver Account, nur Rohdaten) ããããã
  const AI_FIELDS=['result','result2','summary','detail'];
  const cleanExport=aid?{
    version:'opportunity-rohdaten-v1',
    exportedAt:new Date().toISOString(),
    cust:activeCust||{},
    mu:LS.get('ki21_mu',{}),
    inputs:{},
    kk:{},
    manual:{}
  }:null;
  if(cleanExport){
    for(let i=0;i<5;i++){
      const sval=LS.get('ki21_st_'+aid+'_'+i,null);
      if(sval){
        const fvOnly={fv:{}};
        if(sval.fv)Object.keys(sval.fv).forEach(k=>{if(!AI_FIELDS.includes(k))fvOnly.fv[k]=sval.fv[k];});
        if(Object.keys(fvOnly.fv).length)cleanExport.inputs['slot_'+i]=fvOnly;
      }
      const kkSlot=LS.get('ki21_kk_'+aid+'_'+i,null);
      if(kkSlot&&kkSlot.trim())cleanExport.kk['slot_'+i]=kkSlot;
    }
    const manual=LS.get('ki21_health_manual_'+aid,null);
    if(manual)cleanExport.manual=manual;
  }

  const backupTxt=JSON.stringify(backupData);
  const cleanTxt=cleanExport?JSON.stringify(cleanExport,null,2):null;

  const backupBtn=h('button',{className:'btn',style:{width:'100%',marginBottom:'8px'}},
    'Þƒ Gesamtbackup kopieren');
  backupBtn.onclick=()=>{
    universalCopy(backupTxt,()=>{
      backupBtn.textContent='ã Kopiert';
      backupBtn.style.color='#2ea043';
      setTimeout(()=>{backupBtn.textContent='Þƒ Gesamtbackup kopieren';backupBtn.style.color='';},2000);
    });
  };

  const cleanBtn=cleanExport?h('button',{className:'btn-o',style:{width:'100%'}},
    'Þ Opportunity-Rohdaten kopieren'):null;
  if(cleanBtn){
    cleanBtn.onclick=()=>{
      universalCopy(cleanTxt,()=>{
        cleanBtn.textContent='ã Kopiert';
        cleanBtn.style.background='#2ea043';
        setTimeout(()=>{cleanBtn.textContent='Þ Opportunity-Rohdaten kopieren';cleanBtn.style.background='';},2000);
      });
    };
  }

  const content=h('div',{},
    h('div',{style:{background:'#1c2333',border:'1px solid #30363d',borderRadius:'12px',padding:'14px',marginBottom:'14px'}},
      h('div',{style:{fontSize:'11px',fontWeight:'700',color:'#8b949e',letterSpacing:'1px',textTransform:'uppercase',marginBottom:'6px'}},'Gesamtbackup'),
      h('div',{style:{fontSize:'12px',color:'#e6edf3',marginBottom:'10px'}},state.accounts.length+' Opportunit'+(state.accounts.length!==1?'ies':'y')+' ôñ alle Daten inkl. KI-Ergebnisse'),
      backupBtn
    ),
    cleanExport?h('div',{style:{background:'#1c2333',border:'1px solid rgba(255,107,0,.4)',borderRadius:'12px',padding:'14px'}},
      h('div',{style:{fontSize:'11px',fontWeight:'700',color:'#ff6b00',letterSpacing:'1px',textTransform:'uppercase',marginBottom:'6px'}},'Opportunity-Rohdaten'),
      h('div',{style:{fontSize:'12px',color:'#e6edf3',marginBottom:'4px'}},(activeCust&&activeCust.firma)||'Aktuelle Opportunity'),
      h('div',{style:{fontSize:'11px',color:'#8b949e',marginBottom:'10px'}},'Nur Eingaben & ErgûÊnzungen ôñ KI-Ergebnisse werden neu generiert'),
      cleanBtn
    ):h('div',{style:{fontSize:'12px',color:'#8b949e'}},'Bitte zuerst eine Opportunity ûÑffnen.')
  );
  modal('Exportieren',content,null);
}

function showImport(){
  const ta=h('textarea',{placeholder:'Export-Text hier einfû¥gen...',style:{minHeight:'80px'}});
  const info=h('div',{style:{fontSize:'11px',color:'#8b949e',marginBottom:'8px'}});
  ta.addEventListener('input',()=>{
    try{
      const d=JSON.parse(ta.value);
      if(d.version==='opportunity-rohdaten-v1'){
        info.textContent='Þ Opportunity-Rohdaten erkannt ã wird als neue Opportunity angelegt';
        info.style.color='#ff6b00';
      } else {
        info.textContent='Þƒ Gesamtbackup erkannt ã stellt vorhandene Daten wieder her';
        info.style.color='#8b949e';
      }
    }catch(e){info.textContent='';}
  });
  const content=h('div',{},
    h('p',{className:'modal-desc'},'Backup oder Opportunity-Rohdaten einfû¥gen.'),
    info,ta,
    h('div',{className:'modal-row',style:{marginTop:'8px'}},
      h('button',{className:'btn-o',style:{flex:'1'},onclick:()=>{
        try{
          const d=JSON.parse(ta.value);
          if(d.version==='opportunity-rohdaten-v1'){
            // Clean Import: neue Opportunity anlegen
            const newId='acc_'+Date.now();
            const newCust={...d.cust};
            state.accounts=[{id:newId,cust:newCust,ts:Date.now()},...state.accounts].slice(0,10);
            state.activeId=newId;
            LS.set('ki21_acc',state.accounts);
            LS.set('ki21_aid',newId);
            if(d.mu)LS.set('ki21_mu',d.mu);
            if(d.inputs)Object.keys(d.inputs).forEach(k=>{
              const idx=parseInt(k.replace('slot_',''));
              if(!isNaN(idx))LS.set('ki21_st_'+newId+'_'+idx,d.inputs[k]);
            });
            if(d.kk)Object.keys(d.kk).forEach(k=>{
              const idx=parseInt(k.replace('slot_',''));
              if(!isNaN(idx))LS.set('ki21_kk_'+newId+'_'+idx,d.kk[k]);
            });
            if(d.manual)LS.set('ki21_health_manual_'+newId,d.manual);
            m.remove();renderHome();
            alert('Opportunity angelegt: '+(newCust.firma||'Neu')+'\nBitte alle Phasen neu generieren.');
          } else {
            // VollstûÊndiges Backup wiederherstellen
            if(d.accounts){state.accounts=d.accounts;LS.set('ki21_acc',d.accounts);}
            if(d.activeId){state.activeId=d.activeId;LS.set('ki21_aid',d.activeId);}
            if(d.mu)LS.set('ki21_mu',d.mu);
            if(d.stationData)Object.keys(d.stationData).forEach(k=>LS.set(k,d.stationData[k]));
            if(d.kontextData)Object.keys(d.kontextData).forEach(k=>LS.set(k,d.kontextData[k]));
            m.remove();renderHome();
          }
        }catch(e){alert('Ungû¥ltiger Text.');}
      }},'Importieren'),
      h('button',{className:'btn',onclick:()=>m.remove()},'Abbrechen')
    )
  );
  const m=modal('Importieren',content,null);
}
