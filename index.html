Ausgangssituation
Die Vertriebsorganisation arbeitet mit Salesforce, Excel, Power BI und zusätzlichen manuellen Deal-Reviews.
Opportunity-Informationen sind zwar im CRM vorhanden, werden jedoch nicht einheitlich bewertet. Insbesondere bei der Qualifizierung, der Stakeholder-Einschätzung, dem wirtschaftlichen Nutzen und der Forecast-Bewertung bestehen deutliche Unterschiede zwischen den Vertriebsmitarbeitern.
Die Vertriebsleitung und Sales Operations führen deshalb zusätzliche Reviews, Forecast-Korrekturen und Datenaufbereitungen durch.

Schmerz und Aufwand
Der zusätzliche Aufwand beträgt nach interner Auswertung rund 110 Stunden pro Monat:
- 55 Stunden für zusätzliche Deal-Reviews
- 35 Stunden für Forecast-Korrekturen
- 20 Stunden für Datenaufbereitung und Abstimmung
Im vergangenen Jahr wurden 27 Opportunities verloren oder deutlich verschoben.
Bei etwa 4 bis 6 dieser Opportunities hätten Risiken möglicherweise früher erkannt werden können. Es ist jedoch nicht bestätigt, dass diese Opportunities dadurch gewonnen oder Verluste sicher vermieden worden wären.

Stakeholder
Thomas Reuter
Funktion: Vertriebsleiter
Rolle: fachlicher Sponsor
Haltung: unterstützt den Pilot grundsätzlich
Einfluss: hoch im Vertrieb

Dr. Miriam Albrecht
Funktion: Geschäftsführerin Finanzen & Operations
Rolle: wirtschaftliche Entscheiderin
Haltung: noch nicht ausreichend bekannt
Status: noch nicht aktiv eingebunden
Einfluss: sehr hoch
Entscheidungsbefugnis: Investitionsfreigabe innerhalb des Budgetrahmens
Offener Punkt: Sie kennt die Analyse über 110 Stunden monatlichen Zusatzaufwand noch nicht.

Jana Wolf
Funktion: Sales Operations
Rolle: technische und operative Prüferin
Haltung: grundsätzlich offen, aber kritisch hinsichtlich Datenqualität, Aufwand und Integration
Interesse: weniger manuelle Datenaufbereitung, klare Prozesse, nachvollziehbare Bewertungen
Einfluss: mittel bis hoch
Entscheidungsbefugnis: keine wirtschaftliche Freigabe, aber relevanter Einfluss auf die operative Bewertung

Qualifizierungsstand
Bestätigt sind:
- uneinheitliche Opportunity-Qualifizierung
- zusätzlicher Aufwand für Deal-Reviews
- hoher Aufwand für Forecast-Korrekturen
- wiederkehrende Datenaufbereitung
- verlorene oder verschobene Opportunities
- Interesse der Vertriebsleitung an einem Pilot
Noch offen sind:
- persönliche Bestätigung des wirtschaftlichen Schmerzes durch Dr. Miriam Albrecht
- verbindliche Erfolgskriterien
- eindeutiger Entscheidungsprozess
- konkreter Zeitplan
- finale Investitionsfreigabe
- wirtschaftliche Wirkung des Piloten
- konkreter Angebotspreis

Budget und Entscheidung
Ein Budgetrahmen von bis zu 50.000 € ist grundsätzlich vorhanden.
Eine konkrete Investitionsfreigabe liegt noch nicht vor.
Die Freigabe muss durch Dr. Miriam Albrecht erfolgen.
Erfolgskriterien wurden intern diskutiert, aber noch nicht gemeinsam mit der wirtschaftlichen Entscheiderin bestätigt.
Der Entscheidungsprozess ist noch nicht vollständig geklärt.

Pilot
Geplant ist ein begrenzter Pilot mit:
- 8 Nutzern
- echten Enterprise-Opportunities
- Beteiligung von Vertrieb, Sales Operations und gegebenenfalls Presales
- Messung der Wirkung während des Piloten
Mögliche Pilotziele:
- Risiken früher erkennen
- Opportunity-Qualifizierung vereinheitlichen
- Forecast-Abweichungen früher sichtbar machen
- manuelle Deal-Reviews reduzieren
- Entscheidungsreife transparenter darstellen
- nächste Kundenschritte besser priorisieren
Noch nicht verbindlich festgelegt sind:
- konkrete Erfolgskriterien
- Messmethode
- Starttermin
- Laufzeit
- konkreter Angebotspreis
- Beteiligung der wirtschaftlichen Entscheiderin
- Entscheidungstermin nach dem Pilot

Mögliche Einwände
- Der Business Case ist noch nicht ausreichend belastbar.
- Es ist nicht bestätigt, dass bessere Qualifizierung verlorene Deals verhindert.
- Der zusätzliche Pflegeaufwand für Vertrieb und Sales Operations könnte zu hoch sein.
- KI21 könnte als weiteres System neben CRM, Excel und Power BI wahrgenommen werden.

Zentrale Deal-Risiken
- Sponsor und wirtschaftliche Entscheiderin sind nicht ausreichend verbunden.
- Erfolgskriterien sind nicht gemeinsam bestätigt.
- Budgetrahmen ist vorhanden, aber keine Freigabe.
- Die Wirkungsannahme ist plausibel, aber noch nicht gemessen.
- Ein verbindlicher Entscheidungs- und Pilotzeitplan fehlt.`;

 try{const p=JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');if(p&&Array.isArray(p.opportunities)&&p.opportunities.length){p.opportunities=p.opportunities.map(normalizeState);p.version=VERSION;if(!p.opportunities.some(x=>x.id===p.activeId))p.activeId=p.opportunities[0].id;return p}}catch(e){}

}

function normalizeMoney(v){if(!v)return 0;const raw=String(v).replace(/\s/g,'').replace(/€/g,'').replace(/EUR/ig,'');if(/mio/i.test(raw)){const n=parseFloat(raw.replace(/[^0-9,]/g,'').replace(',','.'));return Math.round((n||0)*1000000)}const cleaned=raw.replace(/\.(?=\d{3}(\D|$))/g,'').replace(',','.').replace(/[^0-9.]/g,'');return Math.round(parseFloat(cleaned)||0)}

function parseImport(raw){
 const lines=raw.replace(/\r/g,'').split('\n').map(x=>x.trim());

function businessCaseModel(){const monthly=state.metrics.hours,annual=monthly*12;const price=normalizeMoney(state.offer.price||state.metrics.price||'');const timeValue=normalizeMoney(state.offer.timeValue||state.metrics.timeValue||'');const period=Math.max(0,Number(String(state.offer.periodMonths||state.metrics.periodMonths||'').replace(',','.'))||0);if(!annual)return{ready:false,text:'Kein belastbarer Ausgangsaufwand erkannt.'};const missing=[];if(!price)missing.push('Pilotpreis');if(!timeValue)missing.push('interner Zeitwert');if(!period)missing.push('Betrachtungszeitraum');if(missing.length)return{ready:false,text:`Formel vorbereitet: Mindest-Wirkungsquote = Pilotpreis ÷ (relevante Stunden im Betrachtungszeitraum × interner Zeitwert). Für die Berechnung fehlen ${missing.join(', ').replace(/, ([^,]*)$/, ' und $1')}.`};const relevantHours=monthly*period;const relevantCost=relevantHours*timeValue;const minRate=relevantCost?price/relevantCost:0;const saveHours=timeValue?price/timeValue:0;const breakEvenMonths=monthly&&timeValue?price/(monthly*timeValue):0;return{ready:true,price,timeValue,period,relevantHours,relevantCost,minRate,saveHours,breakEvenMonths,text:`Bei ${price.toLocaleString('de-DE')} € Pilotpreis, ${timeValue.toLocaleString('de-DE')} € internem Stundenwert und ${period.toLocaleString('de-DE')} Monaten Betrachtungszeitraum umfasst die Basis ${relevantHours.toLocaleString('de-DE')} Stunden. Der Break-even erfordert ${saveHours.toLocaleString('de-DE',{maximumFractionDigits:0})} eingesparte Stunden bzw. ${(minRate*100).toLocaleString('de-DE',{maximumFractionDigits:1})} % Wirkung im Betrachtungszeitraum. Bei vollständiger Vermeidung des heutigen Aufwands wäre der Break-even nach ${breakEvenMonths.toLocaleString('de-DE',{maximumFractionDigits:1})} Monaten erreicht.`}}
function decisionBrief(){const b=buyer(),sp=sponsor(),bn=b?b.name:'der wirtschaftliche Entscheider',h=state.metrics.hours,annual=h*12,budget=state.metrics.budget,price=state.metrics.price,sc=scores(),bc=businessCaseModel(),lost=state.metrics.lost,damage=state.damageSignals||[],obs=state.objections||[];const involved=b&&!state.flags.economicBuyerOpen;const signalCount=damage.length;const signalLabel=signalCount===1?'1 konkretes Wirkungs- und Risikosignal ist dokumentiert.':`${signalCount} konkrete Wirkungs- und Risikosignale sind dokumentiert.`;const fifth=state.pilotUsers?`Der Pilot ist mit ${state.pilotUsers} Nutzern skizziert; Messlogik und finale Freigabe bleiben offen.`:'Pilotumfang, Messlogik und finale Freigabe sind noch offen.';let assessment,decision,bottleneck,business1,next2;
if(h){assessment=bc.ready&&bc.minRate>.3?`Der wirtschaftliche Schmerz ist belegt und der Preis bekannt. Reine Zeitersparnis trägt den Business Case jedoch noch nicht: Die erforderliche Wirkung von ${(bc.minRate*100).toLocaleString('de-DE',{maximumFractionDigits:1})} % liegt über der derzeit erwarteten Verbesserung. Die Freigabe hängt deshalb daran, ob ${bn} zusätzlich einen messbaren Ergebnisnutzen akzeptiert.`:`Der operative Schmerz ist belegt; die wirtschaftliche Wirkung und die notwendige Wirkungsquote sind jedoch noch nicht vollständig bestätigt. Der Deal kann erst vorankommen, wenn ${bn} den Entscheidungsmaßstab und die Freigabebedingungen bestätigt.`;decision=`Bestätigt ${bn} die Investition als wirtschaftlich tragfähig – und welche Mindestwirkung muss dafür nachgewiesen werden?`;bottleneck=`${involved?`${bn} ist eingebunden, hat die Investition aber noch nicht freigegeben.`:`${bn} ist noch nicht ausreichend in die wirtschaftliche Bewertung eingebunden.`} ${bc.ready&&bc.minRate>.3?'Die reine Zeitersparnis reicht voraussichtlich nicht aus; die zusätzliche Ergebniswirkung ist noch nicht belastbar quantifiziert.':'Problem, Wirkung und Entscheidungsmaßstab sind noch nicht gemeinsam bestätigt.'}`;business1=`Der belastbare Ausgangswert beträgt ${annual.toLocaleString('de-DE')} Stunden Zusatzaufwand pro Jahr${state.metrics.annualCost?` beziehungsweise ${state.metrics.annualCost.toLocaleString('de-DE')} €`:''}.`;next2='Zeitersparnis und Ergebniswirkung getrennt bewerten, Mindestwirkung und Messmethode vereinbaren.'}
else{assessment=`Die strategische Relevanz ist überzeugend, aber der Business Case ist noch qualitativ. ${bn} ist ${involved?'bereits eingebunden':'noch nicht persönlich eingebunden'}; für die Investitionsentscheidung fehlen belastbare Wirkungsketten zu Einarbeitung, Eskalationen, Personalbedarf und Kundenbindung.`;decision=`Welche zwei wirtschaftlichen Nutzenhebel rechtfertigen die Investition – und welche Ausgangswerte muss ${bn} dafür bestätigen?`;bottleneck=`Nicht der Produktfit, sondern der fehlende wirtschaftliche Nachweis ist der Engpass. Die bestehende Kundenbeziehung und die strategische Bedeutung ersetzen weder CFO-Einbindung noch quantifizierte Entscheidungskriterien.`;business1='Ein belastbarer Ausgangsaufwand ist noch nicht quantifiziert. Der Wert muss aus mehreren getrennten Wirkungsketten aufgebaut werden: schnellere Einarbeitung, vermiedener Personalaufbau, geringere Eskalationskosten und höhere Kundenbindung.';next2='Die wichtigsten I-Fragen zu Einarbeitung, Power-User-Aufwand, Eskalationen, Personalbedarf und Kundenbindung beantworten und zwei priorisierte Nutzenmodelle aufbauen.'}

return`KI21 SALES DECISION BRIEF

NÄCHSTER SCHRITT

function fullReport(){const b=buyer(),sc=scores();let r=`KI21 VOLLSTÄNDIGER QUALITÄTS- UND ENTSCHEIDUNGSBERICHT\nVersion: ${VERSION}\nErstellt: ${new Date().toLocaleString('de-DE')}\nOpportunity: ${state.company} · ${state.opportunity}\n\n=== SALES DECISION BRIEF ===\n\n${decisionBrief()}\n\n=== ERKANNTE STAKEHOLDER ===\n`;
 r+=state.stakeholders.length?state.stakeholders.map(x=>`• ${x.name} | ${x.function||'—'} | ${x.role||'—'} | ${x.status||x.attitude||'—'}`).join('\n'):'• — keine Angaben —';
 r+='\n\n=== STRUKTURIERTE IMPORTAUSSAGEN ===\n'+state.evidence.map(x=>`• ${x.type.toUpperCase()} | ${x.category} | ${x.text}`).join('\n');

• Score-Bremsen: ${[state.flags.successOpen?'Erfolgskriterien und Messlogik offen':'',state.flags.approvalOpen?'Investitionsfreigabe offen':'',state.flags.economicBuyerOpen?'wirtschaftlicher Entscheider noch nicht aktiv eingebunden':'',state.flags.priceOpen?'Preis offen':''].filter(Boolean).join(', ')||'keine wesentliche Bremse erkannt'}
• Forecast-Abschlag: ${[state.flags.approvalOpen?'offene Investitionsfreigabe':'',state.flags.economicBuyerOpen?'fehlende aktive wirtschaftliche Einbindung':''].filter(Boolean).join(' und ')||'kein zusätzlicher Abschlag'}`;
 return r}

function renderOffer(){return`<div class="card violet"><div class="kicker">Angebotsparameter</div><div class="field"><label>Pilotpreis</label><input id="offerPrice" value="${esc(state.offer.price||'')}" placeholder="z. B. 35.000 €"></div><div class="field"><label>Interner Stundenwert</label><input id="offerTimeValue" value="${esc(state.offer.timeValue||'')}" placeholder="z. B. 85 €"></div><div class="field"><label>Pilotumfang</label><input id="offerScope" value="${esc(state.offer.scope||'')}" placeholder="z. B. 8 Nutzer, 10 Enterprise-Deals"></div><div class="field"><label>Laufzeit</label><input id="offerDuration" value="${esc(state.offer.duration||'')}" placeholder="z. B. 10 Wochen"></div><div class="field"><label>Betrachtungszeitraum für Business Case (Monate)</label><input id="offerPeriodMonths" inputmode="decimal" value="${esc(state.offer.periodMonths||'')}" placeholder="z. B. 6"></div><div class="field"><label>Erfolgskriterien</label><input id="offerCriteria" value="${esc(state.offer.criteria||'')}" placeholder="z. B. 25 % weniger Review-Aufwand"></div><button class="btn primary" data-action="save-offer">Angebotsparameter speichern</button></div>`}
function bindView(){document.querySelectorAll('[data-action="toggle-area"]').forEach(b=>b.addEventListener('click',()=>{const n=b.dataset.area;state.openAreas=state.openAreas.includes(n)?state.openAreas.filter(x=>x!==n):[...state.openAreas,n];saveState();const card=b.closest('.process-card');card.classList.toggle('open')}));document.querySelectorAll('[data-input-tab]').forEach(b=>b.addEventListener('click',()=>{state.inputTab=b.dataset.inputTab;saveState();render()}));document.querySelectorAll('[data-preview-index]').forEach(c=>c.addEventListener('change',()=>{state.importPreview[Number(c.dataset.previewIndex)].selected=c.checked;saveState()}));document.querySelectorAll('[data-action]').forEach(b=>{if(b.dataset.action==='toggle-area')return;b.addEventListener('click',()=>handleAction(b.dataset.action,b))})}
function handleAction(action,el){if(action==='scan-import'){const raw=document.getElementById('crmText').value;const p=parseImport(raw);state.rawImport=raw;state.importPreview=p.evidence.map(x=>({...x,selected:true}));state._pendingParsed=p;saveState();render();toast(`${p.evidence.length} Aussagen und ${p.stakeholders.length} Stakeholder erkannt`)}else if(action==='reset-sample'){state.rawImport=DEFAULT_IMPORT;state.importPreview=[];saveState();render()}else if(action==='select-all'||action==='select-none'){const val=action==='select-all';state.importPreview.forEach(x=>x.selected=val);saveState();render()}else if(action==='apply-import'){const p=parseImport(state.rawImport);const selected=state.importPreview.filter(x=>x.selected);if(state.company&&p.company&&((p.company!==state.company)||(p.opportunity&&p.opportunity!==state.opportunity))){const fresh=emptyState(false);fresh.rawImport=state.rawImport;portfolio.opportunities.push(fresh);portfolio.activeId=fresh.id;state=fresh}applyParsed(state,p);state.evidence=selected;state.importPreview=selected.map(x=>({...x}));saveState();render();toast('Import als eigene Opportunity übernommen')}else if(action==='save-answers'){const kind=el.dataset.kind;document.querySelectorAll(`[data-answer-kind="${kind}"]`).forEach(t=>state.answers[kind][Number(t.dataset.answerIndex)]=t.value.trim());saveState();render();toast('Antworten gespeichert und ausgewertet')}else if(action==='save-addition'){const t=document.getElementById('additionText').value.trim();if(!t)return toast('Bitte Ergänzung eingeben');state.additions.push({text:t,at:new Date().toISOString()});const p=parseImport(state.rawImport+'\n\nErgänzung\n'+state.additions.map(x=>x.text).join('\n'));state.metrics=p.metrics;state.flags=p.flags;if(p.stakeholders.length)state.stakeholders=p.stakeholders;saveState();render();toast('Ergänzung übernommen und Deal aktualisiert')}else if(action==='save-offer'){state.offer={price:document.getElementById('offerPrice').value.trim(),timeValue:document.getElementById('offerTimeValue').value.trim(),scope:document.getElementById('offerScope').value.trim(),duration:document.getElementById('offerDuration').value.trim(),periodMonths:document.getElementById('offerPeriodMonths').value.trim(),criteria:document.getElementById('offerCriteria').value.trim()};if(state.offer.price)state.flags.priceOpen=false;if(state.offer.criteria)state.flags.successOpen=false;saveState();render();toast('Angebotsparameter gespeichert')}else if(action==='report'){showReport()}}
async function copyTextReliable(text){
 try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(text);return true}}catch(e){}
 try{const ta=document.createElement('textarea');ta.value=text;ta.setAttribute('readonly','');ta.style.cssText='position:fixed;left:-9999px;top:0;opacity:0';document.body.appendChild(ta);ta.focus();ta.select();ta.setSelectionRange(0,ta.value.length);const ok=document.execCommand('copy');ta.remove();return ok}catch(e){return false}
}
function showReport(){
 let reportText='';
 try{reportText=fullReport()}catch(err){
  console.error('KI21 report generation failed',err);
  reportText=`KI21 TESTBERICHT KONNTE NICHT VOLLSTÄNDIG ERZEUGT WERDEN\n\nFehler: ${err&&err.message?err.message:String(err)}\n\nOpportunity: ${state?.company||''} · ${state?.opportunity||''}`;
 }
 const existing=document.getElementById('ki21ReportOverlay');if(existing)existing.remove();
 const overlay=document.createElement('div');overlay.id='ki21ReportOverlay';overlay.style.cssText='position:fixed;inset:0;z-index:1000;background:rgba(4,7,11,.94);display:flex;align-items:flex-end;justify-content:center;touch-action:manipulation';
 overlay.innerHTML=`<div style="width:100%;max-width:720px;max-height:94vh;overflow:auto;-webkit-overflow-scrolling:touch;background:#111722;border:1px solid var(--line);border-bottom:0;border-radius:22px 22px 0 0;padding:16px 14px max(28px,env(safe-area-inset-bottom))"><div class="headline">Vollständiger Qualitätsbericht</div><div class="body muted" style="margin:5px 0 12px">Enthält State, Stakeholder, Importaussagen, Eingaben und alle sieben Bereichsanalysen.</div><div class="actions" style="margin:0 0 12px"><button class="btn primary" id="copyFullReport">Vollständigen Bericht kopieren</button><button class="btn secondary" id="closeReportTop">Schließen</button></div><div class="report">${esc(reportText)}</div><div class="actions"><button class="btn secondary" id="copyFullReportBottom">Bericht kopieren</button><button class="btn primary" id="closeReport">Schließen</button></div></div>`;
 document.body.appendChild(overlay);
 const doCopy=async(btn)=>{const original=btn.textContent;btn.disabled=true;const ok=await copyTextReliable(reportText);btn.textContent=ok?'✓ Bericht kopiert':'Kopieren fehlgeschlagen';if(ok)toast('Vollständiger Testbericht kopiert');setTimeout(()=>{btn.disabled=false;btn.textContent=original},1800)};
 overlay.querySelector('#copyFullReport')?.addEventListener('click',e=>doCopy(e.currentTarget));
 overlay.querySelector('#copyFullReportBottom')?.addEventListener('click',e=>doCopy(e.currentTarget));
 const close=()=>overlay.remove();overlay.querySelector('#closeReport')?.addEventListener('click',close);overlay.querySelector('#closeReportTop')?.addEventListener('click',close);overlay.addEventListener('click',e=>{if(e.target===overlay)close()});
}
window.__ki21OpenReport=function(ev){if(ev){ev.preventDefault();ev.stopPropagation()}showReport()};
document.addEventListener('click',function(ev){const target=ev.target.closest&&ev.target.closest('[data-action="report"]');if(!target)return;ev.preventDefault();ev.stopPropagation();showReport()},true);
function showOpportunityManager(){const overlay=document.createElement('div');overlay.style.cssText='position:fixed;inset:0;z-index:150;background:rgba(4,7,11,.9);display:flex;align-items:flex-end;justify-content:center';const rows=portfolio.opportunities.slice().sort((a,b)=>String(b.updatedAt).localeCompare(String(a.updatedAt))).map(o=>`<div style="border:1px solid ${o.id===state.id?'rgba(255,122,26,.65)':'var(--line)'};border-radius:14px;padding:12px;margin-bottom:8px;background:#0d131d"><button data-switch-id="${esc(o.id)}" style="width:100%;border:0;background:transparent;color:var(--text);text-align:left;padding:0;cursor:pointer"><div style="font-size:14px;font-weight:900">${esc(o.company||'Neue Opportunity')}</div><div style="font-size:11px;color:var(--muted);margin-top:4px">${esc(o.opportunity||'CRM-Import noch nicht durchgeführt')}</div><div style="font-size:9px;color:var(--muted);margin-top:5px">${o.id===state.id?'Aktuell geöffnet · ':''}${esc(o.phase||'Ohne Phase')}</div></button><div class="actions" style="margin-top:8px"><button class="btn secondary" data-switch-id="${esc(o.id)}">Öffnen</button><button class="btn danger" data-delete-id="${esc(o.id)}">Löschen</button></div></div>`).join('');overlay.innerHTML=`<div style="width:100%;max-width:720px;max-height:88vh;overflow:auto;background:#111722;border:1px solid var(--line);border-bottom:0;border-radius:22px 22px 0 0;padding:16px 14px max(28px,env(safe-area-inset-bottom))"><div class="headline">Kunden & Opportunities</div><div class="body muted" style="margin:5px 0 12px">Kunden auswählen, wechseln, neu anlegen oder löschen.</div><div class="actions" style="margin:0 0 14px"><button class="btn primary" id="newOpportunity">Neue Opportunity</button><button class="btn secondary" id="closeOpportunityManager">Schließen</button></div>${rows}</div>`;document.body.appendChild(overlay);overlay.querySelector('#newOpportunity').addEventListener('click',()=>{overlay.remove();createOpportunity()});overlay.querySelector('#closeOpportunityManager').addEventListener('click',()=>overlay.remove());overlay.querySelectorAll('[data-switch-id]').forEach(b=>b.addEventListener('click',()=>{const id=b.dataset.switchId;overlay.remove();switchOpportunity(id)}));overlay.querySelectorAll('[data-delete-id]').forEach(b=>b.addEventListener('click',()=>{const id=b.dataset.deleteId;const o=portfolio.opportunities.find(x=>x.id===id);if(confirm(`„${o?.company||'Opportunity'}“ wirklich löschen?`)){deleteOpportunity(id);overlay.remove();showOpportunityManager()}}));overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove()})}

function syncVersionLabels(){
  const hv=document.getElementById('headerVersion');
  if(hv) hv.textContent=HEADER_VERSION;
  document.title=VERSION;
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),1800)}
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{state.activeTab=b.dataset.tab;saveState();render()}));
document.getElementById('oppName').addEventListener('click',showOpportunityManager);
render();
</script>
</body>
