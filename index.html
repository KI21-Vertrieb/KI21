<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="dark">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KI21</title>
<!-- v4.260 Cockpit Core Only: vier zentrale Cockpit-Kacheln, ohne redundante Analyse- und Best-Step-Boxen. -->
<!-- v4.262 Executive Briefing: vier Kernkacheln mit verdichteten Aussagen und aktiven nächsten Schritten. -->
<!-- v4.233 UI Cleanup Candidate: basiert auf v4.232; nur UI-Aufräumen Score-Hebel und redundante Unter-Navigation. -->
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;
  --border:#30363d;--text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --fs-input:12px;
}
body.light{
  --bg:#f6f8fa;--bg2:#ffffff;--bg3:#f0f2f5;
  --border:#d0d7de;--text:#1f2328;--text2:#656d76;--text3:#9198a1;
}
html,body{background:var(--bg);color:var(--text);min-height:100vh;font-family:'DM Sans',sans-serif;}
#app{min-height:100vh;background:var(--bg);}
.nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 14px;height:44px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-brand{font-size:16px;font-weight:800;color:var(--text);cursor:pointer;border:none;background:transparent;font-family:'DM Sans',sans-serif;}
.nav-right{display:flex;gap:5px;align-items:center;}
.subnav{background:var(--bg);border-bottom:1px solid var(--border);padding:6px 14px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;}
.subnav-badge{background:rgba(255,107,0,.15);color:#ff6b00;border-radius:50%;
  width:18px;height:18px;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;flex-shrink:0;}
.subnav-text{font-size:11px;color:var(--text2);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.settings-group-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--text3);margin-bottom:2px;}
.phase-badge{font-size:9px;font-weight:700;border-radius:4px;padding:2px 6px;white-space:nowrap;flex-shrink:0;cursor:pointer;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
.phase-badge-done{background:rgba(46,160,67,.15);color:#2ea043;}
.phase-badge-progress{background:rgba(255,107,0,.15);color:#ff6b00;}
.phase-badge-empty{background:rgba(139,148,158,.1);color:var(--text3);}
.btn{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:5px;
  padding:4px 8px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-o{background:#ff6b00;border:none;color:#fff;border-radius:8px;padding:7px 12px;
  font-size:10.5px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;}
.btn-o:disabled{background:#484f58;cursor:not-allowed;}
.cust-btn{background:rgba(255,107,0,.12);border:1px solid rgba(255,107,0,.3);border-radius:5px;
  padding:3px 8px;cursor:pointer;}
.cust-label{font-size:8px;color:#8b949e;text-transform:uppercase;letter-spacing:1px;line-height:1.3;}
.cust-val{font-size:11px;font-weight:700;color:#ff6b00;line-height:1.3;max-width:180px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.wrap{padding:12px 14px;max-width:500px;margin:0 auto;}
.hero{display:flex;align-items:baseline;flex-wrap:wrap;gap:6px;margin:10px 0 16px;}
.hero-a{font-weight:800;font-size:20px;color:var(--text);}
.hero-b{font-family:'DM Serif Display',serif;font-size:20px;color:#ff6b00;}
.sit-row{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;padding:11px 12px;margin-bottom:5px;cursor:pointer;transition:border-color .15s;}
.sit-row:hover{border-color:#ff6b00;}
.sit-icon{font-size:20px;width:28px;text-align:center;flex-shrink:0;}
.sit-phase{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:1px;}
.sit-title{font-size:13px;font-weight:700;color:var(--text);}
.sit-arrow{color:var(--text3);font-size:16px;}
.tagline{margin-top:14px;text-align:center;font-size:11px;color:var(--text3);}

/* Home Premium Redesign (v4.76) — pixelnahe Umsetzung der neuen Designreferenz, NUR Hero-Card.
   Reine Darstellung: Werte aus bereits existierenden Funktionen/Daten
   (getOpportunityHealth, cust.branche/ma/um/ap, getPhaseStatus). Keine neue Business-Logik.
   Platzhalter ("–") für Felder ohne Datenmodell-Entsprechung (Erwarteter Abschluss, Potenzial, Verantwortlich). */
.home-greeting{font-size:12.5px;font-weight:600;color:var(--text2);margin:8px 0 8px;}
.home-hero{background:var(--bg2);border:1px solid var(--border);border-radius:13px;
  padding:11px;margin-bottom:10px;}
.home-hero-body{display:flex;flex-direction:column;gap:8px;}
.home-hero-colL{min-width:0;}
.home-hero-colR{min-width:0;display:flex;flex-direction:column;align-items:stretch;}
.home-hero-label{font-size:8.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  color:var(--text3);margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.home-info-dot{color:var(--text3);font-size:9px;cursor:default;}
.home-hero-id{display:flex;align-items:flex-start;gap:8px;cursor:pointer;}
.home-hero-icon{width:30px;height:30px;border-radius:7px;background:var(--bg3);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;}
.home-hero-firma{font-size:15px;font-weight:800;color:var(--text);overflow-wrap:break-word;word-break:break-word;letter-spacing:-.2px;}
.home-hero-firma.placeholder{color:var(--text2);font-weight:600;font-size:12px;}
.home-hero-meta{font-size:9.5px;color:var(--text2);margin-top:2px;line-height:1.45;}
.home-hero-tag{display:inline-block;margin-top:4px;font-size:8px;font-weight:700;
  background:rgba(255,107,0,.14);color:#ff6b00;border-radius:5px;padding:2px 6px;}
.home-fact-list{margin-top:7px;border-top:1px solid var(--border);padding-top:6px;}
.home-fact-row{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:2.5px 0;font-size:9.5px;}
.home-fact-label{display:flex;align-items:center;gap:6px;color:var(--text2);}
.home-fact-icon{font-size:9.5px;width:12px;text-align:center;flex-shrink:0;opacity:.8;}
.home-fact-val{color:var(--text);font-weight:700;}
.home-health-bar-wrap{width:100%;}
.home-health-bar-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:5px;}
.home-health-score{font-size:15px;font-weight:800;line-height:1;color:var(--text);}
.home-health-score-unit{font-size:9px;font-weight:700;color:var(--text2);margin-left:2px;}
.home-health-track{width:100%;height:6px;border-radius:4px;background:var(--bg3);overflow:hidden;}
.home-health-fill{height:100%;border-radius:4px;}
.home-health-label{font-size:10px;font-weight:800;margin-top:5px;}
.home-health-sub{font-size:8.5px;color:var(--text2);margin-top:1px;}
.home-next-step{border-top:1px solid var(--border);margin-top:8px;padding-top:8px;}
.home-next-step-top{display:flex;align-items:flex-start;gap:8px;}
.home-next-icon{width:24px;height:24px;border-radius:50%;background:rgba(255,107,0,.12);
  display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.home-next-eyebrow{font-size:8.5px;color:var(--text3);}
.home-next-title2{font-size:11.5px;font-weight:800;color:var(--text);margin-top:1px;}
.home-next-desc2{font-size:9px;color:var(--text2);margin-top:2px;line-height:1.3;}
.home-next-cta-col{display:flex;flex-direction:column;align-items:stretch;gap:4px;
  margin-top:8px;}
.home-next-cta-btn{background:#ff6b00;border:none;color:#fff;border-radius:7px;padding:6px 12px;
  font-size:10.5px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;width:100%;}
.home-next-cta-btn:hover{background:#e25f00;}
.home-next-link{background:none;border:none;color:#ff6b00;font-size:9.5px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center;width:100%;}
/* Ab ~480px (Tablet/Desktop-Breite, wie in der Designreferenz): CTA-Spalte rückt neben den
   Text statt darunter. Unter dieser Breite (reales iPhone) bleibt es gestapelt, da dort für
   3 Spalten nebeneinander nicht genug Platz ist (siehe vorheriger Umbruch-Bug). */
@media (min-width:480px){
  .home-next-step{display:flex;align-items:flex-start;gap:16px;}
  .home-next-step-top{flex:1;min-width:0;}
  .home-next-cta-col{flex-shrink:0;margin-top:0;min-width:150px;}
}

.home-section-label{font-size:8.5px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;
  color:var(--text3);margin:2px 0 6px;}
/* Cockpit Hauptscreen (v4.121) */
.cockpit-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 8px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;}
.cockpit-header-left{display:flex;flex-direction:column;min-width:0;flex:1;}
.cockpit-brand{font-size:11px;font-weight:800;color:var(--text3);letter-spacing:.5px;margin-bottom:1px;}
.cockpit-brand span{color:#ff6b00;}
.cockpit-opp-name{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px;}
.cockpit-opp-placeholder{font-size:14px;color:var(--text3);font-weight:400;}
.cockpit-header-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.cockpit-score-badge{font-size:12px;font-weight:800;padding:4px 10px;border-radius:20px;border:1.5px solid;cursor:pointer;white-space:nowrap;}
.cockpit-next-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.cockpit-next-eyebrow{font-size:9.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.cockpit-next-text{font-size:13px;font-weight:600;color:var(--text);line-height:1.5;margin-bottom:14px;}
.cockpit-next-placeholder{font-size:13px;color:var(--text3);font-style:italic;margin-bottom:14px;}
.cockpit-btn-row{display:flex;gap:8px;}
.cockpit-btn-primary{flex:1;background:#ff6b00;color:#fff;border:none;border-radius:10px;padding:11px 14px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
.cockpit-btn-secondary{background:transparent;color:#ff6b00;border:1.5px solid rgba(255,107,0,.4);border-radius:10px;padding:11px 14px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;}
.cockpit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.cockpit-tile{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;min-height:100px;}
.cockpit-tile-label{font-size:9.5px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.cockpit-tile-item{font-size:12px;color:var(--text);line-height:1.4;margin-bottom:5px;padding-left:14px;position:relative;}
.cockpit-tile-item:last-child{margin-bottom:0;}
.cockpit-tile-item::before{content:'·';position:absolute;left:2px;color:var(--text3);}
.cockpit-tile-item.risk{color:#e6edf3;}
.cockpit-tile-item.chance{color:#e6edf3;}
.cockpit-tile-more{font-size:11px;color:var(--text3);margin-top:6px;}
.cockpit-tile-empty{font-size:12px;color:var(--text3);font-style:italic;}
.cockpit-phase-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.cockpit-phase-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:13px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent;min-height:48px;}
.cockpit-phase-row.active-phase{border-color:rgba(255,107,0,.5);}
.cockpit-phase-name{font-size:13px;font-weight:700;color:var(--text);}
.cockpit-phase-num{font-size:11px;font-weight:700;width:22px;height:22px;border-radius:6px;background:var(--bg3);color:var(--text3);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cockpit-phase-num.done{background:rgba(46,160,67,.15);color:#2ea043;}
.cockpit-phase-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.cockpit-phase-status.done{color:#2ea043;background:rgba(46,160,67,.12);border:1px solid rgba(46,160,67,.25);}
.cockpit-phase-status.progress{color:#ff6b00;background:rgba(255,107,0,.12);border:1px solid rgba(255,107,0,.25);}
.cockpit-phase-status.empty{color:var(--text3);}

/* v4.150: bessere Priorisierung der Cockpit-Fragen */
.cockpit-tile-item.is-actionable{cursor:pointer;border-radius:6px;padding-top:2px;padding-bottom:2px;padding-right:4px;transition:background .12s,border-color .12s;}
.cockpit-tile-item.is-actionable:active{background:rgba(255,107,0,.10);}
.cockpit-tile-item.is-actionable::after{content:'›';position:absolute;right:1px;color:var(--text3);font-weight:800;opacity:.75;}
.cockpit-focus-banner{background:rgba(255,107,0,.10);border:1px solid rgba(255,107,0,.35);border-left:3px solid #ff6b00;border-radius:11px;padding:9px 10px;margin-bottom:10px;}
.cockpit-focus-kicker{font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.9px;color:#ff6b00;margin-bottom:3px;}
.cockpit-focus-kicker.is-back{cursor:pointer;display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:2px 6px 2px 0;}
.cockpit-focus-kicker.is-back::before{content:'‹';font-size:13px;line-height:1;color:#ff6b00;}
.cockpit-focus-kicker.is-back:active{background:rgba(255,107,0,.10);}
.cockpit-focus-text{font-size:11.5px;font-weight:700;color:var(--text);line-height:1.35;}
.cockpit-focus-hint{font-size:10px;color:var(--text2);line-height:1.35;margin-top:4px;}
.bs-row.clickable{cursor:pointer;border-radius:8px;}
.bs-row.clickable:active{background:rgba(255,107,0,.08);}
.bs-row.clickable .bs-row-arrow{margin-left:auto;color:#ff6b00;font-weight:800;opacity:.8;}

/* Bottom Sheet */
.bs-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;opacity:0;transition:opacity .22s;}
.bs-overlay.visible{opacity:1;}
.bs-panel{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-radius:20px 20px 0 0;z-index:201;max-height:82vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s cubic-bezier(.32,1.01,.4,1);}
.bs-panel.visible{transform:translateY(0);}
.bs-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
.bs-head{padding:16px 18px 10px;border-bottom:1px solid var(--border);}
.bs-title{font-size:13px;font-weight:800;color:var(--text);letter-spacing:-.2px;}
.bs-body{padding:10px 18px 32px;}
.bs-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-top:1px solid var(--border);font-size:13px;color:var(--text);line-height:1.45;}
.bs-row:first-child{border-top:none;}
.bs-row .bs-glyph{flex-shrink:0;width:20px;text-align:center;margin-top:1px;}
.bs-row.bs-priority{background:rgba(255,107,0,.07);border:1px solid rgba(255,107,0,.22);border-radius:12px;padding:9px 10px;margin:7px 0;}
.bs-row.bs-priority:first-child{border-top:1px solid rgba(255,107,0,.22);}
.bs-row.bs-priority + .bs-row.bs-priority{border-top:1px solid rgba(255,107,0,.22);}
.bs-row.bs-priority .bs-glyph{background:#ff6b00;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;margin-top:0;}
.bs-panel.questions-sheet .bs-body{padding:8px 14px 30px;}
.bs-panel.questions-sheet .bs-row:not(.bs-priority){font-size:12px;line-height:1.35;padding:8px 0;color:var(--text2);}
.bs-panel.questions-sheet .bs-row:not(.bs-priority) .bs-glyph{font-size:10px;color:var(--text3);}
.bs-priority-caption{font-size:8.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#ff6b00;margin-bottom:3px;}
.bs-separator{height:1px;background:var(--border);margin:8px 0 2px;opacity:.7;}
.bs-empty{font-size:13px;color:var(--text3);font-style:italic;padding:14px 0;}
.home-station-row{display:flex;align-items:center;gap:9px;background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:7px 9px;margin-bottom:5px;cursor:pointer;transition:border-color .15s;}
.home-station-row:hover{border-color:#ff6b00;}
.home-icon-tile{width:26px;height:26px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.home-icon-tile.is-done{background:rgba(46,160,67,.12);border-color:rgba(46,160,67,.3);}
.home-icon-tile.is-progress{background:rgba(255,107,0,.12);border-color:rgba(255,107,0,.3);}
.home-station-sub2{font-size:9px;color:var(--text2);margin-top:0;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;}
.home-status-pill{display:inline-flex;align-items:center;gap:4px;font-size:8px;font-weight:700;
  border-radius:20px;padding:2.5px 7px;white-space:nowrap;flex-shrink:0;}
.home-status-pill.done{background:rgba(46,160,67,.12);color:#2ea043;}
.home-status-pill.progress{background:rgba(255,107,0,.12);color:#ff6b00;}
.home-status-pill.empty{background:rgba(139,148,158,.1);color:var(--text2);}
.home-strategy-title{font-size:16px;font-weight:800;color:var(--text);margin:12px 0 1px;
  letter-spacing:-.2px;}
.home-strategy-sub{font-size:9.5px;color:var(--text2);margin-bottom:8px;}
.home-station-num{width:15px;height:15px;border-radius:50%;background:var(--bg3);
  border:1px solid var(--border);color:var(--text2);font-size:8px;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.home-station-num.is-done{background:rgba(46,160,67,.18);border-color:rgba(46,160,67,.4);color:#2ea043;}
.home-station-num.is-progress{background:rgba(255,107,0,.18);border-color:rgba(255,107,0,.4);color:#ff6b00;}
.home-station-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.home-progress-row{display:flex;align-items:center;gap:5px;}
.home-progress-track{width:36px;height:3.5px;border-radius:3px;background:var(--bg3);overflow:hidden;}
.home-progress-fill{height:100%;border-radius:3px;}
.home-progress-fill.done{background:#2ea043;}
.home-progress-fill.progress{background:#ff6b00;}
.home-progress-pct{font-size:8px;color:var(--text2);font-weight:700;min-width:20px;text-align:right;}
.home-station-title{font-size:11.5px;font-weight:700;color:var(--text);}
.home-insights-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;
  padding:10px;}
.home-insight-row{display:flex;align-items:flex-start;gap:7px;padding:4px 0;font-size:11px;
  color:var(--text);line-height:1.35;}
.home-insight-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.home-insight-dot.positive{background:#2ea043;}
.home-insight-dot.warning{background:#f85149;}
.home-insight-dot.open{background:var(--text3);}
.home-empty-note{font-size:10.5px;color:var(--text3);padding:2px 0;}
.home-station-sub{font-size:11.5px;color:var(--text2);margin-top:2px;}
/* Executive Briefing components (sitId===1 only) */
.exec-grid{display:flex;gap:9px;margin-bottom:10px;flex-wrap:wrap;}
.exec-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px;flex:1;min-width:120px;}
.exec-card-label{font-size:8.5px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:#8b949e;margin-bottom:8px;}
.exec-card-val{font-size:12px;font-weight:400;color:var(--text);line-height:1.5;}
.exec-card-val.accent{color:#ff6b00;font-weight:600;margin-top:4px;}
.exec-card-val.muted{color:var(--text2);font-weight:400;}
.exec-divider{display:flex;align-items:center;gap:10px;margin:20px 0 14px;}
.exec-divider-line{flex:1;height:1px;background:var(--border);}

<script>
// ── STORAGE ────────────────────────────────────────────────
const LS={
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch(e){return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}},
};

// ── UNIVERSELLE KOPIER-FUNKTION mit garantiertem Fallback ──
// Manche Browser (z.B. Brave) blockieren navigator.clipboard / execCommand lautlos, ohne Fehler oder Berechtigungsabfrage.
// Fallback: öffnet ein vorselektiertes Textfeld, damit der Nutzer per Long-Press → Kopieren manuell kopieren kann (funktioniert immer).
function universalCopy(text, onSuccess){
  text=String(text||'').trim();
  if(!text){alert('Kein Text zum Kopieren vorhanden.');return;}
  const markSuccess=()=>{try{if(onSuccess)onSuccess();}catch(e){}};
  const fallback=()=>{
    try{
      const overlay=document.createElement('div');
      overlay.style.cssText='position:fixed;inset:0;background:rgba(13,17,23,.97);z-index:999999;display:flex;flex-direction:column;padding:20px;box-sizing:border-box;';
      overlay.appendChild(h('div',{style:{color:'#ff6b00',fontWeight:'700',marginBottom:'10px',fontSize:'13px'}},
        '📋 Tippe lange auf den Text unten und wähle „Alles auswählen“ → „Kopieren“.'));
      const ta=h('textarea',{readonly:true,style:{flex:'1',width:'100%',background:'#1c2333',border:'1px solid #30363d',borderRadius:'6px',padding:'12px',fontSize:'13px',color:'#e6edf3',outline:'none',resize:'none',lineHeight:'1.7',boxSizing:'border-box'}});
      ta.value=text;
      overlay.appendChild(ta);
      const closeBtn=h('button',{className:'btn-o',style:{marginTop:'12px'},onclick:(e)=>{e.preventDefault();e.stopPropagation();overlay.remove();}},'Schließen');
      overlay.appendChild(closeBtn);
      document.body.appendChild(overlay);
      setTimeout(()=>{try{ta.focus();ta.select();ta.setSelectionRange(0,ta.value.length);}catch(e){}},80);
    }catch(e){alert(text);}
  };
  const execCopy=()=>{
    try{
      const ta=document.createElement('textarea');
      ta.value=text;
      ta.setAttribute('readonly','');
      ta.style.cssText='position:fixed;left:-9999px;top:0;opacity:0;';
      document.body.appendChild(ta);
      ta.focus();ta.select();ta.setSelectionRange(0,ta.value.length);
      const ok=document.execCommand('copy');
      document.body.removeChild(ta);
      return !!ok;
    }catch(e){return false;}
  };
  // Erst synchroner Weg, weil iOS/Brave die User-Geste sonst verlieren kann.
  if(execCopy()){markSuccess();return;}
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(markSuccess).catch(fallback);
  }else{
    fallback();
  }
}

// ── PDF EXPORT HELPER (echte PDF-Erzeugung, kein HTML-Download) ──
let _html2pdfPromise=null;
function loadHtml2Pdf(){
  if(window.html2pdf)return Promise.resolve();
  if(_html2pdfPromise)return _html2pdfPromise;
  _html2pdfPromise=new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
    s.onload=()=>resolve();
    s.onerror=()=>reject(new Error('html2pdf konnte nicht geladen werden'));
    document.head.appendChild(s);
  });
  return _html2pdfPromise;
}
function exportHtmlAsPdf(html,filename){
  loadHtml2Pdf().then(()=>{
    const el=document.createElement('div');
    el.innerHTML=html;
    document.body.appendChild(el);
    window.html2pdf().from(el).set({
      margin:10,
      filename:filename,
      html2canvas:{scale:2,useCORS:true},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
      pagebreak:{mode:['css','legacy']}
    }).save().then(()=>{document.body.removeChild(el);});
  }).catch(e=>{
    alert('PDF-Erzeugung fehlgeschlagen: '+e.message+'\nBitte Internetverbindung prüfen.');
  });
}

function shareAsPdf(title,text,cust,filename,fallbackText){
  loadHtml2Pdf().then(()=>{
    const html=buildSimplePdfHtml(title,text,cust);
    const el=document.createElement('div');
    el.innerHTML=html;
    document.body.appendChild(el);
    window.html2pdf().from(el).set({
      margin:10,
      html2canvas:{scale:2,useCORS:true},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
      pagebreak:{mode:['css','legacy']}
    }).outputPdf('blob').then(blob=>{
      document.body.removeChild(el);
      const file=new File([blob],filename,{type:'application/pdf'});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:title}).catch(()=>{});
      } else if(navigator.share){
        navigator.share({title:'KI21 – '+title,text:fallbackText||text});
      } else {
        // Fallback: PDF direkt herunterladen
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url;a.download=filename;a.click();
        setTimeout(()=>URL.revokeObjectURL(url),1000);
      }
    });
  }).catch(()=>{
    if(navigator.share)navigator.share({title:'KI21 – '+title,text:fallbackText||text});
  });
}

function buildSimplePdfHtml(title,text,cust){

    <div style="font-size:11px;color:#666;">${(cust&&cust.firma)||''} | ${new Date().toLocaleDateString('de-DE')}</div>
  </div>
  <div style="white-space:pre-wrap;">${highlightResultHTML(text||'')}</div>

  return html;
}

    s+='SCHNELLSTART-MODUS AKTIV\n';
    s+='Du verfügst nur über begrenzte Informationen. Nutze vorhandene Fakten maximal aus.\n';
    s+='Ergänze fehlende Informationen AUSSCHLIESSLICH als: ANNAHME, ARBEITSWERT, BRANCHENHYPOTHESE oder ZU KLÄREN. Erfinde NIEMALS bestätigte Aussagen oder bestätigte Zahlen.\n';
    s+='KRITISCH: Trenne noch strenger als sonst zwischen BESTÄTIGT (vom Kunden tatsächlich genannt), ANNAHME (direkt aus dem Gesagten abgeleitet) und BRANCHENHYPOTHESE (allgemeines Branchenwissen, NICHT aus diesem Kunden abgeleitet). Wenn eine Zahl wie "120-160 Stunden Konsolidierungsaufwand" oder "9-18 Monate Projektlaufzeit" NICHT vom Kunden bestätigt wurde, kennzeichne sie unmissverständlich als BRANCHENHYPOTHESE, nicht als ANNAHME – das macht den Unterschied zwischen "aus diesem Gespräch abgeleitet" und "generisches Branchenwissen" sichtbar.\n';
    s+='KRITISCH: Wenn der vorläufige Business Case/ROI auf Basis der vorhandenen Informationen NEGATIV oder NICHT SELBSTTRAGEND ausfällt, akzeptiere das offen und sage es klar (z.B. "Auf Basis der bisherigen Informationen ist der Case noch nicht selbsttragend"). Versuche NICHT, das Ergebnis durch zusätzliche, unbestätigte Potenziale oder Argumente zu kompensieren oder zu relativieren. Ein ehrlich negativer Befund in der Opportunity-Vorschau ist wertvoller als ein künstlich positiv gerechneter.\n';
    s+='KRITISCH: Bleibe bei ROI-Rechnungen besonders konservativ. Nutze Bereiche/Arbeitswerte statt scheinbar exakter Einzelzahlen, und mache deutlich, dass die Berechnung auf BRANCHENHYPOTHESEN beruht, solange keine Kundenzahlen vorliegen.\n';
    s+='KRITISCH: Lege den Fokus stärker auf Discovery als auf Fakten-Suggestion. Formuliere mehr offene, gezielte Rückfragen statt viele konkrete Zahlen zu präsentieren, die noch nicht belastbar sind – das Ziel ist Gesprächsvorbereitung, nicht eine scheinbar fertige Analyse.\n';
    s+='Wenn Informationen fehlen: leite aus Branche und Situation plausible Hypothesen ab, kennzeichne sie eindeutig als BRANCHENHYPOTHESE, und leite daraus gezielte Rückfragen ab. Das Ziel ist ein hochwertiges Arbeitsdokument für den Vertrieb, nicht absolute Gewissheit.\n';
    s+='Beginne den Output mit: "🔍 OPPORTUNITY-VORSCHAU – Dies ist ein erster Überblick, keine vollständige Analyse. Die Vorschau kombiniert bestätigte Fakten, Branchenwissen und plausible Arbeitshypothesen, um typische Herausforderungen zu antizipieren und erste Gesprächs-Hypothesen zu entwickeln. Sie ersetzt nicht die Qualifizierung, das Kundengespräch oder die Validierung von Annahmen im vollständigen KI21-Prozess."\n';
    s+='Direkt danach, vor dem eigentlichen Inhalt, schätze grob ein (keine exakte Berechnung nötig, nur Orientierung): "Bestätigte Informationen: XX % | Arbeitshypothesen/Branchenwissen: XX % | Noch zu validierende Punkte: XX %" (die drei Werte sollten sich ungefähr zu 100% aufsummieren).\n';
  }
  s+='SCHREIBSTIL: Schreibe wie ein erfahrener deutscher Vertriebsleiter mit 30 Jahren Praxis. Verwende klare, natürliche Sprache. Vermeide Marketingfloskeln, Beraterjargon, unnötige Anglizismen und übertriebene Superlative. Jede Aussage soll so formuliert sein, dass sie in einem echten Kundengespräch glaubwürdig verwendet werden kann. Bevor du die Antwort ausgibst, lies sie gedanklich noch einmal durch und ersetze jede Formulierung, die künstlich, gestelzt oder nach KI klingt, durch einfaches, idiomatisches Deutsch – ohne den Inhalt zu verändern.\n';
  s+='KRITISCH – NEUES VERDICHTUNGSZIEL: 50% weniger Worte, 100% der Aussage. Jede Aussage so kurz wie möglich. Füllwörter konsequent entfernen. Keine Wiederholungen zwischen den Abschnitten. KEIN Einleitungssatz, wenn die Überschrift die Aussage bereits trägt. Aktiv statt Passiv. Konkrete Formulierungen statt abstrakter Beschreibungen. Maximal 2 Zeilen pro Bullet. Beispiel: NICHT "Der wirtschaftliche Fall hängt entscheidend davon ab...", SONDERN "Zeitersparnis allein verkauft das Projekt nicht. Entscheidend ist der wirtschaftliche Schaden der Lieferfähigkeitsfehler." Wenn eine Aussage ohne Informationsverlust gekürzt werden kann, ist IMMER die kürzere Variante zu wählen.\n';
  s+='KRITISCH – PHASENDISZIPLIN: Fokus bedeutet, sich auf etwas zu konzentrieren. Disziplin bedeutet, konsequent alles wegzulassen, was nicht zur Aufgabe dieser Phase gehört. Die zentralen Analysephasen (Qualifizierung, Bedarfsanalyse, Demo, Nutzen-Kosten-Analyse, Angebot & Abschluss) besitzen jeweils eine definierte KERNFRAGE (siehe oben am Anfang dieses Prompts, falls dort benannt) – jede Aussage muss dieser Kernfrage dienen. Alle übrigen Phasen (z.B. Terminnachbereitung) folgen derselben Phasendisziplin ohne eigene benannte Kernfrage: Jeder Abschnitt erfüllt genau einen Zweck und liefert einen eigenständigen Mehrwert für genau diese Phase. Prüfe in JEDER Phase JEDE Aussage anhand dieser drei Fragen, bevor du sie aufnimmst: (1) Beantwortet diese Information die Aufgabe dieser Phase? (2) Liefert sie einen neuen Mehrwert gegenüber den vorherigen Phasen? (3) Würde der Leser etwas verlieren, wenn dieser Satz entfernt würde? Kann eine Frage mit Nein beantwortet werden, wird die Aussage entfernt oder deutlich gekürzt.\n';
  s+='KRITISCH – JEDE PHASE BEGINNT DORT, WO DIE VORHERIGE ENDET: Die Phasen sollen sich wie ein roter Faden lesen, nicht wie fünf unabhängige Berichte. Diese Phase übernimmt den aktuellen Wissensstand aus aktuellen Eingaben, Antworten und Ergänzungen. Frühere KI-Ergebnisse sind höchstens Orientierung und NIEMALS Faktenquelle. Zusätzliche Prüffrage vor jedem Abschnitt: "Baut dieser Abschnitt auf den aktuellen Kundendaten auf, oder wiederholt er nur alte KI-Texte?" Wenn ein Abschnitt nur frühere KI-Ausgaben wiederholt, muss er gekürzt oder entfernt werden. Der Leser soll beim Phasenwechsel denken "Jetzt geht der Prozess einen Schritt weiter" – nicht "Das habe ich gerade schon gelesen".\n';
  s+='Eine Erkenntnis darf in mehreren Phasen erscheinen, wenn sie dort einen ANDEREN Zweck erfüllt. Beispiel: Qualifizierung – "Der Geschäftsführer ist noch nicht eingebunden" (Bewertung der Opportunity). Bedarfsanalyse – "Den Geschäftsführer nach wirtschaftlichem Schaden und Erfolgskriterien fragen" (Gesprächsstrategie). Nutzen-Kosten-Analyse – "Ohne Bestätigung des Geschäftsführers bleibt der Business Case nicht belastbar" (wirtschaftliche Bewertung). Diese Wiederholung ist ausdrücklich gewünscht. NICHT zulässig ist dieselbe Aussage mit derselben Aussageabsicht in mehreren Phasen. Ziel ist nicht die kürzeste Einzelphase, sondern das kürzeste Gesamtdossier bei gleichem Informationsgehalt – jede Phase muss einen klar erkennbaren Mehrwert liefern.\n';
  s+='KRITISCH – DER 60-SEKUNDEN-TEST: Wenn ein Vertriebsleiter zwischen zwei Kundenterminen nur 60 Sekunden Zeit hat, muss er nach dem Lesen genau wissen: Wie gut steht die Opportunity? Warum? Was fehlt? Was ist der nächste Schritt? Jeder Abschnitt muss diesen Test bestehen.\n';
  s+='KRITISCH – KONKRETE BERATERSPRACHE-VERBOTSLISTE: Vermeide diese und ähnliche Begriffe konsequent: "Data Governance Sponsor", "Ownership-Struktur", "Steering Committee", "Reporting-Architektur", "Stakeholder-Alignment", "Synergiepotenzial", "Sunk Cost", "Data Governance", "Planning Governance", "Modernisierungskomponente". Ersetze sie durch die direkte, vertriebliche Frage dahinter: statt "Ownership-Struktur klären" schreibe "Wer entscheidet?"; statt "Stakeholder-Alignment" schreibe "Wer blockiert? Wer profitiert?"; statt abstrakter Prozessbegriffe schreibe "Was kostet das?", "Wie oft passiert das?", "Was muss geklärt werden?". Ein erfahrener Vertriebsleiter denkt in Menschen, Macht und Geld – nicht in Beratungsmodellen.\n';
  s+='KRITISCH – KEINE FACHBEGRIFFE/PRODUKTNAMEN ERFINDEN, DIE DER KUNDE NICHT GENANNT HAT: Wenn ein technischer Fachbegriff oder Produktname (z.B. ein konkretes Software-Modul wie "SAP Analytics Cloud" oder "Integrated Planning") nicht direkt vom Kunden genannt wurde, darf er NICHT als Kundenerkenntnis erscheinen. Verwende stattdessen die einfache, allgemeine Beschreibung dessen, was der Kunde tatsächlich gesagt hat (z.B. "ein SAP-Modernisierungsprojekt läuft" statt "SAP Analytics Cloud und Integrated Planning sind geplant", falls der Kunde keine konkreten Modulnamen genannt hat). Erfundene Fachbegriffe lassen das Ergebnis wie ein Beratungskonzept wirken statt wie eine ehrliche Gesprächsdokumentation – das ist unerwünscht.\n';
  s+='SELBSTTEST VOR JEDER AUSGABE: Würde ein sehr erfahrener Vertriebsleiter genau so schreiben – oder wirkt der Text wie ein Strategieberater, der ein Transformationskonzept entwirft? Im Zweifel: pragmatischer, konkreter, vertriebsorientierter formulieren, nicht als Beratungsdokument.\n';
  s+='KRITISCH: Wenn dieselben Kernfakten (z.B. eine konkrete Zahl wie "6 Arbeitstage pro Szenario") bereits in einem vorherigen Kontext-Abschnitt erwähnt wurden, wiederhole sie in dieser Phase nur EINMAL ausführlich (meist in den ERKENNTNISSE/BESTÄTIGT-Abschnitten) und referenziere sie danach kurz, statt sie in jedem Abschnitt erneut vollständig auszuschreiben. Ziel: Wiederholungen über die Phasen hinweg reduzieren, ohne wichtige Fakten wegzulassen.\n';
  s+='PFLICHT – DREI-STUFEN-SYSTEM FÜR JEDE INFORMATION: Bewerte JEDE Information, bevor du sie verwendest, nach genau einer dieser drei Stufen:\n';
  s+='PFLICHT – ERGÄNZUNGEN ALS QUALIFIZIERTE SIGNALE BEHANDELN: Neue Ergänzungen sind nicht einfach Zusatztext. Ordne jede neue Erkenntnis gedanklich nach Rolle und Status ein: Entscheider/Freigabe, Budget/Preis, Angebot/Scope, Problemkosten/Nutzen, Timing/Deadline, Champion/Sponsor, Wettbewerber, Risiko oder offener Punkt. Nutze die Information nur dort, wo diese Rolle zur Phase passt. Eine Ergänzung kann ein positives Signal für ein Einstiegsangebot sein und gleichzeitig ein offener Punkt für ein Folgeangebot.\n';
  s+='PFLICHT – OBJEKT UND VALIDIERUNGSSTATUS TRENNEN: Trenne immer, worauf sich eine Aussage bezieht. Beispiel: "CFO sieht Quick Check 4.900 € als kurzfristig entscheidbar" bedeutet NICHT, dass ein Managed-Security-Abo freigegeben ist. Beispiel: "Großkunde macht 12 % Umsatz" bedeutet geschäftliche Relevanz, aber KEIN bestätigter Umsatzverlust. Kennzeichne Quelle und Validierungsstatus, wenn es kritisch ist: genannt, schriftlich belegt, vermutet, zu klären.\n';
  s+='PFLICHT – KEINE ÜBERTRAGUNG AUF SPÄTERE PHASEN: Eine neue Erkenntnis darf keine stärkere Aussage erzeugen als sie trägt. Kurzfristige Budgetoffenheit darf nicht zu bestätigtem Business Case werden. Ein fachlicher Sponsor darf nicht zum wirtschaftlichen Entscheider werden. Eine Folgeoption darf nicht wie das aktuelle Angebot behandelt werden.\n';
  s+='  FAKT (= BESTÄTIGT): direkt genannt, eindeutig belegt, aus den Eingaben stammend. Beispiele: "6 Arbeitstage pro Szenario", "3 Spartensysteme", "SAP-Projekt läuft", "CFO ist Sponsor".\n';
  s+='  INTERPRETATION (= ANNAHME): eine logische, nachvollziehbare Ableitung AUS einem Fakt. Beispiele: "SAP-Projekt erzeugt Zeitdruck", "CIO könnte SAP bevorzugen". Interpretationen sind erlaubt und wertvoll – aber sie dürfen NIE wie ein Fakt klingen, sondern müssen erkennbar als Schlussfolgerung formuliert sein (z.B. mit "könnte", "vermutlich", "deutet darauf hin").\n';
  s+='  VERMUTUNG (= KLÄREN/ZU VALIDIEREN): eine nicht belegte Aussage ohne Faktengrundlage – typischerweise Budgethöhe, ROI, Abschlusswahrscheinlichkeit, Schadenshöhe, Lizenzbedarf, sofern sie nicht explizit genannt wurden. Eine Vermutung darf NIEMALS als Fakt oder als präzise Zahl erscheinen.\n';
  s+='KRITISCH – NIEMALS RECHNEN BEI FEHLENDEN DATEN: Wenn für eine Berechnung (ROI, Amortisation, Abschlusswahrscheinlichkeit in %, Schadenshöhe) die nötigen Fakten fehlen, BERECHNE KEINE Zahl, SCHÄTZE KEINE Zahl, ERFINDE KEINE Zahl. Schreibe statt einer Zahl explizit, was fehlt (z.B. "ROI aktuell nicht belastbar berechenbar. Es fehlen: Reporting-Aufwand, Szenario-Häufigkeit, Fehlerkosten."). Eine ehrliche Lücke ist immer besser als eine präzise wirkende, aber erfundene Zahl.\n';
  s+='KRITISCH – KEINE ERFUNDENEN STAKEHOLDER-ERWARTUNGEN: Schreibe NIEMALS eine konkrete Erwartung eines Stakeholders, die nicht genannt wurde (z.B. NICHT "Geschäftsführer erwartet +5-10% Umsatzsteigerung", wenn diese Zahl nirgends im Gespräch gefallen ist). Formuliere stattdessen als offene Frage oder als zu klärenden Punkt (z.B. "Geschäftsführer muss den wirtschaftlichen Nutzen noch definieren" oder "Welche Kennzahl entscheidet für den Geschäftsführer über den Projekterfolg?"). Das gilt für JEDE Person/Rolle (CEO, CFO, CIO, Einkauf usw.), nicht nur für den direkten Ansprechpartner.\n';
  s+='PFLICHT: Die Genauigkeits-Kennzeichnung BESTÄTIGT/ANNAHME/KLÄREN gilt für deine interne Sorgfalt und für den Detailbereich (nach ###DETAILS###, falls das Phasenformat das vorsieht) – NICHT als Präfix in der kompakten Standardausgabe. Halte trotzdem in jedem Bullet selbst implizit fest, was Fakt vs. Interpretation vs. Vermutung ist, ohne das Wort explizit hinzuschreiben (z.B. durch Formulierung wie "Kunde nennt..." vs. "könnte..." vs. "noch unklar...").\n';
  s+='KRITISCH: Erfinde NIEMALS konkrete Studiennamen, Institute oder präzise Statistiken (z.B. "laut XY-Studie", "13-26 Wochen laut BARC") die nicht im Abschnitt "KI21 Intelligence" unten stehen. Du hast in dieser Phase KEINEN Websuche-Zugriff. Wenn du eine Marktaussage machen willst, formuliere sie als eigene Einschätzung ohne erfundene Quellenangabe, oder verweise allgemein auf Erfahrungswerte aus der KI21 Intelligence.\n';
  s+='KRITISCH: Wenn ein Arbeitsaufwand (Personenstunden) 8 Stunden oder mehr beträgt, wandle ihn IMMER in Arbeitstage à 8 Stunden um, indem du die Stundenzahl DURCH 8 TEILST (z.B. 600-1.200 Stunden ÷ 8 = 75-150 Arbeitstage, NICHT 600-1.200 Arbeitstage – die Maßeinheit ändert sich, der Zahlenwert wird kleiner). Rechne diese Division bei JEDER Umrechnung explizit nach, bevor du das Ergebnis hinschreibst. Das gilt AUCH wenn die Kundenangabe selbst in Stunden kam (z.B. "40-60 Stunden/Monat" → "5-7,5 Arbeitstage/Monat"), UND für jede aufsummierte oder hochgerechnete Jahres-/Monatszahl, nicht nur für Einzelfall-Nennungen. Nur Werte unter 8 Stunden bleiben in Stunden stehen. Das gilt für alle Aufwandsangaben in jeder Phase, konsequent über den gesamten Output.\n';
  s+='KRITISCH: Wenn du irgendwo im Output die Verlässlichkeit einer Aussage/Zahl kennzeichnest, nutze AUSSCHLIESSLICH die Worte BESTÄTIGT (vom Kunden genannt oder dokumentiert), ARBEITSWERT (Benchmark + plausibel abgeleiteter Mittelwert aus KI21 Intelligence, zum Rechnen verwendet, nicht kundenspezifisch verifiziert) oder ZU VALIDIEREN (offene Größe, die im nächsten Gespräch geklärt werden sollte) – NIEMALS Emoji-Punkte wie 🟢/🟡/🔴 oder Ampelfarben ohne Wort. Schreibe immer zuerst den Bewertungstext, dann das Label in Großbuchstaben direkt danach oder davor (z.B. "Typische Range: 300-600 Stunden/Jahr, verwendeter ARBEITSWERT: 450 Stunden/Jahr"). Das gilt konsequent für jede Confidence-Angabe im gesamten Output, nicht nur an einer Stelle. Bei BESTÄTIGT/ANNAHME/KLÄREN-Blöcken (für Gesprächserkenntnisse) bleiben diese drei Wörter wie bisher bestehen – ARBEITSWERT/ZU VALIDIEREN gelten zusätzlich speziell für quantitative Kennzahlen und Berechnungsgrundlagen.\n';
  s+='KRITISCH: MAXIMAL EIN MULTIPLIKATIONSSCHRITT BEI SPEKULATIVEM POTENZIAL: Wenn du ein Krisen-/Schadenspotenzial in einer Eskalations-/Schadensrechnung darstellst, verkette NICHT mehr als einen einzigen Unsicherheitsfaktor (z.B. NUR "Schadenshöhe × geschätzte Vermeidbarkeitsquote"). Verkette NIEMALS zusätzlich noch eine geschätzte Häufigkeit pro Jahr in dieselbe Rechnung – das sind dann mehrere multiplizierte Unsicherheiten und die resultierende Zahl wirkt präziser als sie ist. Behandle Häufigkeit pro Jahr als separaten, eigenständig zu klärenden Punkt, ohne sie in die gleiche Multiplikation einzubeziehen. Gilt in JEDER Phase, nicht nur in der Nutzen-Kosten-Analyse.\n';
  s+='KRITISCH: GLEICHES PRINZIP GILT FÜR OPTIMISTISCHE ROI-MULTIPLIKATOREN: Verkette bei einer ROI-/Payback-Aussage NICHT mehr als einen Unsicherheitsfaktor (z.B. NUR die vom Kunden genannte Quote-Verbesserung). Wenn du zusätzlich noch eine geschätzte Margin-Annahme UND eine angenommene Erfolgswahrscheinlichkeit in dieselbe Rechnung einbaust, entsteht eine künstlich beeindruckende Zahl wie "ROI 20-30x", die bei kritischem Nachfragen (besonders von CFO/CEO) nicht standhält und Vertrauen kostet. NIEMALS einen ROI-Multiplikator wie "20x", "30x" oder eine ähnlich hohe, beeindruckend wirkende Zahl als Ergebnis ausgeben, wenn sie aus mehr als einer verketteten Unsicherheit stammt – formuliere statt einer einzelnen Multiplikator-Zahl lieber eine Bandbreite mit explizit benannten Annahmen, oder verzichte ganz auf eine zusammenfassende "Xx ROI"-Zahl und beschreibe Nutzen vs. Investition stattdessen als zwei separate, klar gekennzeichnete Größen. Gilt in JEDER Phase.\n';
  s+='KRITISCH: KORREKTE BESTÄTIGT/ANNAHME-ZUORDNUNG BEI ABGELEITETEN ZAHLEN: Wenn der Kunde eine Prozentzahl nennt (z.B. "20-25% mehr Umsatz"), ist NUR diese Prozentzahl selbst BESTÄTIGT (der Kunde hat sie genannt). Jede daraus berechnete absolute €-Zahl (z.B. "5-8 Mio. € zusätzlicher Umsatz" durch Anwendung der Prozentzahl auf den Gesamtumsatz) ist eine EIGENE Ableitung und MUSS als ANNAHME oder ARBEITSWERT gekennzeichnet werden, NIEMALS als BESTÄTIGT – auch wenn die zugrunde liegende Prozentzahl bestätigt ist. Eine Berechnung aus einer bestätigten Zahl ist selbst nicht automatisch bestätigt.\n';
  s+='KRITISCH – FORECAST-NUTZEN NUR KONTEXTABHÄNGIG: Forecast-/Entscheidungsqualität ist NICHT pauschal bei jedem "Mein Unternehmen" ein ROI-Hebel. Verwende Forecast-Genauigkeit als zentralen Nutzenhebel NUR, wenn (1) Mein Unternehmen KI21 ist, (2) das eigene Angebot ausdrücklich Forecast, Opportunity Health/Scoring, Pipeline-Qualität, CRM-/Sales-Qualifizierung, Discovery oder Vertriebssteuerung adressiert, oder (3) der Kunde explizit Forecast-/Pipeline-Probleme nennt. Bei allen anderen Angeboten keine KI21-Logik hineinprojizieren; dann liegt der Nutzen woanders. Wenn Forecast zulässig ist, formuliere trotzdem vorsichtig: bessere Qualifizierung → bessere Datenbasis → belastbarere Prognose; keine Umsatz-/Abschlussquoten-Steigerung als KI21-Leistungsversprechen. Eine vom Kunden selbst genannte Zielgröße (z.B. "+20-25% Umsatz") bleibt Kundenhypothese, nicht KI21-Versprechen. Gilt in JEDER Phase, besonders SPIN, ROI, Eröffnungssätzen und Abschlussargumentation.\n';
  s+='KRITISCH: UNSICHERE PROZENTANGABEN GENERELL VORSICHTIG FORMULIEREN (gilt für ALLE Prozentzahlen in JEDER Phase, auch Forecast-Genauigkeit-Benchmarks): Solange eine Prozentzahl nicht durch eigene Messung des Kunden bestätigt ist, formuliere sie nicht als feststehende Tatsache. Ergänze bei der ersten Nennung einen kurzen Validierungs-Hinweis (z.B. "...sollte im Pilotbetrieb mit echten Zahlen validiert werden"), statt die Zahl danach unkommentiert mehrfach als Fakt zu wiederholen.\n';
  s+='KRITISCH – ROI-HEBEL STATT SCHEINGENAUIGKEIT: KI21 soll keine scheinexakte ROI-Rechenmaschine sein. Wenn Kostenarten, Laufzeiten oder Nutzenannahmen gemischt oder unsicher sind, berechne keinen harten ROI-Prozentsatz und keine komplexe Amortisation. Identifiziere stattdessen: (1) wichtigste ROI-wirksame Position, (2) bekannte wirtschaftliche Größenordnung, (3) unsichere Annahme, (4) Validierungsfrage an den Kunden, (5) einfache Mindestlogik für die Entscheidung. Der Account Manager soll dadurch die richtige ROI-wirksame Stelle erkennen und mit dem Kunden belastbar validieren.\n';
  s+='KRITISCH – KEINE ERFUNDENEN VERMEIDUNGSQUOTEN: Erzeuge niemals konkrete Vermeidungsquoten, wenn diese nicht ausdrücklich vom Kunden genannt wurden. Schreibe stattdessen: Vermeidungsquote noch nicht validiert / ROI-Annahme noch nicht belastbar / zentrale ROI-wirksame Annahme muss im Startangebot gemessen werden. Keine scheinexakte Quote aus eigener Interpretation ableiten.\n';
  s+='KRITISCH – VERMEIDUNGSQUOTE NICHT ENTFERNEN, SONDERN OHNE ZAHL SICHTBAR HALTEN: Wenn der Business Case auf schwach qualifizierten Deals, später Disqualifikation oder schlechter Discovery basiert, muss die Vermeidungsquote als zentrale zu validierende ROI-Annahme erscheinen. Verboten ist nur eine erfundene Prozentzahl. Richtige Formulierung: „Vermeidungsquote schwach qualifizierter Deals noch nicht validiert“.\n';
  s+='KRITISCH – KEINE UNNÖTIGEN NEBENBAUSTELLEN DURCH KUNDENSYSTEME: Vorhandene Kundensysteme (z.B. CRM, ERP, BI, HubSpot, Salesforce, Dynamics, SAP, Pipedrive oder andere Plattformen) dürfen NICHT automatisch als Risiko, offener Punkt oder nächster Schritt erscheinen. Prüfe immer zuerst: Hilft diese Systemfrage dem Abschluss des konfigurierten eigenen Angebots – oder eröffnet sie eine Ausweich-/Ersatzdiskussion, die das eigene Angebot relativiert? Aktive System-/Integrationsfragen nur nennen, wenn (a) Integration Kernnutzen des eigenen Produkts ist, (b) der Kunde Integration ausdrücklich als Voraussetzung nennt, (c) ohne Integration kein sinnvoller Start möglich ist oder (d) Integration bestätigter Entscheidungsfaktor ist. Sonst: Kundensysteme nur als stillen Kontext nutzen und den nächsten Schritt auf Nutzen, Entscheidung und Validierung des eigenen Angebots fokussieren.\n';
  s+='NACHRANGIGE RISIKEN: Wenn eine System-/Integrationsdiskussion nicht startkritisch ist, aber vertrieblich gefährlich werden könnte, darf sie höchstens nachrangig als Risiko erscheinen – nicht als Top-Risiko, nicht als „Die eine Sache“, nicht als nächster Schritt. Formulierung: „Ausweichdiskussion über vorhandene Systeme vermeiden; Nutzen des eigenen Angebots zuerst validieren.“\n';
  s+='KRITISCH – KEINE ERFUNDENEN TEILNEHMERZAHLEN IM NÄCHSTEN SCHRITT: Erfinde keine konkreten Gruppenstärken, Deal-Anzahlen oder Zeiträume, wenn sie nicht ausdrücklich genannt wurden. Bei Start-/Pilot-/Compact-Angeboten formuliere neutral: „Kickoff mit ausgewählten Anwendern/Account Managern“, „erste echte Opportunities/Fälle“, „Startumfang und Messkriterien festlegen“.\n';
  s+='KRITISCH: KEIN AUSWEICHEN AUF ERFUNDENE "BENCHMARKS": Wenn du für ein Krisen-/Schadenspotenzial keine belastbare, herleitbare Zahl hast, darfst du NICHT stattdessen eine pauschale Branchenzahl als angeblichen "Benchmark" zitieren, um trotzdem einen €-Betrag zu nennen. Das ist nur eine Umgehung des Verbots, keine echte Quelle. Wenn keine Zahl aus der tatsächlichen KI21 Intelligence stammt, bleibt das Potenzial unbeziffert – auch wenn das bedeutet, gar keine €-Zahl zu nennen. Gilt in JEDER Phase.\n';
  s+='KRITISCH: KATEGORISCHES VERBOT FÜR UNBESTÄTIGTES KRISENPOTENZIAL: Wenn ein Schadens-/Krisenpotenzial nicht durch konkrete, vom Kunden bestätigte Zahlen (Häufigkeit UND Vermeidbarkeit UND Schadenshöhe alle bestätigt) belegt ist, darf NIRGENDS im Output – in KEINER Phase, auch nicht im Abschlusssatz, in der Kurzfassung, in Einwandantworten oder als "Sensitivitätsrechnung" – ein €-Betrag dafür genannt werden, auch nicht mit Wörtern wie "könnte", "potenziell", "zusätzlich". Beschreibe stattdessen NUR die Mechanik in Worten, ohne Zahl. Ein unbestätigter Betrag im Kundengespräch beschädigt mehr Vertrauen als er Nutzen bringt.\n';
  s+='KRITISCH – KORREKTE PERSONEN-BEZEICHNUNG (gilt in JEDER Phase): Schreibe "X beteiligte Mitarbeitende" oder "X Personen", NIEMALS "X FTE" oder "X Vollzeitstellen" – außer der Kunde hat selbst explizit von Vollzeitstellen/FTE gesprochen. Eine vom Kunden genannte Anzahl beteiligter Personen ist NICHT automatisch eine Anzahl Vollzeitstellen – das sind fachlich unterschiedliche Größen, die nicht gleichgesetzt werden dürfen.\n';
  s+='ROI: Nur bestätigte Kundenzahlen verwenden. Zeitersparnis NUR für Account Manager.\n';
  s+='KRITISCH: Jede Phase muss mindestens EINEN Gedanken enthalten, der über Standardwissen hinausgeht – einen Aha-Insight, der im Gedächtnis bleibt (z.B. "Die größte Zeitersparnis entsteht oft nicht durch schnellere Reports, sondern dadurch, dass dieselben Zahlen nicht mehr in mehreren Excel-Dateien manuell abgeglichen werden müssen."). Vermeide reine Standardaussagen ohne überraschenden Mehrwert. Dieser Insight darf nicht erfunden wirken – er muss zur konkreten Situation des Kunden passen und nachvollziehbar sein.\n';
  s+='KRITISCH: Tonfall durchgehend partnerschaftlich, nicht verkäuferisch-drängend. Vermeide Formulierungen wie "damit ich Sie/Ihre Geschäftsführung überzeuge" oder "garantiert". Bevorzuge Formulierungen wie "damit Sie eine belastbare Entscheidungsgrundlage haben – unabhängig davon, wie die Entscheidung ausfällt" oder "damit wir gemeinsam zu einer fundierten Einschätzung kommen". Das Ziel ist: gemeinsam zu einer Entscheidung führen, nicht überreden.\n';
  s+='KRITISCH – HARTE GRENZE FÜR DIE STANDARDAUSGABE: Die Standardausgabe (alles VOR der Zeile "###DETAILS###", falls vorhanden) MUSS exakt mit der letzten vorgegebenen Zeile des Formats enden (meist "NÄCHSTER SCHRITT DIESE WOCHE:" / vergleichbar, je nach Phase). Schreibe NACH dieser letzten Zeile ABSOLUT NICHTS mehr, außer dem optionalen Marker "###DETAILS###" und dem dahinter folgenden Detailblock. KEINE zusätzliche Zusammenfassung, KEIN Wiederholen von Punkten, KEIN weiterer Absatz "Zusammenfassend...". Die Standardausgabe muss auf einem Smartphone als EINE Bildschirmseite ohne Scrollen lesbar sein – das ist die wichtigste Einzelregel in diesem Prompt.\n';
  s+='KRITISCH: Die "NÄCHSTE AKTION"/"→ TODO" dieser Phase muss sich klar von bereits bearbeiteten Schritten unterscheiden – wiederhole NIEMALS sinngemäß denselben nächsten Schritt wie eine vorherige Phase. Wenn ein Termin laut aktuellen Eingaben bereits stattgefunden hat, muss die neue Aktion einen Schritt WEITER sein, nicht denselben wiederholen.\n';
  s+='AUSGABE-REGELN (strikt einhalten):\n';
  s+='- KRITISCHSTE REGEL: Liefere IMMER sofort den vollständigen Output im vorgegebenen Format – auch wenn Informationen fehlen, unsicher oder unvollständig wirken. STELLE NIEMALS eine Rückfrage VOR dem Output und warte NICHT auf eine Antwort, bevor du lieferst. Fehlende oder unsichere Daten gehören in die Kennzeichnung ANNAHME/KLÄREN oder eine etwaige Rückfragen-Sektion AM ENDE des Outputs, NIEMALS als eigene Frage oder Meta-Kommentar davor. Du bekommst in diesem Schritt keine Antwort auf eine Vorab-Frage – also stelle keine, sondern arbeite mit dem was im Feld steht. VERBOTENE Satzanfänge: "Ich verstehe die Aufgabe", "Allerdings stelle ich fest", "Mir fehlen", "Bevor ich", "Ich muss zunächst" – beginne IMMER direkt mit dem ersten Element des vorgegebenen Output-Formats.\n';
  s+='- Nutze vorhandene Informationen – keine Nachfragen\n';
  s+='- Maximal 5 Punkte pro Abschnitt\n';
  s+='- Jeder Punkt: 1-2 Sätze, direkt und konkret\n';
  s+='- Kein Fließtext, keine langen Erklärungen\n';
  s+='- Kein Markdown: keine **, keine ###, keine ---\n';
  s+='- Nur Deutsch\n';
  s+='- Keine Einleitung, kein Fazit\n';
  s+='- KRITISCH – EIN BULLET = EINE AUSSAGE: Ein Bullet darf NIEMALS mehrere Aussagen verketten – egal ob mit Komma, "und", einem "="-Zeichen, oder einem Relativsatz ("der/die/das..."). NICHT erlaubt z.B.: "6 Arbeitstage manuelle Konsolidierung pro Preisänderung = messbarer Schmerz, der monatlich anfällt und regelmäßig zu Fehlentscheidungen führt" (das sind DREI Aussagen in einem Bullet: Zeitaufwand, Häufigkeit, Konsequenz). Stattdessen IMMER in einzelne Bullets aufteilen: "6 Arbeitstage pro Preisänderung" / "Konsolidierung erfolgt manuell" / "Fehler führen zu Fehlentscheidungen". Jeder Bullet maximal 6-8 Wörter, ein einziger Gedanke, in wenigen Sekunden erfassbar. Wenn du beim Formulieren eines Bullets ein "=", "und", "der/die/das" oder ein Komma zur Verbindung zweier Sachverhalte einsetzen willst, ist das ein sicheres Zeichen, dass es zwei Bullets werden müssen.\n';
  s+='- KRITISCH – SOFORTIGER AHA-EFFEKT, KEINE INTERPRETATION NÖTIG: Jeder Bullet der Standardansicht muss beim Lesen innerhalb weniger Sekunden sofort verstanden werden – der Nutzer darf NIEMALS selbst nachdenken oder interpretieren müssen, um die Bedeutung zu erfassen. Konkreter Test: Würde ein Vertriebsleiter beim Lesen sofort "Genau." oder "Aha." denken – oder eher "Moment, was meint die KI damit?" Im zweiten Fall: Bullet konkreter formulieren oder die Begründung/den Zusammenhang stattdessen in den Detailbereich (nach ###DETAILS###) verschieben. Begründungen, Herleitungen und Erläuterungen gehören NIEMALS in die Standardansicht, NUR in "Mehr Details".\n';
  s+='- KRITISCH – URSACHE UND WIRKUNG NICHT IN EINEM BULLET VERMISCHEN: Auch ohne Komma/"und"/"=" kann ein Bullet zwei Aussagen enthalten, wenn er Ursache und Wirkung gemeinsam nennt, auch über "weil"/"da"/"dadurch" oder zwei verschiedene Fähigkeiten/Probleme in einem Satz. Beispiele aus der Praxis:\n';
  s+='  ❌ "Verkäufer können im ERP nicht eigenständig auf Lieferfähigkeit und offene Posten zugreifen." → ✅ "Verkäufer haben keinen ERP-Zugriff." + "Lieferfähigkeit ist nicht sichtbar."\n';
  s+='  ❌ "Lieferfähigkeits-Auskünfte dauern 10 Minuten bis einen Tag, weil Innendienst und Produktion manuell abgefragt werden." → ✅ "Lieferfähigkeit: bis zu 1 Tag." + "Innendienst ist Bottleneck."\n';
  s+='Trenne solche Fälle IMMER in zwei eigene Bullets: einen für die Ursache/das Faktum, einen für die Wirkung/Konsequenz – außer der Kausalzusammenhang selbst ist die eine, pointierte Kernaussage, die in diesem Block tatsächlich gefordert ist. Im Zweifel: aufteilen.\n';
  s+='KRITISCH – DIE STANDARDANSICHT BEANTWORTET NUR VIER FRAGEN: Was wissen wir? Was ist kritisch? Was fehlt? Was ist der nächste Schritt? Mehr nicht. ALLES andere (Begründungen, Zusammenhänge, Interpretationen, Herleitungen, Strategien, ROI-Rechnungen, Demo-Ideen, Vertriebsnotizen) gehört ausschließlich in "Mehr Details". Qualitätsmaßstab: Der Nutzer öffnet das Fenster, liest 10 Sekunden, und kann dann sofort sagen "Opportunity verstanden, größte Risiken verstanden, wichtigste offene Frage verstanden, nächste Aktion verstanden" – ohne einen einzigen Bullet zweimal lesen zu müssen.\n';
  s+='QUALITÄTSREGEL – HANDLUNGSORIENTIERUNG: Jede Phase beantwortet drei Kernfragen in ihrem Output: (1) Was ist die wichtigste Erkenntnis dieser Phase? (2) Was ist das größte verbleibende Risiko? (3) Was ist der nächste Schritt mit der höchsten Wirkung auf den Deal? Diese drei Fragen müssen nach dem Lesen des Outputs klar und sofort beantwortbar sein – nicht durch langes Suchen im Text. KI21 erzeugt keine Berichte, sondern Entscheidungsgrundlagen. Das wichtigste Kriterium für die Qualität einer Ausgabe ist: Kann der Verkäufer nach dem Lesen sofort die nächste richtige Handlung ableiten?\n';
  s+='GLOBALE REGEL 1 – SPONSOR ≠ ENTSCHEIDER: Ein engagierter Ansprechpartner darf NUR dann als Entscheider bezeichnet werden, wenn seine Budget- oder Entscheidungsbefugnis ausdrücklich bestätigt ist. Ist das nicht der Fall, verwende immer: "operativer Sponsor", "fachlicher Sponsor" oder "interner Treiber". NIEMALS automatisch aus einer aktiven Unterstützung eine Entscheidungsbefugnis ableiten. Ein Head of Sales, Director oder Teamleiter kann ein wertvoller Sponsor sein – Entscheider ist er erst wenn explizit bestätigt.\n';
  s+='GLOBALE REGEL 2 – BUDGETSTATUS DIFFERENZIERT AUSWEISEN: Es gibt vier klar unterschiedliche Budgetstufen – (a) Budgetrahmen bekannt (grober Rahmen existiert, aber keine Freigabe), (b) Budget plausibel verfügbar (passender Budgettopf vorhanden, aber nicht zugewiesen), (c) Budgetfreigabe bestätigt (entscheidungsbefugte Person hat Freigabe explizit bestätigt), (d) Investitionsentscheidung getroffen (Kunde ist bereit für diese konkrete Lösung zu zahlen). Wenn nur (a) oder (b) vorliegt: NIEMALS "Budget bestätigt" schreiben. Stattdessen: "Budgetrahmen vorhanden, konkrete Freigabe offen" oder "Budgetverfügbarkeit plausibel, Entscheidungsfreigabe durch GF/CFO ausstehend".\n';
  s+='GLOBALE REGEL 2b – KUNDENBUDGET ≠ ANGEBOTSPREIS: Verwechsle NIEMALS das verfügbare Budget des Kunden mit den Kosten des Angebots. Nutze für Investition und ROI ausschließlich die in "Mein Unternehmen" hinterlegten Angebotsbausteine/Preise oder explizit genannte Angebotspreise. Wenn ein konkreter Angebotsbaustein preislich klar innerhalb/unterhalb des Kundenbudgets liegt, ist Budget-Passung für diesen Baustein KEIN offener Punkt mehr. Schreibe dann NICHT "passt ins Budget?", NICHT "Budgethürde" und NICHT "Budgetfreigabe für [Budgetrahmen] nötig", solange der Budgetrahmen nicht der Angebotspreis ist. Offen bleiben dürfen Umfang, Starttermin, Erfolgskriterien und formale Beauftragung.\n';
  s+='GLOBALE REGEL 2c – PILOT/EINSTIEG NUR BEI ANGEBOTSROLLE: Behandle ein Angebot nur dann als Pilot, Einstieg, Startangebot oder Compact-Angebot, wenn diese Rolle in "Mein Unternehmen"/Angebotsbausteinen ausdrücklich genannt ist (z.B. Pilot, Einstieg, Startangebot, Compact/Kompakt). Leite Pilotstatus NIEMALS nur aus niedrigem Preis ab. Erfinde keine konkrete Pilotdauer (z.B. 4 Wochen, 6 Wochen, 2 Monate), wenn sie nicht ausdrücklich genannt wurde.\n';
  s+='GLOBALE REGEL 2d – PREISPERIODE NICHT ERFINDEN: Trenne einmalige Start-/Projekt-/Compact-Angebote strikt von wiederkehrenden Nutzungs-/Lizenz-/App-Gebühren. Wenn ein Betrag als Startangebot, Einstieg, Compact, einmalig oder inklusive erster Nutzungsmonate beschrieben ist, darf er NIEMALS als monatliche Investition dargestellt werden. Wiederkehrende Gebühren nur dann als monatlich/jährlich ausweisen, wenn pro Monat/pro User/pro Jahr ausdrücklich genannt ist. Bei Kombinationen: erst Startangebot nennen, danach laufende Gebühr separat berechnen. Beispiel: 2.900 € Startangebot inkl. 6 Monate App; danach 49 €/User/Monat bei 15 Usern = 735 €/Monat.\n';
  s+='GLOBALE REGEL 2e – ROI NICHT ERRECHNEN WENN VERMEIDUNGSQUOTE FEHLT: Wenn der wirtschaftliche Nutzen von einer noch nicht validierten Vermeidungsquote/Wirkungsquote abhängt, darfst du keinen jährlichen Nutzenbetrag daraus berechnen und keine Prozentbandbreite nennen. Schreibe stattdessen: Laufender Nutzen noch zu validieren; ROI nicht belastbar berechenbar; Vermeidungsquote/Wirkung mit echten Deals messen.\n';
  s+='GLOBALE REGEL 3 – SPÄTE PHASEN BEI OFFENER VALIDIERUNG KENNZEICHNEN: Wenn finale Entscheider (GF/CEO/CFO), ROI, wirtschaftliche Zielgröße oder Entscheidungsprozess noch nicht validiert sind, dürfen Phase 4 (Business Case) und Phase 5 (Angebot & Abschluss) nicht wie belastbarer Angebots- oder Abschlussstatus wirken. In diesem Fall MUSS die Ausgabe zu Beginn klar kennzeichnen: "⚠ VORBEREITUNGSSTAND: Diese Analyse ist vorbereitend – [konkrete offene Punkte] fehlen noch." Dann trotzdem vollständige Inhalte ausgeben – aber als Vorbereitung, nicht als abschlussreifen Stand.\n';
  s+='GLOBALE REGEL 4 – ALTE HYPOTHESEN DURCH BESTÄTIGTE ERKENNTNISSE ERSETZEN: Wenn im Kontext Kunde (Ergänzungen) neuere, konkretere oder bestätigte Informationen vorliegen, die einer früheren Hypothese widersprechen, MUSS die Hypothese ersetzt werden. Beispiel: Steht in den Ergänzungen ein bestätigter wirtschaftlicher Schaden durch das Problem, darf nicht gleichzeitig stehen "Keine bestätigten Schmerzen aus direktem Gespräch." Stattdessen: "Bestätigter Schmerz: [Problem] verursacht [Betrag/Rolle]." Ebenso: Wenn Ergänzungen eine Entscheidungsbefugnis nennen, darf nicht parallel stehen "Entscheider noch unklar" – sondern: "Entscheiderstatus bestätigt; noch offene Punkte nur dort nennen, wo sie wirklich offen sind."\n';
  s+='EVIDENZLABELS (verbindlich für alle KI21-Ausgaben): Verwende exakt diese fünf Labels, niemals andere Formulierungen:\n• BESTÄTIGT – Kunde hat dies explizit genannt oder schriftlich bestätigt.\n• ANNAHME – Schlussfolgerung aus vorliegenden Informationen, noch nicht direkt bestätigt.\n• ZU KLÄREN – Information fehlt, muss im nächsten Gespräch erfragt werden.\n• NICHT BEKANNT – Kein Hinweis in den vorliegenden Daten, noch kein Gespräch darüber.\n• ÜBERHOLT – Diese Aussage war früher gültig, wurde aber durch neuere Ergenntnisse ersetzt. Nur verwenden wenn ein expliziter Widerspruch zu einer früheren Aussage vorliegt.\nKritische Konsistenzregel: BESTÄTIGT und ZU KLÄREN dürfen nicht für dieselbe Information gleichzeitig vergeben werden. Wenn neue Ergänzungen eine ZU KLÄREN-Frage beantworten, ersetzt BESTÄTIGT den bisherigen Status – nie beide parallel.\n';
  s+='- KRITISCH – REIHENFOLGE INNERHALB JEDER BULLET-LISTE: Sortiere IMMER nach Relevanz für die Kaufentscheidung: zuerst Schmerz/Bedarf (quantifiziert, wenn möglich), dann Risiko, zuletzt allgemeiner Kontext. Die wichtigste, konkreteste Erkenntnis steht IMMER an Position 1 – niemals ein genereller Kontext-Punkt vor einem konkreten Schmerzpunkt.\n';
  s+='- Erkenntnisse als einfache Bullets, OHNE BESTÄTIGT:/ANNAHME:/KLÄREN:-Präfix in der Standardausgabe (diese Kennzeichnung nur noch im Detailbereich nach ###DETAILS### verwenden, falls das jeweilige Phasenformat das vorsieht)\n';
  s+='- KRITISCH: Die abschließende Aktionszeile darf NUR EINE einzige, priorisierte Handlung enthalten – KEINE Aufzählung mehrerer Aktionen mit "und" oder Kommas (z.B. NICHT "Workshop vereinbaren und Unterlagen vorbereiten und Entscheider kontaktieren"). Wenn mehrere Dinge zu tun wären, wähle die EINE wichtigste aus, die diese Woche passieren muss – alles andere ergibt sich danach von selbst oder gehört in den Detailbereich.\n';
  s+='- Am Ende GENAU EINE Aktionszeile gemäß dem unten vorgegebenen Phasenformat (z.B. "NÄCHSTER SCHRITT DIESE WOCHE:")\n';
  s+='- KRITISCH: Wenn ein Feld "Frage: ___ | Antwort: ___" oder "Antwort: ___" enthält, ist "___" ein PLATZHALTER für eine noch unbeantwortete Frage. Schreibe NIEMALS eine erfundene Antwort dorthin – das "___" muss exakt so im Output stehen bleiben.\n';
  s+='- KRITISCH – ALTE KI-ERGEBNISSE NICHT ALS FAKTENQUELLE VERWENDEN: Frühere KI-Ausgaben sind nur Orientierung, um den roten Faden zu verstehen und Wiederholungen zu vermeiden. Zahlen aus früheren KI-Ergebnissen sind KEINE bestätigten Kundenzahlen. Wenn eine Zahl nur in BISHERIGE KI-ERGEBNISSE vorkommt, aber nicht in aktuellen Eingaben, Antworten, Ergänzungen oder CRM-Daten erneut bestätigt wird, darf sie nicht als BESTÄTIGT, Schaden, Umsatzverlust, Budget oder ROI-Basis erscheinen. Nutze stattdessen: "frühere Annahme – aktuell neu zu validieren" oder lasse die Zahl weg. Erfinde NIEMALS eine neue Periode, Rolle oder präzisere Version einer alten Zahl.\n';
  s+='- KRITISCH – PERIODE UND ROLLE VON GELDBETRÄGEN NICHT ERFINDEN: Wenn bei einem Betrag nicht klar ist, ob er monatlich, jährlich, einmalig, Deal-Wert, Umsatz, Marge, Schaden, Aufwand, Budget oder Angebotspreis ist, darf keine Rolle und keine Periode ergänzt werden. Schreibe: "Betrag genannt, Rolle und Zeitraum noch klären." Ein Deal-Wert ist nicht automatisch verlorener Umsatz. Ein verlorener Deal ist nicht automatisch vermeidbarer Schaden.\n';
  // v4.193: Alte KI-Ergebnisse dürfen Phase 1 nicht kontaminieren.
  // Für spätere Phasen sind sie nur Orientierungs-/Verlaufswissen, niemals Faktenquelle.
  if(currentSitId!==0){
    const phaseNames=['Qualifizierung','Bedarfsanalyse & Demo','Termin nachbereiten','Nutzen-Kosten-Analyse','Angebot & Abschluss'];
    const aid=LS.get('ki21_aid',null);
    if(aid){
      let prevResults='';
      const limit=(currentSitId!==undefined)?currentSitId:5;
      for(let i=0;i<limit;i++){
        const d=LS.get('ki21_st_'+aid+'_'+i,{});
        if(d.result&&d.result.trim()){
          const {main:prevMain}=splitDetailsFromResult(d.result);
          // An Zeilengrenze abschneiden statt mitten im Satz/Label, damit Kennzeichnungen wie ANNAHME/KLÄREN nicht verloren gehen
          let snippet=prevMain;
          if(snippet.length>600){
            const cut=snippet.lastIndexOf('\n',600);
            snippet=snippet.substring(0,cut>0?cut:600)+'\n[...]';
          }
          prevResults+='\n--- '+phaseNames[i]+' (alte KI-Ausgabe, NICHT als Faktenquelle verwenden) ---\n'+snippet+'\n';
        }
      }
      if(prevResults)s+='\nBISHERIGE KI-ERGEBNISSE – NICHT ALS FAKTENQUELLE VERWENDEN. Zahlen aus diesem Block dürfen nur übernommen werden, wenn dieselbe Zahl in aktuellen Eingaben, Antworten, Ergänzungen oder CRM-Daten erneut bestätigt wird. Nicht wiederholen, nicht zusammenfassen, nicht als BESTÄTIGT behandeln:'+prevResults+'\n';
    }
  }
  if(cust.firma)s+='Kunde: '+cust.firma+'\n';
  if(cust.ap)s+='Ansprechpartner: '+cust.ap+'\n';
  if(cust.branche)s+='Branche: '+cust.branche+'\n';
  if(cust.ma)s+='Mitarbeiter: '+cust.ma+'\n';
  if(cust.um){
    // Format large numbers to Mio. €
    let umDisplay=cust.um;
    const umNum=parseFloat(String(cust.um).replace(/[^0-9.]/g,''));
    if(umNum>=1000000)umDisplay=(umNum/1000000).toFixed(1)+' Mio. €';
    else if(umNum>=1000)umDisplay=(umNum/1000).toFixed(1)+' Tsd. €';
    s+='Umsatz: '+umDisplay+'\n';
  }
  // Phasenbezogene Ergänzungen: kk_0 bis kk_{currentSitId}
  // Jede Phase sieht nur den Wissensstand der sie selbst + alle früheren Phasen.
  // Migration: alter globaler ki21_kk_{accId}-Key wird als Slot 0 behandelt.
  {
    const aid2=LS.get('ki21_aid',null);
    if(aid2){
      const limit2=(currentSitId!==undefined)?currentSitId+1:5;
      let kkCombined='';
      for(let i=0;i<limit2;i++){
        // Prüfe phasenbezogenen Slot
        const slotVal=LS.get('ki21_kk_'+aid2+'_'+i,null);
        if(slotVal&&slotVal.trim())kkCombined+=slotVal.trim()+'\n';
      }
      // Migration: alter globaler Key → nur verwenden wenn noch kein Slot vorhanden
      if(!kkCombined){
        const legacyKk=LS.get('ki21_kk_'+aid2,'');
        if(legacyKk&&legacyKk.trim())kkCombined=legacyKk.trim();
      }
      if(kkCombined.trim())s+='\nKontext Kunde:\n'+kkCombined.trim()+'\n';
    }
  }
  if(mu&&mu.profil)s+='\nMein Unternehmen:\n'+mu.profil+'\n';
  if(mu&&mu.bausteine)s+='\nAngebotsbausteine:\n'+mu.bausteine+'\n';
  try{
    const aidEco=LS.get('ki21_aid',null);
    if(aidEco && (currentSitId===3 || currentSitId===4)){
      const ecoCtx=buildEconomicEffectsContextV4245(aidEco);
      if(ecoCtx)s+='\nEINGETRAGENE WIRTSCHAFTLICHE EFFEKTE (manuell erfasst, Benchmarks/Hinweise nicht eingerechnet):\n'+ecoCtx+'\n';
    }
  }catch(e){}
  const intelData=LS.get('ki21_intelligence',{});
  if(intelData&&intelData.inhalt)s+='\nKI21 Intelligence (verdichtete Business Patterns):\n'+intelData.inhalt+'\n';
  if(stk)s+='\nZusätzlicher Kontext:\n'+stk+'\n';
  return s+'--- ENDE KONTEXT ---\n\n';
}

SPIN-FRAGEN FÜR DIE BEDARFSANALYSE – STRIKTE SPIN-METHODOLOGIE. Bevor du jede Frage schreibst: prüfe selbst, ob sie dem Typ entspricht. Wenn nicht, schreibe sie um.
KRITISCH – SPIN-FRAGEN KURZ UND SAUBER: Jede SPIN-Frage maximal 18 Wörter. Keine Frage darf zwei Fragen in einer enthalten. Keine Beraterbegriffe. Keine Begriffe wie Buying Window, Competition, Sales Methodology oder Business Case, wenn sie nicht vom Kunden selbst genannt wurden. Situation fragt Ist-Zustand, Problem fragt Störung, Implication fragt Konsequenz, Need-Payoff fragt Nutzen.

S (SITUATION) = FAKTENFRAGEN. Sammle nur nachprüfbare Fakten über den Ist-Zustand.
✅ Erlaubt: "Wie viele Verkäufer nutzen heute das CRM aktiv?" / "Wie läuft die Angebotserstellung heute ab?" / "Welche Systeme werden im Außendienst genutzt?"
❌ VERBOTEN: Zielbilder ("Was wären Ihre größten Hebel?"), Interpretationen, Meinungsfragen, Lösungsvorschläge, Framing wie "Innovation im Vertrieb" – all das ist KEINE Situationsfrage.

P (PROBLEM) = SCHWIERIGKEITEN UND ENGPÄSSE. Lass den Kunden selbst benennen, was ihn stört.
✅ Erlaubt: "Wo verliert Ihr Team am meisten Zeit?" / "Was läuft bei der Angebotserstellung am häufigsten schief?" / "Welche Systemprobleme nerven Ihren Außendienst am meisten?"
❌ VERBOTEN: Lösungsvalidierung ("Würde Feature X helfen?"), Hypothesen über Lösungen, Bestätigung von Annahmen des Verkäufers – das gehört zu N, nicht zu P.

I (IMPLICATION) = KONSEQUENZEN DES PROBLEMS. Mach die Kosten/Folgen des ungelösten Problems sichtbar.
✅ Erlaubt: "Was passiert, wenn ein Angebot einen Tag zu spät kommt?" / "Wie viele Abschlüsse verzögern sich dadurch?" / "Was kostet diese manuelle Arbeit pro Woche in Stunden?"
✅ PFLICHT: Mindestens eine I-Frage muss EXPLIZIT nach Nicht-Handeln fragen und eine klare Formulierung enthalten wie: "Was passiert, wenn ihr das Problem nicht löst?" oder "Was passiert, wenn ihr nichts verändert?". Eine reine Bleibt-Frage ist zu schwach, wenn "nicht lösen / nichts verändern" fehlt.
✅ PFLICHT: Mindestens eine I-Frage muss die wirtschaftliche Wirkung quantifizieren: Aufwand, Schaden, Risiko oder entgangenen Nutzen als Euro-Wert pro Zeitraum erfragen, z.B. "Welcher monatliche Aufwand entsteht dadurch ungefähr?" oder "Welchen Euro-Wert würdet ihr pro Monat ansetzen?". Keine Scheingenauigkeit erzwingen; wenn der Kunde keinen Wert nennen kann, bleibt der Wert offen.
✅ FORECAST-HEBEL KONTEXTABHÄNGIG NUTZEN: Stelle Forecast-Fragen nur, wenn das eigene Angebot Forecast/Opportunity Health/Pipeline-/CRM-/Sales-Qualifizierung/Discovery/Vertriebssteuerung adressiert, Mein Unternehmen KI21 ist oder der Kunde explizit Forecast-Probleme nennt. Dann nutze auch kleine Anhaltspunkte (schwache Qualifizierung, späte Disqualifikation, unklare Opportunity-Bewertung, CRM-Datenqualität), um Forecast-Genauigkeit anzusprechen. Wenn dieser Kontext fehlt: Forecast NICHT künstlich einbauen.
✅ KEINE ERFUNDENE PRÄZISION: Wenn du nach Start, Pilot, Validierung oder ROI fragst, keine unbestätigten Quoten, Teilnehmerzahlen oder Zeiträume erfinden. Frage nach Vermeidungsquote/Messkriterien statt eine Quote vorzuschlagen.
❌ VERBOTEN: Lösungsvorschläge, Features nennen.

N (NEED-PAYOFF) = NUTZEN SICHTBAR MACHEN. Der Kunde beschreibt, was besser wäre.
✅ Erlaubt: "Was würde sich für Ihr Team ändern, wenn diese Information sofort verfügbar wäre?" / "Wie würde sich das auf Ihre Abschlussquote auswirken?" / "Was würde sich verbessern, wenn jede Opportunity nach denselben Health-Kriterien bewertet würde?"
❌ VERBOTEN: Lösungsvalidierung ("Wäre unser Produkt dann das Richtige?"), Features nennen.

- SAAS-/LIZENZPREISE SIND STANDARDMÄSSIG JÄHRLICH WIEDERKEHREND (ARR): Im Software-/SaaS-Kontext gilt: Wenn der Nutzer Begriffe wie Lizenzpreis, Jahreslizenz, User-Lizenz, Subscription, SaaS, Mietpreis, Jahrespreis oder ähnliches nennt, ist das eine jährlich wiederkehrende Zahlung (ARR) — NICHT eine Einmalinvestition. Typische Konsequenz: Ein Lizenzpreis von 49.900 €/Jahr muss als 49.900 €/Jahr in der Investitionsrechnung erscheinen, NICHT als Einmalbetrag. Der Business Case lautet dann: Jährlicher Nutzen vs. jährliche Lizenzkosten. CRITICAL: Wenn jährlicher Nutzen und jährliche Lizenzkosten vorliegen, darfst du nur dann einen Netto-Nutzen formulieren, wenn beide Beträge eindeutig derselben Periode und Rolle zugeordnet sind — kein klassischer "Amortisationszeitraum", da die Kosten wiederkehrend sind. Formuliere in solchen Fällen: "Jährlicher Netto-Nutzen: X €/Jahr (Nutzen Y €/Jahr minus Lizenz Z €/Jahr)". Wenn unklar ist ob eine genannte Zahl jährlich oder einmalig ist, stelle in den offenen Punkten eine Klärfrage, z.B.: "Bezieht sich die genannte Budget-Grenze auf jährliche Lizenzkosten oder auf einmalige Projektkosten?"
- KUNDENBUDGET UND ANGEBOTSPREIS STRICT TRENNEN: Ein genannter Budgetrahmen ist NICHT automatisch der Preis des Angebots. Rechne ROI und Investition ausschließlich mit den tatsächlichen Kosten aus den Angebotsbausteinen/Angebotspreisen. Wenn ein konkreter Angebotsbaustein preislich klar innerhalb/unterhalb des Kundenbudgets liegt, ist Budget-Passung für diesen Baustein KEIN offener Punkt mehr. Der offene Punkt ist dann NICHT Budget-Fit, sondern Umfang, Starttermin, Erfolgsmessung, Entscheidungs-/Bestellprozess. Behandle ein Angebot nur dann als Pilot/Einstieg/Startangebot, wenn diese Rolle im Angebotsbaustein ausdrücklich genannt ist; erfinde keine Pilotrolle und keine konkrete Pilotdauer.
- PREISMODELL: Trenne Preisperioden sichtbar. Einmalige Start-/Projekt-/Compact-Angebote bleiben als Startangebot/Einmalkosten stehen und dürfen nicht als monatliche Investition bezeichnet werden. Wiederkehrende SaaS-/Lizenz-/App-Gebühren werden separat monatlich oder jährlich ausgewiesen, nur wenn die Periode ausdrücklich genannt ist. Eine geglättete Monatsrate über 36 Monate ist nur als Zusatzbetrachtung erlaubt und muss klar als "geglättete Vergleichsrate" gekennzeichnet werden – sie ersetzt nie die echte Preislogik. Bei Kombimodellen zuerst nennen: Startangebot inkl. enthaltener Nutzung, danach laufende Gebühr.
- KEIN ROI-RECHNER: KI21 darf aus gemischten Zahlen keinen scheinexakten Business Case berechnen. Keine automatischen Monatsraten, Amortisationen, Faktoren oder "X vs. Y"-Rechnungen, wenn Zahlenrollen nicht ausdrücklich klar sind. Aufgabe ist: Nutzenhebel, bekannte Beträge, offene Annahmen und Validierungsfragen sauber darstellen.
- BRANCHENHYPOTHESEN IN DER ROI-PHASE: Für Vermeidungsquoten, Discovery-Fehlerquoten oder Wirkungsquoten darf eine Benchmark-Bandbreite nur als unvalidierte Orientierung erscheinen. Bilde daraus KEINEN Arbeitswert, KEINEN Mittelwert und KEINE Nutzen-/ROI-Rechnung, solange die Quote nicht kundenspezifisch bestätigt ist.
- ARBEITSWERT STATT VOLLER RANGE: Wenn du eine Benchmark-Bandbreite nennst (z.B. "300-600 Stunden/Jahr"), rechne für die eigentliche ROI-Berechnung NICHT mit der ganzen Range, sondern mit einem konkreten Arbeitswert – standardmäßig dem arithmetischen Mittelwert (z.B. "450 Stunden/Jahr"). Weiche davon nur ab, wenn das Unternehmensprofil eine plausible Anpassung rechtfertigt (z.B. mehrere Werke/Sparten → Wert nach oben anpassen; sehr kleines Unternehmen → nach unten), und nenne dann explizit den Grund. Zeige IMMER beides: die Range UND den verwendeten Arbeitswert (z.B. "Typische Range: 300-600 Stunden/Jahr → für diese Berechnung verwendet: 450 Stunden/Jahr (Mittelwert)"). Ergänze am Ende des Outputs den Hinweis: "Die Berechnung basiert auf anonymisierten Erfahrungswerten vergleichbarer Unternehmen. Sobald belastbare unternehmensspezifische Kennzahlen vorliegen, sollten diese die Annahmen ersetzen."

// ── CLAUDE API ─────────────────────────────────────────────
async function callClaude(prompt, onStream){
  const apiKey=LS.get('ki21_apikey','');
  if(!apiKey){alert('Bitte API Key unter ⚙ hinterlegen.');return null;}
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',
      max_tokens:20000,
      stream:true,
      tools:[{type:'web_search_20250305',name:'web_search',max_uses:6}],
      messages:[{role:'user',content:prompt}]
    })
  });
  if(!resp.ok){const err=await resp.json();throw new Error(err.error?.message||'API Fehler '+resp.status);}
  const reader=resp.body.getReader();
  const decoder=new TextDecoder();
  let fullText='';
  let blockText='';
  while(true){
    const {done,value}=await reader.read();
    if(done)break;
    const chunk=decoder.decode(value,{stream:true});
    const lines=chunk.split('\n');
    for(const line of lines){
      if(line.startsWith('data: ')){
        const data=line.slice(6);
        if(data==='[DONE]')continue;
        try{
          const parsed=JSON.parse(data);
          if(parsed.type==='content_block_start'&&parsed.content_block?.type==='tool_use'){
            if(onStream)onStream(stripMd(fullText)+'\n🔍 Suche aktuelle Informationen...\n');
          }
          if(parsed.type==='content_block_start'&&parsed.content_block?.type==='text'){
            blockText='';
          }
          if(parsed.type==='content_block_delta'&&parsed.delta?.text){
            blockText+=parsed.delta.text;
            if(onStream)onStream(stripMd(fullText+blockText));
          }
          if(parsed.type==='content_block_stop'){
            if(blockText){fullText+=(fullText?'\n':'')+blockText;blockText='';}
          }
        }catch(e){}
      }
    }
  }
  if(blockText){fullText+=(fullText?'\n':'')+blockText;}
  return fullText;
}

function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(tag==='button' && (!attrs || attrs.type==null))el.setAttribute('type','button');
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')el.className=v;
    else el.setAttribute(k,v);
  });
  children.flat().forEach(c=>{
    if(c==null)return;
    el.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return el;
}

function modal(title,content,onClose){
  const bg=h('div',{className:'modal-bg'});
  bg.addEventListener('click',e=>{if(e.target===bg){bg.remove();if(onClose)onClose();}});
  const box=h('div',{className:'modal-box'},
    h('div',{className:'modal-handle'}),
    h('div',{className:'modal-title'},title),
    content
  );
  bg.appendChild(box);
  document.body.appendChild(bg);
  return bg;
}

function btn(label,className,onClick){
  const b=h('button',{className,onclick:onClick},label);
  return b;
}

function stripMd(text){
  return text
    .replace(/#{1,6}\s+/g,'')
    .replace(/\*\*\*([^*]+)\*\*\*/g,'$1')
    .replace(/\*\*([^*]+)\*\*/g,'$1')
    .replace(/\*([^*]+)\*/g,'$1')
    .replace(/^---+$/gm,'')
    .replace(/^===+$/gm,'')
    .replace(/^>\s/gm,'')
    .replace(/`([^`]+)`/g,'$1')
    .trim();
}

function getPhaseScore(sitId){
  const aid=LS.get('ki21_aid',null);
  if(!aid)return null;
  const data=LS.get('ki21_st_'+aid+'_'+sitId,{});
  if(!data.result)return null;
  const match=data.result.match(/(\d+)\s*\/\s*10/);
  if(match){
    const s=parseInt(match[1]);
    return s>=1&&s<=10?s:null;
  }
  return null;
}

function getActiveScore(){
  const aid=LS.get('ki21_aid',null);
  if(!aid)return null;
  return LS.get('ki21_score_'+aid,null);
}

function getScoreColor(){
  const s=getActiveScore();
  if(!s)return '#8b949e';
  if(s>=7)return '#2ea043';
  if(s>=4)return '#d29922';
  return '#f85149';
}

function getScoreBg(){
  const s=getActiveScore();
  if(!s)return 'transparent';
  if(s>=7)return 'rgba(46,160,67,.2)';
  if(s>=4)return 'rgba(210,153,34,.2)';
  return 'rgba(248,81,73,.2)';
}

function getScoreLabel(){
  const s=getActiveScore();
  if(!s)return '';
  return s+'/10';
}

function extractBegruendung(text){
  const m=text.match(/Begründung:\s*(.+)/);
  if(m)return m[1].trim().split('\n')[0];
  const pipeMatch=text.match(/\d+\s*\/\s*10\s*\|\s*(.+)/);
  if(pipeMatch)return pipeMatch[1].trim().split('\n')[0];
  const fallback=text.match(/Empfehlung:\s*(.+)/);
  if(fallback)return fallback[1].trim().split('\n')[0];
  return '';
}

    if(begruendung)LS.set('ki21_score_reason_'+aid,begruendung);
  }
}
