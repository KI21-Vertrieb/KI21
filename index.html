<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="dark">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KI21</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;
  --border:#30363d;--text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --fs-input:12px;
}
body.light{
  --bg:#f6f8fa;--bg2:#ffffff;--bg3:#f0f2f5;
  --border:#d0d7de;--text:#1f2328;--text2:#656d76;--text3:#9198a1;
}
html,body{background:var(--bg);color:var(--text);min-height:100vh;font-family:'DM Sans',sans-serif;}
#app{min-height:100vh;background:var(--bg);}
.nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 14px;height:44px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-brand{font-size:16px;font-weight:800;color:var(--text);cursor:pointer;border:none;background:transparent;font-family:'DM Sans',sans-serif;}
.nav-right{display:flex;gap:5px;align-items:center;}
.subnav{background:var(--bg);border-bottom:1px solid var(--border);padding:6px 14px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;}
.subnav-badge{background:rgba(255,107,0,.15);color:#ff6b00;border-radius:50%;
  width:18px;height:18px;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;flex-shrink:0;}
.subnav-text{font-size:11px;color:var(--text2);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.settings-group-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--text3);margin-bottom:2px;}
.phase-badge{font-size:9px;font-weight:700;border-radius:4px;padding:2px 6px;white-space:nowrap;flex-shrink:0;cursor:pointer;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
.phase-badge-done{background:rgba(46,160,67,.15);color:#2ea043;}
.phase-badge-progress{background:rgba(255,107,0,.15);color:#ff6b00;}
.phase-badge-empty{background:rgba(139,148,158,.1);color:var(--text3);}
.btn{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:5px;
  padding:4px 8px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-o{background:#ff6b00;border:none;color:#fff;border-radius:8px;padding:7px 12px;
  font-size:10.5px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;}
.btn-o:disabled{background:#484f58;cursor:not-allowed;}
.cust-btn{background:rgba(255,107,0,.12);border:1px solid rgba(255,107,0,.3);border-radius:5px;
  padding:3px 8px;cursor:pointer;}
.cust-label{font-size:8px;color:#8b949e;text-transform:uppercase;letter-spacing:1px;line-height:1.3;}
.cust-val{font-size:11px;font-weight:700;color:#ff6b00;line-height:1.3;max-width:180px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.wrap{padding:12px 14px;max-width:500px;margin:0 auto;}
.hero{display:flex;align-items:baseline;flex-wrap:wrap;gap:6px;margin:10px 0 16px;}
.hero-a{font-weight:800;font-size:20px;color:var(--text);}
.hero-b{font-family:'DM Serif Display',serif;font-size:20px;color:#ff6b00;}
.sit-row{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;padding:11px 12px;margin-bottom:5px;cursor:pointer;transition:border-color .15s;}
.sit-row:hover{border-color:#ff6b00;}
.sit-icon{font-size:20px;width:28px;text-align:center;flex-shrink:0;}
.sit-phase{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:1px;}
.sit-title{font-size:13px;font-weight:700;color:var(--text);}
.sit-arrow{color:var(--text3);font-size:16px;}
.tagline{margin-top:14px;text-align:center;font-size:11px;color:var(--text3);}

/* Home Premium Redesign (v4.76) â pixelnahe Umsetzung der neuen Designreferenz, NUR Hero-Card.
   Reine Darstellung: Werte aus bereits existierenden Funktionen/Daten
   (getOpportunityHealth, cust.branche/ma/um/ap, getPhaseStatus). Keine neue Business-Logik.
   Platzhalter ("â") fÃžr Felder ohne Datenmodell-Entsprechung (Erwarteter Abschluss, Potenzial, Verantwortlich). */
.home-greeting{font-size:12.5px;font-weight:600;color:var(--text2);margin:8px 0 8px;}
.home-hero{background:var(--bg2);border:1px solid var(--border);border-radius:13px;
  padding:11px;margin-bottom:10px;}
.home-hero-body{display:flex;flex-direction:column;gap:8px;}
.home-hero-colL{min-width:0;}
.home-hero-colR{min-width:0;display:flex;flex-direction:column;align-items:stretch;}
.home-hero-label{font-size:8.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  color:var(--text3);margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.home-info-dot{color:var(--text3);font-size:9px;cursor:default;}
.home-hero-id{display:flex;align-items:flex-start;gap:8px;cursor:pointer;}
.home-hero-icon{width:30px;height:30px;border-radius:7px;background:var(--bg3);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;}
.home-hero-firma{font-size:15px;font-weight:800;color:var(--text);overflow-wrap:break-word;word-break:break-word;letter-spacing:-.2px;}
.home-hero-firma.placeholder{color:var(--text2);font-weight:600;font-size:12px;}
.home-hero-meta{font-size:9.5px;color:var(--text2);margin-top:2px;line-height:1.45;}
.home-hero-tag{display:inline-block;margin-top:4px;font-size:8px;font-weight:700;
  background:rgba(255,107,0,.14);color:#ff6b00;border-radius:5px;padding:2px 6px;}
.home-fact-list{margin-top:7px;border-top:1px solid var(--border);padding-top:6px;}
.home-fact-row{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:2.5px 0;font-size:9.5px;}
.home-fact-label{display:flex;align-items:center;gap:6px;color:var(--text2);}
.home-fact-icon{font-size:9.5px;width:12px;text-align:center;flex-shrink:0;opacity:.8;}
.home-fact-val{color:var(--text);font-weight:700;}
.home-health-bar-wrap{width:100%;}
.home-health-bar-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:5px;}
.home-health-score{font-size:15px;font-weight:800;line-height:1;color:var(--text);}
.home-health-score-unit{font-size:9px;font-weight:700;color:var(--text2);margin-left:2px;}
.home-health-track{width:100%;height:6px;border-radius:4px;background:var(--bg3);overflow:hidden;}
.home-health-fill{height:100%;border-radius:4px;}
.home-health-label{font-size:10px;font-weight:800;margin-top:5px;}
.home-health-sub{font-size:8.5px;color:var(--text2);margin-top:1px;}
.home-next-step{border-top:1px solid var(--border);margin-top:8px;padding-top:8px;}
.home-next-step-top{display:flex;align-items:flex-start;gap:8px;}
.home-next-icon{width:24px;height:24px;border-radius:50%;background:rgba(255,107,0,.12);
  display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.home-next-eyebrow{font-size:8.5px;color:var(--text3);}
.home-next-title2{font-size:11.5px;font-weight:800;color:var(--text);margin-top:1px;}
.home-next-desc2{font-size:9px;color:var(--text2);margin-top:2px;line-height:1.3;}
.home-next-cta-col{display:flex;flex-direction:column;align-items:stretch;gap:4px;
  margin-top:8px;}
.home-next-cta-btn{background:#ff6b00;border:none;color:#fff;border-radius:7px;padding:6px 12px;
  font-size:10.5px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;width:100%;}
.home-next-cta-btn:hover{background:#e25f00;}
.home-next-link{background:none;border:none;color:#ff6b00;font-size:9.5px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center;width:100%;}
/* Ab ~480px (Tablet/Desktop-Breite, wie in der Designreferenz): CTA-Spalte rÃžckt neben den
   Text statt darunter. Unter dieser Breite (reales iPhone) bleibt es gestapelt, da dort fÃžr
   3 Spalten nebeneinander nicht genug Platz ist (siehe vorheriger Umbruch-Bug). */
@media (min-width:480px){
  .home-next-step{display:flex;align-items:flex-start;gap:16px;}
  .home-next-step-top{flex:1;min-width:0;}
  .home-next-cta-col{flex-shrink:0;margin-top:0;min-width:150px;}
}

.home-section-label{font-size:8.5px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;
  color:var(--text3);margin:2px 0 6px;}
/* Cockpit Hauptscreen (v4.121) */
.cockpit-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 8px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;}
.cockpit-header-left{display:flex;flex-direction:column;min-width:0;flex:1;}
.cockpit-brand{font-size:11px;font-weight:800;color:var(--text3);letter-spacing:.5px;margin-bottom:1px;}
.cockpit-brand span{color:#ff6b00;}
.cockpit-opp-name{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px;}
.cockpit-opp-placeholder{font-size:14px;color:var(--text3);font-weight:400;}
.cockpit-header-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.cockpit-score-badge{font-size:12px;font-weight:800;padding:4px 10px;border-radius:20px;border:1.5px solid;cursor:pointer;white-space:nowrap;}
.cockpit-next-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.cockpit-next-eyebrow{font-size:9.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.cockpit-next-text{font-size:13px;font-weight:600;color:var(--text);line-height:1.5;margin-bottom:14px;}
.cockpit-next-placeholder{font-size:13px;color:var(--text3);font-style:italic;margin-bottom:14px;}
.cockpit-btn-row{display:flex;gap:8px;}
.cockpit-btn-primary{flex:1;background:#ff6b00;color:#fff;border:none;border-radius:10px;padding:11px 14px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
.cockpit-btn-secondary{background:transparent;color:#ff6b00;border:1.5px solid rgba(255,107,0,.4);border-radius:10px;padding:11px 14px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;}
.cockpit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.cockpit-tile{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;min-height:100px;}
.cockpit-tile-label{font-size:9.5px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.cockpit-tile-item{font-size:12px;color:var(--text);line-height:1.4;margin-bottom:5px;padding-left:14px;position:relative;}
.cockpit-tile-item:last-child{margin-bottom:0;}
.cockpit-tile-item::before{content:'Â·';position:absolute;left:2px;color:var(--text3);}
.cockpit-tile-item.risk{color:#e6edf3;}
.cockpit-tile-item.chance{color:#e6edf3;}
.cockpit-tile-more{font-size:11px;color:var(--text3);margin-top:6px;}
.cockpit-tile-empty{font-size:12px;color:var(--text3);font-style:italic;}
.cockpit-phase-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.cockpit-phase-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:13px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent;min-height:48px;}
.cockpit-phase-row.active-phase{border-color:rgba(255,107,0,.5);}
.cockpit-phase-name{font-size:13px;font-weight:700;color:var(--text);}
.cockpit-phase-num{font-size:11px;font-weight:700;width:22px;height:22px;border-radius:6px;background:var(--bg3);color:var(--text3);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cockpit-phase-num.done{background:rgba(46,160,67,.15);color:#2ea043;}
.cockpit-phase-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.cockpit-phase-status.done{color:#2ea043;background:rgba(46,160,67,.12);border:1px solid rgba(46,160,67,.25);}
.cockpit-phase-status.progress{color:#ff6b00;background:rgba(255,107,0,.12);border:1px solid rgba(255,107,0,.25);}
.cockpit-phase-status.empty{color:var(--text3);}

/* v4.150: bessere Priorisierung der Cockpit-Fragen */
.cockpit-tile-item.is-actionable{cursor:pointer;border-radius:6px;padding-top:2px;padding-bottom:2px;padding-right:4px;transition:background .12s,border-color .12s;}
.cockpit-tile-item.is-actionable:active{background:rgba(255,107,0,.10);}
.cockpit-tile-item.is-actionable::after{content:'âš';position:absolute;right:1px;color:var(--text3);font-weight:800;opacity:.75;}
.cockpit-focus-banner{background:rgba(255,107,0,.10);border:1px solid rgba(255,107,0,.35);border-left:3px solid #ff6b00;border-radius:11px;padding:9px 10px;margin-bottom:10px;}
.cockpit-focus-kicker{font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.9px;color:#ff6b00;margin-bottom:3px;}
.cockpit-focus-kicker.is-back{cursor:pointer;display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:2px 6px 2px 0;}
.cockpit-focus-kicker.is-back::before{content:'âđ';font-size:13px;line-height:1;color:#ff6b00;}
.cockpit-focus-kicker.is-back:active{background:rgba(255,107,0,.10);}
.cockpit-focus-text{font-size:11.5px;font-weight:700;color:var(--text);line-height:1.35;}
.cockpit-focus-hint{font-size:10px;color:var(--text2);line-height:1.35;margin-top:4px;}
.bs-row.clickable{cursor:pointer;border-radius:8px;}
.bs-row.clickable:active{background:rgba(255,107,0,.08);}
.bs-row.clickable .bs-row-arrow{margin-left:auto;color:#ff6b00;font-weight:800;opacity:.8;}

/* Bottom Sheet */
.bs-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;opacity:0;transition:opacity .22s;}
.bs-overlay.visible{opacity:1;}
.bs-panel{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-radius:20px 20px 0 0;z-index:201;max-height:82vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s cubic-bezier(.32,1.01,.4,1);}
.bs-panel.visible{transform:translateY(0);}
.bs-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
.bs-head{padding:16px 18px 10px;border-bottom:1px solid var(--border);}
.bs-title{font-size:13px;font-weight:800;color:var(--text);letter-spacing:-.2px;}
.bs-body{padding:10px 18px 32px;}
.bs-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-top:1px solid var(--border);font-size:13px;color:var(--text);line-height:1.45;}
.bs-row:first-child{border-top:none;}
.bs-row .bs-glyph{flex-shrink:0;width:20px;text-align:center;margin-top:1px;}
.bs-row.bs-priority{background:rgba(255,107,0,.07);border:1px solid rgba(255,107,0,.22);border-radius:12px;padding:9px 10px;margin:7px 0;}
.bs-row.bs-priority:first-child{border-top:1px solid rgba(255,107,0,.22);}
.bs-row.bs-priority + .bs-row.bs-priority{border-top:1px solid rgba(255,107,0,.22);}
.bs-row.bs-priority .bs-glyph{background:#ff6b00;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;margin-top:0;}
.bs-panel.questions-sheet .bs-body{padding:8px 14px 30px;}
.bs-panel.questions-sheet .bs-row:not(.bs-priority){font-size:12px;line-height:1.35;padding:8px 0;color:var(--text2);}
.bs-panel.questions-sheet .bs-row:not(.bs-priority) .bs-glyph{font-size:10px;color:var(--text3);}
.bs-priority-caption{font-size:8.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#ff6b00;margin-bottom:3px;}
.bs-separator{height:1px;background:var(--border);margin:8px 0 2px;opacity:.7;}
.bs-empty{font-size:13px;color:var(--text3);font-style:italic;padding:14px 0;}
.home-station-row{display:flex;align-items:center;gap:9px;background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:7px 9px;margin-bottom:5px;cursor:pointer;transition:border-color .15s;}
.home-station-row:hover{border-color:#ff6b00;}
.home-icon-tile{width:26px;height:26px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.home-icon-tile.is-done{background:rgba(46,160,67,.12);border-color:rgba(46,160,67,.3);}
.home-icon-tile.is-progress{background:rgba(255,107,0,.12);border-color:rgba(255,107,0,.3);}
.home-station-sub2{font-size:9px;color:var(--text2);margin-top:0;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;}
.home-status-pill{display:inline-flex;align-items:center;gap:4px;font-size:8px;font-weight:700;
  border-radius:20px;padding:2.5px 7px;white-space:nowrap;flex-shrink:0;}
.home-status-pill.done{background:rgba(46,160,67,.12);color:#2ea043;}
.home-status-pill.progress{background:rgba(255,107,0,.12);color:#ff6b00;}
.home-status-pill.empty{background:rgba(139,148,158,.1);color:var(--text2);}
.home-strategy-title{font-size:16px;font-weight:800;color:var(--text);margin:12px 0 1px;
  letter-spacing:-.2px;}
.home-strategy-sub{font-size:9.5px;color:var(--text2);margin-bottom:8px;}
.home-station-num{width:15px;height:15px;border-radius:50%;background:var(--bg3);
  border:1px solid var(--border);color:var(--text2);font-size:8px;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.home-station-num.is-done{background:rgba(46,160,67,.18);border-color:rgba(46,160,67,.4);color:#2ea043;}
.home-station-num.is-progress{background:rgba(255,107,0,.18);border-color:rgba(255,107,0,.4);color:#ff6b00;}
.home-station-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.home-progress-row{display:flex;align-items:center;gap:5px;}
.home-progress-track{width:36px;height:3.5px;border-radius:3px;background:var(--bg3);overflow:hidden;}
.home-progress-fill{height:100%;border-radius:3px;}
.home-progress-fill.done{background:#2ea043;}
.home-progress-fill.progress{background:#ff6b00;}
.home-progress-pct{font-size:8px;color:var(--text2);font-weight:700;min-width:20px;text-align:right;}
.home-station-title{font-size:11.5px;font-weight:700;color:var(--text);}
.home-insights-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;
  padding:10px;}
.home-insight-row{display:flex;align-items:flex-start;gap:7px;padding:4px 0;font-size:11px;
  color:var(--text);line-height:1.35;}
.home-insight-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.home-insight-dot.positive{background:#2ea043;}
.home-insight-dot.warning{background:#f85149;}
.home-insight-dot.open{background:var(--text3);}
.home-empty-note{font-size:10.5px;color:var(--text3);padding:2px 0;}
.home-station-sub{font-size:11.5px;color:var(--text2);margin-top:2px;}
/* Executive Briefing components (sitId===1 only) */
.exec-grid{display:flex;gap:9px;margin-bottom:10px;flex-wrap:wrap;}
.exec-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px;flex:1;min-width:120px;}
.exec-card-label{font-size:8.5px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:#8b949e;margin-bottom:8px;}
.exec-card-val{font-size:12px;font-weight:400;color:var(--text);line-height:1.5;}
.exec-card-val.accent{color:#ff6b00;font-weight:600;margin-top:4px;}
.exec-card-val.muted{color:var(--text2);font-weight:400;}
.exec-divider{display:flex;align-items:center;gap:10px;margin:20px 0 14px;}
.exec-divider-line{flex:1;height:1px;background:var(--border);}
.exec-divider-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);white-space:nowrap;}

// ââ UNIVERSELLE KOPIER-FUNKTION mit garantiertem Fallback ââ
// Manche Browser (z.B. Brave) blockieren navigator.clipboard / execCommand lautlos, ohne Fehler oder Berechtigungsabfrage.
// Fallback: Ãķffnet ein vorselektiertes Textfeld, damit der Nutzer per Long-Press â Kopieren manuell kopieren kann (funktioniert immer).
function universalCopy(text, onSuccess){
  text=String(text||'').trim();
  if(!text){alert('Kein Text zum Kopieren vorhanden.');return;}
  const markSuccess=()=>{try{if(onSuccess)onSuccess();}catch(e){}};
  const fallback=()=>{
    try{
      const overlay=document.createElement('div');
      overlay.style.cssText='position:fixed;inset:0;background:rgba(13,17,23,.97);z-index:999999;display:flex;flex-direction:column;padding:20px;box-sizing:border-box;';
      overlay.appendChild(h('div',{style:{color:'#ff6b00',fontWeight:'700',marginBottom:'10px',fontSize:'13px'}},
        'ð Tippe lange auf den Text unten und wÃĪhle âAlles auswÃĪhlenâ â âKopierenâ.'));
      const ta=h('textarea',{readonly:true,style:{flex:'1',width:'100%',background:'#1c2333',border:'1px solid #30363d',borderRadius:'6px',padding:'12px',fontSize:'13px',color:'#e6edf3',outline:'none',resize:'none',lineHeight:'1.7',boxSizing:'border-box'}});
      ta.value=text;
      overlay.appendChild(ta);
      const closeBtn=h('button',{className:'btn-o',style:{marginTop:'12px'},onclick:(e)=>{e.preventDefault();e.stopPropagation();overlay.remove();}},'SchlieÃen');
      overlay.appendChild(closeBtn);
      document.body.appendChild(overlay);
      setTimeout(()=>{try{ta.focus();ta.select();ta.setSelectionRange(0,ta.value.length);}catch(e){}},80);
    }catch(e){alert(text);}
  };
  const execCopy=()=>{
    try{
      const ta=document.createElement('textarea');
      ta.value=text;
      ta.setAttribute('readonly','');
      ta.style.cssText='position:fixed;left:-9999px;top:0;opacity:0;';
      document.body.appendChild(ta);
      ta.focus();ta.select();ta.setSelectionRange(0,ta.value.length);
      const ok=document.execCommand('copy');
      document.body.removeChild(ta);
      return !!ok;
    }catch(e){return false;}
  };
  // Erst synchroner Weg, weil iOS/Brave die User-Geste sonst verlieren kann.
  if(execCopy()){markSuccess();return;}
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(markSuccess).catch(fallback);
  }else{
    fallback();
  }
}

let _html2pdfPromise=null;
function loadHtml2Pdf(){
  if(window.html2pdf)return Promise.resolve();
  if(_html2pdfPromise)return _html2pdfPromise;
  _html2pdfPromise=new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
    s.onload=()=>resolve();
    s.onerror=()=>reject(new Error('html2pdf konnte nicht geladen werden'));
    document.head.appendChild(s);
  });
  return _html2pdfPromise;
}
function exportHtmlAsPdf(html,filename){
  loadHtml2Pdf().then(()=>{
    const el=document.createElement('div');
    el.innerHTML=html;
    document.body.appendChild(el);
    window.html2pdf().from(el).set({
      margin:10,
      filename:filename,
      html2canvas:{scale:2,useCORS:true},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
      pagebreak:{mode:['css','legacy']}
    }).save().then(()=>{document.body.removeChild(el);});
  }).catch(e=>{
    alert('PDF-Erzeugung fehlgeschlagen: '+e.message+'\nBitte Internetverbindung prÃžfen.');
  });
}

function shareAsPdf(title,text,cust,filename,fallbackText){
  loadHtml2Pdf().then(()=>{
    const html=buildSimplePdfHtml(title,text,cust);
    const el=document.createElement('div');
    el.innerHTML=html;
    document.body.appendChild(el);
    window.html2pdf().from(el).set({
      margin:10,
      html2canvas:{scale:2,useCORS:true},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
      pagebreak:{mode:['css','legacy']}
    }).outputPdf('blob').then(blob=>{
      document.body.removeChild(el);
      const file=new File([blob],filename,{type:'application/pdf'});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:title}).catch(()=>{});
      } else if(navigator.share){
        navigator.share({title:'KI21 â '+title,text:fallbackText||text});
      } else {
        // Fallback: PDF direkt herunterladen
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url;a.download=filename;a.click();
        setTimeout(()=>URL.revokeObjectURL(url),1000);
      }
    });
  }).catch(()=>{
    if(navigator.share)navigator.share({title:'KI21 â '+title,text:fallbackText||text});
  });
}

  s+='KRITISCH â KEINE FACHBEGRIFFE/PRODUKTNAMEN ERFINDEN, DIE DER KUNDE NICHT GENANNT HAT: Wenn ein technischer Fachbegriff oder Produktname (z.B. ein konkretes Software-Modul wie "SAP Analytics Cloud" oder "Integrated Planning") nicht direkt vom Kunden genannt wurde, darf er NICHT als Kundenerkenntnis erscheinen. Verwende stattdessen die einfache, allgemeine Beschreibung dessen, was der Kunde tatsÃĪchlich gesagt hat (z.B. "ein SAP-Modernisierungsprojekt lÃĪuft" statt "SAP Analytics Cloud und Integrated Planning sind geplant", falls der Kunde keine konkreten Modulnamen genannt hat). Erfundene Fachbegriffe lassen das Ergebnis wie ein Beratungskonzept wirken statt wie eine ehrliche GesprÃĪchsdokumentation â das ist unerwÃžnscht.\n';
  s+='SELBSTTEST VOR JEDER AUSGABE: WÃžrde ein sehr erfahrener Vertriebsleiter genau so schreiben â oder wirkt der Text wie ein Strategieberater, der ein Transformationskonzept entwirft? Im Zweifel: pragmatischer, konkreter, vertriebsorientierter formulieren, nicht als Beratungsdokument.\n';
  s+='KRITISCH: Wenn dieselben Kernfakten (z.B. eine konkrete Zahl wie "6 Arbeitstage pro Szenario") bereits in einem vorherigen Kontext-Abschnitt erwÃĪhnt wurden, wiederhole sie in dieser Phase nur EINMAL ausfÃžhrlich (meist in den ERKENNTNISSE/BESTÃTIGT-Abschnitten) und referenziere sie danach kurz, statt sie in jedem Abschnitt erneut vollstÃĪndig auszuschreiben. Ziel: Wiederholungen Ãžber die Phasen hinweg reduzieren, ohne wichtige Fakten wegzulassen.\n';
  s+='PFLICHT â DREI-STUFEN-SYSTEM FÃR JEDE INFORMATION: Bewerte JEDE Information, bevor du sie verwendest, nach genau einer dieser drei Stufen:\n';
  s+='  FAKT (= BESTÃTIGT): direkt genannt, eindeutig belegt, aus den Eingaben stammend. Beispiele: "6 Arbeitstage pro Szenario", "3 Spartensysteme", "SAP-Projekt lÃĪuft", "CFO ist Sponsor".\n';
  s+='  INTERPRETATION (= ANNAHME): eine logische, nachvollziehbare Ableitung AUS einem Fakt. Beispiele: "SAP-Projekt erzeugt Zeitdruck", "CIO kÃķnnte SAP bevorzugen". Interpretationen sind erlaubt und wertvoll â aber sie dÃžrfen NIE wie ein Fakt klingen, sondern mÃžssen erkennbar als Schlussfolgerung formuliert sein (z.B. mit "kÃķnnte", "vermutlich", "deutet darauf hin").\n';
  s+='  VERMUTUNG (= KLÃREN/ZU VALIDIEREN): eine nicht belegte Aussage ohne Faktengrundlage â typischerweise BudgethÃķhe, ROI, Abschlusswahrscheinlichkeit, SchadenshÃķhe, Lizenzbedarf, sofern sie nicht explizit genannt wurden. Eine Vermutung darf NIEMALS als Fakt oder als prÃĪzise Zahl erscheinen.\n';
  s+='KRITISCH â NIEMALS RECHNEN BEI FEHLENDEN DATEN: Wenn fÃžr eine Berechnung (ROI, Amortisation, Abschlusswahrscheinlichkeit in %, SchadenshÃķhe) die nÃķtigen Fakten fehlen, BERECHNE KEINE Zahl, SCHÃTZE KEINE Zahl, ERFINDE KEINE Zahl. Schreibe statt einer Zahl explizit, was fehlt (z.B. "ROI aktuell nicht belastbar berechenbar. Es fehlen: Reporting-Aufwand, Szenario-HÃĪufigkeit, Fehlerkosten."). Eine ehrliche LÃžcke ist immer besser als eine prÃĪzise wirkende, aber erfundene Zahl.\n';
  s+='KRITISCH â KEINE ERFUNDENEN STAKEHOLDER-ERWARTUNGEN: Schreibe NIEMALS eine konkrete Erwartung eines Stakeholders, die nicht genannt wurde (z.B. NICHT "GeschÃĪftsfÃžhrer erwartet +5-10% Umsatzsteigerung", wenn diese Zahl nirgends im GesprÃĪch gefallen ist). Formuliere stattdessen als offene Frage oder als zu klÃĪrenden Punkt (z.B. "GeschÃĪftsfÃžhrer muss den wirtschaftlichen Nutzen noch definieren" oder "Welche Kennzahl entscheidet fÃžr den GeschÃĪftsfÃžhrer Ãžber den Projekterfolg?"). Das gilt fÃžr JEDE Person/Rolle (CEO, CFO, CIO, Einkauf usw.), nicht nur fÃžr den direkten Ansprechpartner.\n';
  s+='PFLICHT: Die Genauigkeits-Kennzeichnung BESTÃTIGT/ANNAHME/KLÃREN gilt fÃžr deine interne Sorgfalt und fÃžr den Detailbereich (nach ###DETAILS###, falls das Phasenformat das vorsieht) â NICHT als PrÃĪfix in der kompakten Standardausgabe. Halte trotzdem in jedem Bullet selbst implizit fest, was Fakt vs. Interpretation vs. Vermutung ist, ohne das Wort explizit hinzuschreiben (z.B. durch Formulierung wie "Kunde nennt..." vs. "kÃķnnte..." vs. "noch unklar...").\n';
  s+='KRITISCH: Erfinde NIEMALS konkrete Studiennamen, Institute oder prÃĪzise Statistiken (z.B. "laut XY-Studie", "13-26 Wochen laut BARC") die nicht im Abschnitt "KI21 Intelligence" unten stehen. Du hast in dieser Phase KEINEN Websuche-Zugriff. Wenn du eine Marktaussage machen willst, formuliere sie als eigene EinschÃĪtzung ohne erfundene Quellenangabe, oder verweise allgemein auf Erfahrungswerte aus der KI21 Intelligence.\n';
  s+='KRITISCH: Wenn ein Arbeitsaufwand (Personenstunden) 8 Stunden oder mehr betrÃĪgt, wandle ihn IMMER in Arbeitstage Ã  8 Stunden um, indem du die Stundenzahl DURCH 8 TEILST (z.B. 600-1.200 Stunden Ã· 8 = 75-150 Arbeitstage, NICHT 600-1.200 Arbeitstage â die MaÃeinheit ÃĪndert sich, der Zahlenwert wird kleiner). Rechne diese Division bei JEDER Umrechnung explizit nach, bevor du das Ergebnis hinschreibst. Das gilt AUCH wenn die Kundenangabe selbst in Stunden kam (z.B. "40-60 Stunden/Monat" â "5-7,5 Arbeitstage/Monat"), UND fÃžr jede aufsummierte oder hochgerechnete Jahres-/Monatszahl, nicht nur fÃžr Einzelfall-Nennungen. Nur Werte unter 8 Stunden bleiben in Stunden stehen. Das gilt fÃžr alle Aufwandsangaben in jeder Phase, konsequent Ãžber den gesamten Output.\n';
  s+='KRITISCH: Wenn du irgendwo im Output die VerlÃĪsslichkeit einer Aussage/Zahl kennzeichnest, nutze AUSSCHLIESSLICH die Worte BESTÃTIGT (vom Kunden genannt oder dokumentiert), ARBEITSWERT (Benchmark + plausibel abgeleiteter Mittelwert aus KI21 Intelligence, zum Rechnen verwendet, nicht kundenspezifisch verifiziert) oder ZU VALIDIEREN (offene GrÃķÃe, die im nÃĪchsten GesprÃĪch geklÃĪrt werden sollte) â NIEMALS Emoji-Punkte wie ðĒ/ðĄ/ðī oder Ampelfarben ohne Wort. Schreibe immer zuerst den Bewertungstext, dann das Label in GroÃbuchstaben direkt danach oder davor (z.B. "Typische Range: 300-600 Stunden/Jahr, verwendeter ARBEITSWERT: 450 Stunden/Jahr"). Das gilt konsequent fÃžr jede Confidence-Angabe im gesamten Output, nicht nur an einer Stelle. Bei BESTÃTIGT/ANNAHME/KLÃREN-BlÃķcken (fÃžr GesprÃĪchserkenntnisse) bleiben diese drei WÃķrter wie bisher bestehen â ARBEITSWERT/ZU VALIDIEREN gelten zusÃĪtzlich speziell fÃžr quantitative Kennzahlen und Berechnungsgrundlagen.\n';
  s+='KRITISCH: MAXIMAL EIN MULTIPLIKATIONSSCHRITT BEI SPEKULATIVEM POTENZIAL: Wenn du ein Krisen-/Schadenspotenzial in einer Eskalations-/Schadensrechnung darstellst, verkette NICHT mehr als einen einzigen Unsicherheitsfaktor (z.B. NUR "SchadenshÃķhe Ã geschÃĪtzte Vermeidbarkeitsquote"). Verkette NIEMALS zusÃĪtzlich noch eine geschÃĪtzte HÃĪufigkeit pro Jahr in dieselbe Rechnung â das sind dann mehrere multiplizierte Unsicherheiten und die resultierende Zahl wirkt prÃĪziser als sie ist. Behandle HÃĪufigkeit pro Jahr als separaten, eigenstÃĪndig zu klÃĪrenden Punkt, ohne sie in die gleiche Multiplikation einzubeziehen. Gilt in JEDER Phase, nicht nur in der Nutzen-Kosten-Analyse.\n';
  s+='KRITISCH: GLEICHES PRINZIP GILT FÃR OPTIMISTISCHE ROI-MULTIPLIKATOREN: Verkette bei einer ROI-/Payback-Aussage NICHT mehr als einen Unsicherheitsfaktor (z.B. NUR die vom Kunden genannte Quote-Verbesserung). Wenn du zusÃĪtzlich noch eine geschÃĪtzte Margin-Annahme UND eine angenommene Erfolgswahrscheinlichkeit in dieselbe Rechnung einbaust, entsteht eine kÃžnstlich beeindruckende Zahl wie "ROI 20-30x", die bei kritischem Nachfragen (besonders von CFO/CEO) nicht standhÃĪlt und Vertrauen kostet. NIEMALS einen ROI-Multiplikator wie "20x", "30x" oder eine ÃĪhnlich hohe, beeindruckend wirkende Zahl als Ergebnis ausgeben, wenn sie aus mehr als einer verketteten Unsicherheit stammt â formuliere statt einer einzelnen Multiplikator-Zahl lieber eine Bandbreite mit explizit benannten Annahmen, oder verzichte ganz auf eine zusammenfassende "Xx ROI"-Zahl und beschreibe Nutzen vs. Investition stattdessen als zwei separate, klar gekennzeichnete GrÃķÃen. Gilt in JEDER Phase.\n';
  s+='KRITISCH: KORREKTE BESTÃTIGT/ANNAHME-ZUORDNUNG BEI ABGELEITETEN ZAHLEN: Wenn der Kunde eine Prozentzahl nennt (z.B. "20-25% mehr Umsatz"), ist NUR diese Prozentzahl selbst BESTÃTIGT (der Kunde hat sie genannt). Jede daraus berechnete absolute âŽ-Zahl (z.B. "5-8 Mio. âŽ zusÃĪtzlicher Umsatz" durch Anwendung der Prozentzahl auf den Gesamtumsatz) ist eine EIGENE Ableitung und MUSS als ANNAHME oder ARBEITSWERT gekennzeichnet werden, NIEMALS als BESTÃTIGT â auch wenn die zugrunde liegende Prozentzahl bestÃĪtigt ist. Eine Berechnung aus einer bestÃĪtigten Zahl ist selbst nicht automatisch bestÃĪtigt.\n';
  s+='KRITISCH â FORECAST-NUTZEN NUR KONTEXTABHÃNGIG: Forecast-/EntscheidungsqualitÃĪt ist NICHT pauschal bei jedem "Mein Unternehmen" ein ROI-Hebel. Verwende Forecast-Genauigkeit als zentralen Nutzenhebel NUR, wenn (1) Mein Unternehmen KI21 ist, (2) das eigene Angebot ausdrÃžcklich Forecast, Opportunity Health/Scoring, Pipeline-QualitÃĪt, CRM-/Sales-Qualifizierung, Discovery oder Vertriebssteuerung adressiert, oder (3) der Kunde explizit Forecast-/Pipeline-Probleme nennt. Bei allen anderen Angeboten keine KI21-Logik hineinprojizieren; dann liegt der Nutzen woanders. Wenn Forecast zulÃĪssig ist, formuliere trotzdem vorsichtig: bessere Qualifizierung â bessere Datenbasis â belastbarere Prognose; keine Umsatz-/Abschlussquoten-Steigerung als KI21-Leistungsversprechen. Eine vom Kunden selbst genannte ZielgrÃķÃe (z.B. "+20-25% Umsatz") bleibt Kundenhypothese, nicht KI21-Versprechen. Gilt in JEDER Phase, besonders SPIN, ROI, ErÃķffnungssÃĪtzen und Abschlussargumentation.\n';
  s+='KRITISCH: UNSICHERE PROZENTANGABEN GENERELL VORSICHTIG FORMULIEREN (gilt fÃžr ALLE Prozentzahlen in JEDER Phase, auch Forecast-Genauigkeit-Benchmarks): Solange eine Prozentzahl nicht durch eigene Messung des Kunden bestÃĪtigt ist, formuliere sie nicht als feststehende Tatsache. ErgÃĪnze bei der ersten Nennung einen kurzen Validierungs-Hinweis (z.B. "...sollte im Pilotbetrieb mit echten Zahlen validiert werden"), statt die Zahl danach unkommentiert mehrfach als Fakt zu wiederholen.\n';
  s+='KRITISCH â ROI-HEBEL STATT SCHEINGENAUIGKEIT: KI21 soll keine scheinexakte ROI-Rechenmaschine sein. Wenn Kostenarten, Laufzeiten oder Nutzenannahmen gemischt oder unsicher sind, berechne keinen harten ROI-Prozentsatz und keine komplexe Amortisation. Identifiziere stattdessen: (1) wichtigste ROI-wirksame Position, (2) bekannte wirtschaftliche GrÃķÃenordnung, (3) unsichere Annahme, (4) Validierungsfrage an den Kunden, (5) einfache Mindestlogik fÃžr die Entscheidung. Der Account Manager soll dadurch die richtige ROI-wirksame Stelle erkennen und mit dem Kunden belastbar validieren.\n';
  s+='KRITISCH â KEINE ERFUNDENEN VERMEIDUNGSQUOTEN: Erzeuge niemals konkrete Vermeidungsquoten, wenn diese nicht ausdrÃžcklich vom Kunden genannt wurden. Schreibe stattdessen: Vermeidungsquote noch nicht validiert / ROI-Annahme noch nicht belastbar / zentrale ROI-wirksame Annahme muss im Startangebot gemessen werden. Keine scheinexakte Quote aus eigener Interpretation ableiten.\n';
  s+='KRITISCH â VERMEIDUNGSQUOTE NICHT ENTFERNEN, SONDERN OHNE ZAHL SICHTBAR HALTEN: Wenn der Business Case auf schwach qualifizierten Deals, spÃĪter Disqualifikation oder schlechter Discovery basiert, muss die Vermeidungsquote als zentrale zu validierende ROI-Annahme erscheinen. Verboten ist nur eine erfundene Prozentzahl. Richtige Formulierung: âVermeidungsquote schwach qualifizierter Deals noch nicht validiertâ.\n';
  s+='KRITISCH â KEINE UNNÃTIGEN NEBENBAUSTELLEN DURCH KUNDENSYSTEME: Vorhandene Kundensysteme (z.B. CRM, ERP, BI, HubSpot, Salesforce, Dynamics, SAP, Pipedrive oder andere Plattformen) dÃžrfen NICHT automatisch als Risiko, offener Punkt oder nÃĪchster Schritt erscheinen. PrÃžfe immer zuerst: Hilft diese Systemfrage dem Abschluss des konfigurierten eigenen Angebots â oder erÃķffnet sie eine Ausweich-/Ersatzdiskussion, die das eigene Angebot relativiert? Aktive System-/Integrationsfragen nur nennen, wenn (a) Integration Kernnutzen des eigenen Produkts ist, (b) der Kunde Integration ausdrÃžcklich als Voraussetzung nennt, (c) ohne Integration kein sinnvoller Start mÃķglich ist oder (d) Integration bestÃĪtigter Entscheidungsfaktor ist. Sonst: Kundensysteme nur als stillen Kontext nutzen und den nÃĪchsten Schritt auf Nutzen, Entscheidung und Validierung des eigenen Angebots fokussieren.\n';
  s+='NACHRANGIGE RISIKEN: Wenn eine System-/Integrationsdiskussion nicht startkritisch ist, aber vertrieblich gefÃĪhrlich werden kÃķnnte, darf sie hÃķchstens nachrangig als Risiko erscheinen â nicht als Top-Risiko, nicht als âDie eine Sacheâ, nicht als nÃĪchster Schritt. Formulierung: âAusweichdiskussion Ãžber vorhandene Systeme vermeiden; Nutzen des eigenen Angebots zuerst validieren.â\n';
  s+='KRITISCH â KEINE ERFUNDENEN TEILNEHMERZAHLEN IM NÃCHSTEN SCHRITT: Erfinde keine konkreten GruppenstÃĪrken, Deal-Anzahlen oder ZeitrÃĪume, wenn sie nicht ausdrÃžcklich genannt wurden. Bei Start-/Pilot-/Compact-Angeboten formuliere neutral: âKickoff mit ausgewÃĪhlten Anwendern/Account Managernâ, âerste echte Opportunities/FÃĪlleâ, âStartumfang und Messkriterien festlegenâ.\n';
  s+='KRITISCH: KEIN AUSWEICHEN AUF ERFUNDENE "BENCHMARKS": Wenn du fÃžr ein Krisen-/Schadenspotenzial keine belastbare, herleitbare Zahl hast, darfst du NICHT stattdessen eine pauschale Branchenzahl als angeblichen "Benchmark" zitieren, um trotzdem einen âŽ-Betrag zu nennen. Das ist nur eine Umgehung des Verbots, keine echte Quelle. Wenn keine Zahl aus der tatsÃĪchlichen KI21 Intelligence stammt, bleibt das Potenzial unbeziffert â auch wenn das bedeutet, gar keine âŽ-Zahl zu nennen. Gilt in JEDER Phase.\n';
  s+='KRITISCH: KATEGORISCHES VERBOT FÃR UNBESTÃTIGTES KRISENPOTENZIAL: Wenn ein Schadens-/Krisenpotenzial nicht durch konkrete, vom Kunden bestÃĪtigte Zahlen (HÃĪufigkeit UND Vermeidbarkeit UND SchadenshÃķhe alle bestÃĪtigt) belegt ist, darf NIRGENDS im Output â in KEINER Phase, auch nicht im Abschlusssatz, in der Kurzfassung, in Einwandantworten oder als "SensitivitÃĪtsrechnung" â ein âŽ-Betrag dafÃžr genannt werden, auch nicht mit WÃķrtern wie "kÃķnnte", "potenziell", "zusÃĪtzlich". Beschreibe stattdessen NUR die Mechanik in Worten, ohne Zahl. Ein unbestÃĪtigter Betrag im KundengesprÃĪch beschÃĪdigt mehr Vertrauen als er Nutzen bringt.\n';
  s+='KRITISCH â KORREKTE PERSONEN-BEZEICHNUNG (gilt in JEDER Phase): Schreibe "X beteiligte Mitarbeitende" oder "X Personen", NIEMALS "X FTE" oder "X Vollzeitstellen" â auÃer der Kunde hat selbst explizit von Vollzeitstellen/FTE gesprochen. Eine vom Kunden genannte Anzahl beteiligter Personen ist NICHT automatisch eine Anzahl Vollzeitstellen â das sind fachlich unterschiedliche GrÃķÃen, die nicht gleichgesetzt werden dÃžrfen.\n';
  s+='ROI: Nur bestÃĪtigte Kundenzahlen verwenden. Zeitersparnis NUR fÃžr Account Manager.\n';
  s+='KRITISCH: Jede Phase muss mindestens EINEN Gedanken enthalten, der Ãžber Standardwissen hinausgeht â einen Aha-Insight, der im GedÃĪchtnis bleibt (z.B. "Die grÃķÃte Zeitersparnis entsteht oft nicht durch schnellere Reports, sondern dadurch, dass dieselben Zahlen nicht mehr in mehreren Excel-Dateien manuell abgeglichen werden mÃžssen."). Vermeide reine Standardaussagen ohne Ãžberraschenden Mehrwert. Dieser Insight darf nicht erfunden wirken â er muss zur konkreten Situation des Kunden passen und nachvollziehbar sein.\n';
  s+='KRITISCH: Tonfall durchgehend partnerschaftlich, nicht verkÃĪuferisch-drÃĪngend. Vermeide Formulierungen wie "damit ich Sie/Ihre GeschÃĪftsfÃžhrung Ãžberzeuge" oder "garantiert". Bevorzuge Formulierungen wie "damit Sie eine belastbare Entscheidungsgrundlage haben â unabhÃĪngig davon, wie die Entscheidung ausfÃĪllt" oder "damit wir gemeinsam zu einer fundierten EinschÃĪtzung kommen". Das Ziel ist: gemeinsam zu einer Entscheidung fÃžhren, nicht Ãžberreden.\n';
  s+='KRITISCH â HARTE GRENZE FÃR DIE STANDARDAUSGABE: Die Standardausgabe (alles VOR der Zeile "###DETAILS###", falls vorhanden) MUSS exakt mit der letzten vorgegebenen Zeile des Formats enden (meist "NÃCHSTER SCHRITT DIESE WOCHE:" / vergleichbar, je nach Phase). Schreibe NACH dieser letzten Zeile ABSOLUT NICHTS mehr, auÃer dem optionalen Marker "###DETAILS###" und dem dahinter folgenden Detailblock. KEINE zusÃĪtzliche Zusammenfassung, KEIN Wiederholen von Punkten, KEIN weiterer Absatz "Zusammenfassend...". Die Standardausgabe muss auf einem Smartphone als EINE Bildschirmseite ohne Scrollen lesbar sein â das ist die wichtigste Einzelregel in diesem Prompt.\n';
  s+='KRITISCH: Die "NÃCHSTE AKTION"/"â TODO" dieser Phase muss sich klar von der letzten Aktion aus "BISHERIGE ERGEBNISSE" (falls vorhanden) unterscheiden â wiederhole NIEMALS sinngemÃĪÃ denselben nÃĪchsten Schritt wie eine vorherige Phase. Wenn die vorherige Phase z.B. "Termin vereinbaren" als Aktion hatte und dieser Termin laut Kontext bereits stattgefunden hat, muss die neue Aktion einen Schritt WEITER sein, nicht denselben wiederholen.\n';
  s+='AUSGABE-REGELN (strikt einhalten):\n';
  s+='- KRITISCHSTE REGEL: Liefere IMMER sofort den vollstÃĪndigen Output im vorgegebenen Format â auch wenn Informationen fehlen, unsicher oder unvollstÃĪndig wirken. STELLE NIEMALS eine RÃžckfrage VOR dem Output und warte NICHT auf eine Antwort, bevor du lieferst. Fehlende oder unsichere Daten gehÃķren in die Kennzeichnung ANNAHME/KLÃREN oder eine etwaige RÃžckfragen-Sektion AM ENDE des Outputs, NIEMALS als eigene Frage oder Meta-Kommentar davor. Du bekommst in diesem Schritt keine Antwort auf eine Vorab-Frage â also stelle keine, sondern arbeite mit dem was im Feld steht. VERBOTENE SatzanfÃĪnge: "Ich verstehe die Aufgabe", "Allerdings stelle ich fest", "Mir fehlen", "Bevor ich", "Ich muss zunÃĪchst" â beginne IMMER direkt mit dem ersten Element des vorgegebenen Output-Formats.\n';
  s+='- Nutze vorhandene Informationen â keine Nachfragen\n';

  s+='- KRITISCH â EIN BULLET = EINE AUSSAGE: Ein Bullet darf NIEMALS mehrere Aussagen verketten â egal ob mit Komma, "und", einem "="-Zeichen, oder einem Relativsatz ("der/die/das..."). NICHT erlaubt z.B.: "6 Arbeitstage manuelle Konsolidierung pro PreisÃĪnderung = messbarer Schmerz, der monatlich anfÃĪllt und regelmÃĪÃig zu Fehlentscheidungen fÃžhrt" (das sind DREI Aussagen in einem Bullet: Zeitaufwand, HÃĪufigkeit, Konsequenz). Stattdessen IMMER in einzelne Bullets aufteilen: "6 Arbeitstage pro PreisÃĪnderung" / "Konsolidierung erfolgt manuell" / "Fehler fÃžhren zu Fehlentscheidungen". Jeder Bullet maximal 6-8 WÃķrter, ein einziger Gedanke, in wenigen Sekunden erfassbar. Wenn du beim Formulieren eines Bullets ein "=", "und", "der/die/das" oder ein Komma zur Verbindung zweier Sachverhalte einsetzen willst, ist das ein sicheres Zeichen, dass es zwei Bullets werden mÃžssen.\n';
  s+='- KRITISCH â SOFORTIGER AHA-EFFEKT, KEINE INTERPRETATION NÃTIG: Jeder Bullet der Standardansicht muss beim Lesen innerhalb weniger Sekunden sofort verstanden werden â der Nutzer darf NIEMALS selbst nachdenken oder interpretieren mÃžssen, um die Bedeutung zu erfassen. Konkreter Test: WÃžrde ein Vertriebsleiter beim Lesen sofort "Genau." oder "Aha." denken â oder eher "Moment, was meint die KI damit?" Im zweiten Fall: Bullet konkreter formulieren oder die BegrÃžndung/den Zusammenhang stattdessen in den Detailbereich (nach ###DETAILS###) verschieben. BegrÃžndungen, Herleitungen und ErlÃĪuterungen gehÃķren NIEMALS in die Standardansicht, NUR in "Mehr Details".\n';

async function callClaude(prompt, onStream){
  const apiKey=LS.get('ki21_apikey','');
  if(!apiKey){alert('Bitte API Key unter â hinterlegen.');return null;}
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',
      max_tokens:20000,
      stream:true,
      tools:[{type:'web_search_20250305',name:'web_search',max_uses:6}],
      messages:[{role:'user',content:prompt}]
    })
  });
  if(!resp.ok){const err=await resp.json();throw new Error(err.error?.message||'API Fehler '+resp.status);}
  const reader=resp.body.getReader();
  const decoder=new TextDecoder();
  let fullText='';
  let blockText='';
  while(true){
    const {done,value}=await reader.read();
    if(done)break;
    const chunk=decoder.decode(value,{stream:true});
    const lines=chunk.split('\n');
    for(const line of lines){
      if(line.startsWith('data: ')){
        const data=line.slice(6);
        if(data==='[DONE]')continue;
        try{
          const parsed=JSON.parse(data);
          if(parsed.type==='content_block_start'&&parsed.content_block?.type==='tool_use'){
            if(onStream)onStream(stripMd(fullText)+'\nð Suche aktuelle Informationen...\n');
          }
          if(parsed.type==='content_block_start'&&parsed.content_block?.type==='text'){
            blockText='';
          }
          if(parsed.type==='content_block_delta'&&parsed.delta?.text){
            blockText+=parsed.delta.text;
            if(onStream)onStream(stripMd(fullText+blockText));
          }
          if(parsed.type==='content_block_stop'){
            if(blockText){fullText+=(fullText?'\n':'')+blockText;blockText='';}
          }
        }catch(e){}
      }
    }
  }
  if(blockText){fullText+=(fullText?'\n':'')+blockText;}
  return fullText;
}

function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(tag==='button' && (!attrs || attrs.type==null))el.setAttribute('type','button');
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')el.className=v;
    else el.setAttribute(k,v);
  });
  children.flat().forEach(c=>{
    if(c==null)return;
    el.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return el;
}

function stripMd(text){
  return text
    .replace(/#{1,6}\s+/g,'')
    .replace(/\*\*\*([^*]+)\*\*\*/g,'$1')
    .replace(/\*\*([^*]+)\*\*/g,'$1')
    .replace(/\*([^*]+)\*/g,'$1')
    .replace(/^---+$/gm,'')
    .replace(/^===+$/gm,'')
    .replace(/^>\s/gm,'')
    .replace(/`([^`]+)`/g,'$1')
    .trim();
}

function attachScoreLongPress(el,begruendung){
  if(!begruendung)return;
  let pressTimer=null;
  let fired=false;
  const showTooltip=()=>{
    const existing=document.getElementById('score-tooltip');
    if(existing)existing.remove();
    const tip=document.createElement('div');
    tip.id='score-tooltip';
    tip.style.cssText='position:fixed;top:50px;left:14px;right:14px;background:#1c2333;'+
      'border:1px solid #ff6b00;border-radius:8px;padding:10px 12px;font-size:12px;'+
      'color:#e6edf3;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.5);cursor:pointer;'+
      '-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;';
    const textEl=document.createElement('div');
    textEl.textContent=begruendung;
    const hintEl=document.createElement('div');
    hintEl.textContent='Tippen zum SchlieÃen';
    hintEl.style.cssText='font-size:9px;color:#8b949e;margin-top:6px;text-align:right;';
    tip.appendChild(textEl);
    tip.appendChild(hintEl);
    tip.addEventListener('click',e=>{e.stopPropagation();tip.remove();});
    document.body.appendChild(tip);
    setTimeout(()=>{
      const dismissOnAnyClick=(e)=>{
        const t=document.getElementById('score-tooltip');
        if(t){
          e.preventDefault();
          e.stopPropagation();
          if(e.stopImmediatePropagation)e.stopImmediatePropagation();
          t.remove();
        }
        document.removeEventListener('click',dismissOnAnyClick,true);
        document.removeEventListener('touchstart',dismissOnAnyClick,true);
      };
      document.addEventListener('click',dismissOnAnyClick,true);
      document.addEventListener('touchstart',dismissOnAnyClick,true);
    },100);
  };
  const start=(e)=>{
    fired=false;
    pressTimer=setTimeout(()=>{fired=true;showTooltip();},500);
  };
  const cancel=()=>{if(pressTimer)clearTimeout(pressTimer);};
  el.style.cursor='pointer';
  el.addEventListener('touchstart',start,{passive:true});
  el.addEventListener('touchend',cancel);
  el.addEventListener('touchmove',cancel);
  el.addEventListener('mousedown',start);
  el.addEventListener('mouseup',cancel);
  el.addEventListener('mouseleave',cancel);
  el.addEventListener('contextmenu',e=>e.preventDefault());
}

function extractBegruendung(text){
  const m=text.match(/BegrÃžndung:\s*(.+)/);
  if(m)return m[1].trim().split('\n')[0];
  const pipeMatch=text.match(/\d+\s*\/\s*10\s*\|\s*(.+)/);
  if(pipeMatch)return pipeMatch[1].trim().split('\n')[0];
  const fallback=text.match(/Empfehlung:\s*(.+)/);
  if(fallback)return fallback[1].trim().split('\n')[0];
  return '';
}

function applyHealthRiskRules(baseScore,risk){
  let score=Number(baseScore)||0;
  score=score-risk.penalty;
  if(risk.scoreCap!==null&&risk.scoreCap!==undefined){

  return Math.max(0,Math.min(100,Math.round(score)));
}

function getKoSeverity(text){
  const t=(text||'').toLowerCase();
  const leaderWords='(geschÃĪftsfÃžhrer|gf|ceo|cfo|geschÃĪftsleitung|entscheider|leitung|vorstand|sponsor|cio)';
  const competitorWords='(mitbewerb|mitbewerber|wettbewerb|wettbewerber|konkurrent|konkurrenz)';
  const preferenceWords='(prÃĪfer|bevorzug|favoris|favorit|gesetzt|vorne|tendier)';
  const rejectionWords='(mag .*nicht|will .*nicht|lehnt .*ab|skeptisch|dagegen|kein interesse|nicht Ãžberzeugt|ablehn)';
  // Reihenfolge = Schweregrad, niedrigster Deckel zuerst geprÃžft
  if(new RegExp(leaderWords+'.{0,80}'+preferenceWords+'.{0,80}'+competitorWords,'i').test(t))return {penalty:45,cap:25};
  if(new RegExp(competitorWords+'.{0,80}'+preferenceWords,'i').test(t))return {penalty:45,cap:25};
  if(new RegExp(leaderWords+'.{0,80}'+rejectionWords,'i').test(t))return {penalty:35,cap:30};
  const championDepartureMatch2=t.match(/(champion|fÃžrsprecher|sponsor).{0,60}(verlÃĪsst (das unternehmen|die firma|uns)|hat gekÃžndigt|kÃžndigt (zum|in|im)|wechselt (den arbeitgeber|die firma|das unternehmen)|nicht mehr (im unternehmen|verfÃžgbar|erreichbar)|zieht (seine|ihre) unterstÃžtzung zurÃžck|fÃĪllt (komplett )?weg)/i);
  if(championDepartureMatch2&&!/(verlÃĪsst sich|verlassen sich|sich .{0,15}verlassen|verlass(en)? auf|verlÃĪsslich|vertrau)/i.test(championDepartureMatch2[0]))return {penalty:30,cap:30};
  if(/budget.{0,40}(komplett gestrichen|vollstÃĪndig entfallen|endgÃžltig abgelehnt)/i.test(t))return {penalty:20,cap:45};
  if(/(entscheidung|projekt).{0,40}(final gestoppt|endgÃžltig gestoppt|auf unbestimmte zeit eingefroren)/i.test(t))return {penalty:20,cap:45};
  return null;
}

function _getOpportunityHealthBase(accId){
  const auto=LS.get('ki21_health_'+accId,null);
  const allResults=[];
  SITS.forEach((sit,i)=>{
    const d=LS.get('ki21_st_'+accId+'_'+i,null);
    if(d&&d.result)allResults.push({title:sit.title,text:d.result});
  });
  const risk=getAdditionRiskSignals(accId,allResults);
  if(!auto){
    if(risk.warning.length||risk.positive.length){
      let cap=null;
      risk.warning.forEach(w=>{const sev=getKoSeverity(w.text);if(sev)cap=cap===null?sev.cap:Math.min(cap,sev.cap);});
      const score=cap!==null?Math.min(55,cap):55;
      return {score,label:score<35?'Kritisch':'Stabil',provisional:true,positive:risk.positive,warning:risk.warning,open:[],structuralOpenCount:6,isKo:cap!==null};
    }
    return null;
  }
  const manual=getHealthManual(accId);
  const positive=(auto.positive||[]).map(s=>({text:s.text,origin:'AUTO',type:'positive',disabled:manual.removedAutoTexts.includes(s.text)}));
  const warning=(auto.warning||[]).map(s=>({text:s.text,origin:'AUTO',type:'warning',disabled:manual.removedAutoTexts.includes(s.text)}));
  const open=(auto.open||[]).map(s=>({text:s.text,origin:'AUTO',type:'open',disabled:manual.removedAutoTexts.includes(s.text)}));
  risk.warning.forEach(r=>{ if(!warning.find(w=>w.text===r.text)) warning.unshift({...r,disabled:manual.removedAutoTexts.includes(r.text)}); });
  risk.positive.forEach(r=>{ if(!positive.find(w=>w.text===r.text)) positive.unshift({...r,disabled:manual.removedAutoTexts.includes(r.text)}); });
  manual.added.forEach(m=>{
    const entry={text:m.text,origin:'MANUELL',type:m.type,disabled:m.active===false};
    if(m.type==='positive')positive.push(entry);
    else if(m.type==='warning')warning.push(entry);
    else open.push(entry);
  });
  // EINE einzige Quelle der Wahrheit fÃžr K.O.-Erkennung: getKoSeverity prÃžft jeden aktiven (nicht ausgeblendeten) Warnsignal-Text.
  // K.O. wirkt NUR als Score-Deckel (schlimmster Fall gewinnt) - NIE als zusÃĪtzliche, aufsummierbare Strafe.
  // Architektur-Korrektur: Ein rein lokal per Regex erkanntes Signal (origin='ERGAENZUNG') darf den Score NICHT
  // allein hart deckeln - das wÃžrde bedeuten, dass eine ungeprÃžfte Textmustererkennung die KI-Bewertung
  // Ãžberstimmt. Nur von der KI selbst bestÃĪtigte (AUTO) oder bewusst vom Nutzer eingegebene (MANUELL)
  // Signale dÃžrfen den K.O.-Deckel auslÃķsen. ERGAENZUNG-Signale bleiben als Hinweis sichtbar, capen aber nicht.
  const activeWarnings=warning.filter(w=>!w.disabled&&w.origin!=='ERGAENZUNG');
  let koCapMin=null;
  activeWarnings.forEach(w=>{
    const sev=getKoSeverity(w.text);
    if(sev)koCapMin=koCapMin===null?sev.cap:Math.min(koCapMin,sev.cap);
  });
  const hasActiveKo=koCapMin!==null;
  // Moderate +-3 Wirkung nur fÃžr NICHT-K.O.-Signale (normale Risiko-Signale)
  const manualPositiveCount=manual.added.filter(m=>m.type==='positive'&&m.active!==false).length;
  const manualWarningCount=manual.added.filter(m=>m.type==='warning'&&m.active!==false&&!isKoSignalText(m.text)).length;
  const disabledAutoPositive=positive.filter(s=>(s.origin==='AUTO'||s.origin==='ERGAENZUNG')&&s.disabled).length;
  const disabledAutoWarning=warning.filter(s=>(s.origin==='AUTO'||s.origin==='ERGAENZUNG')&&s.disabled&&!isKoSignalText(s.text)).length;
  let base=auto.score+manualPositiveCount*3-manualWarningCount*3-disabledAutoPositive*3+disabledAutoWarning*3;
  let score=Math.max(0,Math.min(100,Math.round(base)));
  if(hasActiveKo)score=Math.min(score,koCapMin);
  const provisional=(auto.structuralOpenCount||0)>3;
  const label=hasActiveKo?'Kritisch':(score<35?'Kritisch':(score<70?'Stabil':(auto.label||'Gesund')));
  return {score,label,provisional,positive,warning,open,structuralOpenCount:auto.structuralOpenCount||0,checklist:auto.checklist||null,isKo:hasActiveKo,ts:auto.ts||0};
}

function applyScoreMatrixConsistencyPostProcessing(accId,health){

  return all.some(t=>/(operatives budget|budgetrahmen|budget).{0,60}(vorhanden|bestÃĪtigt|verfÃžgbar|klar)/i.test(t));
}

function extractKnownBusinessFacts(accId){
  // v4.182: harte Fakten nur aus Nutzereingaben/Profil/Feldern, nicht aus generierten Outputs.
  const raw=(getValidatedBusinessInputText(accId)||'').replace(/\s+/g,' ');
  const facts={pain:null,budget:null,authority:null};

  const allAmounts=classifyEuroAmounts(raw);
  const badPainContext=/(budget|budgetrahmen|freigegeben|verfÃžgbar|angebotspreis|startangebot|preis|lizenz|user|nutzer|monatlich|pro user|pro nutzer|app)/i;
  const painCandidates=allAmounts
    .filter(a=>a.role==='pain'&&!badPainContext.test(String(a.segment||'')))
    .map(a=>{
      const seg=String(a.segment||'').toLowerCase();
      let score=a.confidence||0;
      if(/jÃĪhrlich|jahr|jahres|pro jahr/.test(seg))score+=80;
      if(/schaden|verlust|verloren|opportunit|opportunity/.test(seg))score+=60;
      if(/deals?\/monat|pro monat|schwach qualifizierte deals|schlecht qualifizierte deals|4\s+deals/.test(seg))score+=50;
      return {...a,score};
    })
    .sort((a,b)=>(b.score-a.score)||(b.value-a.value));
  if(painCandidates.length)facts.pain=describePainAmount(painCandidates[0]);

  const budgetRoles=getEuroAmountsByRole(raw,'budget').filter(b=>!/schaden|verlust|opportunit|deal/i.test(String(b.segment||'')));
  const budgetValues=[...new Set(budgetRoles.map(b=>b.value))];
  if(budgetValues.length===1)facts.budget=describeBudgetAmount(budgetRoles[0]);
  else if(budgetValues.length>1)facts.budget='Budgetrahmen vorhanden';
  else if(/budgetrahmen|budget\s+(?:vorhanden|bestÃĪtigt|verfÃžgbar|freigegeben)/i.test(raw))facts.budget='Budgetrahmen vorhanden';

  const name=getConfirmedDecisionMakerName(accId);
  if(hasConfirmedFullDecisionAuthority(accId)||hasExplicitAuthorityText(accId)||/(entscheidungsbefugnis|entscheidungsbefugt|entscheider).{0,80}(bestÃĪtigt|klar|vorhanden)|(?:allein|eigenstÃĪndig|selbststÃĪndig).{0,100}(entscheiden|budget|beauftragen|freigeben)/i.test(raw)){
    facts.authority=(name&&name!=='der bestÃĪtigte Entscheider')?name+' allein entscheidungsbefugt':'Entscheider allein entscheidungsbefugt';
  }
  return facts;
}

function hasExplicitContractProcessSignal(accId,health){
  const raw=(getCurrentUserKnowledgeText(accId)+'\n'+JSON.stringify(health||{})).toLowerCase();
  return /(vertragsprozess|vertrag|bestellprozess|bestellung|einkauf|procurement|legal|rechtsabteilung|papierprozess|formal(?:e|er|itÃĪten)|purchase order|po).{0,80}(offen|klÃĪren|unklar|blockiert|notwendig|ausstehend|zustÃĪndig|prozess)|(?:offen|klÃĪren|unklar|blockiert|notwendig|ausstehend|zustÃĪndig|prozess).{0,80}(vertragsprozess|vertrag|bestellprozess|bestellung|einkauf|procurement|legal|rechtsabteilung|papierprozess|formal(?:e|er|itÃĪten)|purchase order|po)/i.test(raw);
}
function preferConcreteCockpitFacts(accId,positives){
  let list=[...(positives||[])];
  const facts=extractKnownBusinessFacts(accId);
  const replaceOrAdd=(pattern,text,preferredIndex)=>{
    if(!text)return;
    list=list.filter(t=>!pattern.test(String(t||'')));
    if(!list.some(t=>String(t||'').toLowerCase()===text.toLowerCase())){
      list.splice(Math.min(preferredIndex,list.length),0,text);
    }
  };
  replaceOrAdd(/schmerz konkret benannt|schmerz quantifiziert|umsatzschaden|jahresschaden|wirtschaftlicher schaden|verlust/i,facts.pain,1);
  replaceOrAdd(/budgetrahmen vorhanden|budget bestÃĪtigt|budget.{0,80}verfÃžgbar|budget|^(?:vorhanden|bestÃĪtigt):?\s*\d[\d.\s,]*\s*(?:âŽ|eur|euro)/i,facts.budget,2);
  replaceOrAdd(/entscheidungsbefugnis bestÃĪtigt|entscheider.*entscheid|entscheidungsbefugt|allein entscheidungsbefugt|kaufentscheidung.*entscheidungsbefugt|dimension.*entscheidungsbefugt/i,facts.authority,0);
  return shortUniqueList(list,4);
}
function sanitizeCockpitTextFinal(accId,text,kind,opts){
  let x=String(text||'').trim();
  if(!x)return '';
  x=sanitizeBadExtractionArtifacts(accId,x,kind);
  if(!x)return '';
  const authority=!!(opts&&opts.authority);
  const budgetFit=!!(opts&&opts.budgetFit);
  const budgetSignal=!!(opts&&opts.budgetSignal);
  const fit=getGenericOfferBudgetFit(accId);
  // Budget-/Preisverwechslungen im Cockpit immer entschÃĪrfen, sobald ein Budgetsignal oder ein echter Angebots-Fit vorliegt.
  // Falls kein Angebotspreis bekannt ist, bleibt es eine Angebots-/Umfangsfrage, aber keine Budget-Passung zu einem Budgetrahmen.
  if(isObsoleteBudgetPriceConfusion(x) && (budgetFit||budgetSignal||fit.fits)){
    if(kind==='positive')return fit.entryRole?'Startangebot liegt klar im Budgetrahmen':'Angebot liegt im Budgetrahmen';
    if(kind==='warning'||kind==='risk')return fit.entryRole?'Startangebot noch nicht verbindlich gestartet':'Angebotsumfang noch nicht verbindlich festgelegt';
    return hasVermeidungsquoteBusinessCase(accId,null)?'Konkrete Pilot-Deals und Messkriterien zur Vermeidungsquote offen':(fit.entryRole?'Einstiegsumfang und Starttermin festlegen':'Angebotsumfang und Starttermin klÃĪren');
  }
  x=sanitizeInventedPrecisionText(accId,x,kind);
  x=normalizeRoiHebelText(x);
  const priceCtx=extractOfferPricingPeriodContext(accId);
  if(priceCtx.startAmount && /(KI21[-\s]?Preis|Preis|Startformat|Compact|Kompakt|Angebotspreis).{0,120}(noch nicht|unklar|offen|klÃĪren|nicht geklÃĪrt)/i.test(x)){
    if(kind==='warning'||kind==='risk')return '';
    return buildOfferPricingBusinessCaseText(accId)||'Startangebot und laufende GebÃžhren sind geklÃĪrt';
  }
  x=sanitizeOfferPricingPeriodText(accId,x);
  if(isUnsafeRoiCalculationText(x))return '';
  if(/^Wirtschaftliche PlausibilitÃĪt separat validieren:/i.test(x)&&kind==='positive')return '';
  if(/keine\s+konkurrenzanalyse|wettbewerbslage\s+unbekannt|wettbewerb\s+unklar/i.test(x)){x='Wettbewerbslage im Auge behalten; kein Wettbewerber bekannt';}
  if(/wettbewerber bereits aktiv/i.test(x) && !hasExplicitCompetitorActiveSignal(accId)){
    x='Wettbewerbslage im Auge behalten; kein konkreter Wettbewerber bekannt';
  }
  x=sanitizeBudgetPriceText(accId,x,kind);
  // Nach der Budget-SÃĪuberung nochmals prÃžfen: alte Budget-Fit-Fragen dÃžrfen im Cockpit nicht sichtbar bleiben,
  // sobald ein passender Angebotsbaustein oder ein belastbares Budgetsignal vorhanden ist.
  if(isObsoleteBudgetPriceConfusion(x) && (budgetFit||budgetSignal||fit.fits)){
    if(kind==='positive')return fit.entryRole?'Startangebot liegt klar im Budgetrahmen':'Angebot liegt im Budgetrahmen';
    if(kind==='warning'||kind==='risk')return fit.entryRole?'Startangebot noch nicht verbindlich gestartet':'Angebotsumfang noch nicht verbindlich festgelegt';
    return hasVermeidungsquoteBusinessCase(accId,null)?'Konkrete Pilot-Deals und Messkriterien zur Vermeidungsquote offen':(fit.entryRole?'Einstiegsumfang und Starttermin festlegen':'Angebotsumfang und Starttermin klÃĪren');
  }
  if(authority&&isObsoleteGfCfoText(x)){
    if(/schaden|jahresschaden|umsatzverlust|umsatzschaden|wirtschaftlicher schaden|quote|vermeidungsquote|roi/i.test(x)){
      return (kind==='warning'||kind==='risk')?'Wirtschaftliche Wirkung mit Entscheider validieren':'Vermeidungsquote mit Entscheider validieren';
    }
    if(kind==='missing'||kind==='open')return 'Wirtschaftlichen Nutzen mit Entscheider validieren';
    if(kind==='warning'||kind==='risk')return 'Formale Beauftragung / Startentscheidung noch offen';
    return '';
  }
  return x;
}

function applyProtectedCockpitSnapshot(accId,health,positive,risks,open){
  const hasVQ=hasVermeidungsquoteBusinessCase(accId,health);
  const facts=extractKnownBusinessFacts(accId);
  let p=[...(positive||[])].map(t=>sanitizeCockpitTextFinal(accId,t,'positive',{})).filter(Boolean);
  let r=[...(risks||[])].map(t=>sanitizeCockpitTextFinal(accId,t,'warning',{})).map(normalizeRoiHebelText).filter(Boolean);
  if(!hasExplicitCompetitorActiveSignal(accId))r=r.filter(t=>!/wettbewerber bereits aktiv/i.test(String(t||'')));
  let o=[...(open||[])].map(t=>sanitizeCockpitTextFinal(accId,t,'open',{})).map(normalizeRoiHebelText).filter(Boolean);

  // Harte Cockpit-Fakten werden aus geprÃžften Feldern neu zusammengesetzt, nicht frei aus KI-Texten.
  if(facts.authority){
    p=p.filter(t=>!/entscheidungsbefug|entscheider|kaufentscheidung|dimension/i.test(String(t||'')));
    p.unshift(facts.authority);
  }
  if(facts.pain){
    p=p.filter(t=>!/schmerz|umsatzschaden|jahresschaden|wirtschaftlicher schaden|verlust|problemkosten/i.test(String(t||'')));
    p.splice(Math.min(1,p.length),0,facts.pain);
  }
  if(facts.budget){
    p=p.filter(t=>!/budget|^(?:vorhanden|bestÃĪtigt):/i.test(String(t||'')));
    p.splice(Math.min(2,p.length),0,facts.budget);
  }

  // Vermeidungsquote: immer als offene Annahme ohne Prozentzahl, sobald dieser Business Case vorliegt.
  if(hasVQ){
    r=r.filter(t=>!/(\d{1,3}\s*%|roi[-\s]?berechnung|roi[-\s]?annahme).{0,80}(vermeidungsquote|vermeidbarkeit)|vermeidungsquote.{0,80}\d{1,3}\s*%|vermeidbarkeit.{0,80}\d{1,3}\s*%/i.test(String(t||'')));
    if(!hasTextInList(r,/vermeidungsquote|vermeidbar/i)){
      const idx=r.length&&/entscheidung|gestoppt|verzÃķgert|beauftragung|startentscheidung/i.test(String(r[0]||''))?1:0;
      r.splice(idx,0,'Vermeidungsquote schwach qualifizierter Deals noch nicht validiert');
    }
    o=o.filter(t=>!/quote[-\s]?validierung|pilot[-\s]?erfolgskriterien|einstiegsumfang|starttermin|deal[-\s]?liste|messlogik/i.test(String(t||'')));
    o.unshift('Konkrete Pilot-Deals und Messkriterien zur Vermeidungsquote offen');
  }

  // Nackte oder widersprÃžchliche Geldfragmente nie anzeigen.
  const moneyFragment=/^(?:vorhanden|bestÃĪtigt):?\s*\d[\d.\s,]*\s*(?:âŽ|eur|euro)(?:\s+verfÃžgbar)?$/i;
  p=p.filter(t=>!moneyFragment.test(String(t||''))).filter(t=>!isUnsafeRoiCalculationText(t)&&!/^Wirtschaftliche PlausibilitÃĪt separat validieren:/i.test(String(t||'')));
  const authorityConfirmed=!!facts.authority||hasConfirmedFullDecisionAuthority(accId)||hasAuthoritySignalInHealth(health);
  // v4.166: dieselbe Schutzschicht gilt auch fÃžr Bottom-Sheets/Health-Detail.
  // Sobald ein Entscheider bestÃĪtigt ist, dÃžrfen GF/CFO-ValidierungsrÃžckfÃĪlle nicht mehr durchrutschen.
  r=r.map(t=>/^verzÃķgert oder gestoppt$/i.test(String(t||''))?'Entscheidung verzÃķgert oder gestoppt':t)
     .map(normalizeRoiHebelText)
     .filter(t=>!(authorityConfirmed&&isObsoleteGfCfoText(t)))
     .filter(t=>!isTechnicalIntegrationDetail(t))
     .filter(t=>!moneyFragment.test(String(t||'')));
  o=o.map(normalizeRoiHebelText)
     .filter(t=>!(authorityConfirmed&&isObsoleteGfCfoText(t)))
     .filter(t=>!isTechnicalIntegrationDetail(t))
     .filter(t=>!moneyFragment.test(String(t||'')));
  p=p.map(normalizeRoiHebelText);

  return {
    positive:shortUniqueList(p.filter(t=>!isUnsafeRoiCalculationText(t)&&!/^Wirtschaftliche PlausibilitÃĪt separat validieren:/i.test(String(t||''))),4),
    risks:shortUniqueList(r,4),
    open:shortUniqueList(o,4)
  };
}

function buildCockpitMatrixData(accId,health){
  const raw=getCurrentUserKnowledgeText(accId).toLowerCase();
  const authorityContext=hasConfirmedFullDecisionAuthority(accId)||hasAuthoritySignalInHealth(health);
  const budgetSignalContext=hasBudgetSignalInHealth(health)||/budget|freigabe|pilotstart|beauftragung/.test(raw);
  const lowPilotUnderBudget=hasLowKi21PilotUnderBudget(accId);
  const explicitContractSignal=hasExplicitContractProcessSignal(accId,health);
  const positives=shortUniqueList((health.positive||[]).filter(s=>!s.disabled).map(s=>sanitizeCockpitTextFinal(accId,s.text,'positive',{authority:authorityContext,budgetFit:lowPilotUnderBudget,budgetSignal:budgetSignalContext})),4);
  const risks=shortUniqueList((health.warning||[]).filter(s=>!s.disabled).map(s=>sanitizeCockpitTextFinal(accId,s.text,'warning',{authority:authorityContext,budgetFit:lowPilotUnderBudget,budgetSignal:budgetSignalContext})),4);
  const open=shortUniqueList((health.open||[]).map(s=>sanitizeCockpitTextFinal(accId,s.text,'open',{authority:authorityContext,budgetFit:lowPilotUnderBudget,budgetSignal:budgetSignalContext})),4);

  // Chancen aus bestÃĪtigten harten Fakten ergÃĪnzen, falls die KI-Liste zu dÃžnn ist.
  if(authorityContext&&!hasTextInList(positives,/entscheidungsbefugnis|entscheider/i)){
    positives.unshift('Entscheidungsbefugnis bestÃĪtigt');
  }
  if(lowPilotUnderBudget&&!hasTextInList(positives,/angebot|startangebot|budgetrahmen|budget/i)){
    positives.push('Startangebot liegt klar im Budgetrahmen');
  } else if(/budget|freigabe|pilotstart|beauftragung/.test(raw)&&!hasTextInList(positives,/budget/i)){
    positives.push('Budgetrahmen vorhanden');
  }
  if((getEuroAmountsByRole(raw,'pain').length>0 || /schmerz|vermeidungsquote|schlechte deals|schwach qualifizierte deals|qualifizierte deals|discovery/.test(raw))&&!hasTextInList(positives,/schmerz|bedarf|nutzen/i)){
    positives.push('Schmerz konkret benannt');
  }

  // Wenn der Score sichtbar mittelmÃĪÃig ist, darf die Matrix nicht "keine Risiken" zeigen.
  // Dann sind fehlender Business Case, Pilotstart oder Vertragsprozess Bremsfaktoren.
  if((health.score||0)<70 && risks.length===0){
    if(!hasTextInList(open,/wirtschaft|nutzen|business|roi|vermeidungsquote/i)){
      risks.push('Business Case noch nicht belastbar');
    }
    if(!hasTextInList(open,/pilot|start|zeitplan/i)){
      risks.push('Pilotstart noch nicht verbindlich');
    }
    if(explicitContractSignal&&!hasTextInList(open,/vertrag|beschaffung|einkauf|paper|bestell/i)){
      risks.push('Vertragsprozess noch offen');
    }
  }

  // Offene Punkte auffÃžllen, damit "Die eine Sache" nicht leer oder zu generisch bleibt.
  if(!hasTextInList(open,/wirtschaft|nutzen|business|roi|vermeidungsquote/i)){
    open.push(authorityContext
      ? 'Wirtschaftlichen Nutzen mit Entscheider validieren'
      : 'Wirtschaftlichen Entscheider validieren');
  }
  if((health.score||0)<70 && !hasTextInList(open,/pilot|start/i))open.push('Pilotstart konkretisieren');
  if((health.score||0)<70 && explicitContractSignal && !hasTextInList(open,/vertrag|beschaffung|einkauf|paper|bestell/i))open.push('Vertragsprozess klÃĪren');

  // Finale Cockpit-SÃĪuberung: Budget-/Preisverwechslungen und Ãžberholte GF-Punkte dÃžrfen nicht sichtbar bleiben.
  const cleanFinal=(list,kind)=>shortUniqueList((list||[]).map(t=>sanitizeCockpitTextFinal(accId,t,kind,{authority:authorityContext,budgetFit:lowPilotUnderBudget,budgetSignal:budgetSignalContext})).filter(Boolean),4);
  let finalPositive=cleanFinal(positives,'positive');
  let finalRisks=cleanFinal(risks,'warning');
  let finalOpen=cleanFinal(open,'open');
  if(lowPilotUnderBudget&&!hasTextInList(finalPositive,/angebot|startangebot|budgetrahmen|budget/i)){
    finalPositive.push('Startangebot liegt klar im Budgetrahmen');
  }
  if(authorityContext&&!hasTextInList(finalOpen,/wirtschaft|nutzen|vermeidungsquote|pilot|start/i)){
    finalOpen.push('Wirtschaftlichen Nutzen und Pilotkriterien validieren');
  }
  // v4.152: absolute finale Cockpit- und Bottom-Sheet-Sperre gegen alte Budget-/GF-RÃžckfÃĪlle aus gecachten Health-Texten.
  finalPositive=cleanFinal(finalPositive,'positive');
  finalRisks=cleanFinal(finalRisks,'warning')
    .map(normalizeRoiHebelText)
    .filter(t=>!(authorityContext&&isObsoleteGfCfoText(t)))
    .filter(t=>!(lowPilotUnderBudget&&isObsoleteBudgetPriceConfusion(t)))
    .filter(t=>!isTechnicalIntegrationDetail(t));
  finalOpen=cleanFinal(finalOpen,'open')
    .map(normalizeRoiHebelText)
    .filter(t=>!(authorityContext&&isObsoleteGfCfoText(t)))
    .filter(t=>!(lowPilotUnderBudget&&isObsoleteBudgetPriceConfusion(t)))
    .filter(t=>!isTechnicalIntegrationDetail(t));
  const hasVQCase=hasVermeidungsquoteBusinessCase(accId,health);
  if(hasVQCase&&!hasTextInList(finalRisks,/vermeidungsquote|vermeidbar/i)){
    const insertAt=finalRisks.length&&/entscheidung|gestoppt|verzÃķgert|beauftragung|startentscheidung/i.test(finalRisks[0])?1:0;
    finalRisks.splice(insertAt,0,'Vermeidungsquote schwach qualifizierter Deals noch nicht validiert');
  }
  if(hasVQCase){
    const comp=finalRisks.filter(t=>/wettbewerb|konkurrenz/i.test(String(t||'')));
    finalRisks=finalRisks.filter(t=>!/wettbewerb|konkurrenz/i.test(String(t||'')));
    finalRisks=finalRisks.concat(comp);
  }
  if(hasVQCase){
    finalOpen=finalOpen.filter(t=>!/^(Einstiegsumfang und Starttermin festlegen|Umfang und Starttermin festlegen|Angebotsumfang und Starttermin klÃĪren)$/i.test(String(t||'')))
      .filter(t=>!/pilot[-\s]?starttermin|deal[-\s]?liste|starttermin.*deal/i.test(String(t||'')));
  }
  if(hasVQCase&&!hasTextInList(finalOpen,/pilot[-\s]?deals|messkriterien|vermeidungsquote/i)){
    finalOpen.unshift('Konkrete Pilot-Deals und Messkriterien zur Vermeidungsquote offen');
  }
  if(lowPilotUnderBudget&&!hasTextInList(finalPositive,/angebot|startangebot|budgetrahmen|budget/i))finalPositive.push('Startangebot liegt klar im Budgetrahmen');
  if((health.score||0)<70&&finalRisks.length===0)finalRisks.push(hasVQCase?'Vermeidungsquote schwach qualifizierter Deals noch nicht validiert':'ROI-Annahme / Vermeidungsquote noch nicht gemessen');
  if(!finalOpen.length)finalOpen.push(authorityContext?'Wirtschaftlichen Nutzen mit Entscheider validieren':'Wirtschaftlichen Entscheider validieren');
  finalPositive=preferConcreteCockpitFacts(accId,finalPositive).map(t=>sanitizeBadExtractionArtifacts(accId,t,'positive')).filter(Boolean);
  if(!explicitContractSignal){
    finalOpen=finalOpen.filter(t=>!/vertragsprozess|vertrag|bestellprozess|einkauf|procurement|paper/i.test(String(t||'')));
    finalRisks=finalRisks.filter(t=>!/vertragsprozess|vertrag|bestellprozess|einkauf|procurement|paper/i.test(String(t||'')));
  }
  const protectedMatrix=applyProtectedCockpitSnapshot(accId,health,
    shortUniqueList(finalPositive.map(normalizeRoiHebelText),4),
    shortUniqueList(finalRisks.map(normalizeRoiHebelText),4),
    shortUniqueList(finalOpen.map(normalizeRoiHebelText),4));
  return protectedMatrix;
}

function extractBulletsAfterHeader3(text,headerKeyword,maxItems){
  const lines=(text||'').split('\n');const out=[];let found=false;
  for(let i=0;i<lines.length;i++){
    if(!found){if(lines[i].toUpperCase().includes(headerKeyword.toUpperCase()))found=true;continue;}
    const t=lines[i].trim();if(!t)break;
    if(/^[A-ZÃÃÃðŊðĨââĒ\-]/.test(t)&&out.length>0)break;
    out.push(t.replace(/^[âĒ\-]\s*/,''));if(out.length>=(maxItems||3))break;
  }
  return out;
}
function extractFirstBulletAfterHeader3(text,headerKeyword){

}

function splitDetailsFromResult(text){
  if(!text)return {main:'',details:''};
  // Robuster Marker-Match: erlaubt fÃžhrende Markdown-Zeichen (#, -, =, *, Leerzeichen) vor/nach ###DETAILS###,
  // falls die KI das exakte Format leicht abweichend ausgibt (z.B. "## ###DETAILS###" oder "###DETAILS###  ")
  const markerRegex=/[#\-=*\s]*###\s*DETAILS\s*###[#\-=*\s]*/i;
  const m=text.match(markerRegex);
  if(!m)return {main:text,details:''};
  const idx=m.index;
  return {main:text.slice(0,idx).trim(),details:text.slice(idx+m[0].length).trim()};
}

function buildPhaseInvestmentLine(accId){
  const ctx=extractOfferPricingPeriodContext(accId);

  if(ctx.includedMonths)txt+=' inkl. '+ctx.includedMonths+' Monate App';

  }
  return txt+'.';
}

function getPhaseScoreInfo(sitId){
  if(!state.activeId)return {score:null,reason:''};
  const data=LS.get('ki21_st_'+state.activeId+'_'+sitId,null);
  if(!data||!data.result)return {score:null,reason:''};
  const matches=[...data.result.matchAll(/(\d+)\s*\/\s*10/g)];
  const m=matches.length?matches[0]:null;
  if(!m)return {score:null,reason:''};
  const score=parseInt(m[1]);
  if(score<1||score>10)return {score:null,reason:''};
  return {score,reason:extractBegruendung(data.result)};
}

function getPhaseStatus(sitId){
  if(!state.activeId)return 'empty';
  const data=LS.get('ki21_st_'+state.activeId+'_'+sitId,null);
  if(data&&data.result)return 'done';
  if(data&&data.fv&&Object.values(data.fv).some(v=>v&&v.trim&&v.trim()))return 'progress';
  return 'empty';
}

// Leitet einen echten Fortschritts-Prozentsatz aus den bereits vorhandenen Eingabefeldern
// (SITS[].felder, ohne post-Felder) ab. Keine erfundene Zahl â 0/100 fÃžr leer/abgeschlossen.
function getPhaseProgressPct(sitId){
  const sit=SITS[sitId];
  if(!state.activeId||!sit)return 0;
  const data=LS.get('ki21_st_'+state.activeId+'_'+sitId,null);
  if(!data)return 0;
  if(data.result)return 100;
  const fields=(sit.felder||[]).filter(f=>!f.post);
  if(!fields.length)return 0;
  const filled=fields.filter(f=>data.fv&&data.fv[f.id]&&data.fv[f.id].trim&&data.fv[f.id].trim()).length;
  return Math.round((filled/fields.length)*100);
}

// Bottom Sheet: zeigt eine Liste von Items in einem von unten eingleitenden Panel.
// title: String, items: [{glyph, text, sub?}], emptyText: String
function showBottomSheet(title, items, emptyText){
  const overlay=document.createElement('div');
  overlay.className='bs-overlay';
  const panel=document.createElement('div');
  panel.className='bs-panel';
  if(String(title||'').toLowerCase().includes('fragen'))panel.classList.add('questions-sheet');

  const handle=document.createElement('div');
  handle.className='bs-handle';
  panel.appendChild(handle);

  const head=document.createElement('div');
  head.className='bs-head';
  const titleEl=document.createElement('div');
  titleEl.className='bs-title';
  titleEl.textContent=title;
  head.appendChild(titleEl);
  panel.appendChild(head);

  const body=document.createElement('div');
  body.className='bs-body';
  if(!items||!items.length){
    const e=document.createElement('div');
    e.className='bs-empty';
    e.textContent=emptyText||'Keine EintrÃĪge vorhanden.';
    body.appendChild(e);
  } else {
    items.forEach((it,idx)=>{
      if(it.separator){
        const sep=document.createElement('div');
        sep.className='bs-separator';
        body.appendChild(sep);
        return;
      }
      const row=document.createElement('div');
      row.className='bs-row'+(it.priority?' bs-priority':'')+(it.onClick?' clickable':'');
      const g=document.createElement('span');
      g.className='bs-glyph';
      g.textContent=it.glyph||'âĒ';
      row.appendChild(g);
      const t=document.createElement('span');
      t.style.flex='1';
      if(it.caption){
        const cap=document.createElement('div');
        cap.className='bs-priority-caption';
        cap.textContent=it.caption;
        t.appendChild(cap);
      }
      const main=document.createElement('div');
      main.textContent=it.text;
      t.appendChild(main);
      row.appendChild(t);
      if(it.onClick){
        const arrow=document.createElement('span');
        arrow.className='bs-row-arrow';
        arrow.textContent='âš';
        row.appendChild(arrow);
        row.addEventListener('click',e=>{e.stopPropagation();close();it.onClick();});
      }
      body.appendChild(row);
    });
  }
  panel.appendChild(body);

  const close=()=>{
    overlay.classList.remove('visible');
    panel.classList.remove('visible');
    setTimeout(()=>{overlay.remove();panel.remove();},280);
  };
  overlay.addEventListener('click',close);

  // Swipe-down to dismiss
  let startY=0;
  panel.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;},{passive:true});
  panel.addEventListener('touchend',e=>{
    if(e.changedTouches[0].clientY-startY>60)close();
  },{passive:true});

  document.body.appendChild(overlay);
  document.body.appendChild(panel);
  requestAnimationFrame(()=>{overlay.classList.add('visible');panel.classList.add('visible');});
}
