function buildCtx(cust,mu,kk,stk){
  let s='--- KONTEXT ---\n';
  s+='PFLICHT: Kennzeichne jede Information: ✅ BESTÄTIGT / ⚠️ ANNAHME / ❓ KLÄREN\n';
  s+='ROI: Nur bestätigte Kundenzahlen verwenden. Zeitersparnis NUR für Account Manager.\n';
  s+='Format Handlungsempfehlungen: → TUN: [was genau + wann]\n';
  if(cust.firma)s+='Kunde: '+cust.firma+'\n';
  if(cust.ap)s+='Ansprechpartner: '+cust.ap+'\n';
  if(cust.branche)s+='Branche: '+cust.branche+'\n';
  if(cust.ma)s+='Mitarbeiter: '+cust.ma+'\n';
  if(cust.um)s+='Umsatz: '+cust.um+'\n';
  if(kk)s+='\nKontext Kunde:\n'+kk+'\n';
  if(mu&&mu.profil)s+='\nMein Unternehmen:\n'+mu.profil+'\n';
  if(mu&&mu.bausteine)s+='\nAngebotsbausteine:\n'+mu.bausteine+'\n';
  if(stk)s+='\nZusätzlicher Kontext:\n'+stk+'\n';
  return s+'--- ENDE KONTEXT ---\n\n';
}

// ── CLAUDE API ─────────────────────────────────────────────
async function callClaude(prompt, onStream){
  const apiKey=LS.get('ki21_apikey','');
  if(!apiKey){alert('Bitte API Key unter ⚙ hinterlegen.');return null;}
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',
      max_tokens:4096,
      stream:true,
      tools:[{type:'web_search_20250305',name:'web_search',max_uses:3}],
      messages:[{role:'user',content:prompt}]
    })
  });
  if(!resp.ok){const err=await resp.json();throw new Error(err.error?.message||'API Fehler '+resp.status);}
  const reader=resp.body.getReader();
  const decoder=new TextDecoder();
  let fullText='';
  while(true){
    const {done,value}=await reader.read();
    if(done)break;
    const chunk=decoder.decode(value,{stream:true});
    const lines=chunk.split('\n');
    for(const line of lines){
      if(line.startsWith('data: ')){
        const data=line.slice(6);
        if(data==='[DONE]')continue;
        try{
          const parsed=JSON.parse(data);
          if(parsed.type==='content_block_start'&&parsed.content_block?.type==='tool_use'){
            if(onStream)onStream(fullText+'\n🔍 Suche aktuelle Informationen...\n');
          }
          if(parsed.type==='content_block_start'&&parsed.content_block?.type==='text'){
            fullText='';
          }
          if(parsed.type==='content_block_delta'&&parsed.delta?.text){
            fullText+=parsed.delta.text;
            if(onStream)onStream(fullText);
          }
        }catch(e){}
      }
    }
  }
  return fullText;
}

// ── HELPERS ────────────────────────────────────────────────
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')el.className=v;
    else el.setAttribute(k,v);
  });
  children.flat().forEach(c=>{
    if(c==null)return;
    el.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return el;
}

function modal(title,content,onClose){
  const bg=h('div',{className:'modal-bg'});
  bg.addEventListener('click',e=>{if(e.target===bg){bg.remove();if(onClose)onClose();}});
  const box=h('div',{className:'modal-box'},
    h('div',{className:'modal-handle'}),
    h('div',{className:'modal-title'},title),
    content
  );
  bg.appendChild(box);
  document.body.appendChild(bg);
  return bg;
}

function btn(label,className,onClick){
  const b=h('button',{className,onclick:onClick},label);
  return b;
}

function getActive(){return state.accounts.find(a=>a.id===state.activeId)||null;}
function getActiveCust(){return(getActive()||{cust:{}}).cust;}

function getActiveScore(){
  const aid=LS.get('ki21_aid',null);
  if(!aid)return null;
  return LS.get('ki21_score_'+aid,null);
}

function getScoreColor(){
  const s=getActiveScore();
  if(!s)return '#8b949e';
  if(s>=8)return '#2ea043';
  if(s>=5)return '#d29922';
  return '#f85149';
}

function getScoreBg(){
  const s=getActiveScore();
  if(!s)return 'transparent';
  if(s>=8)return 'rgba(46,160,67,.15)';
  if(s>=5)return 'rgba(210,153,34,.15)';
  return 'rgba(248,81,73,.15)';
}

function getScoreLabel(){
  const s=getActiveScore();
  if(!s)return '';
  const emoji=s>=8?'🔥':s>=5?'✅':'⚠️';
  return emoji+' '+s+'/10';
}

async function transferAndGo(fromId, toId, result){
  // Show loading overlay
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(13,17,23,.95);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;';
  overlay.innerHTML='<div style="font-size:32px">⚡</div><div style="font-size:14px;color:#ff6b00;font-weight:700;">Wichtigstes wird extrahiert...</div><div style="font-size:12px;color:#8b949e;">Claude priorisiert für '+SITS[toId].title+'</div>';
  document.body.appendChild(overlay);

  const extractMap={
    0:{
      f1:{fid:'checkliste', prompt:`Extrahiere aus diesem Qualifizierungs-Steckbrief die TOP 10 wichtigsten Erkenntnisse für die Besuchsvorbereitung.

PRIORITÄT:
1. Entscheider und Machtlage
2. Budget und Timeline
3. Schmerzpunkte und Kaufmotive
4. Wettbewerber-Situation
5. Risiken und Chancen

Format: Nummerierte Liste, jeder Punkt max. 2 Sätze. Klar und direkt.

Text:
`},
      f2:{fid:'fragen', prompt:`Extrahiere aus diesem Text die TOP 10 Qualifizierungsfragen fürs Telefonat.

PRIORITÄT:
1. ROT-Fragen zuerst (Budget, Entscheider, Timeline)
2. GELB-Fragen (Machtlage, Auslöser)
3. GRÜN-Fragen (Details)

Format: Nummerierte Liste mit Priorität [ROT/GELB/GRÜN], kurz und präzise.

Text:
`}
    },
    1:{
      f1:{fid:'leitfaden', prompt:`Extrahiere die TOP 10 wichtigsten Erkenntnisse aus dieser Besuchsvorbereitung.

PRIORITÄT:
1. Bestätigte Schmerzpunkte
2. Entscheider und ihre Motive
3. Wettbewerber-Situation
4. Offene Risiken
5. Strategische Hinweise

Format: Nummerierte Liste, jeder Punkt max. 2 Sätze.

Text:
`},
      f2:{fid:'fragen', prompt:`Extrahiere die TOP 10 wichtigsten Discovery-Fragen aus diesem Leitfaden.

PRIORITÄT:
1. Schmerz-Fragen (was kostet das Problem?)
2. Ursachen-Fragen
3. Auswirkungs-Fragen
4. KPI-Fragen für ROI
5. Entscheidungs-Fragen

Format: Nummerierte Liste, jede Frage direkt formuliert.

Text:
`}
    },
    2:{
      f1:{fid:'discovery', prompt:`Extrahiere die TOP 10 wichtigsten Discovery-Erkenntnisse für die Demo-Vorbereitung.

PRIORITÄT:
1. Bestätigte Schmerzpunkte in Kundensprache
2. Was in der Demo gezeigt werden MUSS
3. Was NICHT gezeigt werden soll
4. Kaufargumente pro Entscheider
5. Wettbewerber-Positionierung

Format: Nummerierte Liste, jeder Punkt max. 2 Sätze.

Text:
`}
    },
    5:{
      f1:{fid:'erkenntnisse', prompt:`Extrahiere die TOP 10 wichtigsten Erkenntnisse für die Angebotserstellung.

PRIORITÄT:
1. Bestätigte Schmerzpunkte in Kundensprache
2. ROI-Zahlen und Business Case
3. Entscheider-Motive
4. Zu erwartende Einwände
5. Nächste Schritte

Format: Nummerierte Liste, jeder Punkt max. 2 Sätze.

Text:
`}
    }
  };

  try{
    const nextKEY='ki21_st_'+state.activeId+'_'+toId;
    const nextData=LS.get(nextKEY,{fv:{},result:''});
    const map=extractMap[fromId];

    if(map){
      // Call Claude for each field
      const fields=Object.values(map);
      for(const f of fields){
        const extracted=await callClaude(f.prompt+result,null);
        if(extracted) nextData.fv[f.fid]=extracted;
      }
    }

    LS.set(nextKEY,nextData);
  }catch(e){
    console.error('Transfer error:',e);
    // Fallback: copy full result
    const nextKEY='ki21_st_'+state.activeId+'_'+toId;
    const nextData=LS.get(nextKEY,{fv:{},result:''});
    nextData.fv[Object.values(extractMap[fromId]||{})[0]?.fid||'leitfaden']=result;
    LS.set(nextKEY,nextData);
  }finally{
    overlay.remove();
    renderStation(toId);
  }
}

function renderStation(sitId){
  const sit=SITS[sitId];
  const KEY='ki21_st_'+state.activeId+'_'+sitId;
  let data=LS.get(KEY,{fv:{},result:''});
  let loading=false;

  const app=document.getElementById('app');
  app.innerHTML='';
  LS.set('ki21_view',sitId);

  const cust=getActiveCust();
  const mu=LS.get('ki21_mu',{});
  const kk=LS.get('ki21_kk_'+state.activeId,'');
  const stk=LS.get('ki21_stk_'+state.activeId+'_'+sitId,'');

  const nav=h('div',{className:'nav'},
    h('button',{className:'nav-brand',onclick:renderHome},'KI21'),
    h('span',{style:{fontSize:'9px',color:'#484f58',marginLeft:'2px',fontWeight:'400'}},'v1.4'),
    h('div',{className:'nav-right'},
      h('button',{className:'btn',onclick:showMeinUnternehmen},'Mein Unternehmen'),
      h('button',{className:'btn',onclick:showSettings},'⚙')
    )
  );

  const wrap=h('div',{className:'station-wrap'});

  // Header
  const header=h('div',{className:'st-header'},
    h('button',{className:'st-back',onclick:renderHome},'←'),
    h('div',{style:{flex:1}},
      h('div',{className:'st-phase'},sit.phase),
      h('div',{className:'st-title'},sit.icon+' '+sit.title)
    )
  );
  if(cust.firma)header.appendChild(h('div',{className:'st-cust'},cust.firma));
  wrap.appendChild(header);

  // Phase nav
  const phaseNav=h('div',{className:'phase-nav'});
  if(sitId>0){
    phaseNav.appendChild(h('button',{className:'btn',onclick:()=>renderStation(sitId-1)},'← '+SITS[sitId-1].title));
  }
  phaseNav.appendChild(h('div',{style:{flex:1}}));
  const stkBtn=h('button',{className:'btn',
    style:{color:stk?'#ff6b00':'#8b949e',borderColor:stk?'rgba(255,107,0,.3)':'#30363d'},
    onclick:()=>showStkModal(sitId,sit.title)
  },'Kontext '+sit.title);
  phaseNav.appendChild(stkBtn);
  if(sitId<SITS.length-1){
    phaseNav.appendChild(h('button',{className:'btn',
      style:{color:'#ff6b00',borderColor:'rgba(255,107,0,.3)'},
      onclick:()=>renderStation(sitId+1)
    },SITS[sitId+1].title+' →'));
  }
  wrap.appendChild(phaseNav);

  // Regel
  wrap.appendChild(h('div',{className:'regel'},sit.regel));

  // Fields
  const fieldsDiv=h('div',{});
  sit.felder.forEach(f=>{
    const fw=h('div',{className:'field-wrap'});
    fw.appendChild(h('div',{className:'field-label'},f.l));
    let inp;
    if(f.t==='select'){
      inp=h('select',{});
      const def=h('option',{value:''},'– wählen –');
      inp.appendChild(def);
      (f.opts||[]).forEach(o=>{
        const opt=h('option',{value:o},o);
        if(data.fv[f.id]===o)opt.selected=true;
        inp.appendChild(opt);
      });
      inp.value=data.fv[f.id]||'';
    } else if(f.t==='ta'){
      inp=h('textarea',{placeholder:f.p||''});
      if(f.big)inp.style.minHeight='200px';
      inp.value=data.fv[f.id]||'';
    } else {
      inp=h('input',{type:'text',placeholder:f.p||''});
      inp.value=data.fv[f.id]||'';
    }
    inp.addEventListener('input',e=>{
      data.fv[f.id]=e.target.value;
      LS.set(KEY,data);
    });
    if(f.t==='ta'){
      const taWrap=h('div',{style:{position:'relative'}});
      const fsBtn=h('button',{
        style:{position:'absolute',top:'6px',right:'6px',
          background:'rgba(255,107,0,.2)',border:'1px solid rgba(255,107,0,.4)',
          color:'#ff6b00',borderRadius:'4px',padding:'2px 7px',fontSize:'12px',
          cursor:'pointer',zIndex:10,lineHeight:'1.5'},
        onclick:()=>showFullscreenEdit(f.l,inp.value,(v)=>{
          inp.value=v; data.fv[f.id]=v; LS.set(KEY,data);
        })
      },'⛶');
      taWrap.appendChild(inp);
      taWrap.appendChild(fsBtn);
      fw.appendChild(taWrap);
    } else {
      fw.appendChild(inp);
    }
    fieldsDiv.appendChild(fw);
  });
  wrap.appendChild(fieldsDiv);

  // Generate button
  const genBtn=h('button',{className:'btn-o',onclick:generate},'⚡ Mit Claude generieren');
  const resetBtn=h('button',{className:'btn-reset',onclick:()=>{
    data={fv:{},result:''};
    LS.set(KEY,data);
    renderStation(sitId);
  }},'↺');
  const genRow=h('div',{className:'gen-row'});
  genRow.appendChild(genBtn);
  genRow.appendChild(resetBtn);
  wrap.appendChild(genRow);

  // Summary box (Demo-Vorbereitung only)
  const demoSummaryBox=h('div',{className:'result-box',
    style:{display:(sitId===3&&data.summary)?'block':'none',
      borderColor:'rgba(255,107,0,.4)',marginBottom:'10px'}});
  const demoSummaryHead=h('div',{className:'result-head',style:{background:'rgba(255,107,0,.12)'}});
  const demoSummaryLabel=h('span',{className:'result-label'},'⚡ Kurzfassung – Die 5 Punkte die zählen');
  const demoSummaryBtns=h('div',{className:'result-btns'});
  const demoSummaryCopyBtn=h('button',{className:'btn',onclick:()=>{
    if(navigator.clipboard)navigator.clipboard.writeText(data.summary||'').then(()=>{
      demoSummaryCopyBtn.textContent='✓';setTimeout(()=>demoSummaryCopyBtn.textContent='Kopieren',2000);
    });
  }},'Kopieren');
  demoSummaryBtns.appendChild(demoSummaryCopyBtn);
  demoSummaryHead.appendChild(demoSummaryLabel);
  demoSummaryHead.appendChild(demoSummaryBtns);
  const demoSummaryBody=h('div',{className:'result-body',
    style:{fontSize:'13px',lineHeight:'1.7'}},data.summary||'');
  demoSummaryBox.appendChild(demoSummaryHead);
  demoSummaryBox.appendChild(demoSummaryBody);
  wrap.appendChild(demoSummaryBox);

  // Result box
  const resultBox=h('div',{className:'result-box',style:{display:data.result?'block':'none'}});
  const resultHead=h('div',{className:'result-head'});
  const resultLabel=h('span',{className:'result-label'},'✓ Claude Antwort');
  const resultBtns=h('div',{className:'result-btns'});
  const copyBtn=h('button',{className:'btn',onclick:()=>{
    const txt=data.result;
    if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>{
      copyBtn.textContent='✓';setTimeout(()=>copyBtn.textContent='Kopieren',2000);
    });
  }},'Kopieren');
  const fullBtn=h('button',{className:'btn',onclick:()=>showFullscreen(sit.title,data.result)},'⛶');
  const shareBtn=h('button',{className:'btn',
    style:{background:'#ff6b00',color:'#fff',borderColor:'#ff6b00'},
    onclick:()=>{
      if(navigator.share)navigator.share({title:'KI21 – '+sit.title,text:data.result});
      else copyBtn.click();
    }
  },'Teilen ↗');
  resultBtns.appendChild(copyBtn);
  resultBtns.appendChild(fullBtn);
  resultBtns.appendChild(shareBtn);
  resultHead.appendChild(resultLabel);
  resultHead.appendChild(resultBtns);
  const resultBody=h('div',{className:'result-body'},data.result||'');
  // Weiter button
  const weiterRow=h('div',{style:{padding:'8px 12px',borderTop:'1px solid #30363d',display:'none'}});
  resultBox.appendChild(resultHead);
  resultBox.appendChild(resultBody);
  resultBox.appendChild(weiterRow);
  wrap.appendChild(resultBox);

  // Show weiter button if result already exists (navigating back)
  if(data.result){
    const nextMapInit={
      0:{nextId:1},1:{nextId:2},2:{nextId:3},4:{nextId:5},5:{nextId:6}
    };
    if(nextMapInit[sitId]){
      const nextId=nextMapInit[sitId].nextId;
      const wb=h('button',{
        style:{background:'#ff6b00',border:'none',color:'#fff',borderRadius:'7px',
          padding:'10px 14px',fontSize:'13px',fontWeight:'700',cursor:'pointer',
          fontFamily:'DM Sans,sans-serif',width:'100%'},
        onclick:()=>transferAndGo(sitId,nextId,data.result)
      },'Weiter zu '+SITS[nextId].title+' →');
      weiterRow.appendChild(wb);
      weiterRow.style.display='block';
    }
  }

  async function generate(){
    if(!cust.firma){alert('Bitte zuerst einen Kunden wählen.');return;}
    if(loading)return;
    loading=true;
    genBtn.disabled=true;
    genBtn.textContent='⏳ Claude antwortet...';
    resultLabel.textContent='⏳ Claude antwortet...';
    resultBox.style.display='block';
    resultBody.textContent='';
    resultBox.scrollIntoView({behavior:'smooth',block:'start'});

    const prompt=sit.build(data.fv,cust,mu,kk,stk);
    try{
      const result=await callClaude(prompt,(streamText)=>{
        resultBody.textContent=streamText;
        data.result=streamText;
        fullBtn.onclick=()=>showFullscreen(sit.title,streamText);
      });
      if(result){
        data.result=result;
        data.prompt=prompt;
        LS.set(KEY,data);
        resultLabel.textContent='✓ Claude Antwort';
        // Extract deal score from result
        const scoreMatch=result.match(/Score[:\s]+(\d+)[\/\s]*10/i)||
                         result.match(/(\d+)\s*\/\s*10/)||
                         result.match(/Bewertung[:\s]+(\d+)/i);
        if(scoreMatch){
          const score=parseInt(scoreMatch[1]);
          if(score>=1&&score<=10){
            saveScore(score);
            const scoreEl=document.getElementById('deal-score-nav');
            if(scoreEl){
              scoreEl.textContent=(score>=8?'🔥':score>=5?'✅':'⚠️')+' '+score+'/10';
              scoreEl.style.color=score>=8?'#2ea043':score>=5?'#d29922':'#f85149';
            }
          }
        }

        // For Demo-Vorbereitung (sitId===3): generate compact summary
        if(sitId===3){
          demoSummaryBox.style.display='block';
          demoSummaryBody.textContent='⏳ Kurzfassung wird erstellt...';
          try{
            const summaryPrompt=`Erstelle aus diesem Demo-Leitfaden eine kompakte Kurzfassung für den Verkäufer.

Format:
🎯 DEMO-ZIEL: [1 Satz was wir erreichen wollen]

TOP 5 PUNKTE DIE ZÄHLEN:
1. [wichtigster Punkt]
2. [wichtiger Punkt]
3. [wichtiger Punkt]
4. [wichtiger Punkt]
5. [wichtiger Punkt]

⚠️ UNBEDINGT VERMEIDEN:
- [1-2 Punkte]

💡 ABSCHLUSS-FRAGE: [Die eine Frage am Ende der Demo]

Leitfaden:
`+result;
            const summary=await callClaude(summaryPrompt,null);
            if(summary){
              demoSummaryBody.textContent=summary;
              data.summary=summary;
              LS.set(KEY,data);
            }
          }catch(e){
            demoSummaryBody.textContent='Kurzfassung konnte nicht erstellt werden.';
          }
        }

        // Show Weiter button based on phase
        weiterRow.innerHTML='';
        const nextMap={
          0:{nextId:1, fields:[
            {fid:'checkliste', label:'Qualifizierungsergebnisse', extract:'full'},
            {fid:'fragen', label:'Qualifizierungsfragen', extract:'checkliste'}
          ]},
          1:{nextId:2, fields:[
            {fid:'leitfaden', label:'Ergebnisse Besuchsvorbereitung', extract:'full'},
            {fid:'fragen', label:'Discovery-Fragen', extract:'discovery_questions'}
          ]},
          2:{nextId:3, fields:[
            {fid:'discovery', label:'Discovery-Ergebnisse', extract:'full'}
          ]},
          4:{nextId:5, fields:[
            {fid:'discovery', label:'KPIs aus der Discovery', extract:'full'}
          ]},
          5:{nextId:6, fields:[
            {fid:'erkenntnisse', label:'Erkenntnisse', extract:'full'}
          ]}
        };

        if(nextMap[sitId]){
          const next=nextMap[sitId];
          const weiterBtn=h('button',{
            style:{background:'#ff6b00',border:'none',color:'#fff',borderRadius:'7px',
              padding:'10px 14px',fontSize:'13px',fontWeight:'700',cursor:'pointer',
              fontFamily:'DM Sans,sans-serif',width:'100%'},
            onclick:()=>transferAndGo(sitId,next.nextId,result)
          },'Weiter zu '+SITS[next.nextId].title+' →');
          weiterRow.appendChild(weiterBtn);
          weiterRow.style.display='block';
        }
      }
    }catch(e){
      alert('Fehler: '+e.message);
      resultBox.style.display='none';
    }finally{
      loading=false;
      genBtn.disabled=false;
      genBtn.textContent='⚡ Mit Claude generieren';
    }
  }

  app.appendChild(nav);
  app.appendChild(wrap);
}

function showKunde(){
  const m=modal('Kunde wählen', buildKundeContent(), null);

  function buildKundeContent(){
    const div=h('div',{});

    if(state.accounts.length>0){
      div.appendChild(h('div',{style:{fontSize:'10px',fontWeight:'700',letterSpacing:'.8px',
        textTransform:'uppercase',color:'#8b949e',marginBottom:'8px'}},'Zuletzt verwendet'));

      state.accounts.forEach(a=>{
        const row=h('div',{className:'acc-row'+(a.id===state.activeId?' active':''),
          onclick:()=>{state.activeId=a.id;LS.set('ki21_aid',a.id);m.remove();
            if(state.pendingSit!==null){const s=state.pendingSit;state.pendingSit=null;renderStation(s);}
            else renderHome();}
        },
          h('div',{style:{flex:1,minWidth:0}},
            h('div',{className:'acc-name'},a.cust.firma),
            h('div',{className:'acc-sub'},(a.cust.ap||'')+(a.cust.branche?' · '+a.cust.branche:''))
          ),
          h('div',{className:'acc-btns'},
            a.id===state.activeId?h('span',{className:'acc-active'},'aktiv'):h('span',{},''),
            h('button',{className:'btn',onclick:e=>{e.stopPropagation();m.remove();showEditKunde(a);}},'\u270E'),
            h('button',{style:{background:'transparent',border:'none',color:'#484f58',
              fontSize:'16px',cursor:'pointer',padding:'0 2px'},
              onclick:e=>{e.stopPropagation();
                if(confirm('Kunde löschen?')){
                  state.accounts=state.accounts.filter(x=>x.id!==a.id);
                  LS.set('ki21_acc',state.accounts);
                  if(state.activeId===a.id){state.activeId=state.accounts.length>0?state.accounts[0].id:null;LS.set('ki21_aid',state.activeId);}
                  m.remove();showKunde();
                }
              }},'×')
          )
        );
        div.appendChild(row);
      });
      div.appendChild(h('div',{style:{height:'8px'}}));
    }

    div.appendChild(h('button',{className:'btn-o',onclick:()=>{m.remove();showNeuerKunde();}},
      '+ Neuer Kunde'));
    return div;
  }
}

function showNeuerKunde(initial,accId){
  const isEdit=!!accId;
  const f={firma:'',ap:'',branche:'',ma:'',um:'',...(initial||{})};
  let kk=accId?LS.get('ki21_kk_'+accId,''):'';
  let tab='stamm';

  const content=h('div',{});
  const tabRow=h('div',{className:'tab-row'});
  const tabStamm=h('button',{className:'tab-btn',
    style:{background:'#ff6b00',color:'#fff'},onclick:()=>switchTab('stamm')},'Stammdaten');
  const tabKontext=h('button',{className:'tab-btn',
    style:{background:'#1c2333',color:'#8b949e'},onclick:()=>switchTab('kontext')},'Kontext Kunde');
  tabRow.appendChild(tabStamm);
  tabRow.appendChild(tabKontext);
  content.appendChild(tabRow);

  const stammDiv=h('div',{});
  const kontextDiv=h('div',{style:{display:'none'}});

  const fields=[
    {k:'firma',l:'Firmenname *',p:'z.B. Lueg AG, Essen'},
    {k:'ap',l:'Ansprechpartner',p:'z.B. Herr Bernd, ext. Berater'},
    {k:'branche',l:'Branche',p:'z.B. Automobilhandel'},
  ];
  const inputs={};
  fields.forEach(x=>{
    const fw=h('div',{style:{marginBottom:'10px'}});
    fw.appendChild(h('div',{className:'field-label'},x.l));
    const inp=h('input',{type:'text',placeholder:x.p});
    inp.value=f[x.k]||'';
    inp.addEventListener('input',e=>f[x.k]=e.target.value);
    inputs[x.k]=inp;
    fw.appendChild(inp);
    stammDiv.appendChild(fw);
  });
  const twoCol=h('div',{style:{display:'flex',gap:'8px'}});
  [{k:'ma',l:'Mitarbeiter',p:'z.B. 900'},{k:'um',l:'Umsatz',p:'z.B. 800 Mio.'}].forEach(x=>{
    const fw=h('div',{style:{flex:1,marginBottom:'10px'}});
    fw.appendChild(h('div',{className:'field-label'},x.l));
    const inp=h('input',{type:'text',placeholder:x.p});
    inp.value=f[x.k]||'';
    inp.addEventListener('input',e=>f[x.k]=e.target.value);
    fw.appendChild(inp);
    twoCol.appendChild(fw);
  });
  stammDiv.appendChild(twoCol);

  const kkTa=h('textarea',{placeholder:'Bekannte Herausforderungen, Strategie, Wettbewerber, politische Situation...'});
  kkTa.value=kk;
  kkTa.addEventListener('input',e=>kk=e.target.value);
  kontextDiv.appendChild(h('p',{className:'modal-desc'},'Fließt in alle Stationen ein.'));
  kontextDiv.appendChild(kkTa);

  content.appendChild(stammDiv);
  content.appendChild(kontextDiv);

  function switchTab(t){
    tab=t;
    stammDiv.style.display=t==='stamm'?'block':'none';
    kontextDiv.style.display=t==='kontext'?'block':'none';
    tabStamm.style.background=t==='stamm'?'#ff6b00':'#1c2333';
    tabStamm.style.color=t==='stamm'?'#fff':'#8b949e';
    tabKontext.style.background=t==='kontext'?'#ff6b00':'#1c2333';
    tabKontext.style.color=t==='kontext'?'#fff':'#8b949e';
  }

  const btns=h('div',{className:'modal-row'});
  const saveB=h('button',{className:'btn-o',onclick:()=>{
    if(!f.firma.trim()){alert('Bitte Firmenname eingeben.');return;}
    if(isEdit){
      state.accounts=state.accounts.map(a=>a.id===accId?{...a,cust:{...f}}:a);
      LS.set('ki21_kk_'+accId,kk);
    } else {
      const id='acc_'+Date.now();
      state.accounts=[{id,cust:{...f},ts:Date.now()},...state.accounts].slice(0,10);
      state.activeId=id;
      LS.set('ki21_aid',id);
      LS.set('ki21_kk_'+id,kk);
    }
    LS.set('ki21_acc',state.accounts);
    m.remove();
    if(state.pendingSit!==null){const s=state.pendingSit;state.pendingSit=null;renderStation(s);}
    else renderHome();
  }},isEdit?'Speichern':'Anlegen');
  const cancelB=h('button',{className:'btn',onclick:()=>m.remove()},'Abbrechen');
  saveB.style.flex='1';
  btns.appendChild(saveB);
  btns.appendChild(cancelB);
  content.appendChild(btns);

  const m=modal(isEdit?'Kunde bearbeiten':'Neuer Kunde',content,null);
}

async function pushToGitHub(){
  const token=LS.get('ki21_github_token','');
  if(!token){alert('Bitte zuerst GitHub Token in Einstellungen hinterlegen.');return;}

  const headers={
    'Authorization':'token '+token,
    'Accept':'application/vnd.github.v3+json',
    'Content-Type':'application/json'
  };

  // Step 1: Get current SHA
  const shaResp=await fetch('https://api.github.com/repos/KI21-Vertrieb/KI21/contents/index.html',{headers});
  if(!shaResp.ok)throw new Error('GitHub Fehler '+shaResp.status);
  const shaData=await shaResp.json();
  const sha=shaData.sha;

  // Step 2: Fetch fresh source from GitHub (not from DOM)
  const sourceResp=await fetch(window.location.href+'?nocache='+Date.now());
  if(!sourceResp.ok)throw new Error('Source Fehler '+sourceResp.status);
  const sourceText=await sourceResp.text();
  
  // Step 3: Encode to base64
  const bytes=new TextEncoder().encode(sourceText);
  let b64='';
  const chunk=8192;
  for(let i=0;i<bytes.length;i+=chunk){
    b64+=String.fromCharCode(...bytes.subarray(i,i+chunk));
  }
  const encoded=btoa(b64);

  // Step 4: Push to GitHub
  const pushResp=await fetch('https://api.github.com/repos/KI21-Vertrieb/KI21/contents/index.html',{
    method:'PUT',
    headers,
    body:JSON.stringify({
      message:'KI21 Update '+new Date().toLocaleDateString('de-DE'),
      content:encoded,
      sha:sha
    })
  });
  if(!pushResp.ok)throw new Error('Push Fehler '+pushResp.status);
  return true;
}


function showGitHub(){
  const hasGHToken=!!LS.get('ki21_github_token','');
  let newGHToken='';

  const status=h('div',{className:'status-box',
    style:{background:hasGHToken?'rgba(46,160,67,.12)':'#1c2333',
      border:'1px solid '+(hasGHToken?'rgba(46,160,67,.3)':'#30363d'),
      marginBottom:'14px'}},
    h('div',{style:{fontSize:'20px',marginBottom:'4px'}},hasGHToken?'✅':'🐙'),
    h('div',{style:{fontSize:'13px',fontWeight:'700',color:hasGHToken?'#2ea043':'#e6edf3'}},
      hasGHToken?'GitHub verbunden':'GitHub nicht verbunden'),
    h('div',{style:{fontSize:'11px',color:'#8b949e',marginTop:'2px'}},
      hasGHToken?'🚀 App aktualisieren → deployed automatisch':'Token einmalig hinterlegen')
  );

  const content=h('div',{},status);

  if(hasGHToken){
    const pushB=h('button',{className:'btn-o',
      style:{background:'#238636',marginBottom:'8px'},
      onclick:async()=>{
        pushB.disabled=true;
        pushB.textContent='⏳ Wird hochgeladen...';
        try{
          await pushToGitHub();
          pushB.textContent='✅ Deployed!';
          setTimeout(()=>{pushB.textContent='🚀 App aktualisieren';pushB.disabled=false;},3000);
        }catch(e){
          alert('Fehler: '+e.message);
          pushB.textContent='🚀 App aktualisieren';
          pushB.disabled=false;
        }
      }
    },'🚀 App aktualisieren');
    content.appendChild(pushB);
    content.appendChild(h('button',{className:'btn',
      style:{width:'100%',marginTop:'4px'},
      onclick:()=>{if(confirm('GitHub Token löschen?')){LS.set('ki21_github_token','');m.remove();showGitHub();}}},
      'Token löschen'));
  } else {
    content.appendChild(h('div',{className:'field-label',style:{marginBottom:'6px'}},'GitHub Token eingeben'));
    const inp=h('input',{type:'password',placeholder:'ghp_...'});
    inp.addEventListener('input',e=>newGHToken=e.target.value);
    content.appendChild(inp);
    content.appendChild(h('p',{style:{fontSize:'11px',color:'#484f58',margin:'6px 0 10px',lineHeight:'1.5'}},
      'Einmalig speichern – dann reicht ein Tap zum Updaten.'));
    content.appendChild(h('button',{className:'btn-o',
      style:{background:'#238636'},
      onclick:()=>{
        if(!newGHToken.trim())return;
        LS.set('ki21_github_token',newGHToken.trim());
        m.remove();
        showGitHub();
      }},'GitHub Token speichern'));
  }

  const m=modal('GitHub Auto-Deploy',content,null);
}
