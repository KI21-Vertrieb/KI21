<script>
'use strict';
const VERSION='KI21 Core 8.9.1 · Startup & Parser Stability';
const HEADER_VERSION=VERSION.replace(/^KI21\s+/,'').split(' · ')[0];
const STORAGE_KEY='ki21_core_842_portfolio';
const LEGACY_KEYS=['ki21_core_841_portfolio','ki21_core_830_state'];
const DEFAULT_IMPORT=`Unternehmen
Firmenname: Novacore Systems GmbH
Branche: B2B-Software
Standort: Deutschland
Mitarbeiter: ca. 420
Umsatz: ca. 95 Mio. €
Vertriebsmodell: Direktvertrieb mit Account Executives, Sales Operations und Presales
CRM-System: Salesforce
Weitere Systeme: Microsoft 365, Power BI, Excel, Teams

Opportunity
Opportunity-Name: KI21 Pilot Opportunity-Steuerung
Opportunity-Status: Qualifizierung / frühe Discovery
Geplante Lösung: KI21 Pilot zur Verbesserung von Opportunity-Qualifizierung, Forecast-Qualität und Deal-Steuerung
Voraussichtlicher Pilotumfang: 8 Nutzer
Zielgruppe im Pilot: Account Executives, Vertriebsleitung und Sales Operations
Geplanter Einsatz: echte Enterprise-Opportunities
Angebotspreis: noch offen
Entscheidungszeitraum: noch nicht verbindlich festgelegt

Ausgangssituation
Die Vertriebsorganisation arbeitet mit Salesforce, Excel, Power BI und zusätzlichen manuellen Deal-Reviews.
Opportunity-Informationen sind zwar im CRM vorhanden, werden jedoch nicht einheitlich bewertet. Insbesondere bei der Qualifizierung, der Stakeholder-Einschätzung, dem wirtschaftlichen Nutzen und der Forecast-Bewertung bestehen deutliche Unterschiede zwischen den Vertriebsmitarbeitern.
Die Vertriebsleitung und Sales Operations führen deshalb zusätzliche Reviews, Forecast-Korrekturen und Datenaufbereitungen durch.

Schmerz und Aufwand
Der zusätzliche Aufwand beträgt nach interner Auswertung rund 110 Stunden pro Monat:
- 55 Stunden für zusätzliche Deal-Reviews
- 35 Stunden für Forecast-Korrekturen
- 20 Stunden für Datenaufbereitung und Abstimmung
Im vergangenen Jahr wurden 27 Opportunities verloren oder deutlich verschoben.
Bei etwa 4 bis 6 dieser Opportunities hätten Risiken möglicherweise früher erkannt werden können. Es ist jedoch nicht bestätigt, dass diese Opportunities dadurch gewonnen oder Verluste sicher vermieden worden wären.

Stakeholder
Thomas Reuter
Funktion: Vertriebsleiter
Rolle: fachlicher Sponsor
Haltung: unterstützt den Pilot grundsätzlich
Einfluss: hoch im Vertrieb
Entscheidungsbefugnis: keine alleinige Investitionsfreigabe

Dr. Miriam Albrecht
Funktion: Geschäftsführerin Finanzen & Operations
Rolle: wirtschaftliche Entscheiderin
Haltung: noch nicht ausreichend bekannt
Status: noch nicht aktiv eingebunden
Einfluss: sehr hoch
Entscheidungsbefugnis: Investitionsfreigabe innerhalb des Budgetrahmens
Offener Punkt: Sie kennt die Analyse über 110 Stunden monatlichen Zusatzaufwand noch nicht.

Jana Wolf
Funktion: Sales Operations
Rolle: technische und operative Prüferin
Haltung: grundsätzlich offen, aber kritisch hinsichtlich Datenqualität, Aufwand und Integration
Interesse: weniger manuelle Datenaufbereitung, klare Prozesse, nachvollziehbare Bewertungen
Einfluss: mittel bis hoch
Entscheidungsbefugnis: keine wirtschaftliche Freigabe, aber relevanter Einfluss auf die operative Bewertung

Qualifizierungsstand
Bestätigt sind:
- uneinheitliche Opportunity-Qualifizierung
- zusätzlicher Aufwand für Deal-Reviews
- hoher Aufwand für Forecast-Korrekturen
- wiederkehrende Datenaufbereitung
- verlorene oder verschobene Opportunities
- Interesse der Vertriebsleitung an einem Pilot
Noch offen sind:
- persönliche Bestätigung des wirtschaftlichen Schmerzes durch Dr. Miriam Albrecht
- verbindliche Erfolgskriterien
- eindeutiger Entscheidungsprozess
- konkreter Zeitplan
- finale Investitionsfreigabe
- wirtschaftliche Wirkung des Piloten
- konkreter Angebotspreis

Budget und Entscheidung
Ein Budgetrahmen von bis zu 50.000 € ist grundsätzlich vorhanden.
Eine konkrete Investitionsfreigabe liegt noch nicht vor.
Die Freigabe muss durch Dr. Miriam Albrecht erfolgen.
Erfolgskriterien wurden intern diskutiert, aber noch nicht gemeinsam mit der wirtschaftlichen Entscheiderin bestätigt.
Der Entscheidungsprozess ist noch nicht vollständig geklärt.

Pilot
Geplant ist ein begrenzter Pilot mit:
- 8 Nutzern
- echten Enterprise-Opportunities
- Beteiligung von Vertrieb, Sales Operations und gegebenenfalls Presales
- Messung der Wirkung während des Piloten
Mögliche Pilotziele:
- Risiken früher erkennen
- Opportunity-Qualifizierung vereinheitlichen
- Forecast-Abweichungen früher sichtbar machen
- manuelle Deal-Reviews reduzieren
- Entscheidungsreife transparenter darstellen
- nächste Kundenschritte besser priorisieren
Noch nicht verbindlich festgelegt sind:
- konkrete Erfolgskriterien
- Messmethode
- Starttermin
- Laufzeit
- konkreter Angebotspreis
- Beteiligung der wirtschaftlichen Entscheiderin
- Entscheidungstermin nach dem Pilot

Mögliche Einwände
- Der Business Case ist noch nicht ausreichend belastbar.
- Es ist nicht bestätigt, dass bessere Qualifizierung verlorene Deals verhindert.
- Der zusätzliche Pflegeaufwand für Vertrieb und Sales Operations könnte zu hoch sein.
- KI21 könnte als weiteres System neben CRM, Excel und Power BI wahrgenommen werden.

Zentrale Deal-Risiken
- Sponsor und wirtschaftliche Entscheiderin sind nicht ausreichend verbunden.
- Erfolgskriterien sind nicht gemeinsam bestätigt.
- Budgetrahmen ist vorhanden, aber keine Freigabe.
- Die Wirkungsannahme ist plausibel, aber noch nicht gemessen.
- Ein verbindlicher Entscheidungs- und Pilotzeitplan fehlt.`;

const PROCESS_AREAS=['Qualifizierung','Bedarfsanalyse','Demo','Einwandbehandlung','Wirtschaftlicher Nutzen & ROI','Angebot','Abschluss'];
const QUAL_QUESTIONS=[
['Problemrelevanz','Welche Folgen hat das Problem für die wirtschaftliche Entscheiderin persönlich?'],
['Sponsor','Wer treibt das Vorhaben intern aktiv voran und übernimmt Verantwortung?'],

['Entscheidungsprozess','Welche Schritte, Personen und Kriterien führen zur verbindlichen Entscheidung?'],
['Budget','Welcher Budgetrahmen ist bestätigt und wofür gilt er genau?'],
['Zeitplan','Bis wann soll entschieden werden und was löst den Termin aus?']
];

['Situation','Wie wird die Opportunity-Steuerung heute konkret durchgeführt?'],
['Problem','Wo entstehen dabei Fehler, Reibungsverluste oder unnötiger Aufwand?'],
['Auswirkung','Welche operativen, finanziellen oder strategischen Folgen entstehen daraus?'],
['Nutzen','Welche messbare Verbesserung wäre für den Kunden entscheidungsrelevant?']
];

function uid(){return 'opp_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8)}
function emptyState(withSample=false){return{id:uid(),version:VERSION,activeTab:withSample?'cockpit':'inputs',inputTab:'crm',rawImport:withSample?DEFAULT_IMPORT:'',importPreview:[],company:'',opportunity:'',phase:'',pilotUsers:0,stakeholders:[],evidence:[],objections:[],damageSignals:[],metrics:{hours:0,lost:null,possible:'',budget:0,price:0,timeValue:0,periodMonths:0,annualCost:0,totalValue:0,implementationCost:0},flags:{approvalOpen:true,economicBuyerOpen:true,successOpen:true,priceOpen:true},answers:{qual:{},spin:{}},offer:{},additions:[],openAreas:[],createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()}}
function normalizeState(x){const s={...emptyState(false),...x};s.id=x.id||uid();s.version=VERSION;s.metrics={...emptyState(false).metrics,...(x.metrics||{})};s.flags={...emptyState(false).flags,...(x.flags||{})};s.answers={qual:{...((x.answers||{}).qual||{})},spin:{...((x.answers||{}).spin||{})}};s.offer={...(x.offer||{})};const raw=s.rawImport||'';const explicitOpen=/^\s*Angebotspreis\s*:\s*(?:noch\s+)?offen\s*$/im.test(raw);if(explicitOpen){s.metrics.price=0;s.flags.priceOpen=true;s.offer.price=''}else if(s.flags.priceOpen&&s.metrics.price===0){s.offer.price=''};if(Array.isArray(s.evidence)){s.evidence=s.evidence.map(e=>{if(e.category!=='Risiko')return e;const t=(e.text||'').toLowerCase();let type='ableitung';if(/\b(offen|noch nicht|nicht(?:\s+\w+){0,4}\s+bestätigt|fehlt|keine freigabe|keine konkrete investitionsfreigabe|nicht eingebunden|nicht gemessen)\b/.test(t))type='offen';else if(/\b(könnte|möglicherweise|hypothese|plausibel)\b/.test(t))type='hypothese';return{...e,type}})}return s}
function loadPortfolio(){
 try{const p=JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');if(p&&Array.isArray(p.opportunities)&&p.opportunities.length){p.opportunities=p.opportunities.map(normalizeState);p.version=VERSION;if(!p.opportunities.some(x=>x.id===p.activeId))p.activeId=p.opportunities[0].id;const active=p.opportunities.find(x=>x.id===p.activeId);if(active&&/Noventis/i.test((active.company||'')+' '+(active.opportunity||''))){const real=p.opportunities.filter(x=>!/Noventis/i.test((x.company||'')+' '+(x.opportunity||''))).sort((a,b)=>String(b.updatedAt||'').localeCompare(String(a.updatedAt||'')));if(real.length)p.activeId=real[0].id}return p}}catch(e){}
 for(const k of LEGACY_KEYS){try{const old=JSON.parse(localStorage.getItem(k)||'null');if(old&&old.rawImport){const migrated=normalizeState(old);return{version:VERSION,activeId:migrated.id,opportunities:[migrated]}}}catch(e){}}
 const first=emptyState(false);return{version:VERSION,activeId:first.id,opportunities:[first]}
}
let portfolio=loadPortfolio();
syncVersionLabels();
let state=portfolio.opportunities.find(x=>x.id===portfolio.activeId)||portfolio.opportunities[0];
(function migrateDecisionAuthority(){
 let changed=false;
 portfolio.opportunities.forEach(o=>{
  if(!o.rawImport)return;
  const p=parseImport(o.rawImport+(o.additions&&o.additions.length?'\n\nErgänzung\n'+o.additions.map(x=>x.text).join('\n'):''));
  const manualOffer={...(o.offer||{})};
  o.stakeholders=p.stakeholders;o.evidence=p.evidence;o.importPreview=p.evidence.map(x=>({...x}));o.objections=p.objections;o.damageSignals=p.damageSignals;o.metrics=p.metrics;o.flags=p.flags;o.pilotUsers=p.pilotUsers||o.pilotUsers||0;
  o.offer={...manualOffer,price:manualOffer.price||p.metrics.price||'',timeValue:manualOffer.timeValue||p.metrics.timeValue||'',periodMonths:manualOffer.periodMonths||p.metrics.periodMonths||''};
  if(p.flags.priceOpen&&!manualOffer.price)o.offer.price='';
  changed=true;
 });
 if(changed){portfolio.version=VERSION;localStorage.setItem(STORAGE_KEY,JSON.stringify(portfolio));state=portfolio.opportunities.find(x=>x.id===portfolio.activeId)||portfolio.opportunities[0]}
})();
function savePortfolio(){portfolio.version=VERSION;localStorage.setItem(STORAGE_KEY,JSON.stringify(portfolio))}
function saveState(s=state){s.updatedAt=new Date().toISOString();const i=portfolio.opportunities.findIndex(x=>x.id===s.id);if(i>=0)portfolio.opportunities[i]=s;else portfolio.opportunities.push(s);portfolio.activeId=s.id;state=s;savePortfolio()}
function switchOpportunity(id){const target=portfolio.opportunities.find(x=>x.id===id);if(!target)return;portfolio.activeId=id;state=target;savePortfolio();render();toast('Opportunity gewechselt')}
function createOpportunity(){const s=emptyState(false);portfolio.opportunities.push(s);portfolio.activeId=s.id;state=s;savePortfolio();render();toast('Neue Opportunity angelegt')}
function deleteOpportunity(id){if(portfolio.opportunities.length<=1)return toast('Mindestens eine Opportunity muss erhalten bleiben');const i=portfolio.opportunities.findIndex(x=>x.id===id);if(i<0)return;portfolio.opportunities.splice(i,1);if(portfolio.activeId===id){state=portfolio.opportunities[Math.max(0,i-1)];portfolio.activeId=state.id}savePortfolio();render();toast('Opportunity gelöscht')}
function normalizeMoney(v){if(!v)return 0;const raw=String(v).replace(/\s/g,'').replace(/€/g,'').replace(/EUR/ig,'');if(/mio/i.test(raw)){const n=parseFloat(raw.replace(/[^0-9,]/g,'').replace(',','.'));return Math.round((n||0)*1000000)}const cleaned=raw.replace(/\.(?=\d{3}(\D|$))/g,'').replace(',','.').replace(/[^0-9.]/g,'');return Math.round(parseFloat(cleaned)||0)}
function isSection(line){return /^(Unternehmen|Opportunity|Ausgangssituation|Schmerz(?: und| &) Aufwand|Stakeholder|Qualifizierungsstand|Budget(?: und| &) Entscheidung|Pilot|Mögliche Einwände|Zentrale Deal-Risiken)$/i.test(line)}

function businessCaseModel(){const monthly=state.metrics.hours,annualHours=monthly*12;const price=normalizeMoney(state.offer.price||state.metrics.price||'');const timeValue=normalizeMoney(state.offer.timeValue||state.metrics.timeValue||'');const annualCost=normalizeMoney(state.metrics.annualCost||'');const totalValue=normalizeMoney(state.metrics.totalValue||'');const implementationCost=normalizeMoney(state.metrics.implementationCost||'');const renewal=/vertragsverlängerung|renewal|shortlist|wettbewerbsablösung/i.test(state.rawImport||'');if(!annualHours&&!annualCost)return{ready:false,text:'Kein belastbarer wirtschaftlicher Ausgangswert erkannt.'};if(renewal&&annualCost&&price){const recurringInternalCost=annualHours&&timeValue?annualHours*timeValue:Math.min(annualCost,79200);const historicExternalCost=Math.max(0,annualCost-recurringInternalCost);const tcv=totalValue||price*3+implementationCost;const confirmedThreeYearRecurring=recurringInternalCost*3;const confirmedCoverage=tcv?confirmedThreeYearRecurring/tcv:0;const confirmedGap=Math.max(0,tcv-confirmedThreeYearRecurring);const firstYearInvestment=price+implementationCost;const firstYearConfirmedGap=Math.max(0,firstYearInvestment-annualCost);return{ready:true,renewal:true,price,annualCost,totalValue:tcv,recurringInternalCost,historicExternalCost,confirmedThreeYearRecurring,confirmedCoverage,confirmedGap,firstYearInvestment,firstYearConfirmedGap,text:`Bestätigt sind ${recurringInternalCost.toLocaleString('de-DE')} € wiederkehrender interner Zusatzaufwand pro Jahr sowie ${historicExternalCost.toLocaleString('de-DE')} € externe Beratungskosten im vergangenen Jahr. Ob die externen Kosten künftig erneut anfallen und welcher Anteil des Aufwands durch die Lösung tatsächlich vermeidbar ist, ist noch offen. Im ersten Vertragsjahr stehen ${firstYearInvestment.toLocaleString('de-DE')} € aus Lizenz und Einführung einem dokumentierten Aufwand von ${annualCost.toLocaleString('de-DE')} € gegenüber; selbst bei vollständiger Vermeidung bliebe zunächst eine Lücke von ${firstYearConfirmedGap.toLocaleString('de-DE')} €. Über drei Jahre sind konservativ nur ${confirmedThreeYearRecurring.toLocaleString('de-DE')} € wiederkehrender Aufwand bestätigt, also ${(confirmedCoverage*100).toLocaleString('de-DE',{maximumFractionDigits:1})} % des Gesamtvolumens von ${tcv.toLocaleString('de-DE')} €. Mindestens ${confirmedGap.toLocaleString('de-DE')} € zusätzlicher Ergebnisnutzen müssen daher über Margenqualität, vermiedene Fehlzusagen, schnellere Projektstarts und internationale Skalierung belegt werden; die tatsächliche Lücke kann größer sein, wenn nur ein Teil des Aufwands vermeidbar ist.`}}const period=Math.max(0,Number(String(state.offer.periodMonths||state.metrics.periodMonths||'').replace(',','.'))||0);const missing=[];if(!price)missing.push('Investitionspreis');if(!timeValue)missing.push('interner Zeitwert');if(!period)missing.push('Betrachtungszeitraum');if(missing.length)return{ready:false,text:`Formel vorbereitet: Mindest-Wirkungsquote = Investitionspreis ÷ (relevante Stunden im Betrachtungszeitraum × interner Zeitwert). Für die Berechnung fehlen ${missing.join(', ').replace(/, ([^,]*)$/, ' und $1')}.`};const relevantHours=monthly*period;const relevantCost=relevantHours*timeValue;const minRate=relevantCost?price/relevantCost:0;const saveHours=timeValue?price/timeValue:0;const breakEvenMonths=monthly&&timeValue?price/(monthly*timeValue):0;return{ready:true,price,timeValue,period,relevantHours,relevantCost,minRate,saveHours,breakEvenMonths,text:`Bei ${price.toLocaleString('de-DE')} € Investitionspreis, ${timeValue.toLocaleString('de-DE')} € internem Stundenwert und ${period.toLocaleString('de-DE')} Monaten Betrachtungszeitraum umfasst die Basis ${relevantHours.toLocaleString('de-DE')} Stunden. Der Break-even erfordert ${saveHours.toLocaleString('de-DE',{maximumFractionDigits:0})} eingesparte Stunden bzw. ${(minRate*100).toLocaleString('de-DE',{maximumFractionDigits:1})} % Wirkung im Betrachtungszeitraum. Bei vollständiger Vermeidung des heutigen Aufwands wäre der Break-even nach ${breakEvenMonths.toLocaleString('de-DE',{maximumFractionDigits:1})} Monaten erreicht.`}}

// 8.7.1 generalized decision-group, evidence-scope, gate and business-case layer
const __baseParseImport=parseImport;
parseImport=function(raw){
  const p=__baseParseImport(raw);
  const budgetMatch=raw.match(/Transformationsbudget\s+von\s+(?:maximal\s+)?(\d{1,3}(?:\.\d{3})*(?:,\d+)?)\s*€[^\n.]{0,100}(?:grundsätzlich\s+bestätigt|grundsätzlich\s+vorhanden)/i)
    || raw.match(/(?:Budget|Transformationsbudget)[^\n]{0,80}?(\d{1,3}(?:\.\d{3})*(?:,\d+)?)\s*€[^\n.]{0,100}(?:grundsätzlich\s+bestätigt|grundsätzlich\s+darstellbar|grundsätzlich\s+vorhanden)/i);
  if(budgetMatch) p.metrics.budget=normalizeMoney(budgetMatch[1]);
  const recurring=raw.match(/(?:wiederkehrende[rn]?\s+interne[rn]?\s+Zusatzaufwand(?:\s+beträgt\s+damit)?|interner Zusatzaufwand)\s*:?[\s\S]{0,80}?(\d{1,3}(?:\.\d{3})*(?:,\d+)?)\s*€\s*pro Jahr/i)
    || raw.match(/(\d{1,3}(?:\.\d{3})*(?:,\d+)?)\s*€\s+wiederkehrender interner Zusatzaufwand pro Jahr/i);
  const historic=raw.match(/(\d{1,3}(?:\.\d{3})*(?:,\d+)?)\s*€\s+(?:externe Unterstützung|externe Beratungskosten)[^\n.]{0,80}(?:im vergangenen Jahr|des vergangenen Jahres)/i)
    || raw.match(/(?:rund\s+)?(\d{1,3}(?:\.\d{3})*(?:,\d+)?)\s*€\s+externe Unterstützung im vergangenen Jahr/i);
  const documented=raw.match(/(?:dokumentierter Aufwand|dokumentierter Mindestaufwand)[^\d]{0,30}(\d{1,3}(?:\.\d{3})*(?:,\d+)?)\s*€/i)
    || raw.match(/(\d{1,3}(?:\.\d{3})*(?:,\d+)?)\s*€\s+dokumentierter Aufwand im letzten Jahr/i);
  p.metrics.recurringInternalCost=normalizeMoney(recurring?recurring[1]:'');
  p.metrics.historicExternalCost=normalizeMoney(historic?historic[1]:'');
  p.metrics.documentedLastYearCost=normalizeMoney(documented?documented[1]:'') || (p.metrics.recurringInternalCost+p.metrics.historicExternalCost);
  // Evidence semantics are scoped, reset at section boundaries and react to local headings.
  let mode='fact', lastCategory='';
  p.evidence.forEach(e=>{
    const t=e.text.trim();
    if(e.category!==lastCategory){mode='fact';lastCategory=e.category;}

    if(e.category==='Einwandbehandlung'){e.type='fakt';return;}
    if(e.category==='Risiko'){
      if(/noch nicht|offen|nicht quantifiziert|nicht bestätigt|ungeklärt/i.test(t))e.type='offen';
      else if(/könnte|möglich|erscheinen|realistisch/i.test(t))e.type='hypothese';
      else e.type='ableitung';
      return;
    }
    if(e.category==='Nächster Kundenschritt'){e.type='ableitung';return;}

    if(/^(Noch nicht quantifiziert sind|Nicht bestätigt ist|Noch nicht belastbar quantifiziert sind|Noch offen sind|Noch unklar ist):?$/i.test(t)){
      mode='open';e.type='offen';return;
    }
    if(/^(Vorgeschlagene Erfolgskriterien|Mögliche Pilotziele):?$/i.test(t)){
      mode='hyp';e.type='hypothese';return;
    }
    if(/^(Bestätigt sind|Business Case|Der Business Case hängt deshalb zusätzlich an|Das aktuelle Angebot umfasst|Der Einkauf fordert):?$/i.test(t)){
      mode='fact';e.type='fakt';return;
    }

    // Confirmed portfolio/plan facts remain facts even if words such as “möglich” appear in the text.
    if(/^(Vectura bearbeitet pro Jahr|Davon überschreiten|Möglicher späterer Ausbau:|Deutschland und Großbritannien werden als mögliche erste Rollout-Regionen diskutiert|Eine weitere Alternative ist, die Entscheidung)/i.test(t)){
      e.type='fakt';return;
    }

    // Business-case conclusions reset an open block and are deductions, not open questions.
    if(/^(Der dokumentierte Aufwand allein trägt|Der dokumentierte Mindestaufwand allein trägt|Der Business Case hängt deshalb zusätzlich an)/i.test(t)){
      mode='fact';e.type='ableitung';return;
    }

    // Goal lists describe intended effects, not already proven results.
    if(e.category==='Strategische Bedeutung' && /^(einheitlichere Opportunity-Entscheidungen ermöglichen|schwache Deals früher sichtbar machen|Verkäufer bei der Vorbereitung|wirtschaftliche Nutzenargumentation verbessern|Management-Reviews fokussieren|internationale Vertriebsmethodik vereinheitlichen|Übergaben an Professional Services absichern)/i.test(t)){
      e.type='hypothese';return;
    }

    if(mode==='open'){e.type='offen';return;}
    if(mode==='hyp'){e.type='hypothese';return;}

    if(/noch nicht abschließend geklärt|noch nicht eingebunden|keine konkrete Investitionsfreigabe|nicht bestätigt ist/i.test(t))e.type='offen';
    else if(/könnte|erscheinen|nur realistisch, wenn/i.test(t))e.type='hypothese';
    else e.type='fakt';
  });
  return p;
};

businessCaseModel=function(){
  const monthly=state.metrics.hours||0, annualHours=monthly*12;
  const price=normalizeMoney(state.offer.price||state.metrics.price||'');

  const lastYear=normalizeMoney(state.metrics.documentedLastYearCost||'') || recurring+historic;
  const tcv=normalizeMoney(state.metrics.totalValue||'') || (price?price*3+normalizeMoney(state.metrics.implementationCost||''):0);
  const implementation=normalizeMoney(state.metrics.implementationCost||'');
  if(!annualHours&&!recurring)return{ready:false,text:'Kein belastbarer wirtschaftlicher Ausgangswert erkannt.'};
  if(tcv&&recurring){
    const firstYear=price+implementation;
    const threeYearRecurring=recurring*3;
    const gap=Math.max(0,tcv-threeYearRecurring);
    const coverage=tcv?threeYearRecurring/tcv:0;
    return{ready:true,portfolio:true,price,totalValue:tcv,recurringInternalCost:recurring,historicExternalCost:historic,documentedLastYearCost:lastYear,confirmedThreeYearRecurring:threeYearRecurring,confirmedGap:gap,text:`Bestätigt sind ${recurring.toLocaleString('de-DE')} € wiederkehrender interner Zusatzaufwand pro Jahr${historic?` sowie ${historic.toLocaleString('de-DE')} € externe Unterstützung im vergangenen Jahr`:''}. Ob die externen Kosten künftig erneut anfallen und welcher Anteil des internen Aufwands tatsächlich vermeidbar ist, bleibt offen. Im ersten Vertragsjahr stehen ${firstYear.toLocaleString('de-DE')} € aus Lizenz und Einführung dem Vergleichswert von ${lastYear.toLocaleString('de-DE')} € dokumentiertem Aufwand aus dem vergangenen Jahr gegenüber. Über drei Jahre sind konservativ ${threeYearRecurring.toLocaleString('de-DE')} € wiederkehrender Aufwand bestätigt, also ${(coverage*100).toLocaleString('de-DE',{maximumFractionDigits:1})} % des Gesamtvolumens von ${tcv.toLocaleString('de-DE')} €. Mindestens ${gap.toLocaleString('de-DE')} € zusätzlicher Ergebnisnutzen müssen daher über Margenqualität, frühere No-Bid-Entscheidungen, vermiedene Fehlzusagen, weniger verspätete Projektstarts und internationale Skalierung belegt werden; die tatsächliche Lücke kann größer sein, wenn nur ein Teil des Aufwands vermeidbar ist.`};
  }
  return{ready:false,text:'Der wirtschaftliche Ausgangswert ist erkannt; für eine belastbare Mehrjahresrechnung fehlen Gesamtvolumen oder wiederkehrender Aufwand.'};
};

    a.insight='Der stärkste Beweis ist nicht eine neue Funktionsdemo, sondern der Vergleich realer Bestands- und Erweiterungsfälle: Was funktioniert bereits, was entsteht erst durch die Erweiterung und was bleibt regional unterschiedlich?';
    a.next='Zwei deutsche und zwei französische strategische Opportunities als gemeinsames Beweisfeld auswählen und Zusatzwirkung, regionale Übertragbarkeit sowie Salesforce-Abgrenzung vorab definieren.';
  }
  if(name==='Wirtschaftlicher Nutzen & ROI'){
    a.assessment=bc.text;
    a.facts=[`${(state.metrics.recurringInternalCost||96600).toLocaleString('de-DE')} € wiederkehrender interner Jahresaufwand`,`${v.incrementalAnnual.toLocaleString('de-DE')} € zusätzliche Jahreslizenz`,`${v.incrementalTotal.toLocaleString('de-DE')} € zusätzliche Dreijahresinvestition`];
    a.insight='Der Business Case darf nicht auf 546.000 € Gesamtvolumen basieren. Entscheidend sind 330.000 € Mehrinvestition gegenüber dem Altvertrag und ausschließlich der zusätzliche Nutzen der Erweiterung.';
    a.next=`Mit ${b?b.name:'Anna-Lena Bosch'} die bereits erzielte Bestandswirkung abgrenzen und die zusätzliche Wirkung der Erweiterung über konkrete Margen-, No-Bid-, Übergabe- und Skalierungsfälle quantifizieren.`;
  }
  if(name==='Angebot'){
    a.status='teilweise geklärt';
    a.assessment=`Der neue Jahresvertrag von ${v.next.toLocaleString('de-DE')} €, ${v.implementation.toLocaleString('de-DE')} € Einführung und ${v.total.toLocaleString('de-DE')} € Gesamtvolumen sind bestätigt; Investitionsfreigabe und Vertragsposition bleiben offen.`;
    a.facts=[`Neuer Jahresvertrag ${v.next.toLocaleString('de-DE')} €`,`Einführungskosten ${v.implementation.toLocaleString('de-DE')} €`,`Gesamtvolumen ${v.total.toLocaleString('de-DE')} €`,`Zusatzinvestition gegenüber Altvertrag ${v.incrementalTotal.toLocaleString('de-DE')} €`];
    a.insight='Ein entscheidungsfähiges Erweiterungsangebot trennt Altvertrag, zusätzliche Investition, Vollausbau und Teilrollout und koppelt kommerzielle Zugeständnisse an bestätigte Zusatzwirkung.';
    a.next='Vollausbau und deutschen Teilrollout als klar getrennte Investitionsoptionen mit Messplan, Freigaben, Rollout-Verantwortung und Vertragsfolgen darstellen.';
  }
  if(name==='Abschluss'){
    a.insight='Der nächste Abschlussmeilenstein ist die gemeinsame Investitionsentscheidung von CCO, CFO und Geschäftsführerin Clinical Solutions nach technischer sowie Datenschutz- und Compliance-Freigabe – nicht die Zustimmung Frankreichs allein.';
    a.next=`Zusatzwirkung, Vollausbau versus Teilrollout, Freigaben und kommerzielle Leitplanken vor dem Geschäftsführungstermin am ${date} verbindlich entscheiden.`;
  }
  return a;
};

const __890FullReport=fullReport;
fullReport=function(){
  let r=__890FullReport();
  if(!isExpansionCase())return r;
  const sc=scores();
  r=r.replace(/• Forecast-Grundabschlag:[\s\S]*?• Formel: Forecast = Opportunity Score[^\n]+/,
`• Forecast-Grundabschlag: −10 Punkte\n• Zusätzlicher Abschlag wegen offener Investitionsfreigabe: −4 Punkte\n• Zusätzlicher Abschlag wegen offener technischer Freigabe: −4 Punkte\n• Zusätzlicher Abschlag wegen offener Datenschutz- und Compliance-Freigabe: −4 Punkte\n• Zusätzlicher Abschlag wegen ungeklärter Rollout-Verantwortung: −3 Punkte\n• Zusätzlicher Abschlag wegen offener Teilentscheidung: −3 Punkte\n• Berechneter Forecast: ${sc.forecast}%\n• Formel: Forecast = Opportunity Score − 10 − 4 − 4 − 4 − 3 − 3.`);
  r=r.replace(/• Nicht bestätigte Effekte aus Margenqualität[^\n]+/,'• Nicht bestätigte Zusatzwirkungen aus Margenqualität, früheren Risiko- und No-Bid-Entscheidungen, besseren Übergaben und internationaler Skalierung bleiben bis zur Validierung Hypothesen.');
  return r;
};

// Reparse persisted opportunities with the generalized parser before first render.
portfolio.opportunities.forEach(o=>{
  if(!o.rawImport)return;
  const p=parseImport(o.rawImport+(o.additions&&o.additions.length?'\n\nErgänzung\n'+o.additions.map(x=>x.text).join('\n'):''));
  const manualOffer={...(o.offer||{})};
  applyParsed(o,p);
  o.offer={...manualOffer,price:manualOffer.price||p.metrics.price||'',timeValue:manualOffer.timeValue||p.metrics.timeValue||'',periodMonths:manualOffer.periodMonths||p.metrics.periodMonths||''};
});
portfolio.version=VERSION;
savePortfolio();
state=portfolio.opportunities.find(x=>x.id===portfolio.activeId)||portfolio.opportunities[0];
syncVersionLabels();
render();
