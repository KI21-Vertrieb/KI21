<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="dark">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KI21</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;
  --border:#30363d;--text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --fs-input:12px;
}
body.light{
  --bg:#f6f8fa;--bg2:#ffffff;--bg3:#f0f2f5;
  --border:#d0d7de;--text:#1f2328;--text2:#656d76;--text3:#9198a1;
}
html,body{background:var(--bg);color:var(--text);min-height:100vh;font-family:'DM Sans',sans-serif;}
#app{min-height:100vh;background:var(--bg);}
.nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 14px;height:44px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-brand{font-size:16px;font-weight:800;color:var(--text);cursor:pointer;border:none;background:transparent;font-family:'DM Sans',sans-serif;}
.nav-right{display:flex;gap:5px;align-items:center;}
.subnav{background:var(--bg);border-bottom:1px solid var(--border);padding:6px 14px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;}
.subnav-badge{background:rgba(255,107,0,.15);color:#ff6b00;border-radius:50%;
  width:18px;height:18px;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;flex-shrink:0;}
.subnav-text{font-size:11px;color:var(--text2);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.settings-group-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--text3);margin-bottom:2px;}
.phase-badge{font-size:9px;font-weight:700;border-radius:4px;padding:2px 6px;white-space:nowrap;flex-shrink:0;cursor:pointer;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
.phase-badge-done{background:rgba(46,160,67,.15);color:#2ea043;}
.phase-badge-progress{background:rgba(255,107,0,.15);color:#ff6b00;}
.phase-badge-empty{background:rgba(139,148,158,.1);color:var(--text3);}
.btn{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:5px;
  padding:4px 8px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-o{background:#ff6b00;border:none;color:#fff;border-radius:8px;padding:7px 12px;
  font-size:10.5px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;}
.btn-o:disabled{background:#484f58;cursor:not-allowed;}
.cust-btn{background:rgba(255,107,0,.12);border:1px solid rgba(255,107,0,.3);border-radius:5px;
  padding:3px 8px;cursor:pointer;}
.cust-label{font-size:8px;color:#8b949e;text-transform:uppercase;letter-spacing:1px;line-height:1.3;}
.cust-val{font-size:11px;font-weight:700;color:#ff6b00;line-height:1.3;max-width:180px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.wrap{padding:12px 14px;max-width:500px;margin:0 auto;}
.hero{display:flex;align-items:baseline;flex-wrap:wrap;gap:6px;margin:10px 0 16px;}
.hero-a{font-weight:800;font-size:20px;color:var(--text);}
.hero-b{font-family:'DM Serif Display',serif;font-size:20px;color:#ff6b00;}
.sit-row{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;padding:11px 12px;margin-bottom:5px;cursor:pointer;transition:border-color .15s;}
.sit-row:hover{border-color:#ff6b00;}
.sit-icon{font-size:20px;width:28px;text-align:center;flex-shrink:0;}
.sit-phase{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:1px;}
.sit-title{font-size:13px;font-weight:700;color:var(--text);}
.sit-arrow{color:var(--text3);font-size:16px;}
.tagline{margin-top:14px;text-align:center;font-size:11px;color:var(--text3);}

/* Home Premium Redesign (v4.76) ã pixelnahe Umsetzung der neuen Designreferenz, NUR Hero-Card.
   Reine Darstellung: Werte aus bereits existierenden Funktionen/Daten
   (getOpportunityHealth, cust.branche/ma/um/ap, getPhaseStatus). Keine neue Business-Logik.
   Platzhalter ("ã") fû¥r Felder ohne Datenmodell-Entsprechung (Erwarteter Abschluss, Potenzial, Verantwortlich). */
.home-greeting{font-size:12.5px;font-weight:600;color:var(--text2);margin:8px 0 8px;}
.home-hero{background:var(--bg2);border:1px solid var(--border);border-radius:13px;
  padding:11px;margin-bottom:10px;}
.home-hero-body{display:flex;flex-direction:column;gap:8px;}
.home-hero-colL{min-width:0;}
.home-hero-colR{min-width:0;display:flex;flex-direction:column;align-items:stretch;}
.home-hero-label{font-size:8.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  color:var(--text3);margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.home-info-dot{color:var(--text3);font-size:9px;cursor:default;}
.home-hero-id{display:flex;align-items:flex-start;gap:8px;cursor:pointer;}
.home-hero-icon{width:30px;height:30px;border-radius:7px;background:var(--bg3);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;}
.home-hero-firma{font-size:15px;font-weight:800;color:var(--text);overflow-wrap:break-word;word-break:break-word;letter-spacing:-.2px;}
.home-hero-firma.placeholder{color:var(--text2);font-weight:600;font-size:12px;}
.home-hero-meta{font-size:9.5px;color:var(--text2);margin-top:2px;line-height:1.45;}
.home-hero-tag{display:inline-block;margin-top:4px;font-size:8px;font-weight:700;
  background:rgba(255,107,0,.14);color:#ff6b00;border-radius:5px;padding:2px 6px;}
.home-fact-list{margin-top:7px;border-top:1px solid var(--border);padding-top:6px;}
.home-fact-row{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:2.5px 0;font-size:9.5px;}
.home-fact-label{display:flex;align-items:center;gap:6px;color:var(--text2);}
.home-fact-icon{font-size:9.5px;width:12px;text-align:center;flex-shrink:0;opacity:.8;}
.home-fact-val{color:var(--text);font-weight:700;}
.home-health-bar-wrap{width:100%;}
.home-health-bar-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:5px;}
.home-health-score{font-size:15px;font-weight:800;line-height:1;color:var(--text);}
.home-health-score-unit{font-size:9px;font-weight:700;color:var(--text2);margin-left:2px;}
.home-health-track{width:100%;height:6px;border-radius:4px;background:var(--bg3);overflow:hidden;}
.home-health-fill{height:100%;border-radius:4px;}
.home-health-label{font-size:10px;font-weight:800;margin-top:5px;}
.home-health-sub{font-size:8.5px;color:var(--text2);margin-top:1px;}
.home-next-step{border-top:1px solid var(--border);margin-top:8px;padding-top:8px;}
.home-next-step-top{display:flex;align-items:flex-start;gap:8px;}
.home-next-icon{width:24px;height:24px;border-radius:50%;background:rgba(255,107,0,.12);
  display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.home-next-eyebrow{font-size:8.5px;color:var(--text3);}
.home-next-title2{font-size:11.5px;font-weight:800;color:var(--text);margin-top:1px;}
.home-next-desc2{font-size:9px;color:var(--text2);margin-top:2px;line-height:1.3;}
.home-next-cta-col{display:flex;flex-direction:column;align-items:stretch;gap:4px;
  margin-top:8px;}
.home-next-cta-btn{background:#ff6b00;border:none;color:#fff;border-radius:7px;padding:6px 12px;
  font-size:10.5px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;width:100%;}
.home-next-cta-btn:hover{background:#e25f00;}
.home-next-link{background:none;border:none;color:#ff6b00;font-size:9.5px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center;width:100%;}
/* Ab ~480px (Tablet/Desktop-Breite, wie in der Designreferenz): CTA-Spalte rû¥ckt neben den
   Text statt darunter. Unter dieser Breite (reales iPhone) bleibt es gestapelt, da dort fû¥r
   3 Spalten nebeneinander nicht genug Platz ist (siehe vorheriger Umbruch-Bug). */
@media (min-width:480px){
  .home-next-step{display:flex;align-items:flex-start;gap:16px;}
  .home-next-step-top{flex:1;min-width:0;}
  .home-next-cta-col{flex-shrink:0;margin-top:0;min-width:150px;}
}

.home-section-label{font-size:8.5px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;
  color:var(--text3);margin:2px 0 6px;}
/* Cockpit Hauptscreen (v4.121) */
.cockpit-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 8px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;}
.cockpit-header-left{display:flex;flex-direction:column;min-width:0;flex:1;}
.cockpit-brand{font-size:11px;font-weight:800;color:var(--text3);letter-spacing:.5px;margin-bottom:1px;}
.cockpit-brand span{color:#ff6b00;}
.cockpit-opp-name{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px;}
.cockpit-opp-placeholder{font-size:14px;color:var(--text3);font-weight:400;}
.cockpit-header-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.cockpit-score-badge{font-size:12px;font-weight:800;padding:4px 10px;border-radius:20px;border:1.5px solid;cursor:pointer;white-space:nowrap;}
.cockpit-next-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.cockpit-next-eyebrow{font-size:9.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.cockpit-next-text{font-size:13px;font-weight:600;color:var(--text);line-height:1.5;margin-bottom:14px;}
.cockpit-next-placeholder{font-size:13px;color:var(--text3);font-style:italic;margin-bottom:14px;}
.cockpit-btn-row{display:flex;gap:8px;}
.cockpit-btn-primary{flex:1;background:#ff6b00;color:#fff;border:none;border-radius:10px;padding:11px 14px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
.cockpit-btn-secondary{background:transparent;color:#ff6b00;border:1.5px solid rgba(255,107,0,.4);border-radius:10px;padding:11px 14px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;}
.cockpit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.cockpit-tile{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;min-height:100px;}
.cockpit-tile-label{font-size:9.5px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.cockpit-tile-item{font-size:12px;color:var(--text);line-height:1.4;margin-bottom:5px;padding-left:14px;position:relative;}
.cockpit-tile-item:last-child{margin-bottom:0;}
.cockpit-tile-item::before{content:'ôñ';position:absolute;left:2px;color:var(--text3);}
.cockpit-tile-item.risk{color:#e6edf3;}
.cockpit-tile-item.chance{color:#e6edf3;}
.cockpit-tile-more{font-size:11px;color:var(--text3);margin-top:6px;}
.cockpit-tile-empty{font-size:12px;color:var(--text3);font-style:italic;}
.cockpit-phase-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.cockpit-phase-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:13px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent;min-height:48px;}
.cockpit-phase-row.active-phase{border-color:rgba(255,107,0,.5);}
.cockpit-phase-name{font-size:13px;font-weight:700;color:var(--text);}
.cockpit-phase-num{font-size:11px;font-weight:700;width:22px;height:22px;border-radius:6px;background:var(--bg3);color:var(--text3);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cockpit-phase-num.done{background:rgba(46,160,67,.15);color:#2ea043;}
.cockpit-phase-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.cockpit-phase-status.done{color:#2ea043;background:rgba(46,160,67,.12);border:1px solid rgba(46,160,67,.25);}
.cockpit-phase-status.progress{color:#ff6b00;background:rgba(255,107,0,.12);border:1px solid rgba(255,107,0,.25);}
.cockpit-phase-status.empty{color:var(--text3);}

/* v4.150: bessere Priorisierung der Cockpit-Fragen */
.cockpit-tile-item.is-actionable{cursor:pointer;border-radius:6px;padding-top:2px;padding-bottom:2px;padding-right:4px;transition:background .12s,border-color .12s;}
.cockpit-tile-item.is-actionable:active{background:rgba(255,107,0,.10);}
.cockpit-tile-item.is-actionable::after{content:'ã¤';position:absolute;right:1px;color:var(--text3);font-weight:800;opacity:.75;}
.cockpit-focus-banner{background:rgba(255,107,0,.10);border:1px solid rgba(255,107,0,.35);border-left:3px solid #ff6b00;border-radius:11px;padding:9px 10px;margin-bottom:10px;}
.cockpit-focus-kicker{font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.9px;color:#ff6b00;margin-bottom:3px;}
.cockpit-focus-kicker.is-back{cursor:pointer;display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:2px 6px 2px 0;}
.cockpit-focus-kicker.is-back::before{content:'ã¿';font-size:13px;line-height:1;color:#ff6b00;}
.cockpit-focus-kicker.is-back:active{background:rgba(255,107,0,.10);}
.cockpit-focus-text{font-size:11.5px;font-weight:700;color:var(--text);line-height:1.35;}
.cockpit-focus-hint{font-size:10px;color:var(--text2);line-height:1.35;margin-top:4px;}
.bs-row.clickable{cursor:pointer;border-radius:8px;}
.bs-row.clickable:active{background:rgba(255,107,0,.08);}
.bs-row.clickable .bs-row-arrow{margin-left:auto;color:#ff6b00;font-weight:800;opacity:.8;}

/* Bottom Sheet */
.bs-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;opacity:0;transition:opacity .22s;}
.bs-overlay.visible{opacity:1;}
.bs-panel{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-radius:20px 20px 0 0;z-index:201;max-height:82vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s cubic-bezier(.32,1.01,.4,1);}
.bs-panel.visible{transform:translateY(0);}
.bs-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
.bs-head{padding:16px 18px 10px;border-bottom:1px solid var(--border);}
.bs-title{font-size:13px;font-weight:800;color:var(--text);letter-spacing:-.2px;}
.bs-body{padding:10px 18px 32px;}
.bs-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-top:1px solid var(--border);font-size:13px;color:var(--text);line-height:1.45;}
.bs-row:first-child{border-top:none;}
.bs-row .bs-glyph{flex-shrink:0;width:20px;text-align:center;margin-top:1px;}
.bs-row.bs-priority{background:rgba(255,107,0,.07);border:1px solid rgba(255,107,0,.22);border-radius:12px;padding:9px 10px;margin:7px 0;}
.bs-row.bs-priority:first-child{border-top:1px solid rgba(255,107,0,.22);}
.bs-row.bs-priority + .bs-row.bs-priority{border-top:1px solid rgba(255,107,0,.22);}
.bs-row.bs-priority .bs-glyph{background:#ff6b00;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;margin-top:0;}
.bs-panel.questions-sheet .bs-body{padding:8px 14px 30px;}
.bs-panel.questions-sheet .bs-row:not(.bs-priority){font-size:12px;line-height:1.35;padding:8px 0;color:var(--text2);}
.bs-panel.questions-sheet .bs-row:not(.bs-priority) .bs-glyph{font-size:10px;color:var(--text3);}
.bs-priority-caption{font-size:8.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#ff6b00;margin-bottom:3px;}
.bs-separator{height:1px;background:var(--border);margin:8px 0 2px;opacity:.7;}
.bs-empty{font-size:13px;color:var(--text3);font-style:italic;padding:14px 0;}
.home-station-row{display:flex;align-items:center;gap:9px;background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:7px 9px;margin-bottom:5px;cursor:pointer;transition:border-color .15s;}
.home-station-row:hover{border-color:#ff6b00;}
.home-icon-tile{width:26px;height:26px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.home-icon-tile.is-done{background:rgba(46,160,67,.12);border-color:rgba(46,160,67,.3);}
.home-icon-tile.is-progress{background:rgba(255,107,0,.12);border-color:rgba(255,107,0,.3);}
.home-station-sub2{font-size:9px;color:var(--text2);margin-top:0;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;}
.home-status-pill{display:inline-flex;align-items:center;gap:4px;font-size:8px;font-weight:700;
  border-radius:20px;padding:2.5px 7px;white-space:nowrap;flex-shrink:0;}
.home-status-pill.done{background:rgba(46,160,67,.12);color:#2ea043;}
.home-status-pill.progress{background:rgba(255,107,0,.12);color:#ff6b00;}
.home-status-pill.empty{background:rgba(139,148,158,.1);color:var(--text2);}
.home-strategy-title{font-size:16px;font-weight:800;color:var(--text);margin:12px 0 1px;
  letter-spacing:-.2px;}
.home-strategy-sub{font-size:9.5px;color:var(--text2);margin-bottom:8px;}
.home-station-num{width:15px;height:15px;border-radius:50%;background:var(--bg3);
  border:1px solid var(--border);color:var(--text2);font-size:8px;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.home-station-num.is-done{background:rgba(46,160,67,.18);border-color:rgba(46,160,67,.4);color:#2ea043;}
.home-station-num.is-progress{background:rgba(255,107,0,.18);border-color:rgba(255,107,0,.4);color:#ff6b00;}
.home-station-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.home-progress-row{display:flex;align-items:center;gap:5px;}
.home-progress-track{width:36px;height:3.5px;border-radius:3px;background:var(--bg3);overflow:hidden;}
.home-progress-fill{height:100%;border-radius:3px;}
.home-progress-fill.done{background:#2ea043;}
.home-progress-fill.progress{background:#ff6b00;}
.home-progress-pct{font-size:8px;color:var(--text2);font-weight:700;min-width:20px;text-align:right;}
.home-station-title{font-size:11.5px;font-weight:700;color:var(--text);}
.home-insights-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;
  padding:10px;}
.home-insight-row{display:flex;align-items:flex-start;gap:7px;padding:4px 0;font-size:11px;
  color:var(--text);line-height:1.35;}
.home-insight-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.home-insight-dot.positive{background:#2ea043;}
.home-insight-dot.warning{background:#f85149;}
.home-insight-dot.open{background:var(--text3);}
.home-empty-note{font-size:10.5px;color:var(--text3);padding:2px 0;}
.home-station-sub{font-size:11.5px;color:var(--text2);margin-top:2px;}
/* Executive Briefing components (sitId===1 only) */
.exec-grid{display:flex;gap:9px;margin-bottom:10px;flex-wrap:wrap;}
.exec-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px;flex:1;min-width:120px;}
.exec-card-label{font-size:8.5px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:#8b949e;margin-bottom:8px;}
.exec-card-val{font-size:12px;font-weight:400;color:var(--text);line-height:1.5;}
.exec-card-val.accent{color:#ff6b00;font-weight:600;margin-top:4px;}
.exec-card-val.muted{color:var(--text2);font-weight:400;}
.exec-divider{display:flex;align-items:center;gap:10px;margin:20px 0 14px;}
.exec-divider-line{flex:1;height:1px;background:var(--border);}
.exec-divider-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);white-space:nowrap;}

// ãã UNIVERSELLE KOPIER-FUNKTION mit garantiertem Fallback ãã
// Manche Browser (z.B. Brave) blockieren navigator.clipboard / execCommand lautlos, ohne Fehler oder Berechtigungsabfrage.
// Fallback: ûÑffnet ein vorselektiertes Textfeld, damit der Nutzer per Long-Press ã Kopieren manuell kopieren kann (funktioniert immer).
function universalCopy(text, onSuccess){
  let succeeded=false;
  const markSuccess=()=>{succeeded=true; if(onSuccess)onSuccess();};
  const tryExecCommand=()=>{
    try{
      const ta=document.createElement('textarea');
      ta.value=text;ta.style.position='fixed';ta.style.opacity='0';ta.style.top='0';
      document.body.appendChild(ta);ta.focus();ta.select();
      const ok=document.execCommand('copy');
      document.body.removeChild(ta);
      return ok;
    }catch(e){return false;}
  };
  const showManualFallback=()=>{
    const overlay=document.createElement('div');
    overlay.style.cssText='position:fixed;inset:0;background:rgba(13,17,23,.97);z-index:1000;display:flex;flex-direction:column;padding:20px;';
    overlay.appendChild(h('div',{style:{color:'#ff6b00',fontWeight:'700',marginBottom:'10px',fontSize:'13px'}},
      'Þ Automatisches Kopieren wird von diesem Browser blockiert. Tippe lange auf den Text unten und wûÊhle "Alles auswûÊhlen" ã "Kopieren".'));
    const ta=h('textarea',{readonly:true,style:{flex:'1',width:'100%',background:'#1c2333',
      border:'1px solid #30363d',borderRadius:'6px',padding:'12px',fontSize:'13px',
      color:'#e6edf3',outline:'none',resize:'none',lineHeight:'1.7'}});
    ta.value=text;
    overlay.appendChild(ta);
    const closeBtn=h('button',{className:'btn-o',style:{marginTop:'12px'},onclick:()=>overlay.remove()},'Schlieûen');
    overlay.appendChild(closeBtn);
    document.body.appendChild(overlay);
    setTimeout(()=>{ta.focus();ta.select();},100);
  };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>{
      // Manche Browser (Brave) lûÑsen .then() aus, OHNE wirklich zu kopieren - daher zusûÊtzlich execCommand als BestûÊtigung versuchen
      if(tryExecCommand()){markSuccess();}else{markSuccess();} // clipboard.then() galt als Erfolg, vertrauen
    }).catch(()=>{
      if(tryExecCommand()){markSuccess();}else{showManualFallback();}
    });
  } else if(tryExecCommand()){
    markSuccess();
  } else {
    showManualFallback();
  }
}

// ãã PDF EXPORT HELPER (echte PDF-Erzeugung, kein HTML-Download) ãã
let _html2pdfPromise=null;
function loadHtml2Pdf(){
  if(window.html2pdf)return Promise.resolve();
  if(_html2pdfPromise)return _html2pdfPromise;
  _html2pdfPromise=new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
    s.onload=()=>resolve();
    s.onerror=()=>reject(new Error('html2pdf konnte nicht geladen werden'));
    document.head.appendChild(s);
  });
  return _html2pdfPromise;
}
function exportHtmlAsPdf(html,filename){
  loadHtml2Pdf().then(()=>{
    const el=document.createElement('div');
    el.innerHTML=html;
    document.body.appendChild(el);
    window.html2pdf().from(el).set({
      margin:10,
      filename:filename,
      html2canvas:{scale:2,useCORS:true},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
      pagebreak:{mode:['css','legacy']}
    }).save().then(()=>{document.body.removeChild(el);});
  }).catch(e=>{
    alert('PDF-Erzeugung fehlgeschlagen: '+e.message+'\nBitte Internetverbindung prû¥fen.');
  });
}

function shareAsPdf(title,text,cust,filename,fallbackText){
  loadHtml2Pdf().then(()=>{
    const html=buildSimplePdfHtml(title,text,cust);
    const el=document.createElement('div');
    el.innerHTML=html;
    document.body.appendChild(el);
    window.html2pdf().from(el).set({
      margin:10,
      html2canvas:{scale:2,useCORS:true},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
      pagebreak:{mode:['css','legacy']}
    }).outputPdf('blob').then(blob=>{
      document.body.removeChild(el);
      const file=new File([blob],filename,{type:'application/pdf'});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:title}).catch(()=>{});
      } else if(navigator.share){
        navigator.share({title:'KI21 ã '+title,text:fallbackText||text});
      } else {
        // Fallback: PDF direkt herunterladen
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url;a.download=filename;a.click();
        setTimeout(()=>URL.revokeObjectURL(url),1000);
      }
    });
  }).catch(()=>{
    if(navigator.share)navigator.share({title:'KI21 ã '+title,text:fallbackText||text});
  });
}

  s+='KRITISCH ã DER 60-SEKUNDEN-TEST: Wenn ein Vertriebsleiter zwischen zwei Kundenterminen nur 60 Sekunden Zeit hat, muss er nach dem Lesen genau wissen: Wie gut steht die Opportunity? Warum? Was fehlt? Was ist der nûÊchste Schritt? Jeder Abschnitt muss diesen Test bestehen.\n';
  s+='KRITISCH ã KONKRETE BERATERSPRACHE-VERBOTSLISTE: Vermeide diese und ûÊhnliche Begriffe konsequent: "Data Governance Sponsor", "Ownership-Struktur", "Steering Committee", "Reporting-Architektur", "Stakeholder-Alignment", "Synergiepotenzial", "Sunk Cost", "Data Governance", "Planning Governance", "Modernisierungskomponente". Ersetze sie durch die direkte, vertriebliche Frage dahinter: statt "Ownership-Struktur klûÊren" schreibe "Wer entscheidet?"; statt "Stakeholder-Alignment" schreibe "Wer blockiert? Wer profitiert?"; statt abstrakter Prozessbegriffe schreibe "Was kostet das?", "Wie oft passiert das?", "Was muss geklûÊrt werden?". Ein erfahrener Vertriebsleiter denkt in Menschen, Macht und Geld ã nicht in Beratungsmodellen.\n';
  s+='KRITISCH ã KEINE FACHBEGRIFFE/PRODUKTNAMEN ERFINDEN, DIE DER KUNDE NICHT GENANNT HAT: Wenn ein technischer Fachbegriff oder Produktname (z.B. ein konkretes Software-Modul wie "SAP Analytics Cloud" oder "Integrated Planning") nicht direkt vom Kunden genannt wurde, darf er NICHT als Kundenerkenntnis erscheinen. Verwende stattdessen die einfache, allgemeine Beschreibung dessen, was der Kunde tatsûÊchlich gesagt hat (z.B. "ein SAP-Modernisierungsprojekt lûÊuft" statt "SAP Analytics Cloud und Integrated Planning sind geplant", falls der Kunde keine konkreten Modulnamen genannt hat). Erfundene Fachbegriffe lassen das Ergebnis wie ein Beratungskonzept wirken statt wie eine ehrliche GesprûÊchsdokumentation ã das ist unerwû¥nscht.\n';
  s+='SELBSTTEST VOR JEDER AUSGABE: Wû¥rde ein sehr erfahrener Vertriebsleiter genau so schreiben ã oder wirkt der Text wie ein Strategieberater, der ein Transformationskonzept entwirft? Im Zweifel: pragmatischer, konkreter, vertriebsorientierter formulieren, nicht als Beratungsdokument.\n';
  s+='KRITISCH: Wenn dieselben Kernfakten (z.B. eine konkrete Zahl wie "6 Arbeitstage pro Szenario") bereits in einem vorherigen Kontext-Abschnitt erwûÊhnt wurden, wiederhole sie in dieser Phase nur EINMAL ausfû¥hrlich (meist in den ERKENNTNISSE/BESTûTIGT-Abschnitten) und referenziere sie danach kurz, statt sie in jedem Abschnitt erneut vollstûÊndig auszuschreiben. Ziel: Wiederholungen û¥ber die Phasen hinweg reduzieren, ohne wichtige Fakten wegzulassen.\n';
  s+='PFLICHT ã DREI-STUFEN-SYSTEM FûR JEDE INFORMATION: Bewerte JEDE Information, bevor du sie verwendest, nach genau einer dieser drei Stufen:\n';
  s+='  FAKT (= BESTûTIGT): direkt genannt, eindeutig belegt, aus den Eingaben stammend. Beispiele: "6 Arbeitstage pro Szenario", "3 Spartensysteme", "SAP-Projekt lûÊuft", "CFO ist Sponsor".\n';
  s+='  INTERPRETATION (= ANNAHME): eine logische, nachvollziehbare Ableitung AUS einem Fakt. Beispiele: "SAP-Projekt erzeugt Zeitdruck", "CIO kûÑnnte SAP bevorzugen". Interpretationen sind erlaubt und wertvoll ã aber sie dû¥rfen NIE wie ein Fakt klingen, sondern mû¥ssen erkennbar als Schlussfolgerung formuliert sein (z.B. mit "kûÑnnte", "vermutlich", "deutet darauf hin").\n';
  s+='  VERMUTUNG (= KLûREN/ZU VALIDIEREN): eine nicht belegte Aussage ohne Faktengrundlage ã typischerweise BudgethûÑhe, ROI, Abschlusswahrscheinlichkeit, SchadenshûÑhe, Lizenzbedarf, sofern sie nicht explizit genannt wurden. Eine Vermutung darf NIEMALS als Fakt oder als prûÊzise Zahl erscheinen.\n';
  s+='KRITISCH ã NIEMALS RECHNEN BEI FEHLENDEN DATEN: Wenn fû¥r eine Berechnung (ROI, Amortisation, Abschlusswahrscheinlichkeit in %, SchadenshûÑhe) die nûÑtigen Fakten fehlen, BERECHNE KEINE Zahl, SCHûTZE KEINE Zahl, ERFINDE KEINE Zahl. Schreibe statt einer Zahl explizit, was fehlt (z.B. "ROI aktuell nicht belastbar berechenbar. Es fehlen: Reporting-Aufwand, Szenario-HûÊufigkeit, Fehlerkosten."). Eine ehrliche Lû¥cke ist immer besser als eine prûÊzise wirkende, aber erfundene Zahl.\n';
  s+='KRITISCH ã KEINE ERFUNDENEN STAKEHOLDER-ERWARTUNGEN: Schreibe NIEMALS eine konkrete Erwartung eines Stakeholders, die nicht genannt wurde (z.B. NICHT "GeschûÊftsfû¥hrer erwartet +5-10% Umsatzsteigerung", wenn diese Zahl nirgends im GesprûÊch gefallen ist). Formuliere stattdessen als offene Frage oder als zu klûÊrenden Punkt (z.B. "GeschûÊftsfû¥hrer muss den wirtschaftlichen Nutzen noch definieren" oder "Welche Kennzahl entscheidet fû¥r den GeschûÊftsfû¥hrer û¥ber den Projekterfolg?"). Das gilt fû¥r JEDE Person/Rolle (CEO, CFO, CIO, Einkauf usw.), nicht nur fû¥r den direkten Ansprechpartner.\n';
  s+='PFLICHT: Die Genauigkeits-Kennzeichnung BESTûTIGT/ANNAHME/KLûREN gilt fû¥r deine interne Sorgfalt und fû¥r den Detailbereich (nach ###DETAILS###, falls das Phasenformat das vorsieht) ã NICHT als PrûÊfix in der kompakten Standardausgabe. Halte trotzdem in jedem Bullet selbst implizit fest, was Fakt vs. Interpretation vs. Vermutung ist, ohne das Wort explizit hinzuschreiben (z.B. durch Formulierung wie "Kunde nennt..." vs. "kûÑnnte..." vs. "noch unklar...").\n';
  s+='KRITISCH: Erfinde NIEMALS konkrete Studiennamen, Institute oder prûÊzise Statistiken (z.B. "laut XY-Studie", "13-26 Wochen laut BARC") die nicht im Abschnitt "KI21 Intelligence" unten stehen. Du hast in dieser Phase KEINEN Websuche-Zugriff. Wenn du eine Marktaussage machen willst, formuliere sie als eigene EinschûÊtzung ohne erfundene Quellenangabe, oder verweise allgemein auf Erfahrungswerte aus der KI21 Intelligence.\n';
  s+='KRITISCH: Wenn ein Arbeitsaufwand (Personenstunden) 8 Stunden oder mehr betrûÊgt, wandle ihn IMMER in Arbeitstage û  8 Stunden um, indem du die Stundenzahl DURCH 8 TEILST (z.B. 600-1.200 Stunden ûñ 8 = 75-150 Arbeitstage, NICHT 600-1.200 Arbeitstage ã die Maûeinheit ûÊndert sich, der Zahlenwert wird kleiner). Rechne diese Division bei JEDER Umrechnung explizit nach, bevor du das Ergebnis hinschreibst. Das gilt AUCH wenn die Kundenangabe selbst in Stunden kam (z.B. "40-60 Stunden/Monat" ã "5-7,5 Arbeitstage/Monat"), UND fû¥r jede aufsummierte oder hochgerechnete Jahres-/Monatszahl, nicht nur fû¥r Einzelfall-Nennungen. Nur Werte unter 8 Stunden bleiben in Stunden stehen. Das gilt fû¥r alle Aufwandsangaben in jeder Phase, konsequent û¥ber den gesamten Output.\n';
  s+='KRITISCH: Wenn du irgendwo im Output die VerlûÊsslichkeit einer Aussage/Zahl kennzeichnest, nutze AUSSCHLIESSLICH die Worte BESTûTIGT (vom Kunden genannt oder dokumentiert), ARBEITSWERT (Benchmark + plausibel abgeleiteter Mittelwert aus KI21 Intelligence, zum Rechnen verwendet, nicht kundenspezifisch verifiziert) oder ZU VALIDIEREN (offene GrûÑûe, die im nûÊchsten GesprûÊch geklûÊrt werden sollte) ã NIEMALS Emoji-Punkte wie ÞÂ/ÞÀ/ÞÇ oder Ampelfarben ohne Wort. Schreibe immer zuerst den Bewertungstext, dann das Label in Groûbuchstaben direkt danach oder davor (z.B. "Typische Range: 300-600 Stunden/Jahr, verwendeter ARBEITSWERT: 450 Stunden/Jahr"). Das gilt konsequent fû¥r jede Confidence-Angabe im gesamten Output, nicht nur an einer Stelle. Bei BESTûTIGT/ANNAHME/KLûREN-BlûÑcken (fû¥r GesprûÊchserkenntnisse) bleiben diese drei WûÑrter wie bisher bestehen ã ARBEITSWERT/ZU VALIDIEREN gelten zusûÊtzlich speziell fû¥r quantitative Kennzahlen und Berechnungsgrundlagen.\n';
  s+='KRITISCH: MAXIMAL EIN MULTIPLIKATIONSSCHRITT BEI SPEKULATIVEM POTENZIAL: Wenn du ein Krisen-/Schadenspotenzial in einer Eskalations-/Schadensrechnung darstellst, verkette NICHT mehr als einen einzigen Unsicherheitsfaktor (z.B. NUR "SchadenshûÑhe û geschûÊtzte Vermeidbarkeitsquote"). Verkette NIEMALS zusûÊtzlich noch eine geschûÊtzte HûÊufigkeit pro Jahr in dieselbe Rechnung ã das sind dann mehrere multiplizierte Unsicherheiten und die resultierende Zahl wirkt prûÊziser als sie ist. Behandle HûÊufigkeit pro Jahr als separaten, eigenstûÊndig zu klûÊrenden Punkt, ohne sie in die gleiche Multiplikation einzubeziehen. Gilt in JEDER Phase, nicht nur in der Nutzen-Kosten-Analyse.\n';
  s+='KRITISCH: GLEICHES PRINZIP GILT FûR OPTIMISTISCHE ROI-MULTIPLIKATOREN: Verkette bei einer ROI-/Payback-Aussage NICHT mehr als einen Unsicherheitsfaktor (z.B. NUR die vom Kunden genannte Quote-Verbesserung). Wenn du zusûÊtzlich noch eine geschûÊtzte Margin-Annahme UND eine angenommene Erfolgswahrscheinlichkeit in dieselbe Rechnung einbaust, entsteht eine kû¥nstlich beeindruckende Zahl wie "ROI 20-30x", die bei kritischem Nachfragen (besonders von CFO/CEO) nicht standhûÊlt und Vertrauen kostet. NIEMALS einen ROI-Multiplikator wie "20x", "30x" oder eine ûÊhnlich hohe, beeindruckend wirkende Zahl als Ergebnis ausgeben, wenn sie aus mehr als einer verketteten Unsicherheit stammt ã formuliere statt einer einzelnen Multiplikator-Zahl lieber eine Bandbreite mit explizit benannten Annahmen, oder verzichte ganz auf eine zusammenfassende "Xx ROI"-Zahl und beschreibe Nutzen vs. Investition stattdessen als zwei separate, klar gekennzeichnete GrûÑûen. Gilt in JEDER Phase.\n';
  s+='KRITISCH: KORREKTE BESTûTIGT/ANNAHME-ZUORDNUNG BEI ABGELEITETEN ZAHLEN: Wenn der Kunde eine Prozentzahl nennt (z.B. "20-25% mehr Umsatz"), ist NUR diese Prozentzahl selbst BESTûTIGT (der Kunde hat sie genannt). Jede daraus berechnete absolute ã˜-Zahl (z.B. "5-8 Mio. ã˜ zusûÊtzlicher Umsatz" durch Anwendung der Prozentzahl auf den Gesamtumsatz) ist eine EIGENE Ableitung und MUSS als ANNAHME oder ARBEITSWERT gekennzeichnet werden, NIEMALS als BESTûTIGT ã auch wenn die zugrunde liegende Prozentzahl bestûÊtigt ist. Eine Berechnung aus einer bestûÊtigten Zahl ist selbst nicht automatisch bestûÊtigt.\n';
  s+='KRITISCH ã FORECAST-NUTZEN NUR KONTEXTABHûNGIG: Forecast-/EntscheidungsqualitûÊt ist NICHT pauschal bei jedem "Mein Unternehmen" ein ROI-Hebel. Verwende Forecast-Genauigkeit als zentralen Nutzenhebel NUR, wenn (1) Mein Unternehmen KI21 ist, (2) das eigene Angebot ausdrû¥cklich Forecast, Opportunity Health/Scoring, Pipeline-QualitûÊt, CRM-/Sales-Qualifizierung, Discovery oder Vertriebssteuerung adressiert, oder (3) der Kunde explizit Forecast-/Pipeline-Probleme nennt. Bei allen anderen Angeboten keine KI21-Logik hineinprojizieren; dann liegt der Nutzen woanders. Wenn Forecast zulûÊssig ist, formuliere trotzdem vorsichtig: bessere Qualifizierung ã bessere Datenbasis ã belastbarere Prognose; keine Umsatz-/Abschlussquoten-Steigerung als KI21-Leistungsversprechen. Eine vom Kunden selbst genannte ZielgrûÑûe (z.B. "+20-25% Umsatz") bleibt Kundenhypothese, nicht KI21-Versprechen. Gilt in JEDER Phase, besonders SPIN, ROI, ErûÑffnungssûÊtzen und Abschlussargumentation.\n';
  s+='KRITISCH: UNSICHERE PROZENTANGABEN GENERELL VORSICHTIG FORMULIEREN (gilt fû¥r ALLE Prozentzahlen in JEDER Phase, auch Forecast-Genauigkeit-Benchmarks): Solange eine Prozentzahl nicht durch eigene Messung des Kunden bestûÊtigt ist, formuliere sie nicht als feststehende Tatsache. ErgûÊnze bei der ersten Nennung einen kurzen Validierungs-Hinweis (z.B. "...sollte im Pilotbetrieb mit echten Zahlen validiert werden"), statt die Zahl danach unkommentiert mehrfach als Fakt zu wiederholen.\n';
  s+='KRITISCH ã ROI-HEBEL STATT SCHEINGENAUIGKEIT: KI21 soll keine scheinexakte ROI-Rechenmaschine sein. Wenn Kostenarten, Laufzeiten oder Nutzenannahmen gemischt oder unsicher sind, berechne keinen harten ROI-Prozentsatz und keine komplexe Amortisation. Identifiziere stattdessen: (1) wichtigste ROI-wirksame Position, (2) bekannte wirtschaftliche GrûÑûenordnung, (3) unsichere Annahme, (4) Validierungsfrage an den Kunden, (5) einfache Mindestlogik fû¥r die Entscheidung. Der Account Manager soll dadurch die richtige ROI-wirksame Stelle erkennen und mit dem Kunden belastbar validieren.\n';
  s+='KRITISCH ã KEINE ERFUNDENEN VERMEIDUNGSQUOTEN: Erzeuge niemals konkrete Vermeidungsquoten wie 75%, 50%, 30% oder 10-20%, wenn diese nicht ausdrû¥cklich vom Kunden genannt wurden. Schreibe stattdessen: Vermeidungsquote noch nicht validiert / ROI-Annahme noch nicht belastbar / zentrale ROI-wirksame Annahme muss im Startangebot gemessen werden. Keine scheinexakte Quote aus eigener Interpretation ableiten.\n';
  s+='KRITISCH ã VERMEIDUNGSQUOTE NICHT ENTFERNEN, SONDERN OHNE ZAHL SICHTBAR HALTEN: Wenn der Business Case auf schwach qualifizierten Deals, spûÊter Disqualifikation oder schlechter Discovery basiert, muss die Vermeidungsquote als zentrale zu validierende ROI-Annahme erscheinen. Verboten ist nur eine erfundene Prozentzahl. Richtige Formulierung: ãVermeidungsquote schwach qualifizierter Deals noch nicht validiertã.\n';
  s+='KRITISCH ã KEINE UNNûTIGEN NEBENBAUSTELLEN DURCH KUNDENSYSTEME: Vorhandene Kundensysteme (z.B. CRM, ERP, BI, HubSpot, Salesforce, Dynamics, SAP, Pipedrive oder andere Plattformen) dû¥rfen NICHT automatisch als Risiko, offener Punkt oder nûÊchster Schritt erscheinen. Prû¥fe immer zuerst: Hilft diese Systemfrage dem Abschluss des konfigurierten eigenen Angebots ã oder erûÑffnet sie eine Ausweich-/Ersatzdiskussion, die das eigene Angebot relativiert? Aktive System-/Integrationsfragen nur nennen, wenn (a) Integration Kernnutzen des eigenen Produkts ist, (b) der Kunde Integration ausdrû¥cklich als Voraussetzung nennt, (c) ohne Integration kein sinnvoller Start mûÑglich ist oder (d) Integration bestûÊtigter Entscheidungsfaktor ist. Sonst: Kundensysteme nur als stillen Kontext nutzen und den nûÊchsten Schritt auf Nutzen, Entscheidung und Validierung des eigenen Angebots fokussieren.\n';
  s+='NACHRANGIGE RISIKEN: Wenn eine System-/Integrationsdiskussion nicht startkritisch ist, aber vertrieblich gefûÊhrlich werden kûÑnnte, darf sie hûÑchstens nachrangig als Risiko erscheinen ã nicht als Top-Risiko, nicht als ãDie eine Sacheã, nicht als nûÊchster Schritt. Formulierung: ãAusweichdiskussion û¥ber vorhandene Systeme vermeiden; Nutzen des eigenen Angebots zuerst validieren.ã\n';
  s+='KRITISCH ã KEINE ERFUNDENEN TEILNEHMERZAHLEN IM NûCHSTEN SCHRITT: Erfinde keine konkreten GruppenstûÊrken wie 3-4 Key Account Manager, 5 Deals oder 2 Wochen, wenn sie nicht ausdrû¥cklich genannt wurden. Bei KI21 Compact oder Startangeboten formuliere neutral: ãCompact-Kickoff mit ausgewûÊhlten Account Managernã, ãerste echte Opportunitiesã, ãStartumfang und Messkriterien festlegenã.\n';
  s+='KRITISCH: KEIN AUSWEICHEN AUF ERFUNDENE "BENCHMARKS": Wenn du fû¥r ein Krisen-/Schadenspotenzial keine belastbare, herleitbare Zahl hast, darfst du NICHT stattdessen eine pauschale Branchenzahl als angeblichen "Benchmark" zitieren, um trotzdem einen ã˜-Betrag zu nennen. Das ist nur eine Umgehung des Verbots, keine echte Quelle. Wenn keine Zahl aus der tatsûÊchlichen KI21 Intelligence stammt, bleibt das Potenzial unbeziffert ã auch wenn das bedeutet, gar keine ã˜-Zahl zu nennen. Gilt in JEDER Phase.\n';
  s+='KRITISCH: KATEGORISCHES VERBOT FûR UNBESTûTIGTES KRISENPOTENZIAL: Wenn ein Schadens-/Krisenpotenzial nicht durch konkrete, vom Kunden bestûÊtigte Zahlen (HûÊufigkeit UND Vermeidbarkeit UND SchadenshûÑhe alle bestûÊtigt) belegt ist, darf NIRGENDS im Output ã in KEINER Phase, auch nicht im Abschlusssatz, in der Kurzfassung, in Einwandantworten oder als "SensitivitûÊtsrechnung" ã ein ã˜-Betrag dafû¥r genannt werden, auch nicht mit WûÑrtern wie "kûÑnnte", "potenziell", "zusûÊtzlich". Beschreibe stattdessen NUR die Mechanik in Worten, ohne Zahl. Ein unbestûÊtigter Betrag im KundengesprûÊch beschûÊdigt mehr Vertrauen als er Nutzen bringt.\n';
  s+='KRITISCH ã KORREKTE PERSONEN-BEZEICHNUNG (gilt in JEDER Phase): Schreibe "X beteiligte Mitarbeitende" oder "X Personen", NIEMALS "X FTE" oder "X Vollzeitstellen" ã auûer der Kunde hat selbst explizit von Vollzeitstellen/FTE gesprochen. Eine vom Kunden genannte Anzahl beteiligter Personen ist NICHT automatisch eine Anzahl Vollzeitstellen ã das sind fachlich unterschiedliche GrûÑûen, die nicht gleichgesetzt werden dû¥rfen.\n';
  s+='ROI: Nur bestûÊtigte Kundenzahlen verwenden. Zeitersparnis NUR fû¥r Account Manager.\n';
  s+='KRITISCH: Jede Phase muss mindestens EINEN Gedanken enthalten, der û¥ber Standardwissen hinausgeht ã einen Aha-Insight, der im GedûÊchtnis bleibt (z.B. "Die grûÑûte Zeitersparnis entsteht oft nicht durch schnellere Reports, sondern dadurch, dass dieselben Zahlen nicht mehr in mehreren Excel-Dateien manuell abgeglichen werden mû¥ssen."). Vermeide reine Standardaussagen ohne û¥berraschenden Mehrwert. Dieser Insight darf nicht erfunden wirken ã er muss zur konkreten Situation des Kunden passen und nachvollziehbar sein.\n';
  s+='KRITISCH: Tonfall durchgehend partnerschaftlich, nicht verkûÊuferisch-drûÊngend. Vermeide Formulierungen wie "damit ich Sie/Ihre GeschûÊftsfû¥hrung û¥berzeuge" oder "garantiert". Bevorzuge Formulierungen wie "damit Sie eine belastbare Entscheidungsgrundlage haben ã unabhûÊngig davon, wie die Entscheidung ausfûÊllt" oder "damit wir gemeinsam zu einer fundierten EinschûÊtzung kommen". Das Ziel ist: gemeinsam zu einer Entscheidung fû¥hren, nicht û¥berreden.\n';
  s+='KRITISCH ã HARTE GRENZE FûR DIE STANDARDAUSGABE: Die Standardausgabe (alles VOR der Zeile "###DETAILS###", falls vorhanden) MUSS exakt mit der letzten vorgegebenen Zeile des Formats enden (meist "NûCHSTER SCHRITT DIESE WOCHE:" / vergleichbar, je nach Phase). Schreibe NACH dieser letzten Zeile ABSOLUT NICHTS mehr, auûer dem optionalen Marker "###DETAILS###" und dem dahinter folgenden Detailblock. KEINE zusûÊtzliche Zusammenfassung, KEIN Wiederholen von Punkten, KEIN weiterer Absatz "Zusammenfassend...". Die Standardausgabe muss auf einem Smartphone als EINE Bildschirmseite ohne Scrollen lesbar sein ã das ist die wichtigste Einzelregel in diesem Prompt.\n';
  s+='KRITISCH: Die "NûCHSTE AKTION"/"ã TODO" dieser Phase muss sich klar von der letzten Aktion aus "BISHERIGE ERGEBNISSE" (falls vorhanden) unterscheiden ã wiederhole NIEMALS sinngemûÊû denselben nûÊchsten Schritt wie eine vorherige Phase. Wenn die vorherige Phase z.B. "Termin vereinbaren" als Aktion hatte und dieser Termin laut Kontext bereits stattgefunden hat, muss die neue Aktion einen Schritt WEITER sein, nicht denselben wiederholen.\n';
  s+='AUSGABE-REGELN (strikt einhalten):\n';
  s+='- KRITISCHSTE REGEL: Liefere IMMER sofort den vollstûÊndigen Output im vorgegebenen Format ã auch wenn Informationen fehlen, unsicher oder unvollstûÊndig wirken. STELLE NIEMALS eine Rû¥ckfrage VOR dem Output und warte NICHT auf eine Antwort, bevor du lieferst. Fehlende oder unsichere Daten gehûÑren in die Kennzeichnung ANNAHME/KLûREN oder eine etwaige Rû¥ckfragen-Sektion AM ENDE des Outputs, NIEMALS als eigene Frage oder Meta-Kommentar davor. Du bekommst in diesem Schritt keine Antwort auf eine Vorab-Frage ã also stelle keine, sondern arbeite mit dem was im Feld steht. VERBOTENE SatzanfûÊnge: "Ich verstehe die Aufgabe", "Allerdings stelle ich fest", "Mir fehlen", "Bevor ich", "Ich muss zunûÊchst" ã beginne IMMER direkt mit dem ersten Element des vorgegebenen Output-Formats.\n';
  s+='- Nutze vorhandene Informationen ã keine Nachfragen\n';
  s+='- Maximal 5 Punkte pro Abschnitt\n';
  s+='- Jeder Punkt: 1-2 SûÊtze, direkt und konkret\n';
  s+='- Kein Flieûtext, keine langen ErklûÊrungen\n';
  s+='- Kein Markdown: keine **, keine ###, keine ---\n';
  s+='- Nur Deutsch\n';
  s+='- Keine Einleitung, kein Fazit\n';
  s+='- KRITISCH ã EIN BULLET = EINE AUSSAGE: Ein Bullet darf NIEMALS mehrere Aussagen verketten ã egal ob mit Komma, "und", einem "="-Zeichen, oder einem Relativsatz ("der/die/das..."). NICHT erlaubt z.B.: "6 Arbeitstage manuelle Konsolidierung pro PreisûÊnderung = messbarer Schmerz, der monatlich anfûÊllt und regelmûÊûig zu Fehlentscheidungen fû¥hrt" (das sind DREI Aussagen in einem Bullet: Zeitaufwand, HûÊufigkeit, Konsequenz). Stattdessen IMMER in einzelne Bullets aufteilen: "6 Arbeitstage pro PreisûÊnderung" / "Konsolidierung erfolgt manuell" / "Fehler fû¥hren zu Fehlentscheidungen". Jeder Bullet maximal 6-8 WûÑrter, ein einziger Gedanke, in wenigen Sekunden erfassbar. Wenn du beim Formulieren eines Bullets ein "=", "und", "der/die/das" oder ein Komma zur Verbindung zweier Sachverhalte einsetzen willst, ist das ein sicheres Zeichen, dass es zwei Bullets werden mû¥ssen.\n';
  s+='- KRITISCH ã SOFORTIGER AHA-EFFEKT, KEINE INTERPRETATION NûTIG: Jeder Bullet der Standardansicht muss beim Lesen innerhalb weniger Sekunden sofort verstanden werden ã der Nutzer darf NIEMALS selbst nachdenken oder interpretieren mû¥ssen, um die Bedeutung zu erfassen. Konkreter Test: Wû¥rde ein Vertriebsleiter beim Lesen sofort "Genau." oder "Aha." denken ã oder eher "Moment, was meint die KI damit?" Im zweiten Fall: Bullet konkreter formulieren oder die Begrû¥ndung/den Zusammenhang stattdessen in den Detailbereich (nach ###DETAILS###) verschieben. Begrû¥ndungen, Herleitungen und ErlûÊuterungen gehûÑren NIEMALS in die Standardansicht, NUR in "Mehr Details".\n';

  s+='GLOBALE REGEL 4 ã ALTE HYPOTHESEN DURCH BESTûTIGTE ERKENNTNISSE ERSETZEN: Wenn im Kontext Kunde (ErgûÊnzungen) neuere, konkretere oder bestûÊtigte Informationen vorliegen, die einer frû¥heren Hypothese widersprechen, MUSS die Hypothese ersetzt werden. Beispiel: Steht in den ErgûÊnzungen "80.000 ã˜ Umsatzwirkung durch schlecht qualifizierte Deals bestûÊtigt", darf nicht gleichzeitig stehen "Keine bestûÊtigten Schmerzen aus direktem GesprûÊch." Stattdessen: "BestûÊtigter Schmerz: schlecht qualifizierte Deals verursachen ca. 80.000 ã˜ Umsatzwirkung." Ebenso: Wenn ErgûÊnzungen eine Entscheidungsbefugnis nennen ("Marius darf alleine entscheiden"), darf nicht parallel stehen "Entscheider noch unklar" ã sondern: "Entscheiderstatus vorlûÊufig bestûÊtigt, Budgetrahmen und Vertragsfreigabe noch zu validieren."\n';
  s+='EVIDENZLABELS (verbindlich fû¥r alle KI21-Ausgaben): Verwende exakt diese fû¥nf Labels, niemals andere Formulierungen:\nãÂ BESTûTIGT ã Kunde hat dies explizit genannt oder schriftlich bestûÊtigt.\nãÂ ANNAHME ã Schlussfolgerung aus vorliegenden Informationen, noch nicht direkt bestûÊtigt.\nãÂ ZU KLûREN ã Information fehlt, muss im nûÊchsten GesprûÊch erfragt werden.\nãÂ NICHT BEKANNT ã Kein Hinweis in den vorliegenden Daten, noch kein GesprûÊch darû¥ber.\nãÂ ûBERHOLT ã Diese Aussage war frû¥her gû¥ltig, wurde aber durch neuere Ergenntnisse ersetzt. Nur verwenden wenn ein expliziter Widerspruch zu einer frû¥heren Aussage vorliegt.\nKritische Konsistenzregel: BESTûTIGT und ZU KLûREN dû¥rfen nicht fû¥r dieselbe Information gleichzeitig vergeben werden. Wenn neue ErgûÊnzungen eine ZU KLûREN-Frage beantworten, ersetzt BESTûTIGT den bisherigen Status ã nie beide parallel.\n';
  s+='- KRITISCH ã REIHENFOLGE INNERHALB JEDER BULLET-LISTE: Sortiere IMMER nach Relevanz fû¥r die Kaufentscheidung: zuerst Schmerz/Bedarf (quantifiziert, wenn mûÑglich), dann Risiko, zuletzt allgemeiner Kontext. Die wichtigste, konkreteste Erkenntnis steht IMMER an Position 1 ã niemals ein genereller Kontext-Punkt vor einem konkreten Schmerzpunkt.\n';
  s+='- Erkenntnisse als einfache Bullets, OHNE BESTûTIGT:/ANNAHME:/KLûREN:-PrûÊfix in der Standardausgabe (diese Kennzeichnung nur noch im Detailbereich nach ###DETAILS### verwenden, falls das jeweilige Phasenformat das vorsieht)\n';
  s+='- KRITISCH: Die abschlieûende Aktionszeile darf NUR EINE einzige, priorisierte Handlung enthalten ã KEINE AufzûÊhlung mehrerer Aktionen mit "und" oder Kommas (z.B. NICHT "Workshop vereinbaren und Unterlagen vorbereiten und Entscheider kontaktieren"). Wenn mehrere Dinge zu tun wûÊren, wûÊhle die EINE wichtigste aus, die diese Woche passieren muss ã alles andere ergibt sich danach von selbst oder gehûÑrt in den Detailbereich.\n';

// ãã CLAUDE API ããããããããããããããããããããããããããããããããããããããããããããã
async function callClaude(prompt, onStream){
  const apiKey=LS.get('ki21_apikey','');
  if(!apiKey){alert('Bitte API Key unter ã hinterlegen.');return null;}
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',
      max_tokens:20000,
      stream:true,
      tools:[{type:'web_search_20250305',name:'web_search',max_uses:6}],
      messages:[{role:'user',content:prompt}]
    })
  });
  if(!resp.ok){const err=await resp.json();throw new Error(err.error?.message||'API Fehler '+resp.status);}
  const reader=resp.body.getReader();
  const decoder=new TextDecoder();
  let fullText='';
  let blockText='';
  while(true){
    const {done,value}=await reader.read();
    if(done)break;
    const chunk=decoder.decode(value,{stream:true});
    const lines=chunk.split('\n');
    for(const line of lines){
      if(line.startsWith('data: ')){
        const data=line.slice(6);
        if(data==='[DONE]')continue;
        try{
          const parsed=JSON.parse(data);
          if(parsed.type==='content_block_start'&&parsed.content_block?.type==='tool_use'){
            if(onStream)onStream(stripMd(fullText)+'\nÞ Suche aktuelle Informationen...\n');
          }
          if(parsed.type==='content_block_start'&&parsed.content_block?.type==='text'){
            blockText='';
          }
          if(parsed.type==='content_block_delta'&&parsed.delta?.text){
            blockText+=parsed.delta.text;
            if(onStream)onStream(stripMd(fullText+blockText));
          }
          if(parsed.type==='content_block_stop'){
            if(blockText){fullText+=(fullText?'\n':'')+blockText;blockText='';}
          }
        }catch(e){}
      }
    }
  }
  if(blockText){fullText+=(fullText?'\n':'')+blockText;}
  return fullText;
}

// ãã HELPERS ãããããããããããããããããããããããããããããããããããããããããããããããã
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(tag==='button' && (!attrs || attrs.type==null))el.setAttribute('type','button');
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')el.className=v;
    else el.setAttribute(k,v);
  });
  children.flat().forEach(c=>{
    if(c==null)return;
    el.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return el;
}

function stripMd(text){
  return text
    .replace(/#{1,6}\s+/g,'')
    .replace(/\*\*\*([^*]+)\*\*\*/g,'$1')
    .replace(/\*\*([^*]+)\*\*/g,'$1')
    .replace(/\*([^*]+)\*/g,'$1')
    .replace(/^---+$/gm,'')
    .replace(/^===+$/gm,'')
    .replace(/^>\s/gm,'')
    .replace(/`([^`]+)`/g,'$1')
    .trim();
}

function attachScoreLongPress(el,begruendung){
  if(!begruendung)return;
  let pressTimer=null;
  let fired=false;
  const showTooltip=()=>{
    const existing=document.getElementById('score-tooltip');
    if(existing)existing.remove();
    const tip=document.createElement('div');
    tip.id='score-tooltip';
    tip.style.cssText='position:fixed;top:50px;left:14px;right:14px;background:#1c2333;'+
      'border:1px solid #ff6b00;border-radius:8px;padding:10px 12px;font-size:12px;'+
      'color:#e6edf3;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.5);cursor:pointer;'+
      '-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;';
    const textEl=document.createElement('div');
    textEl.textContent=begruendung;
    const hintEl=document.createElement('div');
    hintEl.textContent='Tippen zum Schlieûen';
    hintEl.style.cssText='font-size:9px;color:#8b949e;margin-top:6px;text-align:right;';
    tip.appendChild(textEl);
    tip.appendChild(hintEl);
    tip.addEventListener('click',e=>{e.stopPropagation();tip.remove();});
    document.body.appendChild(tip);
    setTimeout(()=>{
      const dismissOnAnyClick=(e)=>{
        const t=document.getElementById('score-tooltip');
        if(t){
          e.preventDefault();
          e.stopPropagation();
          if(e.stopImmediatePropagation)e.stopImmediatePropagation();
          t.remove();
        }
        document.removeEventListener('click',dismissOnAnyClick,true);
        document.removeEventListener('touchstart',dismissOnAnyClick,true);
      };
      document.addEventListener('click',dismissOnAnyClick,true);
      document.addEventListener('touchstart',dismissOnAnyClick,true);
    },100);
  };
  const start=(e)=>{
    fired=false;
    pressTimer=setTimeout(()=>{fired=true;showTooltip();},500);
  };
  const cancel=()=>{if(pressTimer)clearTimeout(pressTimer);};
  el.style.cursor='pointer';
  el.addEventListener('touchstart',start,{passive:true});
  el.addEventListener('touchend',cancel);
  el.addEventListener('touchmove',cancel);
  el.addEventListener('mousedown',start);
  el.addEventListener('mouseup',cancel);
  el.addEventListener('mouseleave',cancel);
  el.addEventListener('contextmenu',e=>e.preventDefault());
}

function extractBegruendung(text){
  const m=text.match(/Begrû¥ndung:\s*(.+)/);
  if(m)return m[1].trim().split('\n')[0];
  const pipeMatch=text.match(/\d+\s*\/\s*10\s*\|\s*(.+)/);
  if(pipeMatch)return pipeMatch[1].trim().split('\n')[0];
  const fallback=text.match(/Empfehlung:\s*(.+)/);
  if(fallback)return fallback[1].trim().split('\n')[0];
  return '';
}

function getAdditionRiskSignals(accId,allResults){
  const resultsText=(allResults||[]).map(r=>r.text||'').join('\n');
  const raw=(getCurrentUserKnowledgeText(accId)+'\n'+resultsText);
  const combined=raw.toLowerCase();
  const warning=[];
  const positive=[];
  let penalty=0;
  let scoreCap=null;
  const addWarn=(text,points,cap)=>{
    if(!warning.find(w=>w.text===text))warning.push({text,origin:'ERGAENZUNG',type:'warning',disabled:false});
    penalty=Math.max(penalty,points);
    if(cap!==undefined&&cap!==null)scoreCap=scoreCap===null?cap:Math.min(scoreCap,cap);
  };
  const addPos=(text,points)=>{
    if(!positive.find(w=>w.text===text))positive.push({text,origin:'ERGAENZUNG',type:'positive',disabled:false});
    // Positive ErgûÊnzungen werden bewusst nur moderat behandelt; harte Negativsignale dominieren.
  };
  if(!combined.trim())return {warning,positive,penalty,scoreCap};

  const leaderWords='(geschûÊftsfû¥hrer|gf|ceo|cfo|geschûÊftsleitung|entscheider|leitung|vorstand|sponsor)';
  const competitorWords='(mitbewerb|mitbewerber|wettbewerb|wettbewerber|konkurrent|konkurrenz|alternative|andere lûÑsung|andere lûÑsungen)';
  const preferenceWords='(prûÊfer|bevorzug|favoris|favorit|gesetzt|vorne|tendier|entschieden)';
  const rejectionWords='(mag .*nicht|will .*nicht|lehnt .*ab|skeptisch|dagegen|kein interesse|nicht û¥berzeugt|unsere lûÑsung nicht|gegen unsere lûÑsung)';

  const leaderPrefersCompetitor=new RegExp(leaderWords+'.{0,120}'+preferenceWords+'.{0,120}'+competitorWords,'i').test(raw)
    || new RegExp(competitorWords+'.{0,120}'+preferenceWords+'.{0,120}'+leaderWords,'i').test(raw)
    || new RegExp(leaderWords+'.{0,120}'+rejectionWords+'.{0,160}'+competitorWords,'i').test(raw)
    || new RegExp(leaderWords+'.{0,160}'+competitorWords,'i').test(raw)&&new RegExp(rejectionWords+'|'+preferenceWords,'i').test(raw);

  if(leaderPrefersCompetitor){
    addWarn('GeschûÊftsfû¥hrer favorisiert Wettbewerber',45,25);
  }
  if(new RegExp(leaderWords+'.{0,120}'+rejectionWords,'i').test(raw)){
    addWarn('Entscheider lehnt unsere LûÑsung ab',35,30);
  }
  if(new RegExp(competitorWords+'.{0,100}(workshop|demo|pilot|proof|poc|test|prûÊsentation|angebot)','i').test(raw)){
    addWarn('Wettbewerber bereits aktiv',25,35);
  }
  if(new RegExp('(budget).{0,80}(nicht|kein|fehlt|gestrichen|unklar|abgelehnt)','i').test(raw)){
    addWarn('Budget-Freigabe durch GF/CFO noch offen ã Strategie: Pilotmodell oder schrittweise Einfû¥hrung vorschlagen',20,45);
  }
  if(new RegExp('(entscheidung|projekt|go-live|start|kauf).{0,80}(verschoben|verzûÑgert|spûÊter|unklar|pausiert|gestoppt|eingefroren)','i').test(raw)){
    addWarn('Entscheidung verzûÑgert oder gestoppt',20,45);
  }
  if(new RegExp('(budget).{0,80}(genehmigt|freigegeben|bestûÊtigt)','i').test(raw)){
    addPos('Operatives Budget vorhanden',5);
  }
  if(new RegExp(leaderWords+'.{0,120}(sponsor|unterstû¥tzt|treibt|will|prioritûÊt|dringend)','i').test(raw)){
    addPos('Operativer Sponsor unterstû¥tzt aktiv',5);
  }
  const championWords='(champion|fû¥rsprecher|unterstû¥tzer|treiber|sponsor)';
  const departureWords='(verlûÊsst (das unternehmen|die firma|uns)|hat gekû¥ndigt|kû¥ndigt (zum|in|im|nûÊchst|demnûÊchst)|wechselt (den arbeitgeber|die firma|das unternehmen)|ist nicht mehr (im unternehmen|verfû¥gbar|erreichbar|an bord)|zieht (seine|ihre) unterstû¥tzung zurû¥ck|fûÊllt (als (champion|fû¥rsprecher|sponsor) )?(komplett )?weg)';
  const trustPhrasePattern=/(verlûÊsst sich|verlassen sich|sich .{0,15}verlassen|verlass(en)? auf|verlûÊsslich|vertrau)/i;
  const championDepartureRe=new RegExp(championWords+'.{0,80}'+departureWords,'i');
  const championDepartureMatch=raw.match(championDepartureRe);
  if(championDepartureMatch&&!trustPhrasePattern.test(championDepartureMatch[0])){

  }
  return {warning,positive,penalty,scoreCap};
}

function applyHealthRiskRules(baseScore,risk){
  let score=Number(baseScore)||0;
  score=score-risk.penalty;
  if(risk.scoreCap!==null&&risk.scoreCap!==undefined){
    score=Math.min(score,risk.scoreCap);
  }
  return Math.max(0,Math.min(100,Math.round(score)));
}

    allResults.forEach(r=>{if(r.text)s+='--- '+r.title+' ---\n'+r.text.slice(0,3000)+'\n\n';});
    s+='=== ENDE FRûHERE PHASENERGEBNISSE ===\n\n';
  }
  s+=`Der Opportunity Health Score reprûÊsentiert die geschûÊtzte Wahrscheinlichkeit eines erfolgreichen Auftragsgewinns ã basierend auf allen bekannten Informationen, deiner B2B-Vertriebserfahrung und typischen Vertriebsmustern.

KRITISCH ã DER SCORE MISST NICHT: DokumentationsqualitûÊt, Informationsmenge, Bearbeitungsfortschritt oder Anzahl ausgefû¥llter Felder. Die Menge der gesammelten Informationen ist NEUTRAL fû¥r den Score. Mehr dokumentierte Information darf den Score NICHT automatisch erhûÑhen. Bewerte stattdessen jede einzelne Information danach, ob sie die TATSûCHLICHE Abschlusswahrscheinlichkeit erhûÑht, senkt, oder unverûÊndert lûÊsst.

Beispiele fû¥r deutliche SENKUNG: GeschûÊftsfû¥hrer/CEO/Entscheider mag unsere LûÑsung nicht; GeschûÊftsfû¥hrer/CEO/Entscheider prûÊferiert zwei andere Mitbewerber; Wettbewerber fû¥hrt bereits Workshops durch oder ist stark etabliert; Wettbewerber bietet kritische Funktion besser; Entscheidung wird verschoben oder das Projekt verschoben; Budget entfûÊllt; interner Champion verlûÊsst das Unternehmen (NUR wenn explizit so beschrieben, nicht bei bloûer Champion-ErwûÊhnung); CIO/IT blockiert oder bevorzugt eine vorhandene AlternativlûÑsung (z.B. ein bereits lizenziertes Konkurrenzsystem oder eine SAP-/ERP-Inhouse-Alternative).

KRITISCH ã FûNF KONSISTENZREGELN FûR DIE SIGNALE:

// savePhaseSnapshot: isolierter Health-Call mit NUR den Daten dieser einen Phase.
// Kein kk, keine anderen Phasenergebnisse ã ergibt ausschlieûlich phaseneigene Signale.
// Alle Signale werden mit sourcePhase getaggt. Globaler Score bleibt unverûÊndert.
async function savePhaseSnapshot(accId,sitId){
  if(!accId||sitId===undefined)return;
  const cust=(LS.get('ki21_acc',[]).find(a=>a.id===accId)||{}).cust;
  if(!cust||!cust.firma)return;
  const sit=SITS[sitId];
  if(!sit)return;
  const d=LS.get('ki21_st_'+accId+'_'+sitId,null);
  if(!d||!d.result)return;
  const singleResult=[{title:sit.title,text:d.result}];
  const prompt=buildHealthPrompt(cust,singleResult,'','');
  const json=await callClaudeJSON(prompt);
  if(json&&typeof json.score==='number'){
    const tag=(arr)=>(arr||[]).map(s=>({...s,sourcePhase:sit.id||sitId}));
    LS.set('ki21_phase_snap_'+accId+'_'+sitId,{
      positive:tag(json.positive),
      warning:tag(json.warning),
      open:tag(json.open||[]),
      sourcePhase:sit.id||sitId,
      ts:Date.now()
    });
  }

function getKoSeverity(text){
  const t=(text||'').toLowerCase();
  const leaderWords='(geschûÊftsfû¥hrer|gf|ceo|cfo|geschûÊftsleitung|entscheider|leitung|vorstand|sponsor|cio)';
  const competitorWords='(mitbewerb|mitbewerber|wettbewerb|wettbewerber|konkurrent|konkurrenz)';
  const preferenceWords='(prûÊfer|bevorzug|favoris|favorit|gesetzt|vorne|tendier)';
  const rejectionWords='(mag .*nicht|will .*nicht|lehnt .*ab|skeptisch|dagegen|kein interesse|nicht û¥berzeugt|ablehn)';
  // Reihenfolge = Schweregrad, niedrigster Deckel zuerst geprû¥ft
  if(new RegExp(leaderWords+'.{0,80}'+preferenceWords+'.{0,80}'+competitorWords,'i').test(t))return {penalty:45,cap:25};
  if(new RegExp(competitorWords+'.{0,80}'+preferenceWords,'i').test(t))return {penalty:45,cap:25};
  if(new RegExp(leaderWords+'.{0,80}'+rejectionWords,'i').test(t))return {penalty:35,cap:30};
  const championDepartureMatch2=t.match(/(champion|fû¥rsprecher|sponsor).{0,60}(verlûÊsst (das unternehmen|die firma|uns)|hat gekû¥ndigt|kû¥ndigt (zum|in|im)|wechselt (den arbeitgeber|die firma|das unternehmen)|nicht mehr (im unternehmen|verfû¥gbar|erreichbar)|zieht (seine|ihre) unterstû¥tzung zurû¥ck|fûÊllt (komplett )?weg)/i);
  if(championDepartureMatch2&&!/(verlûÊsst sich|verlassen sich|sich .{0,15}verlassen|verlass(en)? auf|verlûÊsslich|vertrau)/i.test(championDepartureMatch2[0]))return {penalty:30,cap:30};
  if(/budget.{0,40}(komplett gestrichen|vollstûÊndig entfallen|endgû¥ltig abgelehnt)/i.test(t))return {penalty:20,cap:45};
  if(/(entscheidung|projekt).{0,40}(final gestoppt|endgû¥ltig gestoppt|auf unbestimmte zeit eingefroren)/i.test(t))return {penalty:20,cap:45};
  return null;
}

function _getOpportunityHealthBase(accId){
  const auto=LS.get('ki21_health_'+accId,null);
  const allResults=[];
  SITS.forEach((sit,i)=>{
    const d=LS.get('ki21_st_'+accId+'_'+i,null);
    if(d&&d.result)allResults.push({title:sit.title,text:d.result});
  });
  const risk=getAdditionRiskSignals(accId,allResults);
  if(!auto){
    if(risk.warning.length||risk.positive.length){
      let cap=null;
      risk.warning.forEach(w=>{const sev=getKoSeverity(w.text);if(sev)cap=cap===null?sev.cap:Math.min(cap,sev.cap);});
      const score=cap!==null?Math.min(55,cap):55;
      return {score,label:score<35?'Kritisch':'Stabil',provisional:true,positive:risk.positive,warning:risk.warning,open:[],structuralOpenCount:6,isKo:cap!==null};
    }
    return null;
  }
  const manual=getHealthManual(accId);
  const positive=(auto.positive||[]).map(s=>({text:s.text,origin:'AUTO',type:'positive',disabled:manual.removedAutoTexts.includes(s.text)}));
  const warning=(auto.warning||[]).map(s=>({text:s.text,origin:'AUTO',type:'warning',disabled:manual.removedAutoTexts.includes(s.text)}));
  const open=(auto.open||[]).map(s=>({text:s.text,origin:'AUTO',type:'open',disabled:manual.removedAutoTexts.includes(s.text)}));
  risk.warning.forEach(r=>{ if(!warning.find(w=>w.text===r.text)) warning.unshift({...r,disabled:manual.removedAutoTexts.includes(r.text)}); });
  risk.positive.forEach(r=>{ if(!positive.find(w=>w.text===r.text)) positive.unshift({...r,disabled:manual.removedAutoTexts.includes(r.text)}); });
  manual.added.forEach(m=>{
    const entry={text:m.text,origin:'MANUELL',type:m.type,disabled:m.active===false};
    if(m.type==='positive')positive.push(entry);
    else if(m.type==='warning')warning.push(entry);
    else open.push(entry);
  });
  // EINE einzige Quelle der Wahrheit fû¥r K.O.-Erkennung: getKoSeverity prû¥ft jeden aktiven (nicht ausgeblendeten) Warnsignal-Text.
  // K.O. wirkt NUR als Score-Deckel (schlimmster Fall gewinnt) - NIE als zusûÊtzliche, aufsummierbare Strafe.
  // Architektur-Korrektur: Ein rein lokal per Regex erkanntes Signal (origin='ERGAENZUNG') darf den Score NICHT
  // allein hart deckeln - das wû¥rde bedeuten, dass eine ungeprû¥fte Textmustererkennung die KI-Bewertung
  // û¥berstimmt. Nur von der KI selbst bestûÊtigte (AUTO) oder bewusst vom Nutzer eingegebene (MANUELL)
  // Signale dû¥rfen den K.O.-Deckel auslûÑsen. ERGAENZUNG-Signale bleiben als Hinweis sichtbar, capen aber nicht.
  const activeWarnings=warning.filter(w=>!w.disabled&&w.origin!=='ERGAENZUNG');
  let koCapMin=null;
  activeWarnings.forEach(w=>{
    const sev=getKoSeverity(w.text);
    if(sev)koCapMin=koCapMin===null?sev.cap:Math.min(koCapMin,sev.cap);
  });
  const hasActiveKo=koCapMin!==null;
  // Moderate +-3 Wirkung nur fû¥r NICHT-K.O.-Signale (normale Risiko-Signale)
  const manualPositiveCount=manual.added.filter(m=>m.type==='positive'&&m.active!==false).length;
  const manualWarningCount=manual.added.filter(m=>m.type==='warning'&&m.active!==false&&!isKoSignalText(m.text)).length;
  const disabledAutoPositive=positive.filter(s=>(s.origin==='AUTO'||s.origin==='ERGAENZUNG')&&s.disabled).length;
  const disabledAutoWarning=warning.filter(s=>(s.origin==='AUTO'||s.origin==='ERGAENZUNG')&&s.disabled&&!isKoSignalText(s.text)).length;
  let base=auto.score+manualPositiveCount*3-manualWarningCount*3-disabledAutoPositive*3+disabledAutoWarning*3;
  let score=Math.max(0,Math.min(100,Math.round(base)));
  if(hasActiveKo)score=Math.min(score,koCapMin);
  const provisional=(auto.structuralOpenCount||0)>3;
  const label=hasActiveKo?'Kritisch':(score<35?'Kritisch':(score<70?'Stabil':(auto.label||'Gesund')));
  return {score,label,provisional,positive,warning,open,structuralOpenCount:auto.structuralOpenCount||0,checklist:auto.checklist||null,isKo:hasActiveKo,ts:auto.ts||0};
}

function normalizeEuroNumber(str){
  let s=String(str||'').trim().toLowerCase();
  if(!s)return null;
  const hasK=/k\b|kã˜|tausend/.test(s);
  s=s.replace(/ã˜/g,'').replace(/eur/g,'').replace(/\s/g,'').replace(/kã˜?/g,'').replace(/tausend/g,'');
  if(/,\d{1,2}$/.test(s))s=s.replace(/\./g,'').replace(',','.');
  else s=s.replace(/[.,]/g,'');
  let n=parseFloat(s);
  if(!isFinite(n))return null;
  if(hasK||n<1000&&/\b\d{1,3}\s*k/i.test(str))n*=1000;
  return Math.round(n);
}
function extractEuroNumbers(text){
  const out=[];
  const src=String(text||'');
  const re=/(\d{1,3}(?:[\.\s]\d{3})+(?:,\d{1,2})?|\d+(?:,\d{1,2})?)\s*(?:k\s*)?(?:ã˜|eur|euro|kã˜|k\b)?/gi;
  let m;
  while((m=re.exec(src))){
    const token=m[0];
    if(!/(ã˜|eur|euro|k\b|kã˜|\.|,|\d{4,})/i.test(token))continue;
    const n=normalizeEuroNumber(token);
    if(n&&n>=100)out.push({value:n,index:m.index,token});
  }
  return out;
}
function getCustomerBudgetNumbers(accId){
  const raw=getCurrentUserKnowledgeText(accId)+'\n'+getBudgetOfferContextText(accId);
  const nums=[];
  const budgetRe=/(budget|budgetrahmen|budgettopf|budgetgrenze|investitionsrahmen|rahmen|freigabe|verfû¥gbar|verfû¥gbares budget|maximalbudget)/ig;
  let m;
  while((m=budgetRe.exec(raw))){
    const seg=raw.slice(Math.max(0,m.index-90),Math.min(raw.length,m.index+160));
    extractEuroNumbers(seg).forEach(x=>nums.push(x.value));
  }
  // Spezialfall: "50-60k" im Budgetsegment

function applyScoreMatrixConsistencyPostProcessing(accId,health){
  if(!health)return health;
  const copy={...health};
  if(copy.isKo)return copy;

  const authority=hasConfirmedFullDecisionAuthority(accId)||hasAuthoritySignalInHealth(copy);
  const budget=hasConfirmedBudgetSignal(accId,copy)||hasBudgetSignalInHealth(copy);
  const offerUnderBudget=hasKnownOfferUnderBudget(accId);
  const quantifiedPain=hasQuantifiedPainSignal(accId,copy);
  const concretePain=hasConcretePainSignal(accId,copy);
  const hardRisk=hasHardVisibleRisk(accId,copy);

  let floor=0;

  // v4.149: Score und Matrix konsistent halten.
  // Wenn die Kernkriterien positiv sind und nur normale Bremsen offen sind,
  // darf der Score nicht wie eine schwache Opportunity wirken.
  if(!hardRisk&&authority&&budget&&concretePain)floor=Math.max(floor,65);
  if(!hardRisk&&authority&&budget&&quantifiedPain)floor=Math.max(floor,68);
  if(!hardRisk&&authority&&budget&&concretePain&&offerUnderBudget)floor=Math.max(floor,68);
  if(!hardRisk&&authority&&budget&&quantifiedPain&&offerUnderBudget)floor=Math.max(floor,70);

  // Rû¥ckwûÊrtskompatibilitûÊt mit alter Angebotsregel.
  if(!hardRisk&&authority&&offerUnderBudget)floor=Math.max(floor,60);
  if(!hardRisk&&authority&&offerUnderBudget&&quantifiedPain)floor=Math.max(floor,68);

  if(floor&&Number(copy.score||0)<floor){
    copy.score=floor;
    copy.label=floor>=70?'Gesund':'Stabil';
    copy.provisional=false;
  }
  return copy;
}

function isExplicitNonActionImplication(q){

  return /^[\sãÂ\-]*i\s*[:\-ã]/i.test(String(q||'')) && /\b(wenn|falls)\b/.test(s) && /(nicht\s+(lûÑst|gelûÑst|angeht|verûÊndert|macht|adressiert|klûÊrt)|nichts\s+(ûÊndert|verûÊndert|passiert|macht)|unverûÊndert\s+bleibt|so\s+bleibt|zustand\s+bleibt|weiterhin)/i.test(s);
}
function buildExplicitNonActionQuestion(accId){
  const raw=(getCurrentUserKnowledgeText(accId)||'').toLowerCase();
  // v4.155: Forecast-Fragen nur, wenn der eigene Angebotskontext Forecast/Opportunity/Pipeline trûÊgt
  // oder der Kunde Forecast explizit problematisiert. Dann reichen kleine Qualifizierungs-/Pipeline-Anker.
  if(isForecastValueLeverAllowed(accId)&&/forecast|pipeline|opportunit|discovery|qualifizier|crm|hubspot|deal|abschlussquote|nachqualifiz|health/i.test(raw))return 'I: Was passiert mit Forecast, Pipeline-QualitûÊt und Managemententscheidungen, wenn ihr dieses Problem in den nûÊchsten 6 Monaten nicht lûÑst?';
  return 'I: Was passiert in den nûÊchsten 6 Monaten, wenn ihr dieses Problem nicht lûÑst und der heutige Zustand bleibt?';
}
function ensureExplicitNonActionImplicationLines(lines,accId){
  let out=(lines||[]).map(x=>String(x||'').trim()).filter(Boolean);
  const raw=(getCurrentUserKnowledgeText(accId)||'').toLowerCase();
  const forecastAnchor=isForecastValueLeverAllowed(accId)&&/forecast|pipeline|opportunit|discovery|qualifizier|crm|hubspot|deal|abschlussquote|nachqualifiz|health/i.test(raw);
  const hasExplicit=out.some(isExplicitNonActionImplication);
  const hasForecast=out.some(l=>/forecast|pipeline|opportunit|managemententscheid|ressourcenplanung/i.test(l));
  if(hasExplicit && (!forecastAnchor || hasForecast))return out;
  const idx=out.findIndex(l=>/^[\sãÂ\-]*i\s*[:\-ã]/i.test(l));
  const required=buildExplicitNonActionQuestion(accId);
  if(idx>=0)out.splice(idx+1,0,required); else out.push(required);
  return out;
}
function questionCockpitRank(q){
  const s=String(q||'').toLowerCase();
  // v4.150: Fragen im Cockpit nach Vertriebswirkung sortieren, nicht nach technischer Reihenfolge.
  if(/(nicht\s+(lûÑst|gelûÑst|angeht|verûÊndert|macht|adressiert|klûÊrt)|nichts\s+(ûÊndert|verûÊndert|passiert|macht)|ungelûÑst\s+bleib|unverûÊndert\s+bleibt|so\s+bleibt|zustand\s+bleibt|wenn\s+weiterhin)/i.test(q))return 10;
  if(/(kosten|umsatz|geld|zeit|schaden|jahres|monat|quote|vermeidungsquote|abschlussquote|forecast|pipeline|vertriebszeit|nachqualifizierung|reparatur)/i.test(q))return 20;
  if(/(was\s+wû¥rde|was\s+wûÊre|verbessern|ûÊndern|profitieren|erreichen|entlast|nutzen|wert|zielbild|wenn.*gelûÑst|lûÑsen\s+wû¥rde)/i.test(q))return 30;
  if(/(discovery|qualifizier|informationen|notizen|crm|hubspot|e-mails|emails)/i.test(q))return 40;
  if(/(integration|aufwand|setup|einbauen|technisch|implementier|trainer|hubspot)/i.test(q))return 90;
  return 60;
}
function prioritizeCockpitQuestions(qs){
  const arr=(qs||[]).filter(Boolean);
  return arr
    .map((q,i)=>({q,i,r:questionCockpitRank(q)}))
    .sort((a,b)=>(a.r-b.r)||(a.i-b.i))
    .map(x=>x.q);
}
function prioritizeNonActionQuestions(qs){
  // AbwûÊrtskompatibilitûÊt: alter Name bleibt bestehen, nutzt aber jetzt die vollstûÊndige Cockpit-Priorisierung.
  return prioritizeCockpitQuestions(qs);
}

function extractQuestionsFromText(text){
  const out=[];
  const lines=String(text||'').split('\n');
  for(const line of lines){
    const t=line.trim();
    if(/^(?:ãÂ\s*)?[SPIN]\s*[:\-ã]/i.test(t)||t.includes('?')){
      let q=normalizeQuestionText(t,false);
      if(q.length>8&&q.includes('?')&&!/^(KLûREN|BESTûTIGT|ANNAHME|DETAILS|EINSCHûTZUNG|SCHMERZ|VERTRIEBSNOTIZEN|NûCHSTER SCHRITT)/i.test(q))out.push(q);
    }
  }
  return [...new Set(out)];
}
function getDashboardQuestions(accId,maxItems,forPreview){
  const sources=[];
  const p2=LS.get('ki21_st_'+accId+'_1',{});
  if(p2&&p2.fv&&p2.fv.spin)sources.push(p2.fv.spin);
  if(p2&&p2.result)sources.push(p2.result);
  const p1=LS.get('ki21_st_'+accId+'_0',{});
  if(p1&&p1.result2)sources.push(p1.result2);
  if(p1&&p1.result)sources.push(p1.result);
  let qs=[];
  // v4.150: Alle verfû¥gbaren Quellen zusammenfû¥hren. Nicht nach der ersten Quelle abbrechen,
  // sonst kûÑnnen stûÊrkere I-/N-Fragen durch technische oder ûÊltere Fragen verdrûÊngt werden.
  for(const src of sources){
    qs=qs.concat(extractQuestionsFromText(src));
  }
  qs=qs.map(q=>normalizeQuestionText(q,!!forPreview)).filter(Boolean);
  qs=[...new Set(qs)];
  qs=prioritizeCockpitQuestions(qs);
  return qs.slice(0,maxItems||3);
}

// aus offenen Punkten und bestûÊtigten Lû¥cken abgeleitet. Das ist Anzeige-Logik, kein neuer KI-Score.
function shortUniqueList(items,maxItems){
  const seen=new Set();
  const out=[];
  (items||[]).forEach(item=>{
    const text=String(item&&item.text?item.text:item||'').replace(/ã Strategie:.*/,'').trim();
    if(!text)return;
    const key=text.toLowerCase().replace(/[.,;:!?]/g,'');
    if(seen.has(key))return;
    seen.add(key);
    out.push(text);
  });
  return out.slice(0,maxItems||3);
}
function hasTextInList(list,pattern){
  return (list||[]).some(t=>pattern.test(String(t||'')));
}

function hasExplicitContractProcessSignal(accId,health){
  const raw=(getCurrentUserKnowledgeText(accId)+'\n'+JSON.stringify(health||{})).toLowerCase();
  return /(vertragsprozess|vertrag|bestellprozess|bestellung|einkauf|procurement|legal|rechtsabteilung|papierprozess|formal(?:e|er|itûÊten)|purchase order|po).{0,80}(offen|klûÊren|unklar|blockiert|notwendig|ausstehend|zustûÊndig|prozess)|(?:offen|klûÊren|unklar|blockiert|notwendig|ausstehend|zustûÊndig|prozess).{0,80}(vertragsprozess|vertrag|bestellprozess|bestellung|einkauf|procurement|legal|rechtsabteilung|papierprozess|formal(?:e|er|itûÊten)|purchase order|po)/i.test(raw);
