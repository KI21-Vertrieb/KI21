<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="dark">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KI21</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;
  --border:#30363d;--text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --fs-input:12px;
}
body.light{
  --bg:#f6f8fa;--bg2:#ffffff;--bg3:#f0f2f5;
  --border:#d0d7de;--text:#1f2328;--text2:#656d76;--text3:#9198a1;
}
html,body{background:var(--bg);color:var(--text);min-height:100vh;font-family:'DM Sans',sans-serif;}
#app{min-height:100vh;background:var(--bg);}
.nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 14px;height:44px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-brand{font-size:16px;font-weight:800;color:var(--text);cursor:pointer;border:none;background:transparent;font-family:'DM Sans',sans-serif;}
.nav-right{display:flex;gap:5px;align-items:center;}
.subnav{background:var(--bg);border-bottom:1px solid var(--border);padding:6px 14px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;}
.subnav-badge{background:rgba(255,107,0,.15);color:#ff6b00;border-radius:50%;
  width:18px;height:18px;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;flex-shrink:0;}
.subnav-text{font-size:11px;color:var(--text2);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.settings-group-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--text3);margin-bottom:2px;}
.phase-badge{font-size:9px;font-weight:700;border-radius:4px;padding:2px 6px;white-space:nowrap;flex-shrink:0;cursor:pointer;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
.phase-badge-done{background:rgba(46,160,67,.15);color:#2ea043;}
.phase-badge-progress{background:rgba(255,107,0,.15);color:#ff6b00;}
.phase-badge-empty{background:rgba(139,148,158,.1);color:var(--text3);}
.btn{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:5px;
  padding:4px 8px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-o{background:#ff6b00;border:none;color:#fff;border-radius:8px;padding:7px 12px;
  font-size:10.5px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;}
.btn-o:disabled{background:#484f58;cursor:not-allowed;}
.cust-btn{background:rgba(255,107,0,.12);border:1px solid rgba(255,107,0,.3);border-radius:5px;
  padding:3px 8px;cursor:pointer;}
.cust-label{font-size:8px;color:#8b949e;text-transform:uppercase;letter-spacing:1px;line-height:1.3;}
.cust-val{font-size:11px;font-weight:700;color:#ff6b00;line-height:1.3;max-width:180px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.wrap{padding:12px 14px;max-width:500px;margin:0 auto;}
.hero{display:flex;align-items:baseline;flex-wrap:wrap;gap:6px;margin:10px 0 16px;}
.hero-a{font-weight:800;font-size:20px;color:var(--text);}
.hero-b{font-family:'DM Serif Display',serif;font-size:20px;color:#ff6b00;}
.sit-row{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;padding:11px 12px;margin-bottom:5px;cursor:pointer;transition:border-color .15s;}
.sit-row:hover{border-color:#ff6b00;}
.sit-icon{font-size:20px;width:28px;text-align:center;flex-shrink:0;}
.sit-phase{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:1px;}
.sit-title{font-size:13px;font-weight:700;color:var(--text);}
.sit-arrow{color:var(--text3);font-size:16px;}
.tagline{margin-top:14px;text-align:center;font-size:11px;color:var(--text3);}

/* Home Premium Redesign (v4.76) βÄî pixelnahe Umsetzung der neuen Designreferenz, NUR Hero-Card.
   Reine Darstellung: Werte aus bereits existierenden Funktionen/Daten
   (getOpportunityHealth, cust.branche/ma/um/ap, getPhaseStatus). Keine neue Business-Logik.
   Platzhalter ("βÄ™") fΟΦr Felder ohne Datenmodell-Entsprechung (Erwarteter Abschluss, Potenzial, Verantwortlich). */
.home-greeting{font-size:12.5px;font-weight:600;color:var(--text2);margin:8px 0 8px;}
.home-hero{background:var(--bg2);border:1px solid var(--border);border-radius:13px;
  padding:11px;margin-bottom:10px;}
.home-hero-body{display:flex;flex-direction:column;gap:8px;}
.home-hero-colL{min-width:0;}
.home-hero-colR{min-width:0;display:flex;flex-direction:column;align-items:stretch;}
.home-hero-label{font-size:8.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  color:var(--text3);margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.home-info-dot{color:var(--text3);font-size:9px;cursor:default;}
.home-hero-id{display:flex;align-items:flex-start;gap:8px;cursor:pointer;}
.home-hero-icon{width:30px;height:30px;border-radius:7px;background:var(--bg3);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;}
.home-hero-firma{font-size:15px;font-weight:800;color:var(--text);overflow-wrap:break-word;word-break:break-word;letter-spacing:-.2px;}
.home-hero-firma.placeholder{color:var(--text2);font-weight:600;font-size:12px;}
.home-hero-meta{font-size:9.5px;color:var(--text2);margin-top:2px;line-height:1.45;}
.home-hero-tag{display:inline-block;margin-top:4px;font-size:8px;font-weight:700;
  background:rgba(255,107,0,.14);color:#ff6b00;border-radius:5px;padding:2px 6px;}
.home-fact-list{margin-top:7px;border-top:1px solid var(--border);padding-top:6px;}
.home-fact-row{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:2.5px 0;font-size:9.5px;}
.home-fact-label{display:flex;align-items:center;gap:6px;color:var(--text2);}
.home-fact-icon{font-size:9.5px;width:12px;text-align:center;flex-shrink:0;opacity:.8;}
.home-fact-val{color:var(--text);font-weight:700;}
.home-health-bar-wrap{width:100%;}
.home-health-bar-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:5px;}
.home-health-score{font-size:15px;font-weight:800;line-height:1;color:var(--text);}
.home-health-score-unit{font-size:9px;font-weight:700;color:var(--text2);margin-left:2px;}
.home-health-track{width:100%;height:6px;border-radius:4px;background:var(--bg3);overflow:hidden;}
.home-health-fill{height:100%;border-radius:4px;}
.home-health-label{font-size:10px;font-weight:800;margin-top:5px;}
.home-health-sub{font-size:8.5px;color:var(--text2);margin-top:1px;}
.home-next-step{border-top:1px solid var(--border);margin-top:8px;padding-top:8px;}
.home-next-step-top{display:flex;align-items:flex-start;gap:8px;}
.home-next-icon{width:24px;height:24px;border-radius:50%;background:rgba(255,107,0,.12);
  display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.home-next-eyebrow{font-size:8.5px;color:var(--text3);}
.home-next-title2{font-size:11.5px;font-weight:800;color:var(--text);margin-top:1px;}
.home-next-desc2{font-size:9px;color:var(--text2);margin-top:2px;line-height:1.3;}
.home-next-cta-col{display:flex;flex-direction:column;align-items:stretch;gap:4px;
  margin-top:8px;}
.home-next-cta-btn{background:#ff6b00;border:none;color:#fff;border-radius:7px;padding:6px 12px;
  font-size:10.5px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;width:100%;}
.home-next-cta-btn:hover{background:#e25f00;}
.home-next-link{background:none;border:none;color:#ff6b00;font-size:9.5px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center;width:100%;}
/* Ab ~480px (Tablet/Desktop-Breite, wie in der Designreferenz): CTA-Spalte rΟΦckt neben den
   Text statt darunter. Unter dieser Breite (reales iPhone) bleibt es gestapelt, da dort fΟΦr
   3 Spalten nebeneinander nicht genug Platz ist (siehe vorheriger Umbruch-Bug). */
@media (min-width:480px){
  .home-next-step{display:flex;align-items:flex-start;gap:16px;}
  .home-next-step-top{flex:1;min-width:0;}
  .home-next-cta-col{flex-shrink:0;margin-top:0;min-width:150px;}
}

.home-section-label{font-size:8.5px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;
  color:var(--text3);margin:2px 0 6px;}
/* Cockpit Hauptscreen (v4.121) */
.cockpit-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 8px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;}
.cockpit-header-left{display:flex;flex-direction:column;min-width:0;flex:1;}
.cockpit-brand{font-size:11px;font-weight:800;color:var(--text3);letter-spacing:.5px;margin-bottom:1px;}
.cockpit-brand span{color:#ff6b00;}
.cockpit-opp-name{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px;}
.cockpit-opp-placeholder{font-size:14px;color:var(--text3);font-weight:400;}
.cockpit-header-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.cockpit-score-badge{font-size:12px;font-weight:800;padding:4px 10px;border-radius:20px;border:1.5px solid;cursor:pointer;white-space:nowrap;}
.cockpit-next-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.cockpit-next-eyebrow{font-size:9.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.cockpit-next-text{font-size:13px;font-weight:600;color:var(--text);line-height:1.5;margin-bottom:14px;}
.cockpit-next-placeholder{font-size:13px;color:var(--text3);font-style:italic;margin-bottom:14px;}
.cockpit-btn-row{display:flex;gap:8px;}
.cockpit-btn-primary{flex:1;background:#ff6b00;color:#fff;border:none;border-radius:10px;padding:11px 14px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
.cockpit-btn-secondary{background:transparent;color:#ff6b00;border:1.5px solid rgba(255,107,0,.4);border-radius:10px;padding:11px 14px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;}
.cockpit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.cockpit-tile{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;min-height:100px;}
.cockpit-tile-label{font-size:9.5px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.cockpit-tile-item{font-size:12px;color:var(--text);line-height:1.4;margin-bottom:5px;padding-left:14px;position:relative;}
.cockpit-tile-item:last-child{margin-bottom:0;}
.cockpit-tile-item::before{content:'¬Ζ';position:absolute;left:2px;color:var(--text3);}
.cockpit-tile-item.risk{color:#e6edf3;}
.cockpit-tile-item.chance{color:#e6edf3;}
.cockpit-tile-more{font-size:11px;color:var(--text3);margin-top:6px;}
.cockpit-tile-empty{font-size:12px;color:var(--text3);font-style:italic;}
.cockpit-phase-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.cockpit-phase-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:13px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent;min-height:48px;}
.cockpit-phase-row.active-phase{border-color:rgba(255,107,0,.5);}
.cockpit-phase-name{font-size:13px;font-weight:700;color:var(--text);}
.cockpit-phase-num{font-size:11px;font-weight:700;width:22px;height:22px;border-radius:6px;background:var(--bg3);color:var(--text3);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cockpit-phase-num.done{background:rgba(46,160,67,.15);color:#2ea043;}
.cockpit-phase-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.cockpit-phase-status.done{color:#2ea043;background:rgba(46,160,67,.12);border:1px solid rgba(46,160,67,.25);}
.cockpit-phase-status.progress{color:#ff6b00;background:rgba(255,107,0,.12);border:1px solid rgba(255,107,0,.25);}
.cockpit-phase-status.empty{color:var(--text3);}

/* v4.137: Budgetrahmen, KI21-Angebotspreis und Entscheiderbefugnis werden deterministisch im Cockpit getrennt */
.cockpit-tile-item.is-actionable{cursor:pointer;border-radius:6px;padding-top:2px;padding-bottom:2px;padding-right:4px;transition:background .12s,border-color .12s;}
.cockpit-tile-item.is-actionable:active{background:rgba(255,107,0,.10);}
.cockpit-tile-item.is-actionable::after{content:'βÄΚ';position:absolute;right:1px;color:var(--text3);font-weight:800;opacity:.75;}
.cockpit-focus-banner{background:rgba(255,107,0,.10);border:1px solid rgba(255,107,0,.35);border-left:3px solid #ff6b00;border-radius:11px;padding:9px 10px;margin-bottom:10px;}
.cockpit-focus-kicker{font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.9px;color:#ff6b00;margin-bottom:3px;}
.cockpit-focus-text{font-size:11.5px;font-weight:700;color:var(--text);line-height:1.35;}
.cockpit-focus-hint{font-size:10px;color:var(--text2);line-height:1.35;margin-top:4px;}
.bs-row.clickable{cursor:pointer;border-radius:8px;}
.bs-row.clickable:active{background:rgba(255,107,0,.08);}
.bs-row.clickable .bs-row-arrow{margin-left:auto;color:#ff6b00;font-weight:800;opacity:.8;}

/* Bottom Sheet */
.bs-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;opacity:0;transition:opacity .22s;}
.bs-overlay.visible{opacity:1;}
.bs-panel{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-radius:20px 20px 0 0;z-index:201;max-height:82vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s cubic-bezier(.32,1.01,.4,1);}
.bs-panel.visible{transform:translateY(0);}
.bs-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
.bs-head{padding:16px 18px 10px;border-bottom:1px solid var(--border);}
.bs-title{font-size:13px;font-weight:800;color:var(--text);letter-spacing:-.2px;}
.bs-body{padding:10px 18px 32px;}
.bs-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-top:1px solid var(--border);font-size:13px;color:var(--text);line-height:1.45;}
.bs-row:first-child{border-top:none;}
.bs-row .bs-glyph{flex-shrink:0;width:20px;text-align:center;margin-top:1px;}
.bs-row.bs-priority{background:rgba(255,107,0,.07);border:1px solid rgba(255,107,0,.22);border-radius:12px;padding:9px 10px;margin:7px 0;}
.bs-row.bs-priority:first-child{border-top:1px solid rgba(255,107,0,.22);}
.bs-row.bs-priority + .bs-row.bs-priority{border-top:1px solid rgba(255,107,0,.22);}
.bs-row.bs-priority .bs-glyph{background:#ff6b00;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;margin-top:0;}
.bs-panel.questions-sheet .bs-body{padding:8px 14px 30px;}
.bs-panel.questions-sheet .bs-row:not(.bs-priority){font-size:12px;line-height:1.35;padding:8px 0;color:var(--text2);}
.bs-panel.questions-sheet .bs-row:not(.bs-priority) .bs-glyph{font-size:10px;color:var(--text3);}
.bs-priority-caption{font-size:8.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#ff6b00;margin-bottom:3px;}
.bs-separator{height:1px;background:var(--border);margin:8px 0 2px;opacity:.7;}
.bs-empty{font-size:13px;color:var(--text3);font-style:italic;padding:14px 0;}
.home-station-row{display:flex;align-items:center;gap:9px;background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:7px 9px;margin-bottom:5px;cursor:pointer;transition:border-color .15s;}
.home-station-row:hover{border-color:#ff6b00;}
.home-icon-tile{width:26px;height:26px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.home-icon-tile.is-done{background:rgba(46,160,67,.12);border-color:rgba(46,160,67,.3);}
.home-icon-tile.is-progress{background:rgba(255,107,0,.12);border-color:rgba(255,107,0,.3);}
.home-station-sub2{font-size:9px;color:var(--text2);margin-top:0;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;}
.home-status-pill{display:inline-flex;align-items:center;gap:4px;font-size:8px;font-weight:700;
  border-radius:20px;padding:2.5px 7px;white-space:nowrap;flex-shrink:0;}
.home-status-pill.done{background:rgba(46,160,67,.12);color:#2ea043;}
.home-status-pill.progress{background:rgba(255,107,0,.12);color:#ff6b00;}
.home-status-pill.empty{background:rgba(139,148,158,.1);color:var(--text2);}
.home-strategy-title{font-size:16px;font-weight:800;color:var(--text);margin:12px 0 1px;
  letter-spacing:-.2px;}
.home-strategy-sub{font-size:9.5px;color:var(--text2);margin-bottom:8px;}
.home-station-num{width:15px;height:15px;border-radius:50%;background:var(--bg3);
  border:1px solid var(--border);color:var(--text2);font-size:8px;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.home-station-num.is-done{background:rgba(46,160,67,.18);border-color:rgba(46,160,67,.4);color:#2ea043;}
.home-station-num.is-progress{background:rgba(255,107,0,.18);border-color:rgba(255,107,0,.4);color:#ff6b00;}
.home-station-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.home-progress-row{display:flex;align-items:center;gap:5px;}
.home-progress-track{width:36px;height:3.5px;border-radius:3px;background:var(--bg3);overflow:hidden;}
.home-progress-fill{height:100%;border-radius:3px;}
.home-progress-fill.done{background:#2ea043;}
.home-progress-fill.progress{background:#ff6b00;}
.home-progress-pct{font-size:8px;color:var(--text2);font-weight:700;min-width:20px;text-align:right;}
.home-station-title{font-size:11.5px;font-weight:700;color:var(--text);}
.home-insights-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;
  padding:10px;}
.home-insight-row{display:flex;align-items:flex-start;gap:7px;padding:4px 0;font-size:11px;
  color:var(--text);line-height:1.35;}
.home-insight-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.home-insight-dot.positive{background:#2ea043;}
.home-insight-dot.warning{background:#f85149;}
.home-insight-dot.open{background:var(--text3);}
.home-empty-note{font-size:10.5px;color:var(--text3);padding:2px 0;}
.home-station-sub{font-size:11.5px;color:var(--text2);margin-top:2px;}
/* Executive Briefing components (sitId===1 only) */
.exec-grid{display:flex;gap:9px;margin-bottom:10px;flex-wrap:wrap;}
.exec-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px;flex:1;min-width:120px;}
.exec-card-label{font-size:8.5px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:#8b949e;margin-bottom:8px;}
.exec-card-val{font-size:12px;font-weight:400;color:var(--text);line-height:1.5;}
.exec-card-val.accent{color:#ff6b00;font-weight:600;margin-top:4px;}
.exec-card-val.muted{color:var(--text2);font-weight:400;}
.exec-divider{display:flex;align-items:center;gap:10px;margin:20px 0 14px;}
.exec-divider-line{flex:1;height:1px;background:var(--border);}
.exec-divider-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);white-space:nowrap;}
.exec-fact-row{display:flex;align-items:flex-start;gap:8px;padding:5px 0;font-size:11.5px;font-weight:400;color:var(--text);border-top:1px solid var(--border);}

};

// βîÄβîÄ UNIVERSELLE KOPIER-FUNKTION mit garantiertem Fallback βîÄβîÄ
// Manche Browser (z.B. Brave) blockieren navigator.clipboard / execCommand lautlos, ohne Fehler oder Berechtigungsabfrage.
// Fallback: ΟΕffnet ein vorselektiertes Textfeld, damit der Nutzer per Long-Press βÜ£ Kopieren manuell kopieren kann (funktioniert immer).
function universalCopy(text, onSuccess){
  let succeeded=false;
  const markSuccess=()=>{succeeded=true; if(onSuccess)onSuccess();};
  const tryExecCommand=()=>{
    try{
      const ta=document.createElement('textarea');
      ta.value=text;ta.style.position='fixed';ta.style.opacity='0';ta.style.top='0';
      document.body.appendChild(ta);ta.focus();ta.select();
      const ok=document.execCommand('copy');
      document.body.removeChild(ta);
      return ok;
    }catch(e){return false;}
  };
  const showManualFallback=()=>{
    const overlay=document.createElement('div');
    overlay.style.cssText='position:fixed;inset:0;background:rgba(13,17,23,.97);z-index:1000;display:flex;flex-direction:column;padding:20px;';
    overlay.appendChild(h('div',{style:{color:'#ff6b00',fontWeight:'700',marginBottom:'10px',fontSize:'13px'}},
      'πü™΄ Automatisches Kopieren wird von diesem Browser blockiert. Tippe lange auf den Text unten und wΟΛhle "Alles auswΟΛhlen" βÜ£ "Kopieren".'));
    const ta=h('textarea',{readonly:true,style:{flex:'1',width:'100%',background:'#1c2333',
      border:'1px solid #30363d',borderRadius:'6px',padding:'12px',fontSize:'13px',
      color:'#e6edf3',outline:'none',resize:'none',lineHeight:'1.7'}});
    ta.value=text;
    overlay.appendChild(ta);
    const closeBtn=h('button',{className:'btn-o',style:{marginTop:'12px'},onclick:()=>overlay.remove()},'SchlieΟüen');
    overlay.appendChild(closeBtn);
    document.body.appendChild(overlay);
    setTimeout(()=>{ta.focus();ta.select();},100);
  };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>{
      // Manche Browser (Brave) lΟΕsen .then() aus, OHNE wirklich zu kopieren - daher zusΟΛtzlich execCommand als BestΟΛtigung versuchen
      if(tryExecCommand()){markSuccess();}else{markSuccess();} // clipboard.then() galt als Erfolg, vertrauen
    }).catch(()=>{
      if(tryExecCommand()){markSuccess();}else{showManualFallback();}
    });
  } else if(tryExecCommand()){
    markSuccess();
  } else {
    showManualFallback();
  }
}

// βîÄβîÄ PDF EXPORT HELPER (echte PDF-Erzeugung, kein HTML-Download) βîÄβîÄ
let _html2pdfPromise=null;
function loadHtml2Pdf(){
  if(window.html2pdf)return Promise.resolve();
  if(_html2pdfPromise)return _html2pdfPromise;
  _html2pdfPromise=new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
    s.onload=()=>resolve();
    s.onerror=()=>reject(new Error('html2pdf konnte nicht geladen werden'));
    document.head.appendChild(s);
  });
  return _html2pdfPromise;
}
function exportHtmlAsPdf(html,filename){
  loadHtml2Pdf().then(()=>{
    const el=document.createElement('div');
    el.innerHTML=html;
    document.body.appendChild(el);
    window.html2pdf().from(el).set({
      margin:10,
      filename:filename,
      html2canvas:{scale:2,useCORS:true},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
      pagebreak:{mode:['css','legacy']}
    }).save().then(()=>{document.body.removeChild(el);});
  }).catch(e=>{
    alert('PDF-Erzeugung fehlgeschlagen: '+e.message+'\nBitte Internetverbindung prΟΦfen.');
  });
}

function shareAsPdf(title,text,cust,filename,fallbackText){
  loadHtml2Pdf().then(()=>{
    const html=buildSimplePdfHtml(title,text,cust);
    const el=document.createElement('div');
    el.innerHTML=html;
    document.body.appendChild(el);
    window.html2pdf().from(el).set({
      margin:10,
      html2canvas:{scale:2,useCORS:true},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
      pagebreak:{mode:['css','legacy']}
    }).outputPdf('blob').then(blob=>{
      document.body.removeChild(el);
      const file=new File([blob],filename,{type:'application/pdf'});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:title}).catch(()=>{});
      } else if(navigator.share){
        navigator.share({title:'KI21 βÄ™ '+title,text:fallbackText||text});
      } else {
        // Fallback: PDF direkt herunterladen
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url;a.download=filename;a.click();
        setTimeout(()=>URL.revokeObjectURL(url),1000);
      }
    });
  }).catch(()=>{
    if(navigator.share)navigator.share({title:'KI21 βÄ™ '+title,text:fallbackText||text});
  });
}

    s+='KRITISCH: Lege den Fokus stΟΛrker auf Discovery als auf Fakten-Suggestion. Formuliere mehr offene, gezielte RΟΦckfragen statt viele konkrete Zahlen zu prΟΛsentieren, die noch nicht belastbar sind βÄ™ das Ziel ist GesprΟΛchsvorbereitung, nicht eine scheinbar fertige Analyse.\n';
    s+='Wenn Informationen fehlen: leite aus Branche und Situation plausible Hypothesen ab, kennzeichne sie eindeutig als BRANCHENHYPOTHESE, und leite daraus gezielte RΟΦckfragen ab. Das Ziel ist ein hochwertiges Arbeitsdokument fΟΦr den Vertrieb, nicht absolute Gewissheit.\n';
    s+='Beginne den Output mit: "πüîç OPPORTUNITY-VORSCHAU βÄ™ Dies ist ein erster Ο€berblick, keine vollstΟΛndige Analyse. Die Vorschau kombiniert bestΟΛtigte Fakten, Branchenwissen und plausible Arbeitshypothesen, um typische Herausforderungen zu antizipieren und erste GesprΟΛchs-Hypothesen zu entwickeln. Sie ersetzt nicht die Qualifizierung, das KundengesprΟΛch oder die Validierung von Annahmen im vollstΟΛndigen KI21-Prozess."\n';
    s+='Direkt danach, vor dem eigentlichen Inhalt, schΟΛtze grob ein (keine exakte Berechnung nΟΕtig, nur Orientierung): "BestΟΛtigte Informationen: XX % | Arbeitshypothesen/Branchenwissen: XX % | Noch zu validierende Punkte: XX %" (die drei Werte sollten sich ungefΟΛhr zu 100% aufsummieren).\n';
  }
  s+='SCHREIBSTIL: Schreibe wie ein erfahrener deutscher Vertriebsleiter mit 30 Jahren Praxis. Verwende klare, natΟΦrliche Sprache. Vermeide Marketingfloskeln, Beraterjargon, unnΟΕtige Anglizismen und ΟΦbertriebene Superlative. Jede Aussage soll so formuliert sein, dass sie in einem echten KundengesprΟΛch glaubwΟΦrdig verwendet werden kann. Bevor du die Antwort ausgibst, lies sie gedanklich noch einmal durch und ersetze jede Formulierung, die kΟΦnstlich, gestelzt oder nach KI klingt, durch einfaches, idiomatisches Deutsch βÄ™ ohne den Inhalt zu verΟΛndern.\n';
  s+='KRITISCH βÄ™ NEUES VERDICHTUNGSZIEL: 50% weniger Worte, 100% der Aussage. Jede Aussage so kurz wie mΟΕglich. FΟΦllwΟΕrter konsequent entfernen. Keine Wiederholungen zwischen den Abschnitten. KEIN Einleitungssatz, wenn die Ο€berschrift die Aussage bereits trΟΛgt. Aktiv statt Passiv. Konkrete Formulierungen statt abstrakter Beschreibungen. Maximal 2 Zeilen pro Bullet. Beispiel: NICHT "Der wirtschaftliche Fall hΟΛngt entscheidend davon ab...", SONDERN "Zeitersparnis allein verkauft das Projekt nicht. Entscheidend ist der wirtschaftliche Schaden der LieferfΟΛhigkeitsfehler." Wenn eine Aussage ohne Informationsverlust gekΟΦrzt werden kann, ist IMMER die kΟΦrzere Variante zu wΟΛhlen.\n';
  s+='KRITISCH βÄ™ PHASENDISZIPLIN: Fokus bedeutet, sich auf etwas zu konzentrieren. Disziplin bedeutet, konsequent alles wegzulassen, was nicht zur Aufgabe dieser Phase gehΟΕrt. Die zentralen Analysephasen (Qualifizierung, Bedarfsanalyse, Demo, Nutzen-Kosten-Analyse, Angebot & Abschluss) besitzen jeweils eine definierte KERNFRAGE (siehe oben am Anfang dieses Prompts, falls dort benannt) βÄ™ jede Aussage muss dieser Kernfrage dienen. Alle ΟΦbrigen Phasen (z.B. Terminnachbereitung) folgen derselben Phasendisziplin ohne eigene benannte Kernfrage: Jeder Abschnitt erfΟΦllt genau einen Zweck und liefert einen eigenstΟΛndigen Mehrwert fΟΦr genau diese Phase. PrΟΦfe in JEDER Phase JEDE Aussage anhand dieser drei Fragen, bevor du sie aufnimmst: (1) Beantwortet diese Information die Aufgabe dieser Phase? (2) Liefert sie einen neuen Mehrwert gegenΟΦber den vorherigen Phasen? (3) WΟΦrde der Leser etwas verlieren, wenn dieser Satz entfernt wΟΦrde? Kann eine Frage mit Nein beantwortet werden, wird die Aussage entfernt oder deutlich gekΟΦrzt.\n';
  s+='KRITISCH βÄ™ JEDE PHASE BEGINNT DORT, WO DIE VORHERIGE ENDET: Die Phasen sollen sich wie ein roter Faden lesen, nicht wie fΟΦnf unabhΟΛngige Berichte. Diese Phase ΟΦbernimmt den aktuellen Wissensstand aus "BISHERIGE ERGEBNISSE" (falls vorhanden) und entwickelt ihn WEITER βÄ™ sie erklΟΛrt NICHT erneut, was die vorherige Phase bereits bewertet hat. ZusΟΛtzliche PrΟΦffrage vor jedem Abschnitt: "Baut dieser Abschnitt auf der vorherigen Phase auf, oder erklΟΛrt er sie nur erneut?" Wenn ein Abschnitt die vorherige Phase lediglich wiederholt, statt sie weiterzuentwickeln, muss der Inhalt gekΟΦrzt oder entfernt werden. Der Leser soll beim Phasenwechsel denken "Jetzt geht der Prozess einen Schritt weiter" βÄ™ nicht "Das habe ich gerade schon gelesen".\n';
  s+='Eine Erkenntnis darf in mehreren Phasen erscheinen, wenn sie dort einen ANDEREN Zweck erfΟΦllt. Beispiel: Qualifizierung βÄ™ "Der GeschΟΛftsfΟΦhrer ist noch nicht eingebunden" (Bewertung der Opportunity). Bedarfsanalyse βÄ™ "Den GeschΟΛftsfΟΦhrer nach wirtschaftlichem Schaden und Erfolgskriterien fragen" (GesprΟΛchsstrategie). Nutzen-Kosten-Analyse βÄ™ "Ohne BestΟΛtigung des GeschΟΛftsfΟΦhrers bleibt der Business Case nicht belastbar" (wirtschaftliche Bewertung). Diese Wiederholung ist ausdrΟΦcklich gewΟΦnscht. NICHT zulΟΛssig ist dieselbe Aussage mit derselben Aussageabsicht in mehreren Phasen. Ziel ist nicht die kΟΦrzeste Einzelphase, sondern das kΟΦrzeste Gesamtdossier bei gleichem Informationsgehalt βÄ™ jede Phase muss einen klar erkennbaren Mehrwert liefern.\n';
  s+='KRITISCH βÄ™ DER 60-SEKUNDEN-TEST: Wenn ein Vertriebsleiter zwischen zwei Kundenterminen nur 60 Sekunden Zeit hat, muss er nach dem Lesen genau wissen: Wie gut steht die Opportunity? Warum? Was fehlt? Was ist der nΟΛchste Schritt? Jeder Abschnitt muss diesen Test bestehen.\n';
  s+='KRITISCH βÄ™ KONKRETE BERATERSPRACHE-VERBOTSLISTE: Vermeide diese und ΟΛhnliche Begriffe konsequent: "Data Governance Sponsor", "Ownership-Struktur", "Steering Committee", "Reporting-Architektur", "Stakeholder-Alignment", "Synergiepotenzial", "Sunk Cost", "Data Governance", "Planning Governance", "Modernisierungskomponente". Ersetze sie durch die direkte, vertriebliche Frage dahinter: statt "Ownership-Struktur klΟΛren" schreibe "Wer entscheidet?"; statt "Stakeholder-Alignment" schreibe "Wer blockiert? Wer profitiert?"; statt abstrakter Prozessbegriffe schreibe "Was kostet das?", "Wie oft passiert das?", "Was muss geklΟΛrt werden?". Ein erfahrener Vertriebsleiter denkt in Menschen, Macht und Geld βÄ™ nicht in Beratungsmodellen.\n';
  s+='KRITISCH βÄ™ KEINE FACHBEGRIFFE/PRODUKTNAMEN ERFINDEN, DIE DER KUNDE NICHT GENANNT HAT: Wenn ein technischer Fachbegriff oder Produktname (z.B. ein konkretes Software-Modul wie "SAP Analytics Cloud" oder "Integrated Planning") nicht direkt vom Kunden genannt wurde, darf er NICHT als Kundenerkenntnis erscheinen. Verwende stattdessen die einfache, allgemeine Beschreibung dessen, was der Kunde tatsΟΛchlich gesagt hat (z.B. "ein SAP-Modernisierungsprojekt lΟΛuft" statt "SAP Analytics Cloud und Integrated Planning sind geplant", falls der Kunde keine konkreten Modulnamen genannt hat). Erfundene Fachbegriffe lassen das Ergebnis wie ein Beratungskonzept wirken statt wie eine ehrliche GesprΟΛchsdokumentation βÄ™ das ist unerwΟΦnscht.\n';
  s+='SELBSTTEST VOR JEDER AUSGABE: WΟΦrde ein sehr erfahrener Vertriebsleiter genau so schreiben βÄ™ oder wirkt der Text wie ein Strategieberater, der ein Transformationskonzept entwirft? Im Zweifel: pragmatischer, konkreter, vertriebsorientierter formulieren, nicht als Beratungsdokument.\n';
  s+='KRITISCH: Wenn dieselben Kernfakten (z.B. eine konkrete Zahl wie "6 Arbeitstage pro Szenario") bereits in einem vorherigen Kontext-Abschnitt erwΟΛhnt wurden, wiederhole sie in dieser Phase nur EINMAL ausfΟΦhrlich (meist in den ERKENNTNISSE/BESTΟ³TIGT-Abschnitten) und referenziere sie danach kurz, statt sie in jedem Abschnitt erneut vollstΟΛndig auszuschreiben. Ziel: Wiederholungen ΟΦber die Phasen hinweg reduzieren, ohne wichtige Fakten wegzulassen.\n';
  s+='PFLICHT βÄ™ DREI-STUFEN-SYSTEM FΟ€R JEDE INFORMATION: Bewerte JEDE Information, bevor du sie verwendest, nach genau einer dieser drei Stufen:\n';
  s+='  FAKT (= BESTΟ³TIGT): direkt genannt, eindeutig belegt, aus den Eingaben stammend. Beispiele: "6 Arbeitstage pro Szenario", "3 Spartensysteme", "SAP-Projekt lΟΛuft", "CFO ist Sponsor".\n';
  s+='  INTERPRETATION (= ANNAHME): eine logische, nachvollziehbare Ableitung AUS einem Fakt. Beispiele: "SAP-Projekt erzeugt Zeitdruck", "CIO kΟΕnnte SAP bevorzugen". Interpretationen sind erlaubt und wertvoll βÄ™ aber sie dΟΦrfen NIE wie ein Fakt klingen, sondern mΟΦssen erkennbar als Schlussfolgerung formuliert sein (z.B. mit "kΟΕnnte", "vermutlich", "deutet darauf hin").\n';
  s+='  VERMUTUNG (= KLΟ³REN/ZU VALIDIEREN): eine nicht belegte Aussage ohne Faktengrundlage βÄ™ typischerweise BudgethΟΕhe, ROI, Abschlusswahrscheinlichkeit, SchadenshΟΕhe, Lizenzbedarf, sofern sie nicht explizit genannt wurden. Eine Vermutung darf NIEMALS als Fakt oder als prΟΛzise Zahl erscheinen.\n';
  s+='KRITISCH βÄ™ NIEMALS RECHNEN BEI FEHLENDEN DATEN: Wenn fΟΦr eine Berechnung (ROI, Amortisation, Abschlusswahrscheinlichkeit in %, SchadenshΟΕhe) die nΟΕtigen Fakten fehlen, BERECHNE KEINE Zahl, SCHΟ³TZE KEINE Zahl, ERFINDE KEINE Zahl. Schreibe statt einer Zahl explizit, was fehlt (z.B. "ROI aktuell nicht belastbar berechenbar. Es fehlen: Reporting-Aufwand, Szenario-HΟΛufigkeit, Fehlerkosten."). Eine ehrliche LΟΦcke ist immer besser als eine prΟΛzise wirkende, aber erfundene Zahl.\n';
  s+='KRITISCH βÄ™ KEINE ERFUNDENEN STAKEHOLDER-ERWARTUNGEN: Schreibe NIEMALS eine konkrete Erwartung eines Stakeholders, die nicht genannt wurde (z.B. NICHT "GeschΟΛftsfΟΦhrer erwartet +5-10% Umsatzsteigerung", wenn diese Zahl nirgends im GesprΟΛch gefallen ist). Formuliere stattdessen als offene Frage oder als zu klΟΛrenden Punkt (z.B. "GeschΟΛftsfΟΦhrer muss den wirtschaftlichen Nutzen noch definieren" oder "Welche Kennzahl entscheidet fΟΦr den GeschΟΛftsfΟΦhrer ΟΦber den Projekterfolg?"). Das gilt fΟΦr JEDE Person/Rolle (CEO, CFO, CIO, Einkauf usw.), nicht nur fΟΦr den direkten Ansprechpartner.\n';
  s+='PFLICHT: Die Genauigkeits-Kennzeichnung BESTΟ³TIGT/ANNAHME/KLΟ³REN gilt fΟΦr deine interne Sorgfalt und fΟΦr den Detailbereich (nach ###DETAILS###, falls das Phasenformat das vorsieht) βÄ™ NICHT als PrΟΛfix in der kompakten Standardausgabe. Halte trotzdem in jedem Bullet selbst implizit fest, was Fakt vs. Interpretation vs. Vermutung ist, ohne das Wort explizit hinzuschreiben (z.B. durch Formulierung wie "Kunde nennt..." vs. "kΟΕnnte..." vs. "noch unklar...").\n';
  s+='KRITISCH: Erfinde NIEMALS konkrete Studiennamen, Institute oder prΟΛzise Statistiken (z.B. "laut XY-Studie", "13-26 Wochen laut BARC") die nicht im Abschnitt "KI21 Intelligence" unten stehen. Du hast in dieser Phase KEINEN Websuche-Zugriff. Wenn du eine Marktaussage machen willst, formuliere sie als eigene EinschΟΛtzung ohne erfundene Quellenangabe, oder verweise allgemein auf Erfahrungswerte aus der KI21 Intelligence.\n';
  s+='KRITISCH: Wenn ein Arbeitsaufwand (Personenstunden) 8 Stunden oder mehr betrΟΛgt, wandle ihn IMMER in Arbeitstage Ο† 8 Stunden um, indem du die Stundenzahl DURCH 8 TEILST (z.B. 600-1.200 Stunden ΟΖ 8 = 75-150 Arbeitstage, NICHT 600-1.200 Arbeitstage βÄ™ die MaΟüeinheit ΟΛndert sich, der Zahlenwert wird kleiner). Rechne diese Division bei JEDER Umrechnung explizit nach, bevor du das Ergebnis hinschreibst. Das gilt AUCH wenn die Kundenangabe selbst in Stunden kam (z.B. "40-60 Stunden/Monat" βÜ£ "5-7,5 Arbeitstage/Monat"), UND fΟΦr jede aufsummierte oder hochgerechnete Jahres-/Monatszahl, nicht nur fΟΦr Einzelfall-Nennungen. Nur Werte unter 8 Stunden bleiben in Stunden stehen. Das gilt fΟΦr alle Aufwandsangaben in jeder Phase, konsequent ΟΦber den gesamten Output.\n';
  s+='KRITISCH: Wenn du irgendwo im Output die VerlΟΛsslichkeit einer Aussage/Zahl kennzeichnest, nutze AUSSCHLIESSLICH die Worte BESTΟ³TIGT (vom Kunden genannt oder dokumentiert), ARBEITSWERT (Benchmark + plausibel abgeleiteter Mittelwert aus KI21 Intelligence, zum Rechnen verwendet, nicht kundenspezifisch verifiziert) oder ZU VALIDIEREN (offene GrΟΕΟüe, die im nΟΛchsten GesprΟΛch geklΟΛrt werden sollte) βÄ™ NIEMALS Emoji-Punkte wie πüüΔ/πüüΓ/πüî¥ oder Ampelfarben ohne Wort. Schreibe immer zuerst den Bewertungstext, dann das Label in GroΟübuchstaben direkt danach oder davor (z.B. "Typische Range: 300-600 Stunden/Jahr, verwendeter ARBEITSWERT: 450 Stunden/Jahr"). Das gilt konsequent fΟΦr jede Confidence-Angabe im gesamten Output, nicht nur an einer Stelle. Bei BESTΟ³TIGT/ANNAHME/KLΟ³REN-BlΟΕcken (fΟΦr GesprΟΛchserkenntnisse) bleiben diese drei WΟΕrter wie bisher bestehen βÄ™ ARBEITSWERT/ZU VALIDIEREN gelten zusΟΛtzlich speziell fΟΦr quantitative Kennzahlen und Berechnungsgrundlagen.\n';
  s+='KRITISCH: MAXIMAL EIN MULTIPLIKATIONSSCHRITT BEI SPEKULATIVEM POTENZIAL: Wenn du ein Krisen-/Schadenspotenzial in einer Eskalations-/Schadensrechnung darstellst, verkette NICHT mehr als einen einzigen Unsicherheitsfaktor (z.B. NUR "SchadenshΟΕhe Ο½ geschΟΛtzte Vermeidbarkeitsquote"). Verkette NIEMALS zusΟΛtzlich noch eine geschΟΛtzte HΟΛufigkeit pro Jahr in dieselbe Rechnung βÄ™ das sind dann mehrere multiplizierte Unsicherheiten und die resultierende Zahl wirkt prΟΛziser als sie ist. Behandle HΟΛufigkeit pro Jahr als separaten, eigenstΟΛndig zu klΟΛrenden Punkt, ohne sie in die gleiche Multiplikation einzubeziehen. Gilt in JEDER Phase, nicht nur in der Nutzen-Kosten-Analyse.\n';
  s+='KRITISCH: GLEICHES PRINZIP GILT FΟ€R OPTIMISTISCHE ROI-MULTIPLIKATOREN: Verkette bei einer ROI-/Payback-Aussage NICHT mehr als einen Unsicherheitsfaktor (z.B. NUR die vom Kunden genannte Quote-Verbesserung). Wenn du zusΟΛtzlich noch eine geschΟΛtzte Margin-Annahme UND eine angenommene Erfolgswahrscheinlichkeit in dieselbe Rechnung einbaust, entsteht eine kΟΦnstlich beeindruckende Zahl wie "ROI 20-30x", die bei kritischem Nachfragen (besonders von CFO/CEO) nicht standhΟΛlt und Vertrauen kostet. NIEMALS einen ROI-Multiplikator wie "20x", "30x" oder eine ΟΛhnlich hohe, beeindruckend wirkende Zahl als Ergebnis ausgeben, wenn sie aus mehr als einer verketteten Unsicherheit stammt βÄ™ formuliere statt einer einzelnen Multiplikator-Zahl lieber eine Bandbreite mit explizit benannten Annahmen, oder verzichte ganz auf eine zusammenfassende "Xx ROI"-Zahl und beschreibe Nutzen vs. Investition stattdessen als zwei separate, klar gekennzeichnete GrΟΕΟüen. Gilt in JEDER Phase.\n';
  s+='KRITISCH: KORREKTE BESTΟ³TIGT/ANNAHME-ZUORDNUNG BEI ABGELEITETEN ZAHLEN: Wenn der Kunde eine Prozentzahl nennt (z.B. "20-25% mehr Umsatz"), ist NUR diese Prozentzahl selbst BESTΟ³TIGT (der Kunde hat sie genannt). Jede daraus berechnete absolute β²§-Zahl (z.B. "5-8 Mio. β²§ zusΟΛtzlicher Umsatz" durch Anwendung der Prozentzahl auf den Gesamtumsatz) ist eine EIGENE Ableitung und MUSS als ANNAHME oder ARBEITSWERT gekennzeichnet werden, NIEMALS als BESTΟ³TIGT βÄ™ auch wenn die zugrunde liegende Prozentzahl bestΟΛtigt ist. Eine Berechnung aus einer bestΟΛtigten Zahl ist selbst nicht automatisch bestΟΛtigt.\n';
  s+='KRITISCH: UNTERSCHEIDE STRIKT ZWISCHEN KI21-EIGENEM NUTZEN UND KUNDEN-HYPOTHESE: Forecast-/EntscheidungsqualitΟΛt ist ein direkter, kausal nachvollziehbarer Nutzen von KI21 (bessere Qualifizierung βÜ£ bessere Datenbasis βÜ£ genauere Prognose) βÄ™ das darfst du als eigenen Nutzen von KI21 formulieren. Eine daraus resultierende Umsatz- oder Abschlussquoten-Steigerung (z.B. "+20-25% Umsatz") ist dagegen KEIN direkter Mechanismus von KI21, sondern eine vom Kunden selbst erwartete/genannte ZielgrΟΕΟüe, die von vielen weiteren Faktoren abhΟΛngt (Markt, Wettbewerb, individuelle VerkΟΛuferleistung). Formuliere das konsequent als "Der Kunde erwartet/nennt X% als ZielgrΟΕΟüe" statt als "KI21 liefert X% mehr Umsatz" oder "KI21 erhΟΕht den Umsatz um X%". KI21 verspricht NIEMALS eine Umsatz- oder Abschlussquoten-Zahl als eigene Leistung βÄ™ nur die GeschΟΛftsfΟΦhrung/der Kunde selbst formuliert diese Erwartung. Gilt in JEDER Phase, besonders in ErΟΕffnungssΟΛtzen, Verkaufsargumenten und Follow-up-Mails. KI21 ist der Name des an den Kunden verkauften Produkts.\n';
  s+='KRITISCH: UNSICHERE PROZENTANGABEN GENERELL VORSICHTIG FORMULIEREN (gilt fΟΦr ALLE Prozentzahlen in JEDER Phase, auch Forecast-Genauigkeit-Benchmarks): Solange eine Prozentzahl nicht durch eigene Messung des Kunden bestΟΛtigt ist, formuliere sie nicht als feststehende Tatsache. ErgΟΛnze bei der ersten Nennung einen kurzen Validierungs-Hinweis (z.B. "...sollte im Pilotbetrieb mit echten Zahlen validiert werden"), statt die Zahl danach unkommentiert mehrfach als Fakt zu wiederholen.\n';
  s+='KRITISCH: KEIN AUSWEICHEN AUF ERFUNDENE "BENCHMARKS": Wenn du fΟΦr ein Krisen-/Schadenspotenzial keine belastbare, herleitbare Zahl hast, darfst du NICHT stattdessen eine pauschale Branchenzahl als angeblichen "Benchmark" zitieren, um trotzdem einen β²§-Betrag zu nennen. Das ist nur eine Umgehung des Verbots, keine echte Quelle. Wenn keine Zahl aus der tatsΟΛchlichen KI21 Intelligence stammt, bleibt das Potenzial unbeziffert βÄ™ auch wenn das bedeutet, gar keine β²§-Zahl zu nennen. Gilt in JEDER Phase.\n';
  s+='KRITISCH: KATEGORISCHES VERBOT FΟ€R UNBESTΟ³TIGTES KRISENPOTENZIAL: Wenn ein Schadens-/Krisenpotenzial nicht durch konkrete, vom Kunden bestΟΛtigte Zahlen (HΟΛufigkeit UND Vermeidbarkeit UND SchadenshΟΕhe alle bestΟΛtigt) belegt ist, darf NIRGENDS im Output βÄ™ in KEINER Phase, auch nicht im Abschlusssatz, in der Kurzfassung, in Einwandantworten oder als "SensitivitΟΛtsrechnung" βÄ™ ein β²§-Betrag dafΟΦr genannt werden, auch nicht mit WΟΕrtern wie "kΟΕnnte", "potenziell", "zusΟΛtzlich". Beschreibe stattdessen NUR die Mechanik in Worten, ohne Zahl. Ein unbestΟΛtigter Betrag im KundengesprΟΛch beschΟΛdigt mehr Vertrauen als er Nutzen bringt.\n';
  s+='KRITISCH βÄ™ KORREKTE PERSONEN-BEZEICHNUNG (gilt in JEDER Phase): Schreibe "X beteiligte Mitarbeitende" oder "X Personen", NIEMALS "X FTE" oder "X Vollzeitstellen" βÄ™ auΟüer der Kunde hat selbst explizit von Vollzeitstellen/FTE gesprochen. Eine vom Kunden genannte Anzahl beteiligter Personen ist NICHT automatisch eine Anzahl Vollzeitstellen βÄ™ das sind fachlich unterschiedliche GrΟΕΟüen, die nicht gleichgesetzt werden dΟΦrfen.\n';
  s+='ROI: Nur bestΟΛtigte Kundenzahlen verwenden. Zeitersparnis NUR fΟΦr Account Manager.\n';
  s+='KRITISCH: Jede Phase muss mindestens EINEN Gedanken enthalten, der ΟΦber Standardwissen hinausgeht βÄ™ einen Aha-Insight, der im GedΟΛchtnis bleibt (z.B. "Die grΟΕΟüte Zeitersparnis entsteht oft nicht durch schnellere Reports, sondern dadurch, dass dieselben Zahlen nicht mehr in mehreren Excel-Dateien manuell abgeglichen werden mΟΦssen."). Vermeide reine Standardaussagen ohne ΟΦberraschenden Mehrwert. Dieser Insight darf nicht erfunden wirken βÄ™ er muss zur konkreten Situation des Kunden passen und nachvollziehbar sein.\n';
  s+='KRITISCH: Tonfall durchgehend partnerschaftlich, nicht verkΟΛuferisch-drΟΛngend. Vermeide Formulierungen wie "damit ich Sie/Ihre GeschΟΛftsfΟΦhrung ΟΦberzeuge" oder "garantiert". Bevorzuge Formulierungen wie "damit Sie eine belastbare Entscheidungsgrundlage haben βÄ™ unabhΟΛngig davon, wie die Entscheidung ausfΟΛllt" oder "damit wir gemeinsam zu einer fundierten EinschΟΛtzung kommen". Das Ziel ist: gemeinsam zu einer Entscheidung fΟΦhren, nicht ΟΦberreden.\n';
  s+='KRITISCH βÄ™ HARTE GRENZE FΟ€R DIE STANDARDAUSGABE: Die Standardausgabe (alles VOR der Zeile "###DETAILS###", falls vorhanden) MUSS exakt mit der letzten vorgegebenen Zeile des Formats enden (meist "NΟ³CHSTER SCHRITT DIESE WOCHE:" / vergleichbar, je nach Phase). Schreibe NACH dieser letzten Zeile ABSOLUT NICHTS mehr, auΟüer dem optionalen Marker "###DETAILS###" und dem dahinter folgenden Detailblock. KEINE zusΟΛtzliche Zusammenfassung, KEIN Wiederholen von Punkten, KEIN weiterer Absatz "Zusammenfassend...". Die Standardausgabe muss auf einem Smartphone als EINE Bildschirmseite ohne Scrollen lesbar sein βÄ™ das ist die wichtigste Einzelregel in diesem Prompt.\n';
  s+='KRITISCH: Die "NΟ³CHSTE AKTION"/"βÜ£ TODO" dieser Phase muss sich klar von der letzten Aktion aus "BISHERIGE ERGEBNISSE" (falls vorhanden) unterscheiden βÄ™ wiederhole NIEMALS sinngemΟΛΟü denselben nΟΛchsten Schritt wie eine vorherige Phase. Wenn die vorherige Phase z.B. "Termin vereinbaren" als Aktion hatte und dieser Termin laut Kontext bereits stattgefunden hat, muss die neue Aktion einen Schritt WEITER sein, nicht denselben wiederholen.\n';
  s+='AUSGABE-REGELN (strikt einhalten):\n';

// βîÄβîÄ CLAUDE API βîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄ
async function callClaude(prompt, onStream){
  const apiKey=LS.get('ki21_apikey','');
  if(!apiKey){alert('Bitte API Key unter βöô hinterlegen.');return null;}
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',
      max_tokens:20000,
      stream:true,
      tools:[{type:'web_search_20250305',name:'web_search',max_uses:6}],
      messages:[{role:'user',content:prompt}]
    })
  });
  if(!resp.ok){const err=await resp.json();throw new Error(err.error?.message||'API Fehler '+resp.status);}
  const reader=resp.body.getReader();
  const decoder=new TextDecoder();
  let fullText='';
  let blockText='';
  while(true){
    const {done,value}=await reader.read();
    if(done)break;
    const chunk=decoder.decode(value,{stream:true});
    const lines=chunk.split('\n');
    for(const line of lines){
      if(line.startsWith('data: ')){
        const data=line.slice(6);
        if(data==='[DONE]')continue;
        try{
          const parsed=JSON.parse(data);
          if(parsed.type==='content_block_start'&&parsed.content_block?.type==='tool_use'){
            if(onStream)onStream(stripMd(fullText)+'\nπüîç Suche aktuelle Informationen...\n');
          }
          if(parsed.type==='content_block_start'&&parsed.content_block?.type==='text'){
            blockText='';
          }
          if(parsed.type==='content_block_delta'&&parsed.delta?.text){
            blockText+=parsed.delta.text;
            if(onStream)onStream(stripMd(fullText+blockText));
          }
          if(parsed.type==='content_block_stop'){
            if(blockText){fullText+=(fullText?'\n':'')+blockText;blockText='';}
          }
        }catch(e){}
      }
    }
  }
  if(blockText){fullText+=(fullText?'\n':'')+blockText;}
  return fullText;
}

function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')el.className=v;
    else el.setAttribute(k,v);
  });
  children.flat().forEach(c=>{
    if(c==null)return;
    el.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return el;
}

function modal(title,content,onClose){

function stripMd(text){
  return text
    .replace(/#{1,6}\s+/g,'')
    .replace(/\*\*\*([^*]+)\*\*\*/g,'$1')
    .replace(/\*\*([^*]+)\*\*/g,'$1')
    .replace(/\*([^*]+)\*/g,'$1')
    .replace(/^---+$/gm,'')
    .replace(/^===+$/gm,'')
    .replace(/^>\s/gm,'')
    .replace(/`([^`]+)`/g,'$1')
    .trim();
}

function attachScoreLongPress(el,begruendung){
  if(!begruendung)return;
  let pressTimer=null;
  let fired=false;
  const showTooltip=()=>{
    const existing=document.getElementById('score-tooltip');
    if(existing)existing.remove();
    const tip=document.createElement('div');
    tip.id='score-tooltip';
    tip.style.cssText='position:fixed;top:50px;left:14px;right:14px;background:#1c2333;'+
      'border:1px solid #ff6b00;border-radius:8px;padding:10px 12px;font-size:12px;'+
      'color:#e6edf3;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.5);cursor:pointer;'+
      '-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;';
    const textEl=document.createElement('div');
    textEl.textContent=begruendung;
    const hintEl=document.createElement('div');
    hintEl.textContent='Tippen zum SchlieΟüen';
    hintEl.style.cssText='font-size:9px;color:#8b949e;margin-top:6px;text-align:right;';
    tip.appendChild(textEl);
    tip.appendChild(hintEl);
    tip.addEventListener('click',e=>{e.stopPropagation();tip.remove();});
    document.body.appendChild(tip);
    setTimeout(()=>{
      const dismissOnAnyClick=(e)=>{
        const t=document.getElementById('score-tooltip');
        if(t){
          e.preventDefault();
          e.stopPropagation();
          if(e.stopImmediatePropagation)e.stopImmediatePropagation();
          t.remove();
        }
        document.removeEventListener('click',dismissOnAnyClick,true);
        document.removeEventListener('touchstart',dismissOnAnyClick,true);
      };
      document.addEventListener('click',dismissOnAnyClick,true);
      document.addEventListener('touchstart',dismissOnAnyClick,true);
    },100);
  };
  const start=(e)=>{
    fired=false;
    pressTimer=setTimeout(()=>{fired=true;showTooltip();},500);
  };
  const cancel=()=>{if(pressTimer)clearTimeout(pressTimer);};
  el.style.cursor='pointer';
  el.addEventListener('touchstart',start,{passive:true});
  el.addEventListener('touchend',cancel);
  el.addEventListener('touchmove',cancel);
  el.addEventListener('mousedown',start);
  el.addEventListener('mouseup',cancel);
  el.addEventListener('mouseleave',cancel);
  el.addEventListener('contextmenu',e=>e.preventDefault());
}

function extractBegruendung(text){
  const m=text.match(/BegrΟΦndung:\s*(.+)/);
  if(m)return m[1].trim().split('\n')[0];
  const pipeMatch=text.match(/\d+\s*\/\s*10\s*\|\s*(.+)/);
  if(pipeMatch)return pipeMatch[1].trim().split('\n')[0];
  const fallback=text.match(/Empfehlung:\s*(.+)/);
  if(fallback)return fallback[1].trim().split('\n')[0];
  return '';
}

  }
  const championWords='(champion|fΟΦrsprecher|unterstΟΦtzer|treiber|sponsor)';
  const departureWords='(verlΟΛsst (das unternehmen|die firma|uns)|hat gekΟΦndigt|kΟΦndigt (zum|in|im|nΟΛchst|demnΟΛchst)|wechselt (den arbeitgeber|die firma|das unternehmen)|ist nicht mehr (im unternehmen|verfΟΦgbar|erreichbar|an bord)|zieht (seine|ihre) unterstΟΦtzung zurΟΦck|fΟΛllt (als (champion|fΟΦrsprecher|sponsor) )?(komplett )?weg)';
  const trustPhrasePattern=/(verlΟΛsst sich|verlassen sich|sich .{0,15}verlassen|verlass(en)? auf|verlΟΛsslich|vertrau)/i;
  const championDepartureRe=new RegExp(championWords+'.{0,80}'+departureWords,'i');
  const championDepartureMatch=raw.match(championDepartureRe);
  if(championDepartureMatch&&!trustPhrasePattern.test(championDepartureMatch[0])){
    addWarn('Interner Champion verlΟΛsst das Unternehmen',30,30);
  }
  return {warning,positive,penalty,scoreCap};
}

function applyHealthRiskRules(baseScore,risk){
  let score=Number(baseScore)||0;
  score=score-risk.penalty;
  if(risk.scoreCap!==null&&risk.scoreCap!==undefined){
    score=Math.min(score,risk.scoreCap);
  }
  return Math.max(0,Math.min(100,Math.round(score)));
}

KRITISCH βÄ™ DER SCORE MISST NICHT: DokumentationsqualitΟΛt, Informationsmenge, Bearbeitungsfortschritt oder Anzahl ausgefΟΦllter Felder. Die Menge der gesammelten Informationen ist NEUTRAL fΟΦr den Score. Mehr dokumentierte Information darf den Score NICHT automatisch erhΟΕhen. Bewerte stattdessen jede einzelne Information danach, ob sie die TATSΟ³CHLICHE Abschlusswahrscheinlichkeit erhΟΕht, senkt, oder unverΟΛndert lΟΛsst.

Beispiele fΟΦr deutliche SENKUNG: GeschΟΛftsfΟΦhrer/CEO/Entscheider mag unsere LΟΕsung nicht; GeschΟΛftsfΟΦhrer/CEO/Entscheider prΟΛferiert zwei andere Mitbewerber; Wettbewerber fΟΦhrt bereits Workshops durch oder ist stark etabliert; Wettbewerber bietet kritische Funktion besser; Entscheidung wird verschoben oder das Projekt verschoben; Budget entfΟΛllt; interner Champion verlΟΛsst das Unternehmen (NUR wenn explizit so beschrieben, nicht bei bloΟüer Champion-ErwΟΛhnung); CIO/IT blockiert oder bevorzugt eine vorhandene AlternativlΟΕsung (z.B. ein bereits lizenziertes Konkurrenzsystem oder eine SAP-/ERP-Inhouse-Alternative).
Beispiele fΟΦr ERHΟ•HUNG: Budget bestΟΛtigt; Entscheider aktiv eingebunden; wirtschaftlicher Nutzen bestΟΛtigt; starker Sponsor vorhanden; Schmerz wurde konkret quantifiziert (z.B. mit einer Zahl/HΟΛufigkeit belegt, nicht nur allgemein beschrieben).

K.O.-KRITERIEN (harte Dealbreaker βÄ™ dominieren IMMER alle anderen Signale, auch wenn viele Positivsignale vorliegen):
- Entscheider (GF/CEO/CFO/Vorstand/wirtschaftlicher Entscheider) lehnt unsere LΟΕsung klar ab

Alle ΟΦbrigen Signale (weder K.O. noch in obiger Liste) unterscheiden sich nochmal in ihrer StΟΛrke:
- STARKE Signale (deutlich spΟΦrbarer Effekt auf den Score, aber kein K.O.): ein konkret quantifizierter Schmerzpunkt (z.B. "X Arbeitstage Mehraufwand pro Vorgang"), ein bestΟΛtigter Sponsor/Champion, eine bestΟΛtigte, mehrfach wiederkehrende geschΟΛftliche Auswirkung (z.B. "X gescheiterte Entscheidungen pro Jahr wegen fehlerhafter Daten"), eine klar bestΟΛtigte Budgetfreigabe. Diese Signale sollen den Score spΟΦrbar stΟΛrker bewegen als kleinere Detailpunkte.
- LEICHTE Signale (geringer Effekt): einzelne Detailinformationen, organisatorische NebensΟΛchlichkeiten, unklare/vage Aussagen ohne Zahl oder konkrete Konsequenz.
Bewerte explizit, welche Signale STARK und welche LEICHT sind, bevor du den Gesamtscore festlegst βÄ™ ein einzelnes starkes Signal darf nicht von mehreren leichten Signalen "weggemittelt" werden.

KRITISCH βÄ™ FΟ€NF KONSISTENZREGELN FΟ€R DIE SIGNALE:

1. KEINE WIDERSPRΟ€CHE: Ein Signal darf NIEMALS einer bereits bestΟΛtigten Information widersprechen. Wenn z.B. eine Person namentlich als Ansprechpartner/Entscheider bekannt ist, darf NICHT gleichzeitig ein Warnsignal "Entscheider nicht identifiziert" erscheinen. Wenn unklar ist, ob diese Person Budget-AutoritΟΛt hat oder wer ΟΦber ihr entscheidet, ist das ein OFFENER PUNKT ("Budget-AutoritΟΛt von [Name] unklar"), kein Warnsignal.

2. WARNSIGNALE NUR AUS FAKTEN/KLAR GEKENNZEICHNETER BEWERTUNG, NIEMALS AUS BRANCHENANNAHMEN: Ein Warnsignal darf ausschlieΟülich aus tatsΟΛchlich im Text genannten Informationen entstehen βÄ™ niemals aus einer allgemeinen Branchenvermutung. "Produktionsunternehmen" bedeutet NICHT automatisch SAP. Nenne ein ERP-System (SAP, Microsoft, Oracle, Infor usw.) in einem Warnsignal NUR, wenn es im Text tatsΟΛchlich erwΟΛhnt wurde. Erfinde KEIN Wettbewerbsrisiko, das nicht im Text belegt ist.

3. WARNSIGNALE VS. OFFENE PUNKTE STRIKT TRENNEN: Ein Warnsignal ist ein ECHTES Deal-Risiko βÄ™ etwas, das den Deal aktiv gefΟΛhrdet (z.B. "Entscheidung verschoben", "Wettbewerber bereits aktiv", "CIO blockiert", "internes Projekt konkurriert", "negativer Pilot", "fehlender Champion", "Budget eingefroren"). Eine FEHLENDE Information ist KEIN Warnsignal, sondern gehΟΕrt unter "open" (z.B. "BudgethΟΕhe unbekannt", "Budgetentscheider offen", "ROI noch nicht quantifiziert", "Zeitplan offen", "Anzahl Nutzer offen"). Stelle dir bei jedem Punkt die Frage: "Ist das ein aktives Risiko, das den Deal gefΟΛhrdet, oder fehlt hier nur noch eine Information?" βÄ™ im zweiten Fall gehΟΕrt der Punkt zwingend unter "open", nicht unter "warning".

4. POSITIVE SIGNALE NUR AUS BESTΟ³TIGTEN FAKTEN: Ein positives Signal darf nur erscheinen, wenn es wirklich bestΟΛtigt ist βÄ™ nicht bei reinem Interesse oder vagen Andeutungen. Schreibe NICHT "Champion aktiv", wenn nur allgemeines Interesse gezeigt wurde. Erlaubt sind nur konkret belegte positive Signale wie "Entscheider identifiziert", "Schmerz quantifiziert", "GeschΟΛftsauswirkung bestΟΛtigt", "Workshop vereinbart", "Budget genannt", "Pilot zugesagt".

5. OFFENE PUNKTE MΟ€SSEN EINEN SCHRITT WEITERDENKEN, NICHT BEREITS BESTΟ³TIGTES WIEDERHOLEN: Ein offener Punkt darf NIEMALS eine Frage stellen, die durch bereits bestΟΛtigte Informationen schon beantwortet ist. BestΟΛtigte Erkenntnisse sind die Arbeitsgrundlage βÄ™ baue auf ihnen auf und leite daraus die NΟ³CHSTE noch ungelΟΕste WissenslΟΦcke oder das nΟΛchste offene Entscheidungskriterium ab, statt dieselbe Frage erneut zu stellen. Beispiel: Wenn bereits bestΟΛtigt ist "Cloud-LΟΕsung mit tΟΛglicher Spiegelung wΟΛre fΟΦr den Inhaber akzeptabel, IT hat technische Machbarkeit bestΟΛtigt", ist "WΟΦrde der Inhaber eine Cloud-LΟΕsung mit Spiegelung akzeptieren?" KEIN gΟΦltiger offener Punkt mehr (das ist bereits beantwortet) βÄ™ stattdessen z.B. "Ist die Spiegelungsarchitektur verbindlich umsetzbar?" oder "Welches konkrete Entscheidungskriterium des Inhabers ist jetzt noch offen?". PrΟΦfe vor jedem offenen Punkt: "Wurde das bereits durch ein bestΟΛtigtes positives Signal beantwortet?" βÄ™ falls ja, formuliere stattdessen die nΟΛchste, tiefere Frage.

Jeder Punkt darf in GENAU EINER der drei Kategorien (positive/warning/open) erscheinen βÄ™ niemals doppelt, niemals widersprΟΦchlich zu einem anderen Punkt. KRITISCH: Wenn "Budget bestΟΛtigt" in positive steht, darf "Budget kritisch oder unklar" NICHT in warning stehen. Wenn "Entscheider aktiv eingebunden" in positive steht, darf "Entscheider nicht eingebunden" NICHT in warning stehen. WidersprΟΦche zwischen Kategorien sind der hΟΛufigste QualitΟΛtsfehler βÄ™ vor dem Abschluss immer prΟΦfen ob positive und warning sich inhaltlich widersprechen.

QUALITΟ³TSREGEL βÄ™ FAKT VS. BEWERTUNG KONSEQUENT TRENNEN (gilt fΟΦr alle drei Kategorien):
- Positive Signale: formuliere sie so, dass der VerkΟΛufer sofort erkennt, ob das ein bestΟΛtigter Fakt ("Schmerz quantifiziert: 5.000 β²§/Monat Einsparung bestΟΛtigt") oder eine KI-EinschΟΛtzung ("Entscheider wirkt grundsΟΛtzlich offen fΟΦr externe LΟΕsungen") ist.

QUALITΟ³TSREGEL βÄ™ PREISRISIKEN MΟ€SSEN DIREKT UND EINDEUTIG FORMULIERT SEIN: Ein Preisrisiko muss immer beschreiben, was passiert wenn der Kunde weiter verhandelt βÄî nicht nur einen Abstand zu einer Grenze. Korrekt: "Angebot bereits stark reduziert βÄî weiterer Preisnachlass wirtschaftlich kaum mΟΕglich." Falsch: "100 β²§ Spielraum unter Budget." Im SaaS-/Software-Kontext gilt: Lizenzpreise sind standardmΟΛΟüig jΟΛhrlich wiederkehrend (ARR), keine Einmalkosten. Ein Preisrisiko im SaaS-Kontext betrifft daher immer die jΟΛhrliche Belastung, nicht einen einmaligen Betrag. Wenn unklar ist ob ein Budget-Limit jΟΛhrlich oder einmalig gemeint ist, nenne das als offenen Punkt.

QUALITΟ³TSREGEL βÄ™ SPONSOR βâ† ENTSCHEIDER (Health-Signale): Positive Signale zu Entscheidern dΟΦrfen nur formuliert werden wenn Entscheidungsbefugnis explizit bestΟΛtigt ist. Korrekt: "Operativer Sponsor aktiv: [Name]". Falsch: "Entscheider unterstΟΦtzt aktiv" wenn nur UnterstΟΦtzung, nicht Entscheidungsbefugnis bekannt ist. Warnhinweis wenn Entscheider (GF/CEO/CFO) noch nicht identifiziert oder eingebunden.

// savePhaseSnapshot: isolierter Health-Call mit NUR den Daten dieser einen Phase.

async function savePhaseSnapshot(accId,sitId){
  if(!accId||sitId===undefined)return;

      positive:tag(json.positive),

      sourcePhase:sit.id||sitId,

}

// Smarte Bereichsanalyse: erkennt welche Bereiche von einer neuen Erkenntnis betroffen sind.

async function runSmartImpactAnalysis(accId, newInsight){

function getKoSeverity(text){
  const t=(text||'').toLowerCase();
  const leaderWords='(geschΟΛftsfΟΦhrer|gf|ceo|cfo|geschΟΛftsleitung|entscheider|leitung|vorstand|sponsor|cio)';
  const competitorWords='(mitbewerb|mitbewerber|wettbewerb|wettbewerber|konkurrent|konkurrenz)';
  const preferenceWords='(prΟΛfer|bevorzug|favoris|favorit|gesetzt|vorne|tendier)';
  const rejectionWords='(mag .*nicht|will .*nicht|lehnt .*ab|skeptisch|dagegen|kein interesse|nicht ΟΦberzeugt|ablehn)';
  // Reihenfolge = Schweregrad, niedrigster Deckel zuerst geprΟΦft
  if(new RegExp(leaderWords+'.{0,80}'+preferenceWords+'.{0,80}'+competitorWords,'i').test(t))return {penalty:45,cap:25};
  if(new RegExp(competitorWords+'.{0,80}'+preferenceWords,'i').test(t))return {penalty:45,cap:25};
  if(new RegExp(leaderWords+'.{0,80}'+rejectionWords,'i').test(t))return {penalty:35,cap:30};
  const championDepartureMatch2=t.match(/(champion|fΟΦrsprecher|sponsor).{0,60}(verlΟΛsst (das unternehmen|die firma|uns)|hat gekΟΦndigt|kΟΦndigt (zum|in|im)|wechselt (den arbeitgeber|die firma|das unternehmen)|nicht mehr (im unternehmen|verfΟΦgbar|erreichbar)|zieht (seine|ihre) unterstΟΦtzung zurΟΦck|fΟΛllt (komplett )?weg)/i);
  if(championDepartureMatch2&&!/(verlΟΛsst sich|verlassen sich|sich .{0,15}verlassen|verlass(en)? auf|verlΟΛsslich|vertrau)/i.test(championDepartureMatch2[0]))return {penalty:30,cap:30};
  if(/budget.{0,40}(komplett gestrichen|vollstΟΛndig entfallen|endgΟΦltig abgelehnt)/i.test(t))return {penalty:20,cap:45};
  if(/(entscheidung|projekt).{0,40}(final gestoppt|endgΟΦltig gestoppt|auf unbestimmte zeit eingefroren)/i.test(t))return {penalty:20,cap:45};
  return null;
}
function isKoSignalText(text){ return getKoSeverity(text)!==null; }

function _getOpportunityHealthBase(accId){
  const auto=LS.get('ki21_health_'+accId,null);
  const allResults=[];
  SITS.forEach((sit,i)=>{
    const d=LS.get('ki21_st_'+accId+'_'+i,null);
    if(d&&d.result)allResults.push({title:sit.title,text:d.result});
  });
  const risk=getAdditionRiskSignals(accId,allResults);
  if(!auto){
    if(risk.warning.length||risk.positive.length){
      let cap=null;
      risk.warning.forEach(w=>{const sev=getKoSeverity(w.text);if(sev)cap=cap===null?sev.cap:Math.min(cap,sev.cap);});
      const score=cap!==null?Math.min(55,cap):55;
      return {score,label:score<35?'Kritisch':'Stabil',provisional:true,positive:risk.positive,warning:risk.warning,open:[],structuralOpenCount:6,isKo:cap!==null};
    }
    return null;
  }
  const manual=getHealthManual(accId);
  const positive=(auto.positive||[]).map(s=>({text:s.text,origin:'AUTO',type:'positive',disabled:manual.removedAutoTexts.includes(s.text)}));
  const warning=(auto.warning||[]).map(s=>({text:s.text,origin:'AUTO',type:'warning',disabled:manual.removedAutoTexts.includes(s.text)}));
  const open=(auto.open||[]).map(s=>({text:s.text,origin:'AUTO',type:'open',disabled:manual.removedAutoTexts.includes(s.text)}));
  risk.warning.forEach(r=>{ if(!warning.find(w=>w.text===r.text)) warning.unshift({...r,disabled:manual.removedAutoTexts.includes(r.text)}); });
  risk.positive.forEach(r=>{ if(!positive.find(w=>w.text===r.text)) positive.unshift({...r,disabled:manual.removedAutoTexts.includes(r.text)}); });
  manual.added.forEach(m=>{
    const entry={text:m.text,origin:'MANUELL',type:m.type,disabled:m.active===false};
    if(m.type==='positive')positive.push(entry);
    else if(m.type==='warning')warning.push(entry);
    else open.push(entry);
  });
  // EINE einzige Quelle der Wahrheit fΟΦr K.O.-Erkennung: getKoSeverity prΟΦft jeden aktiven (nicht ausgeblendeten) Warnsignal-Text.
  // K.O. wirkt NUR als Score-Deckel (schlimmster Fall gewinnt) - NIE als zusΟΛtzliche, aufsummierbare Strafe.
  // Architektur-Korrektur: Ein rein lokal per Regex erkanntes Signal (origin='ERGAENZUNG') darf den Score NICHT
  // allein hart deckeln - das wΟΦrde bedeuten, dass eine ungeprΟΦfte Textmustererkennung die KI-Bewertung
  // ΟΦberstimmt. Nur von der KI selbst bestΟΛtigte (AUTO) oder bewusst vom Nutzer eingegebene (MANUELL)
  // Signale dΟΦrfen den K.O.-Deckel auslΟΕsen. ERGAENZUNG-Signale bleiben als Hinweis sichtbar, capen aber nicht.
  const activeWarnings=warning.filter(w=>!w.disabled&&w.origin!=='ERGAENZUNG');
  let koCapMin=null;
  activeWarnings.forEach(w=>{
    const sev=getKoSeverity(w.text);
    if(sev)koCapMin=koCapMin===null?sev.cap:Math.min(koCapMin,sev.cap);
  });
  const hasActiveKo=koCapMin!==null;
  // Moderate +-3 Wirkung nur fΟΦr NICHT-K.O.-Signale (normale Risiko-Signale)
  const manualPositiveCount=manual.added.filter(m=>m.type==='positive'&&m.active!==false).length;
  const manualWarningCount=manual.added.filter(m=>m.type==='warning'&&m.active!==false&&!isKoSignalText(m.text)).length;
  const disabledAutoPositive=positive.filter(s=>(s.origin==='AUTO'||s.origin==='ERGAENZUNG')&&s.disabled).length;
  const disabledAutoWarning=warning.filter(s=>(s.origin==='AUTO'||s.origin==='ERGAENZUNG')&&s.disabled&&!isKoSignalText(s.text)).length;
  let base=auto.score+manualPositiveCount*3-manualWarningCount*3-disabledAutoPositive*3+disabledAutoWarning*3;
  let score=Math.max(0,Math.min(100,Math.round(base)));
  if(hasActiveKo)score=Math.min(score,koCapMin);
  const provisional=(auto.structuralOpenCount||0)>3;
  const label=hasActiveKo?'Kritisch':(score<35?'Kritisch':(score<70?'Stabil':(auto.label||'Gesund')));
  return {score,label,provisional,positive,warning,open,structuralOpenCount:auto.structuralOpenCount||0,checklist:auto.checklist||null,isKo:hasActiveKo,ts:auto.ts||0};
}

    if(low.includes('nachqualifizierung')||low.includes('reparatur'))return 'Wie viel Zeit kostet Nachqualifizierung pro Deal?';

    if(s.length>86)s=s.slice(0,83).replace(/\s+\S*$/,'')+'βÄΠ';

  if(p1&&p1.result2)sources.push(p1.result2);
  if(p1&&p1.result)sources.push(p1.result);
  let qs=[];
  for(const src of sources){
    qs=extractQuestionsFromText(src);
    if(qs.length)break;
  }
  qs=qs.map(q=>normalizeQuestionText(q,!!forPreview)).filter(Boolean);
  qs=[...new Set(qs)];
  return qs.slice(0,maxItems||3);
}



// v4.137 Cockpit-Matrix-AuffΟΦllung: Dashboard darf nicht leer wirken.
// Wenn Score < 70, aber keine formalen Risiken vorhanden sind, werden die sichtbaren Bremsfaktoren
// aus offenen Punkten und bestΟΛtigten LΟΦcken abgeleitet. Das ist Anzeige-Logik, kein neuer KI-Score.
function shortUniqueList(items,maxItems){
  const seen=new Set();
  const out=[];
  (items||[]).forEach(item=>{
    const text=String(item&&item.text?item.text:item||'').replace(/βÜ£ Strategie:.*/,'').trim();
    if(!text)return;
    const key=text.toLowerCase().replace(/[.,;:!?]/g,'');
    if(seen.has(key))return;
    seen.add(key);
    out.push(text);
  });
  return out.slice(0,maxItems||3);
}
function hasTextInList(list,pattern){
  return (list||[]).some(t=>pattern.test(String(t||'')));
}
function buildCockpitMatrixData(accId,health){
  const raw=getCurrentUserKnowledgeText(accId).toLowerCase();
  const lowPilotUnderBudget=hasLowKi21PilotUnderBudget(accId);
  const positives=shortUniqueList((health.positive||[]).filter(s=>!s.disabled).map(s=>sanitizeBudgetPriceText(accId,s.text,'positive')),4);
  const risks=shortUniqueList((health.warning||[]).filter(s=>!s.disabled).map(s=>sanitizeBudgetPriceText(accId,s.text,'warning')),4);
  const open=shortUniqueList((health.open||[]).map(s=>sanitizeBudgetPriceText(accId,s.text,'open')),4);

  // Chancen aus bestΟΛtigten harten Fakten ergΟΛnzen, falls die KI-Liste zu dΟΦnn ist.
  if(hasConfirmedFullDecisionAuthority(accId)&&!hasTextInList(positives,/entscheidungsbefugnis|entscheider/i)){
    positives.unshift('Entscheidungsbefugnis bestΟΛtigt');
  }
  if(lowPilotUnderBudget&&!hasTextInList(positives,/compact|unter budget|budgetrahmen/i)){
    positives.push('KI21 Compact liegt klar unter Budgetrahmen');
  } else if(/budget|freigabe|pilotstart|beauftragung/.test(raw)&&!hasTextInList(positives,/budget/i)){
    positives.push('Budgetrahmen vorhanden');
  }
  if(/80\.000|80000|schmerz|vermeidungsquote|schlechte deals|qualifizierte deals|discovery/.test(raw)&&!hasTextInList(positives,/schmerz|bedarf|nutzen/i)){
    positives.push('Schmerz konkret benannt');
  }

  // Wenn der Score sichtbar mittelmΟΛΟüig ist, darf die Matrix nicht "keine Risiken" zeigen.
  // Dann sind fehlender Business Case, Pilotstart oder Vertragsprozess Bremsfaktoren.
  if((health.score||0)<70 && risks.length===0){
    if(!hasTextInList(open,/wirtschaft|nutzen|business|roi|vermeidungsquote/i)){
      risks.push('Business Case noch nicht belastbar');
    }
    if(!hasTextInList(open,/pilot|start|zeitplan/i)){
      risks.push('Pilotstart noch nicht verbindlich');
    }
    if(!hasTextInList(open,/vertrag|beschaffung|einkauf|paper/i)){
      risks.push('Vertragsprozess noch offen');
    }
  }

  // Offene Punkte auffΟΦllen, damit "Die eine Sache" nicht leer oder zu generisch bleibt.
  if(!hasTextInList(open,/wirtschaft|nutzen|business|roi|vermeidungsquote/i)){
    open.push(hasConfirmedFullDecisionAuthority(accId)
      ? 'Wirtschaftlichen Nutzen mit Entscheider validieren'
      : 'Wirtschaftlichen Entscheider validieren');
  }
  if((health.score||0)<70 && !hasTextInList(open,/pilot|start/i))open.push('Pilotstart konkretisieren');
  if((health.score||0)<70 && !hasTextInList(open,/vertrag|beschaffung|einkauf|paper/i))open.push('Vertragsprozess klΟΛren');

  // Finale Cockpit-SΟΛuberung: Budget-/Preisverwechslungen und ΟΦberholte GF-Punkte dΟΦrfen nicht sichtbar bleiben.
  const cleanFinal=(list,kind)=>shortUniqueList((list||[]).map(t=>{
    let x=sanitizeBudgetPriceText(accId,t,kind);
    if(hasConfirmedFullDecisionAuthority(accId)&&isObsoleteGfCfoText(x))return '';
    return x;
  }).filter(Boolean),4);
  let finalPositive=cleanFinal(positives,'positive');
  let finalRisks=cleanFinal(risks,'warning');
  let finalOpen=cleanFinal(open,'open');
  if(lowPilotUnderBudget&&!hasTextInList(finalPositive,/compact|unter budget|budgetrahmen/i)){
    finalPositive.push('KI21 Compact liegt klar unter Budgetrahmen');
  }
  if(hasConfirmedFullDecisionAuthority(accId)&&!hasTextInList(finalOpen,/wirtschaft|nutzen|vermeidungsquote|pilot|start/i)){
    finalOpen.push('Wirtschaftlichen Nutzen und Pilotkriterien validieren');
  }
  return {
    positive:shortUniqueList(finalPositive,4),
    risks:shortUniqueList(finalRisks,4),
    open:shortUniqueList(finalOpen,4)
  };
}

function extractBulletsAfterHeader3(text,headerKeyword,maxItems){
  const lines=(text||'').split('\n');const out=[];let found=false;
  for(let i=0;i<lines.length;i++){
    if(!found){if(lines[i].toUpperCase().includes(headerKeyword.toUpperCase()))found=true;continue;}
    const t=lines[i].trim();if(!t)break;
    if(/^[A-ZΟ³Ο•Ο€πüé·πüîΞβù™βÄΔ\-]/.test(t)&&out.length>0)break;
    out.push(t.replace(/^[βÄΔ\-]\s*/,''));if(out.length>=(maxItems||3))break;
  }
  return out;
}

function splitDetailsFromResult(text){
  if(!text)return {main:'',details:''};
  // Robuster Marker-Match: erlaubt fΟΦhrende Markdown-Zeichen (#, -, =, *, Leerzeichen) vor/nach ###DETAILS###,
  // falls die KI das exakte Format leicht abweichend ausgibt (z.B. "## ###DETAILS###" oder "###DETAILS###  ")
  const markerRegex=/[#\-=*\s]*###\s*DETAILS\s*###[#\-=*\s]*/i;
  const m=text.match(markerRegex);
  if(!m)return {main:text,details:''};
  const idx=m.index;
  return {main:text.slice(0,idx).trim(),details:text.slice(idx+m[0].length).trim()};
}

function getPhaseScoreInfo(sitId){
  if(!state.activeId)return {score:null,reason:''};
  const data=LS.get('ki21_st_'+state.activeId+'_'+sitId,null);
  if(!data||!data.result)return {score:null,reason:''};
  const matches=[...data.result.matchAll(/(\d+)\s*\/\s*10/g)];
  const m=matches.length?matches[0]:null;
  if(!m)return {score:null,reason:''};
  const score=parseInt(m[1]);
  if(score<1||score>10)return {score:null,reason:''};
  return {score,reason:extractBegruendung(data.result)};
}

function getPhaseStatus(sitId){
  if(!state.activeId)return 'empty';
  const data=LS.get('ki21_st_'+state.activeId+'_'+sitId,null);
  if(data&&data.result)return 'done';
  if(data&&data.fv&&Object.values(data.fv).some(v=>v&&v.trim&&v.trim()))return 'progress';
  return 'empty';
}

// Leitet einen echten Fortschritts-Prozentsatz aus den bereits vorhandenen Eingabefeldern
// (SITS[].felder, ohne post-Felder) ab. Keine erfundene Zahl βÄî 0/100 fΟΦr leer/abgeschlossen.
function getPhaseProgressPct(sitId){
  const sit=SITS[sitId];
  if(!state.activeId||!sit)return 0;
  const data=LS.get('ki21_st_'+state.activeId+'_'+sitId,null);
  if(!data)return 0;
  if(data.result)return 100;
  const fields=(sit.felder||[]).filter(f=>!f.post);
  if(!fields.length)return 0;
  const filled=fields.filter(f=>data.fv&&data.fv[f.id]&&data.fv[f.id].trim&&data.fv[f.id].trim()).length;
  return Math.round((filled/fields.length)*100);
}

// Bottom Sheet: zeigt eine Liste von Items in einem von unten eingleitenden Panel.
// title: String, items: [{glyph, text, sub?}], emptyText: String
function showBottomSheet(title, items, emptyText){
  const overlay=document.createElement('div');
  overlay.className='bs-overlay';
  const panel=document.createElement('div');
  panel.className='bs-panel';
  if(String(title||'').toLowerCase().includes('fragen'))panel.classList.add('questions-sheet');

  const handle=document.createElement('div');
  handle.className='bs-handle';
  panel.appendChild(handle);

  const head=document.createElement('div');
  head.className='bs-head';
  const titleEl=document.createElement('div');
  titleEl.className='bs-title';
  titleEl.textContent=title;
  head.appendChild(titleEl);
  panel.appendChild(head);

  const body=document.createElement('div');
  body.className='bs-body';
  if(!items||!items.length){
    const e=document.createElement('div');
    e.className='bs-empty';
    e.textContent=emptyText||'Keine EintrΟΛge vorhanden.';
    body.appendChild(e);
  } else {
    items.forEach((it,idx)=>{
      if(it.separator){
        const sep=document.createElement('div');
        sep.className='bs-separator';
        body.appendChild(sep);
        return;
      }
      const row=document.createElement('div');
      row.className='bs-row'+(it.priority?' bs-priority':'')+(it.onClick?' clickable':'');
      const g=document.createElement('span');
      g.className='bs-glyph';
      g.textContent=it.glyph||'βÄΔ';
      row.appendChild(g);
      const t=document.createElement('span');
      t.style.flex='1';
      if(it.caption){
        const cap=document.createElement('div');
        cap.className='bs-priority-caption';
        cap.textContent=it.caption;
        t.appendChild(cap);
      }
      const main=document.createElement('div');
      main.textContent=it.text;
      t.appendChild(main);
      row.appendChild(t);
      if(it.onClick){
        const arrow=document.createElement('span');
        arrow.className='bs-row-arrow';
        arrow.textContent='βÄΚ';
        row.appendChild(arrow);
        row.addEventListener('click',e=>{e.stopPropagation();close();it.onClick();});
      }
      body.appendChild(row);
    });
  }
  panel.appendChild(body);

  const close=()=>{
    overlay.classList.remove('visible');
    panel.classList.remove('visible');
    setTimeout(()=>{overlay.remove();panel.remove();},280);
  };
  overlay.addEventListener('click',close);

  // Swipe-down to dismiss
  let startY=0;
  panel.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;},{passive:true});
  panel.addEventListener('touchend',e=>{
    if(e.changedTouches[0].clientY-startY>60)close();
  },{passive:true});

  document.body.appendChild(overlay);
  document.body.appendChild(panel);
  requestAnimationFrame(()=>{overlay.classList.add('visible');panel.classList.add('visible');});
}

// Es wird bewusst NICHT zu einem exakten KI-Satz gesprungen, weil Phasentexte nach Regenerierung variieren.
// Stattdessen: passende Phase ΟΕffnen + klaren Cockpit-Arbeitsauftrag oben anzeigen.
function getCockpitWorkTarget(kind,text){
  const raw=String(text||'').trim();
  const t=raw.toLowerCase();
  let phaseId=0;
  let section='Passender Arbeitsbereich';
  let hint='Bearbeite diesen Punkt im Arbeitsbereich.';

  if(kind==='question'){
    phaseId=1;section='Discovery & Demo';hint='Nutze diese Frage im nΟΛchsten Termin und dokumentiere die Antwort im Arbeitsbereich.';
  } else if(/business case|nutzen|roi|vermeidungsquote|wirtschaft|kennzahl|messbar|effekt|kosten|impact/.test(t)){
    phaseId=3;section='Nutzen / ROI';hint='Validiere hier wirtschaftlichen Nutzen, Kennzahlen und Belastbarkeit des Business Case.';
  } else if(/vertrags|vertrag|beschaffung|einkauf|angebot|abschluss|paper|freigabe|beauftragung/.test(t)){
    phaseId=4;section='Angebot';hint='KlΟΛre hier Vertrags-, Beschaffungs- und Abschlussprozess.';
  } else if(/pilot|start|termin|nΟΛchster schritt|nachbereitung|follow-up|verbindlich/.test(t)){
    phaseId=2;section='Nachbereitung';hint='KlΟΛre hier den nΟΛchsten verbindlichen Schritt und dokumentiere Zusagen.';
  } else if(/discovery|frage|informationen|nachqualifizierung|hubspot|notizen|e-mail|demo|zeigen|bedarf|schmerz/.test(t)){
    phaseId=1;section='Discovery & Demo';hint='KlΟΛre hier Bedarf, Discovery-Fragen und Demo-Fokus.';
  } else if(/wettbewerb|mitbewerb|konkurrent|alternative|einwand/.test(t)){
    phaseId=4;section='Angebot';hint='Bearbeite hier Wettbewerbsrisiko, Einwandbehandlung und Abschlussstrategie.';
  } else if(/entscheider|entscheidungsbefugnis|budget|sponsor|champion|fΟΦrsprecher|qualifiz/.test(t)){
    phaseId=0;section='Qualifizierung';hint='PrΟΦfe hier Qualifizierung, Entscheiderstatus und zentrale Deal-Grundlagen.';
  }

  return {phaseId,section,text:raw,kind:kind||'cockpit',hint,ts:Date.now()};
}
function openCockpitWorkTarget(kind,text){
  if(!state.activeId)return;
  const target=getCockpitWorkTarget(kind,text);
  state.cockpitFocus=target;
  LS.set('ki21_cockpit_focus_'+state.activeId,target);
  renderStation(target.phaseId);
}
function getCockpitFocusForPhase(accId,sitId){
  const focus=state.cockpitFocus||LS.get('ki21_cockpit_focus_'+accId,null);
  if(!focus||focus.phaseId!==sitId)return null;
  // Nach 20 Minuten ausblenden, damit der Arbeitsbereich nicht dauerhaft "markiert" bleibt.
  if(focus.ts&&Date.now()-focus.ts>20*60*1000){

    if(state.cockpitFocus===focus)state.cockpitFocus=null;

  }
  return focus;
}
