function getAdditionRiskSignals(accId,allResults){
  const resultsText=(allResults||[]).map(r=>r.text||'').join('\n');
  const raw=(getCurrentUserKnowledgeText(accId)+'\n'+resultsText);
  const combined=raw.toLowerCase();
  const warning=[];
  const positive=[];
  let penalty=0;
  let scoreCap=null;
  const addWarn=(text,points,cap)=>{
    if(!warning.find(w=>w.text===text))warning.push({text,origin:'ERGAENZUNG',type:'warning',disabled:false});
    penalty=Math.max(penalty,points);
    if(cap!==undefined&&cap!==null)scoreCap=scoreCap===null?cap:Math.min(scoreCap,cap);
  };
  const addPos=(text,points)=>{
    if(!positive.find(w=>w.text===text))positive.push({text,origin:'ERGAENZUNG',type:'positive',disabled:false});
    // Positive Ergänzungen werden bewusst nur moderat behandelt; harte Negativsignale dominieren.
  };
  if(!combined.trim())return {warning,positive,penalty,scoreCap};

  const leaderWords='(geschäftsführer|gf|ceo|cfo|geschäftsleitung|entscheider|leitung|vorstand|sponsor)';
  const competitorWords='(mitbewerb|mitbewerber|wettbewerb|wettbewerber|konkurrent|konkurrenz|alternative|andere lösung|andere lösungen)';
  const preferenceWords='(präfer|bevorzug|favoris|favorit|gesetzt|vorne|tendier|entschieden)';
  const rejectionWords='(mag .*nicht|will .*nicht|lehnt .*ab|skeptisch|dagegen|kein interesse|nicht überzeugt|unsere lösung nicht|gegen unsere lösung)';

  const leaderPrefersCompetitor=new RegExp(leaderWords+'.{0,120}'+preferenceWords+'.{0,120}'+competitorWords,'i').test(raw)
    || new RegExp(competitorWords+'.{0,120}'+preferenceWords+'.{0,120}'+leaderWords,'i').test(raw)
    || new RegExp(leaderWords+'.{0,120}'+rejectionWords+'.{0,160}'+competitorWords,'i').test(raw)
    || new RegExp(leaderWords+'.{0,160}'+competitorWords,'i').test(raw)&&new RegExp(rejectionWords+'|'+preferenceWords,'i').test(raw);

  if(leaderPrefersCompetitor){
    addWarn('Geschäftsführer favorisiert Wettbewerber',45,25);
  }
  if(new RegExp(leaderWords+'.{0,120}'+rejectionWords,'i').test(raw)){
    addWarn('Entscheider lehnt unsere Lösung ab',35,30);
  }
  if(new RegExp(competitorWords+'.{0,100}(workshop|demo|pilot|proof|poc|test|präsentation|angebot)','i').test(raw)){
    addWarn('Wettbewerber bereits aktiv',25,35);
  }
  if(new RegExp('(budget).{0,80}(nicht|kein|fehlt|gestrichen|unklar|abgelehnt)','i').test(raw)){
    addWarn('Budget-Freigabe durch GF/CFO noch offen → Strategie: Pilotmodell oder schrittweise Einführung vorschlagen',20,45);
  }
  if(new RegExp('(entscheidung|projekt|go-live|start|kauf).{0,80}(verschoben|verzögert|später|unklar|pausiert|gestoppt|eingefroren)','i').test(raw)){
    addWarn('Entscheidung verzögert oder gestoppt',20,45);
  }
  if(new RegExp('(budget).{0,80}(genehmigt|freigegeben|bestätigt)','i').test(raw)){
    addPos('Operatives Budget vorhanden',5);
  }
  if(new RegExp(leaderWords+'.{0,120}(sponsor|unterstützt|treibt|will|priorität|dringend)','i').test(raw)){
    addPos('Operativer Sponsor unterstützt aktiv',5);
  }
  const championWords='(champion|fürsprecher|unterstützer|treiber|sponsor)';
  const departureWords='(verlässt (das unternehmen|die firma|uns)|hat gekündigt|kündigt (zum|in|im|nächst|demnächst)|wechselt (den arbeitgeber|die firma|das unternehmen)|ist nicht mehr (im unternehmen|verfügbar|erreichbar|an bord)|zieht (seine|ihre) unterstützung zurück|fällt (als (champion|fürsprecher|sponsor) )?(komplett )?weg)';
  const trustPhrasePattern=/(verlässt sich|verlassen sich|sich .{0,15}verlassen|verlass(en)? auf|verlässlich|vertrau)/i;
  const championDepartureRe=new RegExp(championWords+'.{0,80}'+departureWords,'i');
  const championDepartureMatch=raw.match(championDepartureRe);
  if(championDepartureMatch&&!trustPhrasePattern.test(championDepartureMatch[0])){
    addWarn('Interner Champion verlässt das Unternehmen',30,30);
  }
  return {warning,positive,penalty,scoreCap};
}

function applyHealthRiskRules(baseScore,risk){
  let score=Number(baseScore)||0;
  score=score-risk.penalty;
  if(risk.scoreCap!==null&&risk.scoreCap!==undefined){
    score=Math.min(score,risk.scoreCap);
  }
  return Math.max(0,Math.min(100,Math.round(score)));
}

function buildHealthPrompt(cust,allResults,kontext,phaseAdditions){
  let s='Du bewertest den "Opportunity Health" einer B2B-Vertriebsopportunity ausschließlich auf Basis der folgenden, tatsächlich erfassten Informationen. Erfinde NIEMALS ein Signal, das nicht wörtlich oder sinngemäß im Text vorkommt – jedes Signal muss auf eine echte Textstelle zurückführbar sein.\n\n';
  s+='KUNDE: '+(cust.firma||'')+'\n\n';

  // Ergänzungen = harte Fakten mit Vorrang vor älteren Phasenergebnissen
  if(kontext||phaseAdditions){
    s+='=== AKTUELLE ERKENNTNISSE UND ERGÄNZUNGEN (höchste Priorität – überschreiben ältere Phasenergebnisse bei Widerspruch) ===\n';
    s+='WICHTIG: Diese Informationen sind neuer als die Phasenergebnisse unten. Wenn ein Fakt hier explizit bestätigt wird (z.B. "Person X ist Entscheider und darf alleine beauftragen"), dann ist dieses Thema GEKLÄRT – auch wenn ältere Phasenergebnisse noch "offen" oder "unklar" sagen. Harte neue Fakten gewinnen immer.\n\n';
    if(kontext)s+='--- Globale Ergänzungen ---\n'+kontext.slice(0,3000)+'\n\n';
    if(phaseAdditions)s+='--- Phasenspezifische Ergänzungen ---\n'+phaseAdditions.slice(0,5000)+'\n\n';
    s+='=== ENDE AKTUELLE ERKENNTNISSE ===\n\n';
  }

  if(allResults.length){
    s+='=== FRÜHERE PHASENERGEBNISSE (können durch obige Ergänzungen überholt sein – bei Widerspruch gelten die Ergänzungen oben) ===\n';
    allResults.forEach(r=>{if(r.text)s+='--- '+r.title+' ---\n'+r.text.slice(0,3000)+'\n\n';});
    s+='=== ENDE FRÜHERE PHASENERGEBNISSE ===\n\n';
  }
  s+=`Der Opportunity Health Score repräsentiert die geschätzte Wahrscheinlichkeit eines erfolgreichen Auftragsgewinns – basierend auf allen bekannten Informationen, deiner B2B-Vertriebserfahrung und typischen Vertriebsmustern.

KRITISCH – DER SCORE MISST NICHT: Dokumentationsqualität, Informationsmenge, Bearbeitungsfortschritt oder Anzahl ausgefüllter Felder. Die Menge der gesammelten Informationen ist NEUTRAL für den Score. Mehr dokumentierte Information darf den Score NICHT automatisch erhöhen. Bewerte stattdessen jede einzelne Information danach, ob sie die TATSÄCHLICHE Abschlusswahrscheinlichkeit erhöht, senkt, oder unverändert lässt.

Beispiele für deutliche SENKUNG: Geschäftsführer/CEO/Entscheider mag unsere Lösung nicht; Geschäftsführer/CEO/Entscheider präferiert zwei andere Mitbewerber; Wettbewerber führt bereits Workshops durch oder ist stark etabliert; Wettbewerber bietet kritische Funktion besser; Entscheidung wird verschoben oder das Projekt verschoben; Budget entfällt; interner Champion verlässt das Unternehmen (NUR wenn explizit so beschrieben, nicht bei bloßer Champion-Erwähnung); CIO/IT blockiert oder bevorzugt eine vorhandene Alternativlösung (z.B. ein bereits lizenziertes Konkurrenzsystem oder eine SAP-/ERP-Inhouse-Alternative).
Beispiele für ERHÖHUNG: Budget bestätigt; Entscheider aktiv eingebunden; wirtschaftlicher Nutzen bestätigt; starker Sponsor vorhanden; Schmerz wurde konkret quantifiziert (z.B. mit einer Zahl/Häufigkeit belegt, nicht nur allgemein beschrieben).

K.O.-KRITERIEN (harte Dealbreaker – dominieren IMMER alle anderen Signale, auch wenn viele Positivsignale vorliegen):
- Entscheider (GF/CEO/CFO/Vorstand/wirtschaftlicher Entscheider) lehnt unsere Lösung klar ab
- Entscheider bevorzugt klar einen konkreten Mitbewerber
- Budget ist komplett entfallen, gestrichen oder endgültig abgelehnt
- Entscheidung/Projekt ist final gestoppt oder auf unbestimmte Zeit eingefroren
- Interner Champion/Fürsprecher verlässt das Unternehmen, kündigt, fällt aus, ist nicht mehr verfügbar oder zieht seine Unterstützung zurück – NUR wenn der Text das ausdrücklich so beschreibt. Die bloße Erwähnung/Existenz eines Champions oder Fürsprechers ist KEIN Risiko und darf niemals zu diesem K.O.-Signal führen.

Wenn EINES dieser K.O.-Kriterien zutrifft: Score MUSS unter 35 liegen (Label "Kritisch"), unabhängig davon wie viele positive Signale sonst vorliegen. Das betroffene Signal MUSS in der warning-Liste stehen, klar erkennbar als das dominante Problem.

Alle übrigen Signale (weder K.O. noch in obiger Liste) unterscheiden sich nochmal in ihrer Stärke:
- STARKE Signale (deutlich spürbarer Effekt auf den Score, aber kein K.O.): ein konkret quantifizierter Schmerzpunkt (z.B. "X Arbeitstage Mehraufwand pro Vorgang"), ein bestätigter Sponsor/Champion, eine bestätigte, mehrfach wiederkehrende geschäftliche Auswirkung (z.B. "X gescheiterte Entscheidungen pro Jahr wegen fehlerhafter Daten"), eine klar bestätigte Budgetfreigabe. Diese Signale sollen den Score spürbar stärker bewegen als kleinere Detailpunkte.
- LEICHTE Signale (geringer Effekt): einzelne Detailinformationen, organisatorische Nebensächlichkeiten, unklare/vage Aussagen ohne Zahl oder konkrete Konsequenz.
Bewerte explizit, welche Signale STARK und welche LEICHT sind, bevor du den Gesamtscore festlegst – ein einzelnes starkes Signal darf nicht von mehreren leichten Signalen "weggemittelt" werden.

Bewerte zusätzlich die strukturelle Qualifizierung (Bedarf, Budget, Entscheider, Zeitrahmen, Business Case, Wettbewerbssituation – max. 6 Kriterien) nur um einzuschätzen, wie VIELE davon noch offen/unklar sind (für die Vorläufig-Kennzeichnung) – NICHT um daraus selbst den Score zu erhöhen.

KRITISCH – FÜNF KONSISTENZREGELN FÜR DIE SIGNALE:

1. KEINE WIDERSPRÜCHE: Ein Signal darf NIEMALS einer bereits bestätigten Information widersprechen. Wenn z.B. eine Person namentlich als Ansprechpartner/Entscheider bekannt ist, darf NICHT gleichzeitig ein Warnsignal "Entscheider nicht identifiziert" erscheinen. Wenn unklar ist, ob diese Person Budget-Autorität hat oder wer über ihr entscheidet, ist das ein OFFENER PUNKT ("Budget-Autorität von [Name] unklar"), kein Warnsignal.

2. WARNSIGNALE NUR AUS FAKTEN/KLAR GEKENNZEICHNETER BEWERTUNG, NIEMALS AUS BRANCHENANNAHMEN: Ein Warnsignal darf ausschließlich aus tatsächlich im Text genannten Informationen entstehen – niemals aus einer allgemeinen Branchenvermutung. "Produktionsunternehmen" bedeutet NICHT automatisch SAP. Nenne ein ERP-System (SAP, Microsoft, Oracle, Infor usw.) in einem Warnsignal NUR, wenn es im Text tatsächlich erwähnt wurde. Erfinde KEIN Wettbewerbsrisiko, das nicht im Text belegt ist.

3. WARNSIGNALE VS. OFFENE PUNKTE STRIKT TRENNEN: Ein Warnsignal ist ein ECHTES Deal-Risiko – etwas, das den Deal aktiv gefährdet (z.B. "Entscheidung verschoben", "Wettbewerber bereits aktiv", "CIO blockiert", "internes Projekt konkurriert", "negativer Pilot", "fehlender Champion", "Budget eingefroren"). Eine FEHLENDE Information ist KEIN Warnsignal, sondern gehört unter "open" (z.B. "Budgethöhe unbekannt", "Budgetentscheider offen", "ROI noch nicht quantifiziert", "Zeitplan offen", "Anzahl Nutzer offen"). Stelle dir bei jedem Punkt die Frage: "Ist das ein aktives Risiko, das den Deal gefährdet, oder fehlt hier nur noch eine Information?" – im zweiten Fall gehört der Punkt zwingend unter "open", nicht unter "warning".

4. POSITIVE SIGNALE NUR AUS BESTÄTIGTEN FAKTEN: Ein positives Signal darf nur erscheinen, wenn es wirklich bestätigt ist – nicht bei reinem Interesse oder vagen Andeutungen. Schreibe NICHT "Champion aktiv", wenn nur allgemeines Interesse gezeigt wurde. Erlaubt sind nur konkret belegte positive Signale wie "Entscheider identifiziert", "Schmerz quantifiziert", "Geschäftsauswirkung bestätigt", "Workshop vereinbart", "Budget genannt", "Pilot zugesagt".

5. OFFENE PUNKTE MÜSSEN EINEN SCHRITT WEITERDENKEN, NICHT BEREITS BESTÄTIGTES WIEDERHOLEN: Ein offener Punkt darf NIEMALS eine Frage stellen, die durch bereits bestätigte Informationen schon beantwortet ist. Bestätigte Erkenntnisse sind die Arbeitsgrundlage – baue auf ihnen auf und leite daraus die NÄCHSTE noch ungelöste Wissenslücke oder das nächste offene Entscheidungskriterium ab, statt dieselbe Frage erneut zu stellen. Beispiel: Wenn bereits bestätigt ist "Cloud-Lösung mit täglicher Spiegelung wäre für den Inhaber akzeptabel, IT hat technische Machbarkeit bestätigt", ist "Würde der Inhaber eine Cloud-Lösung mit Spiegelung akzeptieren?" KEIN gültiger offener Punkt mehr (das ist bereits beantwortet) – stattdessen z.B. "Ist die Spiegelungsarchitektur verbindlich umsetzbar?" oder "Welches konkrete Entscheidungskriterium des Inhabers ist jetzt noch offen?". Prüfe vor jedem offenen Punkt: "Wurde das bereits durch ein bestätigtes positives Signal beantwortet?" – falls ja, formuliere stattdessen die nächste, tiefere Frage.

Jeder Punkt darf in GENAU EINER der drei Kategorien (positive/warning/open) erscheinen – niemals doppelt, niemals widersprüchlich zu einem anderen Punkt. KRITISCH: Wenn "Budget bestätigt" in positive steht, darf "Budget kritisch oder unklar" NICHT in warning stehen. Wenn "Entscheider aktiv eingebunden" in positive steht, darf "Entscheider nicht eingebunden" NICHT in warning stehen. Widersprüche zwischen Kategorien sind der häufigste Qualitätsfehler – vor dem Abschluss immer prüfen ob positive und warning sich inhaltlich widersprechen.

QUALITÄTSREGEL – FAKT VS. BEWERTUNG KONSEQUENT TRENNEN (gilt für alle drei Kategorien):
- Positive Signale: formuliere sie so, dass der Verkäufer sofort erkennt, ob das ein bestätigter Fakt ("Schmerz quantifiziert: 5.000 €/Monat Einsparung bestätigt") oder eine KI-Einschätzung ("Entscheider wirkt grundsätzlich offen für externe Lösungen") ist.
- Bei bestätigten Fakten: nutze konkrete, belegte Formulierungen ("Inhaber hat Cloud-Lösung mit Spiegelung akzeptiert", "CFO unterstützt aktiv").
- Bei Interpretationen/Schlussfolgerungen: nutze Sprache wie "wirkt", "scheint", "lässt darauf schließen" oder nenne explizit, woraus du schlussfolgrest.
- Niemals eine Interpretation als Fakt formulieren – das würde den Verkäufer über seinen eigenen Wissensstand täuschen.

QUALITÄTSREGEL – PREISRISIKEN MÜSSEN DIREKT UND EINDEUTIG FORMULIERT SEIN: Ein Preisrisiko muss immer beschreiben, was passiert wenn der Kunde weiter verhandelt — nicht nur einen Abstand zu einer Grenze. Korrekt: "Angebot bereits stark reduziert — weiterer Preisnachlass wirtschaftlich kaum möglich." Falsch: "100 € Spielraum unter Budget." Im SaaS-/Software-Kontext gilt: Lizenzpreise sind standardmäßig jährlich wiederkehrend (ARR), keine Einmalkosten. Ein Preisrisiko im SaaS-Kontext betrifft daher immer die jährliche Belastung, nicht einen einmaligen Betrag. Wenn unklar ist ob ein Budget-Limit jährlich oder einmalig gemeint ist, nenne das als offenen Punkt.

QUALITÄTSREGEL – SPONSOR ≠ ENTSCHEIDER (Health-Signale): Positive Signale zu Entscheidern dürfen nur formuliert werden wenn Entscheidungsbefugnis explizit bestätigt ist. Korrekt: "Operativer Sponsor aktiv: [Name]". Falsch: "Entscheider unterstützt aktiv" wenn nur Unterstützung, nicht Entscheidungsbefugnis bekannt ist. Warnhinweis wenn Entscheider (GF/CEO/CFO) noch nicht identifiziert oder eingebunden.

QUALITÄTSREGEL – BUDGETSTATUS IM SCORE: "Budget bestätigt" als positives Signal nur wenn Budgetfreigabe durch entscheidungsbefugte Person explizit bestätigt. Wenn nur Budgetrahmen oder Budgettopf bekannt: als offenen Punkt formulieren "Budgetrahmen vorhanden, Freigabe durch [Rolle] ausstehend" — nicht als positives Signal werten.

QUALITÄTSREGEL – JEDES RISIKO LIEFERT EINE STRATEGIE:
Jedes Warnsignal (warning) MUSS mit einem konkreten Handlungsimpuls verbunden sein. Das Warnsignal beschreibt das Risiko, der Handlungsimpuls zeigt, was dagegen getan werden kann. Format: "Risiko: [Kurze Beschreibung] → Strategie: [konkrete Handlung oder Positionierung]". Beispiele: "Budget kritisch oder unklar → Strategie: Pilotmodell oder modulare Einführung unter 50.000 € vorschlagen." oder "Inhaber skeptisch gegenüber externer Software → Strategie: Demo als 'Innovation im Vertrieb', nicht als CRM-Einführung positionieren." Wenn du für ein Risiko keine sinnvolle Strategie ableiten kannst, ist das ein Zeichen, dass das Signal zu unspezifisch ist – schärfe es dann zuerst.

Bewerte außerdem unabhängig davon die folgenden 11 Qualifizierungskriterien (MEDDPICC-basiert) jeweils einzeln als "geklärt" (true) oder "offen" (false). Ein Kriterium gilt als "geklärt", sobald DAZU IRGENDEINE konkrete Information vorliegt (egal ob positiv oder negativ/kritisch) – "offen" gilt nur, wenn dazu noch GAR NICHTS bekannt ist. KEIN Einfluss auf den Score, dient ausschließlich der separaten Checkliste:
1. need (Bedarf / Schmerz) – geklärt sobald ein konkreter Schmerzpunkt/Bedarf benannt ist
2. budget (Budget) – geklärt sobald irgendeine Aussage zu Budget/Kosten/Investitionsbereitschaft vorliegt, auch wenn unklar/kritisch
3. economicBuyer (Entscheider / wirtschaftlicher Entscheider) – geklärt sobald eine Person/Rolle als (Mit-)Entscheider benannt ist
4. timeline (Zeitrahmen) – geklärt sobald ein Zeitfenster, Datum oder Dringlichkeit genannt wird
5. metrics (Business Case / messbarer Nutzen) – geklärt sobald eine quantifizierte oder zumindest grob umrissene Nutzenkennzahl vorliegt
6. competition (Wettbewerbssituation) – geklärt sobald IRGENDEIN Wettbewerber, eine Präferenz, ein Gatekeeping- oder Integrationskriterium genannt wird – auch wenn das Signal negativ/kritisch ist (z.B. "Kunde bevorzugt Wettbewerber X" macht dieses Kriterium GEKLÄRT, nicht offen)
7. champion (Champion / interner Fürsprecher) – geklärt sobald eine Person als interner Unterstützer/Treiber benannt ist
8. decisionProcess (Entscheidungsprozess) – geklärt sobald bekannt ist, wer wie entscheidet (Gremium, Stufen, Freigaben)
9. decisionCriteria (Entscheidungskriterien des Kunden) – geklärt sobald bekannt ist, wonach der Kunde die Lösung bewertet/auswählt
10. paperProcess (Vertragsprozess) – geklärt sobald etwas zu Einkauf, Rechtsabteilung, Vertragsformalitäten bekannt ist
11. negativeConsequences (Kosten des Nicht-Handelns) – geklärt sobald benannt ist, was passiert/kostet, wenn nichts verändert wird

Antworte AUSSCHLIESSLICH mit folgendem JSON, keine Erklärung davor/danach:
{"score":<Zahl 0-100, Auftragswahrscheinlichkeit>,"label":"<ein Wort: Kritisch/Stabil/Gesund/Stark>","structuralOpenCount":<Zahl 0-6, wie viele der 6 strukturellen Kriterien noch offen/unklar sind>,"positive":[{"text":"<kurzes positives Signal, max 8 Wörter>"}],"warning":[{"text":"<kurzes Warnsignal, max 8 Wörter>"}],"open":[{"text":"<offener kritischer Punkt, max 8 Wörter>"}],"checklist":{"need":<true/false>,"budget":<true/false>,"economicBuyer":<true/false>,"timeline":<true/false>,"metrics":<true/false>,"competition":<true/false>,"champion":<true/false>,"decisionProcess":<true/false>,"decisionCriteria":<true/false>,"paperProcess":<true/false>,"negativeConsequences":<true/false>}}
Maximal 5 Einträge pro Liste. Wenn keine Signale einer Kategorie vorliegen, leeres Array.`;
  return s;
}

// savePhaseSnapshot: isolierter Health-Call mit NUR den Daten dieser einen Phase.
// Kein kk, keine anderen Phasenergebnisse — ergibt ausschließlich phaseneigene Signale.
// Alle Signale werden mit sourcePhase getaggt. Globaler Score bleibt unverändert.
async function savePhaseSnapshot(accId,sitId){
  if(!accId||sitId===undefined)return;
  const cust=(LS.get('ki21_acc',[]).find(a=>a.id===accId)||{}).cust;
  if(!cust||!cust.firma)return;
  const sit=SITS[sitId];
  if(!sit)return;
  const d=LS.get('ki21_st_'+accId+'_'+sitId,null);
  if(!d||!d.result)return;
  const singleResult=[{title:sit.title,text:d.result}];
  const prompt=buildHealthPrompt(cust,singleResult,'','');
  const json=await callClaudeJSON(prompt);
  if(json&&typeof json.score==='number'){
    const tag=(arr)=>(arr||[]).map(s=>({...s,sourcePhase:sit.id||sitId}));
    LS.set('ki21_phase_snap_'+accId+'_'+sitId,{
      positive:tag(json.positive),
      warning:tag(json.warning),
      open:tag(json.open||[]),
      sourcePhase:sit.id||sitId,
      ts:Date.now()
    });
  }
}

// Setzt einen einfachen "neue Erkenntnisse vorhanden"-Flag nach jeder Ergänzung.
// Kein KI-Call, keine Impact-Analyse. Der Verkäufer entscheidet selbst wann er
// eine vollständige Neubewertung startet (Opportunity neu bewerten).
function buildKkForSitId(accId,sitId){
  let kk='';
  for(let i=0;i<=sitId;i++){
    const slot=LS.get('ki21_kk_'+accId+'_'+i,'');
    if(slot&&slot.trim())kk+=slot.trim()+'\n';
  }
  return kk.trim();
}

// Phasenspezifische Impact-Analyse nach neuen Ergänzungen.
// Speichert pro Phase ein Pending-Flag mit Begründung — kein Auto-Regenerieren.
async function runPhaseImpactAnalysis(accId, newInsight){
  if(!accId||!newInsight||!newInsight.trim())return;
  const cust=(LS.get('ki21_acc',[]).find(a=>a.id===accId)||{}).cust||{};
  const generatedPhases=[];
  for(let i=0;i<5;i++){
    const d=LS.get('ki21_st_'+accId+'_'+i,null);
    if(d&&(d.result||d.result2))generatedPhases.push(i);
  }
  if(!generatedPhases.length)return;
  const phaseLabels=['Phase 1: Qualifizierung','Phase 2: Bedarfsanalyse & Demo',
    'Phase 3: Termin nachbereiten','Phase 4: Wirtschaftlicher Nutzen','Phase 5: Angebot & Abschluss'];
  const prompt=`Du bist ein erfahrener B2B-Vertriebscoach. Entscheide welche Vertriebsphasen durch eine neue Erkenntnis inhaltlich betroffen sind.

Firma: ${cust.firma||'–'}, Branche: ${cust.branche||'–'}
Neue Erkenntnis: "${newInsight.trim()}"
Bereits bearbeitete Phasen: ${generatedPhases.map(i=>phaseLabels[i]).join(', ')}

STRIKTE REGEL: "Betroffen" bedeutet: Strategie, Argumente, Fragen oder Einschätzungen müssen sich ändern.
NICHT betroffen: Statusbestätigungen, Terminverschiebungen, reine Namens-/Titeländerungen.
Typische Betroffenheit: Schmerz/Schaden→P1,P2,P4 | Entscheider→P1,P5 | Technik→P2,P4 | Termin→P3 | Budget→P1,P4,P5 | Wettbewerb→P2,P5

Antworte NUR mit JSON:
{"affected":[{"id":0,"reason":"1 Satz"},{"id":1,"reason":"..."}]}
Nur betroffene Phasen einschließen.`;
  try{
    const json=await callClaudeJSON(prompt);

function getKoSeverity(text){
  const t=(text||'').toLowerCase();
  const leaderWords='(geschäftsführer|gf|ceo|cfo|geschäftsleitung|entscheider|leitung|vorstand|sponsor|cio)';
  const competitorWords='(mitbewerb|mitbewerber|wettbewerb|wettbewerber|konkurrent|konkurrenz)';
  const preferenceWords='(präfer|bevorzug|favoris|favorit|gesetzt|vorne|tendier)';
  const rejectionWords='(mag .*nicht|will .*nicht|lehnt .*ab|skeptisch|dagegen|kein interesse|nicht überzeugt|ablehn)';
  // Reihenfolge = Schweregrad, niedrigster Deckel zuerst geprüft
  if(new RegExp(leaderWords+'.{0,80}'+preferenceWords+'.{0,80}'+competitorWords,'i').test(t))return {penalty:45,cap:25};
  if(new RegExp(competitorWords+'.{0,80}'+preferenceWords,'i').test(t))return {penalty:45,cap:25};
  if(new RegExp(leaderWords+'.{0,80}'+rejectionWords,'i').test(t))return {penalty:35,cap:30};
  const championDepartureMatch2=t.match(/(champion|fürsprecher|sponsor).{0,60}(verlässt (das unternehmen|die firma|uns)|hat gekündigt|kündigt (zum|in|im)|wechselt (den arbeitgeber|die firma|das unternehmen)|nicht mehr (im unternehmen|verfügbar|erreichbar)|zieht (seine|ihre) unterstützung zurück|fällt (komplett )?weg)/i);
  if(championDepartureMatch2&&!/(verlässt sich|verlassen sich|sich .{0,15}verlassen|verlass(en)? auf|verlässlich|vertrau)/i.test(championDepartureMatch2[0]))return {penalty:30,cap:30};
  if(/budget.{0,40}(komplett gestrichen|vollständig entfallen|endgültig abgelehnt)/i.test(t))return {penalty:20,cap:45};
  if(/(entscheidung|projekt).{0,40}(final gestoppt|endgültig gestoppt|auf unbestimmte zeit eingefroren)/i.test(t))return {penalty:20,cap:45};
  return null;
}
function isKoSignalText(text){ return getKoSeverity(text)!==null; }

function _getOpportunityHealthBase(accId){
  const auto=LS.get('ki21_health_'+accId,null);
  const allResults=[];
  SITS.forEach((sit,i)=>{
    const d=LS.get('ki21_st_'+accId+'_'+i,null);
    if(d&&d.result)allResults.push({title:sit.title,text:d.result});
  });
  const risk=getAdditionRiskSignals(accId,allResults);
  if(!auto){
    if(risk.warning.length||risk.positive.length){
      let cap=null;
      risk.warning.forEach(w=>{const sev=getKoSeverity(w.text);if(sev)cap=cap===null?sev.cap:Math.min(cap,sev.cap);});
      const score=cap!==null?Math.min(55,cap):55;
      return {score,label:score<35?'Kritisch':'Stabil',provisional:true,positive:risk.positive,warning:risk.warning,open:[],structuralOpenCount:6,isKo:cap!==null};
    }
    return null;
  }
  const manual=getHealthManual(accId);
  const positive=(auto.positive||[]).map(s=>({text:s.text,origin:'AUTO',type:'positive',disabled:manual.removedAutoTexts.includes(s.text)}));
  const warning=(auto.warning||[]).map(s=>({text:s.text,origin:'AUTO',type:'warning',disabled:manual.removedAutoTexts.includes(s.text)}));
  const open=(auto.open||[]).map(s=>({text:s.text,origin:'AUTO',type:'open',disabled:manual.removedAutoTexts.includes(s.text)}));
  risk.warning.forEach(r=>{ if(!warning.find(w=>w.text===r.text)) warning.unshift({...r,disabled:manual.removedAutoTexts.includes(r.text)}); });
  risk.positive.forEach(r=>{ if(!positive.find(w=>w.text===r.text)) positive.unshift({...r,disabled:manual.removedAutoTexts.includes(r.text)}); });
  manual.added.forEach(m=>{
    const entry={text:m.text,origin:'MANUELL',type:m.type,disabled:m.active===false};
    if(m.type==='positive')positive.push(entry);
    else if(m.type==='warning')warning.push(entry);
    else open.push(entry);
  });
  // EINE einzige Quelle der Wahrheit für K.O.-Erkennung: getKoSeverity prüft jeden aktiven (nicht ausgeblendeten) Warnsignal-Text.
  // K.O. wirkt NUR als Score-Deckel (schlimmster Fall gewinnt) - NIE als zusätzliche, aufsummierbare Strafe.
  // Architektur-Korrektur: Ein rein lokal per Regex erkanntes Signal (origin='ERGAENZUNG') darf den Score NICHT
  // allein hart deckeln - das würde bedeuten, dass eine ungeprüfte Textmustererkennung die KI-Bewertung
  // überstimmt. Nur von der KI selbst bestätigte (AUTO) oder bewusst vom Nutzer eingegebene (MANUELL)
  // Signale dürfen den K.O.-Deckel auslösen. ERGAENZUNG-Signale bleiben als Hinweis sichtbar, capen aber nicht.
  const activeWarnings=warning.filter(w=>!w.disabled&&w.origin!=='ERGAENZUNG');
  let koCapMin=null;
  activeWarnings.forEach(w=>{
    const sev=getKoSeverity(w.text);
    if(sev)koCapMin=koCapMin===null?sev.cap:Math.min(koCapMin,sev.cap);
  });
  const hasActiveKo=koCapMin!==null;
  // Moderate +-3 Wirkung nur für NICHT-K.O.-Signale (normale Risiko-Signale)
  const manualPositiveCount=manual.added.filter(m=>m.type==='positive'&&m.active!==false).length;
  const manualWarningCount=manual.added.filter(m=>m.type==='warning'&&m.active!==false&&!isKoSignalText(m.text)).length;
  const disabledAutoPositive=positive.filter(s=>(s.origin==='AUTO'||s.origin==='ERGAENZUNG')&&s.disabled).length;
  const disabledAutoWarning=warning.filter(s=>(s.origin==='AUTO'||s.origin==='ERGAENZUNG')&&s.disabled&&!isKoSignalText(s.text)).length;
  let base=auto.score+manualPositiveCount*3-manualWarningCount*3-disabledAutoPositive*3+disabledAutoWarning*3;
  let score=Math.max(0,Math.min(100,Math.round(base)));
  if(hasActiveKo)score=Math.min(score,koCapMin);
  const provisional=(auto.structuralOpenCount||0)>3;
  const label=hasActiveKo?'Kritisch':(score<35?'Kritisch':(score<70?'Stabil':(auto.label||'Gesund')));
  return {score,label,provisional,positive,warning,open,structuralOpenCount:auto.structuralOpenCount||0,checklist:auto.checklist||null,isKo:hasActiveKo,ts:auto.ts||0};
}

function normalizeEuroNumber(str){
  let s=String(str||'').trim().toLowerCase();
  if(!s)return null;
  const hasK=/k\b|k€|tausend/.test(s);
  s=s.replace(/€/g,'').replace(/eur/g,'').replace(/\s/g,'').replace(/k€?/g,'').replace(/tausend/g,'');
  if(/,\d{1,2}$/.test(s))s=s.replace(/\./g,'').replace(',','.');
  else s=s.replace(/[.,]/g,'');
  let n=parseFloat(s);
  if(!isFinite(n))return null;
  if(hasK||n<1000&&/\b\d{1,3}\s*k/i.test(str))n*=1000;
  return Math.round(n);
}
function extractEuroNumbers(text){
  const out=[];
  const src=String(text||'');
  const re=/(\d{1,3}(?:[\.\s]\d{3})+(?:,\d{1,2})?|\d+(?:,\d{1,2})?)\s*(?:k\s*)?(?:€|eur|euro|k€|k\b)?/gi;
  let m;
  while((m=re.exec(src))){
    const token=m[0];
    if(!/(€|eur|euro|k\b|k€|\.|,|\d{4,})/i.test(token))continue;
    const n=normalizeEuroNumber(token);
    if(n&&n>=100)out.push({value:n,index:m.index,token});
  }
  return out;
}
function getCustomerBudgetNumbers(accId){
  const raw=getCurrentUserKnowledgeText(accId)+'\n'+getBudgetOfferContextText(accId);
  const nums=[];
  const budgetRe=/(budget|budgetrahmen|budgettopf|budgetgrenze|investitionsrahmen|rahmen|freigabe|verfügbar|verfügbares budget|maximalbudget)/ig;
  let m;
  while((m=budgetRe.exec(raw))){
    const seg=raw.slice(Math.max(0,m.index-90),Math.min(raw.length,m.index+160));
    extractEuroNumbers(seg).forEach(x=>nums.push(x.value));
  }
  // Spezialfall: "50-60k" im Budgetsegment
  const rangeRe=/(budget|budgetrahmen|budgettopf|budgetgrenze|investitionsrahmen|rahmen).{0,100}?(\d{1,3})\s*[–\-]\s*(\d{1,3})\s*k/ig;
  while((m=rangeRe.exec(raw))){nums.push(parseInt(m[2],10)*1000,parseInt(m[3],10)*1000);}
  return [...new Set(nums)].filter(n=>n>=1000).sort((a,b)=>a-b);
}
function getOfferNumbers(){
  const raw=getCompanyOfferText();
  const nums=extractEuroNumbers(raw).map(x=>x.value).filter(n=>n>=100 && n<=10000000);
  return [...new Set(nums)].sort((a,b)=>a-b);
}

function getGenericOfferBudgetFit(accId){

}

function sanitizeBudgetPriceText(accId,text,kind){
  if(!text)return text;

  if(fit.fits&&isObsoleteBudgetPriceConfusion(text)){
    if(kind==='positive')return fit.entryRole?'Startangebot liegt klar im Budgetrahmen':'Angebot liegt klar im Budgetrahmen';
    if(kind==='missing'||kind==='open')return fit.entryRole?'Einstiegsumfang und Starttermin festlegen':'Umfang und Starttermin festlegen';
    if(kind==='risk'||kind==='warning')return fit.entryRole?'Startangebot noch nicht verbindlich gestartet':'Formale Beauftragung noch offen';
    return '';
  }
  if(fit.fits&&isPilotBeforeEntryOfferConfusion(accId,text)){
    if(kind==='warning'||kind==='risk')return 'Startangebot noch nicht verbindlich gestartet';
    return 'Starttermin und Erfolgskriterien festlegen';
  }
  return text;
}
function applyBudgetOfferPostProcessing(accId,health){
  if(!health)return health;
  const fit=getGenericOfferBudgetFit(accId);
  if(!fit.fits&&!fit.entryRole)return health;
  const copy={...health};
  const cleanMap=(arr,kind)=>(arr||[])
    .map(x=>{
      const text=x&&x.text?x.text:x;
      const cleaned=sanitizeBudgetPriceText(accId,text,kind);
      if(!cleaned)return null;
      return (x&&x.text)?{...x,text:cleaned}:cleaned;
    })
    .filter(Boolean);
  copy.positive=cleanMap(copy.positive,'positive');
  copy.warning=cleanMap(copy.warning,'warning');
  copy.open=cleanMap(copy.open,'open');
  if(fit.fits&&!copy.positive.find(x=>/(angebot|startangebot).{0,40}(budgetrahmen|budget)/i.test(x.text||''))){
    copy.positive.push({text:fit.entryRole?'Startangebot liegt klar im Budgetrahmen':'Angebot liegt klar im Budgetrahmen',origin:'REGEL',type:'positive',disabled:false});
  }
  copy.checklist={...(copy.checklist||{})};
  if(fit.fits)copy.checklist.budget=true;
  return copy;
}
function sanitizeDashboardTextForDecisionAuthority(accId,text,kind){
  if(!text)return text;
  const budgetClean=sanitizeBudgetPriceText(accId,text,kind==='missing'?'missing':kind);
  if(budgetClean!==text)return budgetClean;
  if(!hasConfirmedFullDecisionAuthority(accId))return text;
  if(isObsoleteGfCfoText(text)){
    const name=getConfirmedDecisionMakerName(accId);
    if(kind==='nextStep')return 'Mit '+name+' wirtschaftlichen Nutzen, Vermeidungsquote und Pilotstart validieren.';
    if(kind==='missing')return 'Wirtschaftlichen Nutzen und Vermeidungsquote mit '+name+' validieren.';
    return '';
  }
  return text;
}
function applyDecisionAuthorityPostProcessing(accId,health){
  const authorityDetected=hasConfirmedFullDecisionAuthority(accId)||hasAuthoritySignalInHealth(health);
  if(!health||!authorityDetected)return health;
  const copy={...health};
  const cleanArr=(arr)=>(arr||[]).filter(x=>!isObsoleteGfCfoText(x&&x.text?x.text:x));
  copy.positive=cleanArr(copy.positive);
  copy.warning=cleanArr(copy.warning);
  copy.open=cleanArr(copy.open);
  if(!copy.positive.find(x=>/entscheidungsbefugnis bestätigt/i.test(x.text||''))){
    copy.positive.unshift({text:'Entscheidungsbefugnis bestätigt',origin:'REGEL',type:'positive',disabled:false});
  }
  copy.checklist={...(copy.checklist||{})};
  copy.checklist.economicBuyer=true;
  copy.checklist.decisionProcess=true;
  copy.checklist.budget=true;
  copy.structuralOpenCount=Math.max(0,(copy.structuralOpenCount||0)-1);
  return copy;
}
// v4.139: Score, Matrix und harte Fakten müssen zusammenpassen.
// Wenn Entscheiderbefugnis, Budget und ein konkretes Angebot im Budgetrahmen bestätigt sind,
// darf der sichtbare Health Score nicht mehr wie eine schwache Opportunity wirken.
// Harte K.O.-Risiken bleiben unberührt und deckeln weiterhin.
function hasQuantifiedPainSignal(accId,health){
  const raw=(getCurrentUserKnowledgeText(accId)+'\n'+JSON.stringify(health||{})).toLowerCase();
  return /(80\.?000|80000|jahresschaden|jahresverlust|umsatzverlust|vermeidungsquote|4\s*(schlechte|verlorene|qualifizierte)?\s*deals|deals\/monat|pro monat)/i.test(raw);
}
function hasConfirmedBudgetSignal(accId,health){
  const raw=(getCurrentUserKnowledgeText(accId)+'\n'+JSON.stringify(health||{})).toLowerCase();
  return /(operatives budget vorhanden|budget vorhanden|budgetrahmen.{0,40}(vorhanden|bestätigt|verfügbar)|budget.{0,40}(vorhanden|bestätigt|verfügbar|freigegeben)|"budget"\s*:\s*true)/i.test(raw);
}
function hasConcretePainSignal(accId,health){
  const raw=(getCurrentUserKnowledgeText(accId)+'\n'+JSON.stringify(health||{})).toLowerCase();
  return hasQuantifiedPainSignal(accId,health)||/(schmerz.{0,50}(konkret|benannt|bestätigt|quantifiziert)|konkreter schmerz|problem.{0,40}(konkret|benannt|bestätigt))/i.test(raw);
}
function hasHardVisibleRisk(accId,health){
  const all=[...(health.warning||[]),...(health.open||[])].map(x=>String(x&&x.text?x.text:x)).join(' | ').toLowerCase();
  const raw=(getCurrentUserKnowledgeText(accId)+'\n'+all).toLowerCase();
  return /(entscheider.{0,40}(unklar|fehlt|offen)|kein budget|budget.{0,30}(fehlt|gestrichen|nicht vorhanden)|projekt.{0,40}(gestoppt|verschoben|pausiert)|wettbewerber.{0,50}(bevorzugt|favorisiert|gesetzt)|no[- ]?decision|keine nächste aktion|kein konkreter schmerz|schmerz.{0,30}(unklar|fehlt)|entscheidung.{0,30}(blockiert|unwahrscheinlich)|rechtliche sperre|procurement blockiert)/i.test(raw);
}
function applyScoreMatrixConsistencyPostProcessing(accId,health){
  if(!health)return health;
  const copy={...health};
  if(copy.isKo)return copy;

  const authority=hasConfirmedFullDecisionAuthority(accId);
  const budget=hasConfirmedBudgetSignal(accId,copy);
  const offerUnderBudget=hasKnownOfferUnderBudget(accId);
  const quantifiedPain=hasQuantifiedPainSignal(accId,copy);
  const concretePain=hasConcretePainSignal(accId,copy);
  const hardRisk=hasHardVisibleRisk(accId,copy);

  let floor=0;

  // v4.149: Score und Matrix konsistent halten.
  // Wenn die Kernkriterien positiv sind und nur normale Bremsen offen sind,
  // darf der Score nicht wie eine schwache Opportunity wirken.
  if(!hardRisk&&authority&&budget&&concretePain)floor=Math.max(floor,65);
  if(!hardRisk&&authority&&budget&&quantifiedPain)floor=Math.max(floor,65);
  if(!hardRisk&&authority&&budget&&concretePain&&offerUnderBudget)floor=Math.max(floor,68);
  if(!hardRisk&&authority&&budget&&quantifiedPain&&offerUnderBudget)floor=Math.max(floor,70);

  // Rückwärtskompatibilität mit alter Angebotsregel.
  if(!hardRisk&&authority&&offerUnderBudget)floor=Math.max(floor,60);
  if(!hardRisk&&authority&&offerUnderBudget&&quantifiedPain)floor=Math.max(floor,65);

  if(floor&&Number(copy.score||0)<floor){
    copy.score=floor;
    copy.label=floor>=70?'Gesund':'Stabil';
    copy.provisional=false;
  }
  return copy;
}
function getOpportunityHealth(accId){
  return applyScoreMatrixConsistencyPostProcessing(accId,applyBudgetOfferPostProcessing(accId,applyDecisionAuthorityPostProcessing(accId,_getOpportunityHealthBase(accId))));
}

function normalizeQuestionText(q,forPreview){
  let s=String(q||'').trim();
  s=s.replace(/^[•\-\s]*/,'').replace(/^[SPIN]\s*[:\-–]\s*/i,'').trim();
  s=s.replace(/\s+/g,' ');
  if(!s)return '';
  if(forPreview){
    const low=s.toLowerCase();
    if(low.includes('discovery')&&(low.includes('hubspot')||low.includes('notizen')||low.includes('e-mails')||low.includes('emails')))return 'Wo gehen Discovery-Informationen heute verloren?';
    if(low.includes('nachqualifizierung')||low.includes('reparatur'))return 'Wie viel Zeit kostet Nachqualifizierung pro Deal?';
    if(low.includes('discovery-fehler')||low.includes('deals später scheitern')||low.includes('verzögern'))return 'Welche Discovery-Fehler verzögern Abschlüsse?';
    if(low.includes('vermeidungsquote'))return 'Welche Vermeidungsquote hält der Entscheider für realistisch?';
    if(low.includes('wirtschaft')&&low.includes('wirkung'))return 'Welche wirtschaftliche Wirkung ist belastbar?';
    if(s.length>86)s=s.slice(0,83).replace(/\s+\S*$/,'')+'…';
  }
  return s;
}

function isExplicitNonActionImplication(q){
  const s=String(q||'').toLowerCase();
  return /^[\s•\-]*i\s*[:\-–]/i.test(String(q||'')) && /\b(wenn|falls)\b/.test(s) && /(nicht\s+(löst|gelöst|angeht|verändert|macht|adressiert|klärt)|nichts\s+(ändert|verändert|passiert|macht)|unverändert\s+bleibt|so\s+bleibt|zustand\s+bleibt|weiterhin)/i.test(s);
}
function buildExplicitNonActionQuestion(accId){
  const raw=(getCurrentUserKnowledgeText(accId)||'').toLowerCase();
  if(/forecast|pipeline|opportunit/i.test(raw))return 'I: Was passiert mit Forecast, Pipeline-Qualität und Vertriebszeit, wenn ihr dieses Problem in den nächsten 6 Monaten nicht löst?';
  if(/discovery|qualifizier/i.test(raw))return 'I: Was passiert mit Discovery-Qualität, Abschlussquote und Vertriebszeit, wenn ihr an der heutigen Qualifizierung nichts verändert?';
  return 'I: Was passiert in den nächsten 6 Monaten, wenn ihr dieses Problem nicht löst und der heutige Zustand bleibt?';
}
function ensureExplicitNonActionImplicationLines(lines,accId){
  let out=(lines||[]).map(x=>String(x||'').trim()).filter(Boolean);
  if(out.some(isExplicitNonActionImplication))return out;
  const idx=out.findIndex(l=>/^[\s•\-]*i\s*[:\-–]/i.test(l));
  const required=buildExplicitNonActionQuestion(accId);
  if(idx>=0)out.splice(idx+1,0,required); else out.push(required);
  return out;
}
function prioritizeNonActionQuestions(qs){
  const arr=(qs||[]).filter(Boolean);
  const hit=arr.find(q=>/(nicht\s+(löst|gelöst|angeht|verändert|macht|adressiert|klärt)|nichts\s+(ändert|verändert|passiert|macht)|unverändert\s+bleibt|so\s+bleibt|zustand\s+bleibt)/i.test(String(q)));
  if(!hit)return arr;
  return [hit,...arr.filter(q=>q!==hit)];
}

function extractQuestionsFromText(text){
  const out=[];
  const lines=String(text||'').split('\n');
  for(const line of lines){
    const t=line.trim();
    if(/^(?:•\s*)?[SPIN]\s*[:\-–]/i.test(t)||t.includes('?')){
      let q=normalizeQuestionText(t,false);
      if(q.length>8&&q.includes('?')&&!/^(KLÄREN|BESTÄTIGT|ANNAHME|DETAILS|EINSCHÄTZUNG|SCHMERZ|VERTRIEBSNOTIZEN|NÄCHSTER SCHRITT)/i.test(q))out.push(q);
    }
  }
  return [...new Set(out)];
}
function getDashboardQuestions(accId,maxItems,forPreview){
  const sources=[];
  const p2=LS.get('ki21_st_'+accId+'_1',{});
  if(p2&&p2.fv&&p2.fv.spin)sources.push(p2.fv.spin);
  if(p2&&p2.result)sources.push(p2.result);
  const p1=LS.get('ki21_st_'+accId+'_0',{});
  if(p1&&p1.result2)sources.push(p1.result2);
  if(p1&&p1.result)sources.push(p1.result);
  let qs=[];
  for(const src of sources){
    qs=extractQuestionsFromText(src);
    if(qs.length)break;
  }
  qs=qs.map(q=>normalizeQuestionText(q,!!forPreview)).filter(Boolean);
  qs=[...new Set(qs)];
  // v4.149: Nicht-Handeln-Implication im Cockpit bevorzugt zeigen, wenn vorhanden.
  qs=prioritizeNonActionQuestions(qs);
  return qs.slice(0,maxItems||3);
}



// v4.137 Cockpit-Matrix-Auffüllung: Dashboard darf nicht leer wirken.
// Wenn Score < 70, aber keine formalen Risiken vorhanden sind, werden die sichtbaren Bremsfaktoren
// aus offenen Punkten und bestätigten Lücken abgeleitet. Das ist Anzeige-Logik, kein neuer KI-Score.
function shortUniqueList(items,maxItems){
  const seen=new Set();
  const out=[];
  (items||[]).forEach(item=>{
    const text=String(item&&item.text?item.text:item||'').replace(/→ Strategie:.*/,'').trim();
    if(!text)return;
    const key=text.toLowerCase().replace(/[.,;:!?]/g,'');
    if(seen.has(key))return;
    seen.add(key);
    out.push(text);
  });
  return out.slice(0,maxItems||3);
}
function hasTextInList(list,pattern){
  return (list||[]).some(t=>pattern.test(String(t||'')));
}
function hasAuthoritySignalInHealth(health){
  const all=[]
    .concat((health&&health.positive)||[])
    .concat((health&&health.warning)||[])
    .concat((health&&health.open)||[])
    .map(x=>String(x&&x.text?x.text:x||''));
  return all.some(t=>/(entscheidungsbefugnis|entscheiderstatus|wirtschaftlicher entscheider|fachlicher entscheider).{0,50}(bestätigt|klar|vorhanden)|entscheider.{0,50}(bestätigt|klar)|kann.{0,50}(eigenständig|allein).{0,50}(entscheiden|freigeben|beauftragen)/i.test(t));
}
function hasBudgetSignalInHealth(health){
  const all=[]
    .concat((health&&health.positive)||[])
    .concat((health&&health.warning)||[])
    .concat((health&&health.open)||[])
    .map(x=>String(x&&x.text?x.text:x||''));
  return all.some(t=>/(operatives budget|budgetrahmen|budget).{0,60}(vorhanden|bestätigt|verfügbar|klar)/i.test(t));
}
function sanitizeCockpitTextFinal(accId,text,kind,opts){
  let x=String(text||'').trim();
  if(!x)return '';
  const authority=!!(opts&&opts.authority);
  const budgetFit=!!(opts&&opts.budgetFit);
  const budgetSignal=!!(opts&&opts.budgetSignal);
  const fit=getGenericOfferBudgetFit(accId);
  // Budget-/Preisverwechslungen im Cockpit immer entschärfen, sobald ein Budgetsignal oder ein echter Angebots-Fit vorliegt.
  // Falls kein Angebotspreis bekannt ist, bleibt es eine Angebots-/Umfangsfrage, aber keine Budget-Passung zu einem Budgetrahmen.
  if(isObsoleteBudgetPriceConfusion(x) && (budgetFit||budgetSignal||fit.fits)){
    if(kind==='positive')return fit.entryRole?'Startangebot liegt klar im Budgetrahmen':'Angebot liegt im Budgetrahmen';
    if(kind==='warning'||kind==='risk')return fit.entryRole?'Startangebot noch nicht verbindlich gestartet':'Angebotsumfang noch nicht verbindlich festgelegt';
    return fit.entryRole?'Einstiegsumfang und Starttermin festlegen':'Angebotsumfang und Starttermin klären';
  }
  x=sanitizeBudgetPriceText(accId,x,kind);
  // Nach der Budget-Säuberung nochmals prüfen: alte Budget-Fit-Fragen dürfen im Cockpit nicht sichtbar bleiben,
  // sobald ein passender Angebotsbaustein oder ein belastbares Budgetsignal vorhanden ist.
  if(isObsoleteBudgetPriceConfusion(x) && (budgetFit||budgetSignal||fit.fits)){
    if(kind==='positive')return fit.entryRole?'Startangebot liegt klar im Budgetrahmen':'Angebot liegt im Budgetrahmen';
    if(kind==='warning'||kind==='risk')return fit.entryRole?'Startangebot noch nicht verbindlich gestartet':'Angebotsumfang noch nicht verbindlich festgelegt';
    return fit.entryRole?'Einstiegsumfang und Starttermin festlegen':'Angebotsumfang und Starttermin klären';
  }
  if(authority&&isObsoleteGfCfoText(x)){
    if(/80\.?000|80000|schaden|jahresschaden|umsatzverlust|quote|vermeidungsquote|roi/i.test(x)){
      return (kind==='warning'||kind==='risk')?'Wirtschaftliche Wirkung mit Entscheider validieren':'Vermeidungsquote mit Entscheider validieren';
    }
    if(kind==='missing'||kind==='open')return 'Wirtschaftlichen Nutzen mit Entscheider validieren';
    if(kind==='warning'||kind==='risk')return 'Formale Beauftragung / Startentscheidung noch offen';
    return '';
  }
  return x;
}
function buildCockpitMatrixData(accId,health){
  const raw=getCurrentUserKnowledgeText(accId).toLowerCase();
  const authorityContext=hasConfirmedFullDecisionAuthority(accId)||hasAuthoritySignalInHealth(health);
  const budgetSignalContext=hasBudgetSignalInHealth(health)||/budget|freigabe|pilotstart|beauftragung/.test(raw);
  const lowPilotUnderBudget=hasLowKi21PilotUnderBudget(accId);
  const positives=shortUniqueList((health.positive||[]).filter(s=>!s.disabled).map(s=>sanitizeCockpitTextFinal(accId,s.text,'positive',{authority:authorityContext,budgetFit:lowPilotUnderBudget,budgetSignal:budgetSignalContext})),4);
  const risks=shortUniqueList((health.warning||[]).filter(s=>!s.disabled).map(s=>sanitizeCockpitTextFinal(accId,s.text,'warning',{authority:authorityContext,budgetFit:lowPilotUnderBudget,budgetSignal:budgetSignalContext})),4);
  const open=shortUniqueList((health.open||[]).map(s=>sanitizeCockpitTextFinal(accId,s.text,'open',{authority:authorityContext,budgetFit:lowPilotUnderBudget,budgetSignal:budgetSignalContext})),4);

  // Chancen aus bestätigten harten Fakten ergänzen, falls die KI-Liste zu dünn ist.
  if(authorityContext&&!hasTextInList(positives,/entscheidungsbefugnis|entscheider/i)){
    positives.unshift('Entscheidungsbefugnis bestätigt');
  }
  if(lowPilotUnderBudget&&!hasTextInList(positives,/angebot|startangebot|budgetrahmen|budget/i)){
    positives.push('Startangebot liegt klar im Budgetrahmen');
  } else if(/budget|freigabe|pilotstart|beauftragung/.test(raw)&&!hasTextInList(positives,/budget/i)){
    positives.push('Budgetrahmen vorhanden');
  }
  if(/80\.000|80000|schmerz|vermeidungsquote|schlechte deals|qualifizierte deals|discovery/.test(raw)&&!hasTextInList(positives,/schmerz|bedarf|nutzen/i)){
    positives.push('Schmerz konkret benannt');
  }

  // Wenn der Score sichtbar mittelmäßig ist, darf die Matrix nicht "keine Risiken" zeigen.
  // Dann sind fehlender Business Case, Pilotstart oder Vertragsprozess Bremsfaktoren.
  if((health.score||0)<70 && risks.length===0){
    if(!hasTextInList(open,/wirtschaft|nutzen|business|roi|vermeidungsquote/i)){
      risks.push('Business Case noch nicht belastbar');
    }
    if(!hasTextInList(open,/pilot|start|zeitplan/i)){
      risks.push('Pilotstart noch nicht verbindlich');
    }
    if(!hasTextInList(open,/vertrag|beschaffung|einkauf|paper/i)){
      risks.push('Vertragsprozess noch offen');
    }
  }

  // Offene Punkte auffüllen, damit "Die eine Sache" nicht leer oder zu generisch bleibt.
  if(!hasTextInList(open,/wirtschaft|nutzen|business|roi|vermeidungsquote/i)){
    open.push(authorityContext
      ? 'Wirtschaftlichen Nutzen mit Entscheider validieren'
      : 'Wirtschaftlichen Entscheider validieren');
  }
  if((health.score||0)<70 && !hasTextInList(open,/pilot|start/i))open.push('Pilotstart konkretisieren');
  if((health.score||0)<70 && !hasTextInList(open,/vertrag|beschaffung|einkauf|paper/i))open.push('Vertragsprozess klären');

  // Finale Cockpit-Säuberung: Budget-/Preisverwechslungen und überholte GF-Punkte dürfen nicht sichtbar bleiben.
  const cleanFinal=(list,kind)=>shortUniqueList((list||[]).map(t=>sanitizeCockpitTextFinal(accId,t,kind,{authority:authorityContext,budgetFit:lowPilotUnderBudget,budgetSignal:budgetSignalContext})).filter(Boolean),4);
  let finalPositive=cleanFinal(positives,'positive');
  let finalRisks=cleanFinal(risks,'warning');
  let finalOpen=cleanFinal(open,'open');
  if(lowPilotUnderBudget&&!hasTextInList(finalPositive,/angebot|startangebot|budgetrahmen|budget/i)){
    finalPositive.push('Startangebot liegt klar im Budgetrahmen');
  }
  if(authorityContext&&!hasTextInList(finalOpen,/wirtschaft|nutzen|vermeidungsquote|pilot|start/i)){
    finalOpen.push('Wirtschaftlichen Nutzen und Pilotkriterien validieren');
  }
  // v4.149: absolute finale Cockpit-Sperre gegen alte Budget-/GF-Rückfälle aus gecachten Health-Texten.
  finalPositive=cleanFinal(finalPositive,'positive');
  finalRisks=cleanFinal(finalRisks,'warning').filter(t=>!(authorityContext&&isObsoleteGfCfoText(t))).filter(t=>!(lowPilotUnderBudget&&isObsoleteBudgetPriceConfusion(t)));
  finalOpen=cleanFinal(finalOpen,'open').filter(t=>!(authorityContext&&isObsoleteGfCfoText(t))).filter(t=>!(lowPilotUnderBudget&&isObsoleteBudgetPriceConfusion(t)));
  if(lowPilotUnderBudget&&!hasTextInList(finalPositive,/angebot|startangebot|budgetrahmen|budget/i))finalPositive.push('Startangebot liegt klar im Budgetrahmen');
  if((health.score||0)<70&&finalRisks.length===0)finalRisks.push('ROI-Annahme / Vermeidungsquote noch nicht gemessen');
  if(!finalOpen.length)finalOpen.push(authorityContext?'Wirtschaftlichen Nutzen mit Entscheider validieren':'Wirtschaftlichen Entscheider validieren');
  return {
    positive:shortUniqueList(finalPositive,4),
    risks:shortUniqueList(finalRisks,4),
    open:shortUniqueList(finalOpen,4)
  };
}

function extractBulletsAfterHeader3(text,headerKeyword,maxItems){
  const lines=(text||'').split('\n');const out=[];let found=false;
  for(let i=0;i<lines.length;i++){
    if(!found){if(lines[i].toUpperCase().includes(headerKeyword.toUpperCase()))found=true;continue;}
    const t=lines[i].trim();if(!t)break;
    if(/^[A-ZÄÖÜ🎯🔥❓•\-]/.test(t)&&out.length>0)break;
    out.push(t.replace(/^[•\-]\s*/,''));if(out.length>=(maxItems||3))break;
  }
  return out;
}
function extractFirstBulletAfterHeader3(text,headerKeyword){
  const b=extractBulletsAfterHeader3(text,headerKeyword,1);return b.length?b[0]:'';
}

function toggleHealthSignal(accId,text,origin,type,refreshFn){
  const manual=getHealthManual(accId);
  if(origin==='AUTO'||origin==='ERGAENZUNG'){
    const idx=manual.removedAutoTexts.indexOf(text);
    if(idx>=0)manual.removedAutoTexts.splice(idx,1);
    else manual.removedAutoTexts.push(text);
  }else{
    const item=manual.added.find(m=>m.text===text&&m.type===type);
    if(item)item.active=item.active===false?true:false;
  }
  LS.set('ki21_health_manual_'+accId,manual);
  renderHealthBadgeIfPresent();
  if(refreshFn)refreshFn();
}

function splitDetailsFromResult(text){
  if(!text)return {main:'',details:''};
  // Robuster Marker-Match: erlaubt führende Markdown-Zeichen (#, -, =, *, Leerzeichen) vor/nach ###DETAILS###,
  // falls die KI das exakte Format leicht abweichend ausgibt (z.B. "## ###DETAILS###" oder "###DETAILS###  ")
  const markerRegex=/[#\-=*\s]*###\s*DETAILS\s*###[#\-=*\s]*/i;
  const m=text.match(markerRegex);
  if(!m)return {main:text,details:''};
  const idx=m.index;
  return {main:text.slice(0,idx).trim(),details:text.slice(idx+m[0].length).trim()};
}
function renderResultText(text,skipSplit){
  if(!text)return document.createTextNode('');
  if(!skipSplit){
    const {main}=splitDetailsFromResult(text);
    text=main;
  }
  const div=document.createElement('div');
  div.style.cssText='white-space:pre-wrap;font-size:var(--fs-input,12px);line-height:1.8;color:var(--text);';
  const lines=text.split('\n');
  lines.forEach((line,i)=>{
    const span=document.createElement('span');
    const numMatch=line.match(/^(\d+\.\s*)/);
    const prefix=numMatch?numMatch[1]:'';
    const rest=numMatch?line.slice(prefix.length):line;
    if(line.startsWith('BESTÄTIGT:')){
      span.innerHTML='<span style="font-size:9px;font-weight:700;background:rgba(46,160,67,.15);color:#2ea043;border-radius:4px;padding:1px 6px;margin-right:6px;">BESTÄTIGT</span>'+escHtml(line.slice('BESTÄTIGT:'.length));
    } else if(line.startsWith('ANNAHME:')){
      span.innerHTML='<span style="font-size:9px;font-weight:700;background:rgba(255,107,0,.15);color:#ff6b00;border-radius:4px;padding:1px 6px;margin-right:6px;">ANNAHME</span>'+escHtml(line.slice('ANNAHME:'.length));
    } else if(line.startsWith('KLÄREN:')){
      span.innerHTML='<span style="font-size:9px;font-weight:700;background:rgba(248,81,73,.15);color:#f85149;border-radius:4px;padding:1px 6px;margin-right:6px;">NOCH OFFEN</span>'+escHtml(line.slice('KLÄREN:'.length));
    } else if(rest.startsWith('KRITISCH:')){
      span.innerHTML=escHtml(prefix)+'<span style="font-size:9px;font-weight:700;background:rgba(248,81,73,.15);color:#f85149;border-radius:4px;padding:1px 6px;margin-right:6px;">KRITISCH</span>'+escHtml(rest.slice('KRITISCH:'.length));
    } else if(rest.startsWith('WICHTIG:')){
      span.innerHTML=escHtml(prefix)+'<span style="font-size:9px;font-weight:700;background:rgba(255,107,0,.15);color:#ff6b00;border-radius:4px;padding:1px 6px;margin-right:6px;">WICHTIG</span>'+escHtml(rest.slice('WICHTIG:'.length));
    } else if(rest.startsWith('NICE-TO-HAVE:')){
      span.innerHTML=escHtml(prefix)+'<span style="font-size:9px;font-weight:700;background:rgba(46,160,67,.15);color:#2ea043;border-radius:4px;padding:1px 6px;margin-right:6px;">NICE-TO-HAVE</span>'+escHtml(rest.slice('NICE-TO-HAVE:'.length));
    } else if(/\b(BESTÄTIGT|ARBEITSWERT|ZU VALIDIEREN|BRANCHENHYPOTHESE|ZU KLÄREN)\b/.test(line)&&!line.startsWith('BESTÄTIGT:')){
      span.innerHTML=highlightConfidenceWords(line);
    } else if(/\b(SPIN|Leitfragen)\b/i.test(line)||/^•\s*[SPIN]:/.test(line)){
      span.innerHTML=colorOrangeMarkers(escHtml(line));
    } else {
      span.textContent=line;
    }
    div.appendChild(span);
    if(i<lines.length-1)div.appendChild(document.createElement('br'));
  });
  return div;
}
// Hebt die Wörter "SPIN"/"Leitfragen" sowie führende S:/P:/I:/N:-Marker orange hervor —
// reine Darstellung des bereits generierten Texts, keine Änderung an Prompt/Inhalt.
function colorOrangeMarkers(escapedLine){
  let out=escapedLine.replace(/\b(SPIN|Leitfragen)\b/gi,'<span style="color:#ff6b00;font-weight:800;">$1</span>');
  out=out.replace(/^(•\s*)([SPIN]):/,'$1<span style="color:#ff6b00;font-weight:800;">$2:</span>');
  return out;
}

function getPhaseScoreInfo(sitId){
  if(!state.activeId)return {score:null,reason:''};
  const data=LS.get('ki21_st_'+state.activeId+'_'+sitId,null);
  if(!data||!data.result)return {score:null,reason:''};
  const matches=[...data.result.matchAll(/(\d+)\s*\/\s*10/g)];
  const m=matches.length?matches[0]:null;
  if(!m)return {score:null,reason:''};
  const score=parseInt(m[1]);
  if(score<1||score>10)return {score:null,reason:''};
  return {score,reason:extractBegruendung(data.result)};
}

function getPhaseStatus(sitId){
  if(!state.activeId)return 'empty';
  const data=LS.get('ki21_st_'+state.activeId+'_'+sitId,null);
  if(data&&data.result)return 'done';
  if(data&&data.fv&&Object.values(data.fv).some(v=>v&&v.trim&&v.trim()))return 'progress';
  return 'empty';
}

// Leitet einen echten Fortschritts-Prozentsatz aus den bereits vorhandenen Eingabefeldern
// (SITS[].felder, ohne post-Felder) ab. Keine erfundene Zahl — 0/100 für leer/abgeschlossen.
function getPhaseProgressPct(sitId){
  const sit=SITS[sitId];
  if(!state.activeId||!sit)return 0;
  const data=LS.get('ki21_st_'+state.activeId+'_'+sitId,null);
  if(!data)return 0;
  if(data.result)return 100;
  const fields=(sit.felder||[]).filter(f=>!f.post);
  if(!fields.length)return 0;
  const filled=fields.filter(f=>data.fv&&data.fv[f.id]&&data.fv[f.id].trim&&data.fv[f.id].trim()).length;
  return Math.round((filled/fields.length)*100);
}

// Bottom Sheet: zeigt eine Liste von Items in einem von unten eingleitenden Panel.
// title: String, items: [{glyph, text, sub?}], emptyText: String
function showBottomSheet(title, items, emptyText){
  const overlay=document.createElement('div');
  overlay.className='bs-overlay';
  const panel=document.createElement('div');
  panel.className='bs-panel';
  if(String(title||'').toLowerCase().includes('fragen'))panel.classList.add('questions-sheet');

  const handle=document.createElement('div');
  handle.className='bs-handle';
  panel.appendChild(handle);

  const head=document.createElement('div');
  head.className='bs-head';
  const titleEl=document.createElement('div');
  titleEl.className='bs-title';
  titleEl.textContent=title;
  head.appendChild(titleEl);
  panel.appendChild(head);

  const body=document.createElement('div');
  body.className='bs-body';
  if(!items||!items.length){
    const e=document.createElement('div');
    e.className='bs-empty';
    e.textContent=emptyText||'Keine Einträge vorhanden.';
    body.appendChild(e);
  } else {
    items.forEach((it,idx)=>{
      if(it.separator){
        const sep=document.createElement('div');
        sep.className='bs-separator';
        body.appendChild(sep);
        return;
      }
      const row=document.createElement('div');
      row.className='bs-row'+(it.priority?' bs-priority':'')+(it.onClick?' clickable':'');
      const g=document.createElement('span');
      g.className='bs-glyph';
      g.textContent=it.glyph||'•';
      row.appendChild(g);
      const t=document.createElement('span');
      t.style.flex='1';
      if(it.caption){
        const cap=document.createElement('div');
        cap.className='bs-priority-caption';
        cap.textContent=it.caption;
        t.appendChild(cap);
      }
      const main=document.createElement('div');
      main.textContent=it.text;
      t.appendChild(main);
      row.appendChild(t);
      if(it.onClick){
        const arrow=document.createElement('span');
        arrow.className='bs-row-arrow';
        arrow.textContent='›';
        row.appendChild(arrow);
        row.addEventListener('click',e=>{e.stopPropagation();close();it.onClick();});
      }
      body.appendChild(row);
    });
  }
  panel.appendChild(body);

  const close=()=>{
    overlay.classList.remove('visible');
    panel.classList.remove('visible');
    setTimeout(()=>{overlay.remove();panel.remove();},280);
  };
  overlay.addEventListener('click',close);

  // Swipe-down to dismiss
  let startY=0;
  panel.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;},{passive:true});
  panel.addEventListener('touchend',e=>{
    if(e.changedTouches[0].clientY-startY>60)close();
  },{passive:true});

  document.body.appendChild(overlay);
  document.body.appendChild(panel);
  requestAnimationFrame(()=>{overlay.classList.add('visible');panel.classList.add('visible');});
}


// v4.139: robuste Cockpit → Arbeitsbereich Navigation.
// Es wird bewusst NICHT zu einem exakten KI-Satz gesprungen, weil Phasentexte nach Regenerierung variieren.
// Stattdessen: passende Phase öffnen + klaren Cockpit-Arbeitsauftrag oben anzeigen.
function getCockpitWorkTarget(kind,text){
  const raw=String(text||'').trim();
  const t=raw.toLowerCase();
  let phaseId=0;
  let section='Passender Arbeitsbereich';
  let hint='Bearbeite diesen Punkt im Arbeitsbereich.';

  if(kind==='question'){
    phaseId=1;section='Discovery & Demo';hint='Nutze diese Frage im nächsten Termin und dokumentiere die Antwort im Arbeitsbereich.';
  } else if(/business case|nutzen|roi|vermeidungsquote|wirtschaft|kennzahl|messbar|effekt|kosten|impact/.test(t)){
    phaseId=3;section='Nutzen / ROI';hint='Validiere hier wirtschaftlichen Nutzen, Kennzahlen und Belastbarkeit des Business Case.';
  } else if(/vertrags|vertrag|beschaffung|einkauf|angebot|abschluss|paper|freigabe|beauftragung/.test(t)){
    phaseId=4;section='Angebot';hint='Kläre hier Vertrags-, Beschaffungs- und Abschlussprozess.';
  } else if(/pilot|start|termin|nächster schritt|nachbereitung|follow-up|verbindlich/.test(t)){
    phaseId=2;section='Nachbereitung';hint='Kläre hier den nächsten verbindlichen Schritt und dokumentiere Zusagen.';
  } else if(/discovery|frage|informationen|nachqualifizierung|hubspot|notizen|e-mail|demo|zeigen|bedarf|schmerz/.test(t)){
    phaseId=1;section='Discovery & Demo';hint='Kläre hier Bedarf, Discovery-Fragen und Demo-Fokus.';
  } else if(/wettbewerb|mitbewerb|konkurrent|alternative|einwand/.test(t)){
    phaseId=4;section='Angebot';hint='Bearbeite hier Wettbewerbsrisiko, Einwandbehandlung und Abschlussstrategie.';
  } else if(/entscheider|entscheidungsbefugnis|budget|sponsor|champion|fürsprecher|qualifiz/.test(t)){
    phaseId=0;section='Qualifizierung';hint='Prüfe hier Qualifizierung, Entscheiderstatus und zentrale Deal-Grundlagen.';
  }

  return {phaseId,section,text:raw,kind:kind||'cockpit',hint,ts:Date.now()};
}
function openCockpitWorkTarget(kind,text){
  if(!state.activeId)return;
  const target=getCockpitWorkTarget(kind,text);
  state.cockpitFocus=target;
  LS.set('ki21_cockpit_focus_'+state.activeId,target);
  renderStation(target.phaseId);
}
function getCockpitFocusForPhase(accId,sitId){
  const focus=state.cockpitFocus||LS.get('ki21_cockpit_focus_'+accId,null);
  if(!focus||focus.phaseId!==sitId)return null;
  // Nach 20 Minuten ausblenden, damit der Arbeitsbereich nicht dauerhaft "markiert" bleibt.
  if(focus.ts&&Date.now()-focus.ts>20*60*1000){
    LS.set('ki21_cockpit_focus_'+accId,null);
    if(state.cockpitFocus===focus)state.cockpitFocus=null;
    return null;
  }
  return focus;
}
function buildCockpitFocusBanner(focus){
  if(!focus)return null;
  return h('div',{className:'cockpit-focus-banner',id:'cockpit-focus-banner'},
    h('button',{type:'button',className:'cockpit-focus-kicker is-back',onclick:(e)=>{e.stopPropagation();state.cockpitFocus=null;if(state.activeId)LS.set('ki21_cockpit_focus_'+state.activeId,null);renderHome();}},'Aus dem Cockpit · '+(focus.section||'Arbeitsbereich')),
    h('div',{className:'cockpit-focus-text'},focus.text||''),
    h('div',{className:'cockpit-focus-hint'},focus.hint||'Diesen Punkt hier weiterbearbeiten.')
  );
}

}

function renderHome(){
  const cust=getActiveCust();
  const aid=state.activeId;
  const app=document.getElementById('app');
  app.innerHTML='';

  setTimeout(()=>{
    renderHealthBadgeIfPresent();
    if(aid&&cust.firma&&!LS.get('ki21_health_'+aid,null)){
      refreshOpportunityHealth(aid);
    }
  },0);

  const health=aid?getOpportunityHealth(aid):null;
  const scoreColor=health?getHealthColor(health.score):'var(--text3)';
  const hasPending=aid&&LS.get('ki21_pending_'+aid,false);

  // ── 1. HEADER: KI21 + Opportunity-Name + Score-Badge + ⚙ ─────────
  const scoreBadge=h('div',{
    className:'cockpit-score-badge',
    style:{color:scoreColor,borderColor:scoreColor+'60',background:scoreColor+'15',
      display:health?'block':'none'},
    onclick:()=>{if(aid)showOpportunityHealthDetail(aid);}
  },health?health.score+'/100':'');

  const header=h('div',{className:'cockpit-header'},
    h('div',{className:'cockpit-header-left'},
      h('div',{className:'cockpit-brand'},'KI','21'),
      cust.firma
        ? h('div',{className:'cockpit-opp-name',onclick:showKunde},cust.firma)
        : h('div',{className:'cockpit-opp-placeholder',onclick:showKunde},'Opportunity wählen →')
    ),
    h('div',{className:'cockpit-header-right'},
      scoreBadge,
      h('button',{className:'btn',onclick:showSettings},'⚙')
    )
  );

  const wrap=h('div',{className:'wrap'});

  // ── 2. NÄCHSTER SCHRITT KARTE ────────────────────────────────────
  // Quelle: health.open[0] als "Die eine Sache" → nächster Schritt aus Phase-Ergebnissen
  // Nächster Schritt — sicher formuliert falls extractAfterHeader noch nicht definiert
  const _extractSafe=(text,header)=>{
    if(typeof extractAfterHeader==='function')return extractAfterHeader(text,header);
    // Inline-Fallback
    const lines=(text||'').split('\n');
    for(let i=0;i<lines.length;i++){
      if(lines[i].toUpperCase().includes(header.toUpperCase())){
        const ci=lines[i].indexOf(':');
        if(ci!==-1&&lines[i].slice(ci+1).trim())return lines[i].slice(ci+1).trim();
        for(let j=i+1;j<lines.length;j++){if(!lines[j].trim())break;return lines[j].trim();}
      }
    }
    return '';
  };
  let naechsterSchrittText=(()=>{
    for(let i=4;i>=0;i--){
      const d=LS.get('ki21_st_'+aid+'_'+i,null);
      if(d&&d.result){
        const line=_extractSafe(d.result,'NÄCHSTER SCHRITT DIESE WOCHE');
        if(line)return line;
      }
    }
    return null;
  })();
  naechsterSchrittText=sanitizeDashboardTextForDecisionAuthority(aid,naechsterSchrittText,'nextStep');

  const nextCard=h('div',{className:'cockpit-next-card'});
  nextCard.appendChild(h('div',{className:'cockpit-next-eyebrow'},'Nächster Schritt'));
  nextCard.appendChild(h('div',{
    className:naechsterSchrittText?'cockpit-next-text':'cockpit-next-placeholder'
  },naechsterSchrittText||'Noch kein Schritt generiert – Qualifizierung starten.'));

  const erkenntnisBtn=h('button',{className:'cockpit-btn-primary',onclick:()=>{
    if(!aid)return;
    const acc=state.accounts.find(a=>a.id===aid);
    if(acc)showNeuerKunde(acc.cust,acc.id,'kontext');
  }},'＋ Erkenntnis');

  const smartPending=aid?LS.get('ki21_smart_pending_'+aid,null):null;
  const updateBtn=h('button',{
    className:'cockpit-btn-secondary',
    style:{display:(hasPending&&smartPending)?'block':'none'},
    onclick:async()=>{
      if(!aid||!smartPending)return;
      updateBtn.disabled=true;
      const areas=smartPending.areas||[];
      updateBtn.textContent='⏳ Wird aktualisiert...';

      const phase1Affected=areas.some(a=>a.id===0);
      const spinAffected=areas.some(a=>a.id==='spin');
      const otherPhases=areas.filter(a=>typeof a.id==='number'&&a.id!==0);

      // Phase 1 zuerst (SPIN hängt davon ab), dann parallel
      if(phase1Affected){
        const KEY='ki21_st_'+aid+'_0';
        const d=LS.get(KEY,null);
        if(d){
          const fv=d.fv||{};const mu2=LS.get('ki21_mu',{});const kk2=buildKkForSitId(aid,0);
          try{
            updateBtn.textContent='⏳ Qualifizierung...';
            const result=await callClaude(SITS[0].build(fv,cust,mu2,kk2,''),null);
            if(result){d.result=result;LS.set(KEY,d);}
            await savePhaseSnapshot(aid,0);
          }catch(e){}
        }
        // SPIN nach Phase 1
        if(spinAffected){
          updateBtn.textContent='⏳ SPIN-Fragen...';
          const d1=LS.get('ki21_st_'+aid+'_0',null);
          if(d1&&d1.result)await transferAndGo(0,1,d1.result,aid);
        }
      }

      // Restliche Phasen parallel
      if(otherPhases.length){
        updateBtn.textContent='⏳ '+(otherPhases.length)+' Bereiche parallel...';
        await Promise.all(otherPhases.map(async a=>{
          const i=a.id;
          const KEY='ki21_st_'+aid+'_'+i;
          const d=LS.get(KEY,null);
          if(!d)return;
          const fv=d.fv||{};const mu2=LS.get('ki21_mu',{});const kk2=buildKkForSitId(aid,i);
          try{
            const result=await callClaude(SITS[i].build(fv,cust,mu2,kk2,''),null);
            if(result){d.result=result;LS.set(KEY,d);}
            await savePhaseSnapshot(aid,i);
          }catch(e){}
        }));
      }

      await refreshOpportunityHealth(aid);
      LS.set('ki21_pending_'+aid,false);
      LS.set('ki21_smart_pending_'+aid,null);
      renderHome();
    }
  });
  // Button-Label mit Bereichsnamen
  if(smartPending&&smartPending.areas){
    const names=smartPending.areas.map(a=>a.label).join(', ');
    updateBtn.textContent='● '+smartPending.areas.length+' Bereiche aktualisieren: '+names;
  } else {
    updateBtn.textContent='● Mit neuen Erkenntnissen aktualisieren';
  }
  const btnRow=h('div',{className:'cockpit-btn-row'});
  btnRow.appendChild(erkenntnisBtn);
  if(hasPending)btnRow.appendChild(updateBtn);
  nextCard.appendChild(btnRow);
  wrap.appendChild(nextCard);

  // ── 3. VIER COCKPIT-KACHELN 2×2 ─────────────────────────────────
  if(cust.firma&&health){
    const matrix=buildCockpitMatrixData(aid,health);
    const pos=matrix.positive.slice(0,3);
    const warn=matrix.risks.slice(0,3);
    const open=matrix.open.slice(0,2);

    // Fragen: aus Phase 1 SPIN oder Phase 2 KLÄREN
    const PROMPT_MARKERS=/^(KLÄREN|BESTÄTIGT|ANNAHME|ZU KLÄREN|ZU VALIDIEREN|NICHT BEKANNT|ÜBERHOLT|DETAILS|BRANCHENHYPOTHESE|ARBEITSWERT|SPIN-FRAGEN|LEITFRAGEN|EINSCHÄTZUNG|SCHMERZ|VERTRIEBSNOTIZEN|NÄCHSTER SCHRITT|WENN DU MORGEN|BESTÄTIGT|EMPFEHLUNG|KI-BEWERTUNG|EXECUTIVE|COCKPIT)(\s*:|\s*$)/i;
    const fragenItems=getDashboardQuestions(aid,2,true);

    const mkTile=(label,items,cls,emptyText,onTap,kind)=>{
      const tile=h('div',{className:'cockpit-tile',style:{cursor:'pointer'},onclick:onTap||null});
      tile.appendChild(buildCockpitTileHeader(label));
      if(!items.length){
        tile.appendChild(h('div',{className:'cockpit-tile-empty'},emptyText));
      } else {
        items.forEach(it=>{
          const itemText=String(it||'');
          const row=h('div',{className:'cockpit-tile-item '+(cls||'')+' is-actionable',
            onclick:(e)=>{e.stopPropagation();openCockpitWorkTarget(kind||cls||'cockpit',itemText);}},itemText);
          tile.appendChild(row);
        });
        const total=cls==='chance'?matrix.positive.length:
          cls==='risk'?matrix.risks.length:0;
        const visibleCount=items.length;
        if(total>visibleCount)tile.appendChild(h('div',{className:'cockpit-tile-more'},'+ '+(total-visibleCount)+' weitere'));
      }
      return tile;
    };

    const allPos=matrix.positive.map(text=>({text}));
    const allWarn=matrix.risks.map(text=>({text}));
    const allOpen=matrix.open.map(text=>({text}));

    // "Die eine Sache": aus offenen Punkten oder Phase-Ergebnis
    let dieSache=allOpen.length?allOpen[0].text:(()=>{
      for(let i=4;i>=0;i--){
        const d=LS.get('ki21_st_'+aid+'_'+i,null);
        if(d&&d.result){const t=_extractSafe(d.result,'DIE EINE SACHE DIE FEHLT');if(t)return t;}
      }
      return null;
    })();
    dieSache=sanitizeDashboardTextForDecisionAuthority(aid,dieSache,'missing');

    const erkTile=mkTile('Erkenntnisse',pos,'chance','Noch keine Erkenntnisse',
      ()=>showBottomSheet('Wichtigste Erkenntnisse',
        allPos.map(s=>({glyph:'✔',text:s.text,onClick:()=>openCockpitWorkTarget('chance',s.text)})),'Noch keine bestätigten Erkenntnisse.'),'chance');
    const riskTile=mkTile('Risiken / Bremsen',warn.map(s=>String(s||'').replace(/→ Strategie:.*/,'').trim()),'risk','Keine Bremsfaktoren erkannt',
      ()=>showBottomSheet('Größte Risiken',
        allWarn.map(s=>{
          const t=s.text;const si=t.indexOf('→ Strategie:');
          return si>0?{glyph:'⚠',text:t.slice(0,si).trim(),sub:t.slice(si+2),onClick:()=>openCockpitWorkTarget('risk',t.slice(0,si).trim())}:{glyph:'⚠',text:t,onClick:()=>openCockpitWorkTarget('risk',t)};
        }),'Keine aktiven Risiken oder Bremsfaktoren.'),'risk');

    const dieSacheTile=h('div',{className:'cockpit-tile',style:{cursor:'pointer'},
      onclick:()=>showBottomSheet('Noch offene Punkte',
        allOpen.map(s=>({glyph:'•',text:s.text,onClick:()=>openCockpitWorkTarget('open',s.text)})),'Keine offenen Punkte.')});
    dieSacheTile.appendChild(buildCockpitTileHeader('Die eine Sache, die fehlt'));
    dieSacheTile.appendChild(dieSache
      ? h('div',{className:'cockpit-tile-item is-actionable',onclick:(e)=>{e.stopPropagation();openCockpitWorkTarget('open',dieSache);}},dieSache)
      : h('div',{className:'cockpit-tile-empty'},'Noch nicht ermittelt'));

    const fragenTile=h('div',{className:'cockpit-tile',style:{cursor:'pointer'},
      onclick:()=>{
        // Alle Leitfragen aus Phase 2 / Phase 1 für Bottom Sheet
        const allFragen=getDashboardQuestions(aid,12,false);
        const sheetItems=[];
        allFragen.forEach((q,idx)=>{
          const item={
            glyph:idx<3?String(idx+1):'?',
            text:normalizeQuestionText(q,false),
            priority:idx<3,
            caption:idx===0?'Wichtigste Fragen':'',
            onClick:()=>openCockpitWorkTarget('question',normalizeQuestionText(q,false))
          };
          if(idx===3)sheetItems.push({separator:true});
          sheetItems.push(item);
        });
        showBottomSheet('Fragen für nächsten Termin',
          sheetItems,
          'Leitfragen noch nicht generiert. Phase 1 durchführen.');
      }});
    fragenTile.appendChild(buildCockpitTileHeader('Fragen für nächsten Termin'));
    if(!fragenItems.length){
      fragenTile.appendChild(h('div',{className:'cockpit-tile-empty'},'Leitfragen noch nicht generiert'));
    } else {
      fragenItems.forEach(q=>fragenTile.appendChild(h('div',{className:'cockpit-tile-item is-actionable',
        onclick:(e)=>{e.stopPropagation();openCockpitWorkTarget('question',q);}},q)));
    }

    const grid=h('div',{className:'cockpit-grid'});
    grid.appendChild(erkTile);grid.appendChild(riskTile);
    grid.appendChild(dieSacheTile);grid.appendChild(fragenTile);
    wrap.appendChild(grid);
  }

  // ── 4. PHASEN ALS EINFACHE TOUCH-LISTE ──────────────────────────
  const phaseNames=['Qualifizierung','Discovery & Demo','Nachbereitung','Nutzen / ROI','Angebot'];
  const phaseList=h('div',{className:'cockpit-phase-list'});
  phaseNames.forEach((name,i)=>{
    const status=getPhaseStatus(i);
    const statusLabel=status==='progress'?'In Bearbeitung':'';
    const row=h('div',{className:'cockpit-phase-row',onclick:()=>{
      if(!aid){state.pendingSit=i;showKunde();return;}
      renderStation(i);
    }},
      h('span',{className:'cockpit-phase-num '+(status==='done'?'done':'')},String(i+1)),
      h('span',{className:'cockpit-phase-name'},'Phase '+(i+1)+' – '+name),
      statusLabel?h('span',{className:'cockpit-phase-status '+status},statusLabel):
        h('span',{className:'cockpit-phase-chevron','aria-hidden':'true'},'›')
    );
    phaseList.appendChild(row);
  });
  wrap.appendChild(phaseList);
  wrap.appendChild(h('div',{className:'tagline'},'Verstehen. Fragen. Strategie.'));

  app.appendChild(header);
  app.appendChild(wrap);
  LS.set('ki21_view','home');
  setTimeout(()=>{
    updateHomeHeroHealthVisual();
    // Score-Badge live aktualisieren
    const h2=getOpportunityHealth(aid);
    if(h2&&scoreBadge){
      const c=getHealthColor(h2.score);
      scoreBadge.textContent=h2.score+'/100';
      scoreBadge.style.color=c;scoreBadge.style.borderColor=c+'60';scoreBadge.style.background=c+'15';
      scoreBadge.style.display='block';
    }
  },0);
}

// Aktualisiert Ring/Score/Label/Subline in der Hero-Card mit den bereits berechneten
// getOpportunityHealth()-Werten. No-op auf allen anderen Screens.
function updateHomeHeroHealthVisual(){
  const scoreEl=document.getElementById('home-health-score');
  if(!scoreEl)return;
  const fillEl=document.getElementById('home-health-fill');
  const aid=LS.get('ki21_aid',null);
  const health=aid?getOpportunityHealth(aid):null;

  if(!health){
    scoreEl.textContent='–';
    if(fillEl){fillEl.style.width='0%';fillEl.style.background='var(--bg3)';}
    return;
  }
  const color=getHealthColor(health.score);
  scoreEl.textContent=String(health.score);
  scoreEl.style.color=color;
  if(fillEl){
    const pct=Math.max(0,Math.min(100,health.score));
    fillEl.style.width=pct+'%';
    fillEl.style.background=color;
  }
}

async function runAutopilot(){
  const cust=getActiveCust();
  const mu=LS.get('ki21_mu',{});
  const kk=LS.get('ki21_kk_'+state.activeId,'');
  const phaseNamesShort=['Qualifizierung','Bedarfsanalyse','Termin nachbereiten','Nutzen-Kosten-Analyse','Angebot & Abschluss'];

  const app=document.getElementById('app');
  app.innerHTML='';
  const progBox=h('div',{style:{padding:'20px 16px',maxWidth:'500px',margin:'0 auto'}});
  progBox.appendChild(h('div',{style:{fontSize:'15px',fontWeight:'800',marginBottom:'14px'}},
    '🔍 KI21 erstellt Ihre Opportunity-Vorschau'));
  const stepEls=[];
  for(let i=0;i<5;i++){
    const stepEl=h('div',{style:{fontSize:'13px',padding:'8px 0',color:'var(--text2)'}},
      '⏳ '+phaseNamesShort[i]);
    stepEls.push(stepEl);
    progBox.appendChild(stepEl);
  }
  app.appendChild(progBox);

  // Non-invasive: only READ Phase 1 (Qualifizierung) input fields, never write to real phase data
  const phase1Data=LS.get('ki21_st_'+state.activeId+'_0',{fv:{},result:''});
  const dossierResults=[];
  let prevResult='';

  for(let i=0;i<5;i++){
    const sit=SITS[i];
    // Build a synthetic field-value object for this phase, fed only by the chain of previous in-memory results
    let fv={};
    if(i===0){
      fv=phase1Data.fv||{};
    } else {
      const textFieldId=sit.felder.find(f=>f.t==='ta'&&!f.readonly);
      const ctxFieldId=sit.felder.find(f=>f.readonly);
      if(ctxFieldId)fv[ctxFieldId.id]=prevResult;
      if(textFieldId)fv[textFieldId.id]=prevResult;
      // For phases with additional fields (e.g. paket/budget in Phase 4/5), leave them empty -
      // the Opportunity-Vorschau prompt rules instruct the model to use BRANCHENHYPOTHESE for missing data.
    }

    const stk='';
    try{
      const prompt=sit.build(fv,cust,mu,kk,stk);
      const result=await callClaude(prompt,null);
      if(result){
        dossierResults.push({title:sit.title,result});
        prevResult=result;
        stepEls[i].textContent='✓ '+phaseNamesShort[i];
        stepEls[i].style.color='#2ea043';
      } else {
        dossierResults.push({title:sit.title,result:'(Keine Antwort erhalten)'});
        stepEls[i].textContent='⚠️ '+phaseNamesShort[i]+' (fehlgeschlagen)';
        stepEls[i].style.color='#f85149';
      }
    }catch(e){
      dossierResults.push({title:sit.title,result:'(Fehler: '+e.message+')'});
      stepEls[i].textContent='⚠️ '+phaseNamesShort[i]+' (Fehler: '+e.message+')';
      stepEls[i].style.color='#f85149';
    }
  }

  progBox.appendChild(h('div',{style:{fontSize:'14px',fontWeight:'700',color:'#2ea043',marginTop:'16px'}},
    '✅ Opportunity-Vorschau erfolgreich erstellt.'));
  // Automatically download as PDF/HTML so the result is never lost
  exportAutopilotPDF(cust,dossierResults);
  progBox.appendChild(h('div',{style:{fontSize:'11px',color:'var(--text2)',marginTop:'6px'}},
    '📄 Vorschau wurde automatisch heruntergeladen.'));
  const showBtn=h('button',{className:'btn-o',style:{marginTop:'14px',width:'100%'},
    onclick:()=>showAutopilotDossier(cust,dossierResults)
  },'Vorschau ansehen →');
  progBox.appendChild(showBtn);
  // Keep results available for immediate PDF export without re-running
  state.lastAutopilotDossier={cust,dossierResults};
