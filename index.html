*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 50% -10%,rgba(255,122,26,.09),transparent 30%),linear-gradient(180deg,#070a10,#0a0f17 50%,#080c12);color:var(--text);font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input,textarea{font:inherit}.app{min-height:100vh;padding-bottom:max(110px,calc(70px + env(safe-area-inset-bottom)))}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.list{display:flex;flex-direction:column;gap:9px}.item{position:relative;padding-left:16px;font-size:12.5px;line-height:1.42}.item:before{content:'·';position:absolute;left:2px;color:var(--muted)}.item.primary{padding:11px 30px 11px 34px;border:1px solid rgba(176,154,248,.3);border-radius:13px;background:rgba(176,154,248,.09);font-weight:850}.item.primary:before{content:'1';top:12px;left:10px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(176,154,248,.2);color:#dfd5ff;font-size:9px;font-weight:950}.item.primary:after{content:'›';position:absolute;right:12px;color:var(--violet)}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:4px 8px;font-size:9px;font-weight:900;border:1px solid var(--line);color:var(--muted)}.badge.ok{color:var(--green);border-color:rgba(85,211,138,.35);background:rgba(85,211,138,.09)}.badge.warn{color:var(--yellow);border-color:rgba(216,165,58,.35);background:rgba(216,165,58,.09)}.badge.risk{color:var(--red);border-color:rgba(255,123,114,.35);background:rgba(255,123,114,.09)}

<script>
'use strict';
const VERSION='KI21 Core 8.1.9 · Import Runtime Fix';
const STORE_KEY='ki21_core8_state_v1';
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const now=()=>new Date().toISOString();
const normalize=s=>String(s||'').replace(/\r/g,'').trim();
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}
function load(){try{return JSON.parse(localStorage.getItem(STORE_KEY))||null}catch(e){return null}}
function save(){try{localStorage.setItem(STORE_KEY,JSON.stringify(state))}catch(e){console.warn('KI21 storage unavailable',e.message)}}
const DEMO=`Unternehmen\nFirmenname: Novacore Systems GmbH\nBranche: B2B Software\n\nOpportunity\nOpportunity-Name: KI21 Pilot Opportunity-Steuerung\nPhase: Qualifizierung\n\nStakeholder\nThomas Reuter – Vertriebsleiter – fachlicher Sponsor\nDr. Miriam Albrecht – Geschäftsführerin Finanzen & Operations – wirtschaftliche Entscheiderin – noch nicht eingebunden\nJana Wolf – Sales Operations – technische und operative Prüferin\n\nSchmerz und Aufwand\n110 Stunden Zusatzaufwand pro Monat: 55 Stunden Deal-Reviews, 35 Stunden Forecast-Korrektionen, 20 Stunden Datenaufbereitung.\nIm Vorjahr wurden 27 Opportunities verloren oder deutlich verschoben. Bei 4–6 davon hätten Risiken möglicherweise früher erkannt werden können. Ob dadurch Verluste vermieden worden wären, ist nicht bestätigt.\n\nBudget und Entscheidung\nBudgetrahmen bis 50.000 Euro vorhanden. Konkrete Investitionsfreigabe durch Dr. Albrecht ist offen.\nDie Geschäftsführerin kennt die 110-Stunden-Analyse noch nicht.\nErfolgskriterien wurden intern diskutiert, aber nicht mit der wirtschaftlichen Entscheiderin bestätigt.\n\nPilot\nGeplant: 8 Nutzer, echte Enterprise-Deals, Wirkung im Pilot messen. Konkreter Angebotspreis noch offen.`;

function phaseQualificationResult(index,m){
  const p=m.opp.parsed, d=ensurePhaseData(m.opp)[index], a=d.answers||{};
  const yes=v=>v==='yes', partial=v=>v==='partial'||v==='pending', no=v=>v==='no';
  if(index===0){
    const problem=p.hours>0?'Bestätigt und beziffert':'Noch nicht belastbar beziffert';
    const sponsor=yes(a.sponsor)||p.sponsor?'Bestätigt':'Noch nicht bestätigt';
    const buyer= yes(a.buyer)?'Persönlich eingebunden':partial(a.buyer)?'Teilweise eingebunden':p.economicBuyerName?'Identifiziert, aber Einbindung offen':'Noch nicht identifiziert';
    const path=yes(a.meeting)?'Nächster Termin verbindlich':partial(a.meeting)?'Termin in Abstimmung':'Noch nicht verbindlich geklärt';
    let level='Teilweise qualifiziert';
    if(p.hours>0&&(yes(a.sponsor)||p.sponsor)&&yes(a.buyer)&&yes(a.meeting))level='Qualifiziert';
    if(!p.hours&&!p.sponsor&&!p.economicBuyerName)level='Frühe Qualifizierung';
    const gap=!yes(a.buyer)?'Wirtschaftliche Entscheiderin noch nicht persönlich eingebunden.':!yes(a.meeting)?'Nächster gemeinsamer Kundentermin noch nicht verbindlich.':!yes(a.sponsor)&&!p.sponsor?'Sponsor noch nicht bestätigt.':'Keine kritische Qualifizierungslücke erkannt.';
    return{title:'Qualifizierungsergebnis',level,items:[['Problem',problem],['Sponsor',sponsor],['Wirtschaftlicher Entscheider',buyer],['Entscheidungsweg',path]],gap,next:m.out.actions[0]};
  }
  if(index===1){
    const criteria=yes(a.criteria)?'Bestätigt':partial(a.criteria)?'Teilweise bestätigt':'Noch offen';
    const demo=yes(a.demo)?'Demo-Ziel bestätigt':'Demo-Ziel noch offen';
    const level=yes(a.criteria)&&yes(a.demo)?'Bedarf und Demo-Ziel bestätigt':'Teilweise geklärt';
    return{title:'Ergebnis Bedarfsanalyse & Demo',level,items:[['Schmerz',p.hours?`${p.hours} Stunden/Monat belegt`:'Noch nicht beziffert'],['Erfolgskriterien',criteria],['Demo-Ziel',demo],['Zielbild',p.successOpen?'Noch nicht bestätigt':'In Klärung']],gap:!yes(a.criteria)?'Erfolgskriterien mit dem Kunden bestätigen.':!yes(a.demo)?'Konkretes Demo-Ziel vereinbaren.':'Keine kritische Bedarfslücke erkannt.',next:m.out.actions[0]};
  }
  if(index===2){
    const follow=yes(a.followup)?'Bestätigt':'Noch offen';
    const objection=yes(a.objection)?'Entscheidungsrelevanter Einwand offen':no(a.objection)?'Kein kritischer Einwand bestätigt':'Noch zu prüfen';
    return{title:'Ergebnis Nachbereitung',level:yes(a.followup)?'Kundenschritt gesichert':'Nachbereitung offen',items:[['Nächster Kundenschritt',follow],['Einwände',objection],['Gesprächserkenntnisse',d.note?'Ergänzung gespeichert':'Keine neue Ergänzung'],['Entscheidungsfortschritt',yes(a.followup)?'Verbindlich':'Noch nicht verbindlich']],gap:!yes(a.followup)?'Nächsten Kundenschritt verbindlich bestätigen.':yes(a.objection)?'Offenen Einwand bearbeiten.':'Keine kritische Nachbereitungslücke erkannt.',next:m.out.actions[0]};
  }
  if(index===3){
    const effect=yes(a.effect)?'Mit Kunde validiert':partial(a.effect)?'Teilweise validiert':'Noch offen';
    const price=yes(a.price)?'Bestätigt':'Noch offen';
    const level=yes(a.effect)&&yes(a.price)?'Business Case entscheidungsfähig':'Business Case vorbereitend';
    return{title:'Ergebnis wirtschaftlicher Nutzen',level,items:[['Ausgangsproblem',p.hours?`${p.hours} Stunden/Monat beziffert`:'Noch nicht beziffert'],['Wirkungsannahme',effect],['Pilotpreis',price],['ROI',yes(a.effect)&&yes(a.price)?'Berechnung möglich':'Noch nicht belastbar']],gap:!yes(a.effect)?'Wirkungsannahme mit dem Kunden validieren.':!yes(a.price)?'Konkreten Pilotpreis bestätigen.':'Keine kritische Business-Case-Lücke erkannt.',next:m.out.actions[0]};
  }
  const approval=yes(a.approval)||m.ds.approval==='confirmed'?'Bestätigt':'Noch offen';
  const start=yes(a.start)?'Verbindlich':'Noch offen';
  const level=(approval==='Bestätigt'&&start==='Verbindlich')?'Abschluss und Start gesichert':'Abschlussvorbereitung';
  return{title:'Ergebnis Angebot & Abschluss',level,items:[['Investitionsfreigabe',approval],['Starttermin',start],['Bedingungen',m.ds.approval==='confirmed'?'Entscheidung getroffen':'Noch zu bestätigen'],['Projektstart',start==='Verbindlich'?'Vorbereitet':'Noch nicht abgesichert']],gap:approval!=='Bestätigt'?'Investitionsfreigabe verbindlich einholen.':start!=='Verbindlich'?'Starttermin und Verantwortlichkeiten bestätigen.':'Keine kritische Abschlusslücke erkannt.',next:m.out.actions[0]};
}

<script>

const IMPORT_CATEGORIES_813=['Unternehmen','Opportunity','Stakeholder','Schmerz & Aufwand','Budget & Entscheidung','Pilot','Demo','Einwand','Angebot & Abschluss','Weitere Information'];
const IMPORT_KINDS_813=['Fakt','Hypothese','Offen'];
function splitImportStatements813(raw){
  const headings=new Set(['crm-import','unternehmen','opportunity','stakeholder','schmerz und aufwand','budget und entscheidung','pilot','ausgangssituation','qualifizierungsstand','erwartete einwände und risiken','aktuell sinnvoller nächster kundenschritt']);
  let section='Weitere Information',out=[];
  String(raw||'').replace(/\r/g,'').split(/\n+/).forEach(line=>{
    line=line.trim().replace(/^[-•]\s*/,''); if(!line||/^[-–—]+$/.test(line))return;
    const low=line.toLowerCase();
    if(headings.has(low)){section=line;return;}
    // Keep explicit key/value lines intact; split prose into sentences.
    const parts=/^[^:]{1,35}:\s*.+/.test(line)?[line]:line.split(/(?<=[.!?])\s+(?=[A-ZÄÖÜ0-9])/);
    parts.map(x=>x.trim()).filter(Boolean).forEach(x=>out.push({line:x,section}));
  });
  return out;
}
function classifyImportLine813(line,section){
  const l=String(line||'').trim(), low=l.toLowerCase(), sec=String(section||'').toLowerCase();
  let category='Weitere Information',kind='Fakt',meaning='';
  if(/firmenname|branche|standort|mitarbeiter|umsatz|vertriebsmodell|crm-system|weitere systeme/.test(low)||/unternehmen/.test(sec))category='Unternehmen';
  else if(/opportunity|phase|status|projekt|entscheidungszeitraum/.test(low)||/opportunity/.test(sec))category='Opportunity';
  else if(/stakeholder|sponsor|entscheider|geschäftsführ|vertriebsleiter|sales operations|prüfer|presales/.test(low)||/stakeholder/.test(sec))category='Stakeholder';
  else if(/stunden|aufwand|deal-review|forecast|datenaufbereitung|verloren|verschoben|schmerz/.test(low)||/schmerz/.test(sec))category='Schmerz & Aufwand';
  else if(/budget|freigabe|entscheidungsprozess|entscheidung|erfolgskriterien|messgrößen/.test(low)||/budget/.test(sec))category='Budget & Entscheidung';
  else if(/pilot|nutzer|enterprise-deals|laufzeit|starttermin|messung/.test(low)||/pilot/.test(sec))category='Pilot';
  else if(/demo|anwendungsfall|lösungsbild|nachweiskriter/.test(low))category='Demo';
  else if(/einwand|widerstand|bedenken/.test(low))category='Einwand';
  else if(/angebot|preis|kondition|einkauf|vertrag|abschluss/.test(low))category='Angebot & Abschluss';

  if(/möglicherweise|könnte|annahme|hypothese|wäre[n]? .* möglich|nicht bestätigt, dass|plausibel/.test(low))kind='Hypothese';
  if(/\boffen\b|noch nicht|steht aus|nicht eingebunden|nicht bestätigt|nicht festgelegt|nicht geklärt|fehlt|unbekannt/.test(low))kind='Offen';
  // Positive evidence beats generic section wording.
  if(/vorhanden|bestätigt|identifiziert|dokumentiert|beziffert|beträgt|geplant|ist .* sponsor|ist .* entscheider/.test(low) && !/noch nicht|nicht bestätigt|offen|möglicherweise/.test(low))kind='Fakt';

  if(/budgetrahmen.*vorhanden/.test(low))meaning='Budgetrahmen bestätigt – keine Freigabe abgeleitet.';
  else if(/freigabe.*offen/.test(low))meaning='Offener Entscheidungspunkt, kein bestätigter Fakt.';
  else if(/wirtschaftliche.*entscheider/.test(low)&&/noch nicht eingebunden/.test(low))meaning='Rolle identifiziert, persönlicher Zugang offen.';
  else if(/stunden.*monat/.test(low))meaning='Quantifizierter operativer Ausgangswert.';
  else if(/verloren|verschoben/.test(low))meaning='Dokumentiertes Ergebnis; Kausalität zur Lösung bleibt getrennt.';
  else if(/möglicherweise|nicht bestätigt, dass/.test(low))meaning='Wirkungshypothese – nicht als Nutzenbeweis übernehmen.';
  else if(/erfolgskriterien/.test(low)&&/nicht/.test(low))meaning='Kriterien intern bekannt, aber kundenseitig noch nicht bestätigt.';
  else if(/angebotspreis|pilotpreis/.test(low)&&/offen/.test(low))meaning='Angebotsparameter offen.';
  return {category,kind,meaning};
}
function scanImport813(raw){
  const seen=new Set(),items=[];

}
