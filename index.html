async function runAutopilot(){
  const cust=getActiveCust();
  const mu=LS.get('ki21_mu',{});
  const kk=LS.get('ki21_kk_'+state.activeId,'');
  const phaseNamesShort=['Qualifizierung','Bedarfsanalyse','Termin nachbereiten','Nutzen-Kosten-Analyse','Angebot & Abschluss'];

  const app=document.getElementById('app');
  app.innerHTML='';
  const progBox=h('div',{style:{padding:'20px 16px',maxWidth:'500px',margin:'0 auto'}});
  progBox.appendChild(h('div',{style:{fontSize:'15px',fontWeight:'800',marginBottom:'14px'}},
    'πüîç KI21 erstellt Ihre Opportunity-Vorschau'));
  const stepEls=[];
  for(let i=0;i<5;i++){
    const stepEl=h('div',{style:{fontSize:'13px',padding:'8px 0',color:'var(--text2)'}},
      'βè≥ '+phaseNamesShort[i]);
    stepEls.push(stepEl);
    progBox.appendChild(stepEl);
  }
  app.appendChild(progBox);

  // Non-invasive: only READ Phase 1 (Qualifizierung) input fields, never write to real phase data
  const phase1Data=LS.get('ki21_st_'+state.activeId+'_0',{fv:{},result:''});
  const dossierResults=[];
  let prevResult='';

  for(let i=0;i<5;i++){
    const sit=SITS[i];
    // Build a synthetic field-value object for this phase, fed only by the chain of previous in-memory results
    let fv={};
    if(i===0){
      fv=phase1Data.fv||{};
    } else {
      const textFieldId=sit.felder.find(f=>f.t==='ta'&&!f.readonly);
      const ctxFieldId=sit.felder.find(f=>f.readonly);
      if(ctxFieldId)fv[ctxFieldId.id]=prevResult;
      if(textFieldId)fv[textFieldId.id]=prevResult;
      // For phases with additional fields (e.g. paket/budget in Phase 4/5), leave them empty -
      // the Opportunity-Vorschau prompt rules instruct the model to use BRANCHENHYPOTHESE for missing data.
    }

    const stk='';
    try{
      const prompt=sit.build(fv,cust,mu,kk,stk);
      const result=await callClaude(prompt,null);
      if(result){
        dossierResults.push({title:sit.title,result});
        prevResult=result;
        stepEls[i].textContent='β€™ '+phaseNamesShort[i];
        stepEls[i].style.color='#2ea043';
      } else {
        dossierResults.push({title:sit.title,result:'(Keine Antwort erhalten)'});
        stepEls[i].textContent='βö†οΗè '+phaseNamesShort[i]+' (fehlgeschlagen)';
        stepEls[i].style.color='#f85149';
      }
    }catch(e){
      dossierResults.push({title:sit.title,result:'(Fehler: '+e.message+')'});
      stepEls[i].textContent='βö†οΗè '+phaseNamesShort[i]+' (Fehler: '+e.message+')';
      stepEls[i].style.color='#f85149';
    }
  }

  progBox.appendChild(h('div',{style:{fontSize:'14px',fontWeight:'700',color:'#2ea043',marginTop:'16px'}},
    'β€Ö Opportunity-Vorschau erfolgreich erstellt.'));
  // Automatically download as PDF/HTML so the result is never lost
  exportAutopilotPDF(cust,dossierResults);
  progBox.appendChild(h('div',{style:{fontSize:'11px',color:'var(--text2)',marginTop:'6px'}},
    'πü™³ Vorschau wurde automatisch heruntergeladen.'));
  const showBtn=h('button',{className:'btn-o',style:{marginTop:'14px',width:'100%'},
    onclick:()=>showAutopilotDossier(cust,dossierResults)
  },'Vorschau ansehen βÜ£');
  progBox.appendChild(showBtn);
  // Keep results available for immediate PDF export without re-running
  state.lastAutopilotDossier={cust,dossierResults};
}

function transferAndGo(fromId, toId, result){
  // Direct transfer - output is already compact
  const nextKEY='ki21_st_'+state.activeId+'_'+toId;
  const nextData=LS.get(nextKEY,{fv:{},result:''});

  const fieldMap={
    1:{f1:'kontext'}
  };

  // Phase 1βÜ£2: isolierter SPIN-Generator
  // Kernidee: SPIN-Fragen werden NICHT aus dem Phase-1-Ergebnis extrahiert (das enthΟΛlt
  // strategisches Messaging/Framing, das S-Fragen verfΟΛlscht), sondern in einem zweiten,
  // kontextisolierten API-Call mit nur den nackten Kundenfakten neu erzeugt.
  if(fromId===0){
    const cust=getActiveCust();
    // Zeige sofort die Phase-2-Seite mit Ladezustand im spin-Feld
    nextData.fv['spin']='βè≥ SPIN-Fragen werden isoliert generiert...';
    LS.set(nextKEY,nextData);
    state.pendingSit=null;
    renderStation(toId);

    // Isolierter Kontext: NUR nackte Kundenfakten βÄî bewusst KEIN buildCtx(), kein kk/stk,
    // kein Ergebnis aus Phase 1, damit kein Messaging/Strategie-Framing einfliesst.
    const isolatedCtx=`Firma: ${cust.firma||'βÄ™'}
Branche: ${cust.branche||'βÄ™'}
Mitarbeiter: ${cust.ma||'βÄ™'}
Ansprechpartner: ${cust.ap||'βÄ™'}
Umsatz: ${cust.um||'βÄ™'}`;

    const spinPrompt=`Du bist ein SPIN-Selling-Experte. Deine einzige Aufgabe: Generiere methodisch korrekte SPIN-Fragen fΟΦr das nΟΛchste KundengesprΟΛch.

STRIKTE METHODENREGEL βÄ™ KEINE AUSNAHMEN:
S (SITUATION): Sammle nur Fakten zum Ist-Zustand. Frage nach Prozessen, Systemen, Rollen, Zahlen. NIEMALS nach Meinungen, Zielen, WΟΦnschen oder Strategien.
  β€Ö "Wie lΟΛuft heute die Angebotserstellung konkret ab?"
  β€Ö "Welche Systeme nutzt Ihr AuΟüendienst?"
  βù¨ "Wo sehen Sie die grΟΕΟüten Hebel?" (Meinung, kein Fakt)
  βù¨ "WΟΛre Innovation im Vertrieb wichtig?" (Framing, kein Fakt)

P (PROBLEM): Lass den Kunden selbst benennen, was ihn stΟΕrt. Frage nach Schwierigkeiten, EngpΟΛssen, Frustration.
  β€Ö "Wo verliert Ihr Team am meisten Zeit?"
  βù¨ "WΟΦrde Feature X das lΟΕsen?" (LΟΕsungsvalidierung, gehΟΕrt zu N)

I (IMPLICATION): Mach die Konsequenzen des Problems sichtbar. Kosten, VerzΟΕgerungen, Risiken.
  β€Ö "Was passiert, wenn ein Angebot einen Tag zu spΟΛt kommt?"

N (NEED-PAYOFF): Lass den Kunden den Nutzen einer LΟΕsung beschreiben.
  β€Ö "Was wΟΦrde sich ΟΛndern, wenn diese Information sofort verfΟΦgbar wΟΛre?"

KUNDENDATEN (nur diese βÄ™ kein weiterer Kontext):
${isolatedCtx}

Generiere jetzt 5βÄ™7 SPIN-Fragen. Jede Frage auf einer Zeile, Format "Buchstabe: Frage".
Nur die Fragen, keine ErklΟΛrungen, keine Einleitung.`;

    (async()=>{
      try{
        const spinResult=await callClaude(spinPrompt,null);
        if(spinResult){
          const freshData=LS.get(nextKEY,{fv:{},result:''});
          // Bereinige Output: nur Zeilen mit echtem SPIN-Letter-Pattern
          const cleanLines=spinResult.split('\n')
            .map(l=>l.trim())
            .filter(l=>/^[SPIN]\s*[:\-βÄ™]/i.test(l));
          freshData.fv['spin']=cleanLines.join('\n');
          LS.set(nextKEY,freshData);
          // Re-render nur wenn Nutzer noch auf Phase 2 ist
          if(LS.get('ki21_view','')!=='home')renderStation(toId);
        }
      }catch(e){
        // Fallback: extrahiere SPIN-Zeilen aus Phase-1-Ergebnis (alter Mechanismus)
        const freshData=LS.get(nextKEY,{fv:{},result:''});
        const fallbackLines=result.split('\n')
          .map(l=>l.trim())
          .filter(l=>/^(?:βÄΔ\s*)?[SPIN]\s*[:\-βÄ™]/i.test(l));
        freshData.fv['spin']=fallbackLines.join('\n')||result.slice(0,800);
        LS.set(nextKEY,freshData);
        if(LS.get('ki21_view','')!=='home')renderStation(toId);
      }
    })();
    return;
  }

  // Phase 2βÜ£3 (Nachbereitung βÜ£ Nutzen-Kosten-Analyse): KPI-Extraktion statt Volltext
  if(fromId===2&&toId===3){
    nextData.fv['erkenntnisse']='βè≥ KPIs werden extrahiert...';
    LS.set(nextKEY,nextData);
    renderStation(toId);

    (async()=>{
      const {main:resultMain,details:resultDetails}=splitDetailsFromResult(result);
      const fullSource=resultMain+(resultDetails?'\n'+resultDetails:'');
      const kpiPrompt=`Hier ist ein Besuchsbericht aus einem Kundentermin:\n\n${fullSource}\n\nExtrahiere AUSSCHLIESSLICH die konkreten Zahlen, KPIs und wirtschaftlich relevanten Fakten, die der Kunde genannt hat (z.B. Zeitaufwand, Mitarbeiterzahlen, Kosten, StΟΦckzahlen, Fehlerquoten, Durchlaufzeiten).\n\nFormat: kurze Stichpunkte, eine Zahl/Aussage pro Zeile. Keine Einleitung, kein FlieΟütext. Wenn keine konkreten Zahlen genannt wurden, schreibe: "Keine konkreten KPIs im GesprΟΛch genannt βÄ™ bitte beim Kunden nachfragen."`;

      try{
        const kpiResult=await callClaude(kpiPrompt,null);
        if(kpiResult){
          const freshData=LS.get(nextKEY,{fv:{},result:''});
          freshData.fv['erkenntnisse']=kpiResult;
          LS.set(nextKEY,freshData);
          renderStation(toId);
        }
      }catch(e){
        const freshData=LS.get(nextKEY,{fv:{},result:''});
        freshData.fv['erkenntnisse']=result;
        LS.set(nextKEY,freshData);
        renderStation(toId);
      }
    })();
    return;
  }

  const map=fieldMap[fromId];
  if(map){
    const {main:transferMain}=splitDetailsFromResult(result);
    nextData.fv[map.f1]=transferMain;
  }

  LS.set(nextKEY,nextData);
  renderStation(toId);
}

  // "πüé· EINSCHΟ³TZUNG" und "NΟ³CHSTER SCHRITT DIESE WOCHE".
  function extractAfterHeader(text,headerKeyword){
    const lines=(text||'').split('\n');
    for(let i=0;i<lines.length;i++){
      if(lines[i].toUpperCase().includes(headerKeyword)){
        const colonIdx=lines[i].indexOf(':');
        if(colonIdx!==-1&&lines[i].slice(colonIdx+1).trim())return lines[i].slice(colonIdx+1).trim();
        let out=[];
        for(let j=i+1;j<lines.length;j++){
          if(!lines[j].trim())break;
          out.push(lines[j].trim());
        }
        if(out.length)return out.join(' ');
      }
    }
    return '';
  }

  function extractFirstBulletAfterHeader(text,headerKeyword){
    const lines=(text||'').split('\n');
    for(let i=0;i<lines.length;i++){
      if(lines[i].toUpperCase().includes(headerKeyword.toUpperCase())){
        for(let j=i+1;j<lines.length;j++){
          const t=lines[j].trim();
          if(!t)break;
          return t.replace(/^[βÄΔ\-]\s*/,'').replace(/^\d+\.\s*/,'').trim();
        }
      }
    }
    return '';
  }

  function extractLineContaining(text,substr){

    const STRIP_PATTERNS=[

      /SPIN-FRAGEN[^\n]*/gi,
      /BEDARFSANALYSE-FRAGEN[^\n]*/gi,

function getAccPhaseInfo(accId){
  let furthest=-1;
  for(let i=0;i<5;i++){
    const data=LS.get('ki21_st_'+accId+'_'+i,null);
    if(data&&data.result)furthest=i;
  }
  const health=getOpportunityHealth(accId);
  return {phaseIdx:furthest,health};
}

  kontextDiv.appendChild(h('div',{className:'field-label',style:{marginBottom:'4px'}},

  const kkTa=h('textarea',{placeholder:'Was hast du in diesem GesprΟΛch gelernt? Was ist neu?'});
  kkTa.value=currentKkSlot;
  kkTa.addEventListener('input',e=>{currentKkSlot=e.target.value;});
  kontextDiv.appendChild(kkTa);

  content.appendChild(stammDiv);
  content.appendChild(kontextDiv);

  function switchTab(t){
    tab=t;
    stammDiv.style.display=t==='stamm'?'block':'none';
    kontextDiv.style.display=t==='kontext'?'block':'none';

    tabStamm.style.color=t==='stamm'?'#fff':'#8b949e';
    tabKontext.style.background=t==='kontext'?'#ff6b00':'#1c2333';
    tabKontext.style.color=t==='kontext'?'#fff':'#8b949e';
  }

  const btns=h('div',{className:'modal-row'});
  const saveB=h('button',{className:'btn-o',onclick:async()=>{
    if(!f.firma.trim()){alert('Bitte Firmenname eingeben.');return;}
    saveB.disabled=true;
    if(isEdit){
      state.accounts=state.accounts.map(a=>a.id===accId?{...a,cust:{...f}}:a);
      // Phasenbezogenen Slot speichern (nicht mehr globaler Key)
      LS.set('ki21_kk_'+accId+'_'+currentPhaseForKk,currentKkSlot);
      // Harte neue Erkenntnisse mΟΦssen alte Health-/Dashboard-Ableitungen ΟΦberschreiben.
      // Deshalb alten Health-Cache vor der Neuberechnung invalidieren.
      LS.set('ki21_health_'+accId,null);
      LS.set('ki21_health_lastError_'+accId,null);
      saveB.textContent='βè≥ Wird aktualisiert...';
      await refreshOpportunityHealth(accId);
      // Smart Impact Analyse im Hintergrund

    } else {
      const id='acc_'+Date.now();
      state.accounts=[{id,cust:{...f},ts:Date.now()},...state.accounts].slice(0,10);
      state.activeId=id;
      LS.set('ki21_aid',id);
      if(currentKkSlot.trim())LS.set('ki21_kk_'+id+'_'+currentPhaseForKk,currentKkSlot);
    }
    LS.set('ki21_acc',state.accounts);
    m.remove();
    if(state.pendingSit!==null){const s=state.pendingSit;state.pendingSit=null;renderStation(s);}
    else renderHome();
  }},isEdit?'Speichern':'Anlegen');
  const cancelB=h('button',{className:'btn',onclick:()=>m.remove()},'Abbrechen');

  btns.appendChild(cancelB);

async function showCRMImport(accId){
  const ta=h('textarea',{
    placeholder:'CRM-Text, LinkedIn-Profil oder beliebige Kundeninformationen hier einfΟΦgen...',
    style:{minHeight:'120px',width:'100%'}
  });
  const statusDiv=h('div',{style:{fontSize:'12px',color:'#8b949e',marginTop:'8px'}});
  
  const analyzeBtn=h('button',{className:'btn-o',style:{width:'100%',marginTop:'8px'},
    onclick:async()=>{
      const apiKey=LS.get('ki21_apikey','');
      if(!apiKey){alert('Bitte API Key hinterlegen.');return;}
      if(!ta.value.trim()){alert('Bitte Text einfΟΦgen.');return;}
      
      analyzeBtn.textContent='βè≥ Analysiere...';
      analyzeBtn.disabled=true;
      
      try{
        const prompt=`Du extrahierst Informationen aus einem Text fΟΦr ein B2B-Vertriebssystem.

Text:
${ta.value}

WICHTIG: Antworte AUSSCHLIESSLICH mit validem JSON. Kein Markdown. Keine ErklΟΛrung. Kein Text davor oder danach. Nur das JSON-Objekt.

{"firma":"","ap":"","branche":"","ma":"","um":"","kontext":"","persoenlich":"","herausforderungen":""}

FΟΦlle die Felder mit den gefundenen Informationen. Leere Felder bleiben leer.

WICHTIG zur Unterscheidung von "kontext" und "herausforderungen":
- "kontext": dauerhafte, strukturelle Informationen ΟΦber das Unternehmen (Branche, Aufbau, Standorte, TeamgrΟΕΟüe, allgemeine Beschreibung der Lage) βÄ™ Dinge, die ΟΦber viele Monate gΟΦltig bleiben.
- "herausforderungen": konkrete, aktuelle Herausforderungen, Probleme oder Kauftrigger, die JETZT die Vertriebssituation antreiben (z.B. "Forecast-QualitΟΛt schlecht", "neues CRM eingefΟΦhrt aber kaum genutzt", "GeschΟΛftsfΟΦhrer fordert Verbesserung"). Das sind die Dinge, die direkt eine Qualifizierungsfrage auslΟΕsen wΟΦrden.
Ein Text kann Anteile in beiden Feldern haben βÄ™ verteile sinnvoll, dopple nicht alles in beide Felder.`;

        const resp=await fetch('https://api.anthropic.com/v1/messages',{
          method:'POST',
          headers:{
            'Content-Type':'application/json',
            'x-api-key':apiKey,
            'anthropic-version':'2023-06-01',
            'anthropic-dangerous-direct-browser-access':'true'
          },
          body:JSON.stringify({
            model:'claude-haiku-4-5-20251001',
            max_tokens:1024,
            messages:[{role:'user',content:prompt}]
          })
        });
        
        const data=await resp.json();
        let txt=data.content[0].text.trim();
        // Strip markdown code blocks if present
        txt=txt.replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
        // Extract JSON object if wrapped in other text
        const jsonMatch=txt.match(/\{[\s\S]*\}/);
        if(!jsonMatch)throw new Error('Kein JSON gefunden');
        const parsed=JSON.parse(jsonMatch[0]);
        
        // Update customer data
        const acc=state.accounts.find(a=>a.id===accId);
        if(acc){
          if(parsed.firma)acc.cust.firma=parsed.firma;
          if(parsed.ap)acc.cust.ap=parsed.ap;
          if(parsed.branche)acc.cust.branche=parsed.branche;
          if(parsed.ma)acc.cust.ma=parsed.ma;
          if(parsed.um){
            // Normalize umsatz to readable format
            const rawUm=String(parsed.um).replace(/[^0-9.]/g,'');
            const numUm=parseFloat(rawUm);
            if(numUm>=1000000)acc.cust.um=(numUm/1000000).toFixed(0)+' Mio. β²§';
            else if(numUm>=1000)acc.cust.um=(numUm/1000).toFixed(0)+' Tsd. β²§';
            else acc.cust.um=parsed.um;
          }
          LS.set('ki21_acc',state.accounts);
          
          // Update kontext
          if(parsed.kontext||parsed.persoenlich){
            let kk=LS.get('ki21_kk_'+accId,'')||'';
            if(parsed.kontext)kk+=(kk?'\n\n':'')+parsed.kontext;
            if(parsed.persoenlich)kk+=(kk?'\n\nPERSΟ•NLICH:\n':'')+parsed.persoenlich;
            LS.set('ki21_kk_'+accId,kk);
            refreshOpportunityHealth(accId);
          }

          // Update Phase 1 "Bekannte Herausforderungen / Vermutungen" (mergen, nicht ΟΦberschreiben)
          if(parsed.herausforderungen){
            const st0=LS.get('ki21_st_'+accId+'_0',{fv:{},result:''});
            if(!st0.fv)st0.fv={};
            st0.fv.info=(st0.fv.info?st0.fv.info+'\n\n':'')+parsed.herausforderungen;
            LS.set('ki21_st_'+accId+'_0',st0);
          }
        }
        
        // Build confirmation
        const lines=[];
        if(parsed.firma)lines.push('β€Ö Firma: '+parsed.firma);
        if(parsed.ap)lines.push('β€Ö Ansprechpartner: '+parsed.ap);
        if(parsed.branche)lines.push('β€Ö Branche: '+parsed.branche);
        if(parsed.ma)lines.push('β€Ö Mitarbeiter: '+parsed.ma);
        if(parsed.um)lines.push('β€Ö Umsatz: '+parsed.um);
        if(parsed.kontext)lines.push('β€Ö Kontext: importiert');
        if(parsed.herausforderungen)lines.push('β€Ö Herausforderungen (Phase 1): importiert');
        if(parsed.persoenlich)lines.push('β€Ö PersΟΕnliche Infos: importiert');

        statusDiv.innerHTML='<div style="margin-top:10px;padding:10px;background:rgba(46,160,67,.1);border-radius:6px;border:1px solid rgba(46,160,67,.3);">'+
          '<div style="font-size:11px;font-weight:700;color:#2ea043;margin-bottom:6px;letter-spacing:.5px;">IMPORTIERT:</div>'+
          lines.map(l=>'<div style="font-size:12px;color:#e6edf3;padding:2px 0;">'+l+'</div>').join('')+
          '</div>';
        analyzeBtn.textContent='β€™ SchlieΟüen';
        analyzeBtn.onclick=()=>{if(modalRef)modalRef.remove();};
        
      }catch(e){
        statusDiv.textContent='Fehler: '+e.message;
        analyzeBtn.textContent='CRM-Text analysieren';
        analyzeBtn.disabled=false;
      }
    }
  },'CRM-Text analysieren');
  
  const content=h('div',{},
    h('p',{style:{fontSize:'12px',color:'#8b949e',marginBottom:'8px'}},
      'FΟΦgen Sie beliebigen Text ein βÄ™ CRM-Export, LinkedIn-Profil, E-Mail oder Notizen. Claude erkennt und verteilt die Informationen automatisch.'),
    ta,
    analyzeBtn,
    statusDiv
  );
  let modalRef=null;
  const m=modal('πü™Ξ CRM-Text importieren',content,null);
  modalRef=m;
}

function renderBranchenwissen(text){
  if(!text)return '';
  const lines=text.split('\n');
  let html='';
  let counter=0;
  let inEntry=false;
  lines.forEach(line=>{
    const t=line.trim();
    if(!t)return;
    // Category headers (ALL CAPS followed by colon, optionally with count in parens)
    if(/^[A-ZΟ³Ο•Ο€\- ]+(\s*\(\d+.*\))?:$/.test(t)){
      if(inEntry)html+='</div>';
      html+=`<div style="margin:14px 0 8px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#ff6b00;border-bottom:1px solid #30363d;padding-bottom:4px;">${t.replace(/:$/,'')}</div>`;
      counter=0;
      inEntry=false;
      return;
    }
    // Field lines like "Pattern: ...", "Kennzahl: ...", "Confidence: ..."
    const fieldMatch=t.match(/^([A-ZΟ³Ο•Ο€a-zΟΛΟΕΟΦ]+):\s*(.*)$/);
    if(fieldMatch){
      const field=fieldMatch[1];
      const value=fieldMatch[2];
      if(field==='Pattern'||field==='Kennzahl'||field==='Rolle'||field==='Einwand'||field==='Insight'||field==='Frage'||field==='Titel'||field==='Typ'){
        if(inEntry)html+='</div>';
        counter++;
        html+=`<div style="background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px 10px;margin-bottom:6px;">
          <div style="font-size:11px;font-weight:700;color:#fff;margin-bottom:3px;">${counter}. ${value}</div>`;
        inEntry=true;
      } else if(field==='Confidence'||field==='Status'){
        const badge=value.toLowerCase().includes('hoch')||value.includes('recherchiert')?'πüüΔ':value.toLowerCase().includes('mittel')||value.includes('Erfahrungswissen')?'πüüΓ':'πüî¥';
        html+=`<div style="font-size:9px;color:#8b949e;margin-top:4px;">${badge} ${value}</div></div>`;
        inEntry=false;
      } else {
        html+=`<div style="font-size:10px;color:#c9d1d9;line-height:1.4;"><span style="color:#8b949e;">${field}:</span> ${value}</div>`;
      }
      return;
    }
    // Fallback: plain line
    html+=`<div style="font-size:10px;color:#c9d1d9;">${t}</div>`;
  });
  if(inEntry)html+='</div>';
  return html;
}

const KI21_VERSION='v4.137';


function runKi21VersionMigration(){
  const applied=LS.get('ki21_applied_code_version','');
  if(applied===KI21_VERSION)return;
  const accs=LS.get('ki21_acc',[]);
  accs.forEach(acc=>{
    if(!acc||!acc.id)return;
    // Neue Code-Versionen dΟΦrfen keine alten Health-/Dashboard-Ableitungen weiterverwenden.
    // Phasentexte bleiben erhalten; nur der schnelle Health-Cache wird ungΟΦltig gemacht.
    LS.set('ki21_health_'+acc.id,null);
    LS.set('ki21_health_lastError_'+acc.id,null);
  });
  LS.set('ki21_applied_code_version',KI21_VERSION);
}

function encodeBase64UTF8(text){
  const bytes=new TextEncoder().encode(text);
  let binary='';
  const chunk=8192;
  for(let i=0;i<bytes.length;i+=chunk){
    binary+=String.fromCharCode(...bytes.subarray(i,i+chunk));
  }
  return btoa(binary);
}

function detectVersionFromHtml(html){
  const m=String(html||'').match(/v\d+\.\d+(?:\s*[A-Za-z0-9_-]+)?/);
  return m?m[0]:'unbekannte Version';
}

async function pushToGitHub(sourceText){
  const token=LS.get('ki21_github_token','');
  if(!token){alert('Bitte zuerst GitHub Token in Einstellungen hinterlegen.');return;}

  if(!sourceText||!String(sourceText).trim()){
    throw new Error('Kein App-Code zum VerΟΕffentlichen vorhanden. Bitte neue index.html in das Update-Feld einfΟΦgen.');
  }
  if(!String(sourceText).includes('<!DOCTYPE html')||!String(sourceText).includes('<script>')){
    throw new Error('Der eingefΟΦgte Text sieht nicht wie eine vollstΟΛndige index.html aus.');
  }

  const version=detectVersionFromHtml(sourceText);
  const headers={
    'Authorization':'token '+token,
    'Accept':'application/vnd.github.v3+json',
    'Content-Type':'application/json'
  };

  const shaResp=await fetch('https://api.github.com/repos/KI21-Vertrieb/KI21/contents/index.html',{headers});
  if(!shaResp.ok)throw new Error('GitHub Fehler '+shaResp.status);
  const shaData=await shaResp.json();
  const sha=shaData.sha;

  const encoded=encodeBase64UTF8(sourceText);

  const pushResp=await fetch('https://api.github.com/repos/KI21-Vertrieb/KI21/contents/index.html',{
    method:'PUT',
    headers,
    body:JSON.stringify({
      message:'KI21 '+version+' verΟΕffentlicht βÄ™ '+new Date().toLocaleDateString('de-DE'),
      content:encoded,
      sha:sha
    })
  });
  if(!pushResp.ok){
    let msg='Push Fehler '+pushResp.status;
    try{const err=await pushResp.json(); if(err&&err.message)msg+=': '+err.message;}catch(e){}
    throw new Error(msg);
  }
  LS.set('ki21_last_published_version',version);
  LS.set('ki21_last_published_at',new Date().toLocaleString('de-DE'));
  return version;
}

async function fetchCurrentPublishedHtml(){
  const resp=await fetch('https://ki21-vertrieb.github.io/KI21/index.html?nocache='+Date.now());
  if(!resp.ok)throw new Error('Aktuelle Live-Version konnte nicht gelesen werden ('+resp.status+').');
  return await resp.text();
}

function showExport(){
  const aid=state.activeId;
  const activeCust=(state.accounts.find(a=>a.id===aid)||{}).cust;

  // βîÄβîÄ VOLLSTΟ³NDIGES BACKUP (alle Accounts, alles) βîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄ
  const backupData={accounts:state.accounts,activeId:aid,mu:LS.get('ki21_mu',{}),stationData:{},kontextData:{}};
  state.accounts.forEach(acc=>{
    for(let i=0;i<5;i++){
      const sval=LS.get('ki21_st_'+acc.id+'_'+i,null);
      if(sval)backupData.stationData['ki21_st_'+acc.id+'_'+i]=sval;
    }
    for(let i=0;i<5;i++){
      const kkSlot=LS.get('ki21_kk_'+acc.id+'_'+i,null);
      if(kkSlot)backupData.kontextData['ki21_kk_'+acc.id+'_'+i]=kkSlot;
    }
    const legKk=LS.get('ki21_kk_'+acc.id,null);
    if(legKk)backupData.kontextData['ki21_kk_'+acc.id]=legKk;
    const manual=LS.get('ki21_health_manual_'+acc.id,null);
    if(manual)backupData.kontextData['ki21_health_manual_'+acc.id]=manual;
  });

  // βîÄβîÄ CLEAN OPPORTUNITY EXPORT (aktiver Account, nur Rohdaten) βîÄβîÄβîÄβîÄβîÄ
  const AI_FIELDS=['result','result2','summary','detail'];
  const cleanExport=aid?{
    version:'opportunity-rohdaten-v1',
    exportedAt:new Date().toISOString(),
    cust:activeCust||{},
    mu:LS.get('ki21_mu',{}),
    inputs:{},
    kk:{},
    manual:{}
  }:null;
  if(cleanExport){
    for(let i=0;i<5;i++){
      const sval=LS.get('ki21_st_'+aid+'_'+i,null);
      if(sval){
        const fvOnly={fv:{}};
        if(sval.fv)Object.keys(sval.fv).forEach(k=>{if(!AI_FIELDS.includes(k))fvOnly.fv[k]=sval.fv[k];});
        if(Object.keys(fvOnly.fv).length)cleanExport.inputs['slot_'+i]=fvOnly;
      }
      const kkSlot=LS.get('ki21_kk_'+aid+'_'+i,null);
      if(kkSlot&&kkSlot.trim())cleanExport.kk['slot_'+i]=kkSlot;
    }
    const manual=LS.get('ki21_health_manual_'+aid,null);
    if(manual)cleanExport.manual=manual;
  }

  const backupTxt=JSON.stringify(backupData);
  const cleanTxt=cleanExport?JSON.stringify(cleanExport,null,2):null;

  const backupBtn=h('button',{className:'btn',style:{width:'100%',marginBottom:'8px'}},
    'πü£Ψ Gesamtbackup kopieren');
  backupBtn.onclick=()=>{
    universalCopy(backupTxt,()=>{
      backupBtn.textContent='β€™ Kopiert';
      backupBtn.style.color='#2ea043';
      setTimeout(()=>{backupBtn.textContent='πü£Ψ Gesamtbackup kopieren';backupBtn.style.color='';},2000);
    });
  };

  const cleanBtn=cleanExport?h('button',{className:'btn-o',style:{width:'100%'}},
    'πü™΄ Opportunity-Rohdaten kopieren'):null;
  if(cleanBtn){
    cleanBtn.onclick=()=>{
      universalCopy(cleanTxt,()=>{
        cleanBtn.textContent='β€™ Kopiert';
        cleanBtn.style.background='#2ea043';
        setTimeout(()=>{cleanBtn.textContent='πü™΄ Opportunity-Rohdaten kopieren';cleanBtn.style.background='';},2000);
      });
    };
  }

  const content=h('div',{},
    h('div',{style:{background:'#1c2333',border:'1px solid #30363d',borderRadius:'12px',padding:'14px',marginBottom:'14px'}},
      h('div',{style:{fontSize:'11px',fontWeight:'700',color:'#8b949e',letterSpacing:'1px',textTransform:'uppercase',marginBottom:'6px'}},'Gesamtbackup'),
      h('div',{style:{fontSize:'12px',color:'#e6edf3',marginBottom:'10px'}},state.accounts.length+' Opportunit'+(state.accounts.length!==1?'ies':'y')+' ¬Ζ alle Daten inkl. KI-Ergebnisse'),
      backupBtn
    ),
    cleanExport?h('div',{style:{background:'#1c2333',border:'1px solid rgba(255,107,0,.4)',borderRadius:'12px',padding:'14px'}},
      h('div',{style:{fontSize:'11px',fontWeight:'700',color:'#ff6b00',letterSpacing:'1px',textTransform:'uppercase',marginBottom:'6px'}},'Opportunity-Rohdaten'),
      h('div',{style:{fontSize:'12px',color:'#e6edf3',marginBottom:'4px'}},(activeCust&&activeCust.firma)||'Aktuelle Opportunity'),
      h('div',{style:{fontSize:'11px',color:'#8b949e',marginBottom:'10px'}},'Nur Eingaben & ErgΟΛnzungen ¬Ζ KI-Ergebnisse werden neu generiert'),
      cleanBtn
    ):h('div',{style:{fontSize:'12px',color:'#8b949e'}},'Bitte zuerst eine Opportunity ΟΕffnen.')
  );
  modal('Exportieren',content,null);
}

function showImport(){
  const ta=h('textarea',{placeholder:'Export-Text hier einfΟΦgen...',style:{minHeight:'80px'}});
  const info=h('div',{style:{fontSize:'11px',color:'#8b949e',marginBottom:'8px'}});
  ta.addEventListener('input',()=>{
    try{
      const d=JSON.parse(ta.value);
      if(d.version==='opportunity-rohdaten-v1'){
        info.textContent='πü™΄ Opportunity-Rohdaten erkannt βÜ£ wird als neue Opportunity angelegt';
        info.style.color='#ff6b00';
      } else {
        info.textContent='πü£Ψ Gesamtbackup erkannt βÜ£ stellt vorhandene Daten wieder her';
        info.style.color='#8b949e';
      }
    }catch(e){info.textContent='';}
  });
  const content=h('div',{},
    h('p',{className:'modal-desc'},'Backup oder Opportunity-Rohdaten einfΟΦgen.'),
    info,ta,
    h('div',{className:'modal-row',style:{marginTop:'8px'}},
      h('button',{className:'btn-o',style:{flex:'1'},onclick:()=>{
        try{
          const d=JSON.parse(ta.value);
          if(d.version==='opportunity-rohdaten-v1'){
            // Clean Import: neue Opportunity anlegen
            const newId='acc_'+Date.now();
            const newCust={...d.cust};
            state.accounts=[{id:newId,cust:newCust,ts:Date.now()},...state.accounts].slice(0,10);
            state.activeId=newId;
            LS.set('ki21_acc',state.accounts);
            LS.set('ki21_aid',newId);
            if(d.mu)LS.set('ki21_mu',d.mu);
            if(d.inputs)Object.keys(d.inputs).forEach(k=>{
              const idx=parseInt(k.replace('slot_',''));
              if(!isNaN(idx))LS.set('ki21_st_'+newId+'_'+idx,d.inputs[k]);
            });
            if(d.kk)Object.keys(d.kk).forEach(k=>{
              const idx=parseInt(k.replace('slot_',''));
              if(!isNaN(idx))LS.set('ki21_kk_'+newId+'_'+idx,d.kk[k]);
            });
            if(d.manual)LS.set('ki21_health_manual_'+newId,d.manual);
            m.remove();renderHome();
            alert('Opportunity angelegt: '+(newCust.firma||'Neu')+'\nBitte alle Phasen neu generieren.');
          } else {
            // VollstΟΛndiges Backup wiederherstellen
            if(d.accounts){state.accounts=d.accounts;LS.set('ki21_acc',d.accounts);}
            if(d.activeId){state.activeId=d.activeId;LS.set('ki21_aid',d.activeId);}
            if(d.mu)LS.set('ki21_mu',d.mu);
            if(d.stationData)Object.keys(d.stationData).forEach(k=>LS.set(k,d.stationData[k]));
            if(d.kontextData)Object.keys(d.kontextData).forEach(k=>LS.set(k,d.kontextData[k]));
            m.remove();renderHome();
          }
        }catch(e){alert('UngΟΦltiger Text.');}
      }},'Importieren'),
      h('button',{className:'btn',onclick:()=>m.remove()},'Abbrechen')
    )
  );
  const m=modal('Importieren',content,null);
}
