ãÂ Budget / finanzielle Darstellbarkeit erkannt: ${state.metrics.budget?'JA':'NEIN'}\nãÂ Bereichsanalysen erzeugt: 7/7\nãÂ Evidence-EintrûÊge: ${state.evidence.length}\nãÂ Opportunity Score: ${sc.score}%\nãÂ Forecast: ${sc.forecast}%\nãÂ Score-Treiber: ${scoreDrivers()}

 return r}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function render(){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.activeTab));document.getElementById('oppName').textContent=`${state.company||'Neue Opportunity'} ôñ ${state.opportunity||'CRM-Import erforderlich'}`;document.getElementById('statusLine').textContent=statusText();const v=document.getElementById('view');if(state.activeTab==='cockpit')v.innerHTML=renderCockpit();else if(state.activeTab==='process')v.innerHTML=renderProcess();else v.innerHTML=renderInputs();bindView()}
function renderCockpit(){const sc=scores(),b=buyer(),sp=sponsor(),h=state.metrics.hours,annual=h*12;const strategic=strategicCase();const buyerText=b?b.name:'der wirtschaftliche Entscheider';if(strategic){return`<div class="metrics"><div class="metric" data-action="report"><div class="metric-label">OPPORTUNITY SCORE</div><div class="metric-value">${sc.score}%</div><div class="metric-sub">Antippen fû¥r vollstûÊndige Diagnose</div></div><div class="metric" data-action="report"><div class="metric-label">FORECAST</div><div class="metric-value">${sc.forecast}%</div><div class="metric-sub">evidenzbasiert</div></div></div><div class="card orange"><div class="kicker">Aktuelles Lagebild</div><div class="headline">Strategischer Fit vorhanden ã wirtschaftlicher Entscheidungsrahmen fehlt.</div><div class="divider"></div><div class="body">Die Erweiterung ist fachlich relevant und intern unterstû¥tzt. ${buyerText} ist als finaler wirtschaftlicher Entscheider identifiziert, aber noch nicht persûÑnlich eingebunden. Die stûÊrksten Nutzenhebel sind bekannt, ihre wirtschaftlichen Ausgangswerte jedoch noch nicht bestûÊtigt.</div></div><div class="card violet"><div class="kicker">NûÊchste Kundenentscheidung</div><div class="headline">Welche zwei Nutzenhebel rechtfertigen die Investition ã und welche Baseline akzeptiert ${buyerText}?</div></div><div class="card red"><div class="kicker">GrûÑûter Engpass</div><div class="body">Nicht der Produktfit, sondern der fehlende wirtschaftliche Nachweis blockiert die Entscheidung. ZusûÊtzlich muss die Abgrenzung zur internen Alternative verbindlich geklûÊrt werden.</div></div><div class="card blue"><div class="kicker">NûÊchster Schritt</div><div class="list"><div class="item">Wirtschaftlichen Discovery- und Entscheidungstermin mit ${buyerText}, ${sp?sp.name:'Sponsor'} und den relevanten Mitentscheidern vereinbaren.</div><div class="item">Einarbeitung, Personalbedarf, Eskalationen und Kundenbindung priorisieren und zwei Nutzenmodelle mit Baseline aufbauen.</div><div class="item">ServiceNow-Abgrenzung, Beweisfeld, Messlogik und Freigabeweg verbindlich festlegen.</div></div></div><div class="actions"><button class="btn secondary" data-action="report" onclick="window.__ki21OpenReport&&window.__ki21OpenReport(event)">VollstûÊndigen Testbericht ûÑffnen</button></div>`}return`<div class="metrics"><div class="metric" data-action="report"><div class="metric-label">OPPORTUNITY SCORE</div><div class="metric-value">${sc.score}%</div><div class="metric-sub">Antippen fû¥r vollstûÊndige Diagnose</div></div><div class="metric" data-action="report"><div class="metric-label">FORECAST</div><div class="metric-value">${sc.forecast}%</div><div class="metric-sub">evidenzbasiert</div></div></div><div class="card orange"><div class="kicker">Aktuelles Lagebild</div><div class="headline">Der operative Schmerz ist belegt ã die wirtschaftliche Entscheidung noch nicht.</div><div class="divider"></div><div class="body">${h} Stunden Zusatzaufwand pro Monat entsprechen ${annual.toLocaleString('de-DE')} Stunden pro Jahr. ${buyerText} ist ${state.flags.economicBuyerOpen?'noch nicht aktiv eingebunden':'aktiv eingebunden'}.</div></div><div class="card violet"><div class="kicker">NûÊchste Kundenentscheidung</div><div class="headline">Soll ${buyerText} die wirtschaftliche Relevanz bestûÊtigen ã und nach welchen Kriterien?</div></div><div class="card red"><div class="kicker">GrûÑûter Engpass</div><div class="body">Der Deal wird fachlich getragen, wirtschaftlich aber noch nicht verbindlich entschieden.</div></div><div class="card blue"><div class="kicker">NûÊchster Schritt</div><div class="list"><div class="item">Gemeinsamen Entscheidungstermin mit Sponsor und ${buyerText} vereinbaren.</div><div class="item">Erfolgskriterien, Wirkungsquote und Freigabeweg bestûÊtigen lassen.</div><div class="item">Danach Umfang, Messlogik und Preis finalisieren.</div></div></div><div class="actions"><button class="btn secondary" data-action="report" onclick="window.__ki21OpenReport&&window.__ki21OpenReport(event)">VollstûÊndigen Testbericht ûÑffnen</button></div>`}
function renderProcess(){return`<div class="card"><div class="kicker">Verkaufsprozess</div><div class="body muted">Bereiche ûÑffnen oder durch erneutes Antippen wieder schlieûen. Die Bildschirmposition bleibt stabil.</div></div>${PROCESS_AREAS.map((name,i)=>{const a=processAnalysis(name),open=state.openAreas.includes(name);return`<div class="process-card ${open?'open':''}" data-area="${esc(name)}"><button class="process-head" data-action="toggle-area" data-area="${esc(name)}"><span class="process-num">${i+1}</span><span class="process-title">${esc(name)}</span><span class="process-status">${esc(a.status)}</span><span class="process-arrow">ã¤</span></button><div class="process-body"><div class="analysis-block"><h4>EinschûÊtzung</h4><p>${esc(a.assessment)}</p></div><div class="analysis-block"><h4>BestûÊtigte Fakten</h4><p>${a.facts.length?a.facts.map(esc).join(' ôñ '):'Noch keine belastbaren Fakten.'}</p></div><div class="analysis-block"><h4>Offene Punkte</h4><p>${a.open.map(esc).join(' ôñ ')}</p></div><div class="analysis-block"><h4>Aha-Erkenntnis${esc(methodTag(a.insightMethods))}</h4><p>${esc(a.insight)}</p></div><div class="analysis-block"><h4>NûÊchster Kundenschritt${esc(methodTag(a.nextMethods))}</h4><p>${esc(a.next)}</p></div></div></div>`}).join('')}`}
function renderInputs(){const nav=[['crm','CRM-Import'],['qual','Qualifizierung'],['spin','SPIN'],['add','ErgûÊnzung'],['offer','Angebot']];return`<div class="input-nav">${nav.map(([k,l])=>`<button class="${state.inputTab===k?'active':''}" data-input-tab="${k}">${l}</button>`).join('')}</div>${state.inputTab==='crm'?renderCrm():state.inputTab==='qual'?renderQuestions('qual',QUAL_QUESTIONS):state.inputTab==='spin'?renderQuestions('spin',SPIN_QUESTIONS):state.inputTab==='add'?renderAddition():renderOffer()}`}
function renderCrm(){return`<div class="card orange"><div class="kicker">CRM-Import</div><div class="body">CRM-Text einfû¥gen, scannen, Zuordnungen prû¥fen und ausgewûÊhlte Daten û¥bernehmen.</div><div class="divider"></div><textarea id="crmText">${esc(state.rawImport)}</textarea><div class="actions"><button class="btn primary" data-action="scan-import">Import scannen</button><button class="btn secondary" data-action="reset-sample">Novacore-Beispiel laden</button></div>${state.importPreview.length?`<div class="preview"><div class="actions"><button class="btn secondary" data-action="select-all">Alle auswûÊhlen</button><button class="btn secondary" data-action="select-none">Alle abwûÊhlen</button></div>${state.importPreview.map((x,i)=>`<label class="preview-row"><input type="checkbox" data-preview-index="${i}" ${x.selected?'checked':''}><span class="preview-main"><span class="preview-top"><span class="badge ${x.type==='fakt'?'fact':x.type==='offen'?'open':x.type==='ableitung'?'der':'hyp'}">${esc(x.type)}</span><span class="badge">${esc(x.category)}</span></span><span class="preview-text">${esc(x.text)}</span></span></label>`).join('')}<div class="actions"><button class="btn primary" data-action="apply-import">AusgewûÊhlte Daten û¥bernehmen</button></div></div>`:''}</div>`}
function renderQuestions(kind,qs){const title=kind==='qual'?'Gezielte Qualifizierungsfragen':'SPIN-Fragen fû¥r das nûÊchste KundengesprûÊch';return`<div class="card blue"><div class="kicker">${title}</div><div class="body muted">KI21 gibt die Fragen vor. Der Nutzer beantwortet nur, was im Deal noch geklûÊrt werden muss.</div><div class="divider"></div>${qs.map(([label,q],i)=>`<div class="question"><div class="q-label">${esc(label)}</div><div class="q-text">${esc(q)}</div><textarea data-answer-kind="${kind}" data-answer-index="${i}">${esc(state.answers[kind][i]||'')}</textarea></div>`).join('')}<button class="btn primary" data-action="save-answers" data-kind="${kind}">Antworten speichern & auswerten</button></div>`}
function renderAddition(){return`<div class="card green"><div class="kicker">Globale ErgûÊnzung</div><div class="body">Neue Informationen aus GesprûÊch, E-Mail oder Notiz. KI21 ordnet sie automatisch dem gesamten Deal zu.</div><div class="divider"></div><textarea id="additionText" placeholder="Neue Informationen einfû¥gen ãÎ"></textarea><div class="actions"><button class="btn primary" data-action="save-addition">ErgûÊnzung û¥bernehmen</button></div>${state.additions.length?`<div class="divider"></div><div class="label">Bisherige ErgûÊnzungen</div><div class="list">${state.additions.map(x=>`<div class="item">${esc(x.text)}</div>`).join('')}</div>`:''}</div>`}
function renderOffer(){return`<div class="card violet"><div class="kicker">Angebotsparameter</div><div class="field"><label>Angebots- oder Pilotpreis</label><input id="offerPrice" value="${esc(state.offer.price||'')}" placeholder="z. B. 35.000 ã˜"></div><div class="field"><label>Interner Stundenwert</label><input id="offerTimeValue" value="${esc(state.offer.timeValue||'')}" placeholder="z. B. 85 ã˜"></div><div class="field"><label>Umfang / Pilotumfang</label><input id="offerScope" value="${esc(state.offer.scope||'')}" placeholder="z. B. 8 Nutzer, 10 Enterprise-Deals"></div><div class="field"><label>Laufzeit</label><input id="offerDuration" value="${esc(state.offer.duration||'')}" placeholder="z. B. 10 Wochen"></div><div class="field"><label>Betrachtungszeitraum fû¥r Business Case (Monate)</label><input id="offerPeriodMonths" inputmode="decimal" value="${esc(state.offer.periodMonths||'')}" placeholder="z. B. 6"></div><div class="field"><label>Erfolgskriterien</label><input id="offerCriteria" value="${esc(state.offer.criteria||'')}" placeholder="z. B. 25 % weniger Review-Aufwand"></div><button class="btn primary" data-action="save-offer">Angebotsparameter speichern</button></div>`}
function bindView(){document.querySelectorAll('[data-action="toggle-area"]').forEach(b=>b.addEventListener('click',()=>{const n=b.dataset.area;state.openAreas=state.openAreas.includes(n)?state.openAreas.filter(x=>x!==n):[...state.openAreas,n];saveState();const card=b.closest('.process-card');card.classList.toggle('open')}));document.querySelectorAll('[data-input-tab]').forEach(b=>b.addEventListener('click',()=>{state.inputTab=b.dataset.inputTab;saveState();render()}));document.querySelectorAll('[data-preview-index]').forEach(c=>c.addEventListener('change',()=>{state.importPreview[Number(c.dataset.previewIndex)].selected=c.checked;saveState()}));document.querySelectorAll('[data-action]').forEach(b=>{if(b.dataset.action==='toggle-area')return;b.addEventListener('click',()=>handleAction(b.dataset.action,b))})}
function handleAction(action,el){if(action==='scan-import'){const raw=document.getElementById('crmText').value;const p=parseImport(raw);state.rawImport=raw;state.importPreview=p.evidence.map(x=>({...x,selected:true}));state._pendingParsed=p;saveState();render();toast(`${p.evidence.length} Aussagen und ${p.stakeholders.length} Stakeholder erkannt`)}else if(action==='reset-sample'){state.rawImport=DEFAULT_IMPORT;state.importPreview=[];saveState();render()}else if(action==='select-all'||action==='select-none'){const val=action==='select-all';state.importPreview.forEach(x=>x.selected=val);saveState();render()}else if(action==='apply-import'){const p=parseImport(state.rawImport);const selected=state.importPreview.filter(x=>x.selected);if(state.company&&p.company&&((p.company!==state.company)||(p.opportunity&&p.opportunity!==state.opportunity))){const fresh=emptyState(false);fresh.rawImport=state.rawImport;portfolio.opportunities.push(fresh);portfolio.activeId=fresh.id;state=fresh}applyParsed(state,p);state.evidence=selected;state.importPreview=selected.map(x=>({...x}));saveState();render();toast('Import als eigene Opportunity û¥bernommen')}else if(action==='save-answers'){const kind=el.dataset.kind;document.querySelectorAll(`[data-answer-kind="${kind}"]`).forEach(t=>state.answers[kind][Number(t.dataset.answerIndex)]=t.value.trim());saveState();render();toast('Antworten gespeichert und ausgewertet')}else if(action==='save-addition'){const t=document.getElementById('additionText').value.trim();if(!t)return toast('Bitte ErgûÊnzung eingeben');state.additions.push({text:t,at:new Date().toISOString()});const p=parseImport(state.rawImport+'\n\nErgûÊnzung\n'+state.additions.map(x=>x.text).join('\n'));state.metrics=p.metrics;state.flags=p.flags;if(p.stakeholders.length)state.stakeholders=p.stakeholders;saveState();render();toast('ErgûÊnzung û¥bernommen und Deal aktualisiert')}else if(action==='save-offer'){state.offer={price:document.getElementById('offerPrice').value.trim(),timeValue:document.getElementById('offerTimeValue').value.trim(),scope:document.getElementById('offerScope').value.trim(),duration:document.getElementById('offerDuration').value.trim(),periodMonths:document.getElementById('offerPeriodMonths').value.trim(),criteria:document.getElementById('offerCriteria').value.trim()};if(state.offer.price)state.flags.priceOpen=false;if(state.offer.criteria)state.flags.successOpen=false;saveState();render();toast('Angebotsparameter gespeichert')}else if(action==='report'){showReport()}}
async function copyTextReliable(text){
 try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(text);return true}}catch(e){}
 try{const ta=document.createElement('textarea');ta.value=text;ta.setAttribute('readonly','');ta.style.cssText='position:fixed;left:-9999px;top:0;opacity:0';document.body.appendChild(ta);ta.focus();ta.select();ta.setSelectionRange(0,ta.value.length);const ok=document.execCommand('copy');ta.remove();return ok}catch(e){return false}
}
function showReport(){
 let reportText='';
 try{reportText=fullReport()}catch(err){
  console.error('KI21 report generation failed',err);
  reportText=`KI21 TESTBERICHT KONNTE NICHT VOLLSTûNDIG ERZEUGT WERDEN\n\nFehler: ${err&&err.message?err.message:String(err)}\n\nOpportunity: ${state?.company||''} ôñ ${state?.opportunity||''}`;
 }
 const existing=document.getElementById('ki21ReportOverlay');if(existing)existing.remove();
 const overlay=document.createElement('div');overlay.id='ki21ReportOverlay';overlay.style.cssText='position:fixed;inset:0;z-index:1000;background:rgba(4,7,11,.94);display:flex;align-items:flex-end;justify-content:center;touch-action:manipulation';
 overlay.innerHTML=`<div style="width:100%;max-width:720px;max-height:94vh;overflow:auto;-webkit-overflow-scrolling:touch;background:#111722;border:1px solid var(--line);border-bottom:0;border-radius:22px 22px 0 0;padding:16px 14px max(28px,env(safe-area-inset-bottom))"><div class="headline">VollstûÊndiger QualitûÊtsbericht</div><div class="body muted" style="margin:5px 0 12px">EnthûÊlt State, Stakeholder, Importaussagen, Eingaben und alle sieben Bereichsanalysen.</div><div class="actions" style="margin:0 0 12px"><button class="btn primary" id="copyFullReport">VollstûÊndigen Bericht kopieren</button><button class="btn secondary" id="closeReportTop">Schlieûen</button></div><div class="report">${esc(reportText)}</div><div class="actions"><button class="btn secondary" id="copyFullReportBottom">Bericht kopieren</button><button class="btn primary" id="closeReport">Schlieûen</button></div></div>`;
 document.body.appendChild(overlay);
 const doCopy=async(btn)=>{const original=btn.textContent;btn.disabled=true;const ok=await copyTextReliable(reportText);btn.textContent=ok?'ã Bericht kopiert':'Kopieren fehlgeschlagen';if(ok)toast('VollstûÊndiger Testbericht kopiert');setTimeout(()=>{btn.disabled=false;btn.textContent=original},1800)};
 overlay.querySelector('#copyFullReport')?.addEventListener('click',e=>doCopy(e.currentTarget));
 overlay.querySelector('#copyFullReportBottom')?.addEventListener('click',e=>doCopy(e.currentTarget));
 const close=()=>overlay.remove();overlay.querySelector('#closeReport')?.addEventListener('click',close);overlay.querySelector('#closeReportTop')?.addEventListener('click',close);overlay.addEventListener('click',e=>{if(e.target===overlay)close()});
}
window.__ki21OpenReport=function(ev){if(ev){ev.preventDefault();ev.stopPropagation()}showReport()};
document.addEventListener('click',function(ev){const target=ev.target.closest&&ev.target.closest('[data-action="report"]');if(!target)return;ev.preventDefault();ev.stopPropagation();showReport()},true);
function showOpportunityManager(){const overlay=document.createElement('div');overlay.style.cssText='position:fixed;inset:0;z-index:150;background:rgba(4,7,11,.9);display:flex;align-items:flex-end;justify-content:center';const rows=portfolio.opportunities.slice().sort((a,b)=>String(b.updatedAt).localeCompare(String(a.updatedAt))).map(o=>`<div style="border:1px solid ${o.id===state.id?'rgba(255,122,26,.65)':'var(--line)'};border-radius:14px;padding:12px;margin-bottom:8px;background:#0d131d"><button data-switch-id="${esc(o.id)}" style="width:100%;border:0;background:transparent;color:var(--text);text-align:left;padding:0;cursor:pointer"><div style="font-size:14px;font-weight:900">${esc(o.company||'Neue Opportunity')}</div><div style="font-size:11px;color:var(--muted);margin-top:4px">${esc(o.opportunity||'CRM-Import noch nicht durchgefû¥hrt')}</div><div style="font-size:9px;color:var(--muted);margin-top:5px">${o.id===state.id?'Aktuell geûÑffnet ôñ ':''}${esc(o.phase||'Ohne Phase')}</div></button><div class="actions" style="margin-top:8px"><button class="btn secondary" data-switch-id="${esc(o.id)}">ûffnen</button><button class="btn danger" data-delete-id="${esc(o.id)}">LûÑschen</button></div></div>`).join('');overlay.innerHTML=`<div style="width:100%;max-width:720px;max-height:88vh;overflow:auto;background:#111722;border:1px solid var(--line);border-bottom:0;border-radius:22px 22px 0 0;padding:16px 14px max(28px,env(safe-area-inset-bottom))"><div class="headline">Kunden & Opportunities</div><div class="body muted" style="margin:5px 0 12px">Kunden auswûÊhlen, wechseln, neu anlegen oder lûÑschen.</div><div class="actions" style="margin:0 0 14px"><button class="btn primary" id="newOpportunity">Neue Opportunity</button><button class="btn secondary" id="closeOpportunityManager">Schlieûen</button></div>${rows}</div>`;document.body.appendChild(overlay);overlay.querySelector('#newOpportunity').addEventListener('click',()=>{overlay.remove();createOpportunity()});overlay.querySelector('#closeOpportunityManager').addEventListener('click',()=>overlay.remove());overlay.querySelectorAll('[data-switch-id]').forEach(b=>b.addEventListener('click',()=>{const id=b.dataset.switchId;overlay.remove();switchOpportunity(id)}));overlay.querySelectorAll('[data-delete-id]').forEach(b=>b.addEventListener('click',()=>{const id=b.dataset.deleteId;const o=portfolio.opportunities.find(x=>x.id===id);if(confirm(`ã${o?.company||'Opportunity'}ã wirklich lûÑschen?`)){deleteOpportunity(id);overlay.remove();showOpportunityManager()}}));overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove()})}

document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{state.activeTab=b.dataset.tab;saveState();render()}));
document.getElementById('oppName').addEventListener('click',showOpportunityManager);
render();
</script>
