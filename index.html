r:rgba(176,154,248,.35)}.preview-text{font-size:12px;line-height:1.4}.question{padding:12px;border:1px solid var(--line);border-radius:13px;background:#0d131d;margin-bottom:9px}.question .q-label{font-size:9px;color:var(--orange);font-weight:900;text-transform:uppercase;letter-spacing:.9px;margin-bottom:5px}.question .q-text{font-size:12.5px;font-weight:800;margin-bottom:8px}.question textarea{min-height:90px}.report{white-space:pre-wrap;font-size:12px;line-height:1.58;background:#0d131d;border:1px solid var(--line);border-radius:12px;padding:13px;max-height:58vh;overflow:auto}.footer{margin:28px 0 0;text-align:center;font-size:9px;color:#687384}.toast{position:fixed;left:50%;bottom:max(28px,calc(16px + env(safe-area-inset-bottom)));transform:translateX(-50%);z-index:200;background:#171e2a;border:1px solid rgba(255,122,26,.45);border-radius:999px;padding:10px 14px;font-size:12px;font-weight:850;opacity:0;pointer-events:none;transition:.18s}.toast.show{opacity:1;transform:translate(-50%,-4px)}.hidden{display:none!important}

<body>

<section id="view"><div class="card orange" id="hardEmptyState"><div class="kicker">Start</div><div class="headline">Opportunity auswûÊhlen oder neu anlegen</div><div class="divider"></div><div class="body">Gespeicherte Opportunities ûÑffnen oder direkt einen neuen CRM-Import starten.</div><div class="actions"><button class="btn primary" onclick="showOpportunityManager()">Gespeicherte Opportunities</button><button class="btn secondary" onclick="createOpportunity()">Neue Opportunity</button></div></div></section>

<script>
'use strict';
const VERSION='KI21 Core 8.10.0 ôñ Expansion Report Integrity';
const HEADER_VERSION=VERSION.replace(/^KI21\s+/,'').split(' ôñ ')[0];
const STORAGE_KEY='ki21_portfolio_stable_v1';
const LEGACY_KEYS=['ki21_core_896_portfolio','ki21_core_895_portfolio','ki21_core_894_portfolio','ki21_core_893_portfolio','ki21_core_892_portfolio','ki21_core_891_portfolio','ki21_core_890_portfolio','ki21_core_881_portfolio','ki21_core_880_portfolio','ki21_core_841_portfolio','ki21_core_830_state'];
const DEFAULT_IMPORT='';

const PROCESS_AREAS=['Qualifizierung','Bedarfsanalyse','Demo','Einwandbehandlung','Wirtschaftlicher Nutzen & ROI','Angebot','Abschluss'];
const QUAL_QUESTIONS=[
['Problemrelevanz','Welche Folgen hat das Problem fû¥r die wirtschaftliche Entscheiderin persûÑnlich?'],
['Sponsor','Wer treibt das Vorhaben intern aktiv voran und û¥bernimmt Verantwortung?'],
['Wirtschaftliche Entscheidung','Wer kann die Investition freigeben und ist diese Person aktiv eingebunden?'],
['Entscheidungsprozess','Welche Schritte, Personen und Kriterien fû¥hren zur verbindlichen Entscheidung?'],
['Budget','Welcher Budgetrahmen ist bestûÊtigt und wofû¥r gilt er genau?'],
['Zeitplan','Bis wann soll entschieden werden und was lûÑst den Termin aus?']
];
const SPIN_QUESTIONS=[
['Situation','Wie wird die Opportunity-Steuerung heute konkret durchgefû¥hrt?'],
['Problem','Wo entstehen dabei Fehler, Reibungsverluste oder unnûÑtiger Aufwand?'],
['Auswirkung','Welche operativen, finanziellen oder strategischen Folgen entstehen daraus?'],
['Nutzen','Welche messbare Verbesserung wûÊre fû¥r den Kunden entscheidungsrelevant?']
];

function uid(){return 'opp_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8)}
function emptyState(withSample=false){return{id:uid(),version:VERSION,activeTab:'inputs',inputTab:'crm',rawImport:'',importPreview:[],company:'',opportunity:'',phase:'',pilotUsers:0,stakeholders:[],evidence:[],objections:[],damageSignals:[],metrics:{hours:0,lost:null,possible:'',budget:0,price:0,timeValue:0,periodMonths:0,annualCost:0,totalValue:0,implementationCost:0},flags:{approvalOpen:true,economicBuyerOpen:true,successOpen:true,priceOpen:true},answers:{qual:{},spin:{}},offer:{},additions:[],openAreas:[],createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()}}
function normalizeState(x){const s={...emptyState(false),...x};s.id=x.id||uid();s.version=VERSION;s.metrics={...emptyState(false).metrics,...(x.metrics||{})};s.flags={...emptyState(false).flags,...(x.flags||{})};s.answers={qual:{...((x.answers||{}).qual||{})},spin:{...((x.answers||{}).spin||{})}};s.offer={...(x.offer||{})};const raw=s.rawImport||'';const explicitOpen=/^\s*Angebotspreis\s*:\s*(?:noch\s+)?offen\s*$/im.test(raw);if(explicitOpen){s.metrics.price=0;s.flags.priceOpen=true;s.offer.price=''}else if(s.flags.priceOpen&&s.metrics.price===0){s.offer.price=''};if(Array.isArray(s.evidence)){s.evidence=s.evidence.map(e=>{if(e.category!=='Risiko')return e;const t=(e.text||'').toLowerCase();let type='ableitung';if(/\b(offen|noch nicht|nicht(?:\s+\w+){0,4}\s+bestûÊtigt|fehlt|keine freigabe|keine konkrete investitionsfreigabe|nicht eingebunden|nicht gemessen)\b/.test(t))type='offen';else if(/\b(kûÑnnte|mûÑglicherweise|hypothese|plausibel)\b/.test(t))type='hypothese';return{...e,type}})}return s}
function isBundledSample(o){return /\b(noventis|novacore)\b/i.test(String((o&&o.company)||'')+' '+String((o&&o.opportunity)||'')+' '+String((o&&o.rawImport)||''))}
function sanitizePortfolio(p){
 if(!p||!Array.isArray(p.opportunities))return null;
 p.opportunities=p.opportunities.map(normalizeState).filter(o=>!isBundledSample(o));
 if(!p.opportunities.length)return null;
 p.version=VERSION;
 if(!p.opportunities.some(o=>o.id===p.activeId)){
  const latest=[...p.opportunities].sort((a,b)=>String(b.updatedAt||'').localeCompare(String(a.updatedAt||'')))[0];
  p.activeId=latest.id;
 }
 return p;
}
function extractOpportunityCandidates(value,found,seen,depth=0){
 if(value==null||depth>7)return;
 if(typeof value==='string'){
  const t=value.trim();
  if((t.startsWith('{')||t.startsWith('['))&&t.length<5000000){try{extractOpportunityCandidates(JSON.parse(t),found,seen,depth+1)}catch(e){}}
  return;
 }
 if(typeof value!=='object'||seen.has(value))return;
 seen.add(value);
 if(Array.isArray(value)){value.forEach(v=>extractOpportunityCandidates(v,found,seen,depth+1));return;}
 if(Array.isArray(value.opportunities))value.opportunities.forEach(v=>extractOpportunityCandidates(v,found,seen,depth+1));
 const raw=String(value.rawImport||value.crmImport||value.originalImport||'');
 const company=String(value.company||value.companyName||value.firma||'');
 const opportunity=String(value.opportunity||value.opportunityName||value.oppName||'');
 if(raw||company||opportunity){
  const candidate=normalizeState({...value,rawImport:raw||value.rawImport||'',company:company||value.company||'',opportunity:opportunity||value.opportunity||''});
  const signature=(candidate.company+'|'+candidate.opportunity+'|'+candidate.rawImport.slice(0,300)).toLowerCase();
  if(!isBundledSample(candidate)&&!found.some(x=>x.__sig===signature))found.push(Object.assign(candidate,{__sig:signature}));
 }
 for(const [k,v] of Object.entries(value)){
  if(['opportunities','rawImport','crmImport','originalImport'].includes(k))continue;
  if(v&&typeof v==='object')extractOpportunityCandidates(v,found,seen,depth+1);
 }
}
function readPortfolioKey(key){
 try{
  const text=localStorage.getItem(key);if(!text)return null;
  const raw=JSON.parse(text);
  if(raw&&Array.isArray(raw.opportunities))return sanitizePortfolio(raw);
  if(raw&&raw.company!==undefined){const one=normalizeState(raw);if(!isBundledSample(one))return{version:VERSION,activeId:one.id,opportunities:[one]};}
 }catch(e){}
 return null;
}
function loadPortfolio(){
 const primary=readPortfolioKey(STORAGE_KEY);
 if(primary)return primary;
 const backup=readPortfolioKey(STORAGE_KEY+'_backup');
 if(backup)return backup;
 for(const key of LEGACY_KEYS){const found=readPortfolioKey(key);if(found)return found;}
 const blank=emptyState(false);blank._ephemeral=true;
 return{version:VERSION,activeId:blank.id,opportunities:[blank],_ephemeral:true};
}
let portfolio=loadPortfolio();
syncVersionLabels();
let state=portfolio.opportunities.find(x=>x.id===portfolio.activeId)||portfolio.opportunities[0];
(function migrateDecisionAuthority(){
 let changed=false;
 portfolio.opportunities.forEach(o=>{
  if(!o.rawImport)return;
  const p=parseImport(o.rawImport+(o.additions&&o.additions.length?'\n\nErgûÊnzung\n'+o.additions.map(x=>x.text).join('\n'):''));
  const manualOffer={...(o.offer||{})};
  o.stakeholders=p.stakeholders;o.evidence=p.evidence;o.importPreview=p.evidence.map(x=>({...x}));o.objections=p.objections;o.damageSignals=p.damageSignals;o.metrics=p.metrics;o.flags=p.flags;o.pilotUsers=p.pilotUsers||o.pilotUsers||0;
  o.offer={...manualOffer,price:manualOffer.price||p.metrics.price||'',timeValue:manualOffer.timeValue||p.metrics.timeValue||'',periodMonths:manualOffer.periodMonths||p.metrics.periodMonths||''};
  if(p.flags.priceOpen&&!manualOffer.price)o.offer.price='';
  changed=true;
 });
 if(changed){portfolio.version=VERSION;localStorage.setItem(STORAGE_KEY,JSON.stringify(portfolio));state=portfolio.opportunities.find(x=>x.id===portfolio.activeId)||portfolio.opportunities[0]}
})();
function savePortfolio(){
 portfolio.version=VERSION;portfolio._ephemeral=false;
 const real=portfolio.opportunities.filter(o=>String(o.company||o.opportunity||o.rawImport||'').trim());
 if(real.length){portfolio.opportunities=real;if(!real.some(o=>o.id===portfolio.activeId))portfolio.activeId=real[0].id;}
 portfolio.opportunities.forEach(o=>delete o._ephemeral);
 const payload=JSON.stringify(portfolio);
 try{
  localStorage.setItem(STORAGE_KEY,payload);
  localStorage.setItem(STORAGE_KEY+'_backup',payload);
  const check=localStorage.getItem(STORAGE_KEY);
  if(check!==payload)throw new Error('readback mismatch');
 }catch(e){console.error('KI21 storage write failed',e);toast('Speichern im Browser fehlgeschlagen');}
}
function saveState(s=state){s.updatedAt=new Date().toISOString();const i=portfolio.opportunities.findIndex(x=>x.id===s.id);if(i>=0)portfolio.opportunities[i]=s;else portfolio.opportunities.push(s);portfolio.activeId=s.id;state=s;savePortfolio()}
function switchOpportunity(id){const target=portfolio.opportunities.find(x=>x.id===id);if(!target)return;portfolio.activeId=id;state=target;savePortfolio();render();toast('Opportunity gewechselt')}
function createOpportunity(){const s=emptyState(false);s.activeTab='inputs';s.inputTab='crm';s.__importStarted=true;portfolio.opportunities.push(s);portfolio.activeId=s.id;state=s;savePortfolio();render();requestAnimationFrame(()=>document.getElementById('crmText')?.focus());toast('CRM-Import geûÑffnet')}
function deleteOpportunity(id){if(portfolio.opportunities.length<=1)return toast('Mindestens eine Opportunity muss erhalten bleiben');const i=portfolio.opportunities.findIndex(x=>x.id===id);if(i<0)return;portfolio.opportunities.splice(i,1);if(portfolio.activeId===id){state=portfolio.opportunities[Math.max(0,i-1)];portfolio.activeId=state.id}savePortfolio();render();toast('Opportunity gelûÑscht')}
function normalizeMoney(v){if(!v)return 0;const raw=String(v).replace(/\s/g,'').replace(/ã˜/g,'').replace(/EUR/ig,'');if(/mio/i.test(raw)){const n=parseFloat(raw.replace(/[^0-9,]/g,'').replace(',','.'));return Math.round((n||0)*1000000)}const cleaned=raw.replace(/\.(?=\d{3}(\D|$))/g,'').replace(',','.').replace(/[^0-9.]/g,'');return Math.round(parseFloat(cleaned)||0)}
function repairEconomicMetrics(target){
 const raw=String((target&&target.rawImport)||'');
 const formula=raw.match(/(\d+(?:[.,]\d+)?)\s*Stunden\s*(?:pro Monat|monatlich)[\s\S]{0,500}?(\d+(?:[.,]\d+)?)\s*ã˜\s*(?:pro Stunde)?[\s\S]{0,500}?(?:=|betrûÊgt damit:?)[^\d]{0,40}(\d{1,3}(?:\.\d{3})*(?:,\d+)?)\s*ã˜\s*pro Jahr/i);
 const monthly=(raw.match(/(?:etwa|rund)?\s*(\d+(?:[.,]\d+)?)\s*(?:zusûÊtzliche\s*)?Stunden\s*(?:pro Monat|monatlich)/i)||[])[1];
 const rate=(raw.match(/(?:durchschnittlicher interner Zeitwert von|interner Zeitwert|Stundenwert)[^\d]{0,30}(\d+(?:[.,]\d+)?)\s*ã˜/i)||[])[1];
 const explicit=(raw.match(/(?:wiederkehrender interner Zusatzaufwand betrûÊgt|dokumentierte interne Zusatzaufwand betrûÊgt damit|dokumentierte interne Zusatzaufwand|wiederkehrender interner Zusatzaufwand pro Jahr)[^\d]{0,60}(\d{1,3}(?:\.\d{3})*(?:,\d+)?)\s*ã˜(?:\s*pro Jahr)?/i)||[])[1];
 const h=Number(String(monthly||'').replace(',','.'))||Number(target.metrics&&target.metrics.hours)||0;
 const tv=normalizeMoney(rate||((target.metrics||{}).timeValue)||((target.offer||{}).timeValue)||'');
 const annual=normalizeMoney((formula&&formula[3])||explicit||'')||(h&&tv?h*12*tv:0);
 target.metrics=target.metrics||{};
 if(h)target.metrics.hours=h;
 if(tv)target.metrics.timeValue=tv;
 if(annual){target.metrics.annualCost=annual;target.metrics.recurringInternalCost=annual;}
 return target;
}

function isSection(line){return /^(Unternehmen|Opportunity|Ausgangssituation|Schmerz(?: und| &) Aufwand|Stakeholder|Qualifizierungsstand|Budget(?: und| &) Entscheidung|Pilot|MûÑgliche EinwûÊnde|Zentrale Deal-Risiken)$/i.test(line)}

// 8.7.1 generalized decision-group, evidence-scope, gate and business-case layer
const __baseParseImport=parseImport;
parseImport=function(raw){
  const p=__baseParseImport(raw);
  const budgetMatch=raw.match(/Transformationsbudget\s+von\s+(?:maximal\s+)?(\d{1,3}(?:\.\d{3})*(?:,\d+)?)\s*ã˜[^\n.]{0,100}(?:grundsûÊtzlich\s+bestûÊtigt|grundsûÊtzlich\s+vorhanden)/i)
    || raw.match(/(?:Budget|Transformationsbudget)[^\n]{0,80}?(\d{1,3}(?:\.\d{3})*(?:,\d+)?)\s*ã˜[^\n.]{0,100}(?:grundsûÊtzlich\s+bestûÊtigt|grundsûÊtzlich\s+darstellbar|grundsûÊtzlich\s+vorhanden)/i);
  if(budgetMatch) p.metrics.budget=normalizeMoney(budgetMatch[1]);
  const recurring=raw.match(/(?:wiederkehrende[rn]?\s+interne[rn]?\s+Zusatzaufwand(?:\s+betrûÊgt\s+damit)?|interner Zusatzaufwand)\s*:?[\s\S]{0,80}?(\d{1,3}(?:\.\d{3})*(?:,\d+)?)\s*ã˜\s*pro Jahr/i)
    || raw.match(/(\d{1,3}(?:\.\d{3})*(?:,\d+)?)\s*ã˜\s+wiederkehrender interner Zusatzaufwand pro Jahr/i);
  const historic=raw.match(/(\d{1,3}(?:\.\d{3})*(?:,\d+)?)\s*ã˜\s+(?:externe Unterstû¥tzung|externe Beratungskosten)[^\n.]{0,80}(?:im vergangenen Jahr|des vergangenen Jahres)/i)
    || raw.match(/(?:rund\s+)?(\d{1,3}(?:\.\d{3})*(?:,\d+)?)\s*ã˜\s+externe Unterstû¥tzung im vergangenen Jahr/i);
  const documented=raw.match(/(?:dokumentierter Aufwand|dokumentierter Mindestaufwand)[^\d]{0,30}(\d{1,3}(?:\.\d{3})*(?:,\d+)?)\s*ã˜/i)
    || raw.match(/(\d{1,3}(?:\.\d{3})*(?:,\d+)?)\s*ã˜\s+dokumentierter Aufwand im letzten Jahr/i);
  p.metrics.recurringInternalCost=normalizeMoney(recurring?recurring[1]:'');
  p.metrics.historicExternalCost=normalizeMoney(historic?historic[1]:'');
  p.metrics.documentedLastYearCost=normalizeMoney(documented?documented[1]:'') || (p.metrics.recurringInternalCost+p.metrics.historicExternalCost);
  // Evidence semantics are scoped, reset at section boundaries and react to local headings.
  let mode='fact', lastCategory='';
  p.evidence.forEach(e=>{
    const t=e.text.trim();
    if(e.category!==lastCategory){mode='fact';lastCategory=e.category;}

    if(e.category==='Einwandbehandlung'){e.type='fakt';return;}
    if(e.category==='Risiko'){
      if(/noch nicht|offen|nicht quantifiziert|nicht bestûÊtigt|ungeklûÊrt/i.test(t))e.type='offen';
      else if(/kûÑnnte|mûÑglich|erscheinen|realistisch/i.test(t))e.type='hypothese';
      else e.type='ableitung';
      return;
    }
    if(e.category==='NûÊchster Kundenschritt'){e.type='ableitung';return;}

    if(/^(Noch nicht quantifiziert sind|Nicht bestûÊtigt ist|Noch nicht belastbar quantifiziert sind|Noch offen sind|Noch unklar ist):?$/i.test(t)){
      mode='open';e.type='offen';return;
    }
    if(/^(Vorgeschlagene Erfolgskriterien|MûÑgliche Pilotziele):?$/i.test(t)){
      mode='hyp';e.type='hypothese';return;
    }
    if(/^(BestûÊtigt sind|Business Case|Der Business Case hûÊngt deshalb zusûÊtzlich an|Das aktuelle Angebot umfasst|Der Einkauf fordert):?$/i.test(t)){
      mode='fact';e.type='fakt';return;
    }

    // Confirmed portfolio/plan facts remain facts even if words such as ãmûÑglichã appear in the text.
    if(/^(Vectura bearbeitet pro Jahr|Davon û¥berschreiten|MûÑglicher spûÊterer Ausbau:|Deutschland und Groûbritannien werden als mûÑgliche erste Rollout-Regionen diskutiert|Eine weitere Alternative ist, die Entscheidung)/i.test(t)){
      e.type='fakt';return;
    }

    // Business-case conclusions reset an open block and are deductions, not open questions.
    if(/^(Der dokumentierte Aufwand allein trûÊgt|Der dokumentierte Mindestaufwand allein trûÊgt|Der Business Case hûÊngt deshalb zusûÊtzlich an)/i.test(t)){
      mode='fact';e.type='ableitung';return;
    }

    // Goal lists describe intended effects, not already proven results.
    if(e.category==='Strategische Bedeutung' && /^(einheitlichere Opportunity-Entscheidungen ermûÑglichen|schwache Deals frû¥her sichtbar machen|VerkûÊufer bei der Vorbereitung|wirtschaftliche Nutzenargumentation verbessern|Management-Reviews fokussieren|internationale Vertriebsmethodik vereinheitlichen|ûbergaben an Professional Services absichern)/i.test(t)){
      e.type='hypothese';return;
    }

    if(mode==='open'){e.type='offen';return;}
    if(mode==='hyp'){e.type='hypothese';return;}

    if(/noch nicht abschlieûend geklûÊrt|noch nicht eingebunden|keine konkrete Investitionsfreigabe|nicht bestûÊtigt ist/i.test(t))e.type='offen';
    else if(/kûÑnnte|erscheinen|nur realistisch, wenn/i.test(t))e.type='hypothese';
    else e.type='fakt';
  });
  return p;
};

// Stable startup: never delete browser storage. Only hide bundled sample opportunities from the active portfolio.
try{
  portfolio.opportunities=(portfolio.opportunities||[]).filter(o=>!isBundledSample(o));
  if(!portfolio.opportunities.length){const blank=emptyState(false);portfolio.opportunities=[blank];portfolio.activeId=blank.id;}
  if(!portfolio.opportunities.some(o=>o.id===portfolio.activeId)){
    const latest=[...portfolio.opportunities].sort((a,b)=>String(b.updatedAt||'').localeCompare(String(a.updatedAt||'')))[0];
    portfolio.activeId=latest.id;
  }
}catch(e){}

// Reparse persisted opportunities with the generalized parser before first render.
portfolio.opportunities.forEach(o=>{
  if(!o.rawImport)return;
  const p=parseImport(o.rawImport+(o.additions&&o.additions.length?'\n\nErgûÊnzung\n'+o.additions.map(x=>x.text).join('\n'):''));

  o.offer={...manualOffer,price:manualOffer.price||p.metrics.price||'',timeValue:manualOffer.timeValue||p.metrics.timeValue||'',periodMonths:manualOffer.periodMonths||p.metrics.periodMonths||''};
});
portfolio.opportunities=portfolio.opportunities.filter(o=>!isBundledSample(o));
if(!portfolio.opportunities.length){const blank=emptyState(false);portfolio.opportunities=[blank];portfolio.activeId=blank.id;}
portfolio.opportunities.forEach(repairEconomicMetrics);
portfolio.version=VERSION;

window.addEventListener('pagehide',()=>{if(portfolio.opportunities.some(o=>String(o.company||o.opportunity||o.rawImport||'').trim()))savePortfolio()});
