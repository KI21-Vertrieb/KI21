<!doctype html>
<html lang="de">
<head>

<title>KI21 Core 8.0.6 · REPEATABLE PHASE REVIEW</title>
<style>
:root{--bg:#080c12;--surface:#111722;--surface2:#171e2a;--line:#293241;--text:#f4f7fb;--muted:#9ca8b8;--orange:#ff7a1a;--green:#55d38a;--red:#ff7b72;--yellow:#d8a53a;--blue:#74aef7;--violet:#b09af8}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 50% -10%,rgba(255,122,26,.09),transparent 30%),linear-gradient(180deg,#070a10,#0a0f17 50%,#080c12);color:var(--text);font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input,textarea{font:inherit}.app{min-height:100vh;padding-bottom:max(110px,calc(70px + env(safe-area-inset-bottom)))}
.header{position:sticky;top:0;z-index:20;background:rgba(8,12,18,.94);backdrop-filter:blur(18px);border-bottom:1px solid rgba(156,168,184,.18);padding:12px 16px 10px}.header-top{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{font-size:13px;font-weight:950;letter-spacing:2px;color:var(--orange)}.version{font-size:9px;color:var(--muted)}.opp-name{margin-top:7px;font-size:18px;font-weight:900;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;touch-action:manipulation}.opp-name:after{content:' ›';color:var(--orange)}.status-line{margin-top:4px;font-size:10px;color:var(--muted)}
.wrap{max-width:720px;margin:0 auto;padding:12px}.tabs{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-bottom:10px}.tab,.icon-btn{min-height:38px;border-radius:13px;border:1px solid var(--line);background:rgba(23,30,42,.75);color:#cbd4df;font-weight:850;cursor:pointer}.tab.active,.icon-btn.accent{border-color:rgba(255,122,26,.6);color:#ff9b45;background:rgba(255,122,26,.1)}.icon-btn{padding:0 13px}.link-btn{border:0;background:transparent;color:#cbd4df;font-size:11px;font-weight:800;padding:7px 2px;cursor:pointer}.link-btn:before{content:'↗';color:var(--orange);margin-right:6px}
.card{border:1px solid rgba(156,168,184,.2);background:linear-gradient(145deg,rgba(23,30,42,.96),rgba(12,17,25,.94));border-radius:18px;padding:15px;margin-bottom:12px;box-shadow:0 14px 34px rgba(0,0,0,.26),inset 0 1px 0 rgba(255,255,255,.035)}.card.blue{border-color:rgba(116,174,247,.28)}.card.red{border-color:rgba(255,123,114,.28)}.card.green{border-color:rgba(85,211,138,.28)}.card.violet{border-color:rgba(176,154,248,.3)}.card.orange{border-color:rgba(255,122,26,.35)}.kicker{font-size:10px;font-weight:950;letter-spacing:1.45px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}.blue .kicker{color:var(--blue)}.red .kicker{color:var(--red)}.green .kicker{color:var(--green)}.violet .kicker{color:var(--violet)}.orange .kicker{color:#ff9b45}.headline{font-size:18px;line-height:1.3;font-weight:900;letter-spacing:-.25px}.body{font-size:13px;line-height:1.48;color:#e8edf4}.muted{color:var(--muted)}.divider{height:1px;background:rgba(156,168,184,.16);margin:12px 0}.label{font-size:9px;text-transform:uppercase;letter-spacing:1.1px;font-weight:900;color:var(--muted);margin-bottom:4px}.value{font-size:14px;line-height:1.42;font-weight:760}.summary-row{padding:10px 0;border-top:1px solid rgba(156,168,184,.16)}.summary-row:first-of-type{border-top:0;padding-top:0}.summary-row.insight .label{color:var(--orange)}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}.metric{border:1px solid var(--line);border-radius:16px;padding:13px;background:rgba(17,23,34,.8)}.metric-label{font-size:8.5px;font-weight:900;letter-spacing:1.1px;color:var(--muted)}.metric-value{font-size:25px;font-weight:950;margin-top:5px}.metric-sub{font-size:10px;color:var(--muted);margin-top:2px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.list{display:flex;flex-direction:column;gap:9px}.item{position:relative;padding-left:16px;font-size:12.5px;line-height:1.42}.item:before{content:'·';position:absolute;left:2px;color:var(--muted)}.item.primary{padding:11px 30px 11px 34px;border:1px solid rgba(176,154,248,.3);border-radius:13px;background:rgba(176,154,248,.09);font-weight:850}.item.primary:before{content:'1';top:12px;left:10px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(176,154,248,.2);color:#dfd5ff;font-size:9px;font-weight:950}.item.primary:after{content:'›';position:absolute;right:12px;color:var(--violet)}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:4px 8px;font-size:9px;font-weight:900;border:1px solid var(--line);color:var(--muted)}.badge.ok{color:var(--green);border-color:rgba(85,211,138,.35);background:rgba(85,211,138,.09)}.badge.warn{color:var(--yellow);border-color:rgba(216,165,58,.35);background:rgba(216,165,58,.09)}.badge.risk{color:var(--red);border-color:rgba(255,123,114,.35);background:rgba(255,123,114,.09)}
.phase{display:flex;align-items:center;gap:10px;padding:12px;border:1px solid var(--line);border-radius:13px;background:rgba(17,23,34,.72);margin-bottom:7px;cursor:pointer;touch-action:manipulation}.phase:active{border-color:rgba(255,122,26,.55);background:rgba(255,122,26,.07)}.phase-num{width:25px;height:25px;flex:0 0 auto;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:var(--muted)}.phase-num.done{color:var(--green);background:rgba(85,211,138,.12)}.phase-main{flex:1;min-width:0}.phase-title{font-size:13px;font-weight:850}.phase-sub{font-size:10px;color:var(--muted);margin-top:2px}.phase-arrow{color:var(--muted);font-size:20px}
.modal{position:fixed;inset:0;z-index:100;background:rgba(4,7,11,.9);display:flex;align-items:flex-end;justify-content:center}.modal.hidden{display:none}.sheet{width:100%;max-width:720px;max-height:93vh;overflow:auto;background:#111722;border:1px solid var(--line);border-bottom:0;border-radius:22px 22px 0 0;padding:16px 14px max(28px,env(safe-area-inset-bottom))}.sheet-title{font-size:19px;font-weight:950;margin-bottom:6px}.sheet-sub{font-size:12px;color:var(--muted);line-height:1.45;margin-bottom:12px}textarea{width:100%;min-height:260px;border:1px solid var(--line);border-left:3px solid rgba(255,122,26,.7);border-radius:12px;background:#0d131d;color:var(--text);padding:12px;line-height:1.55;outline:none;resize:vertical}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.btn{min-height:42px;border-radius:12px;border:1px solid var(--line);background:var(--surface2);color:var(--text);font-weight:850;cursor:pointer}.btn.primary{background:var(--orange);border-color:var(--orange);color:#fff}.btn.danger{color:var(--red);border-color:rgba(255,123,114,.35);background:rgba(255,123,114,.06)}.full{grid-column:1/-1}.field{margin-bottom:11px}.field label{display:block;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:900;margin-bottom:5px}.field input{width:100%;min-height:40px;border-radius:11px;border:1px solid var(--line);border-left:3px solid rgba(255,122,26,.65);background:#0d131d;color:var(--text);padding:9px 11px;outline:none}
.report{white-space:pre-wrap;font-size:12px;line-height:1.58;background:#0d131d;border:1px solid var(--line);border-radius:12px;padding:13px;max-height:55vh;overflow:auto}.toast{position:fixed;left:50%;bottom:max(28px,calc(16px + env(safe-area-inset-bottom)));transform:translateX(-50%);z-index:200;background:#171e2a;border:1px solid rgba(255,122,26,.45);border-radius:999px;padding:10px 14px;font-size:12px;font-weight:850;opacity:0;pointer-events:none;transition:.18s}.toast.show{opacity:1;transform:translate(-50%,-4px)}.empty{text-align:center;padding:38px 20px;color:var(--muted)}.footer{margin:28px 0 0;text-align:center;font-size:9px;color:#687384}
@media(max-width:520px){.grid{grid-template-columns:1fr}.metrics{grid-template-columns:1fr 1fr}.headline{font-size:16px}.value{font-size:13px}.card{padding:13px}.actions{grid-template-columns:1fr}.full{grid-column:auto}}

.phase-page-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}.back-btn{width:38px;height:38px;border-radius:12px;border:1px solid var(--line);background:var(--surface);color:var(--text);font-size:22px;font-weight:900;cursor:pointer}.phase-page-title{font-size:19px;font-weight:950}.phase-page-sub{font-size:11px;color:var(--muted);margin-top:2px}.opp-hub-active{border:1px solid rgba(255,122,26,.42);background:rgba(255,122,26,.08);border-radius:14px;padding:12px;margin-bottom:12px}.opp-hub-name{font-size:15px;font-weight:950}.opp-hub-sub{font-size:10px;color:var(--muted);margin-top:3px}.opp-list{display:flex;flex-direction:column;gap:7px;margin:10px 0}.opp-row{width:100%;text-align:left;padding:11px 12px;border:1px solid var(--line);border-radius:12px;background:var(--surface2);color:var(--text);cursor:pointer}.opp-row.active{border-color:rgba(255,122,26,.55);background:rgba(255,122,26,.08)}.opp-row-title{font-size:13px;font-weight:900}.opp-row-sub{font-size:9.5px;color:var(--muted);margin-top:3px}.sheet .btn{touch-action:manipulation}

/* 8.0.3 Workflow & Opportunity Stability */
.phase-editor{margin-top:12px}.phase-editor textarea{min-height:180px}.phase-save-state{font-size:10px;color:var(--muted);margin-top:7px}.phase-nav-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}.opp-row{position:relative}.opp-row.active:after{content:'AKTIV';position:absolute;right:10px;top:10px;font-size:8px;font-weight:950;letter-spacing:.8px;color:#ff9b45}.opp-row-title{padding-right:54px}.opp-row-meta{font-size:8.8px;color:#718094;margin-top:5px}.opp-empty{font-size:12px;color:var(--muted);padding:12px 2px}.manage-note{font-size:10px;color:var(--muted);line-height:1.4;padding:8px 10px;border:1px solid rgba(156,168,184,.14);border-radius:10px;background:rgba(255,255,255,.018);margin-bottom:10px}
@media(max-width:520px){.phase-nav-actions{grid-template-columns:1fr}.phase-nav-actions .btn{min-height:44px}}

.phase-known{display:flex;flex-wrap:wrap;gap:7px;margin:9px 0 13px}.phase-chip{font-size:9.5px;font-weight:850;padding:5px 8px;border-radius:999px;border:1px solid rgba(85,211,138,.28);background:rgba(85,211,138,.08);color:#8fe3b2}.phase-open-title{font-size:10px;font-weight:950;letter-spacing:1.2px;text-transform:uppercase;color:#ff9b45;margin:14px 0 8px}.phase-question{padding:12px;border:1px solid rgba(156,168,184,.18);border-radius:13px;background:rgba(255,255,255,.018);margin-bottom:9px}.phase-question-label{font-size:12.5px;line-height:1.4;font-weight:780;color:var(--text);margin-bottom:8px}.phase-question select{width:100%;min-height:40px;border:1px solid var(--line);border-left:3px solid rgba(255,122,26,.65);border-radius:10px;background:var(--surface2);color:var(--text);padding:8px 10px;font:750 12px inherit}.phase-optional{margin-top:13px}.phase-optional textarea{min-height:76px!important;font-size:12px!important}.phase-auto-note{font-size:10.5px;line-height:1.45;color:var(--muted);padding:9px 10px;border-radius:10px;background:rgba(255,122,26,.045);border:1px solid rgba(255,122,26,.16);margin-bottom:10px}.phase-complete{font-size:13px;line-height:1.45;color:#8fe3b2;padding:12px;border:1px solid rgba(85,211,138,.25);border-radius:12px;background:rgba(85,211,138,.06)}

.phase-status{font-size:8.5px;font-weight:900;letter-spacing:.8px;text-transform:uppercase;padding:4px 7px;border-radius:999px;border:1px solid var(--line);color:var(--muted);white-space:nowrap}.phase-status.progress{color:#ff9b45;border-color:rgba(255,122,26,.35);background:rgba(255,122,26,.08)}.phase-status.done{color:#8fe3b2;border-color:rgba(85,211,138,.30);background:rgba(85,211,138,.08)}.phase-result{margin-top:8px;padding:10px 11px;border:1px solid rgba(156,168,184,.15);border-radius:11px;background:rgba(255,255,255,.018)}.phase-result-title{font-size:9px;font-weight:950;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}.phase-result-text{font-size:11.2px;line-height:1.4;color:var(--text)}.phase-start-card{text-align:center;padding:18px 14px}.phase-start-title{font-size:17px;font-weight:950;margin-bottom:6px}.phase-start-sub{font-size:11px;color:var(--muted);line-height:1.45;margin-bottom:14px}.dossier-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}.dossier-item{padding:10px;border:1px solid rgba(156,168,184,.16);border-radius:11px;background:rgba(255,255,255,.018)}.dossier-label{font-size:8px;font-weight:950;letter-spacing:.9px;text-transform:uppercase;color:var(--muted)}.dossier-value{font-size:11.5px;line-height:1.35;color:var(--text);margin-top:4px}.dossier-section{margin-top:13px}.dossier-section-title{font-size:9px;font-weight:950;letter-spacing:1px;text-transform:uppercase;color:#ff9b45;margin-bottom:7px}.dossier-raw{white-space:pre-wrap;max-height:260px;overflow:auto;padding:11px;border:1px solid var(--line);border-radius:11px;background:var(--surface2);font-size:10.5px;line-height:1.45;color:#cbd4df}@media(max-width:520px){.dossier-grid{grid-template-columns:1fr}}

/* 8.0.6 Repeatable Phase Review */
.phase-review-cta{margin-bottom:12px;border:1px solid rgba(255,122,26,.42);background:linear-gradient(145deg,rgba(38,27,22,.96),rgba(17,23,34,.96));}
.phase-review-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}.phase-review-title{font-size:16px;font-weight:950}.phase-review-sub{font-size:11px;line-height:1.42;color:var(--muted);margin-top:4px}.phase-review-badge{font-size:8.5px;font-weight:950;letter-spacing:.7px;text-transform:uppercase;border-radius:999px;padding:5px 8px;white-space:nowrap;border:1px solid var(--line)}.phase-review-badge.open{color:var(--orange);border-color:rgba(255,122,26,.4)}.phase-review-badge.done{color:var(--green);border-color:rgba(85,211,138,.4)}.phase-review-badge.changed{color:var(--yellow);border-color:rgba(216,165,58,.5);background:rgba(216,165,58,.08)}
.phase-history{margin-top:12px;border-top:1px solid rgba(156,168,184,.16);padding-top:10px}.phase-history-title{font-size:9px;font-weight:950;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}.phase-history-row{font-size:10.5px;line-height:1.4;color:#d8e0ea;padding:8px 9px;border:1px solid rgba(156,168,184,.14);border-radius:10px;background:rgba(255,255,255,.018);margin-bottom:6px}.phase-history-time{display:block;font-size:8.5px;color:var(--muted);margin-bottom:3px}.phase-editor-shell{border-color:rgba(176,154,248,.32)}
</style>

<body>
<div id="app" class="app"></div>
<div id="modal" class="modal hidden"><div id="sheet" class="sheet"></div></div>
<div id="toast" class="toast"></div>
<script>
'use strict';
const VERSION='KI21 Core 8.0.6 · REPEATABLE PHASE REVIEW';
const STORE_KEY='ki21_core8_state_v1';
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const now=()=>new Date().toISOString();
const normalize=s=>String(s||'').replace(/\r/g,'').trim();
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}
function load(){try{return JSON.parse(localStorage.getItem(STORE_KEY))||null}catch(e){return null}}
function save(){try{localStorage.setItem(STORE_KEY,JSON.stringify(state))}catch(e){console.warn('KI21 storage unavailable',e.message)}}
const DEMO=`Unternehmen\nFirmenname: Novacore Systems GmbH\nBranche: B2B Software\n\nOpportunity\nOpportunity-Name: KI21 Pilot Opportunity-Steuerung\nPhase: Qualifizierung\n\nStakeholder\nThomas Reuter – Vertriebsleiter – fachlicher Sponsor\nDr. Miriam Albrecht – Geschäftsführerin Finanzen & Operations – wirtschaftliche Entscheiderin – noch nicht eingebunden\nJana Wolf – Sales Operations – technische und operative Prüferin\n\nSchmerz und Aufwand\n110 Stunden Zusatzaufwand pro Monat: 55 Stunden Deal-Reviews, 35 Stunden Forecast-Korrektionen, 20 Stunden Datenaufbereitung.\nIm Vorjahr wurden 27 Opportunities verloren oder deutlich verschoben. Bei 4–6 davon hätten Risiken möglicherweise früher erkannt werden können. Ob dadurch Verluste vermieden worden wären, ist nicht bestätigt.\n\nBudget und Entscheidung\nBudgetrahmen bis 50.000 Euro vorhanden. Konkrete Investitionsfreigabe durch Dr. Albrecht ist offen.\nDie Geschäftsführerin kennt die 110-Stunden-Analyse noch nicht.\nErfolgskriterien wurden intern diskutiert, aber nicht mit der wirtschaftlichen Entscheiderin bestätigt.\n\nPilot\nGeplant: 8 Nutzer, echte Enterprise-Deals, Wirkung im Pilot messen. Konkreter Angebotspreis noch offen.`;
function blankState(){return{activeId:null,opportunities:{},view:'cockpit'}}
let state=load()||blankState();
function newOpportunity(raw){const id=uid();const parsed=parseImport(raw);state.opportunities[id]={id,createdAt:now(),updatedAt:now(),raw,parsed,evidence:parsed.evidence};state.activeId=id;state.view='cockpit';save();return id}
function current(){return state.opportunities[state.activeId]||null}
function evidence(type,value,status='confirmed',source='CRM-Import'){return{id:uid(),type,value,status,source,createdAt:now()}}
function matchValue(text,patterns){for(const p of patterns){const m=text.match(p);if(m&&m[1])return normalize(m[1])}return''}
function parseImport(raw){const text=normalize(raw);const low=text.toLowerCase();const company=matchValue(text,[/firmenname\s*:\s*([^\n]+)/i,/unternehmen\s*:\s*([^\n]+)/i]);const name=matchValue(text,[/opportunity(?:-name)?\s*:\s*([^\n]+)/i,/projekt(?:name)?\s*:\s*([^\n]+)/i])||'Neue Opportunity';const phase=matchValue(text,[/phase\s*:\s*([^\n]+)/i,/opportunity-status\s*:\s*([^\n]+)/i])||'Qualifizierung';
const hours=(text.match(/(\d{1,4})\s*stunden[^\n.]{0,60}(?:pro|je)\s*monat/i)||[])[1]||'';const lost=(text.match(/(\d{1,4})\s+(?:größere\s+)?opportunit(?:y|ies)[^\n.]{0,80}(?:verloren|verschoben)/i)||[])[1]||'';const possible=(text.match(/(?:bei\s*)?(\d+\s*(?:-|–|bis)\s*\d+)\s+(?:davon|opportunit)/i)||[])[1]||'';const budget=(text.match(/(?:budgetrahmen|budget)[^\n.]{0,40}(?:bis|von)?\s*([\d.]+)\s*(?:€|euro)/i)||[])[1]||'';
const approvalOpen=/(konkrete\s+)?(?:investitions|pilot)?freigabe[^.!?]{0,100}(offen|noch nicht|steht aus|nicht erteilt)/i.test(text)||/(pilot|investition)[^.!?]{0,100}(noch nicht freigegeben|nicht freigegeben)/i.test(text);const approvalConfirmed=!approvalOpen&&/(investitions|pilot)?freigabe[^.!?]{0,80}(erteilt|bestätigt|erfolgt)|(?:pilot|auftrag)[^.!?]{0,80}(beauftragt|freigegeben)/i.test(text);
const economicBuyerName=(text.match(/(?:dr\.\s*)?[A-ZÄÖÜ][\wÄÖÜäöüß.-]+\s+[A-ZÄÖÜ][\wÄÖÜäöüß.-]+[^\n]{0,80}(?:wirtschaftliche\s+entscheider|geschäftsführ)/i)||[])[0]||'';const economicBuyerOpen=/(geschäftsführ|wirtschaftliche\s+entscheider)[^.!?]{0,150}(noch nicht eingebunden|kennt .* noch nicht|nicht beteiligt|noch nicht gehört)/i.test(text);const sponsor=/(sponsor|fachlicher\s+sponsor)/i.test(text);const successOpen=/(erfolgskriterien|messgrößen)[^.!?]{0,140}(noch nicht|nicht .* bestätigt|offen|intern diskutiert)/i.test(text);const priceOpen=/(angebotspreis|konkrete kosten|pilotpreis)[^.!?]{0,100}(offen|nicht hinterlegt|noch nicht)/i.test(text);
const ev=[];if(company)ev.push(evidence('company',company));if(hours)ev.push(evidence('monthly_hours',Number(hours)));if(lost)ev.push(evidence('lost_opportunities',Number(lost)));if(possible)ev.push(evidence('possible_early_detection',possible,'hypothesis'));if(budget)ev.push(evidence('budget_ceiling',Number(budget.replace(/\./g,''))));ev.push(evidence('approval',approvalConfirmed?'confirmed':approvalOpen?'open':'unknown',approvalConfirmed?'confirmed':'open'));ev.push(evidence('economic_buyer',economicBuyerOpen?'not_involved':economicBuyerName?'identified':'unknown',economicBuyerOpen?'open':economicBuyerName?'confirmed':'open'));ev.push(evidence('sponsor',sponsor?'present':'unknown',sponsor?'confirmed':'open'));ev.push(evidence('success_criteria',successOpen?'open':'unknown','open'));if(priceOpen)ev.push(evidence('price','open','open'));
return{company:company||'Unbekanntes Unternehmen',name,phase,hours:Number(hours||0),lost:Number(lost||0),possible,budget:Number((budget||'0').replace(/\./g,'')),approvalOpen,approvalConfirmed,economicBuyerOpen,economicBuyerName,sponsor,successOpen,priceOpen,evidence:ev};}

}
function saveCurrentPhase(){
  const opp=current();if(!opp)return;const i=Math.max(0,Math.min(4,Number(state.phaseIndex||0)));const data=ensurePhaseData(opp);const answers={...(data[i].answers||{})};
  document.querySelectorAll('.phase-answer').forEach(el=>{answers[el.dataset.key]=el.value||''});const note=$('#phaseNote');const noteValue=normalize(note?note.value:data[i].note||'');
  data[i].answers=answers;data[i].note=noteValue;data[i].updatedAt=now();data[i].started=true;opp.updatedAt=now();opp.parsed=parseImport(combinedEvidence(opp));opp.evidence=opp.parsed.evidence;data[i].lastReviewedFingerprint=phaseSourceFingerprint(opp);
  const summary=phaseResultSummary(i,{opp,ds:derive(opp),out:runEngines(opp,derive(opp))}).slice(0,3).join(' · ')||'Phase geprüft';data[i].history=(data[i].history||[]).concat([{at:data[i].updatedAt,summary}]).slice(-10);
  state.phaseEditing=null;save();toast('Phase '+(i+1)+' geprüft und aktualisiert.');render();
}
function openPhase(index){state.phaseIndex=Math.max(0,Math.min(4,index));state.view='phase';state.phaseEditing=null;save();render()}
function switchOpportunity(id){if(!id||!state.opportunities[id]){toast('Opportunity nicht gefunden.');return}state.activeId=id;state.view='cockpit';state.phaseIndex=0;state.phaseEditing=null;save();closeModal();render();toast('Opportunity gewechselt.')}
function handleAction(el){const action=el.dataset.action;if(action==='view'){state.view=el.dataset.view||'cockpit';state.phaseEditing=null;save();render();return}if(action==='import'){openImport();return}if(action==='opportunities'){openSettings();return}if(action==='opportunity-detail'){openOpportunityDetail();return}if(action==='report'){openReport();return}if(action==='phase'){closeModal();openPhase(Number(el.dataset.phase||0));return}if(action==='phase-review'){const o=current();if(o){const i=Number(state.phaseIndex||0);ensurePhaseData(o)[i].started=true;state.phaseEditing=i;o.updatedAt=now();save();render();}return}if(action==='phase-cancel'){state.phaseEditing=null;save();render();return}if(action==='phase-save'){saveCurrentPhase();return}if(action==='phase-prev'){state.phaseEditing=null;openPhase(Number(state.phaseIndex||0)-1);return}if(action==='phase-next'){if(state.phaseEditing===Number(state.phaseIndex||0))saveCurrentPhase();openPhase(Number(state.phaseIndex||0)+1);return}if(action==='switch-opportunity'){switchOpportunity(el.dataset.id);return}if(action==='new-opportunity'){closeModal();openImport();return}if(action==='delete-opportunity'){deleteCurrentOpportunity();return}if(action==='close-modal'){closeModal();return}}
document.addEventListener('click',function(e){const el=e.target.closest('[data-action]');if(!el)return;if(el.disabled)return;e.preventDefault();handleAction(el)},false);
function openModal(html){$('#sheet').innerHTML=html;$('#modal').classList.remove('hidden')}function closeModal(){$('#modal').classList.add('hidden')}$('#modal').onclick=e=>{if(e.target.id==='modal')closeModal()}
function openImport(){openModal(`<div class="sheet-title">Neue Opportunity importieren</div><div class="sheet-sub">Der Import erzeugt immer einen neuen, isolierten Opportunity-Container. Fakten, Hypothesen und offene Punkte werden getrennt gespeichert.</div><textarea id="importText" placeholder="CRM-Import hier einfügen …">${current()?'':DEMO}</textarea><div class="actions"><button class="btn" id="cancel">Abbrechen</button><button class="btn primary" id="doImport">Als neue Opportunity importieren</button></div>`);$('#cancel').onclick=closeModal;$('#doImport').onclick=()=>{const raw=normalize($('#importText').value);if(!raw){toast('Bitte CRM-Text einfügen.');return}newOpportunity(raw);closeModal();render();toast('Neue Opportunity isoliert importiert.')}}
function dedupeOpportunities(){const seen=new Map();const ids=Object.keys(state.opportunities||{});for(const id of ids){const o=state.opportunities[id];if(!o)continue;const key=normalize((o.raw||'')).toLowerCase();if(!key)continue;if(seen.has(key)){const keep=seen.get(key);if(state.activeId===id)state.activeId=keep;delete state.opportunities[id]}else seen.set(key,id)}if(!state.activeId||!state.opportunities[state.activeId])state.activeId=Object.keys(state.opportunities)[0]||null;save()}
function deleteCurrentOpportunity(){const active=current();if(!active)return;if(!confirm('Diese Opportunity wirklich löschen?'))return;delete state.opportunities[state.activeId];state.activeId=Object.keys(state.opportunities)[0]||null;state.view='cockpit';state.phaseIndex=0;save();closeModal();render();toast('Opportunity gelöscht.')}
function openOpportunityDetail(){const m=model();if(!m)return;const o=m.opp,p=o.parsed,ds=m.ds,ph=ensurePhaseData(o);openModal(`<div class="sheet-title">${esc(p.company)}</div><div class="sheet-sub">${esc(p.name||'Opportunity')} · vollständiger Opportunity-Stand</div><div class="dossier-grid"><div class="dossier-item"><div class="dossier-label">Dealstatus</div><div class="dossier-value">${esc(ds.dealStatus)}</div></div><div class="dossier-item"><div class="dossier-label">Phase</div><div class="dossier-value">${esc(p.phase||'Qualifizierung')}</div></div><div class="dossier-item"><div class="dossier-label">Sponsor</div><div class="dossier-value">${esc(p.sponsor||'Noch offen')}</div></div><div class="dossier-item"><div class="dossier-label">Wirtschaftlicher Entscheider</div><div class="dossier-value">${esc(p.economicBuyerName||'Noch offen')}</div></div><div class="dossier-item"><div class="dossier-label">Schmerz</div><div class="dossier-value">${p.hours?esc(p.hours+' Stunden/Monat'):'Noch nicht beziffert'}</div></div><div class="dossier-item"><div class="dossier-label">Budgetrahmen</div><div class="dossier-value">${p.budget?esc(p.budget.toLocaleString('de-DE')+' €'):'Noch offen'}</div></div></div><div class="dossier-section"><div class="dossier-section-title">Phasenergebnisse</div>${ph.map((x,i)=>{const r=phaseResultSummary(i,m);return `<button class="opp-row" data-action="phase" data-phase="${i}"><div class="opp-row-title">Phase ${i+1}</div><div class="opp-row-sub">${r.length?esc(r.join(' · ')):'Noch keine Ergebnisse gespeichert'}</div></button>`}).join('')}</div><div class="dossier-section"><div class="dossier-section-title">Importierte Originaldaten</div><div class="dossier-raw">${esc(o.raw||'Keine Originaldaten vorhanden.')}</div></div><div class="actions"><button class="btn" data-action="close-modal">Schließen</button><button class="btn primary" data-action="opportunities">Opportunity wechseln</button></div>`)}
function openSettings(){dedupeOpportunities();const opps=Object.values(state.opportunities).sort((a,b)=>String(b.updatedAt).localeCompare(String(a.updatedAt)));openModal(`<div class="sheet-title">Opportunity-Verwaltung</div><div class="sheet-sub">Tippe auf eine Opportunity, um sie sofort zu öffnen.</div><div class="manage-note">Identische Doppelimporte werden automatisch zusammengeführt. Jede andere Opportunity bleibt vollständig getrennt.</div><div class="opp-list">${opps.length?opps.map(o=>`<button class="opp-row ${o.id===state.activeId?'active':''}" data-action="switch-opportunity" data-id="${esc(o.id)}"><div class="opp-row-title">${esc(o.parsed.company)}</div><div class="opp-row-sub">${esc(o.parsed.name||'Opportunity')}</div><div class="opp-row-meta">Zuletzt geändert: ${new Date(o.updatedAt||o.createdAt).toLocaleString('de-DE')}</div></button>`).join(''):'<div class="opp-empty">Noch keine Opportunity vorhanden.</div>'}</div><div class="actions"><button class="btn" data-action="close-modal">Schließen</button><button class="btn danger" data-action="delete-opportunity" ${opps.length?'':'disabled'}>Aktuelle löschen</button><button class="btn primary full" data-action="new-opportunity">Neue Opportunity importieren</button></div>`)}
function buildReport(){const m=model();if(!m)return'';const{opp,ds,out}=m;const p=opp.parsed;return`KI21 SALES DECISION BRIEF\nVersion: ${VERSION}\nOpportunity: ${p.company} · ${p.name}\n\nEINSCHÄTZUNG\n${out.assessment}\n\nDIE 5 PUNKTE, DIE ZÄHLEN\n${out.facts.slice(0,5).map(x=>'• '+x).join('\n')}\n\nDEAL-ENTSCHEIDUNG\n• ${out.decision}\n\nGRÖSSTER ENGPASS\n• ${out.blocker}\n\nBUSINESS CASE UND NUTZEN\n• ${out.businessCase}\n• ROI ist ohne bestätigte Wirkungsquote, finanziellen Zeitwert, konkreten Preis und Zeitraum nicht belastbar berechenbar.\n\nOFFENE PUNKTE\n${out.risks.map(x=>'• '+x).join('\n')}\n\nNÄCHSTER SCHRITT\n${out.actions.map((x,i)=>`${i+1}. ${x}`).join('\n')}\n\nSTATE CHECK\n• Freigabe: ${ds.approval}\n• Wirtschaftlicher Entscheider: ${ds.buyer}\n• Business Case: ${ds.businessCase}\n• Dealstatus: ${ds.dealStatus}\n• Opportunity Score: ${ds.score}%\n• Forecast: ${ds.forecast}%`}
function openReport(){const txt=buildReport();openModal(`<div class="sheet-title">KI21 Sales Decision Brief</div><div class="sheet-sub">Cockpit und Bericht basieren auf demselben zentralen Opportunity-State.</div><div class="report" id="reportText">${esc(txt)}</div><div class="actions"><button class="btn" id="closeReport">Schließen</button><button class="btn primary" id="copyReport">Bericht kopieren</button></div>`);$('#closeReport').onclick=closeModal;$('#copyReport').onclick=async()=>{try{await navigator.clipboard.writeText(txt);toast('Bericht kopiert.')}catch(e){const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('Bericht kopiert.')}}}
window.addEventListener('error',e=>{console.error('KI21 Core 8 error',e.error||e.message)});
dedupeOpportunities();
if(!state.activeId||!state.opportunities[state.activeId]){newOpportunity(DEMO)}
Object.values(state.opportunities).forEach(ensurePhaseData);save();
render();
</script>
</body>
</html>
