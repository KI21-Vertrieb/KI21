function showExport(){
  const aid=state.activeId;
  const activeCust=(state.accounts.find(a=>a.id===aid)||{}).cust;

  // ── VOLLSTÄNDIGES BACKUP (alle Accounts, alles) ──────────────────
  const backupData={accounts:state.accounts,activeId:aid,mu:LS.get('ki21_mu',{}),stationData:{},kontextData:{}};
  state.accounts.forEach(acc=>{
    for(let i=0;i<5;i++){
      const sval=LS.get('ki21_st_'+acc.id+'_'+i,null);
      if(sval)backupData.stationData['ki21_st_'+acc.id+'_'+i]=sval;
    }
    for(let i=0;i<5;i++){
      const kkSlot=LS.get('ki21_kk_'+acc.id+'_'+i,null);
      if(kkSlot)backupData.kontextData['ki21_kk_'+acc.id+'_'+i]=kkSlot;
    }
    const legKk=LS.get('ki21_kk_'+acc.id,null);
    if(legKk)backupData.kontextData['ki21_kk_'+acc.id]=legKk;
    const manual=LS.get('ki21_health_manual_'+acc.id,null);
    if(manual)backupData.kontextData['ki21_health_manual_'+acc.id]=manual;
  });

  // ── CLEAN OPPORTUNITY EXPORT (aktiver Account, nur Rohdaten) ─────
  const AI_FIELDS=['result','result2','summary','detail'];
  const cleanExport=aid?{
    version:'opportunity-rohdaten-v1',
    exportedAt:new Date().toISOString(),
    cust:activeCust||{},
    mu:LS.get('ki21_mu',{}),
    inputs:{},
    kk:{},
    manual:{}
  }:null;
  if(cleanExport){
    for(let i=0;i<5;i++){
      const sval=LS.get('ki21_st_'+aid+'_'+i,null);
      if(sval){
        const fvOnly={fv:{}};
        if(sval.fv)Object.keys(sval.fv).forEach(k=>{if(!AI_FIELDS.includes(k))fvOnly.fv[k]=sval.fv[k];});
        if(Object.keys(fvOnly.fv).length)cleanExport.inputs['slot_'+i]=fvOnly;
      }
      const kkSlot=LS.get('ki21_kk_'+aid+'_'+i,null);
      if(kkSlot&&kkSlot.trim())cleanExport.kk['slot_'+i]=kkSlot;
    }
    const manual=LS.get('ki21_health_manual_'+aid,null);
    if(manual)cleanExport.manual=manual;
  }

  const backupTxt=JSON.stringify(backupData);
  const cleanTxt=cleanExport?JSON.stringify(cleanExport,null,2):null;

  const backupBtn=h('button',{className:'btn',style:{width:'100%',marginBottom:'8px'}},
    '💾 Gesamtbackup kopieren');
  backupBtn.onclick=()=>{
    universalCopy(backupTxt,()=>{
      backupBtn.textContent='✓ Kopiert';
      backupBtn.style.color='#2ea043';
      setTimeout(()=>{backupBtn.textContent='💾 Gesamtbackup kopieren';backupBtn.style.color='';},2000);
    });
  };

  const cleanBtn=cleanExport?h('button',{className:'btn-o',style:{width:'100%'}},
    '📋 Opportunity-Rohdaten kopieren'):null;
  if(cleanBtn){
    cleanBtn.onclick=()=>{
      universalCopy(cleanTxt,()=>{
        cleanBtn.textContent='✓ Kopiert';
        cleanBtn.style.background='#2ea043';
        setTimeout(()=>{cleanBtn.textContent='📋 Opportunity-Rohdaten kopieren';cleanBtn.style.background='';},2000);
      });
    };
  }

  const content=h('div',{},
    h('div',{style:{background:'#1c2333',border:'1px solid #30363d',borderRadius:'12px',padding:'14px',marginBottom:'14px'}},
      h('div',{style:{fontSize:'11px',fontWeight:'700',color:'#8b949e',letterSpacing:'1px',textTransform:'uppercase',marginBottom:'6px'}},'Gesamtbackup'),
      h('div',{style:{fontSize:'12px',color:'#e6edf3',marginBottom:'10px'}},state.accounts.length+' Opportunit'+(state.accounts.length!==1?'ies':'y')+' · alle Daten inkl. KI-Ergebnisse'),
      backupBtn
    ),
    cleanExport?h('div',{style:{background:'#1c2333',border:'1px solid rgba(255,107,0,.4)',borderRadius:'12px',padding:'14px'}},
      h('div',{style:{fontSize:'11px',fontWeight:'700',color:'#ff6b00',letterSpacing:'1px',textTransform:'uppercase',marginBottom:'6px'}},'Opportunity-Rohdaten'),
      h('div',{style:{fontSize:'12px',color:'#e6edf3',marginBottom:'4px'}},(activeCust&&activeCust.firma)||'Aktuelle Opportunity'),
      h('div',{style:{fontSize:'11px',color:'#8b949e',marginBottom:'10px'}},'Nur Eingaben & Ergänzungen · KI-Ergebnisse werden neu generiert'),
      cleanBtn
    ):h('div',{style:{fontSize:'12px',color:'#8b949e'}},'Bitte zuerst eine Opportunity öffnen.')
  );
  modal('Exportieren',content,null);
}

function showImport(){
  const ta=h('textarea',{placeholder:'Export-Text hier einfügen...',style:{minHeight:'80px'}});
  const info=h('div',{style:{fontSize:'11px',color:'#8b949e',marginBottom:'8px'}});
  ta.addEventListener('input',()=>{
    try{
      const d=JSON.parse(ta.value);
      if(d.version==='opportunity-rohdaten-v1'){
        info.textContent='📋 Opportunity-Rohdaten erkannt → wird als neue Opportunity angelegt';
        info.style.color='#ff6b00';
      } else {
        info.textContent='💾 Gesamtbackup erkannt → stellt vorhandene Daten wieder her';
        info.style.color='#8b949e';
      }
    }catch(e){info.textContent='';}
  });
  const content=h('div',{},
    h('p',{className:'modal-desc'},'Backup oder Opportunity-Rohdaten einfügen.'),
    info,ta,
    h('div',{className:'modal-row',style:{marginTop:'8px'}},
      h('button',{className:'btn-o',style:{flex:'1'},onclick:()=>{
        try{
          const d=JSON.parse(ta.value);
          if(d.version==='opportunity-rohdaten-v1'){
            // Clean Import: neue Opportunity anlegen
            const newId='acc_'+Date.now();
            const newCust={...d.cust};
            state.accounts=[{id:newId,cust:newCust,ts:Date.now()},...state.accounts].slice(0,10);
            state.activeId=newId;
            LS.set('ki21_acc',state.accounts);
            LS.set('ki21_aid',newId);
            if(d.mu)LS.set('ki21_mu',d.mu);
            if(d.inputs)Object.keys(d.inputs).forEach(k=>{
              const idx=parseInt(k.replace('slot_',''));
              if(!isNaN(idx))LS.set('ki21_st_'+newId+'_'+idx,d.inputs[k]);
            });
            if(d.kk)Object.keys(d.kk).forEach(k=>{
              const idx=parseInt(k.replace('slot_',''));
              if(!isNaN(idx))LS.set('ki21_kk_'+newId+'_'+idx,d.kk[k]);
            });
            if(d.manual)LS.set('ki21_health_manual_'+newId,d.manual);
            m.remove();renderHome();
            alert('Opportunity angelegt: '+(newCust.firma||'Neu')+'\nBitte alle Phasen neu generieren.');
          } else {
            // Vollständiges Backup wiederherstellen
            if(d.accounts){state.accounts=d.accounts;LS.set('ki21_acc',d.accounts);}
            if(d.activeId){state.activeId=d.activeId;LS.set('ki21_aid',d.activeId);}
            if(d.mu)LS.set('ki21_mu',d.mu);
            if(d.stationData)Object.keys(d.stationData).forEach(k=>LS.set(k,d.stationData[k]));
            if(d.kontextData)Object.keys(d.kontextData).forEach(k=>LS.set(k,d.kontextData[k]));
            m.remove();renderHome();
          }
        }catch(e){alert('Ungültiger Text.');}
      }},'Importieren'),
      h('button',{className:'btn',onclick:()=>m.remove()},'Abbrechen')
    )
  );
  const m=modal('Importieren',content,null);
}



// ── v4.210 DIAGNOSE / STANDALONE SAFE START ────────────────────────────
// Ziel: erst beweisen, dass Native-Clicks funktionieren. Danach Daten gezielt laden.
const KI21_SAFE_START=false; // Diagnosemodus nur noch als Fallback
let ki21SafeClickCounter=0;

function ki21SafeRemoveBlockingUi(){
  try{
    document.querySelectorAll('.bs-overlay,.bs-panel,.modal-bg,.modal-backdrop,.modal,.ki21-loading,.loading,[data-ki21-transient="1"]').forEach(el=>{
      try{el.remove();}catch(e){}
    });
    document.body.classList.remove('modal-open','sheet-open','loading','is-loading');
    document.documentElement.classList.remove('modal-open','sheet-open','loading','is-loading');
  }catch(e){}
}

function ki21SafeLocalStorageStats(){
  let keys=0, bytes=0, ki21Keys=0, ki21Bytes=0, largest=[];
  try{
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i)||'';
      const v=localStorage.getItem(k)||'';
      const b=(k.length+v.length)*2;
      keys++; bytes+=b;
      if(k.indexOf('ki21_')===0){ki21Keys++; ki21Bytes+=b; largest.push({k,b});}
    }
    largest.sort((a,b)=>b.b-a.b);
  }catch(e){}
  return {keys,bytes,ki21Keys,ki21Bytes,largest:largest.slice(0,8)};
}
function ki21FmtBytes(n){
  if(!n)return '0 KB';
  if(n<1024)return n+' B';
  if(n<1024*1024)return Math.round(n/1024)+' KB';
  return (n/1024/1024).toFixed(1)+' MB';
}
function ki21SafeResetUiState(){
  ki21SafeRemoveBlockingUi();
  try{
    const remove=[];
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i)||'';
      if(/^ki21_(view|cockpit_focus_|pending_|loading|modal|sheet|overlay|ui_|route|last_render)/.test(k))remove.push(k);
    }
    remove.forEach(k=>localStorage.removeItem(k));
  }catch(e){}
  try{localStorage.setItem('ki21_view',JSON.stringify('home'));}catch(e){}
}
function ki21SetStatus(text, isError){
  const el=document.getElementById('safeStatus');
  if(el){el.textContent=text;el.style.color=isError?'#f85149':'#8b949e';}
}
function ki21NativeButton(label, cls, onClick){
  const b=document.createElement('button');
  b.type='button';
  b.className=cls||'btn';
  b.textContent=label;
  b.style.cssText='width:100%;margin-bottom:8px;min-height:46px;touch-action:manipulation;cursor:pointer;';
  b.onclick=function(ev){
    try{ev.preventDefault();}catch(e){}
    try{onClick(ev,b);}catch(err){ki21SetStatus('Fehler: '+(err&&err.message?err.message:err),true);}
  };
  return b;
}
function ki21SafeShowStorage(){
  const s=ki21SafeLocalStorageStats();
  const lines=s.largest.map(x=>x.k+' · '+ki21FmtBytes(x.b)).join('\n')||'Keine KI21-Daten gefunden.';
  ki21SetStatus('Speicher geprüft. Größte Blöcke:\n'+lines,false);
}
function ki21SafeFullLoad(){
  ki21SetStatus('Lade Opportunity-Daten …',false);
  setTimeout(()=>{
    try{
      ki21SafeRemoveBlockingUi();
      ki21HydrateStateFromStorage();
      localStorage.setItem('ki21_view',JSON.stringify('home'));
      state.view='home';
      ki21SetStatus('Daten geladen. Öffne stabilen Arbeitsmodus …',false);
      setTimeout(()=>{try{renderHomeLiteV4211();}catch(e){ki21SetStatus('Render-Fehler: '+e.message,true);}},30);
    }catch(e){ki21SetStatus('Ladefehler: '+(e&&e.message?e.message:e),true);}
  },30);
}
function ki21SafeLightAccountList(){
  ki21SetStatus('Lese Opportunity-Liste …',false);
  setTimeout(()=>{
    try{
      const raw=localStorage.getItem('ki21_acc')||'[]';
      const accs=JSON.parse(raw).filter(a=>a&&a.cust&&a.cust.firma);
      const names=accs.slice(0,20).map((a,i)=>(i+1)+'. '+a.cust.firma).join('\n')||'Keine Opportunities gefunden.';
      ki21SetStatus('Opportunities ('+accs.length+'):\n'+names,false);
    }catch(e){ki21SetStatus('Opportunity-Liste konnte nicht gelesen werden: '+e.message,true);}
  },30);
}
function renderKi21SafeStart(){
  const app=document.getElementById('app');
  if(!app)return;
  ki21SafeRemoveBlockingUi();
  const stats=ki21SafeLocalStorageStats();
  app.innerHTML='';
  const wrap=document.createElement('div');
  wrap.className='wrap';
  wrap.style.paddingTop='18px';
  wrap.innerHTML=`
    <div style="font-size:11px;font-weight:900;letter-spacing:1.6px;color:#ff6b00;text-transform:uppercase;margin-bottom:6px;">KI21 Diagnose-Start · v4.232 Selectable SPIN Stable</div>
    <div style="font-family:'DM Serif Display',serif;font-size:25px;line-height:1.12;margin-bottom:10px;">Safe Start</div>
    <div style="font-size:13px;line-height:1.5;color:var(--text2);margin-bottom:14px;">
      Diese Version lädt beim Start keine Opportunity-Daten, keine Migration und kein Cockpit. Erst testen wir, ob Klicks nativ funktionieren.
    </div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:12px;">
      <div style="font-size:11px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Diagnose</div>
      <div style="font-size:12px;line-height:1.55;white-space:pre-wrap;">localStorage gesamt: ${stats.keys} Keys / ${ki21FmtBytes(stats.bytes)}\nKI21-Daten: ${stats.ki21Keys} Keys / ${ki21FmtBytes(stats.ki21Bytes)}</div>
    </div>
  `;
  const area=document.createElement('div');
  area.appendChild(ki21NativeButton('Klick-Test', 'btn-o', ()=>{
    ki21SafeClickCounter++;
    ki21SetStatus('Klick funktioniert. Zähler: '+ki21SafeClickCounter,false);
  }));
  area.appendChild(ki21NativeButton('UI-Zustand zurücksetzen', 'btn', ()=>{
    ki21SafeResetUiState();
    ki21SetStatus('UI-Zustand zurückgesetzt. Opportunity-Daten wurden nicht gelöscht.',false);
  }));
  area.appendChild(ki21NativeButton('Speicherblöcke anzeigen', 'btn', ()=>ki21SafeShowStorage()));
  area.appendChild(ki21NativeButton('Opportunity-Liste leicht anzeigen', 'btn', ()=>ki21SafeLightAccountList()));
  area.appendChild(ki21NativeButton('App vollständig laden', 'btn-o', ()=>ki21SafeFullLoad()));
  const status=document.createElement('div');
  status.id='safeStatus';
  status.style.cssText='white-space:pre-wrap;background:rgba(139,148,158,.08);border:1px solid var(--border);border-radius:10px;padding:10px;font-size:12px;line-height:1.45;color:var(--text3);margin-top:6px;';
  status.textContent='Bereit. Bitte zuerst „Klick-Test“ antippen.';
  area.appendChild(status);
  const note=document.createElement('div');
  note.style.cssText='font-size:11px;color:var(--text3);line-height:1.45;margin-top:10px;';
  note.textContent='Wenn der Klick-Test nicht zählt, blockiert etwas Grundsätzliches im Browser/Hosting. Wenn nur „App vollständig laden“ hängt, liegt es an gespeicherten Daten oder Renderlogik.';
  area.appendChild(note);
  wrap.appendChild(area);
  app.appendChild(wrap);
}
