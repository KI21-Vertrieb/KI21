  }

  if(allResults.length){
    s+='=== FRГңHERE PHASENERGEBNISSE (kГ¶nnen durch obige ErgГӨnzungen Гјberholt sein вҖ“ bei Widerspruch gelten die ErgГӨnzungen oben) ===\n';
    allResults.forEach(r=>{if(r.text)s+='--- '+r.title+' ---\n'+r.text.slice(0,3000)+'\n\n';});
    s+='=== ENDE FRГңHERE PHASENERGEBNISSE ===\n\n';
  }
  s+=`Der Opportunity Health Score reprГӨsentiert die geschГӨtzte Wahrscheinlichkeit eines erfolgreichen Auftragsgewinns вҖ“ basierend auf allen bekannten Informationen, deiner B2B-Vertriebserfahrung und typischen Vertriebsmustern.

KRITISCH вҖ“ DER SCORE MISST NICHT: DokumentationsqualitГӨt, Informationsmenge, Bearbeitungsfortschritt oder Anzahl ausgefГјllter Felder. Die Menge der gesammelten Informationen ist NEUTRAL fГјr den Score. Mehr dokumentierte Information darf den Score NICHT automatisch erhГ¶hen. Bewerte stattdessen jede einzelne Information danach, ob sie die TATSГ„CHLICHE Abschlusswahrscheinlichkeit erhГ¶ht, senkt, oder unverГӨndert lГӨsst.

Beispiele fГјr deutliche SENKUNG: GeschГӨftsfГјhrer/CEO/Entscheider mag unsere LГ¶sung nicht; GeschГӨftsfГјhrer/CEO/Entscheider prГӨferiert zwei andere Mitbewerber; Wettbewerber fГјhrt bereits Workshops durch oder ist stark etabliert; Wettbewerber bietet kritische Funktion besser; Entscheidung wird verschoben oder das Projekt verschoben; Budget entfГӨllt; interner Champion verlГӨsst das Unternehmen (NUR wenn explizit so beschrieben, nicht bei bloГҹer Champion-ErwГӨhnung); CIO/IT blockiert oder bevorzugt eine vorhandene AlternativlГ¶sung (z.B. ein bereits lizenziertes Konkurrenzsystem oder eine SAP-/ERP-Inhouse-Alternative).
Beispiele fГјr ERHГ–HUNG: Budget bestГӨtigt; Entscheider aktiv eingebunden; wirtschaftlicher Nutzen bestГӨtigt; starker Sponsor vorhanden; Schmerz wurde konkret quantifiziert (z.B. mit einer Zahl/HГӨufigkeit belegt, nicht nur allgemein beschrieben).

K.O.-KRITERIEN (harte Dealbreaker вҖ“ dominieren IMMER alle anderen Signale, auch wenn viele Positivsignale vorliegen):
- Entscheider (GF/CEO/CFO/Vorstand/wirtschaftlicher Entscheider) lehnt unsere LГ¶sung klar ab
- Entscheider bevorzugt klar einen konkreten Mitbewerber
- Budget ist komplett entfallen, gestrichen oder endgГјltig abgelehnt
- Entscheidung/Projekt ist final gestoppt oder auf unbestimmte Zeit eingefroren
- Interner Champion/FГјrsprecher verlГӨsst das Unternehmen, kГјndigt, fГӨllt aus, ist nicht mehr verfГјgbar oder zieht seine UnterstГјtzung zurГјck вҖ“ NUR wenn der Text das ausdrГјcklich so beschreibt. Die bloГҹe ErwГӨhnung/Existenz eines Champions oder FГјrsprechers ist KEIN Risiko und darf niemals zu diesem K.O.-Signal fГјhren.

Wenn EINES dieser K.O.-Kriterien zutrifft: Score MUSS unter 35 liegen (Label "Kritisch"), unabhГӨngig davon wie viele positive Signale sonst vorliegen. Das betroffene Signal MUSS in der warning-Liste stehen, klar erkennbar als das dominante Problem.

Alle Гјbrigen Signale (weder K.O. noch in obiger Liste) unterscheiden sich nochmal in ihrer StГӨrke:
- STARKE Signale (deutlich spГјrbarer Effekt auf den Score, aber kein K.O.): ein konkret quantifizierter Schmerzpunkt (z.B. "X Arbeitstage Mehraufwand pro Vorgang"), ein bestГӨtigter Sponsor/Champion, eine bestГӨtigte, mehrfach wiederkehrende geschГӨftliche Auswirkung (z.B. "X gescheiterte Entscheidungen pro Jahr wegen fehlerhafter Daten"), eine klar bestГӨtigte Budgetfreigabe. Diese Signale sollen den Score spГјrbar stГӨrker bewegen als kleinere Detailpunkte.
- LEICHTE Signale (geringer Effekt): einzelne Detailinformationen, organisatorische NebensГӨchlichkeiten, unklare/vage Aussagen ohne Zahl oder konkrete Konsequenz.
Bewerte explizit, welche Signale STARK und welche LEICHT sind, bevor du den Gesamtscore festlegst вҖ“ ein einzelnes starkes Signal darf nicht von mehreren leichten Signalen "weggemittelt" werden.

Bewerte zusГӨtzlich die strukturelle Qualifizierung (Bedarf, Budget, Entscheider, Zeitrahmen, Business Case, Wettbewerbssituation вҖ“ max. 6 Kriterien) nur um einzuschГӨtzen, wie VIELE davon noch offen/unklar sind (fГјr die VorlГӨufig-Kennzeichnung) вҖ“ NICHT um daraus selbst den Score zu erhГ¶hen.

KRITISCH вҖ“ FГңNF KONSISTENZREGELN FГңR DIE SIGNALE:

1. KEINE WIDERSPRГңCHE: Ein Signal darf NIEMALS einer bereits bestГӨtigten Information widersprechen. Wenn z.B. eine Person namentlich als Ansprechpartner/Entscheider bekannt ist, darf NICHT gleichzeitig ein Warnsignal "Entscheider nicht identifiziert" erscheinen. Wenn unklar ist, ob diese Person Budget-AutoritГӨt hat oder wer Гјber ihr entscheidet, ist das ein OFFENER PUNKT ("Budget-AutoritГӨt von [Name] unklar"), kein Warnsignal.

2. WARNSIGNALE NUR AUS FAKTEN/KLAR GEKENNZEICHNETER BEWERTUNG, NIEMALS AUS BRANCHENANNAHMEN: Ein Warnsignal darf ausschlieГҹlich aus tatsГӨchlich im Text genannten Informationen entstehen вҖ“ niemals aus einer allgemeinen Branchenvermutung. "Produktionsunternehmen" bedeutet NICHT automatisch SAP. Nenne ein ERP-System (SAP, Microsoft, Oracle, Infor usw.) in einem Warnsignal NUR, wenn es im Text tatsГӨchlich erwГӨhnt wurde. Erfinde KEIN Wettbewerbsrisiko, das nicht im Text belegt ist.

3. WARNSIGNALE VS. OFFENE PUNKTE STRIKT TRENNEN: Ein Warnsignal ist ein ECHTES Deal-Risiko вҖ“ etwas, das den Deal aktiv gefГӨhrdet (z.B. "Entscheidung verschoben", "Wettbewerber bereits aktiv", "CIO blockiert", "internes Projekt konkurriert", "negativer Pilot", "fehlender Champion", "Budget eingefroren"). Eine FEHLENDE Information ist KEIN Warnsignal, sondern gehГ¶rt unter "open" (z.B. "BudgethГ¶he unbekannt", "Budgetentscheider offen", "ROI noch nicht quantifiziert", "Zeitplan offen", "Anzahl Nutzer offen"). Stelle dir bei jedem Punkt die Frage: "Ist das ein aktives Risiko, das den Deal gefГӨhrdet, oder fehlt hier nur noch eine Information?" вҖ“ im zweiten Fall gehГ¶rt der Punkt zwingend unter "open", nicht unter "warning".

4. POSITIVE SIGNALE NUR AUS BESTГ„TIGTEN FAKTEN: Ein positives Signal darf nur erscheinen, wenn es wirklich bestГӨtigt ist вҖ“ nicht bei reinem Interesse oder vagen Andeutungen. Schreibe NICHT "Champion aktiv", wenn nur allgemeines Interesse gezeigt wurde. Erlaubt sind nur konkret belegte positive Signale wie "Entscheider identifiziert", "Schmerz quantifiziert", "GeschГӨftsauswirkung bestГӨtigt", "Workshop vereinbart", "Budget genannt", "Pilot zugesagt".

5. OFFENE PUNKTE MГңSSEN EINEN SCHRITT WEITERDENKEN, NICHT BEREITS BESTГ„TIGTES WIEDERHOLEN: Ein offener Punkt darf NIEMALS eine Frage stellen, die durch bereits bestГӨtigte Informationen schon beantwortet ist. BestГӨtigte Erkenntnisse sind die Arbeitsgrundlage вҖ“ baue auf ihnen auf und leite daraus die NГ„CHSTE noch ungelГ¶ste WissenslГјcke oder das nГӨchste offene Entscheidungskriterium ab, statt dieselbe Frage erneut zu stellen. Beispiel: Wenn bereits bestГӨtigt ist "Cloud-LГ¶sung mit tГӨglicher Spiegelung wГӨre fГјr den Inhaber akzeptabel, IT hat technische Machbarkeit bestГӨtigt", ist "WГјrde der Inhaber eine Cloud-LГ¶sung mit Spiegelung akzeptieren?" KEIN gГјltiger offener Punkt mehr (das ist bereits beantwortet) вҖ“ stattdessen z.B. "Ist die Spiegelungsarchitektur verbindlich umsetzbar?" oder "Welches konkrete Entscheidungskriterium des Inhabers ist jetzt noch offen?". PrГјfe vor jedem offenen Punkt: "Wurde das bereits durch ein bestГӨtigtes positives Signal beantwortet?" вҖ“ falls ja, formuliere stattdessen die nГӨchste, tiefere Frage.

Jeder Punkt darf in GENAU EINER der drei Kategorien (positive/warning/open) erscheinen вҖ“ niemals doppelt, niemals widersprГјchlich zu einem anderen Punkt. KRITISCH: Wenn "Budget bestГӨtigt" in positive steht, darf "Budget kritisch oder unklar" NICHT in warning stehen. Wenn "Entscheider aktiv eingebunden" in positive steht, darf "Entscheider nicht eingebunden" NICHT in warning stehen. WidersprГјche zwischen Kategorien sind der hГӨufigste QualitГӨtsfehler вҖ“ vor dem Abschluss immer prГјfen ob positive und warning sich inhaltlich widersprechen.

QUALITГ„TSREGEL вҖ“ FAKT VS. BEWERTUNG KONSEQUENT TRENNEN (gilt fГјr alle drei Kategorien):
- Positive Signale: formuliere sie so, dass der VerkГӨufer sofort erkennt, ob das ein bestГӨtigter Fakt ("Schmerz quantifiziert: 5.000 вӮ¬/Monat Einsparung bestГӨtigt") oder eine KI-EinschГӨtzung ("Entscheider wirkt grundsГӨtzlich offen fГјr externe LГ¶sungen") ist.
- Bei bestГӨtigten Fakten: nutze konkrete, belegte Formulierungen ("Inhaber hat Cloud-LГ¶sung mit Spiegelung akzeptiert", "CFO unterstГјtzt aktiv").
- Bei Interpretationen/Schlussfolgerungen: nutze Sprache wie "wirkt", "scheint", "lГӨsst darauf schlieГҹen" oder nenne explizit, woraus du schlussfolgrest.
- Niemals eine Interpretation als Fakt formulieren вҖ“ das wГјrde den VerkГӨufer Гјber seinen eigenen Wissensstand tГӨuschen.

QUALITГ„TSREGEL вҖ“ PREISRISIKEN MГңSSEN DIREKT UND EINDEUTIG FORMULIERT SEIN: Ein Preisrisiko muss immer beschreiben, was passiert wenn der Kunde weiter verhandelt вҖ” nicht nur einen Abstand zu einer Grenze. Korrekt: "Angebot bereits stark reduziert вҖ” weiterer Preisnachlass wirtschaftlich kaum mГ¶glich." Falsch: "100 вӮ¬ Spielraum unter Budget." Im SaaS-/Software-Kontext gilt: Lizenzpreise sind standardmГӨГҹig jГӨhrlich wiederkehrend (ARR), keine Einmalkosten. Ein Preisrisiko im SaaS-Kontext betrifft daher immer die jГӨhrliche Belastung, nicht einen einmaligen Betrag. Wenn unklar ist ob ein Budget-Limit jГӨhrlich oder einmalig gemeint ist, nenne das als offenen Punkt.

QUALITГ„TSREGEL вҖ“ SPONSOR вү  ENTSCHEIDER (Health-Signale): Positive Signale zu Entscheidern dГјrfen nur formuliert werden wenn Entscheidungsbefugnis explizit bestГӨtigt ist. Korrekt: "Operativer Sponsor aktiv: [Name]". Falsch: "Entscheider unterstГјtzt aktiv" wenn nur UnterstГјtzung, nicht Entscheidungsbefugnis bekannt ist. Warnhinweis wenn Entscheider (GF/CEO/CFO) noch nicht identifiziert oder eingebunden.

QUALITГ„TSREGEL вҖ“ BUDGETSTATUS IM SCORE: "Budget bestГӨtigt" als positives Signal nur wenn Budgetfreigabe durch entscheidungsbefugte Person explizit bestГӨtigt. Wenn nur Budgetrahmen oder Budgettopf bekannt: als offenen Punkt formulieren "Budgetrahmen vorhanden, Freigabe durch [Rolle] ausstehend" вҖ” nicht als positives Signal werten.

QUALITГ„TSREGEL вҖ“ JEDES RISIKO LIEFERT EINE STRATEGIE:
Jedes Warnsignal (warning) MUSS mit einem konkreten Handlungsimpuls verbunden sein. Das Warnsignal beschreibt das Risiko, der Handlungsimpuls zeigt, was dagegen getan werden kann. Format: "Risiko: [Kurze Beschreibung] вҶ’ Strategie: [konkrete Handlung oder Positionierung]". Beispiele: "Budget kritisch oder unklar вҶ’ Strategie: Startmodell oder modulare EinfГјhrung unterhalb eines plausiblen Budgetrahmens vorschlagen." oder "Inhaber skeptisch gegenГјber externer Software вҶ’ Strategie: Demo als 'Innovation im Vertrieb', nicht als CRM-EinfГјhrung positionieren." Wenn du fГјr ein Risiko keine sinnvolle Strategie ableiten kannst, ist das ein Zeichen, dass das Signal zu unspezifisch ist вҖ“ schГӨrfe es dann zuerst.

Bewerte auГҹerdem unabhГӨngig davon die folgenden 11 Qualifizierungskriterien (MEDDPICC-basiert) jeweils einzeln als "geklГӨrt" (true) oder "offen" (false). Ein Kriterium gilt als "geklГӨrt", sobald DAZU IRGENDEINE konkrete Information vorliegt (egal ob positiv oder negativ/kritisch) вҖ“ "offen" gilt nur, wenn dazu noch GAR NICHTS bekannt ist. KEIN Einfluss auf den Score, dient ausschlieГҹlich der separaten Checkliste:
1. need (Bedarf / Schmerz) вҖ“ geklГӨrt sobald ein konkreter Schmerzpunkt/Bedarf benannt ist
2. budget (Budget) вҖ“ geklГӨrt sobald irgendeine Aussage zu Budget/Kosten/Investitionsbereitschaft vorliegt, auch wenn unklar/kritisch
3. economicBuyer (Entscheider / wirtschaftlicher Entscheider) вҖ“ geklГӨrt sobald eine Person/Rolle als (Mit-)Entscheider benannt ist
4. timeline (Zeitrahmen) вҖ“ geklГӨrt sobald ein Zeitfenster, Datum oder Dringlichkeit genannt wird
5. metrics (Business Case / messbarer Nutzen) вҖ“ geklГӨrt sobald eine quantifizierte oder zumindest grob umrissene Nutzenkennzahl vorliegt
6. competition (Wettbewerbssituation) вҖ“ geklГӨrt sobald IRGENDEIN Wettbewerber, eine PrГӨferenz, ein Gatekeeping- oder Integrationskriterium genannt wird вҖ“ auch wenn das Signal negativ/kritisch ist (z.B. "Kunde bevorzugt Wettbewerber X" macht dieses Kriterium GEKLГ„RT, nicht offen)
7. champion (Champion / interner FГјrsprecher) вҖ“ geklГӨrt sobald eine Person als interner UnterstГјtzer/Treiber benannt ist
8. decisionProcess (Entscheidungsprozess) вҖ“ geklГӨrt sobald bekannt ist, wer wie entscheidet (Gremium, Stufen, Freigaben)
9. decisionCriteria (Entscheidungskriterien des Kunden) вҖ“ geklГӨrt sobald bekannt ist, wonach der Kunde die LГ¶sung bewertet/auswГӨhlt
10. paperProcess (Vertragsprozess) вҖ“ geklГӨrt sobald etwas zu Einkauf, Rechtsabteilung, VertragsformalitГӨten bekannt ist
11. negativeConsequences (Kosten des Nicht-Handelns) вҖ“ geklГӨrt sobald benannt ist, was passiert/kostet, wenn nichts verГӨndert wird

Antworte AUSSCHLIESSLICH mit folgendem JSON, keine ErklГӨrung davor/danach:
{"score":<Zahl 0-100, Auftragswahrscheinlichkeit>,"label":"<ein Wort: Kritisch/Stabil/Gesund/Stark>","structuralOpenCount":<Zahl 0-6, wie viele der 6 strukturellen Kriterien noch offen/unklar sind>,"positive":[{"text":"<kurzes positives Signal, max 8 WГ¶rter>"}],"warning":[{"text":"<kurzes Warnsignal, max 8 WГ¶rter>"}],"open":[{"text":"<offener kritischer Punkt, max 8 WГ¶rter>"}],"checklist":{"need":<true/false>,"budget":<true/false>,"economicBuyer":<true/false>,"timeline":<true/false>,"metrics":<true/false>,"competition":<true/false>,"champion":<true/false>,"decisionProcess":<true/false>,"decisionCriteria":<true/false>,"paperProcess":<true/false>,"negativeConsequences":<true/false>}}
Maximal 5 EintrГӨge pro Liste. Wenn keine Signale einer Kategorie vorliegen, leeres Array.`;
  return s;
}

// savePhaseSnapshot: isolierter Health-Call mit NUR den Daten dieser einen Phase.
// Kein kk, keine anderen Phasenergebnisse вҖ” ergibt ausschlieГҹlich phaseneigene Signale.
// Alle Signale werden mit sourcePhase getaggt. Globaler Score bleibt unverГӨndert.
async function savePhaseSnapshot(accId,sitId){
  if(!accId||sitId===undefined)return;
  const cust=(LS.get('ki21_acc',[]).find(a=>a.id===accId)||{}).cust;
  if(!cust||!cust.firma)return;
  const sit=SITS[sitId];
  if(!sit)return;
  const d=LS.get('ki21_st_'+accId+'_'+sitId,null);
  if(!d||!d.result)return;
  const singleResult=[{title:sit.title,text:d.result}];
  const prompt=buildHealthPrompt(cust,singleResult,'','');
  const json=await callClaudeJSON(prompt);
  if(json&&typeof json.score==='number'){
    const tag=(arr)=>(arr||[]).map(s=>({...s,sourcePhase:sit.id||sitId}));
    LS.set('ki21_phase_snap_'+accId+'_'+sitId,{
      positive:tag(json.positive),
      warning:tag(json.warning),
      open:tag(json.open||[]),
      sourcePhase:sit.id||sitId,
      ts:Date.now()
    });
  }
}

Nur betroffene Phasen einschlieГҹen.`;
  try{

function getKoSeverity(text){
  const t=(text||'').toLowerCase();
  const leaderWords='(geschГӨftsfГјhrer|gf|ceo|cfo|geschГӨftsleitung|entscheider|leitung|vorstand|sponsor|cio)';
  const competitorWords='(mitbewerb|mitbewerber|wettbewerb|wettbewerber|konkurrent|konkurrenz)';
  const preferenceWords='(prГӨfer|bevorzug|favoris|favorit|gesetzt|vorne|tendier)';
  const rejectionWords='(mag .*nicht|will .*nicht|lehnt .*ab|skeptisch|dagegen|kein interesse|nicht Гјberzeugt|ablehn)';
  // Reihenfolge = Schweregrad, niedrigster Deckel zuerst geprГјft
  if(new RegExp(leaderWords+'.{0,80}'+preferenceWords+'.{0,80}'+competitorWords,'i').test(t))return {penalty:45,cap:25};
  if(new RegExp(competitorWords+'.{0,80}'+preferenceWords,'i').test(t))return {penalty:45,cap:25};
  if(new RegExp(leaderWords+'.{0,80}'+rejectionWords,'i').test(t))return {penalty:35,cap:30};
  const championDepartureMatch2=t.match(/(champion|fГјrsprecher|sponsor).{0,60}(verlГӨsst (das unternehmen|die firma|uns)|hat gekГјndigt|kГјndigt (zum|in|im)|wechselt (den arbeitgeber|die firma|das unternehmen)|nicht mehr (im unternehmen|verfГјgbar|erreichbar)|zieht (seine|ihre) unterstГјtzung zurГјck|fГӨllt (komplett )?weg)/i);
  if(championDepartureMatch2&&!/(verlГӨsst sich|verlassen sich|sich .{0,15}verlassen|verlass(en)? auf|verlГӨsslich|vertrau)/i.test(championDepartureMatch2[0]))return {penalty:30,cap:30};
  if(/budget.{0,40}(komplett gestrichen|vollstГӨndig entfallen|endgГјltig abgelehnt)/i.test(t))return {penalty:20,cap:45};
  if(/(entscheidung|projekt).{0,40}(final gestoppt|endgГјltig gestoppt|auf unbestimmte zeit eingefroren)/i.test(t))return {penalty:20,cap:45};
  return null;
}
function isKoSignalText(text){ return getKoSeverity(text)!==null; }

function _getOpportunityHealthBase(accId){
  const auto=LS.get('ki21_health_'+accId,null);
  const allResults=[];
  SITS.forEach((sit,i)=>{
    const d=LS.get('ki21_st_'+accId+'_'+i,null);
    if(d&&d.result)allResults.push({title:sit.title,text:d.result});
  });
  const risk=getAdditionRiskSignals(accId,allResults);
  if(!auto){
    if(risk.warning.length||risk.positive.length){
      let cap=null;
      risk.warning.forEach(w=>{const sev=getKoSeverity(w.text);if(sev)cap=cap===null?sev.cap:Math.min(cap,sev.cap);});
      const score=cap!==null?Math.min(55,cap):55;
      return {score,label:score<35?'Kritisch':'Stabil',provisional:true,positive:risk.positive,warning:risk.warning,open:[],structuralOpenCount:6,isKo:cap!==null};
    }
    return null;
  }
  const manual=getHealthManual(accId);
  const positive=(auto.positive||[]).map(s=>({text:s.text,origin:'AUTO',type:'positive',disabled:manual.removedAutoTexts.includes(s.text)}));
  const warning=(auto.warning||[]).map(s=>({text:s.text,origin:'AUTO',type:'warning',disabled:manual.removedAutoTexts.includes(s.text)}));
  const open=(auto.open||[]).map(s=>({text:s.text,origin:'AUTO',type:'open',disabled:manual.removedAutoTexts.includes(s.text)}));
  risk.warning.forEach(r=>{ if(!warning.find(w=>w.text===r.text)) warning.unshift({...r,disabled:manual.removedAutoTexts.includes(r.text)}); });
  risk.positive.forEach(r=>{ if(!positive.find(w=>w.text===r.text)) positive.unshift({...r,disabled:manual.removedAutoTexts.includes(r.text)}); });
  manual.added.forEach(m=>{
    const entry={text:m.text,origin:'MANUELL',type:m.type,disabled:m.active===false};
    if(m.type==='positive')positive.push(entry);
    else if(m.type==='warning')warning.push(entry);
    else open.push(entry);
  });
  // EINE einzige Quelle der Wahrheit fГјr K.O.-Erkennung: getKoSeverity prГјft jeden aktiven (nicht ausgeblendeten) Warnsignal-Text.
  // K.O. wirkt NUR als Score-Deckel (schlimmster Fall gewinnt) - NIE als zusГӨtzliche, aufsummierbare Strafe.
  // Architektur-Korrektur: Ein rein lokal per Regex erkanntes Signal (origin='ERGAENZUNG') darf den Score NICHT
  // allein hart deckeln - das wГјrde bedeuten, dass eine ungeprГјfte Textmustererkennung die KI-Bewertung
  // Гјberstimmt. Nur von der KI selbst bestГӨtigte (AUTO) oder bewusst vom Nutzer eingegebene (MANUELL)
  // Signale dГјrfen den K.O.-Deckel auslГ¶sen. ERGAENZUNG-Signale bleiben als Hinweis sichtbar, capen aber nicht.
  const activeWarnings=warning.filter(w=>!w.disabled&&w.origin!=='ERGAENZUNG');
  let koCapMin=null;
  activeWarnings.forEach(w=>{
    const sev=getKoSeverity(w.text);
    if(sev)koCapMin=koCapMin===null?sev.cap:Math.min(koCapMin,sev.cap);
  });
  const hasActiveKo=koCapMin!==null;
  // Moderate +-3 Wirkung nur fГјr NICHT-K.O.-Signale (normale Risiko-Signale)
  const manualPositiveCount=manual.added.filter(m=>m.type==='positive'&&m.active!==false).length;
  const manualWarningCount=manual.added.filter(m=>m.type==='warning'&&m.active!==false&&!isKoSignalText(m.text)).length;
  const disabledAutoPositive=positive.filter(s=>(s.origin==='AUTO'||s.origin==='ERGAENZUNG')&&s.disabled).length;
  const disabledAutoWarning=warning.filter(s=>(s.origin==='AUTO'||s.origin==='ERGAENZUNG')&&s.disabled&&!isKoSignalText(s.text)).length;
  let base=auto.score+manualPositiveCount*3-manualWarningCount*3-disabledAutoPositive*3+disabledAutoWarning*3;
  let score=Math.max(0,Math.min(100,Math.round(base)));
  if(hasActiveKo)score=Math.min(score,koCapMin);
  const provisional=(auto.structuralOpenCount||0)>3;
  const label=hasActiveKo?'Kritisch':(score<35?'Kritisch':(score<70?'Stabil':(auto.label||'Gesund')));
  return {score,label,provisional,positive,warning,open,structuralOpenCount:auto.structuralOpenCount||0,checklist:auto.checklist||null,isKo:hasActiveKo,ts:auto.ts||0};
}



// v4.137 Deterministische Nachkorrektur: bestГӨtigte Entscheidungsbefugnis schlГӨgt alte Phasentexte.
function getCurrentUserKnowledgeText(accId){
  if(!accId)return '';
  let parts=[];
  const legacy=LS.get('ki21_kk_'+accId,'');
  if(legacy&&String(legacy).trim())parts.push(String(legacy));
  for(let i=0;i<5;i++){
    const slot=LS.get('ki21_kk_'+accId+'_'+i,'');
    if(slot&&String(slot).trim())parts.push(String(slot));
    const stk=LS.get('ki21_stk_'+accId+'_'+i,'');
    if(stk&&String(stk).trim())parts.push(String(stk));
  }
  return parts.join('\n');
}
function hasConfirmedFullDecisionAuthority(accId){
  const raw=getCurrentUserKnowledgeText(accId);
  if(!raw.trim())return false;

  // Gegenbelege in aktuellen Nutzer-ErgГӨnzungen verhindern den Fix.
  // Wichtig: "keine GF-Freigabe erforderlich" darf NICHT als Gegenbeleg zГӨhlen.
  const explicitNeedForApproval=/(gf|cfo|geschГӨftsfГјhrer|ceo|geschГӨftsleitung).{0,80}(muss|mГјssen|soll|sollen|mГјsste|mГјssten).{0,80}(freigeben|bestГӨtigen|validieren|zustimmen|entscheiden)/i.test(raw)
    || /(freigabe|zustimmung|entscheidung).{0,80}(durch|vom|von).{0,30}(gf|cfo|geschГӨftsfГјhrer|ceo|geschГӨftsleitung).{0,40}(offen|fehlt|ausstehend)/i.test(raw);

  const explicitNoExtraApproval=/keine.{0,70}(zusГӨtzliche|weitere)?.{0,30}(geschГӨftsfГјhrer|gf|cfo|ceo|geschГӨftsleitung).{0,50}(freigabe|zustimmung|validierung|bestГӨtigung).{0,60}(erforderlich|notwendig|nГ¶tig)?/i.test(raw)
    || /(geschГӨftsfГјhrer|gf|cfo|ceo|geschГӨftsleitung).{0,50}(freigabe|zustimmung|validierung|bestГӨtigung).{0,60}(nicht erforderlich|nicht notwendig|nicht nГ¶tig|entfГӨllt)/i.test(raw)
    || /ohne.{0,80}(geschГӨftsfГјhrer|gf|cfo|ceo|geschГӨftsleitung).{0,60}(freigabe|zustimmung|validierung|bestГӨtigung)/i.test(raw)
    || /(zusГӨtzliche|weitere).{0,30}(geschГӨftsfГјhrer|gf|cfo|ceo|geschГӨftsleitung).{0,40}(freigabe|zustimmung|validierung|bestГӨtigung).{0,60}(nicht erforderlich|nicht notwendig|nicht nГ¶tig)/i.test(raw);

  const fullAuthority=/vollstГӨndig.{0,100}(wirtschaftlich|fachlich|entscheider|entscheidungsbefugnis|beauftragung|budget|pilotstart|freigeben)/i.test(raw)
    || /(wirtschaftlich|fachlich).{0,60}(entscheider|entscheidungsbefugnis)/i.test(raw)
    || /(eigenstГӨndig|allein|selbststГӨndig|selbst).{0,100}(beauftragen|freigeben|entscheiden|budget|pilotstart|beauftragung)/i.test(raw)
    || /(budget|pilotstart|beauftragung).{0,100}(eigenstГӨndig|allein|selbststГӨndig|selbst).{0,100}(freigeben|entscheiden|beauftragen)/i.test(raw)
    || /(kann|darf).{0,80}(budget|pilotstart|beauftragung).{0,80}(freigeben|entscheiden|beauftragen)/i.test(raw);

  const namedDecisionAuthority=/\b[A-ZГ„Г–Гң][a-zГӨГ¶ГјГҹ]{2,}\b.{0,220}(vollstГӨndig|eigenstГӨndig|allein|selbststГӨndig|wirtschaftlich|fachlich|darf|kann).{0,220}(entscheider|freigeben|beauftragen|budget|pilotstart|beauftragung)/.test(raw);

  return ((explicitNoExtraApproval&&fullAuthority)||namedDecisionAuthority)&&!explicitNeedForApproval;
}

function normalizeEuroNumber(str){
  let s=String(str||'').trim().toLowerCase();
  if(!s)return null;
  const hasK=/k\b|kвӮ¬|tausend/.test(s);
  s=s.replace(/вӮ¬/g,'').replace(/eur/g,'').replace(/\s/g,'').replace(/kвӮ¬?/g,'').replace(/tausend/g,'');
  if(/,\d{1,2}$/.test(s))s=s.replace(/\./g,'').replace(',','.');
  else s=s.replace(/[.,]/g,'');
  let n=parseFloat(s);
  if(!isFinite(n))return null;
  if(hasK||n<1000&&/\b\d{1,3}\s*k/i.test(str))n*=1000;
  return Math.round(n);
}
function extractEuroNumbers(text){
  const out=[];
  const src=String(text||'');
  const re=/(\d{1,3}(?:[\.\s]\d{3})+(?:,\d{1,2})?|\d+(?:,\d{1,2})?)\s*(?:k\s*)?(?:вӮ¬|eur|euro|kвӮ¬|k\b)?/gi;
  let m;
  while((m=re.exec(src))){
    const token=m[0];
    if(!/(вӮ¬|eur|euro|k\b|kвӮ¬|\.|,|\d{4,})/i.test(token))continue;
    const n=normalizeEuroNumber(token);
    if(n&&n>=100)out.push({value:n,index:m.index,token});
  }
  return out;
}
// v4.160: GeldbetrГӨge nicht nach festen Zahlenwerten, sondern nach semantischer Rolle zuordnen.
// Dadurch funktioniert die Logik bei beliebigen BetrГӨgen (z.B. 81.000 вӮ¬, 57.500 вӮ¬, 3.400 вӮ¬).
function euroRoleKeywordDistance(text, amountIndex, pattern){
  const raw=String(text||'');
  const start=Math.max(0,amountIndex-170);
  const end=Math.min(raw.length,amountIndex+170);
  const win=raw.slice(start,end);
  const localIdx=amountIndex-start;
  let best=9999;
  const flags=pattern.flags.includes('g')?pattern.flags:pattern.flags+'g';
  const re=new RegExp(pattern.source,flags);
  let m;
  while((m=re.exec(win))){
    const d=Math.abs((m.index+(m[0]||'').length/2)-localIdx);
    if(d<best)best=d;
    if(re.lastIndex===m.index)re.lastIndex++;
  }
  return best;
}
function classifyEuroAmounts(text){
  const raw=String(text||'');
  const nums=extractEuroNumbers(raw);
  const patterns={
    budget:/(budget|budgetrahmen|budgettopf|budgetgrenze|investitionsrahmen|ausgabenrahmen|rahmenbudget|freigegeben|freigabe|verfГјgbar|maximalbudget|investieren|einkaufsrahmen|zahlungsbereitschaft)/i,
    pain:/(schaden|umsatzschaden|jahresschaden|verlust|kosten des problems|problemkosten|opportunitГӨtskosten|verloren|verlorene deals|verschwendet|nacharbeit|nachbearbeitung|risiko|wirkung|potenzieller schaden|jГӨhrlicher schaden|jГӨhrliche kosten|problemschaden)/i,
    offer:/(angebotspreis|preis|paketpreis|startangebot|angebot|kosten des angebots|investition|lizenz|lizenzpreis|subscription|jahreslizenz|einmalpreis|einmalig|monatlich|jГӨhrlich|pro monat|pro jahr|fee|gebГјhr)/i,
    revenue:/(umsatz|dealgrГ¶Гҹe|arr|mrr|pipelinewert|auftragswert|projektvolumen|vertragswert)/i
  };
  return nums.map(n=>{
    const scores=[
      ['budget',euroRoleKeywordDistance(raw,n.index,patterns.budget)],
      ['pain',euroRoleKeywordDistance(raw,n.index,patterns.pain)],
      ['offer',euroRoleKeywordDistance(raw,n.index,patterns.offer)],
      ['revenue',euroRoleKeywordDistance(raw,n.index,patterns.revenue)]
    ].filter(x=>x[1]<9999).sort((a,b)=>a[1]-b[1]);
    let role='unknown';
    let confidence=0;
    if(scores.length){
      role=scores[0][0];
      confidence=Math.max(1,220-scores[0][1]);
      if(scores.length>1&&scores[1][1]-scores[0][1]<20){role='ambiguous';confidence=0;}
    }
    const seg=raw.slice(Math.max(0,n.index-120),Math.min(raw.length,n.index+120));
    return {...n,role,confidence,segment:seg};
  });
}
function getEuroAmountsByRole(text,role){
  return classifyEuroAmounts(text).filter(x=>x.role===role).sort((a,b)=>(b.confidence-a.confidence)||(b.value-a.value));
}

  if(!amount)return '';

  const yearly=/(jГӨhrlich|jahr|jahres|pro jahr|p\.a\.)/.test(seg);
  if(/umsatzschaden|umsatzverlust/.test(seg))return 'Schmerz quantifiziert: '+formatEuroDE(amount.value)+(yearly?' jГӨhrlicher ':' ')+'Umsatzschaden';

  if(/schaden|kosten|opportunitГӨtskosten|nacharbeit|nachbearbeitung/.test(seg))return 'Schmerz quantifiziert: '+formatEuroDE(amount.value)+(yearly?' jГӨhrlicher ':' ')+'wirtschaftlicher Schaden';
  return 'Schmerz quantifiziert: '+formatEuroDE(amount.value)+' wirtschaftliche GrГ¶Гҹenordnung';
}

function getCustomerBudgetNumbers(accId){

function getGenericOfferBudgetFit(accId){

  if(!budgets.length||!offers.length)return {fits:false,offer:null,budget:null,entryRole:hasExplicitEntryOfferRole()};
  const budgetMax=Math.max(...budgets);
  const offerMin=Math.min(...offers);
  const fits=offerMin<=budgetMax*0.9; // klar innerhalb/unterhalb des Budgets
  return {fits,offer:offerMin,budget:budgetMax,entryRole:hasExplicitEntryOfferRole()};
}

function sanitizeBudgetPriceText(accId,text,kind){
  if(!text)return text;
  text=sanitizeInventedPrecisionText(accId,text,kind);
  const sysClean=sanitizeSystemIntegrationDiversionText(accId,text,kind);
  if(sysClean!==text)return sysClean;
  const fit=getGenericOfferBudgetFit(accId);
  if(isInventedPilotDurationText(accId,text)){
    if(fit.entryRole)return kind==='warning'||kind==='risk'?'Startangebot noch nicht verbindlich gestartet':'Starttermin und Erfolgskriterien festlegen';
    return kind==='warning'||kind==='risk'?'Startmodell noch nicht verbindlich geklГӨrt':'Startmodell und Erfolgskriterien klГӨren';
  }
  if(fit.fits&&isObsoleteBudgetPriceConfusion(text)){
    if(kind==='positive')return fit.entryRole?'Startangebot liegt klar im Budgetrahmen':'Angebot liegt klar im Budgetrahmen';
    if(kind==='missing'||kind==='open')return fit.entryRole?'Einstiegsumfang und Starttermin festlegen':'Umfang und Starttermin festlegen';
    if(kind==='risk'||kind==='warning')return fit.entryRole?'Startangebot noch nicht verbindlich gestartet':'Formale Beauftragung noch offen';
    return '';
  }
  if(fit.fits&&isPilotBeforeEntryOfferConfusion(accId,text)){
    if(kind==='warning'||kind==='risk')return 'Startangebot noch nicht verbindlich gestartet';
    return 'Starttermin und Erfolgskriterien festlegen';
  }
  return text;
}

function sanitizeInventedPrecisionText(accId,text,kind){
  if(!text)return text;
  let x=String(text).trim();
  // v4.157: keine erfundene Teilnehmerzahl im nГӨchsten Schritt. Wenn keine konkrete Anzahl
  // ausdrГјcklich im Kundencase steht, neutral mit ausgewГӨhlten Account Managern formulieren.
  x=x.replace(/([A-ZГ„Г–Гң][a-zГӨГ¶ГјГҹ]{2,})\s+einen\s+Termin\s+mit\s+\d+\s*[вҖ“-]\s*\d+\s+(?:Key\s+)?Account\s+Managern?\s+f[Гјu]r\s+(?:[A-Z0-9Г„Г–Гңa-zГӨГ¶ГјГҹ]+\s+)?Compact[-\s]?Kickoff\s+vorschlagen(?:\s*[вҖ“-].*)?/g,
    '$1 einen Compact-Kickoff mit ausgewГӨhlten Account Managern vorschlagen');
  x=x.replace(/(?:Termin\s+mit\s+)?\d+\s*[вҖ“-]\s*\d+\s+(?:Key\s+)?Account\s+Managern?\s+f[Гјu]r\s+(?:KI21\s+)?Compact[-\s]?Kickoff/gi,
    'Compact-Kickoff mit ausgewГӨhlten Account Managern');
  x=x.replace(/mit\s+\d+\s*[вҖ“-]\s*\d+\s+(?:Key\s+)?Account\s+Managern?/gi,
    'mit ausgewГӨhlten Account Managern');
  // v4.157: keine erfundene Vermeidungsquote als Risiko/ROI-Annahme. Konkrete Quoten bleiben nur
  // zulГӨssig, wenn sie ausdrГјcklich vom Kunden genannt wurden; im Cockpit lieber neutral validieren.
  x=x.replace(/ROI[-\s]?Annahme\s+\d{1,3}\s*%\s+Vermeidbarkeit\s+noch\s+nicht\s+validiert\s*;?\s*(?:Pilot|Startangebot)\s+erforderlich/gi,
    'Vermeidungsquote schwach qualifizierter Deals noch nicht validiert');
  x=x.replace(/ROI[-\s]?Annahme\s+\d{1,3}\s*%\s+Vermeidbarkeit/gi,
    'ROI-Annahme zur Vermeidungsquote');
  x=x.replace(/\d{1,3}\s*%\s+Vermeidbarkeit/gi,
    'Vermeidungsquote');
  x=x.replace(/Vermeidungsquote\s+noch\s+nicht\s+validiert\s*;?\s*Pilot\s+erforderlich/gi,
    'Vermeidungsquote noch nicht validiert; Startangebot erforderlich');
  return x;
}

function applyBudgetOfferPostProcessing(accId,health){
  if(!health)return health;
  const fit=getGenericOfferBudgetFit(accId);
  if(!fit.fits&&!fit.entryRole)return health;
  const copy={...health};
  const cleanMap=(arr,kind)=>(arr||[])
    .map(x=>{
      const text=x&&x.text?x.text:x;
      const cleaned=sanitizeBudgetPriceText(accId,text,kind);
      if(!cleaned)return null;
      return (x&&x.text)?{...x,text:cleaned}:cleaned;
    })
    .filter(Boolean);
  copy.positive=cleanMap(copy.positive,'positive');
  copy.warning=cleanMap(copy.warning,'warning');
  copy.open=cleanMap(copy.open,'open');
  if(fit.fits&&!copy.positive.find(x=>/(angebot|startangebot).{0,40}(budgetrahmen|budget)/i.test(x.text||''))){
    copy.positive.push({text:fit.entryRole?'Startangebot liegt klar im Budgetrahmen':'Angebot liegt klar im Budgetrahmen',origin:'REGEL',type:'positive',disabled:false});
  }
  copy.checklist={...(copy.checklist||{})};
  if(fit.fits)copy.checklist.budget=true;
  return copy;
}
function sanitizeDashboardTextForDecisionAuthority(accId,text,kind){
  if(!text)return text;
  text=sanitizeInventedPrecisionText(accId,text,kind);
  const budgetClean=sanitizeBudgetPriceText(accId,text,kind==='missing'?'missing':kind);
  if(budgetClean!==text)return budgetClean;
  if(!hasConfirmedFullDecisionAuthority(accId))return text;
  if(isObsoleteGfCfoText(text)){
    const name=getConfirmedDecisionMakerName(accId);
    if(kind==='nextStep')return 'Mit '+name+' wirtschaftlichen Nutzen, Vermeidungsquote und Pilotstart validieren.';
    if(kind==='missing')return 'Wirtschaftlichen Nutzen und Vermeidungsquote mit '+name+' validieren.';
    return '';
  }
  return text;
}
function applyDecisionAuthorityPostProcessing(accId,health){
  const authorityDetected=hasConfirmedFullDecisionAuthority(accId)||hasAuthoritySignalInHealth(health);
  if(!health||!authorityDetected)return health;
  const copy={...health};
  const cleanArr=(arr)=>(arr||[]).filter(x=>!isObsoleteGfCfoText(x&&x.text?x.text:x));
  copy.positive=cleanArr(copy.positive);
  copy.warning=cleanArr(copy.warning);
  copy.open=cleanArr(copy.open);
  if(!copy.positive.find(x=>/entscheidungsbefugnis bestГӨtigt/i.test(x.text||''))){
    copy.positive.unshift({text:'Entscheidungsbefugnis bestГӨtigt',origin:'REGEL',type:'positive',disabled:false});
  }
  copy.checklist={...(copy.checklist||{})};
  copy.checklist.economicBuyer=true;
  copy.checklist.decisionProcess=true;
  copy.checklist.budget=true;
  copy.structuralOpenCount=Math.max(0,(copy.structuralOpenCount||0)-1);
  return copy;
}
// v4.139: Score, Matrix und harte Fakten mГјssen zusammenpassen.
// Wenn Entscheiderbefugnis, Budget und ein konkretes Angebot im Budgetrahmen bestГӨtigt sind,
// darf der sichtbare Health Score nicht mehr wie eine schwache Opportunity wirken.
// Harte K.O.-Risiken bleiben unberГјhrt und deckeln weiterhin.
function hasQuantifiedPainSignal(accId,health){
  const raw=(getCurrentUserKnowledgeText(accId)+'\n'+JSON.stringify(health||{})).toLowerCase();
  return getEuroAmountsByRole(raw,'pain').length>0 || /(jahresschaden|jahresverlust|umsatzverlust|umsatzschaden|wirtschaftlicher\s+schaden|vermeidungsquote|\b\d+\s*(schlechte|schlecht|schwach|verlorene|qualifizierte)?\s*deals|deals\/monat|pro monat)/i.test(raw);
}
function hasConfirmedBudgetSignal(accId,health){
  const raw=(getCurrentUserKnowledgeText(accId)+'\n'+JSON.stringify(health||{})).toLowerCase();
  return /(operatives budget vorhanden|budget vorhanden|budgetrahmen.{0,40}(vorhanden|bestГӨtigt|verfГјgbar)|budget.{0,40}(vorhanden|bestГӨtigt|verfГјgbar|freigegeben)|"budget"\s*:\s*true)/i.test(raw);
}
function hasConcretePainSignal(accId,health){
  const raw=(getCurrentUserKnowledgeText(accId)+'\n'+JSON.stringify(health||{})).toLowerCase();
  return hasQuantifiedPainSignal(accId,health)||/(schmerz.{0,50}(konkret|benannt|bestГӨtigt|quantifiziert)|konkreter schmerz|problem.{0,40}(konkret|benannt|bestГӨtigt))/i.test(raw);
}
function hasHardVisibleRisk(accId,health){
  const all=[...(health.warning||[]),...(health.open||[])].map(x=>String(x&&x.text?x.text:x)).join(' | ').toLowerCase();
  const raw=(getCurrentUserKnowledgeText(accId)+'\n'+all).toLowerCase();
  return /(entscheider.{0,40}(unklar|fehlt|offen)|kein budget|budget.{0,30}(fehlt|gestrichen|nicht vorhanden)|projekt.{0,40}(gestoppt|verschoben|pausiert)|wettbewerber.{0,50}(bevorzugt|favorisiert|gesetzt)|no[- ]?decision|keine nГӨchste aktion|kein konkreter schmerz|schmerz.{0,30}(unklar|fehlt)|entscheidung.{0,30}(blockiert|unwahrscheinlich)|rechtliche sperre|procurement blockiert)/i.test(raw);
}
function applySystemIntegrationDiversionPostProcessing(accId,health){
  if(!health)return health;
  const copy={...health};
  let diversionFound=false;
  const cleanArr=(arr,kind)=>(arr||[]).map(x=>{
    const text=x&&x.text?x.text:x;
    const cleaned=sanitizeSystemIntegrationDiversionText(accId,text,kind);
    if(!cleaned){ diversionFound=true; return null; }
    if(cleaned!==text)diversionFound=true;
    return (x&&x.text)?{...x,text:cleaned,origin:(x.origin||'REGEL')}:cleaned;
  }).filter(Boolean);
  copy.positive=cleanArr(copy.positive,'positive');
  copy.open=cleanArr(copy.open,'open');
  copy.warning=cleanArr(copy.warning,'warning');
  if(diversionFound){
    const note='Ausweichdiskussion Гјber vorhandene Systeme vermeiden; Nutzen des eigenen Angebots zuerst validieren.';
    if(!copy.warning.find(x=>String(x.text||x).toLowerCase()===note.toLowerCase())){
      copy.warning.push({text:note,origin:'REGEL',type:'warning',disabled:false,priority:'low'});
    }
  }
  return copy;
}

function applyScoreMatrixConsistencyPostProcessing(accId,health){
  if(!health)return health;
  const copy={...health};
  if(copy.isKo)return copy;

  const authority=hasConfirmedFullDecisionAuthority(accId)||hasAuthoritySignalInHealth(copy);
  const budget=hasConfirmedBudgetSignal(accId,copy)||hasBudgetSignalInHealth(copy);
  const offerUnderBudget=hasKnownOfferUnderBudget(accId);
  const quantifiedPain=hasQuantifiedPainSignal(accId,copy);
  const concretePain=hasConcretePainSignal(accId,copy);
  const hardRisk=hasHardVisibleRisk(accId,copy);

  let floor=0;

  // v4.149: Score und Matrix konsistent halten.
  // Wenn die Kernkriterien positiv sind und nur normale Bremsen offen sind,
  // darf der Score nicht wie eine schwache Opportunity wirken.
  if(!hardRisk&&authority&&budget&&concretePain)floor=Math.max(floor,65);
  if(!hardRisk&&authority&&budget&&quantifiedPain)floor=Math.max(floor,68);
  if(!hardRisk&&authority&&budget&&concretePain&&offerUnderBudget)floor=Math.max(floor,68);
  if(!hardRisk&&authority&&budget&&quantifiedPain&&offerUnderBudget)floor=Math.max(floor,70);

  // RГјckwГӨrtskompatibilitГӨt mit alter Angebotsregel.
  if(!hardRisk&&authority&&offerUnderBudget)floor=Math.max(floor,60);
  if(!hardRisk&&authority&&offerUnderBudget&&quantifiedPain)floor=Math.max(floor,68);

  if(floor&&Number(copy.score||0)<floor){
    copy.score=floor;
    copy.label=floor>=70?'Gesund':'Stabil';
    copy.provisional=false;
  }
  return copy;
}
function getOpportunityHealth(accId){
  return applyScoreMatrixConsistencyPostProcessing(accId,applySystemIntegrationDiversionPostProcessing(accId,applyBudgetOfferPostProcessing(accId,applyDecisionAuthorityPostProcessing(accId,_getOpportunityHealthBase(accId)))));
}

function rewriteSalesQuestionText(s){
  let q=String(s||'').trim();
  if(!q)return '';
  const low=q.toLowerCase();
  // v4.151: Top-Fragen sollen wirtschaftlich klar und ohne unnГ¶tige GF-/GeschГӨftsfГјhrer-AbhГӨngigkeit formuliert sein.
  // Alte KI-Formulierungen wie "GeschГӨftsfГјhrer-Akzeptanz" oder "nicht mehr als diese 4 schwachen Deals" wirken verdreht.
  const weakDeals=(q.match(/(\d+)\s*(?:schwach|schlechte|schwachen|schlecht)\s*(?:qualifizierte[nr]?\s*)?(?:deals|opportunit(?:y|ies|ГӨten)?)/i)||[])[1];
  if(/geschГӨftsfГјhrer|geschГӨftsfГјhrung|\bgf\b/i.test(q) && /(akzeptanz|forecast|pipeline|glaubwГјrdigkeit|zahlen|management)/i.test(q) && /(wenn|falls)/i.test(q)){
    if(weakDeals){
      return `Was kostet es euch in den nГӨchsten 6 Monaten, wenn weiterhin ${weakDeals} schwach qualifizierte Deals pro Monat zu spГӨt erkannt werden?`;
    }
    if(/forecast|pipeline|glaubwГјrdigkeit/i.test(q)){
      return 'Was passiert mit Forecast-GlaubwГјrdigkeit und Management-Vertrauen, wenn ihr das Problem nicht lГ¶st?';
    }
    return 'Was passiert wirtschaftlich, wenn ihr dieses Problem in den nГӨchsten 6 Monaten nicht lГ¶st?';
  }
  if(/nicht\s+mehr\s+als\s+(?:diese\s+)?\d+\s*(?:schwach|schlechte|schwachen)/i.test(q)){
    const n=(q.match(/nicht\s+mehr\s+als\s+(?:diese\s+)?(\d+)/i)||[])[1]||weakDeals||'mehrere';
    return `Was kostet es euch in den nГӨchsten 6 Monaten, wenn weiterhin ${n} schwach qualifizierte Deals pro Monat zu spГӨt erkannt werden?`;
  }
  // GF-Bezug in Discovery-/Need-Payoff-Fragen neutralisieren, wenn er nicht wirklich Entscheidungsgegenstand ist.
  q=q.replace(/GeschГӨftsfГјhrer-Akzeptanz/gi,'Management-Akzeptanz')
     .replace(/GeschГӨftsfГјhrung/gi,'Management')
     .replace(/GeschГӨftsfГјhrer/gi,'Management')
     .replace(/\bGF\b/g,'Management');
  // Technische Integrationsfragen im Cockpit nicht als Top-Frage formulieren.
  if(/hubspot.*integration|integration.*hubspot|spin-fragen.*aufwand|aufwand.*hubspot/i.test(q)){
    return 'Wo gehen Discovery-Informationen heute zwischen GesprГӨch, Notizen und CRM verloren?';
  }
  return q;
}

function normalizeQuestionText(q,forPreview){
  let s=String(q||'').trim();
  // v4.150: UI-Artefakte/Bullets konsequent entfernen, damit Cockpit-Fragen sauber wirken.
  s=s.replace(/^[вҖў\-\sвҡӘпёҸвҡӘв—Ӣв—Ұв–Әв–«вҖ“вҖ”]*/u,'').replace(/^[SPIN]\s*[:\-вҖ“]\s*/i,'').trim();
  s=s.replace(/\s+/g,' ');
  s=rewriteSalesQuestionText(s);
  if(!s)return '';
  if(forPreview){
    const low=s.toLowerCase();
    // v4.150: FГјr die Cockpit-Kachel zГӨhlen vertriebliche Wirkung und Discovery-Relevanz вҖ“ Technikfragen werden nicht priorisiert.
    if(/(nicht\s+(lГ¶st|gelГ¶st|angeht|verГӨndert|macht|adressiert|klГӨrt)|nichts\s+(ГӨndert|verГӨndert|passiert|macht)|ungelГ¶st\s+bleib|unverГӨndert\s+bleibt|so\s+bleibt|zustand\s+bleibt|wenn\s+weiterhin)/i.test(s)){
      if(low.includes('forecast')||low.includes('pipeline')||low.includes('discovery')||low.includes('qualifiz'))return 'Was passiert mit Forecast und Pipeline, wenn ihr nichts verГӨndert?';
      return 'Was passiert, wenn ihr das Problem nicht lГ¶st?';
    }
    if(low.includes('discovery')&&(low.includes('hubspot')||low.includes('notizen')||low.includes('e-mails')||low.includes('emails')||low.includes('crm')))return 'Wo gehen Discovery-Informationen heute verloren?';
    if(low.includes('nachqualifizierung')||low.includes('reparatur'))return 'Wie viel Zeit kostet Nachqualifizierung pro Deal?';
    if(low.includes('discovery-fehler')||low.includes('deals spГӨter scheitern')||low.includes('verzГ¶gern'))return 'Welche Discovery-Fehler verzГ¶gern AbschlГјsse?';
    if(low.includes('vermeidungsquote'))return 'Welche Vermeidungsquote hГӨlt der Entscheider fГјr realistisch?';
    if(low.includes('wirtschaft')&&low.includes('wirkung'))return 'Welche wirtschaftliche Wirkung ist belastbar?';
    if(s.length>86)s=s.slice(0,83).replace(/\s+\S*$/,'')+'вҖҰ';
  }
  return s;
}

function isExplicitNonActionImplication(q){

function buildExplicitNonActionQuestion(accId){
  const raw=(getCurrentUserKnowledgeText(accId)||'').toLowerCase();
  // v4.155: Forecast-Fragen nur, wenn der eigene Angebotskontext Forecast/Opportunity/Pipeline trГӨgt
  // oder der Kunde Forecast explizit problematisiert. Dann reichen kleine Qualifizierungs-/Pipeline-Anker.
  if(isForecastValueLeverAllowed(accId)&&/forecast|pipeline|opportunit|discovery|qualifizier|crm|hubspot|deal|abschlussquote|nachqualifiz|health/i.test(raw))return 'I: Was passiert mit Forecast, Pipeline-QualitГӨt und Managemententscheidungen, wenn ihr dieses Problem in den nГӨchsten 6 Monaten nicht lГ¶st?';
  return 'I: Was passiert in den nГӨchsten 6 Monaten, wenn ihr dieses Problem nicht lГ¶st und der heutige Zustand bleibt?';

function ensureExplicitNonActionImplicationLines(lines,accId){
  let out=(lines||[]).map(x=>String(x||'').trim()).filter(Boolean);
  const raw=(getCurrentUserKnowledgeText(accId)||'').toLowerCase();
  const forecastAnchor=isForecastValueLeverAllowed(accId)&&/forecast|pipeline|opportunit|discovery|qualifizier|crm|hubspot|deal|abschlussquote|nachqualifiz|health/i.test(raw);
  const hasExplicit=out.some(isExplicitNonActionImplication);
  const hasForecast=out.some(l=>/forecast|pipeline|opportunit|managemententscheid|ressourcenplanung/i.test(l));
  if(hasExplicit && (!forecastAnchor || hasForecast))return out;
  const idx=out.findIndex(l=>/^[\sвҖў\-]*i\s*[:\-вҖ“]/i.test(l));
  const required=buildExplicitNonActionQuestion(accId);
  if(idx>=0)out.splice(idx+1,0,required); else out.push(required);
  return out;
}
function questionCockpitRank(q){
  const s=String(q||'').toLowerCase();
  // v4.150: Fragen im Cockpit nach Vertriebswirkung sortieren, nicht nach technischer Reihenfolge.
  if(/(nicht\s+(lГ¶st|gelГ¶st|angeht|verГӨndert|macht|adressiert|klГӨrt)|nichts\s+(ГӨndert|verГӨndert|passiert|macht)|ungelГ¶st\s+bleib|unverГӨndert\s+bleibt|so\s+bleibt|zustand\s+bleibt|wenn\s+weiterhin)/i.test(q))return 10;
  if(/(kosten|umsatz|geld|zeit|schaden|jahres|monat|quote|vermeidungsquote|abschlussquote|forecast|pipeline|vertriebszeit|nachqualifizierung|reparatur)/i.test(q))return 20;
  if(/(was\s+wГјrde|was\s+wГӨre|verbessern|ГӨndern|profitieren|erreichen|entlast|nutzen|wert|zielbild|wenn.*gelГ¶st|lГ¶sen\s+wГјrde)/i.test(q))return 30;
  if(/(discovery|qualifizier|informationen|notizen|crm|hubspot|e-mails|emails)/i.test(q))return 40;
  if(/(integration|aufwand|setup|einbauen|technisch|implementier|trainer|hubspot)/i.test(q))return 90;
  return 60;
}
function prioritizeCockpitQuestions(qs){
  const arr=(qs||[]).filter(Boolean);
  return arr
    .map((q,i)=>({q,i,r:questionCockpitRank(q)}))
    .sort((a,b)=>(a.r-b.r)||(a.i-b.i))
    .map(x=>x.q);
}
function prioritizeNonActionQuestions(qs){
  // AbwГӨrtskompatibilitГӨt: alter Name bleibt bestehen, nutzt aber jetzt die vollstГӨndige Cockpit-Priorisierung.
  return prioritizeCockpitQuestions(qs);
}

function extractQuestionsFromText(text){
  const out=[];
  const lines=String(text||'').split('\n');
  for(const line of lines){
    const t=line.trim();
    if(/^(?:вҖў\s*)?[SPIN]\s*[:\-вҖ“]/i.test(t)||t.includes('?')){
      let q=normalizeQuestionText(t,false);
      if(q.length>8&&q.includes('?')&&!/^(KLГ„REN|BESTГ„TIGT|ANNAHME|DETAILS|EINSCHГ„TZUNG|SCHMERZ|VERTRIEBSNOTIZEN|NГ„CHSTER SCHRITT)/i.test(q))out.push(q);
    }

  return [...new Set(out)];
}
function getDashboardQuestions(accId,maxItems,forPreview){
  const sources=[];
  const p2=LS.get('ki21_st_'+accId+'_1',{});
  if(p2&&p2.fv&&p2.fv.spin)sources.push(p2.fv.spin);
  if(p2&&p2.result)sources.push(p2.result);
  const p1=LS.get('ki21_st_'+accId+'_0',{});
  if(p1&&p1.result2)sources.push(p1.result2);
  if(p1&&p1.result)sources.push(p1.result);
  let qs=[];
  // v4.150: Alle verfГјgbaren Quellen zusammenfГјhren. Nicht nach der ersten Quelle abbrechen,
  // sonst kГ¶nnen stГӨrkere I-/N-Fragen durch technische oder ГӨltere Fragen verdrГӨngt werden.
  for(const src of sources){
    qs=qs.concat(extractQuestionsFromText(src));
  }
  qs=qs.map(q=>normalizeQuestionText(q,!!forPreview)).filter(Boolean);
  qs=[...new Set(qs)];
  qs=prioritizeCockpitQuestions(qs);
  return qs.slice(0,maxItems||3);
}



// v4.137 Cockpit-Matrix-AuffГјllung: Dashboard darf nicht leer wirken.
// Wenn Score < 70, aber keine formalen Risiken vorhanden sind, werden die sichtbaren Bremsfaktoren
// aus offenen Punkten und bestГӨtigten LГјcken abgeleitet. Das ist Anzeige-Logik, kein neuer KI-Score.
function shortUniqueList(items,maxItems){
  const seen=new Set();
  const out=[];
  (items||[]).forEach(item=>{
    const text=String(item&&item.text?item.text:item||'').replace(/вҶ’ Strategie:.*/,'').trim();
    if(!text)return;
    const key=text.toLowerCase().replace(/[.,;:!?]/g,'');
    if(seen.has(key))return;
    seen.add(key);
    out.push(text);
  });
  return out.slice(0,maxItems||3);
}

function hasExplicitContractProcessSignal(accId,health){

  return /(vertragsprozess|vertrag|bestellprozess|bestellung|einkauf|procurement|legal|rechtsabteilung|papierprozess|formal(?:e|er|itГӨten)|purchase order|po).{0,80}(offen|klГӨren|unklar|blockiert|notwendig|ausstehend|zustГӨndig|prozess)|(?:offen|klГӨren|unklar|blockiert|notwendig|ausstehend|zustГӨndig|prozess).{0,80}(vertragsprozess|vertrag|bestellprozess|bestellung|einkauf|procurement|legal|rechtsabteilung|papierprozess|formal(?:e|er|itГӨten)|purchase order|po)/i.test(raw);
}
function preferConcreteCockpitFacts(accId,positives){
  let list=[...(positives||[])];
  const facts=extractKnownBusinessFacts(accId);
  const replaceOrAdd=(pattern,text,preferredIndex)=>{
    if(!text)return;
    list=list.filter(t=>!pattern.test(String(t||'')));
    if(!list.some(t=>String(t||'').toLowerCase()===text.toLowerCase())){
      list.splice(Math.min(preferredIndex,list.length),0,text);
    }
  };
  replaceOrAdd(/schmerz konkret benannt|schmerz quantifiziert|umsatzschaden|jahresschaden|wirtschaftlicher schaden|verlust/i,facts.pain,1);
  replaceOrAdd(/budgetrahmen vorhanden|budget bestГӨtigt|budget.{0,80}verfГјgbar|budget/i,facts.budget,2);
  replaceOrAdd(/entscheidungsbefugnis bestГӨtigt|entscheider.*entscheid|entscheidungsbefugt/i,facts.authority,0);
  return shortUniqueList(list,4);
}
function sanitizeCockpitTextFinal(accId,text,kind,opts){
  let x=String(text||'').trim();
  if(!x)return '';
  const authority=!!(opts&&opts.authority);
  const budgetFit=!!(opts&&opts.budgetFit);
  const budgetSignal=!!(opts&&opts.budgetSignal);
  const fit=getGenericOfferBudgetFit(accId);
  // Budget-/Preisverwechslungen im Cockpit immer entschГӨrfen, sobald ein Budgetsignal oder ein echter Angebots-Fit vorliegt.
  // Falls kein Angebotspreis bekannt ist, bleibt es eine Angebots-/Umfangsfrage, aber keine Budget-Passung zu einem Budgetrahmen.
  if(isObsoleteBudgetPriceConfusion(x) && (budgetFit||budgetSignal||fit.fits)){
    if(kind==='positive')return fit.entryRole?'Startangebot liegt klar im Budgetrahmen':'Angebot liegt im Budgetrahmen';
    if(kind==='warning'||kind==='risk')return fit.entryRole?'Startangebot noch nicht verbindlich gestartet':'Angebotsumfang noch nicht verbindlich festgelegt';
    return fit.entryRole?'Einstiegsumfang und Starttermin festlegen':'Angebotsumfang und Starttermin klГӨren';
  }
  x=sanitizeInventedPrecisionText(accId,x,kind);
  x=normalizeRoiHebelText(x);
  x=sanitizeBudgetPriceText(accId,x,kind);
  // Nach der Budget-SГӨuberung nochmals prГјfen: alte Budget-Fit-Fragen dГјrfen im Cockpit nicht sichtbar bleiben,
  // sobald ein passender Angebotsbaustein oder ein belastbares Budgetsignal vorhanden ist.
  if(isObsoleteBudgetPriceConfusion(x) && (budgetFit||budgetSignal||fit.fits)){
    if(kind==='positive')return fit.entryRole?'Startangebot liegt klar im Budgetrahmen':'Angebot liegt im Budgetrahmen';
    if(kind==='warning'||kind==='risk')return fit.entryRole?'Startangebot noch nicht verbindlich gestartet':'Angebotsumfang noch nicht verbindlich festgelegt';
    return fit.entryRole?'Einstiegsumfang und Starttermin festlegen':'Angebotsumfang und Starttermin klГӨren';
  }
  if(authority&&isObsoleteGfCfoText(x)){
    if(/schaden|jahresschaden|umsatzverlust|umsatzschaden|wirtschaftlicher schaden|quote|vermeidungsquote|roi/i.test(x)){
      return (kind==='warning'||kind==='risk')?'Wirtschaftliche Wirkung mit Entscheider validieren':'Vermeidungsquote mit Entscheider validieren';
    }
    if(kind==='missing'||kind==='open')return 'Wirtschaftlichen Nutzen mit Entscheider validieren';
    if(kind==='warning'||kind==='risk')return 'Formale Beauftragung / Startentscheidung noch offen';
    return '';
  }
  return x;
}
function buildCockpitMatrixData(accId,health){
  const raw=getCurrentUserKnowledgeText(accId).toLowerCase();
  const authorityContext=hasConfirmedFullDecisionAuthority(accId)||hasAuthoritySignalInHealth(health);
  const budgetSignalContext=hasBudgetSignalInHealth(health)||/budget|freigabe|pilotstart|beauftragung/.test(raw);
  const lowPilotUnderBudget=hasLowKi21PilotUnderBudget(accId);
  const explicitContractSignal=hasExplicitContractProcessSignal(accId,health);
  const positives=shortUniqueList((health.positive||[]).filter(s=>!s.disabled).map(s=>sanitizeCockpitTextFinal(accId,s.text,'positive',{authority:authorityContext,budgetFit:lowPilotUnderBudget,budgetSignal:budgetSignalContext})),4);
  const risks=shortUniqueList((health.warning||[]).filter(s=>!s.disabled).map(s=>sanitizeCockpitTextFinal(accId,s.text,'warning',{authority:authorityContext,budgetFit:lowPilotUnderBudget,budgetSignal:budgetSignalContext})),4);
  const open=shortUniqueList((health.open||[]).map(s=>sanitizeCockpitTextFinal(accId,s.text,'open',{authority:authorityContext,budgetFit:lowPilotUnderBudget,budgetSignal:budgetSignalContext})),4);

  // Chancen aus bestГӨtigten harten Fakten ergГӨnzen, falls die KI-Liste zu dГјnn ist.
  if(authorityContext&&!hasTextInList(positives,/entscheidungsbefugnis|entscheider/i)){
    positives.unshift('Entscheidungsbefugnis bestГӨtigt');
  }
  if(lowPilotUnderBudget&&!hasTextInList(positives,/angebot|startangebot|budgetrahmen|budget/i)){
    positives.push('Startangebot liegt klar im Budgetrahmen');
  } else if(/budget|freigabe|pilotstart|beauftragung/.test(raw)&&!hasTextInList(positives,/budget/i)){
    positives.push('Budgetrahmen vorhanden');
  }
  if((getEuroAmountsByRole(raw,'pain').length>0 || /schmerz|vermeidungsquote|schlechte deals|schwach qualifizierte deals|qualifizierte deals|discovery/.test(raw))&&!hasTextInList(positives,/schmerz|bedarf|nutzen/i)){
    positives.push('Schmerz konkret benannt');
  }

  // Wenn der Score sichtbar mittelmГӨГҹig ist, darf die Matrix nicht "keine Risiken" zeigen.
  // Dann sind fehlender Business Case, Pilotstart oder Vertragsprozess Bremsfaktoren.
  if((health.score||0)<70 && risks.length===0){
    if(!hasTextInList(open,/wirtschaft|nutzen|business|roi|vermeidungsquote/i)){
      risks.push('Business Case noch nicht belastbar');
    }
    if(!hasTextInList(open,/pilot|start|zeitplan/i)){
      risks.push('Pilotstart noch nicht verbindlich');
    }
    if(explicitContractSignal&&!hasTextInList(open,/vertrag|beschaffung|einkauf|paper|bestell/i)){
      risks.push('Vertragsprozess noch offen');
    }
  }

  // Offene Punkte auffГјllen, damit "Die eine Sache" nicht leer oder zu generisch bleibt.
  if(!hasTextInList(open,/wirtschaft|nutzen|business|roi|vermeidungsquote/i)){
    open.push(authorityContext
      ? 'Wirtschaftlichen Nutzen mit Entscheider validieren'
      : 'Wirtschaftlichen Entscheider validieren');
  }
  if((health.score||0)<70 && !hasTextInList(open,/pilot|start/i))open.push('Pilotstart konkretisieren');
  if((health.score||0)<70 && explicitContractSignal && !hasTextInList(open,/vertrag|beschaffung|einkauf|paper|bestell/i))open.push('Vertragsprozess klГӨren');

  // Finale Cockpit-SГӨuberung: Budget-/Preisverwechslungen und Гјberholte GF-Punkte dГјrfen nicht sichtbar bleiben.
  const cleanFinal=(list,kind)=>shortUniqueList((list||[]).map(t=>sanitizeCockpitTextFinal(accId,t,kind,{authority:authorityContext,budgetFit:lowPilotUnderBudget,budgetSignal:budgetSignalContext})).filter(Boolean),4);
  let finalPositive=cleanFinal(positives,'positive');
  let finalRisks=cleanFinal(risks,'warning');
  let finalOpen=cleanFinal(open,'open');
  if(lowPilotUnderBudget&&!hasTextInList(finalPositive,/angebot|startangebot|budgetrahmen|budget/i)){
    finalPositive.push('Startangebot liegt klar im Budgetrahmen');
  }
  if(authorityContext&&!hasTextInList(finalOpen,/wirtschaft|nutzen|vermeidungsquote|pilot|start/i)){
    finalOpen.push('Wirtschaftlichen Nutzen und Pilotkriterien validieren');
  }
  // v4.152: absolute finale Cockpit- und Bottom-Sheet-Sperre gegen alte Budget-/GF-RГјckfГӨlle aus gecachten Health-Texten.
  finalPositive=cleanFinal(finalPositive,'positive');
  finalRisks=cleanFinal(finalRisks,'warning')
    .map(normalizeRoiHebelText)
    .filter(t=>!(authorityContext&&isObsoleteGfCfoText(t)))
    .filter(t=>!(lowPilotUnderBudget&&isObsoleteBudgetPriceConfusion(t)))
    .filter(t=>!isTechnicalIntegrationDetail(t));
  finalOpen=cleanFinal(finalOpen,'open')
    .map(normalizeRoiHebelText)
    .filter(t=>!(authorityContext&&isObsoleteGfCfoText(t)))
    .filter(t=>!(lowPilotUnderBudget&&isObsoleteBudgetPriceConfusion(t)))
    .filter(t=>!isTechnicalIntegrationDetail(t));
  const hasVQCase=hasVermeidungsquoteBusinessCase(accId,health);
  if(hasVQCase&&!hasTextInList(finalRisks,/vermeidungsquote|vermeidbar/i)){
    const insertAt=finalRisks.length&&/entscheidung|gestoppt|verzГ¶gert|beauftragung|startentscheidung/i.test(finalRisks[0])?1:0;
    finalRisks.splice(insertAt,0,'Vermeidungsquote schwach qualifizierter Deals noch nicht validiert');
  }
  if(hasVQCase&&!hasTextInList(finalOpen,/pilot[-\s]?deals|messkriterien|vermeidungsquote/i)){
    finalOpen.unshift('Konkrete Pilot-Deals und Messkriterien zur Vermeidungsquote offen');
  }
  if(lowPilotUnderBudget&&!hasTextInList(finalPositive,/angebot|startangebot|budgetrahmen|budget/i))finalPositive.push('Startangebot liegt klar im Budgetrahmen');
  if((health.score||0)<70&&finalRisks.length===0)finalRisks.push(hasVQCase?'Vermeidungsquote schwach qualifizierter Deals noch nicht validiert':'ROI-Annahme / Vermeidungsquote noch nicht gemessen');
  if(!finalOpen.length)finalOpen.push(authorityContext?'Wirtschaftlichen Nutzen mit Entscheider validieren':'Wirtschaftlichen Entscheider validieren');
  finalPositive=preferConcreteCockpitFacts(accId,finalPositive);
  if(!explicitContractSignal){
    finalOpen=finalOpen.filter(t=>!/vertragsprozess|vertrag|bestellprozess|einkauf|procurement|paper/i.test(String(t||'')));
    finalRisks=finalRisks.filter(t=>!/vertragsprozess|vertrag|bestellprozess|einkauf|procurement|paper/i.test(String(t||'')));
  }
  return {
    positive:shortUniqueList(finalPositive.map(normalizeRoiHebelText),4),
    risks:shortUniqueList(finalRisks.map(normalizeRoiHebelText),4),
    open:shortUniqueList(finalOpen.map(normalizeRoiHebelText),4)
  };
}

function extractBulletsAfterHeader3(text,headerKeyword,maxItems){
  const lines=(text||'').split('\n');const out=[];let found=false;
  for(let i=0;i<lines.length;i++){
    if(!found){if(lines[i].toUpperCase().includes(headerKeyword.toUpperCase()))found=true;continue;}
    const t=lines[i].trim();if(!t)break;
    if(/^[A-ZГ„Г–ГңрҹҺҜрҹ”Ҙвқ“вҖў\-]/.test(t)&&out.length>0)break;
    out.push(t.replace(/^[вҖў\-]\s*/,''));if(out.length>=(maxItems||3))break;
  }
  return out;
}
function extractFirstBulletAfterHeader3(text,headerKeyword){

    if(idx>=0)manual.removedAutoTexts.splice(idx,1);

function splitDetailsFromResult(text){
  if(!text)return {main:'',details:''};
  // Robuster Marker-Match: erlaubt fГјhrende Markdown-Zeichen (#, -, =, *, Leerzeichen) vor/nach ###DETAILS###,
  // falls die KI das exakte Format leicht abweichend ausgibt (z.B. "## ###DETAILS###" oder "###DETAILS###  ")
  const markerRegex=/[#\-=*\s]*###\s*DETAILS\s*###[#\-=*\s]*/i;
  const m=text.match(markerRegex);
  if(!m)return {main:text,details:''};
  const idx=m.index;
  return {main:text.slice(0,idx).trim(),details:text.slice(idx+m[0].length).trim()};
}

// v4.160: GeldbetrГӨge generisch nach Rollen klassifizieren und harte Fallzahlen vermeiden.
// Ziel: abschlussorientiert, aber nicht Гјberzogen. Kein "grГјnes Licht", solange keine
// ausdrГјckliche Beauftragung/Zusage vorliegt. Gilt zusГӨtzlich zum Prompt als harte Leitplanke.
function sanitizePhase5CloseTone(text){

  x=x.replace(/Deal\s+hat\s+gr[Гјu]nes\s+Licht\s*[вҖ“-]?\s*/gi,'Die Opportunity ist entscheidungsnah fГјr das Startangebot вҖ“ ');
  x=x.replace(/Deal\s+ist\s+entschieden/gi,'Die Opportunity ist entscheidungsnah');
  x=x.replace(/Abschluss\s+ist\s+sicher/gi,'Abschluss ist mГ¶glich, aber noch an die verbindliche Startentscheidung gebunden');
  x=x.replace(/formale\s+Freigabe\s+ist\s+kein(?:e)?\s+Blockade/gi,'formale Beauftragung ist der nГӨchste Schritt');
  x=x.replace(/nГӨchster\s+Schritt\s+ist\s+nicht\s+mehr\s+Гңberzeugung\s+sondern\s+StartfГӨhigkeit\s+klГӨren/gi,'nГӨchster Schritt ist nicht weitere GrundsatzklГӨrung, sondern Commitment, Startumfang und Beauftragung klГӨren');
  x=x.replace(/gr[Гјu]nes\s+Licht\s*[вҖ“-]?\s*Sponsor\s+best[ГӨa]tigt/gi,'entscheidungsnah вҖ“ Sponsor bestГӨtigt');
  // v4.157: konkrete Teilnehmerzahlen im Compact-Kickoff neutralisieren, wenn sie nicht sicher belegt sind.
  x=sanitizeInventedPrecisionText(state&&state.activeId?state.activeId:'',x,'phase5');

}

    } else if(rest.startsWith('KRITISCH:')){
      span.innerHTML=escHtml(prefix)+'<span style="font-size:9px;font-weight:700;background:rgba(248,81,73,.15);color:#f85149;border-radius:4px;padding:1px 6px;margin-right:6px;">KRITISCH</span>'+escHtml(rest.slice('KRITISCH:'.length));

    } else if(rest.startsWith('NICE-TO-HAVE:')){
      span.innerHTML=escHtml(prefix)+'<span style="font-size:9px;font-weight:700;background:rgba(46,160,67,.15);color:#2ea043;border-radius:4px;padding:1px 6px;margin-right:6px;">NICE-TO-HAVE</span>'+escHtml(rest.slice('NICE-TO-HAVE:'.length));
    } else if(/\b(BESTГ„TIGT|ARBEITSWERT|ZU VALIDIEREN|BRANCHENHYPOTHESE|ZU KLГ„REN)\b/.test(line)&&!line.startsWith('BESTГ„TIGT:')){
      span.innerHTML=highlightConfidenceWords(line);
    } else if(/\b(SPIN|Leitfragen)\b/i.test(line)||/^вҖў\s*[SPIN]:/.test(line)){
      span.innerHTML=colorOrangeMarkers(escHtml(line));
    } else {
      span.textContent=line;
    }
    div.appendChild(span);
    if(i<lines.length-1)div.appendChild(document.createElement('br'));
  });
  return div;
}
// Hebt die WГ¶rter "SPIN"/"Leitfragen" sowie fГјhrende S:/P:/I:/N:-Marker orange hervor вҖ”
// reine Darstellung des bereits generierten Texts, keine Г„nderung an Prompt/Inhalt.

  let out=escapedLine.replace(/\b(SPIN|Leitfragen)\b/gi,'<span style="color:#ff6b00;font-weight:800;">$1</span>');
  out=out.replace(/^(вҖў\s*)([SPIN]):/,'$1<span style="color:#ff6b00;font-weight:800;">$2:</span>');
  return out;
}

function getPhaseScoreInfo(sitId){
  if(!state.activeId)return {score:null,reason:''};
  const data=LS.get('ki21_st_'+state.activeId+'_'+sitId,null);
  if(!data||!data.result)return {score:null,reason:''};
  const matches=[...data.result.matchAll(/(\d+)\s*\/\s*10/g)];
  const m=matches.length?matches[0]:null;
  if(!m)return {score:null,reason:''};
  const score=parseInt(m[1]);
  if(score<1||score>10)return {score:null,reason:''};
  return {score,reason:extractBegruendung(data.result)};
}

function getPhaseStatus(sitId){
  if(!state.activeId)return 'empty';
  const data=LS.get('ki21_st_'+state.activeId+'_'+sitId,null);
  if(data&&data.result)return 'done';
  if(data&&data.fv&&Object.values(data.fv).some(v=>v&&v.trim&&v.trim()))return 'progress';
  return 'empty';
}

// Leitet einen echten Fortschritts-Prozentsatz aus den bereits vorhandenen Eingabefeldern
// (SITS[].felder, ohne post-Felder) ab. Keine erfundene Zahl вҖ” 0/100 fГјr leer/abgeschlossen.
function getPhaseProgressPct(sitId){
  const sit=SITS[sitId];
  if(!state.activeId||!sit)return 0;
  const data=LS.get('ki21_st_'+state.activeId+'_'+sitId,null);
  if(!data)return 0;
  if(data.result)return 100;
  const fields=(sit.felder||[]).filter(f=>!f.post);
  if(!fields.length)return 0;
  const filled=fields.filter(f=>data.fv&&data.fv[f.id]&&data.fv[f.id].trim&&data.fv[f.id].trim()).length;
  return Math.round((filled/fields.length)*100);
}

// Bottom Sheet: zeigt eine Liste von Items in einem von unten eingleitenden Panel.
// title: String, items: [{glyph, text, sub?}], emptyText: String
function showBottomSheet(title, items, emptyText){
  const overlay=document.createElement('div');
  overlay.className='bs-overlay';
  const panel=document.createElement('div');
  panel.className='bs-panel';
  if(String(title||'').toLowerCase().includes('fragen'))panel.classList.add('questions-sheet');

  const handle=document.createElement('div');
  handle.className='bs-handle';
  panel.appendChild(handle);

  const head=document.createElement('div');
  head.className='bs-head';
  const titleEl=document.createElement('div');
  titleEl.className='bs-title';
  titleEl.textContent=title;
  head.appendChild(titleEl);
  panel.appendChild(head);

  const body=document.createElement('div');
  body.className='bs-body';
  if(!items||!items.length){
    const e=document.createElement('div');
    e.className='bs-empty';
    e.textContent=emptyText||'Keine EintrГӨge vorhanden.';
    body.appendChild(e);
  } else {
    items.forEach((it,idx)=>{
      if(it.separator){
        const sep=document.createElement('div');
        sep.className='bs-separator';
        body.appendChild(sep);
        return;
      }
      const row=document.createElement('div');
      row.className='bs-row'+(it.priority?' bs-priority':'')+(it.onClick?' clickable':'');
      const g=document.createElement('span');
      g.className='bs-glyph';
      g.textContent=it.glyph||'вҖў';
      row.appendChild(g);
      const t=document.createElement('span');
      t.style.flex='1';
      if(it.caption){
        const cap=document.createElement('div');
        cap.className='bs-priority-caption';
        cap.textContent=it.caption;
        t.appendChild(cap);
      }
      const main=document.createElement('div');
      main.textContent=it.text;
      t.appendChild(main);
      row.appendChild(t);
      if(it.onClick){
        const arrow=document.createElement('span');
        arrow.className='bs-row-arrow';
        arrow.textContent='вҖә';
        row.appendChild(arrow);
        row.addEventListener('click',e=>{e.stopPropagation();close();it.onClick();});
      }
      body.appendChild(row);
    });
  }
  panel.appendChild(body);

  const close=()=>{
    overlay.classList.remove('visible');
    panel.classList.remove('visible');
    setTimeout(()=>{overlay.remove();panel.remove();},280);
  };
  overlay.addEventListener('click',close);

  // Swipe-down to dismiss
  let startY=0;
  panel.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;},{passive:true});
  panel.addEventListener('touchend',e=>{
    if(e.changedTouches[0].clientY-startY>60)close();
  },{passive:true});

  document.body.appendChild(overlay);
  document.body.appendChild(panel);
  requestAnimationFrame(()=>{overlay.classList.add('visible');panel.classList.add('visible');});
}

// Es wird bewusst NICHT zu einem exakten KI-Satz gesprungen, weil Phasentexte nach Regenerierung variieren.
// Stattdessen: passende Phase Г¶ffnen + klaren Cockpit-Arbeitsauftrag oben anzeigen.
function getCockpitWorkTarget(kind,text){
  const raw=String(text||'').trim();
  const t=raw.toLowerCase();
  let phaseId=0;
  let section='Passender Arbeitsbereich';
  let hint='Bearbeite diesen Punkt im Arbeitsbereich.';

  if(kind==='question'){
    phaseId=1;section='Discovery & Demo';hint='Nutze diese Frage im nГӨchsten Termin und dokumentiere die Antwort im Arbeitsbereich.';
  } else if(/business case|nutzen|roi|vermeidungsquote|wirtschaft|kennzahl|messbar|effekt|kosten|impact/.test(t)){
    phaseId=3;section='Nutzen / ROI';hint='Validiere hier wirtschaftlichen Nutzen, Kennzahlen und Belastbarkeit des Business Case.';
  } else if(/vertrags|vertrag|beschaffung|einkauf|angebot|abschluss|paper|freigabe|beauftragung/.test(t)){
    phaseId=4;section='Angebot';hint='KlГӨre hier Vertrags-, Beschaffungs- und Abschlussprozess.';
  } else if(/pilot|start|termin|nГӨchster schritt|nachbereitung|follow-up|verbindlich/.test(t)){
    phaseId=2;section='Nachbereitung';hint='KlГӨre hier den nГӨchsten verbindlichen Schritt und dokumentiere Zusagen.';
  } else if(/discovery|frage|informationen|nachqualifizierung|hubspot|notizen|e-mail|demo|zeigen|bedarf|schmerz/.test(t)){
    phaseId=1;section='Discovery & Demo';hint='KlГӨre hier Bedarf, Discovery-Fragen und Demo-Fokus.';
  } else if(/wettbewerb|mitbewerb|konkurrent|alternative|einwand/.test(t)){
    phaseId=4;section='Angebot';hint='Bearbeite hier Wettbewerbsrisiko, Einwandbehandlung und Abschlussstrategie.';
  } else if(/entscheider|entscheidungsbefugnis|budget|sponsor|champion|fГјrsprecher|qualifiz/.test(t)){
    phaseId=0;section='Qualifizierung';hint='PrГјfe hier Qualifizierung, Entscheiderstatus und zentrale Deal-Grundlagen.';
  }

  return {phaseId,section,text:raw,kind:kind||'cockpit',hint,ts:Date.now()};
}

        const ci=lines[i].indexOf(':');

    const warn=matrix.risks.slice(0,3);

    // Fragen: aus Phase 1 SPIN oder Phase 2 KLГ„REN

    const mkTile=(label,items,cls,emptyText,onTap,kind)=>{
      const tile=h('div',{className:'cockpit-tile',style:{cursor:'pointer'},onclick:onTap||null});

        items.forEach(it=>{

            onclick:(e)=>{e.stopPropagation();openCockpitWorkTarget(kind||cls||'cockpit',itemText);}},itemText);
          tile.appendChild(row);
        });
        const total=cls==='chance'?matrix.positive.length:
          cls==='risk'?matrix.risks.length:0;
        const visibleCount=items.length;
        if(total>visibleCount)tile.appendChild(h('div',{className:'cockpit-tile-more'},'+ '+(total-visibleCount)+' weitere'));

    };

    const allPos=matrix.positive.map(text=>({text}));
    const allWarn=matrix.risks.map(text=>({text}));
    const allOpen=matrix.open.map(text=>({text}));

    // "Die eine Sache": aus offenen Punkten oder Phase-Ergebnis
    let dieSache=allOpen.length?allOpen[0].text:(()=>{
      for(let i=4;i>=0;i--){
        const d=LS.get('ki21_st_'+aid+'_'+i,null);
        if(d&&d.result){const t=_extractSafe(d.result,'DIE EINE SACHE DIE FEHLT');if(t)return t;}
      }
      return null;
    })();
    dieSache=sanitizeDashboardTextForDecisionAuthority(aid,dieSache,'missing');

    const erkTile=mkTile('Erkenntnisse',pos,'chance','Noch keine Erkenntnisse',
      ()=>showBottomSheet('Wichtigste Erkenntnisse',
        allPos.map(s=>({glyph:'вң”',text:s.text,onClick:()=>openCockpitWorkTarget('chance',s.text)})),'Noch keine bestГӨtigten Erkenntnisse.'),'chance');
    const riskTile=mkTile('Risiken / Bremsen',warn.map(s=>String(s||'').replace(/вҶ’ Strategie:.*/,'').trim()),'risk','Keine Bremsfaktoren erkannt',
      ()=>showBottomSheet('GrГ¶Гҹte Risiken',
        allWarn.map(s=>{
          const t=s.text;const si=t.indexOf('вҶ’ Strategie:');
          return si>0?{glyph:'вҡ ',text:t.slice(0,si).trim(),sub:t.slice(si+2),onClick:()=>openCockpitWorkTarget('risk',t.slice(0,si).trim())}:{glyph:'вҡ ',text:t,onClick:()=>openCockpitWorkTarget('risk',t)};
        }),'Keine aktiven Risiken oder Bremsfaktoren.'),'risk');

    const dieSacheTile=h('div',{className:'cockpit-tile',style:{cursor:'pointer'},
      onclick:()=>{
        const sheetOpen=allOpen.map((s,idx)=>({
          glyph:idx===0?'1':'вҶ’',
          text:(idx===0?'Hauptblocker: ':'Danach klГӨren: ')+s.text,
          onClick:()=>openCockpitWorkTarget('open',s.text)
        }));
        showBottomSheet('Die eine Sache, die fehlt',sheetOpen,'Keine offenen Punkte.');
      }});
    dieSacheTile.appendChild(buildCockpitTileHeader('Die eine Sache, die fehlt'));
    dieSacheTile.appendChild(dieSache
      ? h('div',{className:'cockpit-tile-item is-actionable',onclick:(e)=>{e.stopPropagation();openCockpitWorkTarget('open',dieSache);}},dieSache)
      : h('div',{className:'cockpit-tile-empty'},'Noch nicht ermittelt'));

    const fragenTile=h('div',{className:'cockpit-tile',style:{cursor:'pointer'},
      onclick:()=>{
        // Alle Leitfragen aus Phase 2 / Phase 1 fГјr Bottom Sheet
        const allFragen=getDashboardQuestions(aid,12,false);
        const sheetItems=[];
        allFragen.forEach((q,idx)=>{
          const item={
            glyph:idx<3?String(idx+1):'?',
            text:normalizeQuestionText(q,false),
            priority:idx<3,
            caption:idx===0?'Wichtigste Fragen':'',
            onClick:()=>openCockpitWorkTarget('question',normalizeQuestionText(q,false))
          };
          if(idx===3)sheetItems.push({separator:true});
          sheetItems.push(item);
        });
        showBottomSheet('Fragen fГјr nГӨchsten Termin',
          sheetItems,
          'Leitfragen noch nicht generiert. Phase 1 durchfГјhren.');
      }});
    fragenTile.appendChild(buildCockpitTileHeader('Fragen fГјr nГӨchsten Termin'));
    if(!fragenItems.length){
      fragenTile.appendChild(h('div',{className:'cockpit-tile-empty'},'Leitfragen noch nicht generiert'));
    } else {
      fragenItems.forEach(q=>fragenTile.appendChild(h('div',{className:'cockpit-tile-item is-actionable',
        onclick:(e)=>{e.stopPropagation();openCockpitWorkTarget('question',q);}},q)));
    }

    grid.appendChild(erkTile);grid.appendChild(riskTile);
    grid.appendChild(dieSacheTile);grid.appendChild(fragenTile);

  const phaseNames=['Qualifizierung','Discovery & Demo','Nachbereitung','Nutzen / ROI','Angebot'];
  const phaseList=h('div',{className:'cockpit-phase-list'});
  phaseNames.forEach((name,i)=>{

}

// Aktualisiert Ring/Score/Label/Subline in der Hero-Card mit den bereits berechneten

function updateHomeHeroHealthVisual(){
  const scoreEl=document.getElementById('home-health-score');
  if(!scoreEl)return;
  const fillEl=document.getElementById('home-health-fill');
  const aid=LS.get('ki21_aid',null);
  const health=aid?getOpportunityHealth(aid):null;

  if(!health){
    scoreEl.textContent='вҖ“';
    if(fillEl){fillEl.style.width='0%';fillEl.style.background='var(--bg3)';}
    return;
  }
  const color=getHealthColor(health.score);
  scoreEl.textContent=String(health.score);
  scoreEl.style.color=color;
  if(fillEl){
    const pct=Math.max(0,Math.min(100,health.score));
    fillEl.style.width=pct+'%';
    fillEl.style.background=color;
  }
}

async function runAutopilot(){
  const cust=getActiveCust();
  const mu=LS.get('ki21_mu',{});
  const kk=LS.get('ki21_kk_'+state.activeId,'');
  const phaseNamesShort=['Qualifizierung','Bedarfsanalyse','Termin nachbereiten','Nutzen-Kosten-Analyse','Angebot & Abschluss'];

  const app=document.getElementById('app');
  app.innerHTML='';
  const progBox=h('div',{style:{padding:'20px 16px',maxWidth:'500px',margin:'0 auto'}});
  progBox.appendChild(h('div',{style:{fontSize:'15px',fontWeight:'800',marginBottom:'14px'}},
    'рҹ”Қ KI21 erstellt Ihre Opportunity-Vorschau'));
  const stepEls=[];
  for(let i=0;i<5;i++){
    const stepEl=h('div',{style:{fontSize:'13px',padding:'8px 0',color:'var(--text2)'}},
      'вҸі '+phaseNamesShort[i]);
    stepEls.push(stepEl);
    progBox.appendChild(stepEl);
  }
  app.appendChild(progBox);

  // Non-invasive: only READ Phase 1 (Qualifizierung) input fields, never write to real phase data
  const phase1Data=LS.get('ki21_st_'+state.activeId+'_0',{fv:{},result:''});
  const dossierResults=[];
  let prevResult='';

  for(let i=0;i<5;i++){
    const sit=SITS[i];
    // Build a synthetic field-value object for this phase, fed only by the chain of previous in-memory results
    let fv={};
    if(i===0){
      fv=phase1Data.fv||{};
    } else {
      const textFieldId=sit.felder.find(f=>f.t==='ta'&&!f.readonly);
      const ctxFieldId=sit.felder.find(f=>f.readonly);
      if(ctxFieldId)fv[ctxFieldId.id]=prevResult;
      if(textFieldId)fv[textFieldId.id]=prevResult;
      // For phases with additional fields (e.g. paket/budget in Phase 4/5), leave them empty -
      // the Opportunity-Vorschau prompt rules instruct the model to use BRANCHENHYPOTHESE for missing data.
    }

    const stk='';
    try{
      const prompt=sit.build(fv,cust,mu,kk,stk);
      const result=await callClaude(prompt,null);
      if(result){
        dossierResults.push({title:sit.title,result});
        prevResult=result;
        stepEls[i].textContent='вң“ '+phaseNamesShort[i];
        stepEls[i].style.color='#2ea043';
      } else {
        dossierResults.push({title:sit.title,result:'(Keine Antwort erhalten)'});
        stepEls[i].textContent='вҡ пёҸ '+phaseNamesShort[i]+' (fehlgeschlagen)';
        stepEls[i].style.color='#f85149';
      }
    }catch(e){
      dossierResults.push({title:sit.title,result:'(Fehler: '+e.message+')'});
      stepEls[i].textContent='вҡ пёҸ '+phaseNamesShort[i]+' (Fehler: '+e.message+')';
      stepEls[i].style.color='#f85149';
    }
  }

  progBox.appendChild(h('div',{style:{fontSize:'14px',fontWeight:'700',color:'#2ea043',marginTop:'16px'}},
    'вң… Opportunity-Vorschau erfolgreich erstellt.'));
  // Automatically download as PDF/HTML so the result is never lost
  exportAutopilotPDF(cust,dossierResults);
  progBox.appendChild(h('div',{style:{fontSize:'11px',color:'var(--text2)',marginTop:'6px'}},
    'рҹ“„ Vorschau wurde automatisch heruntergeladen.'));
  const showBtn=h('button',{className:'btn-o',style:{marginTop:'14px',width:'100%'},
    onclick:()=>showAutopilotDossier(cust,dossierResults)
  },'Vorschau ansehen вҶ’');
  progBox.appendChild(showBtn);
  // Keep results available for immediate PDF export without re-running
  state.lastAutopilotDossier={cust,dossierResults};
}

function transferAndGo(fromId, toId, result){
  // Direct transfer - output is already compact
  const nextKEY='ki21_st_'+state.activeId+'_'+toId;
  const nextData=LS.get(nextKEY,{fv:{},result:''});

  const fieldMap={
    1:{f1:'kontext'}
  };

  // Phase 1вҶ’2: isolierter SPIN-Generator
  // Kernidee: SPIN-Fragen werden NICHT aus dem Phase-1-Ergebnis extrahiert (das enthГӨlt
  // strategisches Messaging/Framing, das S-Fragen verfГӨlscht), sondern in einem zweiten,
  // kontextisolierten API-Call mit nur den nackten Kundenfakten neu erzeugt.
  if(fromId===0){
    const cust=getActiveCust();
    // Zeige sofort die Phase-2-Seite mit Ladezustand im spin-Feld
    nextData.fv['spin']='вҸі SPIN-Fragen werden isoliert generiert...';
    LS.set(nextKEY,nextData);
    state.pendingSit=null;
    renderStation(toId);

    // Isolierter Kontext: NUR nackte Kundenfakten вҖ” bewusst KEIN buildCtx(), kein kk/stk,
    // kein Ergebnis aus Phase 1, damit kein Messaging/Strategie-Framing einfliesst.
    const forecastAllowed=isForecastValueLeverAllowed(state.activeId);
    const isolatedCtx=`Firma: ${cust.firma||'вҖ“'}
Branche: ${cust.branche||'вҖ“'}
Mitarbeiter: ${cust.ma||'вҖ“'}
Ansprechpartner: ${cust.ap||'вҖ“'}
Umsatz: ${cust.um||'вҖ“'}
Forecast-Fragen zulГӨssig: ${forecastAllowed?'JA вҖ“ wenn ein sachlicher Qualifizierungs-/Pipeline-Anker vorhanden ist':'NEIN вҖ“ Forecast nicht kГјnstlich einbauen'}`;

    const spinPrompt=`Du bist ein SPIN-Selling-Experte. Deine einzige Aufgabe: Generiere methodisch korrekte SPIN-Fragen fГјr das nГӨchste KundengesprГӨch.

STRIKTE METHODENREGEL вҖ“ KEINE AUSNAHMEN:
S (SITUATION): Sammle nur Fakten zum Ist-Zustand. Frage nach Prozessen, Systemen, Rollen, Zahlen. NIEMALS nach Meinungen, Zielen, WГјnschen oder Strategien.
  вң… "Wie lГӨuft heute die Angebotserstellung konkret ab?"
  вң… "Welche Systeme nutzt Ihr AuГҹendienst?"
  вқҢ "Wo sehen Sie die grГ¶Гҹten Hebel?" (Meinung, kein Fakt)

  async function generate(){
    if(!cust.firma){alert('Bitte zuerst einen Kunden wГӨhlen.');return;}

    genBtn.textContent='вҸі KI21 antwortet...';
