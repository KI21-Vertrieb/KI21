function getCockpitDeepCaseCardsAnalysisV4257(raw,aid){
  const clean=(x)=>String((x&&x.text)||x||'').replace(/^[-•\s]+/,'').trim();
  const all=[];
  try{
    ['positive','warning','open'].forEach(k=>{
      const arr=Array.isArray(raw&&raw[k])?raw[k]:[];
      arr.forEach(x=>{const t=clean(x);if(t)all.push(t);});
    });
  }catch(e){}
  const low=all.join(' \n ').toLowerCase();
  const aid2=aid||LS.get('ki21_aid',null);
  const phase5=aid2?LS.get('ki21_st_'+aid2+'_4',{}):{};
  const fv5=(phase5&&phase5.fv)||{};
  const mu=LS.get('ki21_mu',{})||{};
  const offerText=[fv5.paket,fv5.budget,fv5.minimum,mu.bausteine].filter(Boolean).join(' ');
  const hay=(low+'\n'+String(offerText||'').toLowerCase());
  const has=(re)=>re.test(hay);
  const short=(t,max=132)=>{
    t=String(t||'').replace(/\s+/g,' ').trim();
    if(t.length<=max)return t;
    const cut=t.lastIndexOf(' ',max-1);
    return t.substring(0,cut>25?cut:max-1).trim()+'…';
  };
  const add=(arr,text,insight=false)=>{
    text=short(text);
    if(!text||arr.some(p=>String((p&&p.text)||p)===text))return;
    arr.push({text,insight:!!insight});
  };
  let painSummary={sum:0,filled:[],rows:[]};
  try{painSummary=getImplicationSummaryV4246(aid2)||painSummary;}catch(e){}

  // 1) SCHMERZANALYSE: bestätigte Ursache, Auswirkung, Quantifizierungsgrad.
  const pain=[];
  if(has(/großkunde|audit|lieferantenreview|review|anforder|q3|deadline/))
    add(pain,'Externer Handlungsdruck: Nachweise werden bis Ende Q3 verlangt.',false);
  if(has(/patch|backup|m365|alert|nicht\s+(systematisch|zentral)|anlassbezogen/))
    add(pain,'Ursache: Sicherheitsnachweise werden heute nicht systematisch erzeugt.',false);
  if(has(/rückfragen|anfragen|personen|tage|manuell|zusammengesucht/))
    add(pain,'Operative Auswirkung: Rückfragen binden mehrere Personentage.',false);
  if(has(/ausgelastet|security\s+läuft\s+nebenbei|nebenbei/))
    add(pain,'Verstärker: Security konkurriert mit dem operativen IT-Tagesgeschäft.',true);
  if(has(/12\s*%|umsatz/))
    add(pain,'Geschäftliche Relevanz ist hoch; ein Umsatzverlust ist jedoch nicht bestätigt.',true);
  if(!pain.length)add(pain,'Schmerz noch nicht belastbar genug bestätigt.',false);
  const painHead=painSummary.sum>0?'Schmerz bestätigt und beziffert':(pain.length>=3?'Schmerz bestätigt, noch nicht beziffert':'Schmerz noch validieren');
  const painEvidence=painSummary.sum>0
    ? 'Quantifizierungsgrad: '+painSummary.filled.length+' Position(en), zusammen '+formatMonthlyEffectV4240(painSummary.sum)+'.'
    : 'Quantifizierungsgrad: offen – wirtschaftliche Auswirkung in Phase 2 beziffern.';

  // 2) NUTZENANALYSE: welche bestätigten Schmerzen werden durch das aktuelle Angebot adressiert?
  const value=[];
  if(has(/rückfragen|anfragen|manuell|zusammengesucht|nachweis/))
    add(value,'Manuelle Nachweisarbeit → standardisierte Nachweise reduzieren Rechercheaufwand.',true);
  if(has(/patch|backup|m365|risiko|alert/))
    add(value,'Unsystematische Sicherheitsprüfung → Risiken werden priorisiert und sichtbar.',true);
  if(has(/geschäftsführung|management[-\s]?(bericht|report)|überblick/))
    add(value,'Fehlender Management-Überblick → belastbare Entscheidungsgrundlage für GF/CFO.',true);
  if(has(/review|audit|großkunde|lieferantenreview|q3/))
    add(value,'Reviewdruck → Großkundenanforderung kann professionell beantwortet werden.',true);
  if(has(/entlast|ausgelastet|security\s+läuft\s+nebenbei/))
    add(value,'Überlastete IT → operative Entlastung ohne Kontrollwirkung.',true);
  if(!value.length)add(value,'Nutzen noch nicht sauber an bestätigte Schmerzen gekoppelt.',false);
  const valueHead=painSummary.sum>0?'Nutzen plausibel, Realisierung noch validieren':'Nutzenhebel erkannt, wirtschaftliche Wirkung offen';
  const valueEvidence=painSummary.sum>0
    ? 'Ausgangspunkt: '+formatMonthlyEffectV4240(painSummary.sum)+' bezifferter Schmerz; reduzierbarer Anteil noch zu bestätigen.'
    : 'Nutzen ist qualitativ erkennbar, aber noch nicht wirtschaftlich beziffert.';

  // 3) BUSINESS CASE: Schmerz, Angebot, offene Annahme und Entscheidungsstatus verbinden.
  const bc=[];
  if(has(/quick\s*check|4\.?900|4900/))add(bc,'Aktuelles Angebot: Security Quick Check 4.900 € einmalig.',false);
  if(has(/cfo|budget|entscheidbar|freigabe/))add(bc,'Freigabe für den Quick Check ist kurzfristig grundsätzlich möglich.',false);
  if(has(/managed\s*security|2\.?800|2800|folgeoption|nicht\s+freigegeben/))add(bc,'Managed Security 2.800 €/Monat bleibt eine separate Folgeoption.',true);
  if(painSummary.sum>0)add(bc,'Offene Kernannahme: Welcher Anteil des bezifferten Schmerzes wird tatsächlich reduziert?',true);
  else add(bc,'Offene Kernannahme: wirtschaftliche Auswirkung des Problems fehlt.',true);
  if(has(/12\s*%|umsatz/))add(bc,'12 % Umsatzanteil erhöht die Relevanz, ist aber kein Verlustbeleg.',true);
  const bcHead=painSummary.sum>0?'Business Case teilquantifiziert':'Business Case qualitativ plausibel';
  const bcEvidence=painSummary.sum>0
    ? 'Schmerz beziffert; Nutzenrealisierung und Folgeangebot noch nicht bestätigt.'
    : 'Angebot und Relevanz sind erkennbar; bezifferter Schmerz fehlt noch.';

  return [
    {cls:'pain',label:'Schmerzanalyse',headline:painHead,evidence:painEvidence,points:pain,note:'Analyse: Was ist bestätigt, was verstärkt den Schmerz und wie weit ist er quantifiziert?'},
    {cls:'value',label:'Nutzenanalyse',headline:valueHead,evidence:valueEvidence,points:value,note:'Analyse: Welcher bestätigte Schmerz wird durch welchen Nutzenhebel reduziert?'},
    {cls:'case',label:'Business Case',headline:bcHead,evidence:bcEvidence,points:bc,note:'Analyse: Welche wirtschaftliche Annahme trägt die Entscheidung – und was ist noch offen?'}
  ];
}


function parseMonthlyEffectV4240(v){
  let s=String(v||'').trim();
  if(!s)return 0;
  s=s.replace(/€/g,'').replace(/eur/ig,'').replace(/pro\s*monat/ig,'').replace(/\/\s*monat/ig,'').replace(/monatlich/ig,'').replace(/\s/g,'');
  const hasK=/k$/i.test(s); s=s.replace(/k$/i,'');
  if(/,\d{1,2}$/.test(s))s=s.replace(/\./g,'').replace(',','.');
  else s=s.replace(/[.,]/g,'');
  let n=parseFloat(s);
  if(!isFinite(n)||n<=0)return 0;
  if(hasK)n*=1000;
  return Math.round(n);
}
function formatMonthlyEffectV4240(n){return Number(n||0).toLocaleString('de-DE')+' €/Monat';}
function getEconomicEffectKeyV4240(aid){return 'ki21_economic_effects_v4240_'+(aid||'global');}

function inferEconomicEffectRowsV4240(deepCase){
  const rows=[];
  const add=(id,label,benchmark,unit)=>{
    if(rows.some(r=>r.id===id))return;
    rows.push({id,label,amount:'',benchmark:benchmark||'',unit:unit||'',orientation:''});
  };
  let all='';
  try{all=(deepCase||[]).map(c=>[c.headline,c.evidence].concat((c.points||[]).map(p=>p&&p.text||p)).join(' ')).join('\n').toLowerCase();}catch(e){}
  if(/rückfragen|anfragen|manuell|zusammengesucht|personen|tage|aufwand|nachweise/.test(all)){
    add('manual_evidence','Manuelle Nachweise / Rückfragen','','');
  }
  if(/großkunde|review|audit|lieferantenreview|12\s*%|umsatz|eskalation|negative bewertung/.test(all)){
    const orient=/12\s*%|umsatz/.test(all)?'Großkunde steht für 12 % Jahresumsatz. Das ist wirtschaftliche Relevanz, aber kein Monatswert und kein Verlustbeleg.':'';
    add('customer_review','Eskalationsrisiko Großkundenreview',orient,orient?'Umsatzanteil / Relevanz':'');
  }
  if(/ausfall|datenpanne|security|backup|m365|patch|risiko/.test(all)){
    add('security_risk','IT-/Security-Risiko','','');
  }
  if(!rows.length)add('economic_effect','Schmerz','','');
  return rows;
}
function loadEconomicEffectsV4240(aid,deepCase){
  const key=getEconomicEffectKeyV4240(aid);
  let saved=LS.get(key,null);
  const deleted=LS.get(getEconomicDeletedKeyV4241(aid),[]);
  const inferred=inferEconomicEffectRowsV4240(deepCase).filter(r=>!deleted.includes(r.id));
  if(!Array.isArray(saved)||!saved.length){saved=inferred;LS.set(key,saved);return saved;}
  inferred.forEach(r=>{if(!saved.some(x=>x&&x.id===r.id))saved.push(r);});
  // alte Zeilen kompatibel halten
  saved=saved.filter(r=>r&&r.id&&!deleted.includes(r.id)).map(r=>Object.assign({orientation:''},r));
  LS.set(key,saved);
  return saved;
}
function saveEconomicEffectsV4240(aid,rows){LS.set(getEconomicEffectKeyV4240(aid),rows||[]);}
function deleteEconomicEffectV4241(aid,rows,idx){
  const r=rows[idx];
  if(!r)return;
  if(!String(r.id||'').startsWith('custom_')){
    const key=getEconomicDeletedKeyV4241(aid);
    const deleted=LS.get(key,[]);
    if(!deleted.includes(r.id))deleted.push(r.id);
    LS.set(key,deleted);
  }
  rows.splice(idx,1);
  saveEconomicEffectsV4240(aid,rows);
  refreshEconomicAreaV4245();
}
function getEconomicSummaryV4240(rows){
  rows=Array.isArray(rows)?rows:[];
  const filled=rows.filter(r=>parseMonthlyEffectV4240(r&&r.amount)>0);
  const open=rows.filter(r=>!parseMonthlyEffectV4240(r&&r.amount));
  const benchmarks=open.filter(r=>String(r&&r.benchmark||'').trim());
  const sum=filled.reduce((a,r)=>a+parseMonthlyEffectV4240(r.amount),0);
  let status='nicht quantifiziert';
  if(filled.length&&open.length)status='teilquantifiziert';
  else if(filled.length&&!open.length)status='belastbar quantifiziert';
  return {sum,filled,open,benchmarks,status};
}

function compactEconomicOrientationV4242(text){
  let raw=String(text||'').trim();
  if(!raw)return 'Kein Monatswert geschätzt – belastbarer Vergleichswert fehlt.';
  if(/Kein Monatswert geschätzt/i.test(raw))return 'Kein Monatswert geschätzt – belastbarer Vergleichswert fehlt.';
  let lines=raw.split(/\n+/).map(s=>s.trim()).filter(Boolean);
  lines=lines.filter(s=>!/^(einheit|nicht eingerechnet|monatlicher effekt|monatswert|quelle)\s*:/i.test(s));
  lines=lines.map(s=>s.replace(/^[-•]\s*/,'').replace(/^Orientierung\s*:/i,'Hinweis:').trim());
  // Angebotstexte konsequent entfernen: Dieser Bereich dient der Zahlenableitung, nicht der Nutzenargumentation.
  lines=lines.filter(s=>!/(quick\s*check|secura\w*|angebot|management[-\s]?report|liefert|deckt|vorbereitung|priorisierte\s+risiken)/i.test(s) || /(tagessatz|personentag|downtime|€\/stunde|pro\s+stunde|umsatzanteil|vertragsrisiko|eintrittswahrscheinlichkeit|häufigkeit)/i.test(s));
  const valued=lines.filter(s=>/\d|€|eur|pro\s+(stunde|tag|vorfall|monat|quartal|jahr|person)|downtime|ausfall|umsatz|personentage|tagessatz|vertragsrisiko|eintrittswahrscheinlichkeit|häufigkeit|vergleich|benchmark|bitkom|ibm|allianz|kosten/i.test(s));
  if(valued.length)lines=valued;
  let out=(lines[0]||'').trim();
  if(!out)return 'Kein Monatswert geschätzt – belastbarer Vergleichswert fehlt.';
  if(!/^Hinweis:/i.test(out))out='Hinweis: '+out;
  out=out.replace(/\s*Nicht eingerechnet\s*:.*/i,'').replace(/\s*Einheit\s*:.*/i,'').replace(/\s*Quelle\s*:.*/i,'').trim();
  if(out.length>230){
    out=out.slice(0,230).replace(/\s+\S*$/,'').trim()+'.';
  }
  return out||'Kein Monatswert geschätzt – belastbarer Vergleichswert fehlt.';
}

function normalizeMoneyNumberV4248(v){
  let s=String(v||'').trim();
  if(!s)return 0;
  s=s.replace(/€/g,'').replace(/\beuro\b/ig,'').replace(/\beur\b/ig,'');
  s=s.replace(/pro\s*monat/ig,'').replace(/\/\s*monat/ig,'').replace(/monatlich/ig,'').replace(/monatl\.?/ig,'').replace(/mtl\.?/ig,'').replace(/p\.?\s*m\.?/ig,'');
  s=s.replace(/[^0-9.,kK]/g,'');
  if(!s)return 0;
  const hasK=/k$/i.test(s); s=s.replace(/k$/i,'');
  // 3.000,50 -> 3000.50 | 3,000.50 -> 3000.50 | 3000,50 -> 3000.50 | 3.000 -> 3000
  if(/,\d{1,2}$/.test(s))s=s.replace(/\./g,'').replace(',','.');
  else if(/\.\d{1,2}$/.test(s) && /,/.test(s))s=s.replace(/,/g,'');
  else s=s.replace(/[.,]/g,'');
  let n=parseFloat(s);
  if(!isFinite(n)||n<=0)return 0;
  if(hasK)n*=1000;
  return Math.round(n);
}

      if(has(/report|management|scope|quick check/))score+=45;
    }else if(kind==='open'){
      if(has(/geschäftsführung|cfo|freigabe|entscheider/))score+=80;
    }
    return score;
  };
  const sortCockpitItems=(arr,kind)=>arr.map((t,i)=>({t,i,s:rankCockpitItem(t,kind)})).sort((a,b)=>(b.s-a.s)||(a.i-b.i)).map(x=>x.t);

  // v4.262: Cockpit verdichtet Fakten zu wenigen vertrieblichen Aussagen.
  // Eine Ableitung wird nur erzeugt, wenn beide nötigen Signale im gespeicherten Snapshot vorkommen.
  const textListV4262=(arr)=>(arr||[]).map(clean).filter(Boolean);
  const findSignalV4262=(arr,re)=>textListV4262(arr).find(t=>re.test(t))||'';
  const uniquePushV4262=(arr,item)=>{
    const text=clean(item&&typeof item==='object'?item.text:item);
    if(!text)return;
    if(arr.some(x=>clean(x&&typeof x==='object'?x.text:x).toLowerCase()===text.toLowerCase()))return;
    arr.push(item&&typeof item==='object'?item:text);
  };
  const buildExecutiveInsightsV4262=(items)=>{
    const facts=textListV4262(items);
    const budget=findSignalV4262(facts,/budget|freigabe|entscheidbar|startangebot|quick\s*check/i);
    const trigger=findSignalV4262(facts,/großkunde|deadline|q3|audit|anforder|externer\s+trigger|frist/i);
    const relevance=findSignalV4262(facts,/\b\d{1,2}\s*%|umsatz|strategisch\s+relevant|geschäftlich\s+relevant/i);
    const out=[];
    if(budget&&trigger){
      uniquePushV4262(out,{text:'Externer Handlungsdruck und freigegebenes Startbudget schaffen eine konkrete Einstiegschance.',ki21:true,executive:true});
    }else if(trigger&&relevance){
      uniquePushV4262(out,{text:'Externer Handlungsdruck trifft auf eine geschäftlich relevante Kundenbeziehung.',ki21:true,executive:true});
    }
    sortCockpitItems(facts,'insight').forEach(t=>uniquePushV4262(out,t));
    return out;
  };
  const buildExecutiveRisksV4262=(items)=>{
    const facts=textListV4262(items);
    const decision=findSignalV4262(facts,/geschäftsführung|\bgf\b|cfo|entscheider|freigabe|formal\s+eingekoppelt|projekt[-\s]?priorität/i);
    const follow=findSignalV4262(facts,/managed\s*security|folgeoption|laufend|monat|2\.?800|budget.*offen/i);
    const evidence=findSignalV4262(facts,/schrift|audit[-\s]?katalog|anforderung.*nicht|deadline.*offen/i);
    const out=[];
    if(decision){
      uniquePushV4262(out,{text:'Die Opportunity kann sich verzögern, solange die wirtschaftlichen Entscheider nicht verbindlich eingebunden sind.',ki21:true,executive:true});
    }
    if(follow){
      uniquePushV4262(out,{text:'Die Folgeoption ist wirtschaftlich noch nicht freigegeben und darf den aktuellen Einstieg nicht belasten.',ki21:true,executive:true});
    }
    if(evidence)uniquePushV4262(out,evidence);
    sortCockpitItems(facts,'risk').forEach(t=>uniquePushV4262(out,t));
    return out;
  };
  const makeActionV4262=(text)=>{
    let t=clean(text).replace(/[.;]+$/,'').trim();
    if(!t)return '';
    if(/^(bitte\s+)?(?:einholen|anfordern|bestätigen|klären|vereinbaren|vorbereiten|finalisieren|abstimmen|prüfen|festlegen|fragen|terminieren)\b/i.test(t))return t.charAt(0).toUpperCase()+t.slice(1)+'.';
    if(/exakte\s+deadline/i.test(t)&&/schrift|audit|katalog|großkunde/i.test(t))return 'Exakte Deadline und Audit-Katalog beim Großkunden schriftlich bestätigen.';
    if(/gf\/cfo|cfo\/gf|geschäftsführung/i.test(t)&&/termin|entscheidung|priorität/i.test(t))return 'Entscheidungstermin mit GF/CFO vereinbaren.';
    if(/schriftliche?\s+anforder/i.test(t))return 'Schriftliche Kundenanforderung einholen.';
    if(/quick\s*check/i.test(t)&&/scope|umfang|final/i.test(t))return 'Quick-Check-Umfang finalisieren.';
    if(/wer\s+erteilt|wer\s+entscheidet|formal.*freigabe/i.test(t))return 'Formale Freigabe klären.';
    return t+'.';
  };
  const header=h('div',{className:'cockpit-header'},
    h('div',{className:'cockpit-header-left'},
      h('button',{type:'button',className:'cockpit-brand ki21-logo-left',style:{background:'none',border:'0',padding:'0',cursor:'pointer'},onclick:()=>renderHomeLiteV4211()},'KI','21'),
      cust.firma?h('button',{type:'button',className:'cockpit-opp-name cockpit-opp-link',onclick:showKunde},cust.firma):h('button',{type:'button',className:'cockpit-opp-placeholder cockpit-opp-link',onclick:showKunde},'Opportunity wählen →')
    ),
    h('div',{className:'cockpit-header-right'},
      renderScoreBadgeV4224(''),
      h('button',{className:'btn',onclick:showSettings},'⚙')
    )
  );
  const wrap=h('div',{className:'wrap cockpit-one-screen'});
  wrap.appendChild(buildModeTabsV4224('cockpit'));
  const cockpitNextText=raw?getCockpitNextStepV4224(raw):'';
  wrap.appendChild(h('div',{className:'cockpit-core-action-row'},
    h('button',{className:'cockpit-btn-primary',onclick:()=>{if(!aid)return;const a=(state.accounts||[]).find(x=>x.id===aid);if(a)showNeuerKunde(a.cust,a.id,'kontext');}},'＋ Ergänzung')
  ));
  // v4.237: große Vertiefungskacheln liegen bewusst unter den vier Cockpit-Kacheln und werden erst beim Scrollen sichtbar.
  let deepCase=[];
  try{
    deepCase=getCockpitDeepCaseCardsAnalysisV4257(raw,aid);
  }catch(e){
    try{deepCase=getCockpitDeepCaseCardsV4238(raw,aid);}catch(_){deepCase=[];}
  }
  const savingsSummaryV4252=(()=>{try{return getImplicationSummaryV4246(aid);}catch(e){return null;}})();
  const valueTileItemsV4252=[];
  if(savingsSummaryV4252&&savingsSummaryV4252.sum>0){
    valueTileItemsV4252.push({text:'Bezifferter Schmerz: '+formatMonthlyEffectV4240(savingsSummaryV4252.sum),highlight:true});
  }
  try{
    const valueCard=(deepCase||[]).find(c=>c&&String(c.label||'').toLowerCase().indexOf('nutzen')>=0);
    ((valueCard&&valueCard.points)||[]).forEach(p=>{
      const t=clean((p&&p.text)||p);
      if(t&&!valueTileItemsV4252.some(x=>String((x&&x.text)||x)===t))valueTileItemsV4252.push(t);
    });
  }catch(e){}

  const grid=h('div',{className:'cockpit-grid'});
  const mkTile=(label,items,empty,kind,maxItems)=>{
    const normalized=(items||[]).map((it,i)=>{
      const rawText=(it&&typeof it==='object'&&('text' in it))?it.text:it;
      const text=clean(rawText);
      const highlight=!!(it&&typeof it==='object'&&it.highlight)||/Bezifferter?\s+Schmerz/i.test(String(rawText||''));
      return {text,highlight,ki21:!!(it&&typeof it==='object'&&it.ki21)||(kind==='next'?false:isKi21DashboardInsight(text,kind||'cockpit')),executive:!!(it&&typeof it==='object'&&it.executive),idx:i};
    }).filter(x=>x.text);
    const sorted=(kind==='value')?normalized:sortCockpitItems(normalized.map(x=>x.text),kind||'cockpit').map((t,i)=>{
      const original=normalized.find(x=>x.text===t)||{};
      const highlight=!!original.highlight||/Bezifferter?\s+Schmerz/i.test(String(t||''));
      return {text:t,highlight,ki21:!!original.ki21||(kind==='next'?false:isKi21DashboardInsight(t,kind||'cockpit')),executive:!!original.executive,idx:i};
    });
    const all=sorted;
    const openList=()=>{
      const rows=all.map(x=>{
        const t=x.text;
        return {glyph:x.ki21?'●':'•',text:t,kind:x.ki21?'ki21':'',onClick:()=>openCockpitWorkTarget(kind||'cockpit',t)};
      });
      showBottomSheet(label,rows,empty);
    };
    const tile=h('div',{className:'cockpit-tile cockpit-tile-linked'});
    tile.appendChild(buildCockpitTileHeader(label,openList));
    const arr=all.slice(0,maxItems||4);
    if(arr.length)arr.forEach(x=>{
      const t=x.text;
      const cls='cockpit-tile-item cockpit-tile-link'+(x.ki21?' cockpit-ki21-inline':'')+(x.executive?' cockpit-executive-insight':'')+(x.highlight?' cockpit-savings-inline':'')+((kind==='next'&&x.idx===0)?' cockpit-next-primary':'');
      const item=h('button',{type:'button',className:cls,onclick:(e)=>{e.preventDefault();e.stopPropagation();openCockpitWorkTarget(kind||'cockpit',t);}},t);
      tile.appendChild(item);
    });
    else tile.appendChild(h('div',{className:'cockpit-empty'},empty));
    if(all.length>arr.length) tile.appendChild(h('button',{type:'button',className:'cockpit-tile-more cockpit-tile-more-btn',onclick:(e)=>{e.preventDefault();e.stopPropagation();openList();}},'+'+(all.length-arr.length)+' weitere'));
    return tile;
  };
  const executiveInsightsV4262=buildExecutiveInsightsV4262(pos.filter(x=>!isOperationalPainDetailV4261(clean(x))));
  const executiveRisksV4262=buildExecutiveRisksV4262(warn);
  grid.appendChild(mkTile('Erkenntnisse',executiveInsightsV4262,'Noch keine gespeicherten Erkenntnisse.','insight',3));
  grid.appendChild(mkTile('Risiken / Bremsen',executiveRisksV4262,'Noch keine gespeicherten Risiken.','risk',3));
  grid.appendChild(mkTile('Nutzen / Potenzial',valueTileItemsV4252,'Nutzen und Potenzial noch nicht belegt.','value',3));
  const nextStepItemsV4262=[];
  [cockpitNextText].concat(open.map(clean)).forEach(t=>{const x=makeActionV4262(t);if(x&&!nextStepItemsV4262.some(y=>y.toLowerCase()===x.toLowerCase()))nextStepItemsV4262.push(x);});
  grid.appendChild(mkTile('Nächste Schritte',nextStepItemsV4262,'Noch keine nächsten Schritte gespeichert.','next',3));
  wrap.appendChild(grid);
  // v4.260: redundante Vertiefungskacheln entfernt; alle relevanten Inhalte stehen in den vier Kernkacheln.
  // v4.245: Cockpit zeigt nur Business-Case-Zusammenfassung; Erfassung erfolgt in Phase 2 bei den Implikationen.
  // v4.233 UI Cleanup: untere Zusatznavigation entfernt; Phasenwechsel über oberen Tab.
  wrap.appendChild(h('div',{className:'tagline'},'v4.262 Executive Briefing'));
  app.appendChild(header);
  app.appendChild(wrap);
  LS.set('ki21_view','cockpit-lite');
}

function renderHome(){

      cust.firma
        ? h('button',{type:'button',className:'cockpit-opp-name cockpit-opp-link',onclick:showKunde},cust.firma)
        : h('button',{type:'button',className:'cockpit-opp-placeholder cockpit-opp-link',onclick:showKunde},'Opportunity wählen →')
    ),

      h('button',{className:'btn',onclick:showSettings},'⚙')
    )
  );

  const wrap=h('div',{className:'wrap'});

  // ── 2. NÄCHSTER SCHRITT KARTE ────────────────────────────────────
  // Quelle: health.open[0] als "Die eine Sache" → nächster Schritt aus Phase-Ergebnissen
  // Nächster Schritt — sicher formuliert falls extractAfterHeader noch nicht definiert
  const _extractSafe=(text,header)=>{
    if(typeof extractAfterHeader==='function')return extractAfterHeader(text,header);
    // Inline-Fallback
    const lines=(text||'').split('\n');
    for(let i=0;i<lines.length;i++){
      if(lines[i].toUpperCase().includes(header.toUpperCase())){
        const ci=lines[i].indexOf(':');
        if(ci!==-1&&lines[i].slice(ci+1).trim())return lines[i].slice(ci+1).trim();
        for(let j=i+1;j<lines.length;j++){if(!lines[j].trim())break;return lines[j].trim();}
      }
    }
    return '';
  };
  let naechsterSchrittText=(()=>{
    for(let i=4;i>=0;i--){
      const d=LS.get('ki21_st_'+aid+'_'+i,null);
      if(d&&d.result){
        const line=_extractSafe(d.result,'NÄCHSTER SCHRITT DIESE WOCHE');
        if(line)return line;
      }
    }
    return null;
  })();
  naechsterSchrittText=sanitizeDashboardTextForDecisionAuthority(aid,naechsterSchrittText,'nextStep');
  naechsterSchrittText=cleanEarlyPhaseCockpitText(aid,naechsterSchrittText,'nextStep');

  const erkenntnisBtn=h('button',{className:'cockpit-btn-primary',onclick:()=>{
    if(!aid)return;
    const acc=state.accounts.find(a=>a.id===aid);
    if(acc)showNeuerKunde(acc.cust,acc.id,'kontext');
  }},'＋ Erkenntnis');

  const smartPending=aid?LS.get('ki21_smart_pending_'+aid,null):null;
  const updateBtn=h('button',{
    className:'cockpit-btn-secondary',
    style:{display:(hasPending&&smartPending)?'block':'none'},
    onclick:async()=>{
      if(!aid||!smartPending)return;
      updateBtn.disabled=true;
      const areas=smartPending.areas||[];
      updateBtn.textContent='⏳ Wird aktualisiert...';

      const phase1Affected=areas.some(a=>a.id===0);
      const spinAffected=areas.some(a=>a.id==='spin');
      const otherPhases=areas.filter(a=>typeof a.id==='number'&&a.id!==0);

      // Phase 1 zuerst (SPIN hängt davon ab), dann parallel
      if(phase1Affected){
        const KEY='ki21_st_'+aid+'_0';
        const d=LS.get(KEY,null);
        if(d){
          const fv=d.fv||{};const mu2=LS.get('ki21_mu',{});const kk2=buildKkForSitId(aid,0);
          try{
            updateBtn.textContent='⏳ Qualifizierung...';
            const result=await callClaude(SITS[0].build(fv,cust,mu2,kk2,''),null);
            if(result){d.result=result;d.generatedAt=Date.now();LS.set(KEY,d);}
            await savePhaseSnapshot(aid,0);
          }catch(e){}
        }
        // SPIN nach Phase 1
        if(spinAffected){
          updateBtn.textContent='⏳ SPIN-Fragen...';
          const d1=LS.get('ki21_st_'+aid+'_0',null);
          if(d1&&d1.result)await transferAndGo(0,1,d1.result,aid);
        }
      }

      // Restliche Phasen parallel
      if(otherPhases.length){
        updateBtn.textContent='⏳ '+(otherPhases.length)+' Bereiche parallel...';
        await Promise.all(otherPhases.map(async a=>{
          const i=a.id;
          const KEY='ki21_st_'+aid+'_'+i;
          const d=LS.get(KEY,null);
          if(!d)return;
          const fv=d.fv||{};const mu2=LS.get('ki21_mu',{});const kk2=buildKkForSitId(aid,i);
          try{
            const result=await callClaude(SITS[i].build(fv,cust,mu2,kk2,''),null);
            if(result){d.result=result;d.generatedAt=Date.now();LS.set(KEY,d);}
            await savePhaseSnapshot(aid,i);
          }catch(e){}
        }));
      }

      await refreshOpportunityHealth(aid);
      LS.set('ki21_pending_'+aid,false);
      LS.set('ki21_smart_pending_'+aid,null);
      renderHome();
    }
  });
  // Button-Label mit Bereichsnamen
  if(smartPending&&smartPending.areas){

    updateBtn.textContent='● '+smartPending.areas.length+' Bereiche aktualisieren: '+names;
  } else {

  const btnRow=h('div',{className:'cockpit-core-action-row'});

  if(hasPending)btnRow.appendChild(updateBtn);
  wrap.appendChild(btnRow);

  // ── 3. VIER COCKPIT-KACHELN 2×2 ─────────────────────────────────
  if(cust.firma&&health){

        }),'Keine aktiven Risiken oder Bremsfaktoren.'),'risk');

    const dieSacheTile=h('div',{className:'cockpit-tile',style:{cursor:'pointer'},

    }catch(e){}
    try{
      const valueCard=(deepCaseV4260||[]).find(c=>c&&String(c.label||'').toLowerCase().indexOf('nutzen')>=0);
      ((valueCard&&valueCard.points)||[]).forEach(p=>{const t=String((p&&p.text)||p||'').trim();if(t&&!valueItemsV4260.some(x=>x.toLowerCase()===t.toLowerCase()))valueItemsV4260.push(t);});
    }catch(e){}
    const nextItemsV4260=[];
    [naechsterSchrittText].concat(fragenItems).concat(matrix.open||[]).forEach(t=>{
      const x=String(t||'').replace(/^[-•\s]+/,'').trim();
      if(x&&!nextItemsV4260.some(y=>y.toLowerCase()===x.toLowerCase()))nextItemsV4260.push(x);

  const phaseList=h('div',{className:'cockpit-phase-list'});

// Aktualisiert Ring/Score/Label/Subline in der Hero-Card mit den bereits berechneten
// getOpportunityHealth()-Werten. No-op auf allen anderen Screens.
function updateHomeHeroHealthVisual(){
  const scoreEl=document.getElementById('home-health-score');
  if(!scoreEl)return;
  const fillEl=document.getElementById('home-health-fill');
  const aid=LS.get('ki21_aid',null);
  const health=aid?getOpportunityHealth(aid):null;

  if(!health){
    scoreEl.textContent='–';
    if(fillEl){fillEl.style.width='0%';fillEl.style.background='var(--bg3)';}
    return;
  }
  const color=getHealthColor(health.score);
  scoreEl.textContent=String(health.score);
  scoreEl.style.color=color;
  if(fillEl){
    const pct=Math.max(0,Math.min(100,health.score));
    fillEl.style.width=pct+'%';
    fillEl.style.background=color;
  }
}

async function runAutopilot(){
  const cust=getActiveCust();
  const mu=LS.get('ki21_mu',{});
  const kk=LS.get('ki21_kk_'+state.activeId,'');
  const phaseNamesShort=['Qualifizierung','Bedarfsanalyse','Termin nachbereiten','Nutzen-Kosten-Analyse','Angebot & Abschluss'];

  const app=document.getElementById('app');
  app.innerHTML='';
  const progBox=h('div',{style:{padding:'20px 16px',maxWidth:'500px',margin:'0 auto'}});
  progBox.appendChild(h('div',{style:{fontSize:'15px',fontWeight:'800',marginBottom:'14px'}},
    '🔍 KI21 erstellt Ihre Opportunity-Vorschau'));
  const stepEls=[];
  for(let i=0;i<5;i++){
    const stepEl=h('div',{style:{fontSize:'13px',padding:'8px 0',color:'var(--text2)'}},
      '⏳ '+phaseNamesShort[i]);
    stepEls.push(stepEl);
    progBox.appendChild(stepEl);
  }
  app.appendChild(progBox);

  // Non-invasive: only READ Phase 1 (Qualifizierung) input fields, never write to real phase data
  const phase1Data=LS.get('ki21_st_'+state.activeId+'_0',{fv:{},result:''});
  const dossierResults=[];
  let prevResult='';

  for(let i=0;i<5;i++){
    const sit=SITS[i];
    // Build a synthetic field-value object for this phase, fed only by the chain of previous in-memory results
    let fv={};
    if(i===0){
      fv=phase1Data.fv||{};
    } else {
      const textFieldId=sit.felder.find(f=>f.t==='ta'&&!f.readonly);
      const ctxFieldId=sit.felder.find(f=>f.readonly);
      if(ctxFieldId)fv[ctxFieldId.id]=prevResult;
      if(textFieldId)fv[textFieldId.id]=prevResult;
      // For phases with additional fields (e.g. paket/budget in Phase 4/5), leave them empty -
      // the Opportunity-Vorschau prompt rules instruct the model to use BRANCHENHYPOTHESE for missing data.
    }

    const stk='';
    try{
      const prompt=sit.build(fv,cust,mu,kk,stk);
      const result=await callClaude(prompt,null);
      if(result){
        dossierResults.push({title:sit.title,result});
        prevResult=result;
        stepEls[i].textContent='✓ '+phaseNamesShort[i];
        stepEls[i].style.color='#2ea043';
      } else {
        dossierResults.push({title:sit.title,result:'(Keine Antwort erhalten)'});
        stepEls[i].textContent='⚠️ '+phaseNamesShort[i]+' (fehlgeschlagen)';
        stepEls[i].style.color='#f85149';
      }
    }catch(e){
      dossierResults.push({title:sit.title,result:'(Fehler: '+e.message+')'});
      stepEls[i].textContent='⚠️ '+phaseNamesShort[i]+' (Fehler: '+e.message+')';
      stepEls[i].style.color='#f85149';
    }
  }

  progBox.appendChild(h('div',{style:{fontSize:'14px',fontWeight:'700',color:'#2ea043',marginTop:'16px'}},
    '✅ Opportunity-Vorschau erfolgreich erstellt.'));
  // Automatically download as PDF/HTML so the result is never lost
  exportAutopilotPDF(cust,dossierResults);
  progBox.appendChild(h('div',{style:{fontSize:'11px',color:'var(--text2)',marginTop:'6px'}},
    '📄 Vorschau wurde automatisch heruntergeladen.'));
  const showBtn=h('button',{className:'btn-o',style:{marginTop:'14px',width:'100%'},
    onclick:()=>showAutopilotDossier(cust,dossierResults)
  },'Vorschau ansehen →');
  progBox.appendChild(showBtn);
  // Keep results available for immediate PDF export without re-running
  state.lastAutopilotDossier={cust,dossierResults};
}

    cust.firma||''));

    onclick:()=>exportAutopilotPDF(cust,dossierResults)

}

// v4.169: Schutz gegen veraltete Antworten nach neu generierten SPIN-/Leitfragen.
// v4.170: Stabilisierungs-Fix – Fragmentfilter und konsistente Fragen-Vorschau/Drilldown.
// v4.192: Antworten auf Leitfragen bleiben immer sichtbar/editierbar. Bei geänderten Leitfragen wird nur ein Prüfhinweis gesetzt.
function ki21SpinQuestionSignature(questions){
  return (questions||[])
    .map(q=>String(q||'').toLowerCase().replace(/\s+/g,' ').replace(/[„“"'’]/g,'').trim())
    .filter(Boolean)
    .join(' || ');
}
function ki21InvalidateAnswersIfSpinChanged(stData, spinQuestions){
  if(!stData) return {cleared:false,sig:''};
  stData.fv=stData.fv||{};
  const sig=ki21SpinQuestionSignature(spinQuestions);
  if(!sig) return {cleared:false,sig:''};

  const oldSig=stData.fv.antwortenSpinSig||'';
  const hasAnswers=!!(stData.fv.antworten&&String(stData.fv.antworten).trim());

  // KI21 darf Gesprächsantworten nie automatisch aus dem sichtbaren Eingabefeld entfernen.
  // Wenn sich Leitfragen ändern, bleibt der Text editierbar sichtbar; KI21 warnt nur vor möglicher Nichtübereinstimmung.
  if(hasAnswers && oldSig && oldSig!==sig){
    stData.fv.antwortenArchiv=String(stData.fv.antworten||'');
    stData.fv.antwortenArchivHinweis='Leitfragen wurden aktualisiert. Bitte prüfen, ob die vorhandenen Antworten noch zu den neuen Fragen passen.';
    stData.fv.antwortenReviewNeeded=true;
  }

  stData.fv.antwortenSpinSig=sig;
  return {cleared:false,sig};
}
function ki21ClearAnswersOnNewSpin(stData,newSpin){
  if(!stData) return;
  stData.fv=stData.fv||{};

  const oldSpin=String(stData.fv['spin']||'').trim();
  const incomingSpin=String(newSpin||'').trim();
  const hasAnswers=!!(stData.fv['antworten']&&String(stData.fv['antworten']).trim());

  // Neue Leitfragen dürfen vorhandene Gesprächsnotizen nicht unsichtbar machen.
  // Optional wird eine Sicherheitskopie behalten, aber das sichtbare Antwortfeld bleibt gefüllt.
  if(oldSpin!==incomingSpin && hasAnswers){
    stData.fv['antwortenArchiv']=String(stData.fv['antworten']);
    stData.fv['antwortenArchivHinweis']='Leitfragen wurden aktualisiert. Bitte prüfen, ob die vorhandenen Antworten noch zu den neuen Fragen passen.';
    stData.fv['antwortenReviewNeeded']=true;
  }
}


// v4.198: SPIN-Transfer hart begrenzen. Phase 2 darf nur echte S/P/I/N-Fragen übernehmen,
// keine Aktionslisten, Qualifizierungsfragen, TODOs oder alte Ergebnisblöcke.
function extractSpinQuestions(resultText){
  const text=String(resultText||'');
  if(!text.trim())return [];

  const headingRe=/SPIN-FRAGEN\s+F(?:Ü|U)R(?:\s+DIE)?\s+BEDARFSANALYSE|SPIN-FRAGEN\s+F(?:Ü|U)R\s+BEDARFSANALYSE|SPIN-FRAGEN/i;
  const headingMatch=headingRe.exec(text);
  let scope=headingMatch?text.slice(headingMatch.index+headingMatch[0].length):text;

  const stopRe=/^(?:#{1,6}\s*)?(?:###DETAILS###|EINSCHÄTZUNG|BESTÄTIGT|KI-BEWERTUNG|ZU VALIDIEREN|ZU KLÄREN|NÄCHSTER SCHRITT|🎯\s*WENN DU MORGEN|WENN DU MORGEN|DIE 5 WICHTIGSTEN|VERTRIEBSNOTIZEN|DEMO|PILOT|ROI|FOLLOW-UP|KAUFARGUMENTE|EINWÄNDE)\b/i;
  const spinLineRe=/^(?:[•\-–—]\s*)?([SPIN])\s*[:\-–]\s*(.+)$/i;
  const out=[];
  const seen=new Set();
  const lines=scope.split('\n');

  for(const raw of lines){
    let line=String(raw||'').trim();
    if(!line)continue;
    if(stopRe.test(line))break;

    const m=line.match(spinLineRe);
    if(!m)continue;

    const letter=m[1].toUpperCase();
    let q=(letter+': '+m[2].trim())
      .replace(/\s+/g,' ')
      .replace(/\s*\|\s*Antwort\s*:\s*_{2,}\s*$/i,'')
      .trim();

    // Nur echte Fragen übernehmen; strategische Listen ohne Fragezeichen bleiben draußen.
    if(!q.includes('?'))continue;

    const key=q.toLowerCase().replace(/[„“"'’]/g,'').replace(/\s+/g,' ').trim();
    if(!seen.has(key)){
      seen.add(key);
      out.push(q);
    }
  }
  return out;
}

}



function scoreColor(s){
  if(s>=7)return '#2ea043';
  if(s>=4)return '#d29922';
  return '#f85149';
}

function ki21TokenizeV4200(text){
  return String(text||'').toLowerCase()
    .replace(/[ä]/g,'ae').replace(/[ö]/g,'oe').replace(/[ü]/g,'ue').replace(/[ß]/g,'ss')
    .replace(/[^a-z0-9€]+/g,' ')
    .split(/\s+/)
    .filter(w=>w.length>3&&!/^(dass|oder|aber|wenn|dann|heute|wird|werden|wurde|wurden|welche|welcher|welches|ihre|ihr|eure|euer|sich|nicht|mehr|noch|diese|dieser|dieses|einen|eine|einem|einer|durch|gegen|ueber|unter|beim|zum|zur|und|mit|ohne|fuer|aus|den|dem|des|ist|sind|haben|habt|hat|was|wie|wer|wo)$/i.test(w));
}
function ki21SimilarityV4200(a,b){
  const A=new Set(ki21TokenizeV4200(a));
  const B=new Set(ki21TokenizeV4200(b));
  if(!A.size||!B.size)return 0;
  let hit=0;A.forEach(x=>{if(B.has(x))hit++;});
  return hit/Math.sqrt(A.size*B.size);
}
function parseDirectSpinAnswersV4199(note,spinQuestions,spinLetters){
  const txt=String(note||'').trim();
  const questionCount=(spinQuestions||[]).length;
  const out=new Array(questionCount).fill('');
  if(!txt||!questionCount)return out;

  const labeled=[];
  const labelRe=/(?:^|\n)\s*([SPIN])\s*(\d{1,2})\s*[\.:\)\-–]\s*([\s\S]*?)(?=(?:\n\s*[SPIN]\s*\d{1,2}\s*[\.:\)\-–])|$)/gi;
  let m;
  while((m=labelRe.exec(txt))){
    const letter=m[1].toUpperCase();
    const ord=parseInt(m[2],10);
    const answer=String(m[3]||'').trim();
    if(answer)labeled.push({letter,ord,answer});
  }

  // Strukturierte SPIN-Blöcke niemals global nach Nummer verteilen: S1 gehört nur zu S-Fragen,
  // P1 nur zu P-Fragen usw. Innerhalb der Kategorie semantisch passendste Frage wählen.
  if(labeled.length){
    const used=new Set();
    const byLetter={S:[],P:[],I:[],N:[]};
    (spinLetters||[]).forEach((l,i)=>{l=String(l||'').toUpperCase();if(byLetter[l])byLetter[l].push(i);});

    labeled.sort((a,b)=>a.letter.localeCompare(b.letter)||a.ord-b.ord).forEach(item=>{
      const candidates=(byLetter[item.letter]||[]).filter(idx=>!used.has(idx));
      if(!candidates.length)return;
      let best=-1,bestScore=-1;
      candidates.forEach(idx=>{
        const q=spinQuestions[idx]||'';
        let sc=ki21SimilarityV4200(item.answer,q);
        // Ordinal nur als schwacher Tie-Breaker innerhalb derselben SPIN-Kategorie.
        const pos=(byLetter[item.letter]||[]).indexOf(idx)+1;
        if(pos===item.ord)sc+=0.08;
        if(sc>bestScore){bestScore=sc;best=idx;}
      });
      // Bei einer Kategorie mit nur einer offenen Frage darf direkt zugeordnet werden.
      // Sonst nur zuordnen, wenn wenigstens minimale semantische Nähe oder ordinaler Treffer besteht.
      const onlyOne=candidates.length===1;
      const pos=(byLetter[item.letter]||[]).indexOf(best)+1;
      if(best>=0&&(onlyOne||bestScore>=0.10||pos===item.ord)){
        out[best]=item.answer;
        used.add(best);
      }
    });
    return out;
  }

  // Nur wenn KEINE SPIN-Labels vorhanden sind: 1., 2., 3. als explizite Reihenfolge der aktuellen Fragen interpretieren.
  const numericRe=/(?:^|\n)\s*(\d{1,2})\s*[\.:\)\-–]\s*([\s\S]*?)(?=(?:\n\s*\d{1,2}\s*[\.:\)\-–])|$)/g;
  while((m=numericRe.exec(txt))){
    const idx=parseInt(m[1],10)-1;
    if(idx>=0&&idx<questionCount)out[idx]=String(m[2]||'').trim();
  }
  return out;
}
function applySpinAnswersToRefsV4199(values,taRefs,data,KEY,spinQuestions){
  const vals=values||[];
  (taRefs||[]).forEach((t,i)=>{
    if(!t)return;
    t.value=String(vals[i]||'').trim();
    t.style.height='auto';
    t.style.height=Math.min(Math.max(t.scrollHeight,72),240)+'px';
  });
  data.fv['antworten']=taRefs.map((t,j)=>`${j+1}. Frage: ${t.value}`).join('\n');
  data.fv['antwortenSpinSig']=ki21SpinQuestionSignature(spinQuestions);
  data.fv['antwortenReviewNeeded']=false;
  LS.set(KEY,data);
}

    }
  }},'Antworten zuordnen');
  row.appendChild(cancel);row.appendChild(run);content.appendChild(row);

  function deletePhaseResult(kind='result'){

  function extractAfterHeader(text,headerKeyword){
    const lines=(text||'').split('\n');
    for(let i=0;i<lines.length;i++){
      if(lines[i].toUpperCase().includes(headerKeyword)){
        const colonIdx=lines[i].indexOf(':');
        if(colonIdx!==-1&&lines[i].slice(colonIdx+1).trim())return lines[i].slice(colonIdx+1).trim();
        let out=[];
        for(let j=i+1;j<lines.length;j++){
          if(!lines[j].trim())break;
          out.push(lines[j].trim());
        }
        if(out.length)return out.join(' ');
      }
    }
    return '';
  }

  // ERKENNTNISSE" oder "NÄCHSTE SCHRITTE") — für Phasen, deren Marker als Bullet-Liste statt
  // als einzeilige "Header: Inhalt"-Zeile formatiert sind.
  function extractFirstBulletAfterHeader(text,headerKeyword){
    const lines=(text||'').split('\n');
    for(let i=0;i<lines.length;i++){
      if(lines[i].toUpperCase().includes(headerKeyword.toUpperCase())){
        for(let j=i+1;j<lines.length;j++){
          const t=lines[j].trim();
          if(!t)break;
          return t.replace(/^[•\-]\s*/,'').replace(/^\d+\.\s*/,'').trim();
        }
      }
    }
    return '';
  }

  function extractLineContaining(text,substr){

      if(result){
        let finalResult=(sitId===1)

            :((sitId===4)
              ?(isSecurityItUseCaseV4199(state.activeId)?buildStructuredSecurityPhase5OutputV4212(state.activeId):(isSalesDiscoveryUseCaseV4199(state.activeId)?sanitizePhase5OfferOutput(result,state.activeId):cleanGenericLatePhaseOutputV4199(result,state.activeId)))
              :result));
        finalResult=qualityCleanupV4216(state.activeId,finalResult,sitId);
        data.result=finalResult;
        data.prompt=prompt;
        data.generatedAt=Date.now();
        resultBody.innerHTML='';resultBody.appendChild(renderResultText(finalResult));
        // Phase 1: auto-fill fragen field
        if(sitId===0){
          const lines=result.split('\n');
          const keywords=['DIE 5 WICHTIGSTEN QUALIFIZIERUNGSFRAGEN','QUALIFIZIERUNGSFRAGEN','TOP 5 QUALIFIZIERUNGSFRAGEN'];
          let splitIdx=-1;
          for(const kw of keywords){
            splitIdx=lines.findIndex(l=>l.toUpperCase().includes(kw));
            if(splitIdx>=0)break;
          }
          if(splitIdx>=0){
            data.fv=data.fv||{};
            data.fv.fragen=lines.slice(splitIdx).join('\n').trim();
            // Update DOM textarea if visible
            const ta=document.querySelector('[data-fid="fragen"]');
            if(ta)ta.value=data.fv.fragen;
          }
        }
        LS.set(KEY,data);
        if(state.activeId){
          await refreshOpportunityHealth(state.activeId);
          const freshHealth=getOpportunityHealth(state.activeId);
          const scoreEl=document.getElementById('station-health-score');
          const fillEl=document.getElementById('station-health-fill');
          if(scoreEl&&freshHealth){
            const color=getHealthColor(freshHealth.score);
            scoreEl.textContent=String(freshHealth.score);
            scoreEl.style.color=color;
            if(fillEl){fillEl.style.width=freshHealth.score+'%';fillEl.style.background=color;}
          }
          // Phasenspezifischer Signal-Snapshot: Speichert den Signal-Stand zum Zeitpunkt
          // dieser Phasengenerierung. Der globale Score bleibt global — aber das Dashboard
          // dieser Phase zeigt genau die Signale, die beim Generieren bekannt waren.
          // Key: ki21_phase_snap_{accId}_{sitId} = {positive, warning, open, ts}
          // Wird beim nächsten Generieren dieser Phase überschrieben.
          if(freshHealth){
            LS.set('ki21_phase_snap_'+state.activeId+'_'+sitId,{
              positive:freshHealth.positive||[],
              warning:freshHealth.warning||[],
              open:freshHealth.open||[],
              ts:Date.now()
            });
          }
          // Phase-Pending-Flag löschen nach erfolgreicher Generierung
          if(state.activeId){
            LS.set('ki21_phase_pending_'+state.activeId+'_'+sitId,null);
          }
          // Isolierter Phasen-Snapshot mit sourcePhase-Tagging (async, Hintergrund)
          savePhaseSnapshot(state.activeId,sitId);
        }
        resultLabel.textContent=getResultLabel(sitId);
        // Phase 5: Auto-extract Besuchsbericht into CRM field
        if(sitId===4){
          const berichtMatch=result.match(/BESUCHSBERICHT[:\s]*\n([\s\S]+?)(?=FOLLOW-UP MAIL|→ TODO|$)/i);

            const berichtText=berichtMatch[1].trim();
            data.fv=data.fv||{};

            // Update the bericht field in UI
            const berichtField=document.querySelector('textarea[data-fid="ergebnis"]');
            if(berichtField)berichtField.value=berichtText;
          }
        }

        // For Nutzen-Kosten-Analyse (sitId===3): nur noch Case-Annahmen für Phase 5 extrahieren (Kurzfassung-Box entfernt, Review Juni 2026)
        if(sitId===3 && isSalesDiscoveryUseCaseV4199(state.activeId)){
          // v4.213: Keine zusätzliche Case-Extraction bei Security/IT; sie blockiert Mobile nach der Generierung.
          try{
            const caseExtractPrompt=`Extrahiere aus dieser Nutzen-Kosten-Analyse die zentralen Case-Annahmen als reines JSON-Objekt, ohne Markdown-Codeblock, ohne Erklärtext davor oder danach.

Format exakt so:
{"manual_effort_range":"<Bandbreite z.B. '300-600 Stunden/Jahr', oder leer falls nicht vorhanden>","working_value":"<verwendeter Arbeitswert/Mittelwert, z.B. '450 Stunden/Jahr'>","adjustment":"<kurze Begründung falls vom Mittelwert abgewichen wurde, sonst 'Mittelwert ohne Anpassung'>","confidence":"<hoch|mittel|niedrig>","monthly_benefit":"<geglätteter Nutzen pro Monat, z.B. '3.200 €/Monat'>","monthly_investment":"<geglättete Investition pro Monat, z.B. '1.389 €/Monat'>","roi_statement":"<1 Satz Nutzen vs Investition>"}

Nur Werte verwenden die im Text unten tatsächlich vorkommen. Wenn ein Feld nicht ermittelbar ist, leeren String verwenden.

Analyse:
`+result;
            const caseJson=await callClaude(caseExtractPrompt,null);
            if(caseJson){
              const cleaned=caseJson.replace(/```json|```/g,'').trim();
              const parsed=JSON.parse(cleaned);
              LS.set('ki21_case_assumptions_'+state.activeId,parsed);
            }
          }catch(e){
            // Non-critical: case assumptions extraction failure shouldn't block the main result
          }
        }

        // Populate Weiter-button after fresh generation (was previously only shown on page reload)
        weiterRow.innerHTML='';
        const nextMapAfterGen={};
        if(nextMapAfterGen[sitId]&&!sit.build2){
          const nextIdAfterGen=nextMapAfterGen[sitId].nextId;
          const wbAfterGen=h('button',{

          weiterRow.appendChild(wbAfterGen);
          weiterRow.style.display='block';
        }
      }
    }catch(e){
      alert('Fehler: '+e.message);
      resultBox.style.display='none';
    }finally{
      loading=false;
      genBtn.disabled=false;
      genBtn.textContent=genLabels[sitId]||'⚡ KI21 generieren';

  // Navigation ans Ende — erst lesen & arbeiten, dann navigieren

function getAccPhaseInfo(accId){
  let furthest=-1;
  for(let i=0;i<5;i++){
    const data=LS.get('ki21_st_'+accId+'_'+i,null);
    if(data&&data.result)furthest=i;
  }
  const health=getOpportunityHealth(accId);
  return {phaseIdx:furthest,health};
}

function showKunde(){
  const m=modal('Kunde wählen', buildKundeContent(), null);

  function buildKundeContent(){
    const div=h('div',{});

    if(state.accounts.length>0){
      div.appendChild(h('div',{style:{fontSize:'10px',fontWeight:'700',letterSpacing:'.8px',
        textTransform:'uppercase',color:'#8b949e',marginBottom:'8px'}},'Zuletzt verwendet'));

      state.accounts.forEach(a=>{
        const info=getAccPhaseInfo(a.id);
        const initials=(a.cust.firma||'??').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
        const phaseLabel=info.phaseIdx>=0?'Phase '+(info.phaseIdx+1):'Neu';
        const row=h('div',{className:'acc-row'+(a.id===state.activeId?' active':''),
          onclick:()=>{state.activeId=a.id;LS.set('ki21_aid',a.id);m.remove();
            if(state.pendingSit!==null){const s=state.pendingSit;state.pendingSit=null;renderStation(s);}
            else renderHome();}
        },
          h('div',{className:'acc-avatar'},initials),
          h('div',{style:{flex:1,minWidth:0}},
            h('div',{className:'acc-name'},a.cust.firma),
            h('div',{className:'acc-meta'},
              h('span',{className:'acc-phase-chip'},phaseLabel),
              info.health?h('span',{className:'acc-score-chip',style:{color:getHealthColor(info.health.score)}},'Opp '+info.health.score):null
            )
          ),
          h('div',{className:'acc-btns'},
            a.id===state.activeId?h('span',{className:'acc-active'},'aktiv'):h('span',{},''),
            h('button',{className:'btn',style:{padding:'8px 14px',fontSize:'16px',minWidth:'44px',minHeight:'44px'},onclick:e=>{e.stopPropagation();m.remove();showEditKunde(a);}},'\u270E'),
            h('button',{style:{background:'transparent',border:'none',color:'#484f58',
              fontSize:'16px',cursor:'pointer',padding:'0 2px'},
              onclick:e=>{e.stopPropagation();
                if(confirm('Kunde löschen?')){
                  state.accounts=state.accounts.filter(x=>x.id!==a.id);
                  LS.set('ki21_acc',state.accounts);
                  if(state.activeId===a.id){state.activeId=state.accounts.length>0?state.accounts[0].id:null;LS.set('ki21_aid',state.activeId);}
                  m.remove();showKunde();
                }
              }},'×')
          )
        );
        div.appendChild(row);
      });
      div.appendChild(h('div',{style:{height:'8px'}}));
    }

    div.appendChild(h('button',{className:'btn-o',onclick:()=>{m.remove();showNeuerKunde();}},
      '+ Neuer Kunde'));
    return div;
  }
}


function getPhase2SpinQuestionsV4227(accId){
  const d=LS.get('ki21_st_'+accId+'_1',{fv:{},result:''});
  const raw=d&&d.fv?String(d.fv.spin||''):'';
  const lines=(typeof extractSpinQuestions==='function')?extractSpinQuestions(raw):[];
  return lines.map(l=>l.replace(/^[SPIN]\s*[:\-–]\s*/i,'').trim()).filter(Boolean);
}
function getPhase2SpinLettersV4227(accId){
  const d=LS.get('ki21_st_'+accId+'_1',{fv:{},result:''});
  const raw=d&&d.fv?String(d.fv.spin||''):'';
  const lines=(typeof extractSpinQuestions==='function')?extractSpinQuestions(raw):[];
  return lines.map(l=>{
    const m=String(l||'').match(/^([SPIN])\s*[:\-–]/i);
    return m?m[1].toUpperCase():'';
  });
}
function parseAnswerLinesV4227(raw,count){
  const arr=new Array(count||0).fill('');
  String(raw||'').split('\n').forEach(line=>{
    const m=line.match(/^(\d+)\.\s*(?:Frage:\s*)?(.*)$/s);
    if(m){
      const idx=parseInt(m[1],10)-1;
      if(idx>=0&&idx<arr.length)arr[idx]=m[2].trim();
    }
  });
  return arr;
}
function applyConversationNoteSpinAnswersV4227(accId,answers){
  if(!accId||!Array.isArray(answers)||!answers.length)return 0;
  const key='ki21_st_'+accId+'_1';
  const d=LS.get(key,{fv:{},result:''});
  d.fv=d.fv||{};
  const questions=getPhase2SpinQuestionsV4227(accId);
  if(!questions.length)return 0;
  const current=parseAnswerLinesV4227(d.fv.antworten||'',questions.length);
  let applied=0;
  answers.forEach(a=>{
    const idx=parseInt(a.index,10)-1;
    const ans=String(a.answer||'').trim();
    if(idx>=0&&idx<current.length&&ans){
      current[idx]=current[idx] ? (current[idx].trim()+'\n'+ans) : ans;
      applied++;
    }
  });
  if(applied){
    d.fv.antworten=current.map((v,i)=>`${i+1}. Frage: ${v||''}`).join('\n');
    d.fv.antwortenSpinSig=ki21SpinQuestionSignature?ki21SpinQuestionSignature(questions):'';
    d.fv.antwortenReviewNeeded=false;
    LS.set(key,d);
  }
  return applied;
}
function buildConversationNotePromptV4227({note,cust,spinQuestions,spinLetters}){

- Ein Risiko für eine Kundenbeziehung ist kein bestätigter Umsatzverlust.

Antworte ausschließlich als JSON:
{

  "signals":[{"type":"Entscheider|Budget|Angebot|Nutzen|Timing|Champion|Wettbewerb|Risiko|Offener Punkt","text":"...","status":"bestätigt|abgeleitet|zu klären"}],

}

Firma: ${(cust&&cust.firma)||'–'}
Ansprechpartner: ${(cust&&cust.ap)||'–'}
SPIN-Fragen für Phase 2:
${(spinQuestions||[]).map((q,i)=>`${i+1}. ${(spinLetters&&spinLetters[i])||''}: ${q}`).join('\n')||'Keine SPIN-Fragen vorhanden'}

Gesprächsnotiz:
${note}`;
}
function showConversationNoteParserV4227(args){

    selectableItems.push(item);
    return item;
  }

  function addSelectableSpinItem(index,letter,question,answer,statusText){
    var clean=String(answer||'').trim();
    if(!clean)return null;
    var item={id:'spin_'+selectableSpinItems.length,index:index,letter:letter||'',question:String(question||'').trim(),answer:clean,status:statusText||'',active:true};
    selectableSpinItems.push(item);

  function renderSpinRow(item){
    var row=null;
    var label=item.letter?item.letter:String(item.index);
    row=h('button',{type:'button',className:'note-parser-spin selectable',onclick:function(){toggleSelectableItem(item,row);}},
      h('span',{className:'note-parser-spin-letter'},label),
      h('span',{className:'note-parser-spin-main'},
        h('span',{className:'note-parser-spin-question'},item.question||('SPIN-Frage '+item.index)),
        h('span',{className:'note-parser-spin-answer'},item.answer)
      ),
      item.status?h('small',{},item.status):null
    );
    return row;
  }

  function toggleSelectableItem(item,row){
    if(!item)return;
    item.active=!item.active;
    if(row)row.classList.toggle('excluded',!item.active);
  }

  function buildSelectedAdditionV4230(){
    if(!parsed)return '';
    var grouped={summary:[],confirmed:[],interpretations:[],openPoints:[],signals:[]};
    selectableItems.filter(function(i){return i.active;}).forEach(function(i){
      if(grouped[i.section])grouped[i.section].push(i);
    });
    var lines=[];
    if(grouped.summary.length){
      lines.push('Kurzfazit:');
      grouped.summary.forEach(function(i){lines.push('• '+i.text);});
    }
    if(grouped.confirmed.length){
      if(lines.length)lines.push('');
      lines.push('Bestätigt:');
      grouped.confirmed.forEach(function(i){lines.push('• '+i.text);});
    }
    if(grouped.interpretations.length){
      if(lines.length)lines.push('');
      lines.push('Vorsichtige Ableitungen:');
      grouped.interpretations.forEach(function(i){lines.push('• '+i.text);});
    }
    if(grouped.openPoints.length){
      if(lines.length)lines.push('');
      lines.push('Offen:');
      grouped.openPoints.forEach(function(i){lines.push('• '+i.text);});
    }
    if(grouped.signals.length){
      if(lines.length)lines.push('');
      lines.push('Erkannte Signale:');
      grouped.signals.forEach(function(i){lines.push('• '+(i.meta?i.meta+': ':'')+i.text);});
    }
    return lines.join('\\n').trim();
  }

  function renderSelectableRow(item,labelOverride){
    var row=null;
    row=h('button',{type:'button',className:'note-parser-row selectable '+(item.kind||''),onclick:function(){toggleSelectableItem(item,row);}},

      h('span',{className:'note-parser-row-text'},item.text),
      h('span',{className:'note-parser-toggle-hint'},'antippen = raus')
    );
    return row;
  }

  function renderPreview(){
    preview.innerHTML='';
    selectableItems=[];
    selectableSpinItems=[];
    if(!parsed)return;

    if(parsed.shortSummary){
      var it0=addSelectableItem('summary','summary',parsed.shortSummary,'');
      if(it0)preview.appendChild(renderSelectableRow(it0,'Kurzfazit'));
    }

    function block(title,items,section,kind){
      var clean=(items||[]).map(function(x){return String((x&&x.text)||x||'').trim();}).filter(Boolean).slice(0,6);
      if(!clean.length)return;
      preview.appendChild(h('div',{className:'note-parser-heading'},title));
      clean.forEach(function(x){
        var it=addSelectableItem(section,kind,x,'');
        if(it)preview.appendChild(renderSelectableRow(it,''));
      });
    }

    block('Bestätigt',parsed.confirmed,'confirmed','ok');
    block('Vorsichtige Ableitungen',parsed.interpretations,'interpretations','warn');
    block('Offen',parsed.openPoints,'openPoints','open');

    if(Array.isArray(parsed.signals)&&parsed.signals.length){
      preview.appendChild(h('div',{className:'note-parser-heading'},'Erkannte Signale'));
      parsed.signals.slice(0,8).forEach(function(s){
        var item=addSelectableItem('signals','signal',String(s.text||''),String(s.type||'Signal'));
        if(!item)return;
        var row=null;
        row=h('button',{type:'button',className:'note-parser-signal selectable',onclick:function(){toggleSelectableItem(item,row);}},
          h('span',{className:'note-parser-chip'},String(s.type||'Signal')),
          h('span',{className:'note-parser-row-text'},String(s.text||'')),
          s.status?h('small',{},String(s.status)):null
        );
        preview.appendChild(row);
      });
    }

    var spinQuestions=getPhase2SpinQuestionsV4227(accId);
    var spinLetters=getPhase2SpinLettersV4227(accId);
    var spinAnswers=Array.isArray(parsed.spinAnswers)?parsed.spinAnswers:[];
    var validSpin=spinAnswers.filter(function(a){
      var idx=parseInt(a&&a.index,10)-1;
      return idx>=0 && idx<spinQuestions.length && a && String(a.answer||'').trim();
    });
    if(validSpin.length){
      preview.appendChild(h('div',{className:'note-parser-heading'},'Erkannte SPIN-Antworten'));
      validSpin.forEach(function(a){
        var idx=parseInt(a.index,10)-1;
        var item=addSelectableSpinItem(idx+1,spinLetters[idx]||'',spinQuestions[idx]||'',String(a.answer||''),String(a.status||''));
        if(item)preview.appendChild(renderSpinRow(item));
      });
      preview.appendChild(h('div',{className:'note-parser-hint'},'SPIN-Antworten sind separat auswählbar und werden nur über den SPIN-Button übernommen.'));
    }else if(spinAnswers.some(function(a){return a&&a.answer;})){
      preview.appendChild(h('div',{className:'note-parser-hint'},'SPIN-Antworten erkannt, aber keine passenden Phase-2-Leitfragen gefunden. Bitte Phase 2 prüfen.'));
    }
  }

  var bg=null;
  var row=h('div',{className:'modal-row'});
  var cancel=h('button',{className:'btn',onclick:function(){if(bg)bg.remove();}},'Abbrechen');
  var analyze=h('button',{className:'btn-o',onclick:async function(){
    var note=ta.value.trim();
    if(!note){status.textContent='Bitte zuerst eine Gesprächsnotiz einfügen.';return;}
    analyze.disabled=true;
    analyze.textContent='⏳ Bereite auf...';
    status.textContent='KI21 analysiert die Notiz.';
    preview.innerHTML='';
    selectableItems=[];
    selectableSpinItems=[];

    try{
      var spinQuestions=getPhase2SpinQuestionsV4227(accId);
      var spinLetters=getPhase2SpinLettersV4227(accId);
      parsed=await callClaudeJSON(buildConversationNotePromptV4227({note:note,cust:cust,spinQuestions:spinQuestions,spinLetters:spinLetters}));

      if(!parsed){
        status.textContent='Aufbereitung fehlgeschlagen. Bitte API-Key/Verbindung prüfen.';
        analyze.disabled=false;
        analyze.textContent='Aufbereiten';
        return;
      }

      status.textContent='Vorschau erstellt. Tippe Punkte an, die nicht übernommen werden sollen.';
      renderPreview();
      applyAdd.style.display='block';
      applySpin.style.display=selectableSpinItems.length?'block':'none';
      analyze.style.display='none';
    }catch(e){
      console.warn(e);
      status.textContent='Aufbereitung fehlgeschlagen.';
      analyze.disabled=false;
      analyze.textContent='Aufbereiten';
    }
  }},'Aufbereiten');

  row.appendChild(cancel);
  row.appendChild(analyze);
  content.appendChild(row);

  var applyRow=h('div',{className:'modal-row',style:{marginTop:'8px'}});
  var applyAdd=h('button',{className:'btn-o',style:{display:'none',flex:'1'},onclick:function(){
    if(!parsed)return;
    var clean=buildSelectedAdditionV4230();
    if(!clean){status.textContent='Keine aktiven Punkte ausgewählt.';return;}
    var old=String((typeof getCurrent==='function'?getCurrent():kkTa.value)||'').trim();
    var val=(old?old+'\\n\\n':'')+clean;
    kkTa.value=val;
    if(typeof setCurrent==='function')setCurrent(val);
    status.textContent='Ausgewählte Punkte wurden ins Feld übernommen. Zum Speichern unten „Speichern“ drücken.';
  }},'Ausgewählte Punkte übernehmen');

  var applySpin=h('button',{className:'btn',style:{display:'none',flex:'1'},onclick:function(){
    if(!parsed)return;
    var active=selectableSpinItems.filter(function(i){return i.active;}).map(function(i){return {index:i.index,answer:i.answer,status:i.status};});
    if(!active.length){status.textContent='Keine aktiven SPIN-Antworten ausgewählt.';return;}
    var n=applyConversationNoteSpinAnswersV4227(accId,active);
    status.textContent=n?String(n)+' ausgewählte SPIN-Antwort(en) in Phase 2 übernommen.':'Keine SPIN-Antworten übernommen.';
  }},'Ausgewählte SPIN-Antworten übernehmen');

  applyRow.appendChild(applyAdd);
  applyRow.appendChild(applySpin);
  content.appendChild(applyRow);

  bg=modal('Gesprächsnotiz aufbereiten',content);
  setTimeout(function(){ta.focus();},50);
}

  const statusDiv=h('div',{style:{fontSize:'12px',color:'#8b949e',marginTop:'8px'}});
  
  const analyzeBtn=h('button',{className:'btn-o',style:{width:'100%',marginTop:'8px'},
    onclick:async()=>{
      const apiKey=LS.get('ki21_apikey','');
      if(!apiKey){alert('Bitte API Key hinterlegen.');return;}
      if(!ta.value.trim()){alert('Bitte Text einfügen.');return;}
      
      analyzeBtn.textContent='⏳ Analysiere...';
      analyzeBtn.disabled=true;
      
      try{
        const prompt=`Du extrahierst Informationen aus einem Text für ein B2B-Vertriebssystem.

Text:
${ta.value}

WICHTIG: Antworte AUSSCHLIESSLICH mit validem JSON. Kein Markdown. Keine Erklärung. Kein Text davor oder danach. Nur das JSON-Objekt.

{"firma":"","ap":"","branche":"","ma":"","um":"","kontext":"","persoenlich":"","herausforderungen":""}

Fülle die Felder mit den gefundenen Informationen. Leere Felder bleiben leer.

WICHTIG zur Unterscheidung von "kontext" und "herausforderungen":
- "kontext": dauerhafte, strukturelle Informationen über das Unternehmen (Branche, Aufbau, Standorte, Teamgröße, allgemeine Beschreibung der Lage) – Dinge, die über viele Monate gültig bleiben.
- "herausforderungen": konkrete, aktuelle Herausforderungen, Probleme oder Kauftrigger, die JETZT die Vertriebssituation antreiben (z.B. "Forecast-Qualität schlecht", "neues CRM eingeführt aber kaum genutzt", "Geschäftsführer fordert Verbesserung"). Das sind die Dinge, die direkt eine Qualifizierungsfrage auslösen würden.
Ein Text kann Anteile in beiden Feldern haben – verteile sinnvoll, dopple nicht alles in beide Felder.`;

        const resp=await fetch('https://api.anthropic.com/v1/messages',{
          method:'POST',
          headers:{
            'Content-Type':'application/json',
            'x-api-key':apiKey,
            'anthropic-version':'2023-06-01',
            'anthropic-dangerous-direct-browser-access':'true'
          },
          body:JSON.stringify({
            model:'claude-haiku-4-5-20251001',
            max_tokens:1024,
            messages:[{role:'user',content:prompt}]
          })
        });
        
        const data=await resp.json();
        let txt=data.content[0].text.trim();
        // Strip markdown code blocks if present
        txt=txt.replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
        // Extract JSON object if wrapped in other text
        const jsonMatch=txt.match(/\{[\s\S]*\}/);
        if(!jsonMatch)throw new Error('Kein JSON gefunden');
        const parsed=JSON.parse(jsonMatch[0]);
        
        // Update customer data
        const acc=state.accounts.find(a=>a.id===accId);
        if(acc){
          if(parsed.firma)acc.cust.firma=parsed.firma;
          if(parsed.ap)acc.cust.ap=parsed.ap;
          if(parsed.branche)acc.cust.branche=parsed.branche;
          if(parsed.ma)acc.cust.ma=parsed.ma;
          if(parsed.um){
            // Normalize umsatz to readable format
            const rawUm=String(parsed.um).replace(/[^0-9.]/g,'');
            const numUm=parseFloat(rawUm);
            if(numUm>=1000000)acc.cust.um=(numUm/1000000).toFixed(0)+' Mio. €';
            else if(numUm>=1000)acc.cust.um=(numUm/1000).toFixed(0)+' Tsd. €';
            else acc.cust.um=parsed.um;
          }
          LS.set('ki21_acc',state.accounts);
          
          // Update kontext
          if(parsed.kontext||parsed.persoenlich){
            let kk=LS.get('ki21_kk_'+accId,'')||'';
            if(parsed.kontext)kk+=(kk?'\n\n':'')+parsed.kontext;
            if(parsed.persoenlich)kk+=(kk?'\n\nPERSÖNLICH:\n':'')+parsed.persoenlich;
            LS.set('ki21_kk_'+accId,kk);
            refreshOpportunityHealth(accId);
          }

          // Update Phase 1 "Bekannte Herausforderungen / Vermutungen" (mergen, nicht überschreiben)
          if(parsed.herausforderungen){
            const st0=LS.get('ki21_st_'+accId+'_0',{fv:{},result:''});
            if(!st0.fv)st0.fv={};
            st0.fv.info=(st0.fv.info?st0.fv.info+'\n\n':'')+parsed.herausforderungen;
            LS.set('ki21_st_'+accId+'_0',st0);
          }
        }
        
        // Build confirmation
        const lines=[];
        if(parsed.firma)lines.push('✅ Firma: '+parsed.firma);
        if(parsed.ap)lines.push('✅ Ansprechpartner: '+parsed.ap);
        if(parsed.branche)lines.push('✅ Branche: '+parsed.branche);
        if(parsed.ma)lines.push('✅ Mitarbeiter: '+parsed.ma);
        if(parsed.um)lines.push('✅ Umsatz: '+parsed.um);
        if(parsed.kontext)lines.push('✅ Kontext: importiert');
        if(parsed.herausforderungen)lines.push('✅ Herausforderungen (Phase 1): importiert');
        if(parsed.persoenlich)lines.push('✅ Persönliche Infos: importiert');

        statusDiv.innerHTML='<div style="margin-top:10px;padding:10px;background:rgba(46,160,67,.1);border-radius:6px;border:1px solid rgba(46,160,67,.3);">'+
          '<div style="font-size:11px;font-weight:700;color:#2ea043;margin-bottom:6px;letter-spacing:.5px;">IMPORTIERT:</div>'+
          lines.map(l=>'<div style="font-size:12px;color:#e6edf3;padding:2px 0;">'+l+'</div>').join('')+
          '</div>';
        analyzeBtn.textContent='✓ Schließen';
        analyzeBtn.onclick=()=>{if(modalRef)modalRef.remove();};
        
      }catch(e){
        statusDiv.textContent='Fehler: '+e.message;
        analyzeBtn.textContent='CRM-Text analysieren';
        analyzeBtn.disabled=false;
      }
    }
  },'CRM-Text analysieren');
  
  const content=h('div',{},
    h('p',{style:{fontSize:'12px',color:'#8b949e',marginBottom:'8px'}},
      'Fügen Sie beliebigen Text ein – CRM-Export, LinkedIn-Profil, E-Mail oder Notizen. Claude erkennt und verteilt die Informationen automatisch.'),
    ta,
    analyzeBtn,
    statusDiv
  );
  let modalRef=null;
  const m=modal('📥 CRM-Text importieren',content,null);
  modalRef=m;
}

      else if(i===3)result=sanitizePhase4NoRoiMath(result,aid);
      else if(i===4)result=sanitizePhase5OfferOutput(result,aid);
      else result=sanitizeDossierEarlyPhaseV4190(sanitizeFinalOutputV4188(aid,result,'dossier'),aid);
    }
    html+=`<div class="phase">
      <div class="phase-title">Phase ${i+1}: ${SITS_LABELS[i]}</div>
      ${result?`<div style="white-space:pre-wrap;font-size:12px;line-height:1.7;">${highlightResultHTML(result)}</div>`:'<div class="empty">Noch nicht bearbeitet</div>'}
    </div>`;
  }

  html+=`<div class="footer">Vertriebsdokumentation · ${new Date().toLocaleDateString('de-DE')}</div></body></html>`;

  exportHtmlAsPdf(html,'KI21_Dossier_'+(cust.firma||'Kunde').replace(/\s+/g,'_')+'.pdf');
}

function showPDF(title,text,cust){
  const lines=text.split('\n');
  let html='';
  lines.forEach(line=>{
    const t=line.trim();
    if(!t){html+='<br>';return;}
    // Headings
    if(t.startsWith('# ')){html+=`<h1>${t.slice(2)}</h1>`;return;}
    if(t.startsWith('## ')){html+=`<h2>${t.slice(3)}</h2>`;return;}
    // Score line
    if(t.match(/SCORE:\s*\d+\/10/i)){html+=`<p class="score">${t}</p>`;return;}
    // Section headers (ALL CAPS ending with :)
    if(t===t.toUpperCase()&&t.endsWith(':')&&t.length>3){html+=`<h3>${t}</h3>`;return;}
    // BESTÄTIGT / ANNAHME / KLÄREN
    if(t.startsWith('BESTÄTIGT:')||t.startsWith('ANNAHME:')||t.startsWith('KLÄREN:')){
      const parts=t.split(':');
      html+=`<p><strong>${parts[0]}:</strong>${parts.slice(1).join(':')}</p>`;return;
    }
    // TODO / Nächster Schritt line
    if(t.startsWith('→ TODO')||t.startsWith('→')||t.startsWith('NÄCHSTER SCHRITT DIESE WOCHE')||t.startsWith('NÄCHSTE AKTION')){html+=`<p class="todo">${t}</p>`;return;}
    // Numbered items
    if(t.match(/^\d+\./)){html+=`<p class="item">${t}</p>`;return;}
    // Normal
    html+=`<p>${t}</p>`;
  });

  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8">
<title>KI21 – ${title}</title>
<style>
  body{font-family:'Helvetica Neue',Arial,sans-serif;font-size:12px;color:#1a1a1a;

function renderBranchenwissen(text){
  if(!text)return '';
  const lines=text.split('\n');
  let html='';
  let counter=0;
  let inEntry=false;
  lines.forEach(line=>{
    const t=line.trim();
    if(!t)return;
    // Category headers (ALL CAPS followed by colon, optionally with count in parens)
    if(/^[A-ZÄÖÜ\- ]+(\s*\(\d+.*\))?:$/.test(t)){
      if(inEntry)html+='</div>';
      html+=`<div style="margin:14px 0 8px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#ff6b00;border-bottom:1px solid #30363d;padding-bottom:4px;">${t.replace(/:$/,'')}</div>`;
      counter=0;
      inEntry=false;
      return;
    }
    // Field lines like "Pattern: ...", "Kennzahl: ...", "Confidence: ..."
    const fieldMatch=t.match(/^([A-ZÄÖÜa-zäöü]+):\s*(.*)$/);
    if(fieldMatch){
      const field=fieldMatch[1];
      const value=fieldMatch[2];
      if(field==='Pattern'||field==='Kennzahl'||field==='Rolle'||field==='Einwand'||field==='Insight'||field==='Frage'||field==='Titel'||field==='Typ'){
        if(inEntry)html+='</div>';
        counter++;
        html+=`<div style="background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px 10px;margin-bottom:6px;">
          <div style="font-size:11px;font-weight:700;color:#fff;margin-bottom:3px;">${counter}. ${value}</div>`;
        inEntry=true;
      } else if(field==='Confidence'||field==='Status'){
        const badge=value.toLowerCase().includes('hoch')||value.includes('recherchiert')?'🟢':value.toLowerCase().includes('mittel')||value.includes('Erfahrungswissen')?'🟡':'🔴';
        html+=`<div style="font-size:9px;color:#8b949e;margin-top:4px;">${badge} ${value}</div></div>`;
        inEntry=false;
      } else {
        html+=`<div style="font-size:10px;color:#c9d1d9;line-height:1.4;"><span style="color:#8b949e;">${field}:</span> ${value}</div>`;
      }
      return;
    }
    // Fallback: plain line
    html+=`<div style="font-size:10px;color:#c9d1d9;">${t}</div>`;
  });
  if(inEntry)html+='</div>';
  return html;
}

const KI21_VERSION='v4.262 Executive Briefing';


function runKi21VersionMigration(){
  const applied=LS.get('ki21_applied_code_version','');
  if(applied===KI21_VERSION)return;
  const accs=LS.get('ki21_acc',[]);
  accs.forEach(acc=>{
    if(!acc||!acc.id)return;
    // v4.186: stabile Klickbasis beibehalten; Perioden-/Money-Role-Guards generisch nach Rollen/Evidenzstatus, keine Case-Hardcodierung und keine UI-Event-Änderungen.
    // Keine komplette Health-Löschung mehr: Gute bestätigte Fakten bleiben erhalten.
    // Nur bekannte Fehlerklassen werden bereinigt und die Runtime-Schutzschicht baut Cockpit/Bottom-Sheets daraus neu.
    const h=LS.get('ki21_health_'+acc.id,null);
    if(h){
      const cleanArr=(arr,kind)=>(arr||[]).map(x=>{
        const text=String(x&&x.text?x.text:x||'');
        const cleaned=sanitizeCockpitTextFinal(acc.id,text,kind,{});
        if(!cleaned)return null;
        return (x&&x.text)?{...x,text:cleaned}: {text:cleaned,origin:'MIGRATION',type:kind,disabled:false};
      }).filter(Boolean);
      LS.set('ki21_health_'+acc.id,{...h,
        positive:cleanArr(h.positive,'positive'),
        warning:cleanArr(h.warning,'warning'),
        open:cleanArr(h.open,'open'),
        protectedSchema:'v4.186',
        migratedAt:Date.now()
      });
    }
    // alte Fehlermeldung stehen lassen wäre verwirrend, Health selbst bleibt erhalten.
    LS.set('ki21_health_lastError_'+acc.id,null);
  });
  LS.set('ki21_applied_code_version',KI21_VERSION);
}

function encodeBase64UTF8(text){
  const bytes=new TextEncoder().encode(text);
  let binary='';
  const chunk=8192;
  for(let i=0;i<bytes.length;i+=chunk){
    binary+=String.fromCharCode(...bytes.subarray(i,i+chunk));
  }
  return btoa(binary);
}

function detectVersionFromHtml(html){
  const m=String(html||'').match(/v\d+\.\d+(?:\s*[A-Za-z0-9_-]+)?/);
  return m?m[0]:'unbekannte Version';
}

async function pushToGitHub(sourceText){
  const token=LS.get('ki21_github_token','');
  if(!token){alert('Bitte zuerst GitHub Token in Einstellungen hinterlegen.');return;}

  if(!sourceText||!String(sourceText).trim()){
    throw new Error('Kein App-Code zum Veröffentlichen vorhanden. Bitte neue index.html in das Update-Feld einfügen.');
  }
  if(!String(sourceText).includes('<!DOCTYPE html')||!String(sourceText).includes('<script>')){
    throw new Error('Der eingefügte Text sieht nicht wie eine vollständige index.html aus.');
  }

  const version=detectVersionFromHtml(sourceText);
  const headers={
    'Authorization':'token '+token,
    'Accept':'application/vnd.github.v3+json',
    'Content-Type':'application/json'
  };

  const shaResp=await fetch('https://api.github.com/repos/KI21-Vertrieb/KI21/contents/index.html',{headers});
  if(!shaResp.ok)throw new Error('GitHub Fehler '+shaResp.status);
  const shaData=await shaResp.json();
  const sha=shaData.sha;

  const encoded=encodeBase64UTF8(sourceText);

  const pushResp=await fetch('https://api.github.com/repos/KI21-Vertrieb/KI21/contents/index.html',{
    method:'PUT',
    headers,
    body:JSON.stringify({
      message:'KI21 '+version+' veröffentlicht – '+new Date().toLocaleDateString('de-DE'),
      content:encoded,
      sha:sha
    })
  });
  if(!pushResp.ok){
    let msg='Push Fehler '+pushResp.status;
    try{const err=await pushResp.json(); if(err&&err.message)msg+=': '+err.message;}catch(e){}
    throw new Error(msg);
  }
  LS.set('ki21_last_published_version',version);
  LS.set('ki21_last_published_at',new Date().toLocaleString('de-DE'));
  return version;
}

async function fetchCurrentPublishedHtml(){
  const resp=await fetch('https://ki21-vertrieb.github.io/KI21/index.html?nocache='+Date.now());
  if(!resp.ok)throw new Error('Aktuelle Live-Version konnte nicht gelesen werden ('+resp.status+').');
  return await resp.text();
}
