function splitDetailsFromResult(text){
  if(!text)return {main:'',details:''};
  // Robuster Marker-Match: erlaubt führende Markdown-Zeichen (#, -, =, *, Leerzeichen) vor/nach ###DETAILS###,
  // falls die KI das exakte Format leicht abweichend ausgibt (z.B. "## ###DETAILS###" oder "###DETAILS###  ")
  const markerRegex=/[#\-=*\s]*###\s*DETAILS\s*###[#\-=*\s]*/i;
  const m=text.match(markerRegex);
  if(!m)return {main:text,details:''};
  const idx=m.index;
  return {main:text.slice(0,idx).trim(),details:text.slice(idx+m[0].length).trim()};
}
function renderResultText(text,skipSplit){
  if(!text)return document.createTextNode('');
  if(!skipSplit){
    const {main}=splitDetailsFromResult(text);
    text=main;
  }
  const div=document.createElement('div');
  div.style.cssText='white-space:pre-wrap;font-size:var(--fs-input,12px);line-height:1.8;color:var(--text);';
  const lines=text.split('\n');
  lines.forEach((line,i)=>{
    const span=document.createElement('span');
    const numMatch=line.match(/^(\d+\.\s*)/);
    const prefix=numMatch?numMatch[1]:'';
    const rest=numMatch?line.slice(prefix.length):line;
    if(line.startsWith('BESTÄTIGT:')){
      span.innerHTML='<span style="font-size:9px;font-weight:700;background:rgba(46,160,67,.15);color:#2ea043;border-radius:4px;padding:1px 6px;margin-right:6px;">BESTÄTIGT</span>'+escHtml(line.slice('BESTÄTIGT:'.length));
    } else if(line.startsWith('ANNAHME:')){
      span.innerHTML='<span style="font-size:9px;font-weight:700;background:rgba(255,107,0,.15);color:#ff6b00;border-radius:4px;padding:1px 6px;margin-right:6px;">ANNAHME</span>'+escHtml(line.slice('ANNAHME:'.length));
    } else if(line.startsWith('KLÄREN:')){
      span.innerHTML='<span style="font-size:9px;font-weight:700;background:rgba(248,81,73,.15);color:#f85149;border-radius:4px;padding:1px 6px;margin-right:6px;">KLÄREN</span>'+escHtml(line.slice('KLÄREN:'.length));
    } else if(rest.startsWith('KRITISCH:')){
      span.innerHTML=escHtml(prefix)+'<span style="font-size:9px;font-weight:700;background:rgba(248,81,73,.15);color:#f85149;border-radius:4px;padding:1px 6px;margin-right:6px;">KRITISCH</span>'+escHtml(rest.slice('KRITISCH:'.length));
    } else if(rest.startsWith('WICHTIG:')){
      span.innerHTML=escHtml(prefix)+'<span style="font-size:9px;font-weight:700;background:rgba(255,107,0,.15);color:#ff6b00;border-radius:4px;padding:1px 6px;margin-right:6px;">WICHTIG</span>'+escHtml(rest.slice('WICHTIG:'.length));
    } else if(rest.startsWith('NICE-TO-HAVE:')){
      span.innerHTML=escHtml(prefix)+'<span style="font-size:9px;font-weight:700;background:rgba(46,160,67,.15);color:#2ea043;border-radius:4px;padding:1px 6px;margin-right:6px;">NICE-TO-HAVE</span>'+escHtml(rest.slice('NICE-TO-HAVE:'.length));
    } else if(/\b(BESTÄTIGT|ARBEITSWERT|ZU VALIDIEREN|BRANCHENHYPOTHESE|ZU KLÄREN)\b/.test(line)&&!line.startsWith('BESTÄTIGT:')){
      span.innerHTML=highlightConfidenceWords(line);
    } else {
      span.textContent=line;
    }
    div.appendChild(span);
    if(i<lines.length-1)div.appendChild(document.createElement('br'));
  });
  return div;
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

    } else if(/\b(BESTÄTIGT|ARBEITSWERT|ZU VALIDIEREN|BRANCHENHYPOTHESE|ZU KLÄREN)\b/.test(line)&&!line.startsWith('BESTÄTIGT:')){
      let escaped=escHtml(line);
      escaped=escaped.replace(/\bBESTÄTIGT\b/g,'<span style="font-size:10px;font-weight:700;background:#e6f4ea;color:#1a7f37;border-radius:4px;padding:1px 6px;">BESTÄTIGT</span>');
      escaped=escaped.replace(/\bARBEITSWERT\b/g,'<span style="font-size:10px;font-weight:700;background:#fff1e6;color:#cc5500;border-radius:4px;padding:1px 6px;">ARBEITSWERT</span>');
      escaped=escaped.replace(/\bZU VALIDIEREN\b/g,'<span style="font-size:10px;font-weight:700;background:#fde8e8;color:#c0292b;border-radius:4px;padding:1px 6px;">ZU VALIDIEREN</span>');
      escaped=escaped.replace(/\bBRANCHENHYPOTHESE\b/g,'<span style="font-size:10px;font-weight:700;background:#f1ebfb;color:#6f42c1;border-radius:4px;padding:1px 6px;">BRANCHENHYPOTHESE</span>');
      escaped=escaped.replace(/\bZU KLÄREN\b/g,'<span style="font-size:10px;font-weight:700;background:#fde8e8;color:#c0292b;border-radius:4px;padding:1px 6px;">ZU KLÄREN</span>');
      return escaped;
    } else {
      return escHtml(line);
    }
  }).join('<br>');
}
function highlightConfidenceWords(line){
  let escaped=escHtml(line);
  escaped=escaped.replace(/\bBESTÄTIGT\b/g,'<span style="font-size:9px;font-weight:700;background:rgba(46,160,67,.15);color:#2ea043;border-radius:4px;padding:1px 6px;">BESTÄTIGT</span>');
  escaped=escaped.replace(/\bARBEITSWERT\b/g,'<span style="font-size:9px;font-weight:700;background:rgba(255,107,0,.15);color:#ff6b00;border-radius:4px;padding:1px 6px;">ARBEITSWERT</span>');
  escaped=escaped.replace(/\bZU VALIDIEREN\b/g,'<span style="font-size:9px;font-weight:700;background:rgba(248,81,73,.15);color:#f85149;border-radius:4px;padding:1px 6px;">ZU VALIDIEREN</span>');
  escaped=escaped.replace(/\bBRANCHENHYPOTHESE\b/g,'<span style="font-size:9px;font-weight:700;background:rgba(139,92,246,.15);color:#a78bfa;border-radius:4px;padding:1px 6px;">BRANCHENHYPOTHESE</span>');
  escaped=escaped.replace(/\bZU KLÄREN\b/g,'<span style="font-size:9px;font-weight:700;background:rgba(248,81,73,.15);color:#f85149;border-radius:4px;padding:1px 6px;">ZU KLÄREN</span>');
  return escaped;
}

function getPhaseScoreInfo(sitId){
  if(!state.activeId)return {score:null,reason:''};
  const data=LS.get('ki21_st_'+state.activeId+'_'+sitId,null);
  if(!data||!data.result)return {score:null,reason:''};
  const matches=[...data.result.matchAll(/(\d+)\s*\/\s*10/g)];
  const m=matches.length?matches[0]:null;
  if(!m)return {score:null,reason:''};
  const score=parseInt(m[1]);
  if(score<1||score>10)return {score:null,reason:''};
  return {score,reason:extractBegruendung(data.result)};
}

function getPhaseStatus(sitId){
  if(!state.activeId)return 'empty';
  const data=LS.get('ki21_st_'+state.activeId+'_'+sitId,null);
  if(data&&data.result)return 'done';
  if(data&&data.fv&&Object.values(data.fv).some(v=>v&&v.trim&&v.trim()))return 'progress';
  return 'empty';
}

// Leitet einen echten Fortschritts-Prozentsatz aus den bereits vorhandenen Eingabefeldern
// (SITS[].felder, ohne post-Felder) ab. Keine erfundene Zahl — 0/100 für leer/abgeschlossen.
function getPhaseProgressPct(sitId){
  const sit=SITS[sitId];
  if(!state.activeId||!sit)return 0;
  const data=LS.get('ki21_st_'+state.activeId+'_'+sitId,null);
  if(!data)return 0;
  if(data.result)return 100;
  const fields=(sit.felder||[]).filter(f=>!f.post);
  if(!fields.length)return 0;
  const filled=fields.filter(f=>data.fv&&data.fv[f.id]&&data.fv[f.id].trim&&data.fv[f.id].trim()).length;
  return Math.round((filled/fields.length)*100);
}

    {label:'Angebot & Abschluss', icon:'🤝', primary:4, sub:'Phase 5'},
  ];

  groups.forEach(g=>{
    const status=getPhaseStatus(g.primary);
    const hasResult=status==='done';
    let pressTimer=null;
    let suppressClick=false;
    const startPress=(e)=>{
      if(!hasResult)return;
      pressTimer=setTimeout(()=>{
        suppressClick=true;
        const ok=confirm('Ergebnis dieser Phase zurücksetzen? Eingaben bleiben erhalten.');
        if(ok){
          const KEY='ki21_st_'+state.activeId+'_'+g.primary;
          const data=LS.get(KEY,{});
          data.result='';data.result2='';data.summary='';data.detail='';
          LS.set(KEY,data);
          renderHome();
        } else {
          setTimeout(()=>{suppressClick=false;},100);
        }
      },550);
    };
    const cancelPress=()=>{if(pressTimer)clearTimeout(pressTimer);};
    const iconTileClass='home-icon-tile'+(status==='done'?' is-done':status==='progress'?' is-progress':'');
    const numClass='home-station-num'+(status==='done'?' is-done':status==='progress'?' is-progress':'');
    const pillClass='home-status-pill '+status;
    const pillIcon=status==='done'?'✓':(status==='progress'?'⏳':'○');
    const pillText=status==='done'?'Abgeschlossen':(status==='progress'?'In Bearbeitung':'Noch nicht begonnen');
    const pct=status==='empty'?0:getPhaseProgressPct(g.primary);
    const sit=SITS[g.primary];
    const rightCol=h('div',{className:'home-station-right'},
      h('span',{className:pillClass},h('span',{},pillIcon),h('span',{},pillText))
    );
    if(status!=='empty'){
      rightCol.appendChild(h('div',{className:'home-progress-row'},
        h('div',{className:'home-progress-track'},
          h('div',{className:'home-progress-fill '+status,style:{width:pct+'%'}})),
        h('span',{className:'home-progress-pct'},pct+'%')
      ));
    }
    const row=h('div',{className:'home-station-row',
      style:{userSelect:'none',WebkitUserSelect:'none',WebkitTouchCallout:'none'},
      onclick:(e)=>{
      if(suppressClick){suppressClick=false;return;}
      if(!state.activeId){state.pendingSit=g.primary;showKunde();}
      else renderStation(g.primary);
    }},
      h('span',{className:iconTileClass},g.icon),
      h('span',{className:numClass},String(g.primary+1)),
      h('div',{style:{flex:1,minWidth:0}},
        h('div',{className:'home-station-title'},g.label),
        h('div',{className:'home-station-sub2'},(sit&&sit.regel)||g.sub)
      ),
      rightCol,
      h('span',{className:'sit-arrow'},'›')
    );
    row.addEventListener('touchstart',startPress);
    row.addEventListener('touchend',cancelPress);
    row.addEventListener('touchmove',cancelPress);
    row.addEventListener('mousedown',startPress);
    row.addEventListener('mouseup',cancelPress);
    row.addEventListener('mouseleave',cancelPress);
    row.addEventListener('contextmenu',e=>e.preventDefault());
    wrap.appendChild(row);
  });

  wrap.appendChild(h('div',{className:'tagline'},'Verstehen. Fragen. Strategie.'));
  app.appendChild(nav);
  app.appendChild(wrap);
  LS.set('ki21_view','home');
}

// Aktualisiert Ring/Score/Label/Subline in der Hero-Card mit den bereits berechneten
// getOpportunityHealth()-Werten. No-op auf allen anderen Screens.
function updateHomeHeroHealthVisual(){
  const scoreEl=document.getElementById('home-health-score');
  if(!scoreEl)return;
  const ringEl=document.getElementById('home-health-ring');
  const labelEl=document.getElementById('home-health-label');
  const subEl=document.getElementById('home-health-sub');
  const aid=LS.get('ki21_aid',null);
  const health=aid?getOpportunityHealth(aid):null;

  if(!health){
    scoreEl.textContent='–';
    if(ringEl)ringEl.style.background='var(--bg3)';
    if(labelEl){labelEl.textContent='–';labelEl.style.color='var(--text2)';}
    if(subEl)subEl.textContent='Noch keine Bewertung';
    return;
  }
  const color=getHealthColor(health.score);
  scoreEl.textContent=String(health.score);
  scoreEl.style.color=color;
  if(ringEl){
    const pct=Math.max(0,Math.min(100,health.score));
    ringEl.style.background='conic-gradient('+color+' '+pct+'%, var(--bg3) '+pct+'%)';
  }
  if(labelEl){labelEl.textContent=health.label||'–';labelEl.style.color=color;}
  if(subEl){
    const warnCount=(health.warning||[]).filter(s=>!s.disabled).length;
    subEl.textContent=warnCount>0
      ?(warnCount===1?'1 Risiko erkannt':warnCount+' Risiken erkannt')
      :'Keine Risiken erkannt';
  }
}

async function runAutopilot(){
  const cust=getActiveCust();
  const mu=LS.get('ki21_mu',{});
  const kk=LS.get('ki21_kk_'+state.activeId,'');
  const phaseNamesShort=['Qualifizierung','Bedarfsanalyse','Termin nachbereiten','Nutzen-Kosten-Analyse','Angebot & Abschluss'];

  const app=document.getElementById('app');
  app.innerHTML='';
  const progBox=h('div',{style:{padding:'20px 16px',maxWidth:'500px',margin:'0 auto'}});
  progBox.appendChild(h('div',{style:{fontSize:'15px',fontWeight:'800',marginBottom:'14px'}},
    '🔍 KI21 erstellt Ihre Opportunity-Vorschau'));
  const stepEls=[];
  for(let i=0;i<5;i++){
    const stepEl=h('div',{style:{fontSize:'13px',padding:'8px 0',color:'var(--text2)'}},
      '⏳ '+phaseNamesShort[i]);
    stepEls.push(stepEl);
    progBox.appendChild(stepEl);
  }
  app.appendChild(progBox);

  // Non-invasive: only READ Phase 1 (Qualifizierung) input fields, never write to real phase data
  const phase1Data=LS.get('ki21_st_'+state.activeId+'_0',{fv:{},result:''});
  const dossierResults=[];
  let prevResult='';

  for(let i=0;i<5;i++){
    const sit=SITS[i];
    // Build a synthetic field-value object for this phase, fed only by the chain of previous in-memory results
    let fv={};
    if(i===0){
      fv=phase1Data.fv||{};
    } else {
      const textFieldId=sit.felder.find(f=>f.t==='ta'&&!f.readonly);
      const ctxFieldId=sit.felder.find(f=>f.readonly);
      if(ctxFieldId)fv[ctxFieldId.id]=prevResult;
      if(textFieldId)fv[textFieldId.id]=prevResult;
      // For phases with additional fields (e.g. paket/budget in Phase 4/5), leave them empty -
      // the Opportunity-Vorschau prompt rules instruct the model to use BRANCHENHYPOTHESE for missing data.
    }

    const stk='';
    try{
      const prompt=sit.build(fv,cust,mu,kk,stk);
      const result=await callClaude(prompt,null);
      if(result){
        dossierResults.push({title:sit.title,result});
        prevResult=result;
        stepEls[i].textContent='✓ '+phaseNamesShort[i];
        stepEls[i].style.color='#2ea043';
      } else {
        dossierResults.push({title:sit.title,result:'(Keine Antwort erhalten)'});
        stepEls[i].textContent='⚠️ '+phaseNamesShort[i]+' (fehlgeschlagen)';
        stepEls[i].style.color='#f85149';
      }
    }catch(e){
      dossierResults.push({title:sit.title,result:'(Fehler: '+e.message+')'});
      stepEls[i].textContent='⚠️ '+phaseNamesShort[i]+' (Fehler: '+e.message+')';
      stepEls[i].style.color='#f85149';
    }
  }

  progBox.appendChild(h('div',{style:{fontSize:'14px',fontWeight:'700',color:'#2ea043',marginTop:'16px'}},
    '✅ Opportunity-Vorschau erfolgreich erstellt.'));
  // Automatically download as PDF/HTML so the result is never lost
  exportAutopilotPDF(cust,dossierResults);
  progBox.appendChild(h('div',{style:{fontSize:'11px',color:'var(--text2)',marginTop:'6px'}},
    '📄 Vorschau wurde automatisch heruntergeladen.'));
  const showBtn=h('button',{className:'btn-o',style:{marginTop:'14px',width:'100%'},
    onclick:()=>showAutopilotDossier(cust,dossierResults)
  },'Vorschau ansehen →');
  progBox.appendChild(showBtn);
  // Keep results available for immediate PDF export without re-running
  state.lastAutopilotDossier={cust,dossierResults};
}

function transferAndGo(fromId, toId, result){
  // Direct transfer - output is already compact
  const nextKEY='ki21_st_'+state.activeId+'_'+toId;
  const nextData=LS.get(nextKEY,{fv:{},result:''});

  const fieldMap={
    1:{f1:'kontext'}
  };

  // Phase 1→2: transfer SPIN-Fragen + Antworten
  if(fromId===0){
    const curKEY='ki21_st_'+state.activeId+'_0';
    const curData=LS.get(curKEY,{fv:{},result:''});
    // Extract SPIN questions from result
    const lines=result.split('\n');
    const spinKeywords=['DIE 5 WICHTIGSTEN FRAGEN','SPIN-FRAGEN','BEDARFSANALYSE-FRAGEN'];
    let splitIdx=-1;
    for(const kw of spinKeywords){
      splitIdx=lines.findIndex(l=>l.toUpperCase().includes(kw));
      if(splitIdx>=0)break;
    }
    // If no SPIN found, use full result as spin
    let spinText=splitIdx>=0?lines.slice(splitIdx).join('\n').trim():result;
    spinText=spinText.replace(/^###DETAILS###\s*\n?/,'').trim();
    nextData.fv['spin']=spinText;
    LS.set(nextKEY,nextData);
    state.pendingSit=null;
    renderStation(toId);
    return;
  }

  // Phase 2→3 (Nachbereitung → Nutzen-Kosten-Analyse): KPI-Extraktion statt Volltext
  if(fromId===2&&toId===3){
    nextData.fv['erkenntnisse']='⏳ KPIs werden extrahiert...';
    LS.set(nextKEY,nextData);
    renderStation(toId);

    (async()=>{
      const {main:resultMain,details:resultDetails}=splitDetailsFromResult(result);
      const fullSource=resultMain+(resultDetails?'\n'+resultDetails:'');
      const kpiPrompt=`Hier ist ein Besuchsbericht aus einem Kundentermin:\n\n${fullSource}\n\nExtrahiere AUSSCHLIESSLICH die konkreten Zahlen, KPIs und wirtschaftlich relevanten Fakten, die der Kunde genannt hat (z.B. Zeitaufwand, Mitarbeiterzahlen, Kosten, Stückzahlen, Fehlerquoten, Durchlaufzeiten).\n\nFormat: kurze Stichpunkte, eine Zahl/Aussage pro Zeile. Keine Einleitung, kein Fließtext. Wenn keine konkreten Zahlen genannt wurden, schreibe: "Keine konkreten KPIs im Gespräch genannt – bitte beim Kunden nachfragen."`;

      try{
        const kpiResult=await callClaude(kpiPrompt,null);
        if(kpiResult){
          const freshData=LS.get(nextKEY,{fv:{},result:''});
          freshData.fv['erkenntnisse']=kpiResult;
          LS.set(nextKEY,freshData);
          renderStation(toId);
        }
      }catch(e){
        const freshData=LS.get(nextKEY,{fv:{},result:''});
        freshData.fv['erkenntnisse']=result;
        LS.set(nextKEY,freshData);
        renderStation(toId);
      }
    })();
    return;
  }

  const map=fieldMap[fromId];
  if(map){
    const {main:transferMain}=splitDetailsFromResult(result);
    nextData.fv[map.f1]=transferMain;
  }

  LS.set(nextKEY,nextData);
  renderStation(toId);
}

          if(splitIdx>=0){

            const berichtText=berichtMatch[1].trim();
            data.fv=data.fv||{};
            data.fv['ergebnis']=berichtText;
            LS.set(KEY,data);

            const berichtField=document.querySelector('textarea[data-fid="ergebnis"]');
            if(berichtField)berichtField.value=berichtText;
          }
        }

            const caseExtractPrompt=`Extrahiere aus dieser Nutzen-Kosten-Analyse die zentralen Case-Annahmen als reines JSON-Objekt, ohne Markdown-Codeblock, ohne Erklärtext davor oder danach.

Format exakt so:
{"manual_effort_range":"<Bandbreite z.B. '300-600 Stunden/Jahr', oder leer falls nicht vorhanden>","working_value":"<verwendeter Arbeitswert/Mittelwert, z.B. '450 Stunden/Jahr'>","adjustment":"<kurze Begründung falls vom Mittelwert abgewichen wurde, sonst 'Mittelwert ohne Anpassung'>","confidence":"<hoch|mittel|niedrig>","monthly_benefit":"<geglätteter Nutzen pro Monat, z.B. '3.200 €/Monat'>","monthly_investment":"<geglättete Investition pro Monat, z.B. '1.389 €/Monat'>","roi_statement":"<1 Satz Nutzen vs Investition>"}

Nur Werte verwenden die im Text unten tatsächlich vorkommen. Wenn ein Feld nicht ermittelbar ist, leeren String verwenden.

Analyse:

              LS.set('ki21_case_assumptions_'+state.activeId,parsed);
            }
          }catch(e){
            // Non-critical: case assumptions extraction failure shouldn't block the main result
          }
        }

        // Populate Weiter-button after fresh generation (was previously only shown on page reload)
        weiterRow.innerHTML='';
        const nextMapAfterGen={};
        if(nextMapAfterGen[sitId]&&!sit.build2){
          const nextIdAfterGen=nextMapAfterGen[sitId].nextId;
          const wbAfterGen=h('button',{
            style:{background:'#ff6b00',border:'none',color:'#fff',borderRadius:'7px',

      }
    }catch(e){

    }finally{
      loading=false;
      genBtn.disabled=false;
      genBtn.textContent=genLabels[sitId]||'⚡ Mit Claude generieren';
    }
  }

  // 5) Eigene Erkenntnisse — Vorschau der bestehenden Ergänzungen (stk), bearbeiten via
  //    bereits vorhandenem showStkModal(). 6) Abschluss-CTA — dieselbe Navigation wie der
  //    "weiter"-Button in der Phasen-Leiste oben, hier nur zusätzlich prominent platziert.
  if(sitId===0){
    const stkBox=h('div',{className:'home-hero',style:{marginTop:'4px',marginBottom:'10px',cursor:'pointer'},
      onclick:()=>showStkModal(sitId,sit.title)});
    stkBox.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('div',{className:'home-section-label',style:{margin:0}},'Eigene Erkenntnisse'),
      h('span',{className:'home-next-link'},'Bearbeiten ›')
    ));
    stkBox.appendChild(h('div',{className:'home-station-sub2',style:{marginTop:'6px',whiteSpace:'normal'}},
      stk?stk:'Noch keine eigenen Notizen erfasst.'));
    wrap.appendChild(stkBox);

    if(sitId<SITS.length-1){
      wrap.appendChild(h('button',{className:'home-next-cta-btn',style:{marginTop:'4px',marginBottom:'14px'},
        onclick:()=>renderStation(sitId+1)},
        h('span',{},'Weiter zu '+SITS[sitId+1].title),h('span',{},'→')));
    }
  }

  app.appendChild(nav);
  app.appendChild(infoRow);
  setTimeout(()=>renderHealthBadgeIfPresent(),0);
  app.appendChild(wrap);
}

function getAccPhaseInfo(accId){
  let furthest=-1;
  for(let i=0;i<5;i++){
    const data=LS.get('ki21_st_'+accId+'_'+i,null);
    if(data&&data.result)furthest=i;
  }
  const health=getOpportunityHealth(accId);
  return {phaseIdx:furthest,health};
}

              h('span',{className:'acc-phase-chip'},phaseLabel),

            h('button',{className:'btn',onclick:e=>{e.stopPropagation();m.remove();showEditKunde(a);}},'\u270E'),

              onclick:e=>{e.stopPropagation();

                  state.accounts=state.accounts.filter(x=>x.id!==a.id);

async function showCRMImport(accId){
  const ta=h('textarea',{
    placeholder:'CRM-Text, LinkedIn-Profil oder beliebige Kundeninformationen hier einfügen...',
    style:{minHeight:'120px',width:'100%'}
  });
  const statusDiv=h('div',{style:{fontSize:'12px',color:'#8b949e',marginTop:'8px'}});
  
  const analyzeBtn=h('button',{className:'btn-o',style:{width:'100%',marginTop:'8px'},
    onclick:async()=>{
      const apiKey=LS.get('ki21_apikey','');
      if(!apiKey){alert('Bitte API Key hinterlegen.');return;}
      if(!ta.value.trim()){alert('Bitte Text einfügen.');return;}
      
      analyzeBtn.textContent='⏳ Analysiere...';
      analyzeBtn.disabled=true;
      
      try{
        const prompt=`Du extrahierst Informationen aus einem Text für ein B2B-Vertriebssystem.

Text:
${ta.value}

WICHTIG: Antworte AUSSCHLIESSLICH mit validem JSON. Kein Markdown. Keine Erklärung. Kein Text davor oder danach. Nur das JSON-Objekt.

{"firma":"","ap":"","branche":"","ma":"","um":"","kontext":"","persoenlich":"","herausforderungen":""}

Fülle die Felder mit den gefundenen Informationen. Leere Felder bleiben leer.

WICHTIG zur Unterscheidung von "kontext" und "herausforderungen":
- "kontext": dauerhafte, strukturelle Informationen über das Unternehmen (Branche, Aufbau, Standorte, Teamgröße, allgemeine Beschreibung der Lage) – Dinge, die über viele Monate gültig bleiben.
- "herausforderungen": konkrete, aktuelle Herausforderungen, Probleme oder Kauftrigger, die JETZT die Vertriebssituation antreiben (z.B. "Forecast-Qualität schlecht", "neues CRM eingeführt aber kaum genutzt", "Geschäftsführer fordert Verbesserung"). Das sind die Dinge, die direkt eine Qualifizierungsfrage auslösen würden.
Ein Text kann Anteile in beiden Feldern haben – verteile sinnvoll, dopple nicht alles in beide Felder.`;

        const resp=await fetch('https://api.anthropic.com/v1/messages',{
          method:'POST',
          headers:{
            'Content-Type':'application/json',
            'x-api-key':apiKey,
            'anthropic-version':'2023-06-01',
            'anthropic-dangerous-direct-browser-access':'true'
          },
          body:JSON.stringify({
            model:'claude-haiku-4-5-20251001',
            max_tokens:1024,
            messages:[{role:'user',content:prompt}]
          })
        });
        
        const data=await resp.json();
        let txt=data.content[0].text.trim();
        // Strip markdown code blocks if present
        txt=txt.replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
        // Extract JSON object if wrapped in other text
        const jsonMatch=txt.match(/\{[\s\S]*\}/);
        if(!jsonMatch)throw new Error('Kein JSON gefunden');
        const parsed=JSON.parse(jsonMatch[0]);
        
        // Update customer data
        const acc=state.accounts.find(a=>a.id===accId);
        if(acc){
          if(parsed.firma)acc.cust.firma=parsed.firma;
          if(parsed.ap)acc.cust.ap=parsed.ap;
          if(parsed.branche)acc.cust.branche=parsed.branche;
          if(parsed.ma)acc.cust.ma=parsed.ma;
          if(parsed.um){
            // Normalize umsatz to readable format
            const rawUm=String(parsed.um).replace(/[^0-9.]/g,'');
            const numUm=parseFloat(rawUm);
            if(numUm>=1000000)acc.cust.um=(numUm/1000000).toFixed(0)+' Mio. €';
            else if(numUm>=1000)acc.cust.um=(numUm/1000).toFixed(0)+' Tsd. €';
            else acc.cust.um=parsed.um;
          }
          LS.set('ki21_acc',state.accounts);
          
          // Update kontext
          if(parsed.kontext||parsed.persoenlich){
            let kk=LS.get('ki21_kk_'+accId,'')||'';
            if(parsed.kontext)kk+=(kk?'\n\n':'')+parsed.kontext;
            if(parsed.persoenlich)kk+=(kk?'\n\nPERSÖNLICH:\n':'')+parsed.persoenlich;
            LS.set('ki21_kk_'+accId,kk);
            refreshOpportunityHealth(accId);
          }

          // Update Phase 1 "Bekannte Herausforderungen / Vermutungen" (mergen, nicht überschreiben)
          if(parsed.herausforderungen){
            const st0=LS.get('ki21_st_'+accId+'_0',{fv:{},result:''});
            if(!st0.fv)st0.fv={};
            st0.fv.info=(st0.fv.info?st0.fv.info+'\n\n':'')+parsed.herausforderungen;
            LS.set('ki21_st_'+accId+'_0',st0);
          }
        }
        
        // Build confirmation
        const lines=[];
        if(parsed.firma)lines.push('✅ Firma: '+parsed.firma);
        if(parsed.ap)lines.push('✅ Ansprechpartner: '+parsed.ap);
        if(parsed.branche)lines.push('✅ Branche: '+parsed.branche);
        if(parsed.ma)lines.push('✅ Mitarbeiter: '+parsed.ma);
        if(parsed.um)lines.push('✅ Umsatz: '+parsed.um);
        if(parsed.kontext)lines.push('✅ Kontext: importiert');
        if(parsed.herausforderungen)lines.push('✅ Herausforderungen (Phase 1): importiert');
        if(parsed.persoenlich)lines.push('✅ Persönliche Infos: importiert');

        statusDiv.innerHTML='<div style="margin-top:10px;padding:10px;background:rgba(46,160,67,.1);border-radius:6px;border:1px solid rgba(46,160,67,.3);">'+
          '<div style="font-size:11px;font-weight:700;color:#2ea043;margin-bottom:6px;letter-spacing:.5px;">IMPORTIERT:</div>'+
          lines.map(l=>'<div style="font-size:12px;color:#e6edf3;padding:2px 0;">'+l+'</div>').join('')+
          '</div>';
        analyzeBtn.textContent='✓ Schließen';
        analyzeBtn.onclick=()=>m.remove();
        
      }catch(e){
        statusDiv.textContent='Fehler: '+e.message;
        analyzeBtn.textContent='CRM-Text analysieren';
        analyzeBtn.disabled=false;
      }
    }
  },'CRM-Text analysieren');
  
  const content=h('div',{},
    h('p',{style:{fontSize:'12px',color:'#8b949e',marginBottom:'8px'}},
      'Fügen Sie beliebigen Text ein – CRM-Export, LinkedIn-Profil, E-Mail oder Notizen. Claude erkennt und verteilt die Informationen automatisch.'),
    ta,
    analyzeBtn,
    statusDiv
  );
  const m=modal('📥 CRM-Text importieren',content,null);
}

function showPDF(title,text,cust){
  const lines=text.split('\n');
  let html='';
  lines.forEach(line=>{
    const t=line.trim();
    if(!t){html+='<br>';return;}
    // Headings
    if(t.startsWith('# ')){html+=`<h1>${t.slice(2)}</h1>`;return;}
    if(t.startsWith('## ')){html+=`<h2>${t.slice(3)}</h2>`;return;}
    // Score line
    if(t.match(/SCORE:\s*\d+\/10/i)){html+=`<p class="score">${t}</p>`;return;}
    // Section headers (ALL CAPS ending with :)
    if(t===t.toUpperCase()&&t.endsWith(':')&&t.length>3){html+=`<h3>${t}</h3>`;return;}
    // BESTÄTIGT / ANNAHME / KLÄREN
    if(t.startsWith('BESTÄTIGT:')||t.startsWith('ANNAHME:')||t.startsWith('KLÄREN:')){
      const parts=t.split(':');
      html+=`<p><strong>${parts[0]}:</strong>${parts.slice(1).join(':')}</p>`;return;
    }
    // TODO / Nächster Schritt line
    if(t.startsWith('→ TODO')||t.startsWith('→')||t.startsWith('NÄCHSTER SCHRITT DIESE WOCHE')||t.startsWith('NÄCHSTE AKTION')){html+=`<p class="todo">${t}</p>`;return;}
    // Numbered items
    if(t.match(/^\d+\./)){html+=`<p class="item">${t}</p>`;return;}
    // Normal
    html+=`<p>${t}</p>`;
  });

  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8">
<title>KI21 – ${title}</title>
<style>
  body{font-family:'Helvetica Neue',Arial,sans-serif;font-size:12px;color:#1a1a1a;
    max-width:700px;margin:40px auto;padding:0 20px;line-height:1.6;}

  .header h1{font-size:20px;color:#ff6b00;margin:0 0 4px;}
  .header .meta{font-size:11px;color:#666;}
  h1{font-size:16px;color:#ff6b00;margin:16px 0 4px;}
  h2{font-size:14px;color:#333;margin:14px 0 4px;}
  h3{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
    color:#666;margin:16px 0 4px;border-bottom:1px solid #eee;padding-bottom:4px;}
  p{margin:4px 0;}
  p.score{font-weight:700;font-size:13px;color:#ff6b00;margin:8px 0;}
  p.item{padding-left:12px;}
  p.todo{background:#fff8f0;border-left:3px solid #ff6b00;padding:6px 10px;margin:12px 0;font-weight:600;}
  .footer{margin-top:30px;padding-top:10px;border-top:1px solid #eee;
    font-size:10px;color:#999;text-align:center;}
  @media print{body{margin:20px;}.no-print{display:none;}}
</style>
</head><body>
<div class="header">

function renderBranchenwissen(text){
  if(!text)return '';
  const lines=text.split('\n');
  let html='';
  let counter=0;
  let inEntry=false;
  lines.forEach(line=>{
    const t=line.trim();
    if(!t)return;
    // Category headers (ALL CAPS followed by colon, optionally with count in parens)
    if(/^[A-ZÄÖÜ\- ]+(\s*\(\d+.*\))?:$/.test(t)){
      if(inEntry)html+='</div>';
      html+=`<div style="margin:14px 0 8px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#ff6b00;border-bottom:1px solid #30363d;padding-bottom:4px;">${t.replace(/:$/,'')}</div>`;
      counter=0;
      inEntry=false;
      return;
    }
    // Field lines like "Pattern: ...", "Kennzahl: ...", "Confidence: ..."
    const fieldMatch=t.match(/^([A-ZÄÖÜa-zäöü]+):\s*(.*)$/);
    if(fieldMatch){
      const field=fieldMatch[1];
      const value=fieldMatch[2];
      if(field==='Pattern'||field==='Kennzahl'||field==='Rolle'||field==='Einwand'||field==='Insight'||field==='Frage'||field==='Titel'||field==='Typ'){
        if(inEntry)html+='</div>';
        counter++;
        html+=`<div style="background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px 10px;margin-bottom:6px;">
          <div style="font-size:11px;font-weight:700;color:#fff;margin-bottom:3px;">${counter}. ${value}</div>`;
        inEntry=true;
      } else if(field==='Confidence'||field==='Status'){
        const badge=value.toLowerCase().includes('hoch')||value.includes('recherchiert')?'🟢':value.toLowerCase().includes('mittel')||value.includes('Erfahrungswissen')?'🟡':'🔴';
        html+=`<div style="font-size:9px;color:#8b949e;margin-top:4px;">${badge} ${value}</div></div>`;
        inEntry=false;
      } else {
        html+=`<div style="font-size:10px;color:#c9d1d9;line-height:1.4;"><span style="color:#8b949e;">${field}:</span> ${value}</div>`;
      }
      return;
    }
    // Fallback: plain line
    html+=`<div style="font-size:10px;color:#c9d1d9;">${t}</div>`;
  });
  if(inEntry)html+='</div>';
  return html;
}

function encodeBase64UTF8(text){
  const bytes=new TextEncoder().encode(text);
  let binary='';
  const chunk=8192;
  for(let i=0;i<bytes.length;i+=chunk){
    binary+=String.fromCharCode(...bytes.subarray(i,i+chunk));
  }
  return btoa(binary);
}

function detectVersionFromHtml(html){
  const m=String(html||'').match(/v\d+\.\d+(?:\s*[A-Za-z0-9_-]+)?/);
  return m?m[0]:'unbekannte Version';
}

async function pushToGitHub(sourceText){
  const token=LS.get('ki21_github_token','');
  if(!token){alert('Bitte zuerst GitHub Token in Einstellungen hinterlegen.');return;}

  if(!sourceText||!String(sourceText).trim()){
    throw new Error('Kein App-Code zum Veröffentlichen vorhanden. Bitte neue index.html in das Update-Feld einfügen.');
  }
  if(!String(sourceText).includes('<!DOCTYPE html')||!String(sourceText).includes('<script>')){
    throw new Error('Der eingefügte Text sieht nicht wie eine vollständige index.html aus.');
  }

  const version=detectVersionFromHtml(sourceText);
  const headers={
    'Authorization':'token '+token,
    'Accept':'application/vnd.github.v3+json',
    'Content-Type':'application/json'
  };

  const shaResp=await fetch('https://api.github.com/repos/KI21-Vertrieb/KI21/contents/index.html',{headers});
  if(!shaResp.ok)throw new Error('GitHub Fehler '+shaResp.status);
  const shaData=await shaResp.json();
  const sha=shaData.sha;

  const encoded=encodeBase64UTF8(sourceText);

  const pushResp=await fetch('https://api.github.com/repos/KI21-Vertrieb/KI21/contents/index.html',{
    method:'PUT',
    headers,
    body:JSON.stringify({
      message:'KI21 '+version+' veröffentlicht – '+new Date().toLocaleDateString('de-DE'),
      content:encoded,
      sha:sha
    })
  });
  if(!pushResp.ok){
    let msg='Push Fehler '+pushResp.status;
    try{const err=await pushResp.json(); if(err&&err.message)msg+=': '+err.message;}catch(e){}
    throw new Error(msg);
  }
  LS.set('ki21_last_published_version',version);
  LS.set('ki21_last_published_at',new Date().toLocaleString('de-DE'));
  return version;
}

async function fetchCurrentPublishedHtml(){
  const resp=await fetch('https://ki21-vertrieb.github.io/KI21/index.html?nocache='+Date.now());
  if(!resp.ok)throw new Error('Aktuelle Live-Version konnte nicht gelesen werden ('+resp.status+').');
  return await resp.text();
}

    onclick:()=>{applyFs('large');m.remove();showSettings();}
  },'Groß');
  const fsRow=h('div',{style:{display:'flex',gap:'8px',marginBottom:'14px'}},fsSmall,fsLarge);

  // Dark/Light mode toggle
  const isDark=!document.body.classList.contains('light');
  const applyMode=(dark)=>{
    if(dark){document.body.classList.remove('light');}
    else{document.body.classList.add('light');}
    LS.set('ki21_theme',dark?'dark':'light');
  };
  const modeLabel=h('div',{style:{fontSize:'11px',color:'#8b949e',marginBottom:'6px'}},'Darstellung');
  const modeDark=h('button',{className:'btn',
    style:{flex:1,fontWeight:isDark?'700':'400',borderColor:isDark?'#ff6b00':'#30363d',color:isDark?'#ff6b00':'#8b949e'},
    onclick:()=>{applyMode(true);m.remove();showSettings();}
  },'🌙 Dark');
  const modeLight=h('button',{className:'btn',
    style:{flex:1,fontWeight:!isDark?'700':'400',borderColor:!isDark?'#ff6b00':'#30363d',color:!isDark?'#ff6b00':'#8b949e'},
    onclick:()=>{applyMode(false);m.remove();showSettings();}
  },'☀️ Light');
  const modeRow=h('div',{style:{display:'flex',gap:'8px',marginBottom:'14px'}},modeDark,modeLight);

  // Opportunity-Vorschau toggle
  const ssActive=LS.get('ki21_schnellstart',false);
  const ssLabel=h('div',{style:{fontSize:'11px',color:'#8b949e',marginBottom:'6px'}},'🔍 Opportunity-Vorschau');
  const ssOff=h('button',{className:'btn',
    style:{flex:1,fontWeight:!ssActive?'700':'400',borderColor:!ssActive?'#ff6b00':'#30363d',color:!ssActive?'#ff6b00':'#8b949e'},
    onclick:()=>{LS.set('ki21_schnellstart',false);m.remove();showSettings();}
  },'AUS');
  const ssOn=h('button',{className:'btn',
    style:{flex:1,fontWeight:ssActive?'700':'400',borderColor:ssActive?'#ff6b00':'#30363d',color:ssActive?'#ff6b00':'#8b949e'},
    onclick:()=>{LS.set('ki21_schnellstart',true);m.remove();showSettings();}
  },'EIN');
  const ssRow=h('div',{style:{display:'flex',gap:'8px',marginBottom:'6px'}},ssOff,ssOn);
  const ssDesc=h('div',{style:{fontSize:'10px',color:'#8b949e',marginBottom:'14px',lineHeight:'1.4'}},
    'Wenn aktiv, erscheint in Phase 1 ein Button für eine erste Opportunity-Vorschau auf Basis von Branchenwissen und Arbeitshypothesen. Ersetzt nicht die vollständige Qualifizierung – empfohlen für kleinere oder frühe Leads, nicht für strategisch wichtige Opportunities.');
  let newKey='';
  const inp=h('input',{type:'password',placeholder:'sk-ant-api03-...'});
  inp.style.marginTop='8px';
  inp.addEventListener('input',e=>newKey=e.target.value);
  const saveB=h('button',{className:'btn-o',style:{marginTop:'10px'},onclick:()=>{
    if(!newKey.trim())return;
    LS.set('ki21_apikey',newKey.trim());
    m.remove();
    alert('✅ API Key gespeichert');
  }},'API Key speichern');
  const status=h('div',{className:'status-box',
    style:{background:hasKey?'rgba(46,160,67,.12)':'rgba(255,107,0,.12)',
      border:'1px solid '+(hasKey?'rgba(46,160,67,.3)':'rgba(255,107,0,.3)'),
      marginBottom:'12px'}},
    h('div',{style:{fontSize:'20px',marginBottom:'4px'}},hasKey?'✅':'⚠️'),
    h('div',{style:{fontSize:'13px',fontWeight:'700',color:hasKey?'#2ea043':'#ff6b00'}},
      hasKey?'API Key hinterlegt':'Kein API Key'),
    h('div',{style:{fontSize:'11px',color:'#8b949e',marginTop:'2px'}},
      'Claude Haiku · ~0,02 € / Anfrage')
  );
  const menuItems=h('div',{style:{display:'flex',flexDirection:'column',gap:'8px',marginBottom:'14px'}},
    h('div',{className:'settings-group-title'},'Unternehmen & Daten'),
    h('button',{className:'btn',style:{width:'100%',textAlign:'left'},
      onclick:()=>{m.remove();showMeinUnternehmen();}},
      '🏢  Mein Unternehmen'),
    h('button',{className:'btn',style:{width:'100%',textAlign:'left'},
      onclick:()=>{m.remove();showMeinUnternehmen('bausteine');}},
      '📦  Angebotsbausteine'),
    h('button',{className:'btn',style:{width:'100%',textAlign:'left'},
      onclick:()=>{m.remove();showExport();}},
      '↑  Backup erstellen'),
    h('button',{className:'btn',style:{width:'100%',textAlign:'left'},
      onclick:()=>{m.remove();showImport();}},
      '↓  Backup wiederherstellen')
  );
  const content=h('div',{},menuItems,
    h('div',{className:'settings-group-title',style:{marginTop:'6px'}},'Darstellung'),
    fsLabel,fsRow,
    modeLabel,modeRow,
    h('div',{className:'settings-group-title',style:{marginTop:'6px'}},'Funktionen'),
    ssLabel,ssRow,ssDesc,
    h('div',{className:'settings-group-title',style:{marginTop:'6px'}},'API-Zugang'),
    status,
    h('div',{className:'field-label'},hasKey?'Neuen Key eingeben':'Key eingeben'),
    inp,
    h('p',{style:{fontSize:'11px',color:'#484f58',margin:'6px 0 0',lineHeight:'1.5'}},
      'Sicher gespeichert. Nie übertragen.'),
    saveB
  );
  if(hasKey){
    content.appendChild(h('button',{className:'btn',
      style:{width:'100%',marginTop:'8px'},
      onclick:()=>{if(confirm('API Key löschen?')){LS.set('ki21_apikey','');m.remove();}}},
      'API Key löschen'));
  }
  content.appendChild(h('div',{style:{borderTop:'1px solid #30363d',marginTop:'14px',paddingTop:'14px'}}));
  content.appendChild(h('button',{className:'btn',
    style:{width:'100%',background:'var(--bg3)'},
    onclick:()=>{m.remove();showGitHub();}},
    '🐙 GitHub Auto-Deploy'));
  content.appendChild(h('button',{className:'btn',
    style:{width:'100%',marginTop:'8px'},
    onclick:()=>{
      m.remove();
      const currentView=LS.get('ki21_view','home');
      if(currentView==='home')renderHome();
      else renderStation(currentView);
    }},
    'Schließen'));
  const m=modal('Einstellungen',content,()=>{
    const currentView=LS.get('ki21_view','home');
    if(currentView==='home')renderHome();
    else renderStation(currentView);
  });
}


function showExport(){
  const data={accounts:state.accounts,activeId:state.activeId,mu:LS.get('ki21_mu',{}),stationData:{},kontextData:{}};
  state.accounts.forEach(acc=>{
    for(let i=0;i<5;i++){
      const sval=LS.get('ki21_st_'+acc.id+'_'+i,null);
      if(sval)data.stationData['ki21_st_'+acc.id+'_'+i]=sval;
      const kval=LS.get('ki21_stk_'+acc.id+'_'+i,null);
      if(kval)data.kontextData['ki21_stk_'+acc.id+'_'+i]=kval;
    }
    const kkval=LS.get('ki21_kk_'+acc.id,null);
    if(kkval)data.kontextData['ki21_kk_'+acc.id]=kkval;
  });
  const txt=JSON.stringify(data);
  let copied=false;
  const copyB=h('button',{className:'btn-o',onclick:()=>{
    universalCopy(txt,()=>{copyB.textContent='✓ Kopiert';setTimeout(()=>copyB.textContent='Backup kopieren',2000);});
  }},'Backup kopieren');
  const content=h('div',{},
    h('div',{className:'status-box',style:{background:'#1c2333',border:'1px solid #30363d'}},
      h('div',{style:{fontSize:'28px',marginBottom:'6px'}},'💾'),
      h('div',{style:{fontSize:'14px',fontWeight:'700',color:'#e6edf3',marginBottom:'4px'}},
        state.accounts.length+' Kunde'+(state.accounts.length!==1?'n':'')+' gespeichert'),
      h('div',{style:{fontSize:'11px',color:'#8b949e'}},
        new Date().toLocaleDateString('de-DE')+' · '+new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})+' Uhr')
    ),
    h('p',{className:'modal-desc',style:{textAlign:'center',marginBottom:'12px'}},
      'Backup kopieren → in Notizen → über Import wiederherstellen.'),
    copyB
  );
  modal('Daten exportieren',content,null);
}

function showImport(){
  const ta=h('textarea',{placeholder:'Export-Text hier einfügen...',style:{minHeight:'80px'}});
  const content=h('div',{},
    h('p',{className:'modal-desc'},'Export-Text einfügen und importieren.'),
    ta,
    h('div',{className:'modal-row',style:{marginTop:'8px'}},
      h('button',{className:'btn-o',style:{flex:'1'},onclick:()=>{
        try{
          const d=JSON.parse(ta.value);
          if(d.accounts){state.accounts=d.accounts;LS.set('ki21_acc',d.accounts);}
          if(d.activeId){state.activeId=d.activeId;LS.set('ki21_aid',d.activeId);}
          if(d.mu){LS.set('ki21_mu',d.mu);}
          if(d.stationData){Object.keys(d.stationData).forEach(k=>LS.set(k,d.stationData[k]));}
          if(d.kontextData){Object.keys(d.kontextData).forEach(k=>LS.set(k,d.kontextData[k]));}
          m.remove();renderHome();
        }catch(e){alert('Ungültiger Text.');}
      }},'Importieren'),
      h('button',{className:'btn',onclick:()=>m.remove()},'Abbrechen')
    )
  );
  const m=modal('Daten importieren',content,null);
}

const savedFs=LS.get('ki21_fontsize','small');
document.documentElement.style.setProperty('--fs-input',savedFs==='large'?'15px':'12px');

const savedTheme=LS.get('ki21_theme','dark');
if(savedTheme==='light')document.body.classList.add('light');

const savedView=LS.get('ki21_view','home');
if(typeof savedView==='number'&&state.activeId){
  renderStation(savedView);
} else {
  renderHome();
}
