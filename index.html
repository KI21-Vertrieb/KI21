<style>

.card{border:1px solid rgba(156,168,184,.2);background:linear-gradient(145deg,rgba(23,30,42,.96),rgba(12,17,25,.94));border-radius:18px;padding:15px;margin-bottom:12px;box-shadow:0 14px 34px rgba(0,0,0,.26),inset 0 1px 0 rgba(255,255,255,.035)}.card.blue{border-color:rgba(116,174,247,.28)}.card.red{border-color:rgba(255,123,114,.28)}.card.green{border-color:rgba(85,211,138,.28)}.card.violet{border-color:rgba(176,154,248,.3)}.card.orange{border-color:rgba(255,122,26,.35)}.kicker{font-size:10px;font-weight:950;letter-spacing:1.45px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}.blue .kicker{color:var(--blue)}.red .kicker{color:var(--red)}.green .kicker{color:var(--green)}.violet .kicker{color:var(--violet)}.orange .kicker{color:#ff9b45}.headline{font-size:18px;line-height:1.3;font-weight:900;letter-spacing:-.25px}.body{font-size:13px;line-height:1.48;color:#e8edf4}.muted{color:var(--muted)}.divider{height:1px;background:rgba(156,168,184,.16);margin:12px 0}.label{font-size:9px;text-transform:uppercase;letter-spacing:1.1px;font-weight:900;color:var(--muted);margin-bottom:4px}.value{font-size:14px;line-height:1.42;font-weight:760}.summary-row{padding:10px 0;border-top:1px solid rgba(156,168,184,.16)}.summary-row:first-of-type{border-top:0;padding-top:0}.summary-row.insight .label{color:var(--orange)}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.list{display:flex;flex-direction:column;gap:9px}.item{position:relative;padding-left:16px;font-size:12.5px;line-height:1.42}.item:before{content:'В·';position:absolute;left:2px;color:var(--muted)}.item.primary{padding:11px 30px 11px 34px;border:1px solid rgba(176,154,248,.3);border-radius:13px;background:rgba(176,154,248,.09);font-weight:850}.item.primary:before{content:'1';top:12px;left:10px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(176,154,248,.2);color:#dfd5ff;font-size:9px;font-weight:950}.item.primary:after{content:'вҖә';position:absolute;right:12px;color:var(--violet)}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:4px 8px;font-size:9px;font-weight:900;border:1px solid var(--line);color:var(--muted)}.badge.ok{color:var(--green);border-color:rgba(85,211,138,.35);background:rgba(85,211,138,.09)}.badge.warn{color:var(--yellow);border-color:rgba(216,165,58,.35);background:rgba(216,165,58,.09)}.badge.risk{color:var(--red);border-color:rgba(255,123,114,.35);background:rgba(255,123,114,.09)}

.modal{position:fixed;inset:0;z-index:100;background:rgba(4,7,11,.9);display:flex;align-items:flex-end;justify-content:center}.modal.hidden{display:none}.sheet{width:100%;max-width:720px;max-height:93vh;overflow:auto;background:#111722;border:1px solid var(--line);border-bottom:0;border-radius:22px 22px 0 0;padding:16px 14px max(28px,env(safe-area-inset-bottom))}.sheet-title{font-size:19px;font-weight:950;margin-bottom:6px}.sheet-sub{font-size:12px;color:var(--muted);line-height:1.45;margin-bottom:12px}textarea{width:100%;min-height:260px;border:1px solid var(--line);border-left:3px solid rgba(255,122,26,.7);border-radius:12px;background:#0d131d;color:var(--text);padding:12px;line-height:1.55;outline:none;resize:vertical}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.btn{min-height:42px;border-radius:12px;border:1px solid var(--line);background:var(--surface2);color:var(--text);font-weight:850;cursor:pointer}.btn.primary{background:var(--orange);border-color:var(--orange);color:#fff}.btn.danger{color:var(--red);border-color:rgba(255,123,114,.35);background:rgba(255,123,114,.06)}.full{grid-column:1/-1}.field{margin-bottom:11px}.field label{display:block;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:900;margin-bottom:5px}.field input{width:100%;min-height:40px;border-radius:11px;border:1px solid var(--line);border-left:3px solid rgba(255,122,26,.65);background:#0d131d;color:var(--text);padding:9px 11px;outline:none}
.report{white-space:pre-wrap;font-size:12px;line-height:1.58;background:#0d131d;border:1px solid var(--line);border-radius:12px;padding:13px;max-height:55vh;overflow:auto}.toast{position:fixed;left:50%;bottom:max(28px,calc(16px + env(safe-area-inset-bottom)));transform:translateX(-50%);z-index:200;background:#171e2a;border:1px solid rgba(255,122,26,.45);border-radius:999px;padding:10px 14px;font-size:12px;font-weight:850;opacity:0;pointer-events:none;transition:.18s}.toast.show{opacity:1;transform:translate(-50%,-4px)}.empty{text-align:center;padding:38px 20px;color:var(--muted)}.footer{margin:28px 0 0;text-align:center;font-size:9px;color:#687384}

.phase-page-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}.back-btn{width:38px;height:38px;border-radius:12px;border:1px solid var(--line);background:var(--surface);color:var(--text);font-size:22px;font-weight:900;cursor:pointer}.phase-page-title{font-size:19px;font-weight:950}.phase-page-sub{font-size:11px;color:var(--muted);margin-top:2px}.opp-hub-active{border:1px solid rgba(255,122,26,.42);background:rgba(255,122,26,.08);border-radius:14px;padding:12px;margin-bottom:12px}.opp-hub-name{font-size:15px;font-weight:950}.opp-hub-sub{font-size:10px;color:var(--muted);margin-top:3px}.opp-list{display:flex;flex-direction:column;gap:7px;margin:10px 0}.opp-row{width:100%;text-align:left;padding:11px 12px;border:1px solid var(--line);border-radius:12px;background:var(--surface2);color:var(--text);cursor:pointer}.opp-row.active{border-color:rgba(255,122,26,.55);background:rgba(255,122,26,.08)}.opp-row-title{font-size:13px;font-weight:900}.opp-row-sub{font-size:9.5px;color:var(--muted);margin-top:3px}.sheet .btn{touch-action:manipulation}

.phase-editor{margin-top:12px}.phase-editor textarea{min-height:180px}.phase-save-state{font-size:10px;color:var(--muted);margin-top:7px}.phase-nav-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}.opp-row{position:relative}.opp-row.active:after{content:'AKTIV';position:absolute;right:10px;top:10px;font-size:8px;font-weight:950;letter-spacing:.8px;color:#ff9b45}.opp-row-title{padding-right:54px}.opp-row-meta{font-size:8.8px;color:#718094;margin-top:5px}.opp-empty{font-size:12px;color:var(--muted);padding:12px 2px}.manage-note{font-size:10px;color:var(--muted);line-height:1.4;padding:8px 10px;border:1px solid rgba(156,168,184,.14);border-radius:10px;background:rgba(255,255,255,.018);margin-bottom:10px}

<div id="app" class="app"></div>

<script>
'use strict';
const VERSION='KI21 Core 8.0.3 В· WORKFLOW & OPPORTUNITY STABILITY';
const STORE_KEY='ki21_core8_state_v1';
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const now=()=>new Date().toISOString();
const normalize=s=>String(s||'').replace(/\r/g,'').trim();
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}
function load(){try{return JSON.parse(localStorage.getItem(STORE_KEY))||null}catch(e){return null}}
function save(){try{localStorage.setItem(STORE_KEY,JSON.stringify(state))}catch(e){console.warn('KI21 storage unavailable',e.message)}}
const DEMO=`Unternehmen\nFirmenname: Novacore Systems GmbH\nBranche: B2B Software\n\nOpportunity\nOpportunity-Name: KI21 Pilot Opportunity-Steuerung\nPhase: Qualifizierung\n\nStakeholder\nThomas Reuter вҖ“ Vertriebsleiter вҖ“ fachlicher Sponsor\nDr. Miriam Albrecht вҖ“ GeschГӨftsfГјhrerin Finanzen & Operations вҖ“ wirtschaftliche Entscheiderin вҖ“ noch nicht eingebunden\nJana Wolf вҖ“ Sales Operations вҖ“ technische und operative PrГјferin\n\nSchmerz und Aufwand\n110 Stunden Zusatzaufwand pro Monat: 55 Stunden Deal-Reviews, 35 Stunden Forecast-Korrektionen, 20 Stunden Datenaufbereitung.\nIm Vorjahr wurden 27 Opportunities verloren oder deutlich verschoben. Bei 4вҖ“6 davon hГӨtten Risiken mГ¶glicherweise frГјher erkannt werden kГ¶nnen. Ob dadurch Verluste vermieden worden wГӨren, ist nicht bestГӨtigt.\n\nBudget und Entscheidung\nBudgetrahmen bis 50.000 Euro vorhanden. Konkrete Investitionsfreigabe durch Dr. Albrecht ist offen.\nDie GeschГӨftsfГјhrerin kennt die 110-Stunden-Analyse noch nicht.\nErfolgskriterien wurden intern diskutiert, aber nicht mit der wirtschaftlichen Entscheiderin bestГӨtigt.\n\nPilot\nGeplant: 8 Nutzer, echte Enterprise-Deals, Wirkung im Pilot messen. Konkreter Angebotspreis noch offen.`;
function blankState(){return{activeId:null,opportunities:{},view:'cockpit'}}
let state=load()||blankState();
function newOpportunity(raw){const id=uid();const parsed=parseImport(raw);state.opportunities[id]={id,createdAt:now(),updatedAt:now(),raw,parsed,evidence:parsed.evidence};state.activeId=id;state.view='cockpit';save();return id}
function current(){return state.opportunities[state.activeId]||null}
function evidence(type,value,status='confirmed',source='CRM-Import'){return{id:uid(),type,value,status,source,createdAt:now()}}
function matchValue(text,patterns){for(const p of patterns){const m=text.match(p);if(m&&m[1])return normalize(m[1])}return''}
function parseImport(raw){const text=normalize(raw);const low=text.toLowerCase();const company=matchValue(text,[/firmenname\s*:\s*([^\n]+)/i,/unternehmen\s*:\s*([^\n]+)/i]);const name=matchValue(text,[/opportunity(?:-name)?\s*:\s*([^\n]+)/i,/projekt(?:name)?\s*:\s*([^\n]+)/i])||'Neue Opportunity';const phase=matchValue(text,[/phase\s*:\s*([^\n]+)/i,/opportunity-status\s*:\s*([^\n]+)/i])||'Qualifizierung';
const hours=(text.match(/(\d{1,4})\s*stunden[^\n.]{0,60}(?:pro|je)\s*monat/i)||[])[1]||'';const lost=(text.match(/(\d{1,4})\s+(?:grГ¶Гҹere\s+)?opportunit(?:y|ies)[^\n.]{0,80}(?:verloren|verschoben)/i)||[])[1]||'';const possible=(text.match(/(?:bei\s*)?(\d+\s*(?:-|вҖ“|bis)\s*\d+)\s+(?:davon|opportunit)/i)||[])[1]||'';const budget=(text.match(/(?:budgetrahmen|budget)[^\n.]{0,40}(?:bis|von)?\s*([\d.]+)\s*(?:вӮ¬|euro)/i)||[])[1]||'';
const approvalOpen=/(konkrete\s+)?(?:investitions|pilot)?freigabe[^.!?]{0,100}(offen|noch nicht|steht aus|nicht erteilt)/i.test(text)||/(pilot|investition)[^.!?]{0,100}(noch nicht freigegeben|nicht freigegeben)/i.test(text);const approvalConfirmed=!approvalOpen&&/(investitions|pilot)?freigabe[^.!?]{0,80}(erteilt|bestГӨtigt|erfolgt)|(?:pilot|auftrag)[^.!?]{0,80}(beauftragt|freigegeben)/i.test(text);
const economicBuyerName=(text.match(/(?:dr\.\s*)?[A-ZГ„Г–Гң][\wГ„Г–ГңГӨГ¶ГјГҹ.-]+\s+[A-ZГ„Г–Гң][\wГ„Г–ГңГӨГ¶ГјГҹ.-]+[^\n]{0,80}(?:wirtschaftliche\s+entscheider|geschГӨftsfГјhr)/i)||[])[0]||'';const economicBuyerOpen=/(geschГӨftsfГјhr|wirtschaftliche\s+entscheider)[^.!?]{0,150}(noch nicht eingebunden|kennt .* noch nicht|nicht beteiligt|noch nicht gehГ¶rt)/i.test(text);const sponsor=/(sponsor|fachlicher\s+sponsor)/i.test(text);const successOpen=/(erfolgskriterien|messgrГ¶Гҹen)[^.!?]{0,140}(noch nicht|nicht .* bestГӨtigt|offen|intern diskutiert)/i.test(text);const priceOpen=/(angebotspreis|konkrete kosten|pilotpreis)[^.!?]{0,100}(offen|nicht hinterlegt|noch nicht)/i.test(text);
const ev=[];if(company)ev.push(evidence('company',company));if(hours)ev.push(evidence('monthly_hours',Number(hours)));if(lost)ev.push(evidence('lost_opportunities',Number(lost)));if(possible)ev.push(evidence('possible_early_detection',possible,'hypothesis'));if(budget)ev.push(evidence('budget_ceiling',Number(budget.replace(/\./g,''))));ev.push(evidence('approval',approvalConfirmed?'confirmed':approvalOpen?'open':'unknown',approvalConfirmed?'confirmed':'open'));ev.push(evidence('economic_buyer',economicBuyerOpen?'not_involved':economicBuyerName?'identified':'unknown',economicBuyerOpen?'open':economicBuyerName?'confirmed':'open'));ev.push(evidence('sponsor',sponsor?'present':'unknown',sponsor?'confirmed':'open'));ev.push(evidence('success_criteria',successOpen?'open':'unknown','open'));if(priceOpen)ev.push(evidence('price','open','open'));
return{company:company||'Unbekanntes Unternehmen',name,phase,hours:Number(hours||0),lost:Number(lost||0),possible,budget:Number((budget||'0').replace(/\./g,'')),approvalOpen,approvalConfirmed,economicBuyerOpen,economicBuyerName,sponsor,successOpen,priceOpen,evidence:ev};}
function derive(opp){const p=opp.parsed;const approval=p.approvalConfirmed?'confirmed':p.approvalOpen?'open':'unknown';const buyer=p.economicBuyerOpen?'not_involved':p.economicBuyerName?'identified':'unknown';const businessCase=p.hours>0?'problem_quantified':'unquantified';let score=20;if(p.hours)score+=15;if(p.lost)score+=10;if(p.sponsor)score+=12;if(p.budget)score+=8;if(buyer==='identified')score+=8;if(buyer==='not_involved')score-=5;if(p.successOpen)score-=4;if(approval==='confirmed')score+=25;if(approval==='open')score-=4;score=Math.max(10,Math.min(95,score));let readiness=score;if(approval!=='confirmed')readiness=Math.min(readiness,64);if(buyer==='not_involved')readiness=Math.min(readiness,58);let forecast=Math.max(10,Math.round(readiness*.78));const dealStatus=approval==='confirmed'?'Beauftragt В· Projektstart vorbereiten':approval==='open'?'Pilotentscheidung vorbereiten':'Qualifizierung В· Entscheidungsweg klГӨren';return{approval,buyer,businessCase,score,readiness,forecast,dealStatus};}
function runEngines(opp,ds){const p=opp.parsed;const blocker=ds.approval==='open'?(ds.buyer==='not_involved'?'Die wirtschaftliche Entscheiderin hat Problem, Nutzen und Freigabeweg noch nicht persГ¶nlich validiert.':'Die konkrete Investitionsfreigabe steht noch aus.'):ds.approval==='confirmed'?'Start, Messung und Verantwortlichkeiten mГјssen jetzt verbindlich abgesichert werden.':'Der verbindliche Entscheidungsweg ist noch nicht vollstГӨndig geklГӨrt.';const recommendation=ds.approval==='confirmed'?'Kickoff, Baseline, Messkriterien, Datenquellen und Verantwortlichkeiten schriftlich bestГӨtigen.':'Einen gemeinsamen Entscheidungstermin mit Sponsor und wirtschaftlicher Entscheiderin vereinbaren und dort Schmerz, Erfolgskriterien und Freigabeweg bestГӨtigen.';const assessment=ds.approval==='confirmed'?'Die Investitionsentscheidung ist bestГӨtigt. Der Schwerpunkt wechselt vom Verkauf zu einem belastbaren Projektstart.':p.hours?`Der wirtschaftliche Schmerz ist mit ${p.hours} Stunden monatlichem Zusatzaufwand belastbar belegt. Die Wirkungsannahme und konkrete Investitionsfreigabe sind jedoch noch offen.`:'Der fachliche Handlungsbedarf ist erkennbar, aber wirtschaftliche Wirkung und Entscheidungsweg sind noch nicht belastbar bestГӨtigt.';
const facts=[];if(p.hours)facts.push(`${p.hours} Stunden monatlicher Zusatzaufwand sind als Ausgangsproblem dokumentiert.`);if(p.lost)facts.push(`${p.lost} verlorene oder verschobene Opportunities bilden einen relevanten Risikohinweis.`);if(p.possible)facts.push(`Bei ${p.possible} Opportunities wГӨren Risiken mГ¶glicherweise frГјher erkennbar gewesen; vermeidbare Verluste sind nicht bestГӨtigt.`);if(p.budget)facts.push(`Ein Budgetrahmen bis ${p.budget.toLocaleString('de-DE')} вӮ¬ ist vorhanden; konkrete Freigabe bleibt davon getrennt.`);
const risks=[];if(ds.buyer==='not_involved')risks.push('Wirtschaftliche Entscheiderin noch nicht persГ¶nlich eingebunden.');if(p.successOpen)risks.push('Erfolgskriterien und MessgrГ¶Гҹen nicht mit der Entscheiderin bestГӨtigt.');if(p.priceOpen)risks.push('Konkreter Pilotpreis noch offen.');if(ds.businessCase==='problem_quantified')risks.push('Vermeidbarer Anteil des dokumentierten Aufwands noch nicht validiert.');
const actions=ds.approval==='confirmed'?['Starttermin und Kickoff verbindlich festlegen.','Baseline, Messmethode und Verantwortliche bestГӨtigen.','Auswertungstermin und Entscheidung nach dem Pilot terminieren.']:['Gemeinsamen Entscheidungstermin mit Sponsor und wirtschaftlicher Entscheiderin vereinbaren.','Eine einseitige Entscheidungsunterlage mit Schmerz, Pilotumfang, offenen Wirkungsannahmen und Erfolgskriterien vorbereiten.','DatenverfГјgbarkeit und organisatorische Pilotvoraussetzungen mit Sales Operations klГӨren.'];
return{assessment,blocker,recommendation,facts,risks,actions,decision:ds.approval==='confirmed'?'Projektstart verbindlich absichern.':'Wirtschaftliche Validierung und Pilotentscheidung gemeinsam herbeifГјhren.',businessCase:p.hours?'Ein operativer Handlungsbedarf ist dokumentiert. Der Business Case ist noch nicht als belastbare Entscheidungsgrundlage bestГӨtigt.':'Der wirtschaftliche Ausgangspunkt ist noch nicht ausreichend beziffert.',forecastUp:ds.approval==='confirmed'?'wenn Start, Messung und Verantwortlichkeiten verbindlich bestГӨtigt werden.':'wenn die wirtschaftliche Entscheiderin Schmerz, Erfolgskriterien und Freigabeweg direkt bestГӨtigt.',forecastDown:'wenn kein direkter Zugang zum wirtschaftlichen Entscheider entsteht oder die Nutzenhypothese nicht bestГӨtigt wird.'};}
function model(){const opp=current();if(!opp)return null;const ds=derive(opp);return{opp,ds,out:runEngines(opp,ds)}}
function render(){const m=model();if(!m){renderEmpty();return}const{opp,ds}=m;const root=$('#app');root.innerHTML=`<header class="header"><div class="header-top"><div><div class="brand">KI21</div><div class="version">${esc(VERSION)}</div></div><button class="icon-btn" data-action="opportunities" aria-label="Opportunity-Verwaltung Г¶ffnen">вҡҷ</button></div><button class="opp-name" data-action="opportunities" aria-label="Opportunity wechseln oder bearbeiten">${esc(opp.parsed.company)} вҖә</button><div class="status-line">Dealstatus: ${esc(ds.dealStatus)}</div></header><main class="wrap"><div class="tabs"><button class="tab ${state.view==='cockpit'?'active':''}" data-action="view" data-view="cockpit">Cockpit</button><button class="tab ${state.view==='phases'||state.view==='phase'?'active':''}" data-action="view" data-view="phases">Phasen</button><button class="icon-btn accent" data-action="import">+ Import</button></div><div style="text-align:right"><button class="link-btn" data-action="report">Testbericht Г¶ffnen</button></div><div id="view"></div><div class="footer">${esc(VERSION)} В· One State В· Evidence First В· General Rules Only</div></main>`;if(state.view==='phases')renderPhases(m);else if(state.view==='phase')renderPhasePage(m,Number(state.phaseIndex||0));else renderCockpit(m)}
function renderEmpty(){$('#app').innerHTML=`<main class="wrap"><div class="empty"><div class="brand">KI21</div><h1 style="color:var(--text)">Clean Core 8.0</h1><p>Die neue Architektur bewertet jede Opportunity zentral und gibt denselben Deal-State an Cockpit, Phasen und Bericht weiter.</p><button class="btn primary" id="startDemo">Demo-Opportunity laden</button><button class="btn" id="startImport" style="margin-top:8px">CRM-Import einfГјgen</button></div></main>`;$('#startDemo').onclick=()=>{newOpportunity(DEMO);render()};$('#startImport').onclick=openImport}
function renderCockpit({opp,ds,out}){$('#view').innerHTML=`<section class="metrics"><div class="metric"><div class="metric-label">OPPORTUNITY SCORE</div><div class="metric-value">${ds.score}%</div><div class="metric-sub">${ds.score>=70?'HOCH':ds.score>=45?'MITTEL':'NIEDRIG'}</div></div><div class="metric"><div class="metric-label">EXECUTIVE FORECAST</div><div class="metric-value">${ds.forecast}%</div><div class="metric-sub">${ds.forecast>=65?'HOCH':ds.forecast>=40?'MITTEL':'NIEDRIG'}</div></div></section><section class="card blue"><div class="kicker">Sales Summary</div><div class="summary-row"><div class="label">Status</div><div class="value">${esc(out.assessment)}</div></div><div class="summary-row"><div class="label">GrГ¶Гҹter Engpass</div><div class="value">${esc(out.blocker)}</div></div><div class="summary-row insight"><div class="label">Warum dieser Schritt?</div><div class="value">Weiterer Fortschritt entsteht durch eine bestГӨtigte Kundenentscheidung вҖ“ nicht durch eine weitere allgemeine ProduktprГӨsentation.</div></div><div class="summary-row"><div class="label">Empfehlung</div><div class="value">${esc(out.recommendation)}</div></div></section><section class="card orange"><div class="kicker">Fehlende Kundenentscheidung</div><div class="headline">${esc(out.decision)}</div></section><section class="grid"><div class="card red"><div class="kicker">Risiken & offene Punkte</div><div class="list">${out.risks.length?out.risks.map(x=>`<div class="item">${esc(x)}</div>`).join(''):'<div class="muted">Keine kritischen offenen Punkte erkannt.</div>'}</div></div><div class="card green"><div class="kicker">Business Case</div><div class="body">${esc(out.businessCase)}</div><div class="divider"></div><span class="badge ${ds.businessCase==='problem_quantified'?'warn':'risk'}">${ds.businessCase==='problem_quantified'?'Problem beziffert В· Wirkung offen':'Noch nicht beziffert'}</span></div></section><section class="card violet"><div class="kicker">NГӨchster Deal-Schritt</div><div class="list">${out.actions.map((x,i)=>`<div class="item ${i===0?'primary':''}">${esc(x)}</div>`).join('')}</div></section><section class="card"><div class="kicker">Executive Forecast</div><div class="headline">${ds.forecast}% В· ${ds.forecast>=65?'HOCH':ds.forecast>=40?'MITTEL':'NIEDRIG'}</div><div class="divider"></div><div class="body"><b style="color:var(--green)">вҶ‘ ErhГ¶ht sich deutlich,</b> ${esc(out.forecastUp)}<br><br><b style="color:var(--red)">вҶ“ Sinkt deutlich,</b> ${esc(out.forecastDown)}</div></section>`}
function renderPhases({opp,ds}){const phases=[['Qualifizierung','Problem, Sponsor und Entscheidungsweg',opp.parsed.hours||opp.parsed.sponsor],['Bedarfsanalyse & Demo','Schmerz, Auswirkungen und Zielbild',opp.parsed.hours],['Nachbereitung','Erkenntnisse und Kundenschritte',true],['Wirtschaftlicher Nutzen','Business Case und Wirkungshypothese',opp.parsed.hours],['Angebot & Abschluss','Freigabe, Bedingungen und Start',ds.approval==='confirmed']];$('#view').innerHTML=`<section class="card"><div class="kicker">Opportunity Workflow</div>${phases.map((p,i)=>`<button class="phase" data-action="phase" data-phase="${i}" style="width:100%;color:inherit;text-align:left"><div class="phase-num ${p[2]?'done':''}">${i+1}</div><div class="phase-main"><div class="phase-title">${esc(p[0])}</div><div class="phase-sub">${esc(p[1])}</div></div><div class="phase-arrow">вҖә</div></button>`).join('')}</section><section class="card orange"><div class="kicker">Architektur-Prinzip</div><div class="body">Alle Phasen lesen denselben zentralen Opportunity-State. Keine Phase darf Freigabe, ROI oder Buying-Center-Status selbstГӨndig neu interpretieren.</div></section>`}

function ensurePhaseData(opp){if(!opp.phaseData||!Array.isArray(opp.phaseData))opp.phaseData=Array.from({length:5},()=>({notes:'',updatedAt:null}));while(opp.phaseData.length<5)opp.phaseData.push({notes:'',updatedAt:null});return opp.phaseData}
function combinedEvidence(opp){const phase=ensurePhaseData(opp).map(x=>x&&x.notes?x.notes:'').filter(Boolean).join('\n');return normalize([opp.raw,phase].filter(Boolean).join('\n\n'))}
function renderPhasePage(m,index){const names=['Qualifizierung','Bedarfsanalyse & Demo','Nachbereitung','Wirtschaftlicher Nutzen','Angebot & Abschluss'];const subs=['Problem und Sponsor prГјfen','Schmerz, Auswirkungen und Zielbild klГӨren','Erkenntnisse und Kundenschritt sichern','Wirtschaftlichen Nutzen validieren','Freigabe, Bedingungen und Start klГӨren'];index=Math.max(0,Math.min(4,index));const phase=ensurePhaseData(m.opp)[index];const ds=m.ds,out=m.out;const prompts=[
'Welche Probleme sind bestГӨtigt? Wer ist Sponsor? Wer entscheidet wirtschaftlich? Welcher nГӨchste Kundentermin ist verbindlich?',
'Welche Auswirkungen hat das Problem? Welche Ziele und Erfolgskriterien nennt der Kunde? Was muss eine Demo beweisen?',
'Welche Erkenntnisse wurden bestГӨtigt? Welche EinwГӨnde, offenen Punkte und konkreten Kundenschritte bestehen?',
'Welche wirtschaftlichen GrГ¶Гҹen sind bestГӨtigt? Welche Wirkungsannahmen sind offen? Wie soll der Pilot den Nutzen messen?',
'Welche Freigabe fehlt? Welche Bedingungen gelten? Wer entscheidet bis wann Гјber Preis, Pilot und Start?'
];$('#view').innerHTML=`<div class="phase-page-head"><button class="back-btn" data-action="view" data-view="phases" aria-label="ZurГјck zu den Phasen">вҖ№</button><div><div class="phase-page-title">Phase ${index+1}: ${esc(names[index])}</div><div class="phase-page-sub">${esc(subs[index])}</div></div></div><section class="card"><div class="kicker">Arbeitsbereich</div><div class="body">${esc(prompts[index])}</div><div class="phase-editor"><textarea id="phaseNotes" placeholder="GesprГӨchserkenntnisse, bestГӨtigte Fakten, offene Fragen und nГӨchste Kundenschritte вҖҰ">${esc(phase.notes||'')}</textarea><div class="phase-save-state">${phase.updatedAt?'Zuletzt gespeichert: '+new Date(phase.updatedAt).toLocaleString('de-DE'):'Noch keine Erkenntnisse gespeichert.'}</div><div class="phase-nav-actions"><button class="btn" data-action="phase-prev" ${index===0?'disabled':''}>вҶҗ Vorherige Phase</button><button class="btn primary" data-action="phase-save">Erkenntnisse speichern</button><button class="btn" data-action="phase-next" ${index===4?'disabled':''}>NГӨchste Phase вҶ’</button></div></div></section><section class="card violet"><div class="kicker">Aktueller nГӨchster Kundenschritt</div><div class="body">${esc(out.actions[0]||out.recommendation)}</div></section>`}
function saveCurrentPhase(){const opp=current();if(!opp)return;const i=Math.max(0,Math.min(4,Number(state.phaseIndex||0)));const data=ensurePhaseData(opp);const ta=$('#phaseNotes');data[i]={notes:normalize(ta?ta.value:''),updatedAt:now()};opp.updatedAt=now();opp.parsed=parseCRM(combinedEvidence(opp));save();toast('Phase '+(i+1)+' gespeichert.');render()}
function openPhase(index){state.phaseIndex=Math.max(0,Math.min(4,index));state.view='phase';save();render()}
function switchOpportunity(id){if(!id||!state.opportunities[id]){toast('Opportunity nicht gefunden.');return}state.activeId=id;state.view='cockpit';state.phaseIndex=0;save();closeModal();render();toast('Opportunity gewechselt.')}
function handleAction(el){const action=el.dataset.action;if(action==='view'){state.view=el.dataset.view||'cockpit';save();render();return}if(action==='import'){openImport();return}if(action==='opportunities'){openSettings();return}if(action==='report'){openReport();return}if(action==='phase'){openPhase(Number(el.dataset.phase||0));return}if(action==='phase-save'){saveCurrentPhase();return}if(action==='phase-prev'){saveCurrentPhase();openPhase(Number(state.phaseIndex||0)-1);return}if(action==='phase-next'){saveCurrentPhase();openPhase(Number(state.phaseIndex||0)+1);return}if(action==='switch-opportunity'){switchOpportunity(el.dataset.id);return}if(action==='new-opportunity'){closeModal();openImport();return}if(action==='delete-opportunity'){deleteCurrentOpportunity();return}if(action==='close-modal'){closeModal();return}}
document.addEventListener('click',function(e){const el=e.target.closest('[data-action]');if(!el)return;if(el.disabled)return;e.preventDefault();handleAction(el)},false);

function openModal(html){$('#sheet').innerHTML=html;$('#modal').classList.remove('hidden')}function closeModal(){$('#modal').classList.add('hidden')}$('#modal').onclick=e=>{if(e.target.id==='modal')closeModal()}
function openImport(){openModal(`<div class="sheet-title">Neue Opportunity importieren</div><div class="sheet-sub">Der Import erzeugt immer einen neuen, isolierten Opportunity-Container. Fakten, Hypothesen und offene Punkte werden getrennt gespeichert.</div><textarea id="importText" placeholder="CRM-Import hier einfГјgen вҖҰ">${current()?'':DEMO}</textarea><div class="actions"><button class="btn" id="cancel">Abbrechen</button><button class="btn primary" id="doImport">Als neue Opportunity importieren</button></div>`);$('#cancel').onclick=closeModal;$('#doImport').onclick=()=>{const raw=normalize($('#importText').value);if(!raw){toast('Bitte CRM-Text einfГјgen.');return}newOpportunity(raw);closeModal();render();toast('Neue Opportunity isoliert importiert.')}}
function dedupeOpportunities(){const seen=new Map();const ids=Object.keys(state.opportunities||{});for(const id of ids){const o=state.opportunities[id];if(!o)continue;const key=normalize((o.raw||'')).toLowerCase();if(!key)continue;if(seen.has(key)){const keep=seen.get(key);if(state.activeId===id)state.activeId=keep;delete state.opportunities[id]}else seen.set(key,id)}if(!state.activeId||!state.opportunities[state.activeId])state.activeId=Object.keys(state.opportunities)[0]||null;save()}
function deleteCurrentOpportunity(){const active=current();if(!active)return;if(!confirm('Diese Opportunity wirklich lГ¶schen?'))return;delete state.opportunities[state.activeId];state.activeId=Object.keys(state.opportunities)[0]||null;state.view='cockpit';state.phaseIndex=0;save();closeModal();render();toast('Opportunity gelГ¶scht.')}
function openSettings(){dedupeOpportunities();const opps=Object.values(state.opportunities).sort((a,b)=>String(b.updatedAt).localeCompare(String(a.updatedAt)));openModal(`<div class="sheet-title">Opportunity-Verwaltung</div><div class="sheet-sub">Tippe auf eine Opportunity, um sie sofort zu Г¶ffnen.</div><div class="manage-note">Identische Doppelimporte werden automatisch zusammengefГјhrt. Jede andere Opportunity bleibt vollstГӨndig getrennt.</div><div class="opp-list">${opps.length?opps.map(o=>`<button class="opp-row ${o.id===state.activeId?'active':''}" data-action="switch-opportunity" data-id="${esc(o.id)}"><div class="opp-row-title">${esc(o.parsed.company)}</div><div class="opp-row-sub">${esc(o.parsed.name||'Opportunity')}</div><div class="opp-row-meta">Zuletzt geГӨndert: ${new Date(o.updatedAt||o.createdAt).toLocaleString('de-DE')}</div></button>`).join(''):'<div class="opp-empty">Noch keine Opportunity vorhanden.</div>'}</div><div class="actions"><button class="btn" data-action="close-modal">SchlieГҹen</button><button class="btn danger" data-action="delete-opportunity" ${opps.length?'':'disabled'}>Aktuelle lГ¶schen</button><button class="btn primary full" data-action="new-opportunity">Neue Opportunity importieren</button></div>`)}
function buildReport(){const m=model();if(!m)return'';const{opp,ds,out}=m;const p=opp.parsed;return`KI21 SALES DECISION BRIEF\nVersion: ${VERSION}\nOpportunity: ${p.company} В· ${p.name}\n\nEINSCHГ„TZUNG\n${out.assessment}\n\nDIE 5 PUNKTE, DIE ZГ„HLEN\n${out.facts.slice(0,5).map(x=>'вҖў '+x).join('\n')}\n\nDEAL-ENTSCHEIDUNG\nвҖў ${out.decision}\n\nGRГ–SSTER ENGPASS\nвҖў ${out.blocker}\n\nBUSINESS CASE UND NUTZEN\nвҖў ${out.businessCase}\nвҖў ROI ist ohne bestГӨtigte Wirkungsquote, finanziellen Zeitwert, konkreten Preis und Zeitraum nicht belastbar berechenbar.\n\nOFFENE PUNKTE\n${out.risks.map(x=>'вҖў '+x).join('\n')}\n\nNГ„CHSTER SCHRITT\n${out.actions.map((x,i)=>`${i+1}. ${x}`).join('\n')}\n\nSTATE CHECK\nвҖў Freigabe: ${ds.approval}\nвҖў Wirtschaftlicher Entscheider: ${ds.buyer}\nвҖў Business Case: ${ds.businessCase}\nвҖў Dealstatus: ${ds.dealStatus}\nвҖў Opportunity Score: ${ds.score}%\nвҖў Forecast: ${ds.forecast}%`}
function openReport(){const txt=buildReport();openModal(`<div class="sheet-title">KI21 Sales Decision Brief</div><div class="sheet-sub">Cockpit und Bericht basieren auf demselben zentralen Opportunity-State.</div><div class="report" id="reportText">${esc(txt)}</div><div class="actions"><button class="btn" id="closeReport">SchlieГҹen</button><button class="btn primary" id="copyReport">Bericht kopieren</button></div>`);$('#closeReport').onclick=closeModal;$('#copyReport').onclick=async()=>{try{await navigator.clipboard.writeText(txt);toast('Bericht kopiert.')}catch(e){const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('Bericht kopiert.')}}}
window.addEventListener('error',e=>{console.error('KI21 Core 8 error',e.error||e.message)});
dedupeOpportunities();
if(!state.activeId||!state.opportunities[state.activeId]){newOpportunity(DEMO)}
Object.values(state.opportunities).forEach(ensurePhaseData);save();
render();
</script>
</body>
</html>
