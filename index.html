function normalizeRoiHebelText(text){
  let x=String(text||'').trim();
  // v4.166: deterministische Sperre gegen erfundene konkrete Vermeidungsquoten im Cockpit.
  x=x.replace(/ROI[-\s]?(?:Berechnung|Annahme)[^.;\n]{0,120}\d{1,3}\s*%\s*[-–—]?\s*(?:Vermeidungsquote|Vermeidbarkeit)[^.;\n]*/gi,'Vermeidungsquote schwach qualifizierter Deals noch nicht validiert');
  x=x.replace(/(?:ROI[-\s]?Annahme\s*)?\(?\d{1,3}\s*%\)?\s*[-–—]?\s*(?:angenommene?|unterstellte?|geschätzte?)?\s*(?:Vermeidungsquote|Vermeidbarkeit)(?:\s+angenommen)?[^.\n;]*/gi,'Vermeidungsquote schwach qualifizierter Deals noch nicht validiert');
  x=x.replace(/(?:ROI[-\s]?Annahme\s*)?(?:Vermeidungsquote|Vermeidbarkeit)[^.;\n]{0,80}?\d{1,3}\s*%[^.;\n]*/gi,'Vermeidungsquote schwach qualifizierter Deals noch nicht validiert');
  x=x.replace(/(?:Vermeidungsquote|Vermeidbarkeit)\s*\(?\d{1,3}\s*%\)?\s*(?:angenommen|unterstellt|geschätzt)?[^.\n;]*/gi,'Vermeidungsquote schwach qualifizierter Deals noch nicht validiert');
  x=x.replace(/Konkrete\s+Pilot[-\s]?Deals\s+und\s+Messmetrik\s+offen/gi,'Konkrete Pilot-Deals und Messkriterien zur Vermeidungsquote offen');
  x=x.replace(/Pilot[-\s]?Erfolgskriterien\s*&\s*Metriken\s+zur\s+Quote[-\s]?Validierung\s+definieren/gi,'Konkrete Pilot-Deals und Messkriterien zur Vermeidungsquote offen');
  x=x.replace(/Pilot[-\s]?Erfolgskriterien\s+und\s+Metriken\s+zur\s+Quote[-\s]?Validierung\s+definieren/gi,'Konkrete Pilot-Deals und Messkriterien zur Vermeidungsquote offen');
  x=x.replace(/Pilot[-\s]?Erfolgskriterien\s*&\s*Messlogik\s+konkretisieren.*$/gi,'Konkrete Pilot-Deals und Messkriterien zur Vermeidungsquote offen');
  x=x.replace(/Quote[-\s]?Validierung/gi,'Vermeidungsquote');

  x=x.replace(/Konkrete\s+Pilot[-\s]?Deals\s+und\s+Messmetriken\s+offen/gi,'Konkrete Pilot-Deals und Messkriterien zur Vermeidungsquote offen');
  x=x.replace(/Konkrete\s+Pilot[-\s]?Deals\s+und\s+Messkriterien\s+offen/gi,'Konkrete Pilot-Deals und Messkriterien zur Vermeidungsquote offen');
  x=x.replace(/Pilot[-\s]?Erfolgskriterien\s+noch\s+nicht\s+konkret\s+definiert/gi,'Pilot-Erfolgskriterien und Messkriterien noch nicht konkret definiert');
  x=x.replace(/ROI[-\s]?Validierung\s+erst\s+nach\s+Pilot\s+planbar,?\s+aktuell\s+hypothetisch/gi,'Vermeidungsquote schwach qualifizierter Deals noch nicht validiert');
  x=x.replace(/ROI[-\s]?Annahme\s+aktuell\s+hypothetisch/gi,'ROI-Annahme noch nicht belastbar validiert');
  x=x.replace(/Wirtschaftlichen\s+Entscheider\s+validieren/gi,'Wirtschaftlichen Nutzen mit Entscheider validieren');
  x=x.replace(/(\d[\d.\s,]*)\s*€/g,(m,n)=>String(n).trim()+' €');
  return x;
}

function isTrivialFragmentFinding(text){
  const x=String(text||'').trim().replace(/[.!;:]+$/,'').trim();
  if(!x)return true;
  // Ein-Wort-/Statusfragmente ohne Subjekt oder wirtschaftliche Aussage nie als Erkenntnis anzeigen.
  if(/^(?:vorhanden|bestätigt|geklärt|verfügbar|klar|offen|unklar|validiert|unvalidiert|bekannt|unbekannt)$/i.test(x))return true;
  // Nackte Geld-/Statusfragmente ohne Rollenbezug nie anzeigen; geprüfte Geldrollen werden separat aufgebaut.
  if(/^(?:vorhanden|bestätigt|geklärt|verfügbar|klar|offen|unklar)\s*:?\s*\d[\d.\s,]*\s*(?:€|eur|euro)(?:\s+(?:verfügbar|bestätigt|freigegeben))?$/i.test(x))return true;
  if(/^\d[\d.\s,]*\s*(?:€|eur|euro)(?:\s+(?:vorhanden|bestätigt|verfügbar|freigegeben))?$/i.test(x))return true;
  // Sehr kurze Nichtssagende Fragmente ohne Verb/Zahl/Person/Businessbezug filtern.
  const words=x.split(/\s+/).filter(Boolean);
  if(words.length<=2 && !/[0-9€?]/.test(x) && !/(marius|entscheider|budget|schmerz|verlust|schaden|angebot|start|pilot|deal|forecast|pipeline|vermeidungsquote|wettbewerb)/i.test(x))return true;
  return false;
}

function sanitizeBadExtractionArtifacts(accId,text,kind){
  let x=String(text||'').trim();
  if(!x)return x;
  if(isTrivialFragmentFinding(x))return '';
  const name=sanitizeDecisionMakerName(getConfirmedDecisionMakerName(accId));
  const authorityText=name&&name!=='der bestätigte Entscheider'?name+' allein entscheidungsbefugt':'Entscheider allein entscheidungsbefugt';
  // Keine abstrakten Begriffe als Entscheider ausgeben. Eine Person/Rolle ist entscheidungsbefugt, nicht die Entscheidung selbst.
  if(/^(Dimension|Kaufentscheidung|Entscheidung|Startentscheidung|Beauftragung|Budget|Budgetrahmen|Angebot|Prozess|Projekt)\s+(allein\s+)?entscheidungsbefugt$/i.test(x)){
    return authorityText;
  }
  x=x.replace(/^(Dimension|Kaufentscheidung|Entscheidung|Startentscheidung|Beauftragung|Budget|Budgetrahmen|Angebot|Prozess|Projekt)\s+/i,'');
  if(/^Entscheider\s+allein\s+entscheidungsbefugt$/i.test(x)||/^Entscheider\s+identifiziert/i.test(x)){
    if(name&&name!=='der bestätigte Entscheider')return name+' allein entscheidungsbefugt';
  }
  // Keine nackten Geldlabels aus KI-Texten anzeigen. Sie werden später durch geprüfte Geldrollen ersetzt.
  if(/^(?:vorhanden|bestätigt):?\s*\d[\d.\s,]*\s*(?:€|eur|euro)(?:\s+verfügbar)?$/i.test(x))return '';
  if(/^verzögert oder gestoppt$/i.test(x))return 'Entscheidung verzögert oder gestoppt';
  return x;
}
function hasAuthoritySignalInHealth(health){
  const all=[]
    .concat((health&&health.positive)||[])
    .concat((health&&health.warning)||[])
    .concat((health&&health.open)||[])
    .map(x=>String(x&&x.text?x.text:x||''));
  return all.some(t=>/(entscheidungsbefugnis|entscheiderstatus|wirtschaftlicher entscheider|fachlicher entscheider).{0,50}(bestätigt|klar|vorhanden)|entscheider.{0,50}(bestätigt|klar)|kann.{0,50}(eigenständig|allein).{0,50}(entscheiden|freigeben|beauftragen)/i.test(t));
}
function hasBudgetSignalInHealth(health){
  const all=[]
    .concat((health&&health.positive)||[])
    .concat((health&&health.warning)||[])
    .concat((health&&health.open)||[])
    .map(x=>String(x&&x.text?x.text:x||''));
  return all.some(t=>/(operatives budget|budgetrahmen|budget).{0,60}(vorhanden|bestätigt|verfügbar|klar)/i.test(t));
}


// v4.191: Problemgröße sauber trennen: Häufigkeit, Schaden pro Fall und expliziter Jahreswert.
// Keine automatische Jahresrechnung aus Monat × Betrag. Nur ausdrücklich genannte Perioden anzeigen.
function extractPainStructureV4191(accId){
  const raw=String(getValidatedBusinessInputText(accId)||getCurrentUserKnowledgeText(accId)||'').replace(/\\u20ac/g,'€');
  const norm=raw.replace(/\s+/g,' ');
  const freq=extractDealFrequencyTextV4189(accId);
  const classified=classifyEuroAmounts(norm).filter(a=>a.role==='pain'||a.role==='ambiguous');
  const badCtx=/(budget|budgetrahmen|angebot|startangebot|preis|lizenz|user|nutzer|monatlich|pro user|pro nutzer|app|mindestpreis)/i;
  const perCase=classified.filter(a=>{
    const seg=String(a.segment||'');
    if(badCtx.test(seg))return false;
    if(/jährlich|jahr|jahres|pro jahr|p\.a\./i.test(seg))return false;
    return /(pro\s*(deal|opportunity|fall)|je\s*(deal|opportunity|fall)|durchschnitt|schnitt|schlecht|schwach|qualifizier|nacharbeit|nachbearbeitung|verloren|verlust|umsatz)/i.test(seg);
  }).sort((a,b)=>(b.confidence-a.confidence)||(b.value-a.value))[0]||null;
  const annual=classified.filter(a=>{
    const seg=String(a.segment||'');
    if(badCtx.test(seg))return false;
    return /(jährlich|jahr|jahres|pro jahr|p\.a\.)/i.test(seg)&&/(schaden|verlust|umsatz|opportunit|deal|qualifizier)/i.test(seg);
  }).sort((a,b)=>(b.confidence-a.confidence)||(b.value-a.value))[0]||null;
  return {freq,perCase,annual};
}
function buildPainProblemSummaryV4191(accId,opts){
  const ps=extractPainStructureV4191(accId);
  const parts=[];
  if(ps.freq)parts.push(ps.freq.replace(/^~/,'ca. '));
  if(ps.perCase)parts.push('ca. '+formatEuroDE(ps.perCase.value)+' pro Fall');
  if(ps.annual)parts.push('genannte Jahresgröße '+formatEuroDE(ps.annual.value));
  if(!parts.length)return '';
  let text=parts.join('; ');
  if(opts&&opts.short)text=text.replace(/^ca\. /,'~');
  return text;
}
function buildStructuredPhase1DossierV4191(accId){
  const facts=extractKnownBusinessFacts(accId||'');
  const dec=(accId&&getConfirmedDecisionMakerName(accId))||'dem bestätigten Entscheider';
  const nextName=(dec==='dem bestätigten Entscheider')?'dem bestätigten Entscheider':dec;
  const pain=buildPainProblemSummaryV4191(accId)||'Discovery-Schmerz konkret benannt; wirtschaftliche Wirkung noch zu validieren';
  const budget=facts.budget||'Budgetrahmen noch zu klären';
  const authority=facts.authority||'Entscheiderrolle noch zu klären';
  const qs=buildCanonicalDashboardQuestionsV4191(accId).slice(0,5);
  let lines=[];
  lines.push('EINSCHÄTZUNG');
  lines.push('Die Opportunity ist für die weitere Discovery qualifiziert. Schmerz, Budgetrahmen und Entscheiderrolle sind ausreichend sichtbar; die wirtschaftliche Wirkung muss mit konkreten Pilot-Deals validiert werden.');
  lines.push('');
  lines.push('BESTÄTIGT');
  lines.push('• '+authority+'.');
  lines.push('• Operativer Schmerz: '+pain+'.');
  lines.push('• '+budget+'.');
  lines.push('');
  lines.push('ZU VALIDIEREN');
  lines.push('• Welche konkreten Deals zeigen das Discovery-Problem am besten?');
  lines.push('• Was kostet ein schlecht qualifizierter Deal konkret an Zeit, Umsatz oder Nacharbeit?');
  lines.push('• Welche Messkriterien zeigen nach dem Startprojekt, dass die Discovery-Qualität besser wird?');
  lines.push('');
  lines.push('NÄCHSTER SCHRITT DIESE WOCHE');
  lines.push('Mit '+nextName+' 3–5 Pilot-Deals auswählen und Messkriterien für die Wirkungsmessung festlegen.');
  lines.push('');
  lines.push('DIE 5 WICHTIGSTEN QUALIFIZIERUNGSFRAGEN');
  qs.forEach((q,i)=>lines.push((i+1)+'. '+q));
  return lines.join('\n');
}

function extractKnownBusinessFacts(accId){
  // v4.182: harte Fakten nur aus Nutzereingaben/Profil/Feldern, nicht aus generierten Outputs.
  const raw=(getValidatedBusinessInputText(accId)||'').replace(/\s+/g,' ');
  const facts={pain:null,budget:null,authority:null};
  const painSummaryV4191=buildPainProblemSummaryV4191(accId,{short:true});
  if(painSummaryV4191)facts.pain='Operativer Schmerz konkret quantifiziert: '+painSummaryV4191;

  const allAmounts=classifyEuroAmounts(raw);
  const badPainContext=/(budget|budgetrahmen|freigegeben|verfügbar|angebotspreis|startangebot|preis|lizenz|user|nutzer|monatlich|pro user|pro nutzer|app)/i;
  const painCandidates=allAmounts
    .filter(a=>a.role==='pain'&&!badPainContext.test(String(a.segment||'')))
    .map(a=>{
      const seg=String(a.segment||'').toLowerCase();
      let score=a.confidence||0;
      if(/jährlich|jahr|jahres|pro jahr/.test(seg))score+=80;
      if(/schaden|verlust|verloren|opportunit|opportunity/.test(seg))score+=60;
      if(/deals?\/monat|pro monat|schwach qualifizierte deals|schlecht qualifizierte deals|4\s+deals/.test(seg))score+=50;
      return {...a,score};
    })
    .sort((a,b)=>(b.score-a.score)||(b.value-a.value));
  if(!facts.pain && painCandidates.length)facts.pain=describePainAmount(painCandidates[0]);

  const budgetRoles=getEuroAmountsByRole(raw,'budget').filter(b=>!/schaden|verlust|opportunit|deal/i.test(String(b.segment||'')));
  const budgetValues=[...new Set(budgetRoles.map(b=>b.value))];
  if(budgetValues.length===1)facts.budget=describeBudgetAmount(budgetRoles[0]);
  else if(budgetValues.length>1)facts.budget='Budgetrahmen vorhanden';
  else if(/budgetrahmen|budget\s+(?:vorhanden|bestätigt|verfügbar|freigegeben)/i.test(raw))facts.budget='Budgetrahmen vorhanden';

  const name=getConfirmedDecisionMakerName(accId);
  if(hasConfirmedFullDecisionAuthority(accId)||hasExplicitAuthorityText(accId)||/(entscheidungsbefugnis|entscheidungsbefugt|entscheider).{0,80}(bestätigt|klar|vorhanden)|(?:allein|eigenständig|selbstständig).{0,100}(entscheiden|budget|beauftragen|freigeben)/i.test(raw)){
    facts.authority=(name&&name!=='der bestätigte Entscheider')?name+' allein entscheidungsbefugt':'Entscheider allein entscheidungsbefugt';
  }
  return facts;
}

function hasExplicitContractProcessSignal(accId,health){
  const raw=(getCurrentUserKnowledgeText(accId)+'\n'+JSON.stringify(health||{})).toLowerCase();
  return /(vertragsprozess|vertrag|bestellprozess|bestellung|einkauf|procurement|legal|rechtsabteilung|papierprozess|formal(?:e|er|itäten)|purchase order|po).{0,80}(offen|klären|unklar|blockiert|notwendig|ausstehend|zuständig|prozess)|(?:offen|klären|unklar|blockiert|notwendig|ausstehend|zuständig|prozess).{0,80}(vertragsprozess|vertrag|bestellprozess|bestellung|einkauf|procurement|legal|rechtsabteilung|papierprozess|formal(?:e|er|itäten)|purchase order|po)/i.test(raw);
}
function preferConcreteCockpitFacts(accId,positives){
  let list=[...(positives||[])];
  const facts=extractKnownBusinessFacts(accId);
  const replaceOrAdd=(pattern,text,preferredIndex)=>{
    if(!text)return;
    list=list.filter(t=>!pattern.test(String(t||'')));
    if(!list.some(t=>String(t||'').toLowerCase()===text.toLowerCase())){
      list.splice(Math.min(preferredIndex,list.length),0,text);
    }
  };
  replaceOrAdd(/schmerz konkret benannt|schmerz quantifiziert|umsatzschaden|jahresschaden|wirtschaftlicher schaden|verlust/i,facts.pain,1);
  replaceOrAdd(/budgetrahmen vorhanden|budget bestätigt|budget.{0,80}verfügbar|budget|^(?:vorhanden|bestätigt):?\s*\d[\d.\s,]*\s*(?:€|eur|euro)/i,facts.budget,2);
  replaceOrAdd(/entscheidungsbefugnis bestätigt|entscheider.*entscheid|entscheidungsbefugt|allein entscheidungsbefugt|kaufentscheidung.*entscheidungsbefugt|dimension.*entscheidungsbefugt/i,facts.authority,0);
  return shortUniqueList(list,4);
}
function sanitizeCockpitTextFinal(accId,text,kind,opts){
  let x=String(text||'').trim();
  if(!x)return '';
  x=sanitizeBadExtractionArtifacts(accId,x,kind);
  if(!x)return '';
  const authority=!!(opts&&opts.authority);
  const budgetFit=!!(opts&&opts.budgetFit);
  const budgetSignal=!!(opts&&opts.budgetSignal);
  const fit=getGenericOfferBudgetFit(accId);
  // Budget-/Preisverwechslungen im Cockpit immer entschärfen, sobald ein Budgetsignal oder ein echter Angebots-Fit vorliegt.
  // Falls kein Angebotspreis bekannt ist, bleibt es eine Angebots-/Umfangsfrage, aber keine Budget-Passung zu einem Budgetrahmen.
  if(isObsoleteBudgetPriceConfusion(x) && (budgetFit||budgetSignal||fit.fits)){
    if(kind==='positive')return fit.entryRole?'Startangebot liegt klar im Budgetrahmen':'Angebot liegt im Budgetrahmen';
    if(kind==='warning'||kind==='risk')return fit.entryRole?'Startangebot noch nicht verbindlich gestartet':'Angebotsumfang noch nicht verbindlich festgelegt';
    return hasVermeidungsquoteBusinessCase(accId,null)?'Konkrete Pilot-Deals und Messkriterien zur Vermeidungsquote offen':(fit.entryRole?'Einstiegsumfang und Starttermin festlegen':'Angebotsumfang und Starttermin klären');
  }
  x=sanitizeInventedPrecisionText(accId,x,kind);
  x=normalizeRoiHebelText(x);
  const priceCtx=extractOfferPricingPeriodContext(accId);
  if(priceCtx.startAmount && /(KI21[-\s]?Preis|Preis|Startformat|Compact|Kompakt|Angebotspreis).{0,120}(noch nicht|unklar|offen|klären|nicht geklärt)/i.test(x)){
    if(kind==='warning'||kind==='risk')return '';
    return buildOfferPricingBusinessCaseText(accId)||'Startangebot und laufende Gebühren sind geklärt';
  }
  x=sanitizeOfferPricingPeriodText(accId,x);
  if(isUnsafeRoiCalculationText(x))return '';
  if(/^Wirtschaftliche Plausibilität separat validieren:/i.test(x)&&kind==='positive')return '';
  if(/keine\s+konkurrenzanalyse|wettbewerbslage\s+unbekannt|wettbewerb\s+unklar/i.test(x)){x='Wettbewerbslage im Auge behalten; kein Wettbewerber bekannt';}
  if(/wettbewerber bereits aktiv/i.test(x) && !hasExplicitCompetitorActiveSignal(accId)){
    x='Wettbewerbslage im Auge behalten; kein konkreter Wettbewerber bekannt';
  }
  x=sanitizeBudgetPriceText(accId,x,kind);
  // Nach der Budget-Säuberung nochmals prüfen: alte Budget-Fit-Fragen dürfen im Cockpit nicht sichtbar bleiben,
  // sobald ein passender Angebotsbaustein oder ein belastbares Budgetsignal vorhanden ist.
  if(isObsoleteBudgetPriceConfusion(x) && (budgetFit||budgetSignal||fit.fits)){
    if(kind==='positive')return fit.entryRole?'Startangebot liegt klar im Budgetrahmen':'Angebot liegt im Budgetrahmen';
    if(kind==='warning'||kind==='risk')return fit.entryRole?'Startangebot noch nicht verbindlich gestartet':'Angebotsumfang noch nicht verbindlich festgelegt';
    return hasVermeidungsquoteBusinessCase(accId,null)?'Konkrete Pilot-Deals und Messkriterien zur Vermeidungsquote offen':(fit.entryRole?'Einstiegsumfang und Starttermin festlegen':'Angebotsumfang und Starttermin klären');
  }
  if(authority&&isObsoleteGfCfoText(x)){
    if(/schaden|jahresschaden|umsatzverlust|umsatzschaden|wirtschaftlicher schaden|quote|vermeidungsquote|roi/i.test(x)){
      return (kind==='warning'||kind==='risk')?'Bezifferter Schmerz mit Entscheider validieren':'Vermeidungsquote mit Entscheider validieren';
    }
    if(kind==='missing'||kind==='open')return 'Wirtschaftlichen Nutzen mit Entscheider validieren';
    if(kind==='warning'||kind==='risk')return 'Formale Beauftragung / Startentscheidung noch offen';
    return '';
  }
  return x;
}

function applyProtectedCockpitSnapshot(accId,health,positive,risks,open){
  const hasVQ=hasVermeidungsquoteBusinessCase(accId,health);
  const facts=extractKnownBusinessFacts(accId);
  let p=[...(positive||[])].map(t=>sanitizeCockpitTextFinal(accId,t,'positive',{})).filter(Boolean);
  let r=[...(risks||[])].map(t=>sanitizeCockpitTextFinal(accId,t,'warning',{})).map(normalizeRoiHebelText).filter(Boolean);
  if(!hasExplicitCompetitorActiveSignal(accId))r=r.filter(t=>!/wettbewerber bereits aktiv/i.test(String(t||'')));
  let o=[...(open||[])].map(t=>sanitizeCockpitTextFinal(accId,t,'open',{})).map(normalizeRoiHebelText).filter(Boolean);

  // Harte Cockpit-Fakten werden aus geprüften Feldern neu zusammengesetzt, nicht frei aus KI-Texten.
  if(facts.authority){
    p=p.filter(t=>!/entscheidungsbefug|entscheider|kaufentscheidung|dimension/i.test(String(t||'')));
    p.unshift(facts.authority);
  }
  if(facts.pain){
    p=p.filter(t=>!/schmerz|umsatzschaden|jahresschaden|wirtschaftlicher schaden|verlust|problemkosten/i.test(String(t||'')));
    p.splice(Math.min(1,p.length),0,facts.pain);
  }
  if(facts.budget){
    p=p.filter(t=>!/budget|^(?:vorhanden|bestätigt):/i.test(String(t||'')));
    p.splice(Math.min(2,p.length),0,facts.budget);
  }

  // Vermeidungsquote: immer als offene Annahme ohne Prozentzahl, sobald dieser Business Case vorliegt.
  if(hasVQ){
    r=r.filter(t=>!/(\d{1,3}\s*%|roi[-\s]?berechnung|roi[-\s]?annahme).{0,80}(vermeidungsquote|vermeidbarkeit)|vermeidungsquote.{0,80}\d{1,3}\s*%|vermeidbarkeit.{0,80}\d{1,3}\s*%/i.test(String(t||'')));
    if(!hasTextInList(r,/vermeidungsquote|vermeidbar/i)){
      const idx=r.length&&/entscheidung|gestoppt|verzögert|beauftragung|startentscheidung/i.test(String(r[0]||''))?1:0;
      r.splice(idx,0,'Vermeidungsquote schwach qualifizierter Deals noch nicht validiert');
    }
    o=o.filter(t=>!/quote[-\s]?validierung|pilot[-\s]?erfolgskriterien|einstiegsumfang|starttermin|deal[-\s]?liste|messlogik/i.test(String(t||'')));
    o.unshift('Konkrete Pilot-Deals und Messkriterien zur Vermeidungsquote offen');
  }

  // Nackte oder widersprüchliche Geldfragmente nie anzeigen.
  const moneyFragment=/^(?:vorhanden|bestätigt):?\s*\d[\d.\s,]*\s*(?:€|eur|euro)(?:\s+verfügbar)?$/i;
  p=p.filter(t=>!moneyFragment.test(String(t||''))).filter(t=>!isUnsafeRoiCalculationText(t)&&!/^Wirtschaftliche Plausibilität separat validieren:/i.test(String(t||'')));
  const authorityConfirmed=!!facts.authority||hasConfirmedFullDecisionAuthority(accId)||hasAuthoritySignalInHealth(health);
  // v4.166: dieselbe Schutzschicht gilt auch für Bottom-Sheets/Health-Detail.
  // Sobald ein Entscheider bestätigt ist, dürfen GF/CFO-Validierungsrückfälle nicht mehr durchrutschen.
  r=r.map(t=>/^verzögert oder gestoppt$/i.test(String(t||''))?'Entscheidung verzögert oder gestoppt':t)
     .map(normalizeRoiHebelText)
     .filter(t=>!(authorityConfirmed&&isObsoleteGfCfoText(t)))
     .filter(t=>!isTechnicalIntegrationDetail(t))
     .filter(t=>!moneyFragment.test(String(t||'')));
  o=o.map(normalizeRoiHebelText)
     .filter(t=>!(authorityConfirmed&&isObsoleteGfCfoText(t)))
     .filter(t=>!isTechnicalIntegrationDetail(t))
     .filter(t=>!moneyFragment.test(String(t||'')));
  p=p.map(normalizeRoiHebelText);

  return {
    positive:shortUniqueList(p.filter(t=>!isUnsafeRoiCalculationText(t)&&!/^Wirtschaftliche Plausibilität separat validieren:/i.test(String(t||''))),4),
    risks:shortUniqueList(r,4),
    open:shortUniqueList(o,4)
  };
}

function buildCockpitMatrixData(accId,health){
  const raw=getCurrentUserKnowledgeText(accId).toLowerCase();
  const authorityContext=hasConfirmedFullDecisionAuthority(accId)||hasAuthoritySignalInHealth(health);
  const budgetSignalContext=hasBudgetSignalInHealth(health)||/budget|freigabe|pilotstart|beauftragung/.test(raw);
  const lowPilotUnderBudget=hasLowKi21PilotUnderBudget(accId);
  const explicitContractSignal=hasExplicitContractProcessSignal(accId,health);
  const positives=shortUniqueList((health.positive||[]).filter(s=>!s.disabled).map(s=>sanitizeCockpitTextFinal(accId,s.text,'positive',{authority:authorityContext,budgetFit:lowPilotUnderBudget,budgetSignal:budgetSignalContext})),4);
  const risks=shortUniqueList((health.warning||[]).filter(s=>!s.disabled).map(s=>sanitizeCockpitTextFinal(accId,s.text,'warning',{authority:authorityContext,budgetFit:lowPilotUnderBudget,budgetSignal:budgetSignalContext})),4);
  const open=shortUniqueList((health.open||[]).map(s=>sanitizeCockpitTextFinal(accId,s.text,'open',{authority:authorityContext,budgetFit:lowPilotUnderBudget,budgetSignal:budgetSignalContext})),4);

  // Chancen aus bestätigten harten Fakten ergänzen, falls die KI-Liste zu dünn ist.
  if(authorityContext&&!hasTextInList(positives,/entscheidungsbefugnis|entscheider/i)){
    positives.unshift('Entscheidungsbefugnis bestätigt');
  }
  if(lowPilotUnderBudget&&!hasTextInList(positives,/angebot|startangebot|budgetrahmen|budget/i)){
    positives.push('Startangebot liegt klar im Budgetrahmen');
  } else if(/budget|freigabe|pilotstart|beauftragung/.test(raw)&&!hasTextInList(positives,/budget/i)){
    positives.push('Budgetrahmen vorhanden');
  }
  if((getEuroAmountsByRole(raw,'pain').length>0 || /schmerz|vermeidungsquote|schlechte deals|schwach qualifizierte deals|qualifizierte deals|discovery/.test(raw))&&!hasTextInList(positives,/schmerz|bedarf|nutzen/i)){
    positives.push('Schmerz konkret benannt');
  }

  // Wenn der Score sichtbar mittelmäßig ist, darf die Matrix nicht "keine Risiken" zeigen.
  // Dann sind fehlender Business Case, Pilotstart oder Vertragsprozess Bremsfaktoren.
  if((health.score||0)<70 && risks.length===0){
    if(!hasTextInList(open,/wirtschaft|nutzen|business|roi|vermeidungsquote/i)){
      risks.push('Business Case noch nicht belastbar');
    }
    if(!hasTextInList(open,/pilot|start|zeitplan/i)){
      risks.push('Pilotstart noch nicht verbindlich');
    }
    if(explicitContractSignal&&!hasTextInList(open,/vertrag|beschaffung|einkauf|paper|bestell/i)){
      risks.push('Vertragsprozess noch offen');
    }
  }

  // Offene Punkte auffüllen, damit "Die eine Sache" nicht leer oder zu generisch bleibt.
  if(!hasTextInList(open,/wirtschaft|nutzen|business|roi|vermeidungsquote/i)){
    open.push(authorityContext
      ? 'Wirtschaftlichen Nutzen mit Entscheider validieren'
      : 'Wirtschaftlichen Entscheider validieren');
  }
  if((health.score||0)<70 && !hasTextInList(open,/pilot|start/i))open.push('Pilotstart konkretisieren');
  if((health.score||0)<70 && explicitContractSignal && !hasTextInList(open,/vertrag|beschaffung|einkauf|paper|bestell/i))open.push('Vertragsprozess klären');

  // Finale Cockpit-Säuberung: Budget-/Preisverwechslungen und überholte GF-Punkte dürfen nicht sichtbar bleiben.
  const cleanFinal=(list,kind)=>shortUniqueList((list||[]).map(t=>sanitizeCockpitTextFinal(accId,t,kind,{authority:authorityContext,budgetFit:lowPilotUnderBudget,budgetSignal:budgetSignalContext})).filter(Boolean),4);
  let finalPositive=cleanFinal(positives,'positive');
  let finalRisks=cleanFinal(risks,'warning');
  let finalOpen=cleanFinal(open,'open');
  if(lowPilotUnderBudget&&!hasTextInList(finalPositive,/angebot|startangebot|budgetrahmen|budget/i)){
    finalPositive.push('Startangebot liegt klar im Budgetrahmen');
  }
  if(authorityContext&&!hasTextInList(finalOpen,/wirtschaft|nutzen|vermeidungsquote|pilot|start/i)){
    finalOpen.push('Wirtschaftlichen Nutzen und Pilotkriterien validieren');
  }
  // v4.152: absolute finale Cockpit- und Bottom-Sheet-Sperre gegen alte Budget-/GF-Rückfälle aus gecachten Health-Texten.
  finalPositive=cleanFinal(finalPositive,'positive');
  finalRisks=cleanFinal(finalRisks,'warning')
    .map(normalizeRoiHebelText)
    .filter(t=>!(authorityContext&&isObsoleteGfCfoText(t)))
    .filter(t=>!(lowPilotUnderBudget&&isObsoleteBudgetPriceConfusion(t)))
    .filter(t=>!isTechnicalIntegrationDetail(t));
  finalOpen=cleanFinal(finalOpen,'open')
    .map(normalizeRoiHebelText)
    .filter(t=>!(authorityContext&&isObsoleteGfCfoText(t)))
    .filter(t=>!(lowPilotUnderBudget&&isObsoleteBudgetPriceConfusion(t)))
    .filter(t=>!isTechnicalIntegrationDetail(t));
  const hasVQCase=hasVermeidungsquoteBusinessCase(accId,health);
  if(hasVQCase&&!hasTextInList(finalRisks,/vermeidungsquote|vermeidbar/i)){
    const insertAt=finalRisks.length&&/entscheidung|gestoppt|verzögert|beauftragung|startentscheidung/i.test(finalRisks[0])?1:0;
    finalRisks.splice(insertAt,0,'Vermeidungsquote schwach qualifizierter Deals noch nicht validiert');
  }
  if(hasVQCase){
    const comp=finalRisks.filter(t=>/wettbewerb|konkurrenz/i.test(String(t||'')));
    finalRisks=finalRisks.filter(t=>!/wettbewerb|konkurrenz/i.test(String(t||'')));
    finalRisks=finalRisks.concat(comp);
  }
  if(hasVQCase){
    finalOpen=finalOpen.filter(t=>!/^(Einstiegsumfang und Starttermin festlegen|Umfang und Starttermin festlegen|Angebotsumfang und Starttermin klären)$/i.test(String(t||'')))
      .filter(t=>!/pilot[-\s]?starttermin|deal[-\s]?liste|starttermin.*deal/i.test(String(t||'')));
  }
  if(hasVQCase&&!hasTextInList(finalOpen,/pilot[-\s]?deals|messkriterien|vermeidungsquote/i)){
    finalOpen.unshift('Konkrete Pilot-Deals und Messkriterien zur Vermeidungsquote offen');
  }
  if(lowPilotUnderBudget&&!hasTextInList(finalPositive,/angebot|startangebot|budgetrahmen|budget/i))finalPositive.push('Startangebot liegt klar im Budgetrahmen');
  if((health.score||0)<70&&finalRisks.length===0)finalRisks.push(hasVQCase?'Vermeidungsquote schwach qualifizierter Deals noch nicht validiert':'ROI-Annahme / Vermeidungsquote noch nicht gemessen');
  if(!finalOpen.length)finalOpen.push(authorityContext?'Wirtschaftlichen Nutzen mit Entscheider validieren':'Wirtschaftlichen Entscheider validieren');
  finalPositive=preferConcreteCockpitFacts(accId,finalPositive).map(t=>sanitizeBadExtractionArtifacts(accId,t,'positive')).filter(Boolean);
  if(!explicitContractSignal){
    finalOpen=finalOpen.filter(t=>!/vertragsprozess|vertrag|bestellprozess|einkauf|procurement|paper/i.test(String(t||'')));
    finalRisks=finalRisks.filter(t=>!/vertragsprozess|vertrag|bestellprozess|einkauf|procurement|paper/i.test(String(t||'')));
  }
  const protectedMatrix=applyProtectedCockpitSnapshot(accId,health,
    shortUniqueList(finalPositive.map(normalizeRoiHebelText),4),
    shortUniqueList(finalRisks.map(normalizeRoiHebelText),4),
    shortUniqueList(finalOpen.map(normalizeRoiHebelText),4));
  return applyEarlyPhaseCockpitMatrixClean(accId,protectedMatrix);
}

function extractBulletsAfterHeader3(text,headerKeyword,maxItems){
  const lines=(text||'').split('\n');const out=[];let found=false;
  for(let i=0;i<lines.length;i++){
    if(!found){if(lines[i].toUpperCase().includes(headerKeyword.toUpperCase()))found=true;continue;}
    const t=lines[i].trim();if(!t)break;
    if(/^[A-ZÄÖÜ🎯🔥❓•\-]/.test(t)&&out.length>0)break;
    out.push(t.replace(/^[•\-]\s*/,''));if(out.length>=(maxItems||3))break;
  }
  return out;
}
function extractFirstBulletAfterHeader3(text,headerKeyword){
  const b=extractBulletsAfterHeader3(text,headerKeyword,1);return b.length?b[0]:'';
}

function toggleHealthSignal(accId,text,origin,type,refreshFn){
  const manual=getHealthManual(accId);
  if(origin==='AUTO'||origin==='ERGAENZUNG'){
    const idx=manual.removedAutoTexts.indexOf(text);
    if(idx>=0)manual.removedAutoTexts.splice(idx,1);
    else manual.removedAutoTexts.push(text);
  }else{
    const item=manual.added.find(m=>m.text===text&&m.type===type);
    if(item)item.active=item.active===false?true:false;
  }
  LS.set('ki21_health_manual_'+accId,manual);
  renderHealthBadgeIfPresent();
  if(refreshFn)refreshFn();
}

function splitDetailsFromResult(text){
  if(!text)return {main:'',details:''};
  // Robuster Marker-Match: erlaubt führende Markdown-Zeichen (#, -, =, *, Leerzeichen) vor/nach ###DETAILS###,
  // falls die KI das exakte Format leicht abweichend ausgibt (z.B. "## ###DETAILS###" oder "###DETAILS###  ")
  const markerRegex=/[#\-=*\s]*###\s*DETAILS\s*###[#\-=*\s]*/i;
  const m=text.match(markerRegex);
  if(!m)return {main:text,details:''};
  const idx=m.index;
  return {main:text.slice(0,idx).trim(),details:text.slice(idx+m[0].length).trim()};
}

function buildPhaseInvestmentLine(accId){
  const ctx=extractOfferPricingPeriodContext(accId);
  if(!ctx.startAmount)return 'Investition: konkreter Angebotspreis noch zu klären.';
  let txt='Investition: '+formatEuroDE(ctx.startAmount)+' Startangebot';
  if(ctx.includedMonths)txt+=' inkl. '+ctx.includedMonths+' Monate App';
  if(ctx.recurringAmount&&ctx.recurringMonthly&&ctx.recurringAmount!==ctx.startAmount){
    if(ctx.recurringPerUser&&ctx.userCount&&ctx.recurringAmount!==ctx.startAmount)txt+='; danach '+formatEuroDE(ctx.recurringAmount*ctx.userCount)+'/Monat bei '+ctx.userCount+' Usern';
    else txt+='; danach '+formatEuroDE(ctx.recurringAmount)+'/Monat';
  }
  return txt+'.';
}

function sanitizeIndustryHypothesisAsOrientation(text){
  if(!text)return text;
  let x=String(text);
  // Branchen-/Benchmarkquoten dürfen als Orientierung bleiben, aber nie als berechneter ROI/Nutzen.
  x=x.replace(/\(?\s*Branchenhypothese:\s*(\d{1,3}\s*[–-]\s*\d{1,3}\s*%)([^\n)]*)\)?\.?/gi,
    'BRANCHENHYPOTHESE: $1$2 – nur unvalidierte Orientierung; nicht als ROI-Berechnung verwenden, Wirkung mit echten Deals messen.');
  x=x.replace(/\(?\s*Benchmark:\s*(\d{1,3}\s*[–-]\s*\d{1,3}\s*%)([^\n)]*)\)?\.?/gi,
    'BRANCHENHYPOTHESE: $1$2 – nur unvalidierte Orientierung; nicht als ROI-Berechnung verwenden, Wirkung mit echten Deals messen.');
  // Alte Formulierungen neutralisieren, wenn sie aus Orientierungsquoten bereits €-Nutzen machen.
  x=x.replace(/(?:bei|aus)\s+\d{1,3}\s*[–-]\s*\d{1,3}\s*%[^\n]*(?:=|→|ergibt|entspricht)[^\n]*(?:€|EUR|Nutzen|ROI|Amortisation|Payback)[^\n]*/gi,
    'Branchenhypothese nur als Orientierung – keine €-Nutzen-/ROI-Berechnung daraus ableiten; Wirkung mit echten Deals messen.');
  return x;
}


function sanitizeAuthorityRequirementText(accId,text){
  if(!text)return text;
  let x=String(text);
  const authority=accId&&(hasConfirmedFullDecisionAuthority(accId)||hasAuthoritySignalInHealth(getOpportunityHealth(accId)));
  if(!authority)return x.replace(/\bkeine\s+Keine\b/gi,'keine');
  const name=(getConfirmedDecisionMakerName(accId)||'der bestätigte Entscheider');
  // Keine zusätzliche Freigabe-/Bestätigungslogik erfinden, wenn Entscheidungsbefugnis bestätigt ist.
  x=x.replace(/Geschäftsführer[-\s]?Bestätigung\s+ist\s+Voraussetzung/gi,'wirtschaftliche Annahme mit '+name+' anhand echter Deals validieren');
  x=x.replace(/ohne\s+(?:diese\s+)?(?:Zahl|Bestätigung)[^\n.]{0,120}Geschäftsführer[^\n.]*(?:\.|$)/gi,'Ohne Validierung mit echten Deals bleibt die wirtschaftliche Wirkung ungesichert.');
  x=x.replace(/(?:GF|Geschäftsführer(?:in)?|Geschäftsführung)[-\s]?(?:Freigabe|Bestätigung|Zustimmung|Commitment)\s+(?:ist\s+)?(?:Voraussetzung|erforderlich|nötig|notwendig)/gi,'Validierung mit '+name+' anhand echter Deals erforderlich');
  x=x.replace(/(?:Termin|Gespräch)\s+mit\s+(?:dem\s+)?(?:GF|Geschäftsführer(?:in)?|Geschäftsführung)[^\n]*/gi,'Termin mit '+name+' zur Validierung echter Pilot-Deals und Messkriterien');
  x=x.replace(/(?:GF|Geschäftsführer(?:in)?|Geschäftsführung)[-\s]?Kopie\s+vorbereiten[^\n]*/gi,'Validierungsnotiz für '+name+' vorbereiten: Pilot-Deals, Erfolgskriterien, Wirkungsmessung.');
  x=x.replace(/(?:GF|Geschäftsführer(?:in)?|Geschäftsführung)\s+an\s+den\s+Tisch\s+bringen[^\n.]*(?:\.|$)/gi,'wirtschaftliche Wirkung mit '+name+' anhand echter Deals validieren.');
  x=x.replace(/Marius\s+und\s+(?:GF|Geschäftsführer(?:in)?|Geschäftsführung)/gi,name);
  x=x.replace(/(?:GF|Geschäftsführer(?:in)?|Geschäftsführung)\s+und\s+Marius/gi,name);
  x=x.replace(/(?:GF|Geschäftsführer(?:in)?|Geschäftsführung)\s+muss\s+(?:die\s+)?(?:\d[\d\.\s,]*\s*€\s*)?(?:Jahres)?(?:schaden|Kosten|Zahl|Wirkung|Vermeidungsquote)[^\n.]*(?:\.|$)/gi,name+' validiert die wirtschaftliche Annahme anhand echter Deals.');
  x=x.replace(/Forecast[-\s]?Vorhersagen\s+des\s+Geschäftsführers/gi,'Forecast-Prognosen');
  x=x.split('\n').map(line=>{
    const l=String(line);
    if(/(?:GF|Geschäftsführer(?:in)?|Geschäftsführung)/i.test(l)&&/(Freigabe|Bestätigung|Zustimmung|Commitment|Kopie|Termin|an den Tisch|isoliert|Voraussetzung|muss)/i.test(l)&&!/(kritisiert|Kritik|Forecast-Qualität|Schmerzpunkt)/i.test(l)){
      return l.replace(/^\s*(?:\d+\.\s*)?/,'').replace(/.*/,'Mit '+name+' Pilot-Deals, Erfolgskriterien und Wirkungsmessung festlegen.');
    }
    return l;
  }).join('\n');
  return x.replace(/\bkeine\s+Keine\b/gi,'keine');
}
function sanitizeNoRoiCertaintyText(text){
  if(!text)return text;
  let x=String(text);
  // v4.186: Perioden nicht vermischen. Monatliche Häufigkeit und jährlicher Schaden dürfen nicht zu
  // falschen Durchschnittswerten oder Nutzenrechnungen kombiniert werden.
  x=x.replace(/(?:\d{1,3}\s*(?:Deals?|Fälle)[^\n]{0,40}(?:Monat|monatlich)[^\n]{0,80})[×x*][^\n]{0,80}\d[\d.\s,]*\s*(?:€|EUR|Euro)[^\n]{0,40}(?:Jahr|jährlich|p\.a\.)[^\n]*/gi,'Bekannte Größenordnung getrennt halten: monatliche Häufigkeit und jährlicher Schaden sind zu validieren; keine Durchschnitts- oder ROI-Rechnung ohne belastbare Periodenlogik.');
  x=x.replace(/(?:durchschnittlich|im\s+Schnitt|pro\s+(?:schlechtem\s+)?Deal)[^\n]{0,80}\d[\d.\s,]*\s*(?:€|EUR|Euro)[^\n]*(?:Schaden|Kosten|Verlust)[^\n]*/gi,'Schaden pro Deal noch nicht belastbar beziffert; mit echten Deals validieren.');
  x=x.replace(/(?:48\s*(?:im\s+)?Jahr|48\s*(?:Deals?|Fälle)\/Jahr)[^\n]{0,120}(?:potenzieller|jährlicher|Nutzen|Schaden|ROI)[^\n]*/gi,'Jahresmenge aus monatlicher Häufigkeit nur als Orientierung verwenden; wirtschaftliche Wirkung mit echten Deals validieren.');
  x=x.replace(/\b(?:25|30|50|75)\s*%\s*,\s*(?:25|30|50|75)\s*%\s*,\s*(?:25|30|50|75)\s*%\??/gi,'welcher Anteil?');
  x=x.replace(/\b(?:25|30|50|75)\s*%\s*\/\s*(?:25|30|50|75)\s*%\s*\/\s*(?:25|30|50|75)\s*%\??/gi,'welcher Anteil?');
  x=x.replace(/\b(?:2\.000|2000)\s*[–-]\s*(?:3\.333|3333)\s*€\s*\/\s*Monat[^\n.]*/gi,'Nutzen/Wirkung noch nicht belastbar bezifferbar');
  x=x.replace(/Laufender\s+Nutzen\s+\d[\d\.\s,]*\s*[–-]\s*\d[\d\.\s,]*\s*€\s*\/\s*Monat[^\n.]*/gi,'Laufender Nutzen: noch zu validieren – Wirkung mit echten Deals messen');
  x=x.replace(/rechtfertigt\s+(?:das\s+)?Angebot\s+schon[^\n.]*(?:\.|$)/gi,'muss mit echten Deals messbar geprüft werden.');
  x=x.replace(/ROI\s+durch\s+[^\n.]*gesichert/gi,'wirtschaftliche Wirkung wird durch echte Deals validiert');
  x=x.replace(/zahlt\s+sich\s+[^\n.]*von\s+selbst\s+aus/gi,'lässt sich mit echten Deals belastbar prüfen');
  x=x.replace(/eine\s+schwach\s+qualifizierte\s+Opportunity\s+kostet\s+Euch\s+erfahrungsgemäß\s+\d[\d\.\s,]*\s*[–-]\s*\d[\d\.\s,]*\s*€[^\n.]*(?:\.|$)/gi,'die wirtschaftliche Wirkung muss mit echten Opportunities gemessen werden.');
  return x;
}



// v4.185: Output-Integrity-Guard. Allgemein gültig, nicht case-spezifisch.
// Ziel: keine Ersatz-/Next-Step-Sätze mitten in fachlichen Abschnitten, keine Scheingenauigkeit,
// keine Pflichtinstanz aus Stakeholderrollen, keine Prozentstaffeln aus unvalidierten Annahmen.
function sanitizeOutputIntegrityText(accId,text,kind){
  if(!text)return text;
  let x=String(text);
  // v4.186: Perioden-/Einheitenintegrität. Keine Monats-/Jahreswerte vermischen und keine
  // Jahresgesamtsumme als Schaden pro Deal ausgeben.
  x=x.replace(/(?:\d{1,3}\s*(?:Deals?|Fälle)[^\n]{0,40}(?:Monat|monatlich)[^\n]{0,100})[×x*][^\n]{0,100}\d[\d.\s,]*\s*(?:€|EUR|Euro)[^\n]{0,60}(?:Jahr|jährlich|p\.a\.)[^\n]*/gi,'Bekannte Größenordnung: monatliche Häufigkeit und jährlicher Gesamtschaden getrennt validieren; keine Durchschnittsrechnung ohne belastbare Periodenlogik.');
  x=x.replace(/(?:durchschnittlich|im\s+Schnitt|pro\s+(?:schlechtem\s+)?Deal)[^\n]{0,100}\d[\d.\s,]*\s*(?:€|EUR|Euro)[^\n]*(?:Schaden|Kosten|Verlust)[^\n]*/gi,'Schaden pro Deal noch nicht belastbar beziffert; mit echten Deals validieren.');
  x=x.replace(/(?:wieviel|wie\s+viel)\s*%[^\n]{0,160}(?:retten|gerettet|vermeiden|vermeidbar)[^\n]*/gi,'Welche konkreten Fälle wären durch bessere Discovery früher erkannt, gerettet oder disqualifiziert worden?');
  const authority=accId&&(hasConfirmedFullDecisionAuthority(accId)||hasAuthoritySignalInHealth(getOpportunityHealth(accId))||hasExplicitAuthorityText(accId));
  const decName=(accId&&getConfirmedDecisionMakerName(accId))||'der bestätigte Entscheider';
  const inv=accId?buildPhaseInvestmentLine(accId).replace(/^Investition:\s*/,'').replace(/\.$/,''):'';

  // 1) Keine generischen Ersatz-Aktionssätze mitten in Bewertungs-/Nutzen-/Argumentationsabschnitten.
  const actionLine=/^(?:Mit\s+[^\n]{1,80}\s+)?(?:Pilot[-\s]?Deals|Top[-\s]?\d+[-\s]?Deals)[^\n]{0,180}(?:Wirkungsmessung|Erfolgskriterien|Vermeidungsquote|Messkriterien)[^\n]*\.?$/i;
  let section='';
  const allowedActionSection=()=>/(DIE EINE SACHE|NÄCHSTER SCHRITT|WENN DU MORGEN|OFFENE PUNKTE|RÜCKFRAGEN|NÄCHSTE AKTION|GESPRÄCHSSTRATEGIE)/i.test(section);
  x=x.split('\n').filter(line=>{
    const t=line.trim();
    if(/^(?:[⚠️🎯💰⚡🔥🤝]?\s*)?(EINSCHÄTZUNG|DIE 5 PUNKTE|ROI[-\s]?WIRKSAME|WIRTSCHAFTLICHER NUTZEN|DIE EINE SACHE|NÄCHSTER SCHRITT|WENN DU MORGEN|KAUFARGUMENTE|EINWÄNDE|OFFENE PUNKTE|ERÖFFNUNGSSATZ|DER EINE ABSCHLUSSSATZ|BENCHMARK|IHR BUSINESS CASE|LAUFENDER NUTZEN|INVESTITION|ROI\s*\/\s*ENTSCHEIDUNGSLOGIK|OFFENE RÜCKFRAGEN|GESPRÄCHSSTRATEGIE)/i.test(t)) section=t;
    if(actionLine.test(t)&&!allowedActionSection())return false;
    return true;
  }).join('\n');

  // 2) Prozentstaffeln/konkrete Prozentoptionen bei Vermeidungs-/Wirkungsquote nur zulassen, wenn als Kundenangabe belegt.
  const rawCtx=accId?String(getCurrentUserKnowledgeText(accId)||''):'';
  const explicitPct=/(?:kunde|entscheider|kontakt|ansprechpartner).{0,80}\d{1,3}\s*%.{0,80}(?:vermeidungsquote|vermeidbar|wirkung|quote)|(vermeidungsquote|vermeidbar|wirkung|quote).{0,80}\d{1,3}\s*%.{0,80}(?:bestätigt|genannt|sagt|kundenangabe)/i.test(rawCtx);
  if(!explicitPct){
    x=x.replace(/\b(?:\d{1,3}\s*%\s*,\s*){1,4}\d{1,3}\s*%\??/gi,'welcher Anteil?');
    x=x.replace(/\b(?:\d{1,3}\s*%\s*\/\s*){1,4}\d{1,3}\s*%\??/gi,'welcher Anteil?');
    x=x.replace(/\b(?:20|25|30|40|50|60|70|75)\s*[–-]\s*(?:30|40|50|60|70|75|80)\s*%[^\n]*(?:€|EUR|Nutzen|ROI|Jahr|Monat|Payback|Amortisation)[^\n]*/gi,'Branchenhypothese nur als Orientierung; keine Nutzen-/ROI-Rechnung daraus ableiten. Wirkung mit echten Deals messen.');
    x=x.replace(/(?:Wenn|Falls)\s+\d{1,3}\s*%[^\n]*(?:=|ergibt|läge|entsteht|entspricht)[^\n]*(?:€|EUR|Nutzen|ROI)[^\n]*/gi,'Wenn eine Wirkung messbar ist, muss sie mit echten Deals validiert werden; keine Prozentrechnung ohne Kundenbeleg.');
    x=x.replace(/\b(?:20|25|30|40|50|60|70|75)\s*%\??(?=[\s).,;]|$)/gi,'welcher Anteil?');
  }

  // 3) Kundenhypothesen sauber kennzeichnen: genannte grobe Schadensgrößen sind nicht automatisch validierte Wirkung.
  x=x.replace(/(geschätz(?:ter|te|tes|t)?[^\n]{0,80}\d[\d\.\s,]*\s*(?:€|EUR)[^\n]{0,80})(?:\(\s*BESTÄTIGT\s*(?:von[^)]*)?\)|–\s*bereits\s+validiert|bereits\s+validiert)/gi,'$1 (von Kunden genannt; Zusammensetzung und Vermeidbarkeit zu validieren)');
  x=x.replace(/\b(BESTÄTIGT\s+von\s+[^\n]{1,40})\b(?=[^\n]*(geschätzt|Schätzung|grob|Hypothese|Annahme))/gi,'von Kunden genannt; zu validieren');

  // 4) Stakeholder-/GF-Pflicht allgemein blockieren, wenn Entscheidungsbefugnis bestätigt ist.
  if(authority){
    x=x.replace(/ohne\s+wirtschaftliche\s+Dimensionierung\s+durch\s+(?:den\s+)?(?:GF|Geschäftsführer(?:in)?|Geschäftsführung)[^\n.]*(?:\.|$)/gi,'Ohne Validierung mit echten Deals bleibt die wirtschaftliche Wirkung ungesichert.');
    x=x.replace(/(?:GF|Geschäftsführer(?:in)?|Geschäftsführung)[-\s]?Status\s+bestätigen[^\n]*/gi,'Formale Beauftragung und Startzuständigkeit klären.');
    x=x.replace(/(?:GF|Geschäftsführer(?:in)?|Geschäftsführung)\s+nach\s+wirtschaftlicher\s+Zielgröße[^\n.]*/gi,'Wirtschaftliche Zielgröße mit '+decName+' anhand echter Deals validieren');
    x=x.replace(/(?:GF|Geschäftsführer(?:in)?|Geschäftsführung).{0,80}(?:Voraussetzung|erforderlich|nötig|muss|Freigabe|Bestätigung|Zusage|Commitment)[^\n.]*(?:\.|$)/gi,'Wirkung und Erfolgskriterien mit '+decName+' anhand echter Deals validieren.');
    x=x.replace(/Geschäftsführer(?:in)?\s+involviert:\s*/gi,'Management-Sicht: ');
    x=x.replace(/Geschäftsführung\s+involviert:\s*/gi,'Management-Sicht: ');
    x=x.replace(/(?:gemeinsam\s+mit\s+)?(?:GF|Geschäftsführer(?:in)?|Geschäftsführung)[^\n]{0,80}(?:durchsprechen|anschauen|validieren|fragen|klären)[^\n.]*(?:\.|$)/gi,'Bezifferter Schmerz mit '+decName+' anhand echter Deals validieren.');
    x=x.replace(/(?:durch|mit)\s+(?:den\s+)?(?:GF|Geschäftsführer(?:in)?|Geschäftsführung)[^\n.]*(?:\.|$)/gi,'mit '+decName+' anhand echter Deals validieren.');
  }

  // 5) Abschluss-/ROI-Ton entschärfen.
  x=x.replace(/\bSchneller\s+ROI\b/gi,'Schnelle Validierung');
  x=x.replace(/\bzahlender\s+Sponsor\b/gi,'entscheidungsbefugter Ansprechpartner');
  x=x.replace(/\bROI[-\s]?Logik\s+plausibel\b/gi,'wirtschaftlicher Hebel plausibel');
  x=x.replace(/rechtfertigt\s+(?:bereits|schon)?[^\n.]{0,140}(?:Startangebot|Angebot)[^\n.]*(?:\.|$)/gi,'wird mit echten Deals geprüft.');
  x=x.replace(/dreht\s+sich\s+die\s+Diskussion\s+von\s+["„]Wollen\s+wir\?["“]\s+zu\s+["„]Wie\s+schnell\s+skalieren\s+wir\?["“][^\n.]*(?:\.|$)/gi,'entsteht eine belastbare Grundlage für die nächste Entscheidung.');
  x=x.replace(/\bROI\s+positiv\b/gi,'ROI noch zu validieren');
  x=x.replace(/\bzahlt\s+sich\s+(?:das\s+)?(?:Angebot|Startangebot)?[^\n.]*aus/gi,'muss mit echten Deals validiert werden');

  // 6) Preiszeilen vollständig, aber ohne neue Rechnung aus unsicheren Rollen.
  if(inv){
    x=x.replace(/Angebotslogik\s+geklärt:\s*2\.900\s*€\s*Startangebot(?![^\n]*(?:inkl|danach))/gi,'Angebotslogik geklärt: '+inv);
    x=x.replace(/Angebotspreis\s+geklärt:\s*2\.900\s*€\s*Startangebot(?![^\n]*(?:inkl|danach))/gi,'Angebotspreis geklärt: '+inv);
  }

  // 7) Perioden-/ROI-Formulierungen final neutralisieren.
  x=x.replace(/(?:\d{1,3}\s*(?:Deals?|Fälle)\/Monat|\d{1,3}\s*(?:Deals?|Fälle)\s+pro\s+Monat)[^\n]{0,120}=\s*[^\n]*(?:€|EUR|Euro)[^\n]*/gi,'Monatliche Häufigkeit und wirtschaftliche Wirkung getrennt validieren; keine Rechnung ohne belastbare Kundendaten.');
  x=x.replace(/(?:30|50|70|75|25)\s*%[^\n]{0,80}(?:realistisch|retten|vermeid|Quote)[^\n]*/gi,'Vermeidungsquote offen; Wirkung mit echten Deals messen.');

  // 8) Doppelte oder verdrehte Negationen bereinigen.
  x=x.replace(/keine\s+Validierung\s+mit\s+([^\n]{1,60})\s+anhand\s+echter\s+Deals\s+erforderlich/gi,'keine zusätzliche Freigabe erforderlich; Wirkung mit echten Deals validieren');
  x=x.replace(/keine\s+Keine/gi,'keine');
  x=x.replace(/\n{3,}/g,'\n\n');
  return x.trim();
}


function sanitizeGeneratedOutputFinal(accId,text,kind){
  if(!text)return text;
  let x=String(text);
  const inv=buildPhaseInvestmentLine(accId||'').replace(/^Investition:\s*/,'').replace(/\.$/,'');
  const dec=(accId&&getConfirmedDecisionMakerName(accId))||'der bestätigte Entscheider';
  const authority=accId&&(hasConfirmedFullDecisionAuthority(accId)||hasAuthoritySignalInHealth(getOpportunityHealth(accId)));
  // Keine Ersatz-/Next-Step-Sätze mitten in fachlichen Abschnitten als einzelne Fremdkörper.
  x=x.split('\n').filter(line=>{
    const l=String(line||'').trim();
    if(!l)return true;
    if(/^Mit\s+[^\n]{0,80}Pilot-Deals,\s*Erfolgskriterien\s+und\s+Wirkungsmessung\s+festlegen\.?$/i.test(l))return false;
    if(/^Angebotslogik geklärt:\s*2\.900\s*€\s*Startangebot\.?$/i.test(l))return false;
    return true;
  }).join('\n');
  // Perioden-/Durchschnittsrechnungen aus gemischten Einheiten nicht zulassen.
  x=x.replace(/\b\d+\s*Deals?\/Monat\s*[×x]\s*geschätzt\s*\d[\d\.\s,]*\s*€\s*jährlich\s*=\s*[^\n]*/gi,'Monatliche Häufigkeit und jährliche Schadensgröße getrennt validieren; keine Durchschnittsrechnung ohne belastbare Kundendaten.');
  x=x.replace(/\b\d+\s*(?:Deals?|Fälle)\/Monat\s*[=×x][^\n]*(?:€|EUR|Euro)[^\n]*/gi,'Monatliche Häufigkeit und wirtschaftliche Wirkung getrennt validieren; keine Rechnung ohne belastbare Kundendaten.');
  x=x.replace(/\bdurchschnittlich\s*~?\d[\d\.\s,]*\s*€\s*Schaden\s+pro\s+(?:schlechtem\s+)?Deal[^\n.]*/gi,'Schaden pro Deal ist noch nicht belastbar beziffert');
  // Prozentstaffeln und Nutzenranges aus unvalidierter Vermeidungsquote entfernen.
  x=x.replace(/\((?:\s*(?:Annahme|realistisch|konservativ)[^)]*)?(?:\d{1,3}\s*%\s*[,;–\-/oderund\s]*){2,}[^)]*\)/gi,'(Vermeidungsquote offen; mit echten Deals messen)');
  x=x.replace(/(?:\d{1,3}\s*%\s*[,;–\-/oderund\s]*){2,}(?:\?|[^\n.]*)/gi,'Vermeidungsquote offen; mit echten Deals messen');
  x=x.replace(/\b\d[\d\.\s,]*\s*[–-]\s*\d[\d\.\s,]*\s*€\s*\/\s*(?:Jahr|Monat)[^\n]*/gi,'Nutzenhöhe noch zu validieren – keine €-Range aus unvalidierter Annahme ableiten.');
  x=x.replace(/\b(?:\d{1,3}\s*[–-]\s*\d{1,3}\s*%|\d{1,3}\s*%)\s+der\s+[^\n]*(?:Deals|Schäden|Vermeidungsquote)[^\n]*/gi,'Vermeidungsquote offen; Wirkung mit echten Deals messen.');
  // 80.000 € nicht gleichzeitig final bestätigt und unvalidiert darstellen.
  x=x.replace(/(80\.000\s*€[^\n]{0,80})(?:BESTÄTIGT|bestätigt|bereits\s+validiert)([^\n]*)/gi,'$1von Kunden genannt; Zusammensetzung und Vermeidbarkeit noch zu validieren$2');
  x=x.replace(/Schmerz\s+ist\s+real,\s+aber\s+unquantifiziert/gi,'Schmerz ist real, die wirtschaftliche Wirkung ist noch zu validieren');
  // GF/Geschäftsführung nicht als Pflichtinstanz bei bestätigter Entscheidungsbefugnis.
  if(authority){
    x=x.replace(/ohne\s+wirtschaftliche\s+Dimensionierung\s+durch\s+(?:den\s+)?(?:GF|Geschäftsführer(?:in)?|Geschäftsführung)[^\n.]*(?:\.|$)/gi,'Ohne Validierung mit echten Deals bleibt die wirtschaftliche Wirkung ungesichert.');
    x=x.replace(/(?:gemeinsam\s+mit\s+)?(?:GF|Geschäftsführer(?:in)?|Geschäftsführung)[^\n]{0,100}(?:durchsprechen|anschauen|validieren|fragen|klären|bestätigen)[^\n.]*(?:\.|$)/gi,'Bezifferter Schmerz mit '+dec+' anhand echter Deals validieren.');
    x=x.replace(/(?:GF|Geschäftsführer(?:in)?|Geschäftsführung)[-\s]?Status\s+bestätigen[^\n.]*/gi,'Formale Beauftragung und Startzuständigkeit klären');
    x=x.replace(/(?:GF|Geschäftsführer(?:in)?|Geschäftsführung)[^\n.]*(?:Voraussetzung|erforderlich|nötig|muss|Freigabe|Zusage)[^\n.]*(?:\.|$)/gi,'Wirkung und Erfolgskriterien mit '+dec+' anhand echter Deals validieren.');
    x=x.replace(/Marius\s+müssen\s+gemeinsam/gi,'Marius sollte');
  }
  // Preis-/Angebotslogik vollständig ausgeben, wenn erkannt.
  if(inv&&!/noch\s+zu\s+klären/i.test(inv)){
    x=x.replace(/•\s*Investition:[^\n]*/gi,'• Investition: '+inv+'.');
    x=x.replace(/Konkrete\s+Angebotskonfiguration[^\n]*/gi,'Angebotskonfiguration: '+inv+'.');
    x=x.replace(/Angebotspreis\s+für\s+[^\n]*(?:intern\s+)?klären[^\n]*/gi,'Angebotskonfiguration verwenden: '+inv+'.');
  }
  // Tonalität: keine Scheinsicherheit.
  x=x.replace(/\bSchneller\s+ROI\b/gi,'Messbare Validierung');
  x=x.replace(/selbst\s+geringe\s+Vermeidungsquoten\s+rechtfertigen\s+den\s+Einsatz/gi,'die Wirkung muss mit echten Deals validiert werden');
  x=x.replace(/rechtfertigt\s+(?:bereits|schon)?[^\n.]{0,140}(?:Startangebot|Angebot|Einsatz)[^\n.]*(?:\.|$)/gi,'wird mit echten Deals geprüft.');
  x=x.replace(/zahlt\s+sich\s+von\s+selbst\s+aus/gi,'muss mit echten Deals validiert werden');
  x=x.replace(/\n{3,}/g,'\n\n');
  return x.trim();
}


// v4.189: Finaler Output-Cleaner ohne aggressive Inline-Wortersetzungen.
// Prinzip: kaputte oder unsichere Sätze als ganze Zeilen entfernen/neutralisieren,
// nicht mitten im Satz einzelne Tokens austauschen. Allgemeingültig über Rollen/Evidenz.
function sanitizeFinalOutputV4188(accId,text,kind){
  if(!text)return text;
  let x=String(text);
  const authority=accId&&(hasConfirmedFullDecisionAuthority(accId)||hasAuthoritySignalInHealth(getOpportunityHealth(accId))||hasExplicitAuthorityText(accId));
  const dec=(accId&&getConfirmedDecisionMakerName(accId))||'der bestätigte Entscheider';
  const inv=accId?buildPhaseInvestmentLine(accId).replace(/^Investition:\s*/,'').replace(/\.$/,''):'';
  const rawCtx=accId?String(getCurrentUserKnowledgeText(accId)||''):'';
  const explicitPct=/(?:vermeidungsquote|wirkung|rettungsquote|anteil).{0,80}\d{1,3}\s*%.{0,80}(?:bestätigt|genannt|kundenangabe|sagt|validiert)|(?:kunde|entscheider|kontakt|ansprechpartner).{0,80}\d{1,3}\s*%.{0,80}(?:vermeidungsquote|wirkung|rettungsquote|anteil)/i.test(rawCtx);

  // Kaputte Artefakte aus älteren Sanitizern vollständig entfernen.
  x=x.replace(/BranchenBRANCHENHYPOTHESE\s*:\s*/gi,'Branchenhypothese: ');
  x=x.replace(/\b(?:30|25|20)\s*[–-]\s*welcher Anteil\?/gi,'welcher Anteil?');
  x=x.replace(/\bwelcher Anteil\?\s*(?:–|-)\s*welcher Anteil\?/gi,'welcher Anteil?');
  x=x.replace(/\bwelcher Anteil\?\s*oder\s*welcher Anteil\?/gi,'welcher Anteil?');

  // Harte unsichere Rechenlogik vor dem Zeilenfilter neutralisieren.
  x=x.replace(/\b\d+\s*(?:Deals?|Fälle)\s*(?:\/|pro\s*)Monat\s*[×x*]\s*[^\n]*(?:€|EUR|Euro)[^\n]*/gi,
    'Monatliche Häufigkeit und wirtschaftliche Wirkung getrennt validieren; keine Rechnung ohne belastbare Kundendaten.');
  x=x.replace(/\b(?:durchschnittlich|im Schnitt|pro Deal|pro schlechtem Deal)[^\n]{0,100}\d[\d.\s,]*\s*(?:€|EUR|Euro)[^\n]*/gi,
    'Schaden pro Deal noch nicht belastbar beziffert; mit echten Deals validieren.');

  const safeLines=[];
  let section='';
  for(const rawLine of x.split('\n')){
    let line=rawLine;
    const t=line.trim();
    if(/^#{0,3}\s*(?:[⚠️🎯💰⚡🔥🤝]?\s*)?(EINSCHÄTZUNG|DIE 5 PUNKTE|ROI[-\s]?WIRKSAME|WIRTSCHAFTLICHER NUTZEN|DIE EINE SACHE|NÄCHSTER SCHRITT|WENN DU MORGEN|KAUFARGUMENTE|EINWÄNDE|OFFENE PUNKTE|ERÖFFNUNGSSATZ|DER EINE ABSCHLUSSSATZ|BENCHMARK|IHR BUSINESS CASE|LAUFENDER NUTZEN|INVESTITION|ROI\s*\/\s*ENTSCHEIDUNGSLOGIK|OFFENE RÜCKFRAGEN|GESPRÄCHSSTRATEGIE)/i.test(t)) section=t;

    // Keine kaputten Ersetzungszeilen ausgeben.
    if(/BranchenBRANCHENHYPOTHESE|30\s*[–-]\s*welcher Anteil|welcher Anteil\?\s*\)/i.test(t)) continue;

    // Prozentstaffeln/Quoten ohne Kundenbeleg: ganze Zeile neutralisieren oder entfernen.
    if(!explicitPct && /(?:\b\d{1,3}\s*%\b|\d{1,3}\s*[–-]\s*\d{1,3}\s*%)/.test(t) && /(Vermeidungsquote|Quote|Anteil|retten|gerettet|vermeid|Wirkung|Nutzen|ROI|Branchenhypothese|Benchmark)/i.test(t)){
      if(/^(?:•|-)?\s*(Unsichere Annahme|Validierungsfrage|Wichtigster Hebel|Laufender Nutzen|BENCHMARK|Benchmark|Branchenhypothese)/i.test(t)){
        line=line.replace(/:.*/,': Vermeidungsquote/Wirkung ist offen und muss mit echten Deals validiert werden.');
      }else{
        continue;
      }
    }

    // GF/CEO/CFO darf bei bestätigtem Entscheider Schmerz-/Stakeholderkontext sein, aber keine Pflicht-/Freigabe-/Validierungsinstanz.
    if(authority && /(?:GF|Geschäftsführer(?:in)?|Geschäftsführung|CEO|CFO)/i.test(t)){
      const allowed=/(kritisiert|Kritik|Forecast|Pipeline|Sichtbarkeit|Management-Sicht|Stakeholder|informieren|optional)/i.test(t)
        && !/(muss|müssen|soll|sollte|Termin|Freigabe|Bestätigung|Zustimmung|Commitment|Voraussetzung|erforderlich|nötig|validieren|durchsprechen|anschauen|fragen|Kopie|Status)/i.test(t);
      if(!allowed){
        if(/^(?:•|-)?\s*(?:Die 5 Punkte|KAUFARGUMENTE|Schmerz|BESTÄTIGT)/i.test(section+t)){
          line=line.replace(/(?:GF|Geschäftsführer(?:in)?|Geschäftsführung|CEO|CFO)/gi,'Management');
        }else{
          line='Bezifferter Schmerz und Erfolgskriterien mit '+dec+' anhand echter Deals validieren.';
        }
      }
    }

    // Keine Next-Step-Ersatzsätze mitten in Analyseabschnitten.
    if(/^(?:Mit\s+[^\n]{0,80}\s+)?(?:Pilot[-\s]?Deals|Top[-\s]?\d+[-\s]?Deals)[^\n]{0,160}(?:Wirkungsmessung|Erfolgskriterien|Messkriterien|Vermeidungsquote)[^\n]*\.?$/i.test(t)
       && !/(DIE EINE SACHE|NÄCHSTER SCHRITT|WENN DU MORGEN|OFFENE PUNKTE)/i.test(section)){
      continue;
    }

    // Angebot/Investition: wenn bekannt, zentral und vollständig ausgeben, aber nicht als ROI beweisen.
    if(inv && /^\s*•?\s*Investition\s*:/i.test(t)) line=line.replace(/^\s*•?\s*Investition\s*:.*/i,'• Investition: '+inv+'.');
    if(inv && /konkreter\s+Angebotspreis\s+noch\s+zu\s+klären|Angebotspreis\s+noch\s+nicht\s+hinterlegt|Preis\s+liegt\s+vermutlich|KI21\s*Compact\s+oder\s+Sprint/i.test(t)){
      line='• Investition: '+inv+'.';
    }

    // Falscher Sicherheits-/Abschluss-Ton.
    line=line.replace(/\bSchneller ROI\b/gi,'Validierung mit echten Deals');
    line=line.replace(/\bROI-Logik plausibel\b/gi,'wirtschaftlicher Hebel plausibel, Wirkung noch zu validieren');
    line=line.replace(/\bzahlender Sponsor\b/gi,'entscheidungsbefugter Ansprechpartner');
    line=line.replace(/selbst geringe Vermeidungsquoten rechtfertigen den Einsatz/gi,'die Wirkung muss mit echten Deals validiert werden');
    line=line.replace(/ROI[^\n.]{0,80}rechtfertigt[^\n.]*/gi,'ROI noch nicht belastbar berechenbar – Wirkung mit echten Deals validieren.');

    // Kundenangaben als Größenordnung, nicht gleichzeitig final bestätigt und ROI-validiert.
    line=line.replace(/geschätzte[nrms]?\s+Schaden\s+([\d.]+\s*€[^\n]{0,60})\s*[-–]?\s*bereits\s+validiert/gi,'geschätzter Schaden $1 – als Größenordnung genannt; Vermeidbarkeit noch zu validieren');
    line=line.replace(/\(BESTÄTIGT\s+von\s+[^)]*\)/gi,'(von Kunden genannt; Zusammensetzung und Vermeidbarkeit zu validieren)');
    line=line.replace(/\bbestätigt\s+und\s+wirtschaftlich\s+dimensioniert\b/gi,'als Größenordnung genannt; wirtschaftliche Wirkung noch zu validieren');

    if(line.trim()) safeLines.push(line);
    else safeLines.push(line);
  }
  x=safeLines.join('\n');

  // Nachbereinigung: doppelte identische Standardzeilen reduzieren.
  x=x.replace(/(?:Bezifferter Schmerz und Erfolgskriterien mit [^\n]+ anhand echter Deals validieren\.\s*\n){2,}/gi, m=>m.split('\n')[0]+'\n');
  x=x.replace(/(?:Vermeidungsquote\/Wirkung ist offen und muss mit echten Deals validiert werden\.\s*\n){2,}/gi,'Vermeidungsquote/Wirkung ist offen und muss mit echten Deals validiert werden.\n');
  x=x.replace(/\bkeine\s+Keine\b/gi,'keine');
  x=x.replace(/\n{3,}/g,'\n\n');
  return x.trim();
}

// v4.190: Phase 2 und Cockpit-Fragen ebenfalls strukturiert aus Rollen/Evidenz bauen.
// Ziel: keine alten freien LLM-Artefakte mehr in Bedarfsanalyse, Fragenbox oder Dossier.

// v4.198: Phase-2-Output deterministisch bereinigen, damit Bedarfsanalyse & Demo
// nicht durch ROI-/Pilot-Sprache aus späteren Phasen verunreinigt wird.
function cleanPhase2Output(text){
  if(!text)return text;
  let x=String(text);
  const replacements=[
    [/Messkriterien\s+für\s+die\s+Vermeidungsquote/gi,'konkrete Fälle und Nacharbeit'],
    [/Messkriterien\s+für\s+die\s+Wirkungsmessung/gi,'konkrete Fälle und Nacharbeit'],
    [/Vermeidungsquote/gi,'wirtschaftliche Wirkung'],
    [/Vermeidbarkeit/gi,'wirtschaftliche Wirkung'],
    [/Rettungsquote/gi,'wirtschaftliche Wirkung'],
    [/Pilot-Deals/gi,'Beispiel-Deals'],
    [/Pilot-Deal/gi,'Beispiel-Deal'],
    [/Pilot Setup/gi,'nächster Discovery-Schritt'],
    [/Pilot-Setup/gi,'nächster Discovery-Schritt'],
    [/Startprojekt/gi,'nächste Discovery'],
    [/\bPilot\b/gi,'Beispiel']
  ];
  replacements.forEach(([re,to])=>{x=x.replace(re,to);});

  const sectionHeads=['EINSCHÄTZUNG','🔥 SCHMERZ','🎬 ZEIGEN','❓ KLÄREN','⚠️ DIE EINE SACHE DIE FEHLT','NÄCHSTER SCHRITT DIESE WOCHE','🎯 WENN DU MORGEN NUR 30 MINUTEN HAST','###DETAILS###'];
  const isHead=(line)=>sectionHeads.some(h=>line.trim().toUpperCase().startsWith(h.toUpperCase())) || /^(EINSCHÄTZUNG|SCHMERZ|ZEIGEN|KLÄREN|DIE EINE SACHE|NÄCHSTER SCHRITT|WENN DU MORGEN)/i.test(line.trim());

  function limitBulletsInSection(src,heading,max){
    const lines=src.split('\n');
    const out=[];
    let inSec=false, count=0;
    for(let i=0;i<lines.length;i++){
      const line=lines[i];
      const t=line.trim();
      if(t.toUpperCase().startsWith(heading.toUpperCase())){inSec=true;count=0;out.push(line);continue;}
      if(inSec && t && isHead(t) && !t.toUpperCase().startsWith(heading.toUpperCase())){inSec=false;out.push(line);continue;}
      if(inSec && /^•\s*/.test(t)){
        count++;
        if(count<=max)out.push(line);
        continue;
      }
      out.push(line);
    }
    return out.join('\n');
  }
  x=limitBulletsInSection(x,'🔥 SCHMERZ',3);
  x=limitBulletsInSection(x,'❓ KLÄREN',3);

  const lines=x.split('\n');
  const out=[];
  let mode=null;
  let thirtyCount=0;
  for(let i=0;i<lines.length;i++){
    let line=lines[i];
    const t=line.trim();
    if(/^⚠️\s*DIE EINE SACHE DIE FEHLT/i.test(t)){mode='one';out.push(line);continue;}
    if(/^NÄCHSTER SCHRITT DIESE WOCHE/i.test(t)){mode='next';out.push(line);continue;}
    if(/^🎯\s*WENN DU MORGEN NUR 30 MINUTEN HAST/i.test(t)){mode='thirty';thirtyCount=0;out.push(line);continue;}
    if(t && isHead(t)){mode=null;out.push(line);continue;}
    if(mode==='one' && t){
      if(/wirtschaftliche Wirkung|Beispiel-Deals|konkrete Fälle|Nacharbeit|Messkriterien/i.test(t)){
        out.push('Konkrete Beispiel-Deals und Nacharbeit sauber klären.');
      }else out.push(line);
      mode=null;
      continue;
    }
    if(mode==='next' && t){
      if(/Beispiel|wirtschaftliche Wirkung|Start|Messkriterien|Deals|Discovery/i.test(t)){
        out.push('Mit Marius 3–5 echte Beispiel-Deals auswählen und prüfen, wo Discovery scheiterte.');
      }else out.push(line);
      mode=null;
      continue;
    }
    if(mode==='thirty' && /^\d+\./.test(t)){
      thirtyCount++;
      if(thirtyCount===1)out.push('1. Drei Beispiel-Deals auswählen.');
      else if(thirtyCount===2)out.push('2. Fehlende Discovery-Fragen markieren.');
      else if(thirtyCount===3)out.push('3. Nacharbeit und späte Disqualifikation festhalten.');
      continue;
    }
    out.push(line);
  }
  x=out.join('\n');
  return x.replace(/\n{3,}/g,'\n\n').trim();
}

// v4.198: Cockpit frühphasig bereinigen. Wenn die zuletzt bearbeitete/generierte Phase
// noch Qualifizierung oder Discovery ist, darf das Cockpit keine Startangebot-/Pilot-/ROI-Sprache anzeigen.
function getLatestGeneratedPhaseId(accId){
  if(!accId)return -1;
  let bestId=-1,bestTs=0;
  for(let i=0;i<5;i++){
    const snap=LS.get('ki21_phase_snap_'+accId+'_'+i,null);
    if(snap&&snap.ts&&snap.ts>bestTs){bestTs=snap.ts;bestId=i;}
    const d=LS.get('ki21_st_'+accId+'_'+i,null);
    const t=d&&(d.generatedAt||d.ts||d.updatedAt||0);
    if(t&&t>bestTs){bestTs=t;bestId=i;}
  }
  if(bestId>=0)return bestId;
  for(let i=4;i>=0;i--){
    const d=LS.get('ki21_st_'+accId+'_'+i,null);
    if(d&&d.result&&String(d.result).trim())return i;
  }
  return -1;
}

  const latest=getLatestGeneratedPhaseId(accId);

}

      if(seenValidation)continue;

      line=line.replace(/Bezifferter Schmerz und Erfolgskriterien mit .* anhand echter Deals validieren\.?/i,'Konkrete Pilot-Deals und Messkriterien für die Wirkungsmessung festlegen.');
    }
    if(authority && /(?:Geschäftsführer|Geschäftsführung|\bGF\b|CEO|CFO).{0,100}(Kaufbereitschaft|Freigabe|Zusage|Commitment|validieren|bestätigen|muss|müssen|erforderlich|ausstehend|Termin)/i.test(t))continue;
    if(/\d{1,3}\s*%\s*(?:→|->|auf|bis|zu)\s*\d{1,3}\s*%/i.test(t))continue;
    if(/BranchenBRANCHENHYPOTHESE|welcher Anteil\?|30\s*[–-]\s*welcher|50\s*[–-]\s*welcher/i.test(t))continue;
    out.push(line);
  }
  return out.join('\n').replace(/\n{3,}/g,'\n\n').trim();
}

// v4.216: kleine Qualitätskorrekturen ohne UI-/Navigationsänderung.
// Ziel: keine erfundenen Rollen, keine zu harten Verlust-/Messbar-Formulierungen, kleine Formatfehler bereinigen.
function qualityCleanupV4216(accId,text,sitId){
  if(!text)return text;
  let x=String(text);
  const nonSales=!(accId&&isSalesDiscoveryUseCaseV4199(accId));
  const security=accId&&isSecurityItUseCaseV4199(accId);

  // Kleine Formatierungsfehler.
  x=x.replace(/\)\)+/g,')');
  x=x.replace(/\(\s*([^\n()]{1,120}?)\s*\)/g,(m,p)=>'('+String(p).replace(/\)+$/,'').trim()+')');

  if(nonSales){
    x=x.replace(/\bAccount\s*Manager\b/gi,'verantwortlicher Ansprechpartner');
    x=x.replace(/Thomas\s+und\s+verantwortlicher\s+Ansprechpartner\s+gemeinsam\s+Geschäftsführung\/CFO\s+einladen/gi,'Mit Thomas abstimmen, wie Geschäftsführung/CFO eingebunden werden');
  }

  // Phase 3 Nachbereitung: vorsichtigere Sprache.
  if(sitId===2){
    x=x.replace(/messbaren\s+Druck/gi,'konkreten operativen Druck');
    x=x.replace(/messbarer\s+Druck/gi,'konkreter operativer Druck');
    x=x.replace(/wenn\s+nicht\s+deutlich\s+wird,\s*dass\s+Kundenverlust\s+droht/gi,'wenn die geschäftliche Relevanz der Kundenanforderung nicht deutlich wird');
    x=x.replace(/Kundenverlust\s+droht/gi,'die Kundenbeziehung oder Lieferantenbewertung betroffen sein kann');
    x=x.replace(/unmittelbarer\s+Auftragsverlust\s+droht/gi,'eine Eskalation im Lieferantenreview möglich ist');
    x=x.replace(/Interne\s+IT\s+könnte\s+Managed\s+Service\s+als\s+Kontrollverlust\s+ablehnen/gi,'Mögliche Bremse: Die interne IT könnte Managed Security als Kontrollverlust wahrnehmen');
  }

  // Security/IT: Verlust nie als bestätigte Tatsache, sofern ausdrücklich nicht bestätigt oder nur Review-/Beziehungsrisiko.
  if(security){
    x=x.replace(/direkter\s+(?:Kunden-|Umsatz-|Auftrags)?verlust\s+(?:ist|wurde)\s+(?:nicht\s+)?(?:bestätigt|angekündigt)[^\n.]*/gi,'direkter Verlust ist nicht bestätigt');
    x=x.replace(/Großkundenrisiko\s+als\s+Beziehungs-\/Review-Risiko\s+formulieren,\s*nicht\s+als\s+bestätigten\s+Umsatzverlust/gi,'Großkundenrisiko als Lieferantenreview- und Beziehungsrisiko einordnen, nicht als bestätigten Umsatzverlust');
  }

  x=x.replace(/\n{3,}/g,'\n\n').trim();
  return x;
}

function renderResultText(text,skipSplit){
  if(!text)return document.createTextNode('');
  if(!skipSplit){
    const {main}=splitDetailsFromResult(text);
    text=main;
  }
  const div=document.createElement('div');
  div.style.cssText='white-space:pre-wrap;font-size:var(--fs-input,12px);line-height:1.8;color:var(--text);';
  const lines=text.split('\n');
  lines.forEach((line,i)=>{
    const span=document.createElement('span');
    const numMatch=line.match(/^(\d+\.\s*)/);
    const prefix=numMatch?numMatch[1]:'';
    const rest=numMatch?line.slice(prefix.length):line;
    if(line.startsWith('BESTÄTIGT:')){
      span.innerHTML='<span style="font-size:9px;font-weight:700;background:rgba(46,160,67,.15);color:#2ea043;border-radius:4px;padding:1px 6px;margin-right:6px;">BESTÄTIGT</span>'+escHtml(line.slice('BESTÄTIGT:'.length));
    } else if(line.startsWith('ANNAHME:')){
      span.innerHTML='<span style="font-size:9px;font-weight:700;background:rgba(255,107,0,.15);color:#ff6b00;border-radius:4px;padding:1px 6px;margin-right:6px;">ANNAHME</span>'+escHtml(line.slice('ANNAHME:'.length));
    } else if(line.startsWith('KLÄREN:')){
      span.innerHTML='<span style="font-size:9px;font-weight:700;background:rgba(248,81,73,.15);color:#f85149;border-radius:4px;padding:1px 6px;margin-right:6px;">NOCH OFFEN</span>'+escHtml(line.slice('KLÄREN:'.length));
    } else if(rest.startsWith('KRITISCH:')){
      span.innerHTML=escHtml(prefix)+'<span style="font-size:9px;font-weight:700;background:rgba(248,81,73,.15);color:#f85149;border-radius:4px;padding:1px 6px;margin-right:6px;">KRITISCH</span>'+escHtml(rest.slice('KRITISCH:'.length));
    } else if(rest.startsWith('WICHTIG:')){
      span.innerHTML=escHtml(prefix)+'<span style="font-size:9px;font-weight:700;background:rgba(255,107,0,.15);color:#ff6b00;border-radius:4px;padding:1px 6px;margin-right:6px;">WICHTIG</span>'+escHtml(rest.slice('WICHTIG:'.length));
    } else if(rest.startsWith('NICE-TO-HAVE:')){
      span.innerHTML=escHtml(prefix)+'<span style="font-size:9px;font-weight:700;background:rgba(46,160,67,.15);color:#2ea043;border-radius:4px;padding:1px 6px;margin-right:6px;">NICE-TO-HAVE</span>'+escHtml(rest.slice('NICE-TO-HAVE:'.length));
    } else if(/\b(BESTÄTIGT|ARBEITSWERT|ZU VALIDIEREN|BRANCHENHYPOTHESE|ZU KLÄREN)\b/.test(line)&&!line.startsWith('BESTÄTIGT:')){
      span.innerHTML=highlightConfidenceWords(line);
    } else if(/\b(SPIN|Leitfragen)\b/i.test(line)||/^•\s*[SPIN]:/.test(line)){
      span.innerHTML=colorOrangeMarkers(escHtml(line));
    } else {
      span.textContent=line;
    }
    div.appendChild(span);
    if(i<lines.length-1)div.appendChild(document.createElement('br'));
  });
  return div;
}

// reine Darstellung des bereits generierten Texts, keine Änderung an Prompt/Inhalt.

  let out=escapedLine.replace(/\b(SPIN|Leitfragen)\b/gi,'<span style="color:#ff6b00;font-weight:800;">$1</span>');
  out=out.replace(/^(•\s*)([SPIN]):/,'$1<span style="color:#ff6b00;font-weight:800;">$2:</span>');
  return out;
}

function getPhaseScoreInfo(sitId){
  if(!state.activeId)return {score:null,reason:''};
  const data=LS.get('ki21_st_'+state.activeId+'_'+sitId,null);
  if(!data||!data.result)return {score:null,reason:''};
  const matches=[...data.result.matchAll(/(\d+)\s*\/\s*10/g)];
  const m=matches.length?matches[0]:null;
  if(!m)return {score:null,reason:''};
  const score=parseInt(m[1]);
  if(score<1||score>10)return {score:null,reason:''};
  return {score,reason:extractBegruendung(data.result)};
}

function getPhaseStatus(sitId){
  if(!state.activeId)return 'empty';
  const data=LS.get('ki21_st_'+state.activeId+'_'+sitId,null);
  if(data&&data.result)return 'done';
  if(data&&data.fv&&Object.values(data.fv).some(v=>v&&v.trim&&v.trim()))return 'progress';
  return 'empty';
}

// Leitet einen echten Fortschritts-Prozentsatz aus den bereits vorhandenen Eingabefeldern
// (SITS[].felder, ohne post-Felder) ab. Keine erfundene Zahl — 0/100 für leer/abgeschlossen.
function getPhaseProgressPct(sitId){
  const sit=SITS[sitId];
  if(!state.activeId||!sit)return 0;
  const data=LS.get('ki21_st_'+state.activeId+'_'+sitId,null);
  if(!data)return 0;
  if(data.result)return 100;
  const fields=(sit.felder||[]).filter(f=>!f.post);
  if(!fields.length)return 0;
  const filled=fields.filter(f=>data.fv&&data.fv[f.id]&&data.fv[f.id].trim&&data.fv[f.id].trim()).length;
  return Math.round((filled/fields.length)*100);
}

// Bottom Sheet: zeigt eine Liste von Items in einem von unten eingleitenden Panel.
// title: String, items: [{glyph, text, sub?}], emptyText: String
function showBottomSheet(title, items, emptyText){
  const overlay=document.createElement('div');
  overlay.className='bs-overlay';
  const panel=document.createElement('div');
  panel.className='bs-panel';
  if(String(title||'').toLowerCase().includes('fragen'))panel.classList.add('questions-sheet');

  const handle=document.createElement('div');
  handle.className='bs-handle';
  panel.appendChild(handle);

  const head=document.createElement('div');
  head.className='bs-head';
  const titleEl=document.createElement('div');
  titleEl.className='bs-title';
  titleEl.textContent=title;
  head.appendChild(titleEl);
  if(String(title||'').toLowerCase().includes('opportunity score')){
    const sub=document.createElement('div');
    sub.className='bs-subtitle';
    sub.textContent='BANT-/MEDDIC-basierte Bewertung';
    head.appendChild(sub);
  }
  panel.appendChild(head);

  const body=document.createElement('div');
  body.className='bs-body';
  if(!items||!items.length){
    const e=document.createElement('div');
    e.className='bs-empty';
    e.textContent=emptyText||'Keine Einträge vorhanden.';
    body.appendChild(e);
  } else {
    items.forEach((it,idx)=>{
      if(it.separator){
        const sep=document.createElement('div');
        sep.className='bs-separator';
        body.appendChild(sep);
        return;
      }
      if(it.heading){
        const hd=document.createElement('div');
        hd.className='bs-section-heading';
        hd.textContent=it.heading;
        body.appendChild(hd);
        return;
      }
      const row=document.createElement('div');
      row.className='bs-row'+(it.priority?' bs-priority':'')+(it.onClick?' clickable':'')+(it.kind?' bs-kind-'+it.kind:'');
      const g=document.createElement('span');
      g.className='bs-glyph';
      g.textContent=it.glyph||'•';
      row.appendChild(g);
      const t=document.createElement('span');
      t.style.flex='1';
      if(it.caption){
        const cap=document.createElement('div');
        cap.className='bs-priority-caption';
        cap.textContent=it.caption;
        t.appendChild(cap);
      }
      const main=document.createElement('div');
      main.textContent=it.text;
      t.appendChild(main);
      row.appendChild(t);
      if(it.onClick){
        const arrow=document.createElement('span');
        arrow.className='bs-row-arrow';
        arrow.textContent='›';
        row.appendChild(arrow);
        row.addEventListener('click',e=>{e.stopPropagation();close();it.onClick();});
      }
      body.appendChild(row);
    });
  }
  panel.appendChild(body);

  const close=()=>{
    overlay.classList.remove('visible');
    panel.classList.remove('visible');
    setTimeout(()=>{overlay.remove();panel.remove();},280);
  };
  overlay.addEventListener('click',close);
  // v4.209: no touch/swipe handlers in mobile safe mode.

  document.body.appendChild(overlay);
  document.body.appendChild(panel);
  requestAnimationFrame(()=>{overlay.classList.add('visible');panel.classList.add('visible');});
}


// v4.139: robuste Cockpit → Arbeitsbereich Navigation.
// Es wird bewusst NICHT zu einem exakten KI-Satz gesprungen, weil Phasentexte nach Regenerierung variieren.
// Stattdessen: passende Phase öffnen + klaren Cockpit-Arbeitsauftrag oben anzeigen.
function getCockpitWorkTarget(kind,text){
  const raw=String(text||'').trim();
  const t=raw.toLowerCase();
  let phaseId=0;
  let section='Passender Arbeitsbereich';
  let hint='Bearbeite diesen Punkt im Arbeitsbereich.';

  if(kind==='question'){
    phaseId=1;section='Discovery & Demo';hint='Nutze diese Frage im nächsten Termin und dokumentiere die Antwort im Arbeitsbereich.';
  } else if(/quick check|managed security|angebot|abschluss|vertrag|vertrags|beschaffung|einkauf|paper|freigabe|beauftragung|einwand/.test(t)){
    phaseId=4;section='Angebot';hint='Bearbeite hier Angebot, Freigabe, Einwände und nächsten Abschluss-Schritt.';
  } else if(/business case|nutzen|roi|vermeidungsquote|wirtschaft|kennzahl|messbar|effekt|kosten|impact|umsatz|lieferantenreview|review|audit|deadline|großkunde|nachweis/.test(t)){
    phaseId=3;section='Nutzen / ROI';hint='Validiere hier wirtschaftliche Relevanz, Nutzenhebel, Nachweise und Belastbarkeit.';
  } else if(/pilot|start|termin|nächster schritt|nachbereitung|follow-up|verbindlich/.test(t)){
    phaseId=2;section='Nachbereitung';hint='Kläre hier den nächsten verbindlichen Schritt und dokumentiere Zusagen.';
  } else if(/discovery|frage|informationen|nachqualifizierung|hubspot|notizen|e-mail|demo|zeigen|bedarf|schmerz|patch|backup|m365|security|sicherheits|ad-hoc|management-report|report|operativ|ressource|kapazität/.test(t)){
    phaseId=1;section='Discovery & Demo';hint='Kläre hier Bedarf, Schmerz, Nachweise und konkrete Gesprächsfragen.';
  } else if(/wettbewerb|mitbewerb|konkurrent|alternative/.test(t)){
    phaseId=4;section='Angebot';hint='Bearbeite hier Wettbewerbsrisiko, Einwandbehandlung und Abschlussstrategie.';
  } else if(/entscheider|entscheidungsbefugnis|budget|sponsor|champion|fürsprecher|qualifiz|geschäftsführung|geschäftsführer|cfo|leiter/.test(t)){
    phaseId=0;section='Qualifizierung';hint='Prüfe hier Qualifizierung, Entscheiderstatus und zentrale Deal-Grundlagen.';
  }

  return {phaseId,section,text:raw,kind:kind||'cockpit',hint,ts:Date.now()};
}
function openCockpitWorkTarget(kind,text){
  if(!state.activeId)return;
  const target=getCockpitWorkTarget(kind,text);
  state.cockpitFocus=target;
  state.returnToCockpitSnapshot=true;
  LS.set('ki21_return_to_cockpit_'+state.activeId,true);
  LS.set('ki21_cockpit_focus_'+state.activeId,target);

// v4.259: Orange nur bei echtem KI21-Mehrwert.
// Markiert werden ausschließlich nicht offensichtliche Verknüpfungen, Abgrenzungen oder Priorisierungen.
// Direkte Fakten, manuell eingetragene Werte, offene Punkte und normale nächste Fragen bleiben weiß.
function isKi21DashboardInsight(txt,kind){
  const s=String(txt||'').toLowerCase();
  const has=(re)=>re.test(s);

  // Harte Abgrenzungen: KI21 verhindert hier eine typische Fehlinterpretation.
  if(has(/kein(?:e|en)?\s+(?:bestätigt(?:er|en)?\s+)?(?:umsatz)?verlust|kein\s+verlustbeleg|relevanz[^.]*nicht[^.]*verlust/))return true;
  if(has(/folgeoption[^.]*nicht\s+(?:das\s+)?aktuelle(?:s|n)?\s+angebot|startangebot[^.]*folgeangebot|quick\s*check[^.]*managed\s+security[^.]*getrennt/))return true;
  if(has(/sponsor[^.]*nicht\s+(?:wirtschaftlicher\s+)?entscheider|champion[^.]*nicht\s+(?:wirtschaftlicher\s+)?entscheider|fachlicher\s+sponsor[^.]*entscheider/))return true;
  if(has(/budgetsignal[^.]*nicht\s+abschluss|budgetfreigabe[^.]*nicht\s+abschluss/))return true;
  if(has(/bezifferter\s+schmerz[^.]*nicht\s+(?:automatisch\s+)?(?:einsparung|nutzen|roi)/))return true;

  // Echte Nutzenableitung: bestätigter Schmerz wird mit einem konkreten Nutzenhebel verbunden.
  if(kind==='value' && has(/→|reduzier|entlast|standardisiert|priorisiert|sichtbar|entscheidungsgrundlage|professionell\s+beantwort/))return true;

  // Nicht offensichtliche Deal-Einordnung oder Priorisierung.
  if(kind==='risk' && has(/strategisch[^.]*nicht\s+formal\s+eingekoppelt|fachlich[^.]*wirtschaftlich|entscheidungsweg[^.]*unklar/))return true;
  if(kind==='insight' && has(/geschäftliche\s+relevanz[^.]*kein|sponsor[^.]*entscheider|einstieg[^.]*folgeoption/))return true;

  return false;
}

function getCockpitCoreCaseStatusV4236(raw,aid){
  const clean=(x)=>String((x&&x.text)||x||'').replace(/^[-•\s]+/,'').trim();
  const texts=[];
  try{
    ['positive','warning','open'].forEach(k=>{
      const arr=Array.isArray(raw&&raw[k])?raw[k]:[];
      arr.forEach(x=>{const t=clean(x);if(t)texts.push(t);});
    });
  }catch(e){}
  const all=texts.join(' \n ').toLowerCase();
  const has=(re)=>re.test(all);
  const phase5=aid?LS.get('ki21_st_'+aid+'_4',{}):{};
  const fv5=(phase5&&phase5.fv)||{};
  const mu=LS.get('ki21_mu',{})||{};
  const offerText=[fv5.paket,fv5.budget,fv5.minimum,mu.bausteine].filter(Boolean).join(' ');
  const offerLow=offerText.toLowerCase();
  const findText=(re)=>{
    const hit=texts.find(t=>re.test(String(t).toLowerCase()));
    return hit?hit.replace(/\s+/g,' ').trim():'';
  };
  const short=(t,max)=>{
    t=String(t||'').replace(/^\s*(wirtschaft|abschluss|schmerz|nutzen|business\s*case)\s*:\s*/i,'').trim();
    if(t.length<=max)return t;
    const cut=t.lastIndexOf(' ',max-1);
    return t.substring(0,cut>20?cut:max-1).trim()+'…';
  };
  const joinBits=(arr,max)=>short(arr.filter(Boolean).filter((v,i,a)=>a.indexOf(v)===i).join(' · '),max);

  const pain={headline:'Schmerz noch schärfen',evidence:'Konkreter Problembeleg fehlt noch'};
  if(has(/großkunde|audit|review|anforderung|q3|deadline|schriftlich/)){
    pain.headline='Nachweisdruck';
    pain.evidence=joinBits([
      findText(/großkunde|audit|review|anforderung|q3|deadline|schriftlich/),
      findText(/12\s*%|umsatz|geschäftsführung|gf/)
    ],72)||'Kundenanforderung / Review-Frist erkennbar';
  }
  if(has(/aufwand|stunden|tage|anfragen|rückfragen|manuell|zusammengesucht|ausgelastet|security läuft nebenbei/)){
    pain.headline=has(/großkunde|audit|review|anforderung|q3|deadline|schriftlich/) ? 'Nachweisdruck + Aufwand' : 'Operativer Aufwand';
    pain.evidence=joinBits([
      findText(/aufwand|stunden|tage|anfragen|rückfragen|manuell|zusammengesucht/),
      findText(/ausgelastet|security läuft nebenbei|patch|backup|m365/)
    ],72)||pain.evidence;
  }

  const value={headline:'Nutzen noch belegen',evidence:'Entlastung/Wirkung noch konkretisieren'};
  if(has(/entlast|nachweis|management-report|risiko|review|audit|backup|patch|m365|report|überblick/)){
    value.headline='Nachweisfähigkeit';
    value.evidence=joinBits([
      findText(/nachweis|management-report|review|audit|überblick/),
      findText(/patch|backup|m365|risiko|report|entlast/)
    ],72)||'Nachweise und Management-Überblick verbessern';
  }
  if(has(/entlast|ausgelastet|manuell|zusammengesucht/)){
    value.headline=has(/nachweis|management-report|review|audit/) ? 'Nachweise + Entlastung' : 'IT entlasten';
    value.evidence=joinBits([
      findText(/entlast|ausgelastet|manuell|zusammengesucht/),
      findText(/patch|backup|m365|report|risiko/)
    ],72)||value.evidence;
  }

  const business={headline:'Business Case offen',evidence:'Preis, Wirkung oder Freigabe noch klären'};
  if(/quick check|4\.?900|4900|start|paket|angebot|€|euro|compact|sprint/.test(offerLow)||has(/quick check|4\.?900|4900|angebot|preis|budget|entscheidbar|freigabe/)){
    business.headline='Startangebot tragfähig';
    business.evidence=joinBits([
      findText(/quick check|4\.?900|4900|budget|entscheidbar|freigabe/),
      short(offerText,55)
    ],72)||'Konkretes Startangebot vorhanden';
  }
  if(has(/managed security|folgeoption|noch nicht freigegeben|scope|umfang|cfo|geschäftsführung|gf/)){
    business.headline='Start ja, Folge offen';
    business.evidence=joinBits([
      findText(/quick check|4\.?900|4900|scope|umfang/),
      findText(/managed security|folgeoption|noch nicht freigegeben|cfo|geschäftsführung|gf/)
    ],72)||'Startangebot von Folgeoption trennen';
  }
  if(has(/nicht belastbar|zu validieren|validier|offen|klären|kein.*roi|roi.*nicht|wirkung.*fehlt|vermeidungsquote/)){
    business.headline='Case validieren';
    business.evidence=joinBits([
      findText(/nutzen|roi|business case|wirtschaft|wirkung|vermeidungsquote|validier/),
      findText(/cfo|geschäftsführung|gf|freigabe|entscheidung/)
    ],72)||business.evidence;
  }

  return {pain,value,business};
}
