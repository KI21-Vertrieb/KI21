function transferAndGo(fromId, toId, result){
  // Direct transfer - output is already compact
  const nextKEY='ki21_st_'+state.activeId+'_'+toId;
  const nextData=LS.get(nextKEY,{fv:{},result:''});

  const fieldMap={
    1:{f1:'kontext'}
  };

  // Phase 1→2: isolierter SPIN-Generator
  // Kernidee: SPIN-Fragen werden NICHT aus dem Phase-1-Ergebnis extrahiert (das enthält
  // strategisches Messaging/Framing, das S-Fragen verfälscht), sondern in einem zweiten,
  // kontextisolierten API-Call mit nur den nackten Kundenfakten neu erzeugt.
  if(fromId===0){
    const cust=getActiveCust();
    // Zeige sofort die Phase-2-Seite mit Ladezustand im spin-Feld
    nextData.fv['spin']='⏳ SPIN-Fragen werden isoliert generiert...';
    LS.set(nextKEY,nextData);
    state.pendingSit=null;
    renderStation(toId);

    // Isolierter Kontext: NUR nackte Kundenfakten — bewusst KEIN buildCtx(), kein kk/stk,
    // kein Ergebnis aus Phase 1, damit kein Messaging/Strategie-Framing einfliesst.
    const isolatedCtx=`Firma: ${cust.firma||'–'}
Branche: ${cust.branche||'–'}
Mitarbeiter: ${cust.ma||'–'}
Ansprechpartner: ${cust.ap||'–'}
Umsatz: ${cust.um||'–'}`;

    const spinPrompt=`Du bist ein SPIN-Selling-Experte. Deine einzige Aufgabe: Generiere methodisch korrekte SPIN-Fragen für das nächste Kundengespräch.

STRIKTE METHODENREGEL – KEINE AUSNAHMEN:
S (SITUATION): Sammle nur Fakten zum Ist-Zustand. Frage nach Prozessen, Systemen, Rollen, Zahlen. NIEMALS nach Meinungen, Zielen, Wünschen oder Strategien.
  ✅ "Wie läuft heute die Angebotserstellung konkret ab?"
  ✅ "Welche Systeme nutzt Ihr Außendienst?"
  ❌ "Wo sehen Sie die größten Hebel?" (Meinung, kein Fakt)
  ❌ "Wäre Innovation im Vertrieb wichtig?" (Framing, kein Fakt)

P (PROBLEM): Lass den Kunden selbst benennen, was ihn stört. Frage nach Schwierigkeiten, Engpässen, Frustration.
  ✅ "Wo verliert Ihr Team am meisten Zeit?"
  ❌ "Würde Feature X das lösen?" (Lösungsvalidierung, gehört zu N)

I (IMPLICATION): Mach die Konsequenzen des Problems sichtbar. Kosten, Verzögerungen, Risiken.
  ✅ "Was passiert, wenn ein Angebot einen Tag zu spät kommt?"
  ✅ PFLICHT: Stelle mindestens eine EXPLIZITE Nicht-Handeln-Frage mit klarer Formulierung wie "wenn ihr dieses Problem nicht löst" oder "wenn ihr nichts verändert". Nicht nur indirekt "wenn der Zustand bleibt" fragen.

N (NEED-PAYOFF): Lass den Kunden den Nutzen einer Lösung beschreiben.
  ✅ "Was würde sich ändern, wenn diese Information sofort verfügbar wäre?"

KUNDENDATEN (nur diese – kein weiterer Kontext):
${isolatedCtx}

Generiere jetzt 5–7 SPIN-Fragen. Jede Frage auf einer Zeile, Format "Buchstabe: Frage".
Mindestens eine I-Frage muss ausdrücklich nach den Folgen des Nicht-Handelns fragen und die Wörter "nicht löst" oder "nichts verändert" enthalten.
Nur die Fragen, keine Erklärungen, keine Einleitung.`;

    (async()=>{
      try{
        const spinResult=await callClaude(spinPrompt,null);
        if(spinResult){
          const freshData=LS.get(nextKEY,{fv:{},result:''});
          // Bereinige Output: nur Zeilen mit echtem SPIN-Letter-Pattern
          let cleanLines=spinResult.split('\n')
            .map(l=>l.trim())
            .filter(l=>/^[SPIN]\s*[:\-–]/i.test(l));
          // v4.149: SPIN muss eine explizite Nicht-Handeln-I-Frage enthalten.
          // Prompt allein reicht nicht zuverlässig; deshalb deterministisch nachschärfen.
          cleanLines=ensureExplicitNonActionImplicationLines(cleanLines, LS.get('ki21_active',''));
          freshData.fv['spin']=cleanLines.join('\n');
          LS.set(nextKEY,freshData);
          // Re-render nur wenn Nutzer noch auf Phase 2 ist
          if(LS.get('ki21_view','')!=='home')renderStation(toId);
        }
      }catch(e){
        // Fallback: extrahiere SPIN-Zeilen aus Phase-1-Ergebnis (alter Mechanismus)
        const freshData=LS.get(nextKEY,{fv:{},result:''});
        let fallbackLines=result.split('\n')
          .map(l=>l.trim())
          .filter(l=>/^(?:•\s*)?[SPIN]\s*[:\-–]/i.test(l));
        fallbackLines=ensureExplicitNonActionImplicationLines(fallbackLines, LS.get('ki21_active',''));
        freshData.fv['spin']=fallbackLines.join('\n')||result.slice(0,800);
        LS.set(nextKEY,freshData);
        if(LS.get('ki21_view','')!=='home')renderStation(toId);
      }
    })();
    return;
  }

  // Phase 2→3 (Nachbereitung → Nutzen-Kosten-Analyse): KPI-Extraktion statt Volltext
  if(fromId===2&&toId===3){
    nextData.fv['erkenntnisse']='⏳ KPIs werden extrahiert...';
    LS.set(nextKEY,nextData);
    renderStation(toId);

    (async()=>{
      const {main:resultMain,details:resultDetails}=splitDetailsFromResult(result);
      const fullSource=resultMain+(resultDetails?'\n'+resultDetails:'');
      const kpiPrompt=`Hier ist ein Besuchsbericht aus einem Kundentermin:\n\n${fullSource}\n\nExtrahiere AUSSCHLIESSLICH die konkreten Zahlen, KPIs und wirtschaftlich relevanten Fakten, die der Kunde genannt hat (z.B. Zeitaufwand, Mitarbeiterzahlen, Kosten, Stückzahlen, Fehlerquoten, Durchlaufzeiten).\n\nFormat: kurze Stichpunkte, eine Zahl/Aussage pro Zeile. Keine Einleitung, kein Fließtext. Wenn keine konkreten Zahlen genannt wurden, schreibe: "Keine konkreten KPIs im Gespräch genannt – bitte beim Kunden nachfragen."`;

      try{
        const kpiResult=await callClaude(kpiPrompt,null);
        if(kpiResult){
          const freshData=LS.get(nextKEY,{fv:{},result:''});
          freshData.fv['erkenntnisse']=kpiResult;
          LS.set(nextKEY,freshData);
          renderStation(toId);
        }
      }catch(e){
        const freshData=LS.get(nextKEY,{fv:{},result:''});
        freshData.fv['erkenntnisse']=result;
        LS.set(nextKEY,freshData);
        renderStation(toId);
      }
    })();
    return;
  }

  const map=fieldMap[fromId];
  if(map){
    const {main:transferMain}=splitDetailsFromResult(result);
    nextData.fv[map.f1]=transferMain;
  }

  LS.set(nextKEY,nextData);
  renderStation(toId);
}

      ];
      const clObj=health.checklist;
      const answeredCount=clObj?CHECKLIST_LABELS.filter(([k])=>clObj[k]).length:0;

      qBox.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}},
        h('div',{className:'home-section-label',style:{margin:0}},'Qualifizierungscheck'),
        h('div',{className:'home-station-sub2'},answeredCount+' / '+CHECKLIST_LABELS.length+' beantwortet')
      ));
      CHECKLIST_LABELS.forEach(([k,label])=>{
        const ok=clObj&&clObj[k];
        qBox.appendChild(h('div',{className:'home-insight-row',style:{borderTop:'1px solid var(--border)',padding:'6px 0'}},
          h('span',{className:'home-insight-dot '+(ok?'positive':'open')}),
          h('span',{style:{flex:1}},label),
          h('span',{className:'home-station-sub2',style:{color:ok?'#2ea043':'#d29922',whiteSpace:'nowrap'}},ok?'Beantwortet':'Noch offen')
        ));
      });
      wrap.appendChild(qBox);
    }
  }
  // ── Ende Lead-qualifizieren Dashboard ──

  // ── Bedarfsanalyse & Demo Dashboard (exemplarisch, Phase 2) ──
  // Gleicher globaler Health-Balken wie überall. Darunter ausschließlich eine Auswertung
  // des bereits vorhandenen Ergebnistexts (data.result) — kein neuer Score, kein neues Label,
  // keine neue KI-Logik. Extrahiert nur die ohnehin vom Prompt erzeugten Marker-Zeilen
  // "🎯 EINSCHÄTZUNG" und "NÄCHSTER SCHRITT DIESE WOCHE".
  function extractAfterHeader(text,headerKeyword){
    const lines=(text||'').split('\n');
    for(let i=0;i<lines.length;i++){
      if(lines[i].toUpperCase().includes(headerKeyword)){
        const colonIdx=lines[i].indexOf(':');
        if(colonIdx!==-1&&lines[i].slice(colonIdx+1).trim())return lines[i].slice(colonIdx+1).trim();
        let out=[];
        for(let j=i+1;j<lines.length;j++){
          if(!lines[j].trim())break;
          out.push(lines[j].trim());
        }
        if(out.length)return out.join(' ');
      }
    }
    return '';
  }
  // Liefert nur die ERSTE Aufzählungszeile nach einem Block-Header (z.B. "DIE WICHTIGSTEN
  // ERKENNTNISSE" oder "NÄCHSTE SCHRITTE") — für Phasen, deren Marker als Bullet-Liste statt
  // als einzeilige "Header: Inhalt"-Zeile formatiert sind.
  function extractFirstBulletAfterHeader(text,headerKeyword){
    const lines=(text||'').split('\n');
    for(let i=0;i<lines.length;i++){
      if(lines[i].toUpperCase().includes(headerKeyword.toUpperCase())){
        for(let j=i+1;j<lines.length;j++){
          const t=lines[j].trim();
          if(!t)break;
          return t.replace(/^[•\-]\s*/,'').replace(/^\d+\.\s*/,'').trim();
        }
      }
    }
    return '';
  }
  // Liefert die erste Zeile, die einen bestimmten Begriff enthält (z.B. "ROI:") — für Marker,
  // die als einzelner Bullet innerhalb eines größeren Blocks stehen, nicht als eigener Header.
  function extractLineContaining(text,substr){
    const lines=(text||'').split('\n');
    for(const line of lines){
      if(line.toUpperCase().includes(substr.toUpperCase()))return line.replace(/^[•\-]\s*/,'').trim();
    }
    return '';
  }
  if(sitId===1){
    const aid=state.activeId;
    const health=aid?getOpportunityHealth(aid):null;

    // Health-Balken (kompakt, ohne Dashboard)
    wrap.appendChild(h('div',{style:{cursor:'pointer',marginBottom:'14px'},onclick:()=>{if(aid)showOpportunityHealthDetail(aid);}},
      buildHealthBar(health?health.score:null,{score:'station-health-score',fill:'station-health-fill'})));

    const hasResult=!!data.result;

    // ─── TRENNLINIE ───────────────────────────────────────────────────
    wrap.appendChild(h('div',{className:'exec-divider'},
      h('div',{className:'exec-divider-line'}),
      h('div',{className:'exec-divider-label'},'Arbeitsbereich'),
      h('div',{className:'exec-divider-line'})
    ));


    // ─── SPIN+ANTWORT INLINE ──────────────────────────────────────────
    // Robuster SPIN-Parser: extrahiert Fragen aus dem übertragenen spin-Feldinhalt.
    // Bereinigt alle Rohtextmarker (###DETAILS###, VERTRIEBSNOTIZEN, SPIN-FRAGEN etc.)
    // und zeigt jede Frage als eigene Karte mit großem Textarea.
    // Antworten werden in data.fv.antworten gespeichert (kompatibel mit bestehendem Prompt).
    const spinRaw=data.fv&&data.fv['spin']?data.fv['spin']:'';
    const antwortenRaw=data.fv&&data.fv['antworten']?data.fv['antworten']:'';

    // Bereinige Rohtext: entferne alle Marker-Zeilen, Details-Blöcke, Überschriften
    const STRIP_PATTERNS=[
      /###DETAILS###[\s\S]*/gi,
      /VERTRIEBSNOTIZEN[\s\S]{0,300}/gi,
      /SPIN-FRAGEN[^\n]*/gi,
      /BEDARFSANALYSE-FRAGEN[^\n]*/gi,
      /LEITFRAGEN[^\n]*/gi,
      /^[A-ZÄÖÜ\s]{5,}:?\s*$/gm,  // Caps-only Überschriften
    ];
    let spinClean=spinRaw;
    STRIP_PATTERNS.forEach(p=>spinClean=spinClean.replace(p,''));

    // Extrahiere Fragen: Zeilen mit S: / P: / I: / N: oder • S: / Nummer.
    // Mehrzeilige Fragen (Fortsetzung ohne neuen Marker) werden zusammengeführt.
    const spinQuestions=[];
    const spinLetters=[];
    const SPIN_LINE=/^(?:•\s*)?([SPIN])\s*[:\-–]\s*(.+)/i;
    const NUM_LINE=/^(?:•\s*)?(\d+)[.\)]\s*(.+)/;

    let curLetter='';let curQ='';
    spinClean.split('\n').forEach(rawLine=>{
      const line=rawLine.trim();
      if(!line)return;
      const mSpin=line.match(SPIN_LINE);
      const mNum=line.match(NUM_LINE);
      if(mSpin){
        if(curQ)spinQuestions.push(curQ.trim()),spinLetters.push(curLetter);
        curLetter=mSpin[1].toUpperCase();curQ=mSpin[2];
      } else if(mNum&&!curQ){
        if(curQ)spinQuestions.push(curQ.trim()),spinLetters.push(curLetter);
        curLetter=String(mNum[1]);curQ=mNum[2];
      } else if(curQ){
        // Fortsetzungszeile — nur anhängen wenn keine neue Überschrift
        if(!/^[A-ZÄÖÜ\s]{4,}:?\s*$/.test(line))curQ+=' '+line;
      }
    });
    if(curQ.trim())spinQuestions.push(curQ.trim()),spinLetters.push(curLetter);

    // Parse bestehende Antworten (Format "1. Frage: Antwort\n2. ...")
    const antwortenParsed={};
    antwortenRaw.split('\n').forEach(line=>{
      const m=line.match(/^(\d+)\.\s*(?:Frage:\s*)?(.*)$/s);
      if(m)antwortenParsed[parseInt(m[1])-1]=m[2].trim();
    });

    const SPIN_FULL_NAMES={S:'Situation',P:'Problem',I:'Implication',N:'Need-Payoff'};
    let lastGroup='';

    if(spinQuestions.length){
      wrap.appendChild(h('div',{className:'home-section-label',style:{marginBottom:'10px'}},'Leitfragen & Antworten'));
      const taRefs=[];
      spinQuestions.forEach((q,i)=>{
        const letter=spinLetters[i]||String(i+1);
        const groupName=SPIN_FULL_NAMES[letter]||'';

        // Gruppenüberschrift (S → Situation, P → Problem, ...)
        if(groupName&&groupName!==lastGroup){
          wrap.appendChild(h('div',{style:{fontSize:'10px',fontWeight:'700',letterSpacing:'1px',
            textTransform:'uppercase',color:'#ff6b00',margin:'14px 0 6px'}},groupName));
          lastGroup=groupName;
        }

        const item=h('div',{className:'exec-spin-item'});
        const header=h('div',{className:'exec-spin-header'});
        header.appendChild(h('span',{className:'exec-spin-letter'},letter));
        header.appendChild(h('span',{className:'exec-spin-q'},q));
        item.appendChild(header);

        const ta=h('textarea',{className:'exec-spin-ta',

        if(sitId===0){
          const lines=result.split('\n');
          const keywords=['DIE 5 WICHTIGSTEN QUALIFIZIERUNGSFRAGEN','QUALIFIZIERUNGSFRAGEN','TOP 5 QUALIFIZIERUNGSFRAGEN'];
          let splitIdx=-1;
          for(const kw of keywords){
            splitIdx=lines.findIndex(l=>l.toUpperCase().includes(kw));
            if(splitIdx>=0)break;
          }
          if(splitIdx>=0){
            data.fv=data.fv||{};
            data.fv.fragen=lines.slice(splitIdx).join('\n').trim();
            // Update DOM textarea if visible
            const ta=document.querySelector('[data-fid="fragen"]');
            if(ta)ta.value=data.fv.fragen;
          }
        }
        LS.set(KEY,data);
        if(state.activeId){
          await refreshOpportunityHealth(state.activeId);
          const freshHealth=getOpportunityHealth(state.activeId);
          const scoreEl=document.getElementById('station-health-score');
          const fillEl=document.getElementById('station-health-fill');
          if(scoreEl&&freshHealth){
            const color=getHealthColor(freshHealth.score);
            scoreEl.textContent=String(freshHealth.score);
            scoreEl.style.color=color;
            if(fillEl){fillEl.style.width=freshHealth.score+'%';fillEl.style.background=color;}
          }
          // Phasenspezifischer Signal-Snapshot: Speichert den Signal-Stand zum Zeitpunkt
          // dieser Phasengenerierung. Der globale Score bleibt global — aber das Dashboard
          // dieser Phase zeigt genau die Signale, die beim Generieren bekannt waren.
          // Key: ki21_phase_snap_{accId}_{sitId} = {positive, warning, open, ts}
          // Wird beim nächsten Generieren dieser Phase überschrieben.
          if(freshHealth){
            LS.set('ki21_phase_snap_'+state.activeId+'_'+sitId,{
              positive:freshHealth.positive||[],
              warning:freshHealth.warning||[],
              open:freshHealth.open||[],
              ts:Date.now()
            });
          }
          // Phase-Pending-Flag löschen nach erfolgreicher Generierung
          if(state.activeId){
            LS.set('ki21_phase_pending_'+state.activeId+'_'+sitId,null);
          }
          // Isolierter Phasen-Snapshot mit sourcePhase-Tagging (async, Hintergrund)
          savePhaseSnapshot(state.activeId,sitId);
        }
        resultLabel.textContent=getResultLabel(sitId);
        // Phase 5: Auto-extract Besuchsbericht into CRM field
        if(sitId===4){
          const berichtMatch=result.match(/BESUCHSBERICHT[:\s]*\n([\s\S]+?)(?=FOLLOW-UP MAIL|→ TODO|$)/i);
          if(berichtMatch){
            const berichtText=berichtMatch[1].trim();
            data.fv=data.fv||{};
            data.fv['ergebnis']=berichtText;
            LS.set(KEY,data);
            // Update the bericht field in UI
            const berichtField=document.querySelector('textarea[data-fid="ergebnis"]');
            if(berichtField)berichtField.value=berichtText;
          }
        }

        // For Nutzen-Kosten-Analyse (sitId===3): nur noch Case-Annahmen für Phase 5 extrahieren (Kurzfassung-Box entfernt, Review Juni 2026)
        if(sitId===3){
          try{
            const caseExtractPrompt=`Extrahiere aus dieser Nutzen-Kosten-Analyse die zentralen Case-Annahmen als reines JSON-Objekt, ohne Markdown-Codeblock, ohne Erklärtext davor oder danach.

Format exakt so:
{"manual_effort_range":"<Bandbreite z.B. '300-600 Stunden/Jahr', oder leer falls nicht vorhanden>","working_value":"<verwendeter Arbeitswert/Mittelwert, z.B. '450 Stunden/Jahr'>","adjustment":"<kurze Begründung falls vom Mittelwert abgewichen wurde, sonst 'Mittelwert ohne Anpassung'>","confidence":"<hoch|mittel|niedrig>","monthly_benefit":"<geglätteter Nutzen pro Monat, z.B. '3.200 €/Monat'>","monthly_investment":"<geglättete Investition pro Monat, z.B. '1.389 €/Monat'>","roi_statement":"<1 Satz Nutzen vs Investition>"}

Nur Werte verwenden die im Text unten tatsächlich vorkommen. Wenn ein Feld nicht ermittelbar ist, leeren String verwenden.

Analyse:
`+result;
            const caseJson=await callClaude(caseExtractPrompt,null);
            if(caseJson){
              const cleaned=caseJson.replace(/```json|```/g,'').trim();
              const parsed=JSON.parse(cleaned);
              LS.set('ki21_case_assumptions_'+state.activeId,parsed);
            }
          }catch(e){
            // Non-critical: case assumptions extraction failure shouldn't block the main result
          }
        }

        // Populate Weiter-button after fresh generation (was previously only shown on page reload)
        weiterRow.innerHTML='';
        const nextMapAfterGen={};
        if(nextMapAfterGen[sitId]&&!sit.build2){
          const nextIdAfterGen=nextMapAfterGen[sitId].nextId;
          const wbAfterGen=h('button',{
            style:{background:'#ff6b00',border:'none',color:'#fff',borderRadius:'7px',
              padding:'5px 12px',fontSize:'11px',fontWeight:'700',cursor:'pointer',
              fontFamily:'DM Sans,sans-serif',width:'100%'},
            onclick:()=>transferAndGo(sitId,nextIdAfterGen,result)
          },'Weiter zu '+SITS[nextIdAfterGen].title+' →');
          weiterRow.appendChild(wbAfterGen);
          weiterRow.style.display='block';
        }
      }
    }catch(e){
      alert('Fehler: '+e.message);
      resultBox.style.display='none';
    }finally{
      loading=false;
      genBtn.disabled=false;
      genBtn.textContent=genLabels[sitId]||'⚡ KI21 generieren';
    }
  }

  // Navigation ans Ende — erst lesen & arbeiten, dann navigieren
  wrap.appendChild(phaseNav);

  app.appendChild(nav);
  app.appendChild(infoRow);
  setTimeout(()=>renderHealthBadgeIfPresent(),0);
  app.appendChild(wrap);
}

function getAccPhaseInfo(accId){
  let furthest=-1;
  for(let i=0;i<5;i++){
    const data=LS.get('ki21_st_'+accId+'_'+i,null);
    if(data&&data.result)furthest=i;
  }
  const health=getOpportunityHealth(accId);
  return {phaseIdx:furthest,health};
}

            h('button',{style:{background:'transparent',border:'none',color:'#484f58',

async function showCRMImport(accId){
  const ta=h('textarea',{
    placeholder:'CRM-Text, LinkedIn-Profil oder beliebige Kundeninformationen hier einfügen...',
    style:{minHeight:'120px',width:'100%'}
  });
  const statusDiv=h('div',{style:{fontSize:'12px',color:'#8b949e',marginTop:'8px'}});
  
  const analyzeBtn=h('button',{className:'btn-o',style:{width:'100%',marginTop:'8px'},
    onclick:async()=>{
      const apiKey=LS.get('ki21_apikey','');
      if(!apiKey){alert('Bitte API Key hinterlegen.');return;}
      if(!ta.value.trim()){alert('Bitte Text einfügen.');return;}
      
      analyzeBtn.textContent='⏳ Analysiere...';
      analyzeBtn.disabled=true;
      
      try{
        const prompt=`Du extrahierst Informationen aus einem Text für ein B2B-Vertriebssystem.

Text:
${ta.value}

WICHTIG: Antworte AUSSCHLIESSLICH mit validem JSON. Kein Markdown. Keine Erklärung. Kein Text davor oder danach. Nur das JSON-Objekt.

{"firma":"","ap":"","branche":"","ma":"","um":"","kontext":"","persoenlich":"","herausforderungen":""}

Fülle die Felder mit den gefundenen Informationen. Leere Felder bleiben leer.

WICHTIG zur Unterscheidung von "kontext" und "herausforderungen":
- "kontext": dauerhafte, strukturelle Informationen über das Unternehmen (Branche, Aufbau, Standorte, Teamgröße, allgemeine Beschreibung der Lage) – Dinge, die über viele Monate gültig bleiben.
- "herausforderungen": konkrete, aktuelle Herausforderungen, Probleme oder Kauftrigger, die JETZT die Vertriebssituation antreiben (z.B. "Forecast-Qualität schlecht", "neues CRM eingeführt aber kaum genutzt", "Geschäftsführer fordert Verbesserung"). Das sind die Dinge, die direkt eine Qualifizierungsfrage auslösen würden.
Ein Text kann Anteile in beiden Feldern haben – verteile sinnvoll, dopple nicht alles in beide Felder.`;

        const resp=await fetch('https://api.anthropic.com/v1/messages',{
          method:'POST',
          headers:{
            'Content-Type':'application/json',
            'x-api-key':apiKey,
            'anthropic-version':'2023-06-01',
            'anthropic-dangerous-direct-browser-access':'true'
          },
          body:JSON.stringify({
            model:'claude-haiku-4-5-20251001',
            max_tokens:1024,
            messages:[{role:'user',content:prompt}]
          })
        });
        
        const data=await resp.json();
        let txt=data.content[0].text.trim();
        // Strip markdown code blocks if present
        txt=txt.replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
        // Extract JSON object if wrapped in other text
        const jsonMatch=txt.match(/\{[\s\S]*\}/);
        if(!jsonMatch)throw new Error('Kein JSON gefunden');
        const parsed=JSON.parse(jsonMatch[0]);
        
        // Update customer data
        const acc=state.accounts.find(a=>a.id===accId);
        if(acc){
          if(parsed.firma)acc.cust.firma=parsed.firma;
          if(parsed.ap)acc.cust.ap=parsed.ap;
          if(parsed.branche)acc.cust.branche=parsed.branche;
          if(parsed.ma)acc.cust.ma=parsed.ma;
          if(parsed.um){
            // Normalize umsatz to readable format
            const rawUm=String(parsed.um).replace(/[^0-9.]/g,'');
            const numUm=parseFloat(rawUm);
            if(numUm>=1000000)acc.cust.um=(numUm/1000000).toFixed(0)+' Mio. €';
            else if(numUm>=1000)acc.cust.um=(numUm/1000).toFixed(0)+' Tsd. €';
            else acc.cust.um=parsed.um;
          }
          LS.set('ki21_acc',state.accounts);
          
          // Update kontext
          if(parsed.kontext||parsed.persoenlich){
            let kk=LS.get('ki21_kk_'+accId,'')||'';
            if(parsed.kontext)kk+=(kk?'\n\n':'')+parsed.kontext;
            if(parsed.persoenlich)kk+=(kk?'\n\nPERSÖNLICH:\n':'')+parsed.persoenlich;
            LS.set('ki21_kk_'+accId,kk);
            refreshOpportunityHealth(accId);
          }

          // Update Phase 1 "Bekannte Herausforderungen / Vermutungen" (mergen, nicht überschreiben)
          if(parsed.herausforderungen){
            const st0=LS.get('ki21_st_'+accId+'_0',{fv:{},result:''});
            if(!st0.fv)st0.fv={};
            st0.fv.info=(st0.fv.info?st0.fv.info+'\n\n':'')+parsed.herausforderungen;
            LS.set('ki21_st_'+accId+'_0',st0);
          }
        }
        
        // Build confirmation
        const lines=[];
        if(parsed.firma)lines.push('✅ Firma: '+parsed.firma);
        if(parsed.ap)lines.push('✅ Ansprechpartner: '+parsed.ap);
        if(parsed.branche)lines.push('✅ Branche: '+parsed.branche);
        if(parsed.ma)lines.push('✅ Mitarbeiter: '+parsed.ma);
        if(parsed.um)lines.push('✅ Umsatz: '+parsed.um);
        if(parsed.kontext)lines.push('✅ Kontext: importiert');
        if(parsed.herausforderungen)lines.push('✅ Herausforderungen (Phase 1): importiert');
        if(parsed.persoenlich)lines.push('✅ Persönliche Infos: importiert');

        statusDiv.innerHTML='<div style="margin-top:10px;padding:10px;background:rgba(46,160,67,.1);border-radius:6px;border:1px solid rgba(46,160,67,.3);">'+
          '<div style="font-size:11px;font-weight:700;color:#2ea043;margin-bottom:6px;letter-spacing:.5px;">IMPORTIERT:</div>'+
          lines.map(l=>'<div style="font-size:12px;color:#e6edf3;padding:2px 0;">'+l+'</div>').join('')+
          '</div>';
        analyzeBtn.textContent='✓ Schließen';
        analyzeBtn.onclick=()=>{if(modalRef)modalRef.remove();};
        
      }catch(e){
        statusDiv.textContent='Fehler: '+e.message;
        analyzeBtn.textContent='CRM-Text analysieren';
        analyzeBtn.disabled=false;
      }

function renderBranchenwissen(text){
  if(!text)return '';
  const lines=text.split('\n');
  let html='';
  let counter=0;
  let inEntry=false;
  lines.forEach(line=>{
    const t=line.trim();
    if(!t)return;
    // Category headers (ALL CAPS followed by colon, optionally with count in parens)
    if(/^[A-ZÄÖÜ\- ]+(\s*\(\d+.*\))?:$/.test(t)){
      if(inEntry)html+='</div>';
      html+=`<div style="margin:14px 0 8px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#ff6b00;border-bottom:1px solid #30363d;padding-bottom:4px;">${t.replace(/:$/,'')}</div>`;
      counter=0;
      inEntry=false;
      return;
    }
    // Field lines like "Pattern: ...", "Kennzahl: ...", "Confidence: ..."
    const fieldMatch=t.match(/^([A-ZÄÖÜa-zäöü]+):\s*(.*)$/);
    if(fieldMatch){
      const field=fieldMatch[1];
      const value=fieldMatch[2];
      if(field==='Pattern'||field==='Kennzahl'||field==='Rolle'||field==='Einwand'||field==='Insight'||field==='Frage'||field==='Titel'||field==='Typ'){
        if(inEntry)html+='</div>';
        counter++;
        html+=`<div style="background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px 10px;margin-bottom:6px;">
          <div style="font-size:11px;font-weight:700;color:#fff;margin-bottom:3px;">${counter}. ${value}</div>`;
        inEntry=true;
      } else if(field==='Confidence'||field==='Status'){
        const badge=value.toLowerCase().includes('hoch')||value.includes('recherchiert')?'🟢':value.toLowerCase().includes('mittel')||value.includes('Erfahrungswissen')?'🟡':'🔴';
        html+=`<div style="font-size:9px;color:#8b949e;margin-top:4px;">${badge} ${value}</div></div>`;
        inEntry=false;
      } else {
        html+=`<div style="font-size:10px;color:#c9d1d9;line-height:1.4;"><span style="color:#8b949e;">${field}:</span> ${value}</div>`;
      }
      return;
    }
    // Fallback: plain line
    html+=`<div style="font-size:10px;color:#c9d1d9;">${t}</div>`;
  });
  if(inEntry)html+='</div>';
  return html;
}

const KI21_VERSION='v4.149';


function runKi21VersionMigration(){
  const applied=LS.get('ki21_applied_code_version','');
  if(applied===KI21_VERSION)return;
  const accs=LS.get('ki21_acc',[]);
  accs.forEach(acc=>{
    if(!acc||!acc.id)return;
    // Neue Code-Versionen dürfen keine alten Health-/Dashboard-Ableitungen weiterverwenden.
    // Phasentexte bleiben erhalten; nur der schnelle Health-Cache wird ungültig gemacht.
    LS.set('ki21_health_'+acc.id,null);
    LS.set('ki21_health_lastError_'+acc.id,null);
  });
  LS.set('ki21_applied_code_version',KI21_VERSION);
}

function encodeBase64UTF8(text){
  const bytes=new TextEncoder().encode(text);
  let binary='';
  const chunk=8192;
  for(let i=0;i<bytes.length;i+=chunk){
    binary+=String.fromCharCode(...bytes.subarray(i,i+chunk));
  }
  return btoa(binary);
}

function detectVersionFromHtml(html){
  const m=String(html||'').match(/v\d+\.\d+(?:\s*[A-Za-z0-9_-]+)?/);
  return m?m[0]:'unbekannte Version';
}

async function pushToGitHub(sourceText){
  const token=LS.get('ki21_github_token','');
  if(!token){alert('Bitte zuerst GitHub Token in Einstellungen hinterlegen.');return;}

  if(!sourceText||!String(sourceText).trim()){
    throw new Error('Kein App-Code zum Veröffentlichen vorhanden. Bitte neue index.html in das Update-Feld einfügen.');
  }
  if(!String(sourceText).includes('<!DOCTYPE html')||!String(sourceText).includes('<script>')){
    throw new Error('Der eingefügte Text sieht nicht wie eine vollständige index.html aus.');
  }

  const version=detectVersionFromHtml(sourceText);
  const headers={
    'Authorization':'token '+token,
    'Accept':'application/vnd.github.v3+json',
    'Content-Type':'application/json'
  };

  const shaResp=await fetch('https://api.github.com/repos/KI21-Vertrieb/KI21/contents/index.html',{headers});
  if(!shaResp.ok)throw new Error('GitHub Fehler '+shaResp.status);
  const shaData=await shaResp.json();
  const sha=shaData.sha;

  const encoded=encodeBase64UTF8(sourceText);

  const pushResp=await fetch('https://api.github.com/repos/KI21-Vertrieb/KI21/contents/index.html',{
    method:'PUT',
    headers,
    body:JSON.stringify({
      message:'KI21 '+version+' veröffentlicht – '+new Date().toLocaleDateString('de-DE'),
      content:encoded,
      sha:sha
    })
  });
  if(!pushResp.ok){
    let msg='Push Fehler '+pushResp.status;
    try{const err=await pushResp.json(); if(err&&err.message)msg+=': '+err.message;}catch(e){}
    throw new Error(msg);
  }
  LS.set('ki21_last_published_version',version);
  LS.set('ki21_last_published_at',new Date().toLocaleString('de-DE'));
  return version;
}

async function fetchCurrentPublishedHtml(){
  const resp=await fetch('https://ki21-vertrieb.github.io/KI21/index.html?nocache='+Date.now());
  if(!resp.ok)throw new Error('Aktuelle Live-Version konnte nicht gelesen werden ('+resp.status+').');
  return await resp.text();
}

    h('div',{style:{background:'#1c2333',border:'1px solid #30363d',borderRadius:'12px',padding:'14px',marginBottom:'14px'}},
      h('div',{style:{fontSize:'11px',fontWeight:'700',color:'#8b949e',letterSpacing:'1px',textTransform:'uppercase',marginBottom:'6px'}},'Gesamtbackup'),
      h('div',{style:{fontSize:'12px',color:'#e6edf3',marginBottom:'10px'}},state.accounts.length+' Opportunit'+(state.accounts.length!==1?'ies':'y')+' · alle Daten inkl. KI-Ergebnisse'),
      backupBtn
    ),
    cleanExport?h('div',{style:{background:'#1c2333',border:'1px solid rgba(255,107,0,.4)',borderRadius:'12px',padding:'14px'}},
      h('div',{style:{fontSize:'11px',fontWeight:'700',color:'#ff6b00',letterSpacing:'1px',textTransform:'uppercase',marginBottom:'6px'}},'Opportunity-Rohdaten'),
      h('div',{style:{fontSize:'12px',color:'#e6edf3',marginBottom:'4px'}},(activeCust&&activeCust.firma)||'Aktuelle Opportunity'),
      h('div',{style:{fontSize:'11px',color:'#8b949e',marginBottom:'10px'}},'Nur Eingaben & Ergänzungen · KI-Ergebnisse werden neu generiert'),
      cleanBtn
    ):h('div',{style:{fontSize:'12px',color:'#8b949e'}},'Bitte zuerst eine Opportunity öffnen.')
  );
  modal('Exportieren',content,null);
}

function showImport(){
  const ta=h('textarea',{placeholder:'Export-Text hier einfügen...',style:{minHeight:'80px'}});
  const info=h('div',{style:{fontSize:'11px',color:'#8b949e',marginBottom:'8px'}});
  ta.addEventListener('input',()=>{
    try{
      const d=JSON.parse(ta.value);
      if(d.version==='opportunity-rohdaten-v1'){
        info.textContent='📋 Opportunity-Rohdaten erkannt → wird als neue Opportunity angelegt';
        info.style.color='#ff6b00';
      } else {
        info.textContent='💾 Gesamtbackup erkannt → stellt vorhandene Daten wieder her';
        info.style.color='#8b949e';
      }
    }catch(e){info.textContent='';}
  });
  const content=h('div',{},
    h('p',{className:'modal-desc'},'Backup oder Opportunity-Rohdaten einfügen.'),
    info,ta,
    h('div',{className:'modal-row',style:{marginTop:'8px'}},
      h('button',{className:'btn-o',style:{flex:'1'},onclick:()=>{
        try{
          const d=JSON.parse(ta.value);
          if(d.version==='opportunity-rohdaten-v1'){
            // Clean Import: neue Opportunity anlegen
            const newId='acc_'+Date.now();
            const newCust={...d.cust};
            state.accounts=[{id:newId,cust:newCust,ts:Date.now()},...state.accounts].slice(0,10);
            state.activeId=newId;
            LS.set('ki21_acc',state.accounts);
            LS.set('ki21_aid',newId);
            if(d.mu)LS.set('ki21_mu',d.mu);
            if(d.inputs)Object.keys(d.inputs).forEach(k=>{
              const idx=parseInt(k.replace('slot_',''));
              if(!isNaN(idx))LS.set('ki21_st_'+newId+'_'+idx,d.inputs[k]);
            });
            if(d.kk)Object.keys(d.kk).forEach(k=>{
              const idx=parseInt(k.replace('slot_',''));
              if(!isNaN(idx))LS.set('ki21_kk_'+newId+'_'+idx,d.kk[k]);
            });
            if(d.manual)LS.set('ki21_health_manual_'+newId,d.manual);
            m.remove();renderHome();
            alert('Opportunity angelegt: '+(newCust.firma||'Neu')+'\nBitte alle Phasen neu generieren.');
          } else {
            // Vollständiges Backup wiederherstellen
            if(d.accounts){state.accounts=d.accounts;LS.set('ki21_acc',d.accounts);}
            if(d.activeId){state.activeId=d.activeId;LS.set('ki21_aid',d.activeId);}
            if(d.mu)LS.set('ki21_mu',d.mu);
            if(d.stationData)Object.keys(d.stationData).forEach(k=>LS.set(k,d.stationData[k]));
            if(d.kontextData)Object.keys(d.kontextData).forEach(k=>LS.set(k,d.kontextData[k]));
            m.remove();renderHome();
          }
        }catch(e){alert('Ungültiger Text.');}
      }},'Importieren'),
      h('button',{className:'btn',onclick:()=>m.remove()},'Abbrechen')
    )
  );
  const m=modal('Importieren',content,null);
}

// ── START ──────────────────────────────────────────────────
// Apply saved font size
const savedFs=LS.get('ki21_fontsize','small');
document.documentElement.style.setProperty('--fs-input',savedFs==='large'?'15px':'12px');

const savedTheme=LS.get('ki21_theme','dark');
if(savedTheme==='light')document.body.classList.add('light');

runKi21VersionMigration();

const savedView=LS.get('ki21_view','home');
if(typeof savedView==='number'&&state.activeId){
  renderStation(savedView);
} else {
  renderHome();
}
(function(){
  const v=document.createElement('div');
  v.textContent=KI21_VERSION;
  v.style.cssText='position:fixed;bottom:6px;left:8px;font-size:11px;color:#6b7280;font-weight:500;z-index:50;pointer-events:none;';
  document.body.appendChild(v);
})();
</script>
