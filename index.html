<script>
'use strict';
const VERSION='KI21 Core 8.3.2 · Decision Intelligence Depth';
const STORAGE_KEY='ki21_core_830_state';
const DEFAULT_IMPORT=`Unternehmen
Firmenname: Novacore Systems GmbH
Branche: B2B-Software
Standort: Deutschland
Mitarbeiter: ca. 420
Umsatz: ca. 95 Mio. €
Vertriebsmodell: Direktvertrieb mit Account Executives, Sales Operations und Presales
CRM-System: Salesforce
Weitere Systeme: Microsoft 365, Power BI, Excel, Teams

Opportunity
Opportunity-Name: KI21 Pilot Opportunity-Steuerung
Opportunity-Status: Qualifizierung / frühe Discovery
Geplante Lösung: KI21 Pilot zur Verbesserung von Opportunity-Qualifizierung, Forecast-Qualität und Deal-Steuerung
Voraussichtlicher Pilotumfang: 8 Nutzer
Zielgruppe im Pilot: Account Executives, Vertriebsleitung und Sales Operations
Geplanter Einsatz: echte Enterprise-Opportunities
Angebotspreis: noch offen
Entscheidungszeitraum: noch nicht verbindlich festgelegt

Ausgangssituation
Die Vertriebsorganisation arbeitet mit Salesforce, Excel, Power BI und zusätzlichen manuellen Deal-Reviews.
Opportunity-Informationen sind zwar im CRM vorhanden, werden jedoch nicht einheitlich bewertet. Insbesondere bei der Qualifizierung, der Stakeholder-Einschätzung, dem wirtschaftlichen Nutzen und der Forecast-Bewertung bestehen deutliche Unterschiede zwischen den Vertriebsmitarbeitern.
Die Vertriebsleitung und Sales Operations führen deshalb zusätzliche Reviews, Forecast-Korrekturen und Datenaufbereitungen durch.

Schmerz und Aufwand
Der zusätzliche Aufwand beträgt nach interner Auswertung rund 110 Stunden pro Monat:
- 55 Stunden für zusätzliche Deal-Reviews
- 35 Stunden für Forecast-Korrekturen
- 20 Stunden für Datenaufbereitung und Abstimmung
Im vergangenen Jahr wurden 27 Opportunities verloren oder deutlich verschoben.
Bei etwa 4 bis 6 dieser Opportunities hätten Risiken möglicherweise früher erkannt werden können. Es ist jedoch nicht bestätigt, dass diese Opportunities dadurch gewonnen oder Verluste sicher vermieden worden wären.

Stakeholder
Thomas Reuter
Funktion: Vertriebsleiter
Rolle: fachlicher Sponsor
Haltung: unterstützt den Pilot grundsätzlich
Einfluss: hoch im Vertrieb
Entscheidungsbefugnis: keine alleinige Investitionsfreigabe

Dr. Miriam Albrecht
Funktion: Geschäftsführerin Finanzen & Operations
Rolle: wirtschaftliche Entscheiderin
Haltung: noch nicht ausreichend bekannt
Status: noch nicht aktiv eingebunden
Einfluss: sehr hoch
Entscheidungsbefugnis: Investitionsfreigabe innerhalb des Budgetrahmens
Offener Punkt: Sie kennt die Analyse über 110 Stunden monatlichen Zusatzaufwand noch nicht.

Jana Wolf
Funktion: Sales Operations
Rolle: technische und operative Prüferin
Haltung: grundsätzlich offen, aber kritisch hinsichtlich Datenqualität, Aufwand und Integration
Interesse: weniger manuelle Datenaufbereitung, klare Prozesse, nachvollziehbare Bewertungen
Einfluss: mittel bis hoch
Entscheidungsbefugnis: keine wirtschaftliche Freigabe, aber relevanter Einfluss auf die operative Bewertung

Qualifizierungsstand
Bestätigt sind:
- uneinheitliche Opportunity-Qualifizierung
- zusätzlicher Aufwand für Deal-Reviews
- hoher Aufwand für Forecast-Korrekturen
- wiederkehrende Datenaufbereitung
- verlorene oder verschobene Opportunities
- Interesse der Vertriebsleitung an einem Pilot
Noch offen sind:
- persönliche Bestätigung des wirtschaftlichen Schmerzes durch Dr. Miriam Albrecht
- verbindliche Erfolgskriterien
- eindeutiger Entscheidungsprozess
- konkreter Zeitplan
- finale Investitionsfreigabe
- wirtschaftliche Wirkung des Piloten
- konkreter Angebotspreis

Budget und Entscheidung
Ein Budgetrahmen von bis zu 50.000 € ist grundsätzlich vorhanden.
Eine konkrete Investitionsfreigabe liegt noch nicht vor.
Die Freigabe muss durch Dr. Miriam Albrecht erfolgen.
Erfolgskriterien wurden intern diskutiert, aber noch nicht gemeinsam mit der wirtschaftlichen Entscheiderin bestätigt.
Der Entscheidungsprozess ist noch nicht vollständig geklärt.

Pilot
Geplant ist ein begrenzter Pilot mit:
- 8 Nutzern
- echten Enterprise-Opportunities
- Beteiligung von Vertrieb, Sales Operations und gegebenenfalls Presales
- Messung der Wirkung während des Piloten
Mögliche Pilotziele:
- Risiken früher erkennen
- Opportunity-Qualifizierung vereinheitlichen
- Forecast-Abweichungen früher sichtbar machen
- manuelle Deal-Reviews reduzieren
- Entscheidungsreife transparenter darstellen
- nächste Kundenschritte besser priorisieren
Noch nicht verbindlich festgelegt sind:
- konkrete Erfolgskriterien
- Messmethode
- Starttermin
- Laufzeit
- konkreter Angebotspreis
- Beteiligung der wirtschaftlichen Entscheiderin
- Entscheidungstermin nach dem Pilot

Mögliche Einwände
- Der Business Case ist noch nicht ausreichend belastbar.
- Es ist nicht bestätigt, dass bessere Qualifizierung verlorene Deals verhindert.
- Der zusätzliche Pflegeaufwand für Vertrieb und Sales Operations könnte zu hoch sein.
- KI21 könnte als weiteres System neben CRM, Excel und Power BI wahrgenommen werden.

Zentrale Deal-Risiken
- Sponsor und wirtschaftliche Entscheiderin sind nicht ausreichend verbunden.
- Erfolgskriterien sind nicht gemeinsam bestätigt.
- Budgetrahmen ist vorhanden, aber keine Freigabe.
- Die Wirkungsannahme ist plausibel, aber noch nicht gemessen.
- Ein verbindlicher Entscheidungs- und Pilotzeitplan fehlt.`;

const PROCESS_AREAS=['Qualifizierung','Bedarfsanalyse','Demo','Einwandbehandlung','Wirtschaftlicher Nutzen & ROI','Angebot','Abschluss'];
const QUAL_QUESTIONS=[
['Problemrelevanz','Welche Folgen hat das Problem für die wirtschaftliche Entscheiderin persönlich?'],
['Sponsor','Wer treibt das Vorhaben intern aktiv voran und übernimmt Verantwortung?'],
['Wirtschaftliche Entscheidung','Wer kann die Investition freigeben und ist diese Person aktiv eingebunden?'],
['Entscheidungsprozess','Welche Schritte, Personen und Kriterien führen zur verbindlichen Entscheidung?'],
['Budget','Welcher Budgetrahmen ist bestätigt und wofür gilt er genau?'],
['Zeitplan','Bis wann soll entschieden werden und was löst den Termin aus?']
];
const SPIN_QUESTIONS=[
['Situation','Wie wird die Opportunity-Steuerung heute konkret durchgeführt?'],
['Problem','Wo entstehen dabei Fehler, Reibungsverluste oder unnötiger Aufwand?'],
['Auswirkung','Welche operativen, finanziellen oder strategischen Folgen entstehen daraus?'],
['Nutzen','Welche messbare Verbesserung wäre für den Kunden entscheidungsrelevant?']
];

function emptyState(){return{version:VERSION,activeTab:'cockpit',inputTab:'crm',rawImport:DEFAULT_IMPORT,importPreview:[],company:'',opportunity:'',phase:'',stakeholders:[],evidence:[],metrics:{hours:0,lost:0,possible:'',budget:0},flags:{approvalOpen:true,economicBuyerOpen:true,successOpen:true,priceOpen:true},answers:{qual:{},spin:{}},offer:{},additions:[],openAreas:[],updatedAt:new Date().toISOString()}}
let state=loadState();
function loadState(){try{const x=JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');if(x&&x.version===VERSION)return x}catch(e){}const s=emptyState();applyParsed(s,parseImport(s.rawImport));saveState(s);return s}
function saveState(s=state){s.updatedAt=new Date().toISOString();localStorage.setItem(STORAGE_KEY,JSON.stringify(s))}
function normalizeMoney(v){if(!v)return 0;const raw=String(v).replace(/\s/g,'').replace(/€/g,'').replace(/EUR/ig,'');if(/mio/i.test(raw)){const n=parseFloat(raw.replace(/[^0-9,]/g,'').replace(',','.'));return Math.round((n||0)*1000000)}const cleaned=raw.replace(/\.(?=\d{3}(\D|$))/g,'').replace(',','.').replace(/[^0-9.]/g,'');return Math.round(parseFloat(cleaned)||0)}
function isSection(line){return /^(Unternehmen|Opportunity|Ausgangssituation|Schmerz(?: und| &) Aufwand|Stakeholder|Qualifizierungsstand|Budget(?: und| &) Entscheidung|Pilot|Mögliche Einwände|Zentrale Deal-Risiken)$/i.test(line)}
function sectionCategory(section){const s=section.toLowerCase();if(s.includes('unternehmen'))return'Unternehmen';if(s==='opportunity')return'Opportunity';if(s.includes('stakeholder'))return'Stakeholder';if(s.includes('schmerz'))return'Schmerz & Aufwand';if(s.includes('budget'))return'Budget & Entscheidung';if(s.includes('pilot'))return'Pilot';if(s.includes('einwände'))return'Einwandbehandlung';if(s.includes('risiken'))return'Risiko';return'Weitere Information'}
function inferEvidence(text,context){const t=text.toLowerCase();if(context==='open'||/\b(offen|noch nicht|nicht bestätigt|fehlt|ungeklärt|keine freigabe|nicht eingebunden)\b/.test(t))return'offen';if(context==='hyp'||/\b(möglicherweise|könnte|hypothese|möglich)\b/.test(t))return'hypothese';return'fakt'}
function parseImport(raw){
 const lines=raw.replace(/\r/g,'').split('\n').map(x=>x.trim());
 let section='',context='';const evidence=[];const stakeholders=[];let current=null;
 const flush=()=>{if(current&&current.name){stakeholders.push(current)}current=null};
 const personLine=(line,i)=>{
   if(!line||line.includes(':')||/^[-*]/.test(line)||isSection(line))return null;
   if(line==='Dr.'&&lines[i+1]&&!lines[i+1].includes(':'))return 'Dr. '+lines[i+1];
   if(/^(Dr\.\s+)?[A-ZÄÖÜ][\p{L}.'-]+(?:\s+[A-ZÄÖÜ][\p{L}.'-]+){1,3}$/u.test(line))return line;
   return null;
 };
 for(let i=0;i<lines.length;i++){
  let line=lines[i];if(!line)continue;
  if(isSection(line)){if(section.toLowerCase()==='stakeholder')flush();section=line;context='';continue}
  if(/^Bestätigt sind:?$/i.test(line)){context='fact';continue}
  if(/^(Noch offen sind|Noch nicht verbindlich festgelegt sind):?$/i.test(line)){context='open';continue}
  if(/^Mögliche (Pilotziele|Einwände):?$/i.test(line)){context='hyp';continue}
  if(/^Zentrale Deal-Risiken:?$/i.test(line)){context='risk';continue}
  if(section.toLowerCase()==='stakeholder'){
    const p=personLine(line,i);
    if(p){flush();current={name:p,function:'',role:'',status:'',attitude:'',influence:'',authority:'',interest:'',openPoint:''};if(line==='Dr.')i++;continue}
    const m=line.match(/^([^:]+):\s*(.+)$/);
    if(current&&m){const k=m[1].toLowerCase(),v=m[2];if(k==='funktion')current.function=v;else if(k==='rolle')current.role=v;else if(k==='status')current.status=v;else if(k==='haltung')current.attitude=v;else if(k==='einfluss')current.influence=v;else if(k==='entscheidungsbefugnis')current.authority=v;else if(k==='interesse')current.interest=v;else if(k==='offener punkt')current.openPoint=v;continue}
  }
  const clean=line.replace(/^[-*•]\s*/,'').trim();if(!clean)continue;
  evidence.push({id:'e'+evidence.length,text:clean,category:sectionCategory(section),type:inferEvidence(clean,context),context:context||'default',selected:true});
 }
 if(section.toLowerCase()==='stakeholder')flush();
 const full=raw.replace(/\n+/g,' ');
 const company=(raw.match(/Firmenname:\s*([^\n]+)/i)||[])[1]||'';
 const opportunity=(raw.match(/Opportunity-Name:\s*([^\n]+)/i)||[])[1]||'';
 const phase=(raw.match(/Opportunity-Status:\s*([^\n]+)/i)||[])[1]||'';
 const hours=Number((full.match(/(?:rund\s*)?(\d+)\s*Stunden\s*(?:pro|monatlich)/i)||[])[1]||0);
 const lost=Number((full.match(/(\d+)\s+Opportunities\s+(?:verloren|wurden verloren)/i)||[])[1]||0);
 const poss=(full.match(/(?:etwa\s*)?(\d+\s*(?:bis|–|-)\s*\d+)\s+(?:dieser\s+)?Opportunities/i)||[])[1]||'';
 const budgetMatch=full.match(/Budgetrahmen[^.\n]*?(\d{1,3}(?:\.\d{3})*(?:,\d+)?)\s*€/i);const budget=normalizeMoney(budgetMatch?budgetMatch[1]:'');
 const approvalOpen=/keine konkrete investitionsfreigabe|investitionsfreigabe liegt noch nicht vor|freigabe.*offen/i.test(full);
 const successOpen=/erfolgskriterien[^.]*noch nicht|noch offen[^]*erfolgskriterien/i.test(full);
 const priceOpen=/angebotspreis:\s*noch offen|konkreter angebotspreis[^.]*offen|preis[^.]*noch nicht/i.test(full);
 const buyer=stakeholders.find(x=>/wirtschaftliche entscheider/i.test(x.role))||null;
 const buyerOpen=!!buyer&&/nicht aktiv eingebunden|noch nicht eingebunden|nicht ausreichend bekannt/i.test((buyer.status+' '+buyer.attitude+' '+buyer.openPoint));
 return{company,opportunity,phase,stakeholders,evidence,metrics:{hours,lost,possible:poss,budget},flags:{approvalOpen,economicBuyerOpen:buyer?buyerOpen:true,successOpen,priceOpen},raw};
}
function applyParsed(target,p){target.rawImport=p.raw;target.company=p.company||target.company;target.opportunity=p.opportunity||target.opportunity;target.phase=p.phase||target.phase;target.stakeholders=p.stakeholders;target.evidence=p.evidence;target.metrics=p.metrics;target.flags=p.flags;target.importPreview=p.evidence.map(x=>({...x}));}
function buyer(){return state.stakeholders.find(x=>/wirtschaftliche entscheider/i.test(x.role))||null}
function sponsor(){return state.stakeholders.find(x=>/sponsor/i.test(x.role))||null}
function scores(){let s=25;if(state.metrics.hours)s+=8;if(state.metrics.budget)s+=7;if(sponsor())s+=6;if(buyer())s+=6;if(buyer()&&!state.flags.economicBuyerOpen)s+=12;if(!state.flags.successOpen)s+=8;if(!state.flags.priceOpen)s+=6;if(!state.flags.approvalOpen)s+=12;const qualFilled=Object.values(state.answers.qual).filter(Boolean).length;const spinFilled=Object.values(state.answers.spin).filter(Boolean).length;s+=Math.min(8,qualFilled)+Math.min(8,spinFilled);s=Math.max(15,Math.min(92,s));const forecast=Math.max(10,Math.min(88,s-10-(state.flags.approvalOpen?4:0)));return{score:s,forecast}}
function scoreExplanation(){const b=buyer(),sp=sponsor(),d=[];d.push({label:'Operativer Schmerz quantifiziert',value:state.metrics.hours?'+8':'0',impact:!!state.metrics.hours});d.push({label:'Budgetrahmen erkannt',value:state.metrics.budget?'+7':'0',impact:!!state.metrics.budget});d.push({label:'Sponsor vorhanden',value:sp?'+6':'0',impact:!!sp});d.push({label:'Wirtschaftliche Entscheiderin identifiziert',value:b?'+6':'0',impact:!!b});d.push({label:'Wirtschaftliche Entscheiderin aktiv eingebunden',value:b&&!state.flags.economicBuyerOpen?'+12':'0',impact:!!(b&&!state.flags.economicBuyerOpen)});d.push({label:'Erfolgskriterien bestätigt',value:!state.flags.successOpen?'+8':'0',impact:!state.flags.successOpen});d.push({label:'Preis bestätigt',value:!state.flags.priceOpen?'+6':'0',impact:!state.flags.priceOpen});d.push({label:'Investitionsfreigabe bestätigt',value:!state.flags.approvalOpen?'+12':'0',impact:!state.flags.approvalOpen});return d}
function statusText(){const b=buyer();if(!b||state.flags.economicBuyerOpen)return'Qualifizierung · wirtschaftlichen Entscheidungsweg klären';if(state.flags.successOpen)return'Bedarfsanalyse · Erfolgskriterien und Wirkung validieren';if(state.flags.priceOpen||state.flags.approvalOpen)return'Pilotentscheidung vorbereiten';return'Angebot & Abschluss · Freigabe sichern'}
function processAnalysis(name){const b=buyer(),sp=sponsor(),op=state.stakeholders.find(x=>/prüfer|sales operations/i.test((x.role||'')+' '+(x.function||''))),bn=b?b.name:'die wirtschaftliche Entscheiderin',h=state.metrics.hours,annual=h*12,budget=state.metrics.budget;const buyingCenter=`${sp?sp.name:'Der Sponsor'} trägt den fachlichen Bedarf, ${bn} die wirtschaftliche Freigabe${op?' und '+op.name+' die operative Akzeptanz':''}. Noch fehlt ein gemeinsamer Entscheidungsrahmen.`;const blocks={
'Qualifizierung':{status:(!b||state.flags.economicBuyerOpen)?'kritisch':'teilweise geklärt',assessment:`${sp?sp.name+' ist als Sponsor vorhanden.':'Ein belastbarer Sponsor ist noch nicht bestätigt.'} ${b?bn+' ist als wirtschaftliche Entscheiderin identifiziert.':'Die wirtschaftliche Entscheidung ist noch nicht personell geklärt.'}`,facts:[b?`${bn} · ${b.function}`:'Wirtschaftliche Entscheiderin nicht identifiziert',budget?`Budgetrahmen: ${budget.toLocaleString('de-DE')} €`:'Kein Budgetrahmen erkannt'],open:[state.flags.economicBuyerOpen?'Persönliche Einbindung und Problemvalidierung fehlen':'Entscheiderin ist eingebunden',state.flags.approvalOpen?'Konkrete Freigabe fehlt':'Freigabe bestätigt'],insight:buyingCenter,next:state.flags.economicBuyerOpen?`${bn}, ${sp?sp.name:'Sponsor'}${op?' und '+op.name:''} in einen gemeinsamen Entscheidungstermin holen und Entscheidungsmaßstab, Rollen und Freigabeweg festlegen.`:'Entscheidungsprozess, Kriterien und Termin verbindlich festlegen.'},
'Bedarfsanalyse':{status:h?'teilweise geklärt':'offen',assessment:h?`${h} Stunden monatlicher Zusatzaufwand belegen einen realen operativen Schmerz.`:'Der operative Schmerz ist noch nicht quantifiziert.',facts:h?[`${h} Stunden pro Monat`,`${annual.toLocaleString('de-DE')} Stunden pro Jahr`,`${state.metrics.lost||0} verlorene oder verschobene Opportunities`]:[],open:['Vermeidbarer Anteil des Aufwands','Priorisierte Auswirkungen aus Sicht der Entscheiderin','Konkreter Nutzenmaßstab'],insight:h?'Der Aufwand ist belastbar, aber noch kein Investitionsgrund. Erst eine von der Entscheiderin akzeptierte Wirkungsquote verbindet Problem, Nutzen und Freigabe.':'Ohne quantifizierten Ausgangswert kann KI21 keinen belastbaren Nutzen ableiten.',next:'Mit der Entscheiderin quantifizieren, welcher Anteil des Aufwands vermeidbar ist, welche Auswirkung priorisiert wird und welche Zielverbesserung eine Freigabe rechtfertigt.'},
'Demo':{status:'offen',assessment:'Die Demo muss einen überprüfbaren Kundenbeweis liefern und darf nicht bei Funktionen stehen bleiben.',facts:['Pilot soll mit echten Enterprise-Opportunities arbeiten'],open:['Welcher Referenzdeal wird verwendet?','Wer bewertet den Beweis?','Welche Schwelle gilt als erfolgreich?'],insight:'Die Demo ist nur dann verkaufswirksam, wenn sie drei konkrete Beweise liefert: ein bislang übersehenes Deal-Risiko, einen besseren nächsten Kundenschritt und messbar weniger Review-Aufwand.',next:'Einen Referenzdeal auswählen und vorab genau diese drei Demo-Beweise samt Bewertenden und Erfolgsschwelle vereinbaren.'},
'Einwandbehandlung':{status:'offen',assessment:'Bestätigte Kundeneinwände liegen noch nicht vor. Potenzielle Widerstände dürfen nicht als geäußerte Einwände behandelt werden.',facts:[],open:['Zusätzlicher Pflegeaufwand','Paralleles System neben CRM und Power BI','Noch unbewiesene Wirkung'],insight:'Der wahrscheinlichste Widerstand ist nicht der Preis, sondern zusätzlicher Pflegeaufwand ohne nachgewiesene Wirkung. Jeder potenzielle Einwand braucht deshalb einen messbaren Pilotmechanismus.',next:'Pflegeaufwand über Zeitmessung prüfen, Systemabgrenzung zu CRM/Power BI klären und Wirkung über eine Vorher-Nachher-Messung belegen.'},
'Wirtschaftlicher Nutzen & ROI':{status:h?'teilweise geklärt':'offen',assessment:h?`${annual.toLocaleString('de-DE')} Stunden Jahresaufwand bilden den belastbaren Ausgangswert. ROI ist noch nicht berechenbar.`:'Ein belastbarer Ausgangswert fehlt.',facts:h?[`${annual.toLocaleString('de-DE')} Stunden Jahresaufwand`,budget?`Budgetrahmen ${budget.toLocaleString('de-DE')} €`:'Budget offen']:[],open:['Interner Zeitwert','Vermeidbarer Anteil','Pilotpreis','Messzeitraum'],insight:'Umsatzwirkungen aus verhinderten Deal-Verlusten dürfen noch nicht eingerechnet werden. Der erste belastbare Business Case muss auf Zeitersparnis und früherer Risikoerkennung beruhen.',next:'Zeitwert, Zielverbesserung, Messzeitraum und Mindest-Wirkungsquote gemeinsam bestätigen und daraus den Pilot-Break-even ableiten.'},
'Angebot':{status:'offen',assessment:'Das Angebot muss die bestätigte Kundenentscheidung abbilden und darf nicht nur Umfang und Preis nennen.',facts:budget?[`Budgetrahmen ${budget.toLocaleString('de-DE')} €`]:[],open:['Pilotumfang','Erfolgskriterien','Messlogik','Preis','Freigabeweg'],insight:'Ein früher Preis wäre aktuell nur eine Zahl. Eine entscheidungsfähige Investitionsvorlage verbindet Ziel, Messlogik, Verantwortliche, Preis und Freigabekriterium.',next:'Nach Bestätigung der Entscheidungskriterien ein Pilotangebot mit Zielbild, Messplan, Rollen, Preis und verbindlichem Entscheidungstermin formulieren.'},
'Abschluss':{status:'offen',assessment:'Der Abschluss ist derzeit nicht die nächste Entscheidung.',facts:[],open:['Formaler Freigabeweg','Entscheidungstermin','Einkauf und Vertrag','Verbindlicher Starttermin'],insight:'Der Deal darf nicht auf Vertragsabschluss gedrückt werden. Der nächste Abschlussmeilenstein ist zunächst ein gemeinsam akzeptierter wirtschaftlicher Entscheidungsrahmen.',next:'Die Zwischenentscheidung sichern: wirtschaftliche Relevanz bestätigt, Erfolgskriterien vereinbart, Pilotfreigabeweg und Entscheidungstermin verbindlich.'}}
 return blocks[name];}
function decisionBrief(){const b=buyer(),bn=b?b.name:'die wirtschaftliche Entscheiderin',h=state.metrics.hours,annual=h*12,budget=state.metrics.budget,sc=scores();return`KI21 SALES DECISION BRIEF\nVersion: ${VERSION}\nOpportunity: ${state.company} · ${state.opportunity}\n\nEINSCHÄTZUNG\nDer operative Schmerz ist ${h?'belegt':'noch nicht belastbar belegt'}, der wirtschaftliche Nutzen jedoch noch nicht. Der Deal kann erst vorankommen, wenn ${bn} den Aufwand persönlich bestätigt und festlegt, welche messbare Verbesserung eine Pilotfreigabe rechtfertigt.\n\nDIE 5 PUNKTE, DIE ZÄHLEN\n• ${h} Stunden Zusatzaufwand pro Monat entsprechen ${annual.toLocaleString('de-DE')} Stunden pro Jahr.\n• ${b?bn+' ist identifiziert'+(state.flags.economicBuyerOpen?', aber noch nicht aktiv eingebunden.':', und aktiv eingebunden.'):'Die wirtschaftliche Entscheiderin ist noch nicht identifiziert.'}\n• ${budget?`Ein Budgetrahmen von ${budget.toLocaleString('de-DE')} € ist bekannt; die konkrete Freigabe bleibt ${state.flags.approvalOpen?'offen':'bestätigt'}.`:'Ein belastbarer Budgetrahmen ist nicht erkannt.'}\n• ${state.metrics.lost||0} verlorene oder verschobene Opportunities zeigen Relevanz, beweisen aber keine vermeidbare Wirkung.\n• Pilotumfang, Erfolgskriterien, Messlogik und Preis sind noch nicht gemeinsam bestätigt.\n\nZENTRALE KUNDENENTSCHEIDUNG\n• Soll ${bn} die wirtschaftliche Relevanz des KI21-Piloten bestätigen – und anhand welcher messbaren Kriterien soll anschließend über die Freigabe entschieden werden?\n\nGRÖSSTER ENGPASS\n• Der Deal wird fachlich vom Vertrieb getragen, wirtschaftlich aber noch nicht von ${bn}. Solange Problem, Wirkung und Entscheidungsmaßstab nicht bestätigt sind, bleibt der Budgetrahmen theoretisch.\n\nBUSINESS CASE UND NUTZEN\n• Der belastbare Ausgangswert beträgt ${annual.toLocaleString('de-DE')} Stunden Zusatzaufwand pro Jahr. Noch fehlen interner Zeitwert, vermeidbarer Anteil und konkrete Pilotkosten. Umsatzwirkungen aus verhinderten Deal-Verlusten dürfen noch nicht eingerechnet werden.\n• ROI ist erst belastbar, wenn Wirkungsquote, Zeitwert, Pilotpreis und Messzeitraum bestätigt sind.\n\nNÄCHSTER SCHRITT\n1. ${bn} in einen gemeinsamen Entscheidungstermin mit Sponsor und Sales Operations holen.\n2. Wirtschaftliche Relevanz, Erfolgskriterien, notwendige Wirkungsquote und Freigabeweg bestätigen lassen.\n3. Erst danach Pilotumfang, Preis und verbindlichen Entscheidungstermin finalisieren.\n\nSTATE CHECK\n• Wirtschaftlicher Entscheider: ${state.flags.economicBuyerOpen?'not_involved':'involved'}\n• Erkannter Name: ${b?b.name:'NICHT ERKANNT'}\n• Funktion: ${b?b.function:'—'}\n• Rolle: ${b?b.role:'—'}\n• Budget: ${budget}\n• Opportunity Score: ${sc.score}%\n• Forecast: ${sc.forecast}%\n• Score-Treiber: quantifizierter Schmerz, Budgetrahmen, Sponsor und identifizierte Entscheiderin\n• Score-Bremsen: Entscheiderin noch nicht eingebunden, Erfolgskriterien, Preis und Freigabe offen\n• Forecast-Abschlag: fehlende aktive wirtschaftliche Einbindung und offene Investitionsfreigabe`}
function fullReport(){const b=buyer(),sc=scores();let r=`KI21 VOLLSTÄNDIGER QUALITÄTS- UND ENTSCHEIDUNGSBERICHT\nVersion: ${VERSION}\nErstellt: ${new Date().toLocaleString('de-DE')}\nOpportunity: ${state.company} · ${state.opportunity}\n\n=== SALES DECISION BRIEF ===\n\n${decisionBrief()}\n\n=== ERKANNTE STAKEHOLDER ===\n`;
 r+=state.stakeholders.length?state.stakeholders.map(x=>`• ${x.name} | ${x.function||'—'} | ${x.role||'—'} | ${x.status||x.attitude||'—'}`).join('\n'):'• — keine Angaben —';
 r+='\n\n=== STRUKTURIERTE IMPORTAUSSAGEN ===\n'+state.evidence.map(x=>`• ${x.type.toUpperCase()} | ${x.category} | ${x.text}`).join('\n');
 r+='\n\n=== VERKAUFSPROZESS / BEREICHSANALYSEN ===\n';
 for(const a of PROCESS_AREAS){const x=processAnalysis(a);r+=`\n--- ${a} ---\nStatus: ${x.status}\nEinschätzung: ${x.assessment}\nBestätigte Fakten: ${x.facts.length?x.facts.join(' | '):'—'}\nOffene Punkte: ${x.open.join(' | ')}\nAha-Erkenntnis: ${x.insight}\nNächster Kundenschritt: ${x.next}\n`}
 r+=`\n=== SCORE- UND FORECAST-ERKLÄRUNG ===\n`+scoreExplanation().map(x=>`• ${x.label}: ${x.impact?x.value:'nicht erfüllt'}`).join('\n')+`\n• Forecast liegt unter dem Opportunity Score, weil aktive wirtschaftliche Einbindung und konkrete Freigabe noch fehlen.\n\n=== EINGABEN ===\nQUALIFIZIERUNGSANTWORTEN\n${JSON.stringify(state.answers.qual,null,2)}\n\nSPIN-ANTWORTEN\n${JSON.stringify(state.answers.spin,null,2)}\n\nANGEBOTSPARAMETER\n${JSON.stringify(state.offer,null,2)}\n\nERGÄNZUNGEN\n${state.additions.length?state.additions.map((x,i)=>`${i+1}. ${x.text}`).join('\n'):'• — keine Angaben —'}\n\n=== UNVERÄNDERTER ORIGINALIMPORT ===\n${state.rawImport}\n\n=== TECHNISCHE DIAGNOSE ===\n• Anzahl Stakeholder: ${state.stakeholders.length}\n• Vollständiger Name verwendet: ${b&&b.name==='Dr. Miriam Albrecht'?'JA':'NEIN'}\n• Budget korrekt erkannt: ${state.metrics.budget===50000?'JA':'NEIN'}\n• Bereichsanalysen erzeugt: 7/7\n• Evidence-Einträge: ${state.evidence.length}\n• Opportunity Score: ${sc.score}%\n• Forecast: ${sc.forecast}%\n• Score-Treiber: quantifizierter Schmerz, Budgetrahmen, Sponsor und identifizierte Entscheiderin\n• Score-Bremsen: Entscheiderin noch nicht eingebunden, Erfolgskriterien, Preis und Freigabe offen\n• Forecast-Abschlag: fehlende aktive wirtschaftliche Einbindung und offene Investitionsfreigabe`;
 return r}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function render(){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.activeTab));document.getElementById('oppName').textContent=`${state.company||'Neue Opportunity'} · ${state.opportunity||'CRM-Import erforderlich'}`;document.getElementById('statusLine').textContent=statusText();const v=document.getElementById('view');if(state.activeTab==='cockpit')v.innerHTML=renderCockpit();else if(state.activeTab==='process')v.innerHTML=renderProcess();else v.innerHTML=renderInputs();bindView()}
function renderCockpit(){const sc=scores(),b=buyer(),h=state.metrics.hours,annual=h*12;return`<div class="metrics"><div class="metric" data-action="report"><div class="metric-label">OPPORTUNITY SCORE</div><div class="metric-value">${sc.score}%</div><div class="metric-sub">Antippen für vollständige Diagnose</div></div><div class="metric" data-action="report"><div class="metric-label">FORECAST</div><div class="metric-value">${sc.forecast}%</div><div class="metric-sub">evidenzbasiert</div></div></div><div class="card orange"><div class="kicker">Aktuelles Lagebild</div><div class="headline">Der operative Schmerz ist belegt – die wirtschaftliche Entscheidung noch nicht.</div><div class="divider"></div><div class="body">${h} Stunden Zusatzaufwand pro Monat entsprechen ${annual.toLocaleString('de-DE')} Stunden pro Jahr. ${b?b.name:'Die wirtschaftliche Entscheiderin'} ist ${state.flags.economicBuyerOpen?'noch nicht aktiv eingebunden':'aktiv eingebunden'}.</div></div><div class="card violet"><div class="kicker">Nächste Kundenentscheidung</div><div class="headline">Soll ${b?b.name:'die wirtschaftliche Entscheiderin'} die wirtschaftliche Relevanz des KI21-Piloten bestätigen – und nach welchen Kriterien?</div></div><div class="card red"><div class="kicker">Größter Engpass</div><div class="body">Der Deal wird fachlich vom Vertrieb getragen, wirtschaftlich aber noch nicht von ${b?b.name:'der wirtschaftlichen Entscheiderin'}. Der vorhandene Budgetrahmen bleibt deshalb theoretisch.</div></div><div class="card blue"><div class="kicker">Nächster Schritt</div><div class="list"><div class="item">Gemeinsamen Entscheidungstermin mit Sponsor, ${b?b.name:'wirtschaftlicher Entscheiderin'} und Sales Operations vereinbaren.</div><div class="item">Erfolgskriterien, Wirkungsquote und Freigabeweg bestätigen lassen.</div><div class="item">Erst danach Pilotumfang und Preis finalisieren.</div></div></div><div class="actions"><button class="btn secondary" data-action="report">Vollständigen Testbericht öffnen</button></div>`}
function renderProcess(){return`<div class="card"><div class="kicker">Verkaufsprozess</div><div class="body muted">Bereiche öffnen oder durch erneutes Antippen wieder schließen. Die Bildschirmposition bleibt stabil.</div></div>${PROCESS_AREAS.map((name,i)=>{const a=processAnalysis(name),open=state.openAreas.includes(name);return`<div class="process-card ${open?'open':''}" data-area="${esc(name)}"><button class="process-head" data-action="toggle-area" data-area="${esc(name)}"><span class="process-num">${i+1}</span><span class="process-title">${esc(name)}</span><span class="process-status">${esc(a.status)}</span><span class="process-arrow">›</span></button><div class="process-body"><div class="analysis-block"><h4>Einschätzung</h4><p>${esc(a.assessment)}</p></div><div class="analysis-block"><h4>Bestätigte Fakten</h4><p>${a.facts.length?a.facts.map(esc).join(' · '):'Noch keine belastbaren Fakten.'}</p></div><div class="analysis-block"><h4>Offene Punkte</h4><p>${a.open.map(esc).join(' · ')}</p></div><div class="analysis-block"><h4>Aha-Erkenntnis</h4><p>${esc(a.insight)}</p></div><div class="analysis-block"><h4>Nächster Kundenschritt</h4><p>${esc(a.next)}</p></div></div></div>`}).join('')}`}
function renderInputs(){const nav=[['crm','CRM-Import'],['qual','Qualifizierung'],['spin','SPIN'],['add','Ergänzung'],['offer','Angebot']];return`<div class="input-nav">${nav.map(([k,l])=>`<button class="${state.inputTab===k?'active':''}" data-input-tab="${k}">${l}</button>`).join('')}</div>${state.inputTab==='crm'?renderCrm():state.inputTab==='qual'?renderQuestions('qual',QUAL_QUESTIONS):state.inputTab==='spin'?renderQuestions('spin',SPIN_QUESTIONS):state.inputTab==='add'?renderAddition():renderOffer()}`}
function renderCrm(){return`<div class="card orange"><div class="kicker">CRM-Import</div><div class="body">CRM-Text einfügen, scannen, Zuordnungen prüfen und ausgewählte Daten übernehmen.</div><div class="divider"></div><textarea id="crmText">${esc(state.rawImport)}</textarea><div class="actions"><button class="btn primary" data-action="scan-import">Import scannen</button><button class="btn secondary" data-action="reset-sample">Novacore-Beispiel laden</button></div>${state.importPreview.length?`<div class="preview"><div class="actions"><button class="btn secondary" data-action="select-all">Alle auswählen</button><button class="btn secondary" data-action="select-none">Alle abwählen</button></div>${state.importPreview.map((x,i)=>`<label class="preview-row"><input type="checkbox" data-preview-index="${i}" ${x.selected?'checked':''}><span class="preview-main"><span class="preview-top"><span class="badge ${x.type==='fakt'?'fact':x.type==='offen'?'open':'hyp'}">${esc(x.type)}</span><span class="badge">${esc(x.category)}</span></span><span class="preview-text">${esc(x.text)}</span></span></label>`).join('')}<div class="actions"><button class="btn primary" data-action="apply-import">Ausgewählte Daten übernehmen</button></div></div>`:''}</div>`}
function renderQuestions(kind,qs){const title=kind==='qual'?'Gezielte Qualifizierungsfragen':'SPIN-Fragen für das nächste Kundengespräch';return`<div class="card blue"><div class="kicker">${title}</div><div class="body muted">KI21 gibt die Fragen vor. Der Nutzer beantwortet nur, was im Deal noch geklärt werden muss.</div><div class="divider"></div>${qs.map(([label,q],i)=>`<div class="question"><div class="q-label">${esc(label)}</div><div class="q-text">${esc(q)}</div><textarea data-answer-kind="${kind}" data-answer-index="${i}">${esc(state.answers[kind][i]||'')}</textarea></div>`).join('')}<button class="btn primary" data-action="save-answers" data-kind="${kind}">Antworten speichern & auswerten</button></div>`}
function renderAddition(){return`<div class="card green"><div class="kicker">Globale Ergänzung</div><div class="body">Neue Informationen aus Gespräch, E-Mail oder Notiz. KI21 ordnet sie automatisch dem gesamten Deal zu.</div><div class="divider"></div><textarea id="additionText" placeholder="Neue Informationen einfügen …"></textarea><div class="actions"><button class="btn primary" data-action="save-addition">Ergänzung übernehmen</button></div>${state.additions.length?`<div class="divider"></div><div class="label">Bisherige Ergänzungen</div><div class="list">${state.additions.map(x=>`<div class="item">${esc(x.text)}</div>`).join('')}</div>`:''}</div>`}
function renderOffer(){return`<div class="card violet"><div class="kicker">Angebotsparameter</div><div class="field"><label>Pilotpreis</label><input id="offerPrice" value="${esc(state.offer.price||'')}" placeholder="z. B. 35.000 €"></div><div class="field"><label>Pilotumfang</label><input id="offerScope" value="${esc(state.offer.scope||'')}" placeholder="z. B. 8 Nutzer, 10 Enterprise-Deals"></div><div class="field"><label>Laufzeit</label><input id="offerDuration" value="${esc(state.offer.duration||'')}" placeholder="z. B. 10 Wochen"></div><div class="field"><label>Erfolgskriterien</label><input id="offerCriteria" value="${esc(state.offer.criteria||'')}" placeholder="z. B. 25 % weniger Review-Aufwand"></div><button class="btn primary" data-action="save-offer">Angebotsparameter speichern</button></div>`}
function bindView(){document.querySelectorAll('[data-action="toggle-area"]').forEach(b=>b.addEventListener('click',()=>{const n=b.dataset.area;state.openAreas=state.openAreas.includes(n)?state.openAreas.filter(x=>x!==n):[...state.openAreas,n];saveState();const card=b.closest('.process-card');card.classList.toggle('open')}));document.querySelectorAll('[data-input-tab]').forEach(b=>b.addEventListener('click',()=>{state.inputTab=b.dataset.inputTab;saveState();render()}));document.querySelectorAll('[data-preview-index]').forEach(c=>c.addEventListener('change',()=>{state.importPreview[Number(c.dataset.previewIndex)].selected=c.checked;saveState()}));document.querySelectorAll('[data-action]').forEach(b=>{if(b.dataset.action==='toggle-area')return;b.addEventListener('click',()=>handleAction(b.dataset.action,b))})}
function handleAction(action,el){if(action==='scan-import'){const raw=document.getElementById('crmText').value;const p=parseImport(raw);state.rawImport=raw;state.importPreview=p.evidence.map(x=>({...x,selected:true}));state._pendingParsed=p;saveState();render();toast(`${p.evidence.length} Aussagen und ${p.stakeholders.length} Stakeholder erkannt`)}else if(action==='reset-sample'){state.rawImport=DEFAULT_IMPORT;state.importPreview=[];saveState();render()}else if(action==='select-all'||action==='select-none'){const val=action==='select-all';state.importPreview.forEach(x=>x.selected=val);saveState();render()}else if(action==='apply-import'){const p=parseImport(state.rawImport);const selected=state.importPreview.filter(x=>x.selected);applyParsed(state,p);state.evidence=selected;state.importPreview=selected.map(x=>({...x}));saveState();render();toast('Import übernommen und Verkaufsprozess aktualisiert')}else if(action==='save-answers'){const kind=el.dataset.kind;document.querySelectorAll(`[data-answer-kind="${kind}"]`).forEach(t=>state.answers[kind][Number(t.dataset.answerIndex)]=t.value.trim());saveState();render();toast('Antworten gespeichert und ausgewertet')}else if(action==='save-addition'){const t=document.getElementById('additionText').value.trim();if(!t)return toast('Bitte Ergänzung eingeben');state.additions.push({text:t,at:new Date().toISOString()});const p=parseImport(state.rawImport+'\n\nErgänzung\n'+state.additions.map(x=>x.text).join('\n'));state.metrics=p.metrics;state.flags=p.flags;if(p.stakeholders.length)state.stakeholders=p.stakeholders;saveState();render();toast('Ergänzung übernommen und Deal aktualisiert')}else if(action==='save-offer'){state.offer={price:document.getElementById('offerPrice').value.trim(),scope:document.getElementById('offerScope').value.trim(),duration:document.getElementById('offerDuration').value.trim(),criteria:document.getElementById('offerCriteria').value.trim()};if(state.offer.price)state.flags.priceOpen=false;if(state.offer.criteria)state.flags.successOpen=false;saveState();render();toast('Angebotsparameter gespeichert')}else if(action==='report'){showReport()}}
async function copyTextReliable(text){
 try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(text);return true}}catch(e){}
 try{const ta=document.createElement('textarea');ta.value=text;ta.setAttribute('readonly','');ta.style.cssText='position:fixed;left:-9999px;top:0;opacity:0';document.body.appendChild(ta);ta.focus();ta.select();ta.setSelectionRange(0,ta.value.length);const ok=document.execCommand('copy');ta.remove();return ok}catch(e){return false}
}
function showReport(){const reportText=fullReport();const overlay=document.createElement('div');overlay.style.cssText='position:fixed;inset:0;z-index:100;background:rgba(4,7,11,.92);display:flex;align-items:flex-end;justify-content:center';overlay.innerHTML=`<div style="width:100%;max-width:720px;max-height:94vh;overflow:auto;background:#111722;border:1px solid var(--line);border-bottom:0;border-radius:22px 22px 0 0;padding:16px 14px max(28px,env(safe-area-inset-bottom))"><div class="headline">Vollständiger Qualitätsbericht</div><div class="body muted" style="margin:5px 0 12px">Enthält State, Stakeholder, Importaussagen, Eingaben und alle sieben Bereichsanalysen.</div><div class="actions" style="margin:0 0 12px"><button class="btn primary" id="copyFullReport">Vollständigen Bericht kopieren</button></div><div class="report">${esc(reportText)}</div><div class="actions"><button class="btn secondary" id="copyFullReportBottom">Bericht kopieren</button><button class="btn primary" id="closeReport">Schließen</button></div></div>`;document.body.appendChild(overlay);
 const doCopy=async(btn)=>{const original=btn.textContent;btn.disabled=true;const ok=await copyTextReliable(reportText);btn.textContent=ok?'✓ Bericht kopiert':'Kopieren fehlgeschlagen';if(ok)toast('Vollständiger Testbericht kopiert');setTimeout(()=>{btn.disabled=false;btn.textContent=original},1800)};
 overlay.querySelector('#copyFullReport').addEventListener('click',e=>doCopy(e.currentTarget));overlay.querySelector('#copyFullReportBottom').addEventListener('click',e=>doCopy(e.currentTarget));overlay.querySelector('#closeReport').addEventListener('click',()=>overlay.remove());overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove()})}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),1800)}
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{state.activeTab=b.dataset.tab;saveState();render()}));
render();
</script>
</body>
</html>
