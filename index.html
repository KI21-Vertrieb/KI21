<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="dark">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KI21</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;
  --border:#30363d;--text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --fs-input:12px;
}
body.light{
  --bg:#f6f8fa;--bg2:#ffffff;--bg3:#f0f2f5;
  --border:#d0d7de;--text:#1f2328;--text2:#656d76;--text3:#9198a1;
}
html,body{background:var(--bg);color:var(--text);min-height:100vh;font-family:'DM Sans',sans-serif;}
#app{min-height:100vh;background:var(--bg);}
.nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 14px;height:44px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-brand{font-size:16px;font-weight:800;color:var(--text);cursor:pointer;border:none;background:transparent;font-family:'DM Sans',sans-serif;}
.nav-right{display:flex;gap:5px;align-items:center;}
.subnav{background:var(--bg);border-bottom:1px solid var(--border);padding:6px 14px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;}
.subnav-badge{background:rgba(255,107,0,.15);color:#ff6b00;border-radius:50%;
  width:18px;height:18px;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;flex-shrink:0;}
.subnav-text{font-size:11px;color:var(--text2);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.settings-group-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--text3);margin-bottom:2px;}
.phase-badge{font-size:9px;font-weight:700;border-radius:4px;padding:2px 6px;white-space:nowrap;flex-shrink:0;cursor:pointer;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
.phase-badge-done{background:rgba(46,160,67,.15);color:#2ea043;}
.phase-badge-progress{background:rgba(255,107,0,.15);color:#ff6b00;}
.phase-badge-empty{background:rgba(139,148,158,.1);color:var(--text3);}
.btn{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:5px;
  padding:4px 8px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-o{background:#ff6b00;border:none;color:#fff;border-radius:8px;padding:7px 12px;
  font-size:10.5px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;}
.btn-o:disabled{background:#484f58;cursor:not-allowed;}
.cust-btn{background:rgba(255,107,0,.12);border:1px solid rgba(255,107,0,.3);border-radius:5px;
  padding:3px 8px;cursor:pointer;}
.cust-label{font-size:8px;color:#8b949e;text-transform:uppercase;letter-spacing:1px;line-height:1.3;}
.cust-val{font-size:11px;font-weight:700;color:#ff6b00;line-height:1.3;max-width:180px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.wrap{padding:12px 14px;max-width:500px;margin:0 auto;}
.hero{display:flex;align-items:baseline;flex-wrap:wrap;gap:6px;margin:10px 0 16px;}
.hero-a{font-weight:800;font-size:20px;color:var(--text);}
.hero-b{font-family:'DM Serif Display',serif;font-size:20px;color:#ff6b00;}
.sit-row{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;padding:11px 12px;margin-bottom:5px;cursor:pointer;transition:border-color .15s;}
.sit-row:hover{border-color:#ff6b00;}
.sit-icon{font-size:20px;width:28px;text-align:center;flex-shrink:0;}
.sit-phase{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:1px;}
.sit-title{font-size:13px;font-weight:700;color:var(--text);}
.sit-arrow{color:var(--text3);font-size:16px;}
.tagline{margin-top:14px;text-align:center;font-size:11px;color:var(--text3);}

/* Home Premium Redesign (v4.76) вҖ” pixelnahe Umsetzung der neuen Designreferenz, NUR Hero-Card.
   Reine Darstellung: Werte aus bereits existierenden Funktionen/Daten
   (getOpportunityHealth, cust.branche/ma/um/ap, getPhaseStatus). Keine neue Business-Logik.
   Platzhalter ("вҖ“") fГјr Felder ohne Datenmodell-Entsprechung (Erwarteter Abschluss, Potenzial, Verantwortlich). */
.home-greeting{font-size:12.5px;font-weight:600;color:var(--text2);margin:8px 0 8px;}
.home-hero{background:var(--bg2);border:1px solid var(--border);border-radius:13px;
  padding:11px;margin-bottom:10px;}
.home-hero-body{display:flex;flex-direction:column;gap:8px;}
.home-hero-colL{min-width:0;}
.home-hero-colR{min-width:0;display:flex;flex-direction:column;align-items:stretch;}
.home-hero-label{font-size:8.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  color:var(--text3);margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.home-info-dot{color:var(--text3);font-size:9px;cursor:default;}
.home-hero-id{display:flex;align-items:flex-start;gap:8px;cursor:pointer;}
.home-hero-icon{width:30px;height:30px;border-radius:7px;background:var(--bg3);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;}
.home-hero-firma{font-size:15px;font-weight:800;color:var(--text);overflow-wrap:break-word;word-break:break-word;letter-spacing:-.2px;}
.home-hero-firma.placeholder{color:var(--text2);font-weight:600;font-size:12px;}
.home-hero-meta{font-size:9.5px;color:var(--text2);margin-top:2px;line-height:1.45;}
.home-hero-tag{display:inline-block;margin-top:4px;font-size:8px;font-weight:700;
  background:rgba(255,107,0,.14);color:#ff6b00;border-radius:5px;padding:2px 6px;}
.home-fact-list{margin-top:7px;border-top:1px solid var(--border);padding-top:6px;}
.home-fact-row{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:2.5px 0;font-size:9.5px;}
.home-fact-label{display:flex;align-items:center;gap:6px;color:var(--text2);}
.home-fact-icon{font-size:9.5px;width:12px;text-align:center;flex-shrink:0;opacity:.8;}
.home-fact-val{color:var(--text);font-weight:700;}
.home-health-bar-wrap{width:100%;}
.home-health-bar-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:5px;}
.home-health-score{font-size:15px;font-weight:800;line-height:1;color:var(--text);}
.home-health-score-unit{font-size:9px;font-weight:700;color:var(--text2);margin-left:2px;}
.home-health-track{width:100%;height:6px;border-radius:4px;background:var(--bg3);overflow:hidden;}
.home-health-fill{height:100%;border-radius:4px;}
.home-health-label{font-size:10px;font-weight:800;margin-top:5px;}
.home-health-sub{font-size:8.5px;color:var(--text2);margin-top:1px;}
.home-next-step{border-top:1px solid var(--border);margin-top:8px;padding-top:8px;}
.home-next-step-top{display:flex;align-items:flex-start;gap:8px;}
.home-next-icon{width:24px;height:24px;border-radius:50%;background:rgba(255,107,0,.12);
  display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.home-next-eyebrow{font-size:8.5px;color:var(--text3);}
.home-next-title2{font-size:11.5px;font-weight:800;color:var(--text);margin-top:1px;}
.home-next-desc2{font-size:9px;color:var(--text2);margin-top:2px;line-height:1.3;}
.home-next-cta-col{display:flex;flex-direction:column;align-items:stretch;gap:4px;
  margin-top:8px;}
.home-next-cta-btn{background:#ff6b00;border:none;color:#fff;border-radius:7px;padding:6px 12px;
  font-size:10.5px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;width:100%;}
.home-next-cta-btn:hover{background:#e25f00;}
.home-next-link{background:none;border:none;color:#ff6b00;font-size:9.5px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center;width:100%;}
/* Ab ~480px (Tablet/Desktop-Breite, wie in der Designreferenz): CTA-Spalte rГјckt neben den
   Text statt darunter. Unter dieser Breite (reales iPhone) bleibt es gestapelt, da dort fГјr
   3 Spalten nebeneinander nicht genug Platz ist (siehe vorheriger Umbruch-Bug). */
@media (min-width:480px){
  .home-next-step{display:flex;align-items:flex-start;gap:16px;}
  .home-next-step-top{flex:1;min-width:0;}
  .home-next-cta-col{flex-shrink:0;margin-top:0;min-width:150px;}
}

.home-section-label{font-size:8.5px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;
  color:var(--text3);margin:2px 0 6px;}
/* Cockpit Hauptscreen (v4.121) */
.cockpit-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 8px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;}
.cockpit-header-left{display:flex;flex-direction:column;min-width:0;flex:1;}
.cockpit-brand{font-size:11px;font-weight:800;color:var(--text3);letter-spacing:.5px;margin-bottom:1px;}
.cockpit-brand span{color:#ff6b00;}
.cockpit-opp-name{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px;}
.cockpit-opp-placeholder{font-size:14px;color:var(--text3);font-weight:400;}
.cockpit-header-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.cockpit-score-badge{font-size:12px;font-weight:800;padding:4px 10px;border-radius:20px;border:1.5px solid;cursor:pointer;white-space:nowrap;}
.cockpit-next-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.cockpit-next-eyebrow{font-size:9.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.cockpit-next-text{font-size:13px;font-weight:600;color:var(--text);line-height:1.5;margin-bottom:14px;}
.cockpit-next-placeholder{font-size:13px;color:var(--text3);font-style:italic;margin-bottom:14px;}
.cockpit-btn-row{display:flex;gap:8px;}
.cockpit-btn-primary{flex:1;background:#ff6b00;color:#fff;border:none;border-radius:10px;padding:11px 14px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
.cockpit-btn-secondary{background:transparent;color:#ff6b00;border:1.5px solid rgba(255,107,0,.4);border-radius:10px;padding:11px 14px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;}
.cockpit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.cockpit-tile{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;min-height:100px;}
.cockpit-tile-label{font-size:9.5px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.cockpit-tile-item{font-size:12px;color:var(--text);line-height:1.4;margin-bottom:5px;padding-left:14px;position:relative;}
.cockpit-tile-item:last-child{margin-bottom:0;}
.cockpit-tile-item::before{content:'В·';position:absolute;left:2px;color:var(--text3);}
.cockpit-tile-item.risk{color:#e6edf3;}
.cockpit-tile-item.chance{color:#e6edf3;}
.cockpit-tile-more{font-size:11px;color:var(--text3);margin-top:6px;}
.cockpit-tile-empty{font-size:12px;color:var(--text3);font-style:italic;}
.cockpit-phase-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.cockpit-phase-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:13px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent;min-height:48px;}
.cockpit-phase-row.active-phase{border-color:rgba(255,107,0,.5);}
.cockpit-phase-name{font-size:13px;font-weight:700;color:var(--text);}
.cockpit-phase-num{font-size:11px;font-weight:700;width:22px;height:22px;border-radius:6px;background:var(--bg3);color:var(--text3);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cockpit-phase-num.done{background:rgba(46,160,67,.15);color:#2ea043;}
.cockpit-phase-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.cockpit-phase-status.done{color:#2ea043;background:rgba(46,160,67,.12);border:1px solid rgba(46,160,67,.25);}
.cockpit-phase-status.progress{color:#ff6b00;background:rgba(255,107,0,.12);border:1px solid rgba(255,107,0,.25);}
.cockpit-phase-status.empty{color:var(--text3);}

/* v4.150: bessere Priorisierung der Cockpit-Fragen */
.cockpit-tile-item.is-actionable{cursor:pointer;border-radius:6px;padding-top:2px;padding-bottom:2px;padding-right:4px;transition:background .12s,border-color .12s;}
.cockpit-tile-item.is-actionable:active{background:rgba(255,107,0,.10);}
.cockpit-tile-item.is-actionable::after{content:'вҖә';position:absolute;right:1px;color:var(--text3);font-weight:800;opacity:.75;}
.cockpit-focus-banner{background:rgba(255,107,0,.10);border:1px solid rgba(255,107,0,.35);border-left:3px solid #ff6b00;border-radius:11px;padding:9px 10px;margin-bottom:10px;}
.cockpit-focus-kicker{font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.9px;color:#ff6b00;margin-bottom:3px;}
.cockpit-focus-kicker.is-back{cursor:pointer;display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:2px 6px 2px 0;}
.cockpit-focus-kicker.is-back::before{content:'вҖ№';font-size:13px;line-height:1;color:#ff6b00;}
.cockpit-focus-kicker.is-back:active{background:rgba(255,107,0,.10);}
.cockpit-focus-text{font-size:11.5px;font-weight:700;color:var(--text);line-height:1.35;}
.cockpit-focus-hint{font-size:10px;color:var(--text2);line-height:1.35;margin-top:4px;}
.bs-row.clickable{cursor:pointer;border-radius:8px;}
.bs-row.clickable:active{background:rgba(255,107,0,.08);}
.bs-row.clickable .bs-row-arrow{margin-left:auto;color:#ff6b00;font-weight:800;opacity:.8;}

/* Bottom Sheet */
.bs-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;opacity:0;transition:opacity .22s;}
.bs-overlay.visible{opacity:1;}
.bs-panel{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-radius:20px 20px 0 0;z-index:201;max-height:82vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s cubic-bezier(.32,1.01,.4,1);}
.bs-panel.visible{transform:translateY(0);}
.bs-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
.bs-head{padding:16px 18px 10px;border-bottom:1px solid var(--border);}
.bs-title{font-size:13px;font-weight:800;color:var(--text);letter-spacing:-.2px;}
.bs-body{padding:10px 18px 32px;}
.bs-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-top:1px solid var(--border);font-size:13px;color:var(--text);line-height:1.45;}
.bs-row:first-child{border-top:none;}
.bs-row .bs-glyph{flex-shrink:0;width:20px;text-align:center;margin-top:1px;}
.bs-row.bs-priority{background:rgba(255,107,0,.07);border:1px solid rgba(255,107,0,.22);border-radius:12px;padding:9px 10px;margin:7px 0;}
.bs-row.bs-priority:first-child{border-top:1px solid rgba(255,107,0,.22);}
.bs-row.bs-priority + .bs-row.bs-priority{border-top:1px solid rgba(255,107,0,.22);}
.bs-row.bs-priority .bs-glyph{background:#ff6b00;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;margin-top:0;}
.bs-panel.questions-sheet .bs-body{padding:8px 14px 30px;}
.bs-panel.questions-sheet .bs-row:not(.bs-priority){font-size:12px;line-height:1.35;padding:8px 0;color:var(--text2);}
.bs-panel.questions-sheet .bs-row:not(.bs-priority) .bs-glyph{font-size:10px;color:var(--text3);}
.bs-priority-caption{font-size:8.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#ff6b00;margin-bottom:3px;}
.bs-separator{height:1px;background:var(--border);margin:8px 0 2px;opacity:.7;}
.bs-empty{font-size:13px;color:var(--text3);font-style:italic;padding:14px 0;}
.home-station-row{display:flex;align-items:center;gap:9px;background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:7px 9px;margin-bottom:5px;cursor:pointer;transition:border-color .15s;}
.home-station-row:hover{border-color:#ff6b00;}
.home-icon-tile{width:26px;height:26px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.home-icon-tile.is-done{background:rgba(46,160,67,.12);border-color:rgba(46,160,67,.3);}
.home-icon-tile.is-progress{background:rgba(255,107,0,.12);border-color:rgba(255,107,0,.3);}
.home-station-sub2{font-size:9px;color:var(--text2);margin-top:0;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;}
.home-status-pill{display:inline-flex;align-items:center;gap:4px;font-size:8px;font-weight:700;
  border-radius:20px;padding:2.5px 7px;white-space:nowrap;flex-shrink:0;}
.home-status-pill.done{background:rgba(46,160,67,.12);color:#2ea043;}
.home-status-pill.progress{background:rgba(255,107,0,.12);color:#ff6b00;}
.home-status-pill.empty{background:rgba(139,148,158,.1);color:var(--text2);}
.home-strategy-title{font-size:16px;font-weight:800;color:var(--text);margin:12px 0 1px;
  letter-spacing:-.2px;}
.home-strategy-sub{font-size:9.5px;color:var(--text2);margin-bottom:8px;}
.home-station-num{width:15px;height:15px;border-radius:50%;background:var(--bg3);
  border:1px solid var(--border);color:var(--text2);font-size:8px;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.home-station-num.is-done{background:rgba(46,160,67,.18);border-color:rgba(46,160,67,.4);color:#2ea043;}
.home-station-num.is-progress{background:rgba(255,107,0,.18);border-color:rgba(255,107,0,.4);color:#ff6b00;}
.home-station-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.home-progress-row{display:flex;align-items:center;gap:5px;}
.home-progress-track{width:36px;height:3.5px;border-radius:3px;background:var(--bg3);overflow:hidden;}
.home-progress-fill{height:100%;border-radius:3px;}
.home-progress-fill.done{background:#2ea043;}
.home-progress-fill.progress{background:#ff6b00;}
.home-progress-pct{font-size:8px;color:var(--text2);font-weight:700;min-width:20px;text-align:right;}
.home-station-title{font-size:11.5px;font-weight:700;color:var(--text);}
.home-insights-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;
  padding:10px;}
.home-insight-row{display:flex;align-items:flex-start;gap:7px;padding:4px 0;font-size:11px;
  color:var(--text);line-height:1.35;}
.home-insight-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.home-insight-dot.positive{background:#2ea043;}
.home-insight-dot.warning{background:#f85149;}
.home-insight-dot.open{background:var(--text3);}
.home-empty-note{font-size:10.5px;color:var(--text3);padding:2px 0;}
.home-station-sub{font-size:11.5px;color:var(--text2);margin-top:2px;}
/* Executive Briefing components (sitId===1 only) */
.exec-grid{display:flex;gap:9px;margin-bottom:10px;flex-wrap:wrap;}
.exec-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px;flex:1;min-width:120px;}
.exec-card-label{font-size:8.5px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:#8b949e;margin-bottom:8px;}
.exec-card-val{font-size:12px;font-weight:400;color:var(--text);line-height:1.5;}
.exec-card-val.accent{color:#ff6b00;font-weight:600;margin-top:4px;}
.exec-card-val.muted{color:var(--text2);font-weight:400;}
.exec-divider{display:flex;align-items:center;gap:10px;margin:20px 0 14px;}
.exec-divider-line{flex:1;height:1px;background:var(--border);}
.exec-divider-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);white-space:nowrap;}

<script>

const LS={
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch(e){return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}},
};

// в”Җв”Җ UNIVERSELLE KOPIER-FUNKTION mit garantiertem Fallback в”Җв”Җ
// Manche Browser (z.B. Brave) blockieren navigator.clipboard / execCommand lautlos, ohne Fehler oder Berechtigungsabfrage.
// Fallback: Г¶ffnet ein vorselektiertes Textfeld, damit der Nutzer per Long-Press вҶ’ Kopieren manuell kopieren kann (funktioniert immer).
function universalCopy(text, onSuccess){
  let succeeded=false;
  const markSuccess=()=>{succeeded=true; if(onSuccess)onSuccess();};
  const tryExecCommand=()=>{
    try{
      const ta=document.createElement('textarea');
      ta.value=text;ta.style.position='fixed';ta.style.opacity='0';ta.style.top='0';
      document.body.appendChild(ta);ta.focus();ta.select();
      const ok=document.execCommand('copy');
      document.body.removeChild(ta);
      return ok;
    }catch(e){return false;}
  };
  const showManualFallback=()=>{
    const overlay=document.createElement('div');
    overlay.style.cssText='position:fixed;inset:0;background:rgba(13,17,23,.97);z-index:1000;display:flex;flex-direction:column;padding:20px;';
    overlay.appendChild(h('div',{style:{color:'#ff6b00',fontWeight:'700',marginBottom:'10px',fontSize:'13px'}},
      'рҹ“Ӣ Automatisches Kopieren wird von diesem Browser blockiert. Tippe lange auf den Text unten und wГӨhle "Alles auswГӨhlen" вҶ’ "Kopieren".'));
    const ta=h('textarea',{readonly:true,style:{flex:'1',width:'100%',background:'#1c2333',
      border:'1px solid #30363d',borderRadius:'6px',padding:'12px',fontSize:'13px',
      color:'#e6edf3',outline:'none',resize:'none',lineHeight:'1.7'}});
    ta.value=text;
    overlay.appendChild(ta);
    const closeBtn=h('button',{className:'btn-o',style:{marginTop:'12px'},onclick:()=>overlay.remove()},'SchlieГҹen');
    overlay.appendChild(closeBtn);
    document.body.appendChild(overlay);
    setTimeout(()=>{ta.focus();ta.select();},100);
  };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>{
      // Manche Browser (Brave) lГ¶sen .then() aus, OHNE wirklich zu kopieren - daher zusГӨtzlich execCommand als BestГӨtigung versuchen
      if(tryExecCommand()){markSuccess();}else{markSuccess();} // clipboard.then() galt als Erfolg, vertrauen
    }).catch(()=>{
      if(tryExecCommand()){markSuccess();}else{showManualFallback();}
    });
  } else if(tryExecCommand()){
    markSuccess();
  } else {
    showManualFallback();
  }
}

// в”Җв”Җ PDF EXPORT HELPER (echte PDF-Erzeugung, kein HTML-Download) в”Җв”Җ
let _html2pdfPromise=null;
function loadHtml2Pdf(){
  if(window.html2pdf)return Promise.resolve();
  if(_html2pdfPromise)return _html2pdfPromise;
  _html2pdfPromise=new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
    s.onload=()=>resolve();
    s.onerror=()=>reject(new Error('html2pdf konnte nicht geladen werden'));
    document.head.appendChild(s);
  });
  return _html2pdfPromise;
}
function exportHtmlAsPdf(html,filename){
  loadHtml2Pdf().then(()=>{
    const el=document.createElement('div');
    el.innerHTML=html;
    document.body.appendChild(el);
    window.html2pdf().from(el).set({
      margin:10,
      filename:filename,
      html2canvas:{scale:2,useCORS:true},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
      pagebreak:{mode:['css','legacy']}
    }).save().then(()=>{document.body.removeChild(el);});
  }).catch(e=>{
    alert('PDF-Erzeugung fehlgeschlagen: '+e.message+'\nBitte Internetverbindung prГјfen.');
  });
}

function shareAsPdf(title,text,cust,filename,fallbackText){
  loadHtml2Pdf().then(()=>{
    const html=buildSimplePdfHtml(title,text,cust);
    const el=document.createElement('div');
    el.innerHTML=html;
    document.body.appendChild(el);
    window.html2pdf().from(el).set({
      margin:10,
      html2canvas:{scale:2,useCORS:true},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
      pagebreak:{mode:['css','legacy']}
    }).outputPdf('blob').then(blob=>{
      document.body.removeChild(el);
      const file=new File([blob],filename,{type:'application/pdf'});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:title}).catch(()=>{});
      } else if(navigator.share){
        navigator.share({title:'KI21 вҖ“ '+title,text:fallbackText||text});
      } else {
        // Fallback: PDF direkt herunterladen
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url;a.download=filename;a.click();
        setTimeout(()=>URL.revokeObjectURL(url),1000);
      }
    });
  }).catch(()=>{
    if(navigator.share)navigator.share({title:'KI21 вҖ“ '+title,text:fallbackText||text});
  });
}

  s+='Eine Erkenntnis darf in mehreren Phasen erscheinen, wenn sie dort einen ANDEREN Zweck erfГјllt. Beispiel: Qualifizierung вҖ“ "Der GeschГӨftsfГјhrer ist noch nicht eingebunden" (Bewertung der Opportunity). Bedarfsanalyse вҖ“ "Den GeschГӨftsfГјhrer nach wirtschaftlichem Schaden und Erfolgskriterien fragen" (GesprГӨchsstrategie). Nutzen-Kosten-Analyse вҖ“ "Ohne BestГӨtigung des GeschГӨftsfГјhrers bleibt der Business Case nicht belastbar" (wirtschaftliche Bewertung). Diese Wiederholung ist ausdrГјcklich gewГјnscht. NICHT zulГӨssig ist dieselbe Aussage mit derselben Aussageabsicht in mehreren Phasen. Ziel ist nicht die kГјrzeste Einzelphase, sondern das kГјrzeste Gesamtdossier bei gleichem Informationsgehalt вҖ“ jede Phase muss einen klar erkennbaren Mehrwert liefern.\n';
  s+='KRITISCH вҖ“ DER 60-SEKUNDEN-TEST: Wenn ein Vertriebsleiter zwischen zwei Kundenterminen nur 60 Sekunden Zeit hat, muss er nach dem Lesen genau wissen: Wie gut steht die Opportunity? Warum? Was fehlt? Was ist der nГӨchste Schritt? Jeder Abschnitt muss diesen Test bestehen.\n';
  s+='KRITISCH вҖ“ KONKRETE BERATERSPRACHE-VERBOTSLISTE: Vermeide diese und ГӨhnliche Begriffe konsequent: "Data Governance Sponsor", "Ownership-Struktur", "Steering Committee", "Reporting-Architektur", "Stakeholder-Alignment", "Synergiepotenzial", "Sunk Cost", "Data Governance", "Planning Governance", "Modernisierungskomponente". Ersetze sie durch die direkte, vertriebliche Frage dahinter: statt "Ownership-Struktur klГӨren" schreibe "Wer entscheidet?"; statt "Stakeholder-Alignment" schreibe "Wer blockiert? Wer profitiert?"; statt abstrakter Prozessbegriffe schreibe "Was kostet das?", "Wie oft passiert das?", "Was muss geklГӨrt werden?". Ein erfahrener Vertriebsleiter denkt in Menschen, Macht und Geld вҖ“ nicht in Beratungsmodellen.\n';
  s+='KRITISCH вҖ“ KEINE FACHBEGRIFFE/PRODUKTNAMEN ERFINDEN, DIE DER KUNDE NICHT GENANNT HAT: Wenn ein technischer Fachbegriff oder Produktname (z.B. ein konkretes Software-Modul wie "SAP Analytics Cloud" oder "Integrated Planning") nicht direkt vom Kunden genannt wurde, darf er NICHT als Kundenerkenntnis erscheinen. Verwende stattdessen die einfache, allgemeine Beschreibung dessen, was der Kunde tatsГӨchlich gesagt hat (z.B. "ein SAP-Modernisierungsprojekt lГӨuft" statt "SAP Analytics Cloud und Integrated Planning sind geplant", falls der Kunde keine konkreten Modulnamen genannt hat). Erfundene Fachbegriffe lassen das Ergebnis wie ein Beratungskonzept wirken statt wie eine ehrliche GesprГӨchsdokumentation вҖ“ das ist unerwГјnscht.\n';
  s+='SELBSTTEST VOR JEDER AUSGABE: WГјrde ein sehr erfahrener Vertriebsleiter genau so schreiben вҖ“ oder wirkt der Text wie ein Strategieberater, der ein Transformationskonzept entwirft? Im Zweifel: pragmatischer, konkreter, vertriebsorientierter formulieren, nicht als Beratungsdokument.\n';
  s+='KRITISCH: Wenn dieselben Kernfakten (z.B. eine konkrete Zahl wie "6 Arbeitstage pro Szenario") bereits in einem vorherigen Kontext-Abschnitt erwГӨhnt wurden, wiederhole sie in dieser Phase nur EINMAL ausfГјhrlich (meist in den ERKENNTNISSE/BESTГ„TIGT-Abschnitten) und referenziere sie danach kurz, statt sie in jedem Abschnitt erneut vollstГӨndig auszuschreiben. Ziel: Wiederholungen Гјber die Phasen hinweg reduzieren, ohne wichtige Fakten wegzulassen.\n';
  s+='PFLICHT вҖ“ DREI-STUFEN-SYSTEM FГңR JEDE INFORMATION: Bewerte JEDE Information, bevor du sie verwendest, nach genau einer dieser drei Stufen:\n';
  s+='  FAKT (= BESTГ„TIGT): direkt genannt, eindeutig belegt, aus den Eingaben stammend. Beispiele: "6 Arbeitstage pro Szenario", "3 Spartensysteme", "SAP-Projekt lГӨuft", "CFO ist Sponsor".\n';
  s+='  INTERPRETATION (= ANNAHME): eine logische, nachvollziehbare Ableitung AUS einem Fakt. Beispiele: "SAP-Projekt erzeugt Zeitdruck", "CIO kГ¶nnte SAP bevorzugen". Interpretationen sind erlaubt und wertvoll вҖ“ aber sie dГјrfen NIE wie ein Fakt klingen, sondern mГјssen erkennbar als Schlussfolgerung formuliert sein (z.B. mit "kГ¶nnte", "vermutlich", "deutet darauf hin").\n';
  s+='  VERMUTUNG (= KLГ„REN/ZU VALIDIEREN): eine nicht belegte Aussage ohne Faktengrundlage вҖ“ typischerweise BudgethГ¶he, ROI, Abschlusswahrscheinlichkeit, SchadenshГ¶he, Lizenzbedarf, sofern sie nicht explizit genannt wurden. Eine Vermutung darf NIEMALS als Fakt oder als prГӨzise Zahl erscheinen.\n';
  s+='KRITISCH вҖ“ NIEMALS RECHNEN BEI FEHLENDEN DATEN: Wenn fГјr eine Berechnung (ROI, Amortisation, Abschlusswahrscheinlichkeit in %, SchadenshГ¶he) die nГ¶tigen Fakten fehlen, BERECHNE KEINE Zahl, SCHГ„TZE KEINE Zahl, ERFINDE KEINE Zahl. Schreibe statt einer Zahl explizit, was fehlt (z.B. "ROI aktuell nicht belastbar berechenbar. Es fehlen: Reporting-Aufwand, Szenario-HГӨufigkeit, Fehlerkosten."). Eine ehrliche LГјcke ist immer besser als eine prГӨzise wirkende, aber erfundene Zahl.\n';
  s+='KRITISCH вҖ“ KEINE ERFUNDENEN STAKEHOLDER-ERWARTUNGEN: Schreibe NIEMALS eine konkrete Erwartung eines Stakeholders, die nicht genannt wurde (z.B. NICHT "GeschГӨftsfГјhrer erwartet +5-10% Umsatzsteigerung", wenn diese Zahl nirgends im GesprГӨch gefallen ist). Formuliere stattdessen als offene Frage oder als zu klГӨrenden Punkt (z.B. "GeschГӨftsfГјhrer muss den wirtschaftlichen Nutzen noch definieren" oder "Welche Kennzahl entscheidet fГјr den GeschГӨftsfГјhrer Гјber den Projekterfolg?"). Das gilt fГјr JEDE Person/Rolle (CEO, CFO, CIO, Einkauf usw.), nicht nur fГјr den direkten Ansprechpartner.\n';
  s+='PFLICHT: Die Genauigkeits-Kennzeichnung BESTГ„TIGT/ANNAHME/KLГ„REN gilt fГјr deine interne Sorgfalt und fГјr den Detailbereich (nach ###DETAILS###, falls das Phasenformat das vorsieht) вҖ“ NICHT als PrГӨfix in der kompakten Standardausgabe. Halte trotzdem in jedem Bullet selbst implizit fest, was Fakt vs. Interpretation vs. Vermutung ist, ohne das Wort explizit hinzuschreiben (z.B. durch Formulierung wie "Kunde nennt..." vs. "kГ¶nnte..." vs. "noch unklar...").\n';
  s+='KRITISCH: Erfinde NIEMALS konkrete Studiennamen, Institute oder prГӨzise Statistiken (z.B. "laut XY-Studie", "13-26 Wochen laut BARC") die nicht im Abschnitt "KI21 Intelligence" unten stehen. Du hast in dieser Phase KEINEN Websuche-Zugriff. Wenn du eine Marktaussage machen willst, formuliere sie als eigene EinschГӨtzung ohne erfundene Quellenangabe, oder verweise allgemein auf Erfahrungswerte aus der KI21 Intelligence.\n';
  s+='KRITISCH: Wenn ein Arbeitsaufwand (Personenstunden) 8 Stunden oder mehr betrГӨgt, wandle ihn IMMER in Arbeitstage Г  8 Stunden um, indem du die Stundenzahl DURCH 8 TEILST (z.B. 600-1.200 Stunden Г· 8 = 75-150 Arbeitstage, NICHT 600-1.200 Arbeitstage вҖ“ die MaГҹeinheit ГӨndert sich, der Zahlenwert wird kleiner). Rechne diese Division bei JEDER Umrechnung explizit nach, bevor du das Ergebnis hinschreibst. Das gilt AUCH wenn die Kundenangabe selbst in Stunden kam (z.B. "40-60 Stunden/Monat" вҶ’ "5-7,5 Arbeitstage/Monat"), UND fГјr jede aufsummierte oder hochgerechnete Jahres-/Monatszahl, nicht nur fГјr Einzelfall-Nennungen. Nur Werte unter 8 Stunden bleiben in Stunden stehen. Das gilt fГјr alle Aufwandsangaben in jeder Phase, konsequent Гјber den gesamten Output.\n';
  s+='KRITISCH: Wenn du irgendwo im Output die VerlГӨsslichkeit einer Aussage/Zahl kennzeichnest, nutze AUSSCHLIESSLICH die Worte BESTГ„TIGT (vom Kunden genannt oder dokumentiert), ARBEITSWERT (Benchmark + plausibel abgeleiteter Mittelwert aus KI21 Intelligence, zum Rechnen verwendet, nicht kundenspezifisch verifiziert) oder ZU VALIDIEREN (offene GrГ¶Гҹe, die im nГӨchsten GesprГӨch geklГӨrt werden sollte) вҖ“ NIEMALS Emoji-Punkte wie рҹҹў/рҹҹЎ/рҹ”ҙ oder Ampelfarben ohne Wort. Schreibe immer zuerst den Bewertungstext, dann das Label in GroГҹbuchstaben direkt danach oder davor (z.B. "Typische Range: 300-600 Stunden/Jahr, verwendeter ARBEITSWERT: 450 Stunden/Jahr"). Das gilt konsequent fГјr jede Confidence-Angabe im gesamten Output, nicht nur an einer Stelle. Bei BESTГ„TIGT/ANNAHME/KLГ„REN-BlГ¶cken (fГјr GesprГӨchserkenntnisse) bleiben diese drei WГ¶rter wie bisher bestehen вҖ“ ARBEITSWERT/ZU VALIDIEREN gelten zusГӨtzlich speziell fГјr quantitative Kennzahlen und Berechnungsgrundlagen.\n';
  s+='KRITISCH: MAXIMAL EIN MULTIPLIKATIONSSCHRITT BEI SPEKULATIVEM POTENZIAL: Wenn du ein Krisen-/Schadenspotenzial in einer Eskalations-/Schadensrechnung darstellst, verkette NICHT mehr als einen einzigen Unsicherheitsfaktor (z.B. NUR "SchadenshГ¶he Г— geschГӨtzte Vermeidbarkeitsquote"). Verkette NIEMALS zusГӨtzlich noch eine geschГӨtzte HГӨufigkeit pro Jahr in dieselbe Rechnung вҖ“ das sind dann mehrere multiplizierte Unsicherheiten und die resultierende Zahl wirkt prГӨziser als sie ist. Behandle HГӨufigkeit pro Jahr als separaten, eigenstГӨndig zu klГӨrenden Punkt, ohne sie in die gleiche Multiplikation einzubeziehen. Gilt in JEDER Phase, nicht nur in der Nutzen-Kosten-Analyse.\n';
  s+='KRITISCH: GLEICHES PRINZIP GILT FГңR OPTIMISTISCHE ROI-MULTIPLIKATOREN: Verkette bei einer ROI-/Payback-Aussage NICHT mehr als einen Unsicherheitsfaktor (z.B. NUR die vom Kunden genannte Quote-Verbesserung). Wenn du zusГӨtzlich noch eine geschГӨtzte Margin-Annahme UND eine angenommene Erfolgswahrscheinlichkeit in dieselbe Rechnung einbaust, entsteht eine kГјnstlich beeindruckende Zahl wie "ROI 20-30x", die bei kritischem Nachfragen (besonders von CFO/CEO) nicht standhГӨlt und Vertrauen kostet. NIEMALS einen ROI-Multiplikator wie "20x", "30x" oder eine ГӨhnlich hohe, beeindruckend wirkende Zahl als Ergebnis ausgeben, wenn sie aus mehr als einer verketteten Unsicherheit stammt вҖ“ formuliere statt einer einzelnen Multiplikator-Zahl lieber eine Bandbreite mit explizit benannten Annahmen, oder verzichte ganz auf eine zusammenfassende "Xx ROI"-Zahl und beschreibe Nutzen vs. Investition stattdessen als zwei separate, klar gekennzeichnete GrГ¶Гҹen. Gilt in JEDER Phase.\n';
  s+='KRITISCH: KORREKTE BESTГ„TIGT/ANNAHME-ZUORDNUNG BEI ABGELEITETEN ZAHLEN: Wenn der Kunde eine Prozentzahl nennt (z.B. "20-25% mehr Umsatz"), ist NUR diese Prozentzahl selbst BESTГ„TIGT (der Kunde hat sie genannt). Jede daraus berechnete absolute вӮ¬-Zahl (z.B. "5-8 Mio. вӮ¬ zusГӨtzlicher Umsatz" durch Anwendung der Prozentzahl auf den Gesamtumsatz) ist eine EIGENE Ableitung und MUSS als ANNAHME oder ARBEITSWERT gekennzeichnet werden, NIEMALS als BESTГ„TIGT вҖ“ auch wenn die zugrunde liegende Prozentzahl bestГӨtigt ist. Eine Berechnung aus einer bestГӨtigten Zahl ist selbst nicht automatisch bestГӨtigt.\n';
  s+='KRITISCH вҖ“ FORECAST-NUTZEN NUR KONTEXTABHГ„NGIG: Forecast-/EntscheidungsqualitГӨt ist NICHT pauschal bei jedem "Mein Unternehmen" ein ROI-Hebel. Verwende Forecast-Genauigkeit als zentralen Nutzenhebel NUR, wenn (1) Mein Unternehmen KI21 ist, (2) das eigene Angebot ausdrГјcklich Forecast, Opportunity Health/Scoring, Pipeline-QualitГӨt, CRM-/Sales-Qualifizierung, Discovery oder Vertriebssteuerung adressiert, oder (3) der Kunde explizit Forecast-/Pipeline-Probleme nennt. Bei allen anderen Angeboten keine KI21-Logik hineinprojizieren; dann liegt der Nutzen woanders. Wenn Forecast zulГӨssig ist, formuliere trotzdem vorsichtig: bessere Qualifizierung вҶ’ bessere Datenbasis вҶ’ belastbarere Prognose; keine Umsatz-/Abschlussquoten-Steigerung als KI21-Leistungsversprechen. Eine vom Kunden selbst genannte ZielgrГ¶Гҹe (z.B. "+20-25% Umsatz") bleibt Kundenhypothese, nicht KI21-Versprechen. Gilt in JEDER Phase, besonders SPIN, ROI, ErГ¶ffnungssГӨtzen und Abschlussargumentation.\n';
  s+='KRITISCH: UNSICHERE PROZENTANGABEN GENERELL VORSICHTIG FORMULIEREN (gilt fГјr ALLE Prozentzahlen in JEDER Phase, auch Forecast-Genauigkeit-Benchmarks): Solange eine Prozentzahl nicht durch eigene Messung des Kunden bestГӨtigt ist, formuliere sie nicht als feststehende Tatsache. ErgГӨnze bei der ersten Nennung einen kurzen Validierungs-Hinweis (z.B. "...sollte im Pilotbetrieb mit echten Zahlen validiert werden"), statt die Zahl danach unkommentiert mehrfach als Fakt zu wiederholen.\n';
  s+='KRITISCH вҖ“ ROI-HEBEL STATT SCHEINGENAUIGKEIT: KI21 soll keine scheinexakte ROI-Rechenmaschine sein. Wenn Kostenarten, Laufzeiten oder Nutzenannahmen gemischt oder unsicher sind, berechne keinen harten ROI-Prozentsatz und keine komplexe Amortisation. Identifiziere stattdessen: (1) wichtigste ROI-wirksame Position, (2) bekannte wirtschaftliche GrГ¶Гҹenordnung, (3) unsichere Annahme, (4) Validierungsfrage an den Kunden, (5) einfache Mindestlogik fГјr die Entscheidung. Der Account Manager soll dadurch die richtige ROI-wirksame Stelle erkennen und mit dem Kunden belastbar validieren.\n';
  s+='KRITISCH вҖ“ KEINE ERFUNDENEN VERMEIDUNGSQUOTEN: Erzeuge niemals konkrete Vermeidungsquoten, wenn diese nicht ausdrГјcklich vom Kunden genannt wurden. Schreibe stattdessen: Vermeidungsquote noch nicht validiert / ROI-Annahme noch nicht belastbar / zentrale ROI-wirksame Annahme muss im Startangebot gemessen werden. Keine scheinexakte Quote aus eigener Interpretation ableiten.\n';
  s+='KRITISCH вҖ“ VERMEIDUNGSQUOTE NICHT ENTFERNEN, SONDERN OHNE ZAHL SICHTBAR HALTEN: Wenn der Business Case auf schwach qualifizierten Deals, spГӨter Disqualifikation oder schlechter Discovery basiert, muss die Vermeidungsquote als zentrale zu validierende ROI-Annahme erscheinen. Verboten ist nur eine erfundene Prozentzahl. Richtige Formulierung: вҖһVermeidungsquote schwach qualifizierter Deals noch nicht validiertвҖң.\n';
  s+='KRITISCH вҖ“ KEINE UNNГ–TIGEN NEBENBAUSTELLEN DURCH KUNDENSYSTEME: Vorhandene Kundensysteme (z.B. CRM, ERP, BI, HubSpot, Salesforce, Dynamics, SAP, Pipedrive oder andere Plattformen) dГјrfen NICHT automatisch als Risiko, offener Punkt oder nГӨchster Schritt erscheinen. PrГјfe immer zuerst: Hilft diese Systemfrage dem Abschluss des konfigurierten eigenen Angebots вҖ“ oder erГ¶ffnet sie eine Ausweich-/Ersatzdiskussion, die das eigene Angebot relativiert? Aktive System-/Integrationsfragen nur nennen, wenn (a) Integration Kernnutzen des eigenen Produkts ist, (b) der Kunde Integration ausdrГјcklich als Voraussetzung nennt, (c) ohne Integration kein sinnvoller Start mГ¶glich ist oder (d) Integration bestГӨtigter Entscheidungsfaktor ist. Sonst: Kundensysteme nur als stillen Kontext nutzen und den nГӨchsten Schritt auf Nutzen, Entscheidung und Validierung des eigenen Angebots fokussieren.\n';
  s+='NACHRANGIGE RISIKEN: Wenn eine System-/Integrationsdiskussion nicht startkritisch ist, aber vertrieblich gefГӨhrlich werden kГ¶nnte, darf sie hГ¶chstens nachrangig als Risiko erscheinen вҖ“ nicht als Top-Risiko, nicht als вҖһDie eine SacheвҖң, nicht als nГӨchster Schritt. Formulierung: вҖһAusweichdiskussion Гјber vorhandene Systeme vermeiden; Nutzen des eigenen Angebots zuerst validieren.вҖң\n';
  s+='KRITISCH вҖ“ KEINE ERFUNDENEN TEILNEHMERZAHLEN IM NГ„CHSTEN SCHRITT: Erfinde keine konkreten GruppenstГӨrken, Deal-Anzahlen oder ZeitrГӨume, wenn sie nicht ausdrГјcklich genannt wurden. Bei Start-/Pilot-/Compact-Angeboten formuliere neutral: вҖһKickoff mit ausgewГӨhlten Anwendern/Account ManagernвҖң, вҖһerste echte Opportunities/FГӨlleвҖң, вҖһStartumfang und Messkriterien festlegenвҖң.\n';
  s+='KRITISCH: KEIN AUSWEICHEN AUF ERFUNDENE "BENCHMARKS": Wenn du fГјr ein Krisen-/Schadenspotenzial keine belastbare, herleitbare Zahl hast, darfst du NICHT stattdessen eine pauschale Branchenzahl als angeblichen "Benchmark" zitieren, um trotzdem einen вӮ¬-Betrag zu nennen. Das ist nur eine Umgehung des Verbots, keine echte Quelle. Wenn keine Zahl aus der tatsГӨchlichen KI21 Intelligence stammt, bleibt das Potenzial unbeziffert вҖ“ auch wenn das bedeutet, gar keine вӮ¬-Zahl zu nennen. Gilt in JEDER Phase.\n';
  s+='KRITISCH: KATEGORISCHES VERBOT FГңR UNBESTГ„TIGTES KRISENPOTENZIAL: Wenn ein Schadens-/Krisenpotenzial nicht durch konkrete, vom Kunden bestГӨtigte Zahlen (HГӨufigkeit UND Vermeidbarkeit UND SchadenshГ¶he alle bestГӨtigt) belegt ist, darf NIRGENDS im Output вҖ“ in KEINER Phase, auch nicht im Abschlusssatz, in der Kurzfassung, in Einwandantworten oder als "SensitivitГӨtsrechnung" вҖ“ ein вӮ¬-Betrag dafГјr genannt werden, auch nicht mit WГ¶rtern wie "kГ¶nnte", "potenziell", "zusГӨtzlich". Beschreibe stattdessen NUR die Mechanik in Worten, ohne Zahl. Ein unbestГӨtigter Betrag im KundengesprГӨch beschГӨdigt mehr Vertrauen als er Nutzen bringt.\n';
  s+='KRITISCH вҖ“ KORREKTE PERSONEN-BEZEICHNUNG (gilt in JEDER Phase): Schreibe "X beteiligte Mitarbeitende" oder "X Personen", NIEMALS "X FTE" oder "X Vollzeitstellen" вҖ“ auГҹer der Kunde hat selbst explizit von Vollzeitstellen/FTE gesprochen. Eine vom Kunden genannte Anzahl beteiligter Personen ist NICHT automatisch eine Anzahl Vollzeitstellen вҖ“ das sind fachlich unterschiedliche GrГ¶Гҹen, die nicht gleichgesetzt werden dГјrfen.\n';
  s+='ROI: Nur bestГӨtigte Kundenzahlen verwenden. Zeitersparnis NUR fГјr Account Manager.\n';
  s+='KRITISCH: Jede Phase muss mindestens EINEN Gedanken enthalten, der Гјber Standardwissen hinausgeht вҖ“ einen Aha-Insight, der im GedГӨchtnis bleibt (z.B. "Die grГ¶Гҹte Zeitersparnis entsteht oft nicht durch schnellere Reports, sondern dadurch, dass dieselben Zahlen nicht mehr in mehreren Excel-Dateien manuell abgeglichen werden mГјssen."). Vermeide reine Standardaussagen ohne Гјberraschenden Mehrwert. Dieser Insight darf nicht erfunden wirken вҖ“ er muss zur konkreten Situation des Kunden passen und nachvollziehbar sein.\n';
  s+='KRITISCH: Tonfall durchgehend partnerschaftlich, nicht verkГӨuferisch-drГӨngend. Vermeide Formulierungen wie "damit ich Sie/Ihre GeschГӨftsfГјhrung Гјberzeuge" oder "garantiert". Bevorzuge Formulierungen wie "damit Sie eine belastbare Entscheidungsgrundlage haben вҖ“ unabhГӨngig davon, wie die Entscheidung ausfГӨllt" oder "damit wir gemeinsam zu einer fundierten EinschГӨtzung kommen". Das Ziel ist: gemeinsam zu einer Entscheidung fГјhren, nicht Гјberreden.\n';
  s+='KRITISCH вҖ“ HARTE GRENZE FГңR DIE STANDARDAUSGABE: Die Standardausgabe (alles VOR der Zeile "###DETAILS###", falls vorhanden) MUSS exakt mit der letzten vorgegebenen Zeile des Formats enden (meist "NГ„CHSTER SCHRITT DIESE WOCHE:" / vergleichbar, je nach Phase). Schreibe NACH dieser letzten Zeile ABSOLUT NICHTS mehr, auГҹer dem optionalen Marker "###DETAILS###" und dem dahinter folgenden Detailblock. KEINE zusГӨtzliche Zusammenfassung, KEIN Wiederholen von Punkten, KEIN weiterer Absatz "Zusammenfassend...". Die Standardausgabe muss auf einem Smartphone als EINE Bildschirmseite ohne Scrollen lesbar sein вҖ“ das ist die wichtigste Einzelregel in diesem Prompt.\n';
  s+='KRITISCH: Die "NГ„CHSTE AKTION"/"вҶ’ TODO" dieser Phase muss sich klar von der letzten Aktion aus "BISHERIGE ERGEBNISSE" (falls vorhanden) unterscheiden вҖ“ wiederhole NIEMALS sinngemГӨГҹ denselben nГӨchsten Schritt wie eine vorherige Phase. Wenn die vorherige Phase z.B. "Termin vereinbaren" als Aktion hatte und dieser Termin laut Kontext bereits stattgefunden hat, muss die neue Aktion einen Schritt WEITER sein, nicht denselben wiederholen.\n';
  s+='AUSGABE-REGELN (strikt einhalten):\n';
  s+='- KRITISCHSTE REGEL: Liefere IMMER sofort den vollstГӨndigen Output im vorgegebenen Format вҖ“ auch wenn Informationen fehlen, unsicher oder unvollstГӨndig wirken. STELLE NIEMALS eine RГјckfrage VOR dem Output und warte NICHT auf eine Antwort, bevor du lieferst. Fehlende oder unsichere Daten gehГ¶ren in die Kennzeichnung ANNAHME/KLГ„REN oder eine etwaige RГјckfragen-Sektion AM ENDE des Outputs, NIEMALS als eigene Frage oder Meta-Kommentar davor. Du bekommst in diesem Schritt keine Antwort auf eine Vorab-Frage вҖ“ also stelle keine, sondern arbeite mit dem was im Feld steht. VERBOTENE SatzanfГӨnge: "Ich verstehe die Aufgabe", "Allerdings stelle ich fest", "Mir fehlen", "Bevor ich", "Ich muss zunГӨchst" вҖ“ beginne IMMER direkt mit dem ersten Element des vorgegebenen Output-Formats.\n';
  s+='- Nutze vorhandene Informationen вҖ“ keine Nachfragen\n';
  s+='- Maximal 5 Punkte pro Abschnitt\n';
  s+='- Jeder Punkt: 1-2 SГӨtze, direkt und konkret\n';
  s+='- Kein FlieГҹtext, keine langen ErklГӨrungen\n';
  s+='- Kein Markdown: keine **, keine ###, keine ---\n';
  s+='- Nur Deutsch\n';
  s+='- Keine Einleitung, kein Fazit\n';
  s+='- KRITISCH вҖ“ EIN BULLET = EINE AUSSAGE: Ein Bullet darf NIEMALS mehrere Aussagen verketten вҖ“ egal ob mit Komma, "und", einem "="-Zeichen, oder einem Relativsatz ("der/die/das..."). NICHT erlaubt z.B.: "6 Arbeitstage manuelle Konsolidierung pro PreisГӨnderung = messbarer Schmerz, der monatlich anfГӨllt und regelmГӨГҹig zu Fehlentscheidungen fГјhrt" (das sind DREI Aussagen in einem Bullet: Zeitaufwand, HГӨufigkeit, Konsequenz). Stattdessen IMMER in einzelne Bullets aufteilen: "6 Arbeitstage pro PreisГӨnderung" / "Konsolidierung erfolgt manuell" / "Fehler fГјhren zu Fehlentscheidungen". Jeder Bullet maximal 6-8 WГ¶rter, ein einziger Gedanke, in wenigen Sekunden erfassbar. Wenn du beim Formulieren eines Bullets ein "=", "und", "der/die/das" oder ein Komma zur Verbindung zweier Sachverhalte einsetzen willst, ist das ein sicheres Zeichen, dass es zwei Bullets werden mГјssen.\n';
  s+='- KRITISCH вҖ“ SOFORTIGER AHA-EFFEKT, KEINE INTERPRETATION NГ–TIG: Jeder Bullet der Standardansicht muss beim Lesen innerhalb weniger Sekunden sofort verstanden werden вҖ“ der Nutzer darf NIEMALS selbst nachdenken oder interpretieren mГјssen, um die Bedeutung zu erfassen. Konkreter Test: WГјrde ein Vertriebsleiter beim Lesen sofort "Genau." oder "Aha." denken вҖ“ oder eher "Moment, was meint die KI damit?" Im zweiten Fall: Bullet konkreter formulieren oder die BegrГјndung/den Zusammenhang stattdessen in den Detailbereich (nach ###DETAILS###) verschieben. BegrГјndungen, Herleitungen und ErlГӨuterungen gehГ¶ren NIEMALS in die Standardansicht, NUR in "Mehr Details".\n';
  s+='- KRITISCH вҖ“ URSACHE UND WIRKUNG NICHT IN EINEM BULLET VERMISCHEN: Auch ohne Komma/"und"/"=" kann ein Bullet zwei Aussagen enthalten, wenn er Ursache und Wirkung gemeinsam nennt, auch Гјber "weil"/"da"/"dadurch" oder zwei verschiedene FГӨhigkeiten/Probleme in einem Satz. Beispiele aus der Praxis:\n';
  s+='  вқҢ "VerkГӨufer kГ¶nnen im ERP nicht eigenstГӨndig auf LieferfГӨhigkeit und offene Posten zugreifen." вҶ’ вң… "VerkГӨufer haben keinen ERP-Zugriff." + "LieferfГӨhigkeit ist nicht sichtbar."\n';
  s+='  вқҢ "LieferfГӨhigkeits-AuskГјnfte dauern 10 Minuten bis einen Tag, weil Innendienst und Produktion manuell abgefragt werden." вҶ’ вң… "LieferfГӨhigkeit: bis zu 1 Tag." + "Innendienst ist Bottleneck."\n';
  s+='Trenne solche FГӨlle IMMER in zwei eigene Bullets: einen fГјr die Ursache/das Faktum, einen fГјr die Wirkung/Konsequenz вҖ“ auГҹer der Kausalzusammenhang selbst ist die eine, pointierte Kernaussage, die in diesem Block tatsГӨchlich gefordert ist. Im Zweifel: aufteilen.\n';
  s+='KRITISCH вҖ“ DIE STANDARDANSICHT BEANTWORTET NUR VIER FRAGEN: Was wissen wir? Was ist kritisch? Was fehlt? Was ist der nГӨchste Schritt? Mehr nicht. ALLES andere (BegrГјndungen, ZusammenhГӨnge, Interpretationen, Herleitungen, Strategien, ROI-Rechnungen, Demo-Ideen, Vertriebsnotizen) gehГ¶rt ausschlieГҹlich in "Mehr Details". QualitГӨtsmaГҹstab: Der Nutzer Г¶ffnet das Fenster, liest 10 Sekunden, und kann dann sofort sagen "Opportunity verstanden, grГ¶Гҹte Risiken verstanden, wichtigste offene Frage verstanden, nГӨchste Aktion verstanden" вҖ“ ohne einen einzigen Bullet zweimal lesen zu mГјssen.\n';
  s+='QUALITГ„TSREGEL вҖ“ HANDLUNGSORIENTIERUNG: Jede Phase beantwortet drei Kernfragen in ihrem Output: (1) Was ist die wichtigste Erkenntnis dieser Phase? (2) Was ist das grГ¶Гҹte verbleibende Risiko? (3) Was ist der nГӨchste Schritt mit der hГ¶chsten Wirkung auf den Deal? Diese drei Fragen mГјssen nach dem Lesen des Outputs klar und sofort beantwortbar sein вҖ“ nicht durch langes Suchen im Text. KI21 erzeugt keine Berichte, sondern Entscheidungsgrundlagen. Das wichtigste Kriterium fГјr die QualitГӨt einer Ausgabe ist: Kann der VerkГӨufer nach dem Lesen sofort die nГӨchste richtige Handlung ableiten?\n';
  s+='GLOBALE REGEL 1 вҖ“ SPONSOR вү  ENTSCHEIDER: Ein engagierter Ansprechpartner darf NUR dann als Entscheider bezeichnet werden, wenn seine Budget- oder Entscheidungsbefugnis ausdrГјcklich bestГӨtigt ist. Ist das nicht der Fall, verwende immer: "operativer Sponsor", "fachlicher Sponsor" oder "interner Treiber". NIEMALS automatisch aus einer aktiven UnterstГјtzung eine Entscheidungsbefugnis ableiten. Ein Head of Sales, Director oder Teamleiter kann ein wertvoller Sponsor sein вҖ“ Entscheider ist er erst wenn explizit bestГӨtigt.\n';
  s+='GLOBALE REGEL 2 вҖ“ BUDGETSTATUS DIFFERENZIERT AUSWEISEN: Es gibt vier klar unterschiedliche Budgetstufen вҖ“ (a) Budgetrahmen bekannt (grober Rahmen existiert, aber keine Freigabe), (b) Budget plausibel verfГјgbar (passender Budgettopf vorhanden, aber nicht zugewiesen), (c) Budgetfreigabe bestГӨtigt (entscheidungsbefugte Person hat Freigabe explizit bestГӨtigt), (d) Investitionsentscheidung getroffen (Kunde ist bereit fГјr diese konkrete LГ¶sung zu zahlen). Wenn nur (a) oder (b) vorliegt: NIEMALS "Budget bestГӨtigt" schreiben. Stattdessen: "Budgetrahmen vorhanden, konkrete Freigabe offen" oder "BudgetverfГјgbarkeit plausibel, Entscheidungsfreigabe durch GF/CFO ausstehend".\n';
  s+='GLOBALE REGEL 2b вҖ“ KUNDENBUDGET вү  ANGEBOTSPREIS: Verwechsle NIEMALS das verfГјgbare Budget des Kunden mit den Kosten des Angebots. Nutze fГјr Investition und ROI ausschlieГҹlich die in "Mein Unternehmen" hinterlegten Angebotsbausteine/Preise oder explizit genannte Angebotspreise. Wenn ein konkreter Angebotsbaustein preislich klar innerhalb/unterhalb des Kundenbudgets liegt, ist Budget-Passung fГјr diesen Baustein KEIN offener Punkt mehr. Schreibe dann NICHT "passt ins Budget?", NICHT "BudgethГјrde" und NICHT "Budgetfreigabe fГјr [Budgetrahmen] nГ¶tig", solange der Budgetrahmen nicht der Angebotspreis ist. Offen bleiben dГјrfen Umfang, Starttermin, Erfolgskriterien und formale Beauftragung.\n';
  s+='GLOBALE REGEL 2c вҖ“ PILOT/EINSTIEG NUR BEI ANGEBOTSROLLE: Behandle ein Angebot nur dann als Pilot, Einstieg, Startangebot oder Compact-Angebot, wenn diese Rolle in "Mein Unternehmen"/Angebotsbausteinen ausdrГјcklich genannt ist (z.B. Pilot, Einstieg, Startangebot, Compact/Kompakt). Leite Pilotstatus NIEMALS nur aus niedrigem Preis ab. Erfinde keine konkrete Pilotdauer (z.B. 4 Wochen, 6 Wochen, 2 Monate), wenn sie nicht ausdrГјcklich genannt wurde.\n';
  s+='GLOBALE REGEL 3 вҖ“ SPГ„TE PHASEN BEI OFFENER VALIDIERUNG KENNZEICHNEN: Wenn finale Entscheider (GF/CEO/CFO), ROI, wirtschaftliche ZielgrГ¶Гҹe oder Entscheidungsprozess noch nicht validiert sind, dГјrfen Phase 4 (Business Case) und Phase 5 (Angebot & Abschluss) nicht wie belastbarer Angebots- oder Abschlussstatus wirken. In diesem Fall MUSS die Ausgabe zu Beginn klar kennzeichnen: "вҡ  VORBEREITUNGSSTAND: Diese Analyse ist vorbereitend вҖ“ [konkrete offene Punkte] fehlen noch." Dann trotzdem vollstГӨndige Inhalte ausgeben вҖ“ aber als Vorbereitung, nicht als abschlussreifen Stand.\n';
  s+='GLOBALE REGEL 4 вҖ“ ALTE HYPOTHESEN DURCH BESTГ„TIGTE ERKENNTNISSE ERSETZEN: Wenn im Kontext Kunde (ErgГӨnzungen) neuere, konkretere oder bestГӨtigte Informationen vorliegen, die einer frГјheren Hypothese widersprechen, MUSS die Hypothese ersetzt werden. Beispiel: Steht in den ErgГӨnzungen ein bestГӨtigter wirtschaftlicher Schaden durch das Problem, darf nicht gleichzeitig stehen "Keine bestГӨtigten Schmerzen aus direktem GesprГӨch." Stattdessen: "BestГӨtigter Schmerz: [Problem] verursacht [Betrag/Rolle]." Ebenso: Wenn ErgГӨnzungen eine Entscheidungsbefugnis nennen, darf nicht parallel stehen "Entscheider noch unklar" вҖ“ sondern: "Entscheiderstatus bestГӨtigt; noch offene Punkte nur dort nennen, wo sie wirklich offen sind."\n';
  s+='EVIDENZLABELS (verbindlich fГјr alle KI21-Ausgaben): Verwende exakt diese fГјnf Labels, niemals andere Formulierungen:\nвҖў BESTГ„TIGT вҖ“ Kunde hat dies explizit genannt oder schriftlich bestГӨtigt.\nвҖў ANNAHME вҖ“ Schlussfolgerung aus vorliegenden Informationen, noch nicht direkt bestГӨtigt.\nвҖў ZU KLГ„REN вҖ“ Information fehlt, muss im nГӨchsten GesprГӨch erfragt werden.\nвҖў NICHT BEKANNT вҖ“ Kein Hinweis in den vorliegenden Daten, noch kein GesprГӨch darГјber.\nвҖў ГңBERHOLT вҖ“ Diese Aussage war frГјher gГјltig, wurde aber durch neuere Ergenntnisse ersetzt. Nur verwenden wenn ein expliziter Widerspruch zu einer frГјheren Aussage vorliegt.\nKritische Konsistenzregel: BESTГ„TIGT und ZU KLГ„REN dГјrfen nicht fГјr dieselbe Information gleichzeitig vergeben werden. Wenn neue ErgГӨnzungen eine ZU KLГ„REN-Frage beantworten, ersetzt BESTГ„TIGT den bisherigen Status вҖ“ nie beide parallel.\n';
  s+='- KRITISCH вҖ“ REIHENFOLGE INNERHALB JEDER BULLET-LISTE: Sortiere IMMER nach Relevanz fГјr die Kaufentscheidung: zuerst Schmerz/Bedarf (quantifiziert, wenn mГ¶glich), dann Risiko, zuletzt allgemeiner Kontext. Die wichtigste, konkreteste Erkenntnis steht IMMER an Position 1 вҖ“ niemals ein genereller Kontext-Punkt vor einem konkreten Schmerzpunkt.\n';
  s+='- Erkenntnisse als einfache Bullets, OHNE BESTГ„TIGT:/ANNAHME:/KLГ„REN:-PrГӨfix in der Standardausgabe (diese Kennzeichnung nur noch im Detailbereich nach ###DETAILS### verwenden, falls das jeweilige Phasenformat das vorsieht)\n';
  s+='- KRITISCH: Die abschlieГҹende Aktionszeile darf NUR EINE einzige, priorisierte Handlung enthalten вҖ“ KEINE AufzГӨhlung mehrerer Aktionen mit "und" oder Kommas (z.B. NICHT "Workshop vereinbaren und Unterlagen vorbereiten und Entscheider kontaktieren"). Wenn mehrere Dinge zu tun wГӨren, wГӨhle die EINE wichtigste aus, die diese Woche passieren muss вҖ“ alles andere ergibt sich danach von selbst oder gehГ¶rt in den Detailbereich.\n';
  s+='- Am Ende GENAU EINE Aktionszeile gemГӨГҹ dem unten vorgegebenen Phasenformat (z.B. "NГ„CHSTER SCHRITT DIESE WOCHE:")\n';
  s+='- KRITISCH: Wenn ein Feld "Frage: ___ | Antwort: ___" oder "Antwort: ___" enthГӨlt, ist "___" ein PLATZHALTER fГјr eine noch unbeantwortete Frage. Schreibe NIEMALS eine erfundene Antwort dorthin вҖ“ das "___" muss exakt so im Output stehen bleiben.\n';
  s+='- KRITISCH вҖ“ KEINE ГңBERNAHME UNGEPRГңFTER ZAHLEN AUS FRГңHEREN PHASEN: Der Abschnitt "BISHERIGE ERGEBNISSE" (falls unten vorhanden) ist NUR Hintergrundwissen fГјr dich, um Wiederholungen zu vermeiden und BezГјge herzustellen. Wiederhole NIEMALS frГјhere Phasenergebnisse, Phasennamen oder Phasentitel im Output. Erzeuge AUSSCHLIESSLICH den Output fГјr die JETZT angeforderte, EINZELNE Phase вҖ“ kein Sammel-Output Гјber mehrere Phasen, keine "Zusammenfassung bisheriger Phasen" als eigener Abschnitt. WICHTIG: "BISHERIGE ERGEBNISSE" wurde von einer frГјheren KI-Anfrage erzeugt und kann selbst ungeprГјfte SchГӨtzungen oder Fehler enthalten вҖ“ es ist NICHT automatisch gleichwertig mit einer direkten, vom Kunden bestГӨtigten Aussage. Гңbernimm aus "BISHERIGE ERGEBNISSE" NUR Zahlen/Fakten, die DORT bereits klar als BESTГ„TIGT/vom Kunden genannt gekennzeichnet waren. Wenn eine Zahl dort ohne erkennbare Quelle auftaucht (z.B. eine konkrete вӮ¬-Summe zu einem Bestandssystem, ohne dass im Originaltext der Kunde diese Zahl genannt hat), Гјbernimm sie NICHT unverГӨndert вҖ“ kennzeichne sie stattdessen erneut als ANNAHME/ZU VALIDIEREN oder lasse sie ganz weg. Erfinde NIEMALS eine neue, noch prГӨzisere Version einer bereits unsicheren Zahl.\n';
  // Include results from all previous phases - unabhГӨngig von stk (ErgГӨnzungen), da diese Info fГјr KPI-Weiterverwendung essenziell ist
  {
    const phaseNames=['Qualifizierung','Bedarfsanalyse & Demo','Termin nachbereiten','Nutzen-Kosten-Analyse','Angebot & Abschluss'];
    const aid=LS.get('ki21_aid',null);
    if(aid){
      let prevResults='';
      const limit=(currentSitId!==undefined)?currentSitId:5;
      for(let i=0;i<limit;i++){
        const d=LS.get('ki21_st_'+aid+'_'+i,{});
        if(d.result&&d.result.trim()){
          const {main:prevMain}=splitDetailsFromResult(d.result);
          // An Zeilengrenze abschneiden statt mitten im Satz/Label, damit Kennzeichnungen wie ANNAHME/KLГ„REN nicht verloren gehen
          let snippet=prevMain;
          if(snippet.length>600){
            const cut=snippet.lastIndexOf('\n',600);
            snippet=snippet.substring(0,cut>0?cut:600)+'\n[...]';
          }
          prevResults+='\n--- '+phaseNames[i]+' (nur zur Orientierung, NICHT wiederholen) ---\n'+snippet+'\n';
        }
      }
      if(prevResults)s+='\nBISHERIGE ERGEBNISSE (NUR zur Orientierung вҖ“ diese NIEMALS im Output wiederholen oder zusammenfassen):'+prevResults+'\n';
    }
  }
  if(cust.firma)s+='Kunde: '+cust.firma+'\n';
  if(cust.ap)s+='Ansprechpartner: '+cust.ap+'\n';
  if(cust.branche)s+='Branche: '+cust.branche+'\n';
  if(cust.ma)s+='Mitarbeiter: '+cust.ma+'\n';
  if(cust.um){
    // Format large numbers to Mio. вӮ¬
    let umDisplay=cust.um;
    const umNum=parseFloat(String(cust.um).replace(/[^0-9.]/g,''));
    if(umNum>=1000000)umDisplay=(umNum/1000000).toFixed(1)+' Mio. вӮ¬';
    else if(umNum>=1000)umDisplay=(umNum/1000).toFixed(1)+' Tsd. вӮ¬';
    s+='Umsatz: '+umDisplay+'\n';
  }
  // Phasenbezogene ErgГӨnzungen: kk_0 bis kk_{currentSitId}
  // Jede Phase sieht nur den Wissensstand der sie selbst + alle frГјheren Phasen.
  // Migration: alter globaler ki21_kk_{accId}-Key wird als Slot 0 behandelt.
  {
    const aid2=LS.get('ki21_aid',null);
    if(aid2){
      const limit2=(currentSitId!==undefined)?currentSitId+1:5;
      let kkCombined='';
      for(let i=0;i<limit2;i++){
        // PrГјfe phasenbezogenen Slot
        const slotVal=LS.get('ki21_kk_'+aid2+'_'+i,null);
        if(slotVal&&slotVal.trim())kkCombined+=slotVal.trim()+'\n';
      }
      // Migration: alter globaler Key вҶ’ nur verwenden wenn noch kein Slot vorhanden
      if(!kkCombined){
        const legacyKk=LS.get('ki21_kk_'+aid2,'');
        if(legacyKk&&legacyKk.trim())kkCombined=legacyKk.trim();
      }
      if(kkCombined.trim())s+='\nKontext Kunde:\n'+kkCombined.trim()+'\n';
    }
  }
  if(mu&&mu.profil)s+='\nMein Unternehmen:\n'+mu.profil+'\n';
  if(mu&&mu.bausteine)s+='\nAngebotsbausteine:\n'+mu.bausteine+'\n';
  const intelData=LS.get('ki21_intelligence',{});
  if(intelData&&intelData.inhalt)s+='\nKI21 Intelligence (verdichtete Business Patterns):\n'+intelData.inhalt+'\n';
  if(stk)s+='\nZusГӨtzlicher Kontext:\n'+stk+'\n';
  return s+'--- ENDE KONTEXT ---\n\n';
}

// в”Җв”Җ CLAUDE API в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function callClaude(prompt, onStream){
  const apiKey=LS.get('ki21_apikey','');
  if(!apiKey){alert('Bitte API Key unter вҡҷ hinterlegen.');return null;}
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',
      max_tokens:20000,
      stream:true,
      tools:[{type:'web_search_20250305',name:'web_search',max_uses:6}],
      messages:[{role:'user',content:prompt}]
    })
  });
  if(!resp.ok){const err=await resp.json();throw new Error(err.error?.message||'API Fehler '+resp.status);}
  const reader=resp.body.getReader();
  const decoder=new TextDecoder();
  let fullText='';
  let blockText='';
  while(true){
    const {done,value}=await reader.read();
    if(done)break;
    const chunk=decoder.decode(value,{stream:true});
    const lines=chunk.split('\n');
    for(const line of lines){
      if(line.startsWith('data: ')){
        const data=line.slice(6);
        if(data==='[DONE]')continue;
        try{
          const parsed=JSON.parse(data);
          if(parsed.type==='content_block_start'&&parsed.content_block?.type==='tool_use'){
            if(onStream)onStream(stripMd(fullText)+'\nрҹ”Қ Suche aktuelle Informationen...\n');
          }
          if(parsed.type==='content_block_start'&&parsed.content_block?.type==='text'){
            blockText='';
          }
          if(parsed.type==='content_block_delta'&&parsed.delta?.text){
            blockText+=parsed.delta.text;
            if(onStream)onStream(stripMd(fullText+blockText));
          }
          if(parsed.type==='content_block_stop'){
            if(blockText){fullText+=(fullText?'\n':'')+blockText;blockText='';}
          }
        }catch(e){}
      }
    }
  }
  if(blockText){fullText+=(fullText?'\n':'')+blockText;}
  return fullText;
}

// в”Җв”Җ HELPERS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(tag==='button' && (!attrs || attrs.type==null))el.setAttribute('type','button');
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')el.className=v;
    else el.setAttribute(k,v);
  });
  children.flat().forEach(c=>{
    if(c==null)return;
    el.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return el;
}

function modal(title,content,onClose){
  const bg=h('div',{className:'modal-bg'});
  bg.addEventListener('click',e=>{if(e.target===bg){bg.remove();if(onClose)onClose();}});
  const box=h('div',{className:'modal-box'},
    h('div',{className:'modal-handle'}),
    h('div',{className:'modal-title'},title),
    content
  );
  bg.appendChild(box);
  document.body.appendChild(bg);
  return bg;
}

function stripMd(text){
  return text
    .replace(/#{1,6}\s+/g,'')
    .replace(/\*\*\*([^*]+)\*\*\*/g,'$1')
    .replace(/\*\*([^*]+)\*\*/g,'$1')
    .replace(/\*([^*]+)\*/g,'$1')
    .replace(/^---+$/gm,'')
    .replace(/^===+$/gm,'')
    .replace(/^>\s/gm,'')
    .replace(/`([^`]+)`/g,'$1')
    .trim();
}

function getPhaseScore(sitId){
  const aid=LS.get('ki21_aid',null);
  if(!aid)return null;
  const data=LS.get('ki21_st_'+aid+'_'+sitId,{});
  if(!data.result)return null;
  const match=data.result.match(/(\d+)\s*\/\s*10/);
  if(match){
    const s=parseInt(match[1]);
    return s>=1&&s<=10?s:null;
  }
  return null;
}

          if(e.stopImmediatePropagation)e.stopImmediatePropagation();
          t.remove();
        }
        document.removeEventListener('click',dismissOnAnyClick,true);
        document.removeEventListener('touchstart',dismissOnAnyClick,true);
      };
      document.addEventListener('click',dismissOnAnyClick,true);
      document.addEventListener('touchstart',dismissOnAnyClick,true);
    },100);
  };
  const start=(e)=>{
    fired=false;
    pressTimer=setTimeout(()=>{fired=true;showTooltip();},500);
  };
  const cancel=()=>{if(pressTimer)clearTimeout(pressTimer);};
  el.style.cursor='pointer';
  el.addEventListener('touchstart',start,{passive:true});
  el.addEventListener('touchend',cancel);
  el.addEventListener('touchmove',cancel);
  el.addEventListener('mousedown',start);
  el.addEventListener('mouseup',cancel);
  el.addEventListener('mouseleave',cancel);
  el.addEventListener('contextmenu',e=>e.preventDefault());
}

function extractBegruendung(text){
  const m=text.match(/BegrГјndung:\s*(.+)/);
  if(m)return m[1].trim().split('\n')[0];
  const pipeMatch=text.match(/\d+\s*\/\s*10\s*\|\s*(.+)/);
  if(pipeMatch)return pipeMatch[1].trim().split('\n')[0];
  const fallback=text.match(/Empfehlung:\s*(.+)/);
  if(fallback)return fallback[1].trim().split('\n')[0];
  return '';
}

async function callClaudeJSON(prompt){
  const apiKey=LS.get('ki21_apikey','');
  if(!apiKey)return null;
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:4000,
        messages:[{role:'user',content:prompt}]
      })
    });
    if(!resp.ok){console.warn('callClaudeJSON: API-Fehler',resp.status);return null;}
    const json=await resp.json();
    let text=(json.content||[]).map(b=>b.text||'').join('');
    text=text.trim().replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/```\s*$/,'');
    try{
      return JSON.parse(text);
    }catch(parseErr){
      console.warn('callClaudeJSON: JSON-Parse fehlgeschlagen, evtl. abgeschnitten durch max_tokens. Rohtext-LГӨnge:',text.length,'stop_reason:',json.stop_reason);
      // Versuche das letzte vollstГӨndige } zu finden und davor abzuschneiden (Rettung bei Abschneidung am Ende)
      const lastBrace=text.lastIndexOf('}');
      if(lastBrace>0){
        try{return JSON.parse(text.substring(0,lastBrace+1));}catch(e2){}
      }
      return null;
    }
  }catch(e){console.warn('callClaudeJSON: Fehler',e.message);return null;}
}

function getAdditionRiskSignals(accId,allResults){
  const resultsText=(allResults||[]).map(r=>r.text||'').join('\n');
  const raw=(getCurrentUserKnowledgeText(accId)+'\n'+resultsText);
  const combined=raw.toLowerCase();
  const warning=[];
  const positive=[];
  let penalty=0;
  let scoreCap=null;
  const addWarn=(text,points,cap)=>{
    if(!warning.find(w=>w.text===text))warning.push({text,origin:'ERGAENZUNG',type:'warning',disabled:false});
    penalty=Math.max(penalty,points);
    if(cap!==undefined&&cap!==null)scoreCap=scoreCap===null?cap:Math.min(scoreCap,cap);
  };
  const addPos=(text,points)=>{
    if(!positive.find(w=>w.text===text))positive.push({text,origin:'ERGAENZUNG',type:'positive',disabled:false});
    // Positive ErgГӨnzungen werden bewusst nur moderat behandelt; harte Negativsignale dominieren.
  };
  if(!combined.trim())return {warning,positive,penalty,scoreCap};

  const leaderWords='(geschГӨftsfГјhrer|gf|ceo|cfo|geschГӨftsleitung|entscheider|leitung|vorstand|sponsor)';
  const competitorWords='(mitbewerb|mitbewerber|wettbewerb|wettbewerber|konkurrent|konkurrenz|alternative|andere lГ¶sung|andere lГ¶sungen)';
  const preferenceWords='(prГӨfer|bevorzug|favoris|favorit|gesetzt|vorne|tendier|entschieden)';
  const rejectionWords='(mag .*nicht|will .*nicht|lehnt .*ab|skeptisch|dagegen|kein interesse|nicht Гјberzeugt|unsere lГ¶sung nicht|gegen unsere lГ¶sung)';

  const leaderPrefersCompetitor=new RegExp(leaderWords+'.{0,120}'+preferenceWords+'.{0,120}'+competitorWords,'i').test(raw)
    || new RegExp(competitorWords+'.{0,120}'+preferenceWords+'.{0,120}'+leaderWords,'i').test(raw)
    || new RegExp(leaderWords+'.{0,120}'+rejectionWords+'.{0,160}'+competitorWords,'i').test(raw)
    || new RegExp(leaderWords+'.{0,160}'+competitorWords,'i').test(raw)&&new RegExp(rejectionWords+'|'+preferenceWords,'i').test(raw);

  if(leaderPrefersCompetitor){
    addWarn('GeschГӨftsfГјhrer favorisiert Wettbewerber',45,25);
  }
  if(new RegExp(leaderWords+'.{0,120}'+rejectionWords,'i').test(raw)){
    addWarn('Entscheider lehnt unsere LГ¶sung ab',35,30);
  }
  if(new RegExp(competitorWords+'.{0,100}(workshop|demo|pilot|proof|poc|test|prГӨsentation|angebot)','i').test(raw)){
    addWarn('Wettbewerber bereits aktiv',25,35);
  }
  if(new RegExp('(budget).{0,80}(nicht|kein|fehlt|gestrichen|unklar|abgelehnt)','i').test(raw)){
    addWarn('Budget-Freigabe durch GF/CFO noch offen вҶ’ Strategie: Pilotmodell oder schrittweise EinfГјhrung vorschlagen',20,45);
  }
  if(new RegExp('(entscheidung|projekt|go-live|start|kauf).{0,80}(verschoben|verzГ¶gert|spГӨter|unklar|pausiert|gestoppt|eingefroren)','i').test(raw)){
    addWarn('Entscheidung verzГ¶gert oder gestoppt',20,45);
  }
  if(new RegExp('(budget).{0,80}(genehmigt|freigegeben|bestГӨtigt)','i').test(raw)){
    addPos('Operatives Budget vorhanden',5);
  }
  if(new RegExp(leaderWords+'.{0,120}(sponsor|unterstГјtzt|treibt|will|prioritГӨt|dringend)','i').test(raw)){
    addPos('Operativer Sponsor unterstГјtzt aktiv',5);
  }
  const championWords='(champion|fГјrsprecher|unterstГјtzer|treiber|sponsor)';
  const departureWords='(verlГӨsst (das unternehmen|die firma|uns)|hat gekГјndigt|kГјndigt (zum|in|im|nГӨchst|demnГӨchst)|wechselt (den arbeitgeber|die firma|das unternehmen)|ist nicht mehr (im unternehmen|verfГјgbar|erreichbar|an bord)|zieht (seine|ihre) unterstГјtzung zurГјck|fГӨllt (als (champion|fГјrsprecher|sponsor) )?(komplett )?weg)';
  const trustPhrasePattern=/(verlГӨsst sich|verlassen sich|sich .{0,15}verlassen|verlass(en)? auf|verlГӨsslich|vertrau)/i;
  const championDepartureRe=new RegExp(championWords+'.{0,80}'+departureWords,'i');
  const championDepartureMatch=raw.match(championDepartureRe);
  if(championDepartureMatch&&!trustPhrasePattern.test(championDepartureMatch[0])){
    addWarn('Interner Champion verlГӨsst das Unternehmen',30,30);
  }
  return {warning,positive,penalty,scoreCap};
}

function applyHealthRiskRules(baseScore,risk){
  let score=Number(baseScore)||0;
  score=score-risk.penalty;
  if(risk.scoreCap!==null&&risk.scoreCap!==undefined){
    score=Math.min(score,risk.scoreCap);
  }
  return Math.max(0,Math.min(100,Math.round(score)));
}

function buildHealthPrompt(cust,allResults,kontext,phaseAdditions){

    s+='WICHTIG: Diese Informationen sind neuer als die Phasenergebnisse unten. Wenn ein Fakt hier explizit bestГӨtigt wird (z.B. "Person X ist Entscheider und darf alleine beauftragen"), dann ist dieses Thema GEKLГ„RT вҖ“ auch wenn ГӨltere Phasenergebnisse noch "offen" oder "unklar" sagen. Harte neue Fakten gewinnen immer.\n\n';
    if(kontext)s+='--- Globale ErgГӨnzungen ---\n'+kontext.slice(0,3000)+'\n\n';
